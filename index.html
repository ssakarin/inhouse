<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#07111f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest" id="appManifestLink">
<script>
  (() => {
    const manifestLink = document.getElementById('appManifestLink');
    const params = new URLSearchParams(window.location.search);
    const view = (params.get('view') || '').toLowerCase();
    const bedNo = Number(params.get('bed'));
    if (new Set(['desk', 'notify', 'clinic']).has(view)) {
      manifestLink.href = `manifest-${view}.webmanifest`;
      return;
    }
    const regularBeds = new Set([1, 2, 3, 4, 5, 6, 8, 9, 10, 11, 12, 13, 14, 15]);
    if (regularBeds.has(bedNo)) manifestLink.href = `manifest-bed${bedNo}.webmanifest`;
    if (bedNo === 101 || bedNo === 102) manifestLink.href = `manifest-doctor${bedNo - 100}.webmanifest`;
  })();
</script>
<link rel="apple-touch-icon" href="assets/logo-icon.png">
<title>경희홍익 진료보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>

    --bg: #07111f;
    --surface: #101b2d;
    --surface2: #16243a;

    --border: rgba(255,255,255,0.12);

    --green: #4ade80;

    --shadow: 0 8px 32px rgba(0,0,0,0.4);

  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* ─── 입력 패널 ─── */

  .input-layout { display: grid; gap: 12px; }
  .input-panel:not(.input-form-open) .input-form-column { display: none; }
  .input-panel:not(.input-form-open) .input-layout { grid-template-columns: 1fr; }
  .input-panel.input-form-open .input-detail-column { display: none; }
  .receive-panel.receive-form-open .receive-detail-column > .card { display: none; }
  .receive-panel:not(.receive-form-open) .receive-form-column { display: none; }
  .receive-doctor-alert-editor { display: none; }
  .receive-panel.receive-doctor-alert-editing .receive-main-column > .card:not(.receive-doctor-alert-editor) {
    display: none;
  }
  .receive-panel.receive-doctor-alert-editing .receive-doctor-alert-editor {
    display: block;
    min-height: calc(100dvh - 120px);
  }
  body.app-mode-doctor .receive-panel.receive-form-open:not(.receive-edit-open) .receive-form-column,
  body.app-mode-receive .receive-panel.receive-form-open:not(.receive-edit-open) .receive-form-column,
  body.app-role-doctor .receive-panel.receive-form-open:not(.receive-edit-open) .receive-form-column,

  body.app-mode-doctor .receive-panel.receive-form-open:not(.receive-edit-open) .receive-detail-column > .card,
  body.app-mode-receive .receive-panel.receive-form-open:not(.receive-edit-open) .receive-detail-column > .card,
  body.app-role-doctor .receive-panel.receive-form-open:not(.receive-edit-open) .receive-detail-column > .card,

    justify-content: space-between;

  }

  .receive-panel.receive-form-open .receive-form-column > .card {
    display: grid;

  .input-panel.input-form-open #deskBodyPartSection,
  .receive-panel.receive-form-open #receiveBodyPartSection {
    grid-column: 2;
    grid-row: 1 / span 4;
    align-self: center;
    margin-top: 0;
  }
  .input-panel.input-form-open #deskBodyPartForm,
  .receive-panel.receive-form-open #receiveBodyPartForm {
    height: auto;
    min-height: 420px;
  }

  body.app-role-clinic .receive-panel.receive-edit-open .receive-drawer-toggle { display: block !important; }

  .receive-panel.receive-form-open .receive-drawer-toggle {

  .bed-panel.active .bed-drawer-toggle { display: none; }
  .bed-panel.bed-edit-open .bed-drawer-toggle {

  .bed-schedule-toggle { display: none !important; }
  .bed-schedule-panel {

  body.app-mode-bed .bed-schedule-panel,

  .bed-schedule-calendar-head {
    display: grid;
    grid-template-columns: 34px 1fr 34px;

    margin-bottom: 8px;

  .bed-schedule-calendar-title {
    color: var(--text);

    font-weight: 900;

  .bed-schedule-calendar-nav {

  .bed-schedule-month-grid {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));

  .bed-schedule-month-dow {
    color: var(--text3);

  .bed-schedule-month-day {
    min-height: 34px;

    background: var(--accent);
    border: 1px solid var(--accent);

  .chart-lookup-badge.returning {
    background: rgba(57,169,245,0.18);
    border: 1px solid rgba(57,169,245,0.65);
    color: var(--accent);
  }
  .chart-patient-choice-overlay {
    position: fixed;
    inset: 0;
    z-index: 2400;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 18px;
    background: rgba(5, 10, 18, 0.62);
    backdrop-filter: blur(8px);
  }
  .chart-patient-choice-overlay.show { display: flex; }
  .chart-patient-choice-dialog {
    width: min(520px, 100%);
    max-height: min(720px, 88vh);
    overflow: auto;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface);
    box-shadow: 0 20px 70px rgba(0, 0, 0, 0.42);
    padding: 18px;
  }
  .chart-patient-choice-title {
    font-size: 18px;
    font-weight: 900;
    color: var(--text);
    margin-bottom: 6px;
  }
  .chart-patient-choice-sub {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 14px;
  }
  .chart-patient-choice-list {
    display: grid;
    gap: 8px;
  }
  .chart-patient-choice-item {
    width: 100%;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 10px;
    align-items: center;
    text-align: left;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface2);
    color: var(--text);
    padding: 12px;
    cursor: pointer;
  }
  .chart-patient-choice-item:hover {
    border-color: var(--accent);
    background: rgba(57,169,245,0.12);
  }
  .chart-patient-choice-name {
    font-size: 16px;
    font-weight: 900;
  }
  .chart-patient-choice-meta {
    margin-top: 4px;
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .chart-patient-choice-chip {
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 3px 7px;
    font-size: 12px;
    color: var(--text2);
    background: rgba(255,255,255,0.04);
  }
  .chart-patient-choice-action {
    color: var(--accent);
    font-size: 13px;
    font-weight: 900;
  }
  .chart-patient-choice-foot {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 14px;
  }
  .chart-patient-choice-secondary {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface2);
    color: var(--text2);
    padding: 9px 12px;
    cursor: pointer;
  }
  .chart-patient-choice-secondary:hover {
    color: var(--text);
    border-color: var(--accent);
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
    margin-right: 5px;
    animation: pulse 2s infinite;
  }
  body.local-fallback-mode .status-dot { background: var(--gold); }
  body.remote-offline-mode .status-dot { background: var(--danger); }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- 헤더 -->
  <div class="header">
    <div class="header-left">
      <img class="brand-icon" src="assets/logo-icon.png" alt="경희홍익한의원 로고">
      <div class="brand-copy">
        <h1><span>경희</span><span class="brand-highlight">홍익</span><span>한의원</span><span class="bed-header-bed-chip" id="bedHeaderBedChip">1번</span></h1>
      </div>
      <div class="header-left-desk-controls">
      </div>
    </div>
    <div class="header-actions">
      <div class="header-desk-controls">
        <button type="button" class="desk-excel-add-btn" onclick="document.getElementById('deskChartImportInput').click()">엑셀추가</button>
        <input id="deskChartImportInput" type="file" accept=".xls,.xlsx,.csv" style="display:none"
          onchange="importChartFileFromDesk(this.files?.[0]); this.value='';">
        <button class="nurse-quick-btn nurse-quick-btn-desk" id="nurseQuickBtnDesk" type="button" onclick="toggleNurseQuickPopover(event)">간호사</button>
        <label class="rr-setting desk-auto-bed-toggle">
          <span class="rr-setting-text">자동배정</span>
          <span class="rr-switch">
            <input id="autoBedAssignEnabledDesk" type="checkbox" onchange="saveAutoBedAssignEnabled(this.checked)">
            <span class="rr-slider"></span>
          </span>
        </label>
        <span class="header-wait-chip today-treated-chip" id="deskTodayTreatedCount">오늘 0명</span>
        <span class="header-wait-chip bed-count-chip" id="deskBedPatientCount">0/13</span>
        <span class="header-wait-chip" id="deskWaitChip">예상대기시간 0분</span>
        <span class="header-current-time" id="deskCurrentTime"></span>
      </div>
      <div class="header-notify-controls">
        <button class="nurse-quick-btn" id="nurseQuickBtn" type="button" onclick="toggleNurseQuickPopover(event)">간호사</button>
        <span class="header-wait-chip today-treated-chip" id="receiveTodayTreatedCount">오늘 0명</span>
        <span class="header-wait-chip bed-count-chip" id="receiveBedPatientCount">0/13</span>
        <span class="header-wait-chip" id="notifyWaitChip">예상대기시간 0분</span>
        <div class="doctor-alert-btns" id="doctorAlertBtns"></div>
        <span class="header-current-time" id="notifyCurrentTime"></span>
      </div>
      <div class="header-bed-controls">
        <span class="header-wait-chip" id="bedRemainingChip">남은 진료 시간 0분</span>
        <span class="header-current-time" id="bedCurrentTime"></span>
      </div>
      <div class="mode-toggle">
        <button class="mode-btn active" onclick="setMode('input')">데스크</button>
        <button class="mode-btn" onclick="setMode('notify')" style="display:none">치료실알림</button>
        <button class="mode-btn" onclick="setMode('receive')">치료실</button>
        <button class="mode-btn" onclick="setMode('bed')">베드</button>
        <button class="mode-btn" onclick="setMode('settings')">설정</button>
      </div>
    </div>
  </div>

  <div class="nurse-quick-popover" id="nurseQuickPopover" onclick="event.stopPropagation()">
    <div class="nurse-quick-head">
      <div class="nurse-quick-title">간호사 관리</div>
      <button class="nurse-quick-close" type="button" onclick="closeNurseQuickPopover()" aria-label="닫기">×</button>
    </div>
    <label class="rr-setting" style="margin-top:0;margin-bottom:10px">
      <span class="rr-setting-text">간호사 자동배정</span>
      <span class="rr-switch">
        <input id="nurseQuickAutoAssignEnabled" type="checkbox" onchange="saveNurseAutoAssignEnabled(this.checked)">
        <span class="rr-slider"></span>
      </span>
    </label>
    <div class="staff-add-row">
      <input class="name-input" id="nurseQuickNameInput" type="text" placeholder="간호사 이름 입력" maxlength="20">
      <button class="timer-set-btn" type="button" onclick="addStaff('nurses', 'nurseQuickNameInput')">추가</button>
    </div>
    <div class="staff-list" id="nurseQuickList"></div>
  </div>

  <!-- 입력 패널 -->
  <div class="input-panel active" id="inputPanel">
    <button class="input-drawer-toggle" id="inputFormToggle" data-open="0" onclick="toggleDeskInputForm()" aria-label="입력 열기">›</button>
    <div class="input-layout">
      <div class="input-form-column">
        <div class="card">
          <div class="form-section">
            <div class="patient-info-grid desk-chart-grid">
              <div class="chart-lookup-row">
                <span class="chart-lookup-badge" id="chartLookupBadge"></span>
                <input class="name-input" id="chartNo" type="text" placeholder="차트번호" maxlength="20" autocomplete="off"
                  onkeydown="if(event.key==='Enter'){event.preventDefault(); window.runDeskChartNoLookup?.();}"
                  onchange="window.runDeskChartNoLookup?.()"
                  oninput="window.clearChartLookupBadge?.()">
              </div>
              <input class="name-input" id="patientName" type="text" placeholder="성함" maxlength="10" autocomplete="off">
              <input class="name-input" id="ageInput" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="나이" maxlength="3" autocomplete="off">
              <div class="form-segment-row">
                <div class="segmented desk-visit-segment">
                  <label class="segment-item"><input type="radio" name="visitType" value="초진" checked><span>초</span></label>
                  <label class="segment-item"><input type="radio" name="visitType" value="재진"><span>재</span></label>
                </div>
                <div class="segmented desk-gender-segment">
                  <label class="segment-item"><input type="radio" name="gender" value="남" checked><span>남</span></label>
                  <label class="segment-item"><input type="radio" name="gender" value="여"><span>여</span></label>
                </div>
              </div>
              <input class="name-input wide" id="chiefComplaint" type="text" placeholder="메모1" maxlength="60" autocomplete="off">
              <textarea class="name-input wide" id="memoInput" placeholder="메모2" maxlength="120" rows="3" autocomplete="off"></textarea>
              <div class="memo2-history-list" id="memo2HistoryList"></div>
              <button class="submit-btn desk-submit-btn" id="submitBtn" onclick="submitPatient()">입력</button>
            </div>
          </div>

          <div class="form-section">
            <div class="staff-select-grid monitor-staff-grid">
              <select class="staff-select" id="doctorSelect"></select>
              <select class="staff-select" id="nurseSelect"></select>
            </div>
          </div>

          <div class="form-section" id="deskTreatmentSection">
            <div class="treatment-grid monitor-treatment-grid" id="treatmentGrid"></div>
          </div>
          <div class="form-section" id="deskBodyPartSection">
            <div class="form-body-map" id="deskBodyPartForm"></div>
          </div>
        </div>
      </div>

      <div class="input-detail-column">
        <div class="card">
          <div class="card-label">대기</div>
          <div class="waiting-list waiting-list--compact" id="inputWaitingList" ondragover="handleWaitingListDragOver(event)" ondrop="handleWaitingListDrop(event)"></div>
        </div>
        <div class="card">
          <div class="card-label alert-card-title">
            <span>알림</span>
            <button type="button" class="alert-card-action" onclick="openDischargedPatientsPopup()">퇴실환자</button>
          </div>
          <div class="upcoming-list" id="inputUpcomingAlerts"></div>
        </div>
      </div>

      <div class="input-monitor-column">
        <div class="card">
          <div class="bed-monitor" id="inputBedMonitor"></div>
        </div>
        <div class="card input-monitor-doctor-alert-card">
          <div class="doctor-alert-split" id="inputDoctorAlertSplit"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 수신 패널 -->
  <div class="receive-panel" id="receivePanel">
    <button class="input-drawer-toggle receive-drawer-toggle" id="receiveFormToggle" data-open="0" onclick="toggleReceiveForm()" aria-label="입력 열기">›</button>
    <div class="receive-layout">
      <div class="receive-main-column">
        <div class="card">
          <div class="bed-monitor" id="receiveBedMonitor"></div>
        </div>
        <div class="card receive-doctor-alert-editor" id="receiveDoctorAlertEditor"></div>
      </div>
      <div class="receive-detail-column">
        <div class="receive-form-column">
          <div class="card">
            <div class="form-section">
              <div class="patient-info-grid receive-chart-grid">
                <input class="name-input" id="receiveChartNo" type="text" placeholder="차트번호" maxlength="20" autocomplete="off">
                <input class="name-input" id="receivePatientName" type="text" placeholder="성함" maxlength="10" autocomplete="off">
                <input class="name-input" id="receiveAgeInput" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="나이" maxlength="3" autocomplete="off">
                <div class="form-segment-row">
                  <div class="segmented receive-visit-segment">
                    <label class="segment-item"><input type="radio" name="receiveVisitType" value="초진" checked><span>초</span></label>
                    <label class="segment-item"><input type="radio" name="receiveVisitType" value="재진"><span>재</span></label>
                  </div>
                  <div class="segmented receive-gender-segment">
                    <label class="segment-item"><input type="radio" name="receiveGender" value="남" checked><span>남</span></label>
                    <label class="segment-item"><input type="radio" name="receiveGender" value="여"><span>여</span></label>
                  </div>
                </div>
                <input class="name-input wide" id="receiveChiefComplaint" type="text" placeholder="메모1" maxlength="60" autocomplete="off">
                <textarea class="name-input wide" id="receiveMemoInput" placeholder="메모2" maxlength="120" rows="3" autocomplete="off"></textarea>
                <div class="memo2-history-list" id="receiveMemo2HistoryList"></div>
                <button class="submit-btn receive-submit-btn" id="receiveSubmitBtn" onclick="submitPatient('receive')">입력</button>
              </div>
            </div>

            <div class="form-section">
              <div class="staff-select-grid monitor-staff-grid">
                <select class="staff-select" id="receiveDoctorSelect"></select>
                <select class="staff-select" id="receiveNurseSelect"></select>
              </div>
            </div>

            <div class="form-section" id="receiveTreatmentSection">
              <div class="treatment-grid monitor-treatment-grid" id="receiveTreatmentGrid"></div>
            </div>
            <div class="form-section" id="receiveBodyPartSection">
              <div class="form-body-map" id="receiveBodyPartForm"></div>
            </div>
          </div>
        </div>
        <div class="card receive-waiting-card">
          <div class="card-label">대기</div>
          <div class="waiting-list waiting-list--compact" id="receiveWaitingList" ondragover="handleWaitingListDragOver(event)" ondrop="handleWaitingListDrop(event)"></div>
        </div>
        <div class="card receive-alert-card">
          <div class="receive-alert-toggle-row">
            <button type="button" class="receive-alert-toggle-btn" data-alert-view-button="doctor" onclick="setReceiveAlertView('doctor')">원장알림</button>
            <button type="button" class="receive-alert-toggle-btn" data-alert-view-button="general" onclick="setReceiveAlertView('general')">일반알림</button>
          </div>
          <div class="upcoming-list" id="receiveUpcomingAlerts"></div>
          <div class="waiting-list waiting-list--compact notify-waiting-list" id="notifyWaitingList" ondragover="handleWaitingListDragOver(event)" ondrop="handleWaitingListDrop(event)"></div>
          <div class="doctor-alert-split" id="receiveDoctorAlertSplit" onclick="toggleNotifyDoctorAlertExpanded(event)"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 베드 패널 -->
  <div class="bed-panel" id="bedPanel">
    <div class="bed-layout">
      <select class="bed-selector" id="bedSelector" onchange="selectBed(Number(this.value))"></select>
      <div class="bed-doctor-alert-panel" id="bedDoctorAlertPanel">
        <div class="bed-doctor-alert-head">
          <div class="bed-doctor-alert-title-wrap">
            <div class="bed-doctor-alert-title">원장실 알림</div>
            <div class="bed-doctor-alert-reset" id="bedDoctorAlertReset"></div>
          </div>
          <div class="doctor-alert-btns bed-doctor-alert-btns" id="bedDoctorAlertBtns"></div>
        </div>
        <div class="bed-doctor-alert-list" id="bedDoctorAlertList"></div>
      </div>
      <div class="bed-workspace">
        <div class="bed-left-column">
          <details class="bed-input-section" id="bedEditSection" open>
            <summary>정보 수정</summary>
            <div class="bed-input-body">
              <div class="form-section">
                <div class="treatment-grid monitor-treatment-grid" id="bedTreatmentGrid"></div>
              </div>

              <div class="form-section">
                <div class="patient-info-grid monitor-patient-grid">
                  <div class="bed-edit-hidden-fields">
                    <input class="name-input" id="bedPatientName" type="text" placeholder="성함을 입력하세요" maxlength="10" autocomplete="off">
                    <input class="name-input" id="bedChartNo" type="text" placeholder="차트번호" maxlength="20" autocomplete="off">
                    <input class="name-input" id="bedAgeInput" type="number" placeholder="나이" min="0" max="130" autocomplete="off">
                    <div class="form-segment-row">
                      <div class="segmented">
                        <label class="segment-item"><input type="radio" name="bedVisitType" value="초진" checked><span>초진</span></label>
                        <label class="segment-item"><input type="radio" name="bedVisitType" value="재진"><span>재진</span></label>
                      </div>
                      <div class="segmented">
                        <label class="segment-item"><input type="radio" name="bedGender" value="남" checked><span>남</span></label>
                        <label class="segment-item"><input type="radio" name="bedGender" value="여"><span>여</span></label>
                      </div>
                    </div>
                  </div>
                  <div class="bed-edit-visible-grid">
                    <input class="name-input bed-chief-field" id="bedChiefComplaint" type="text" placeholder="메모1" maxlength="60" autocomplete="off">
                    <div class="bed-memo-wrap" id="bedMemoWrap">
                      <button class="bed-memo-toggle" id="bedMemoToggle" type="button" onclick="toggleBedMemoInput()">메모2</button>
                      <input class="name-input bed-memo-field" id="bedMemoInput" type="text" placeholder="메모2" maxlength="300" autocomplete="off">
                      <div class="memo2-history-list" id="bedMemo2HistoryList"></div>
                    </div>
                    <button class="submit-btn bed-submit-btn" id="bedSubmitBtn" onclick="saveBedPatientInfo()">확인</button>
                  </div>
                </div>
              </div>

              <div class="form-section">
                <div class="staff-select-grid monitor-staff-grid">
                  <select class="staff-select" id="bedDoctorSelect"></select>
                  <select class="staff-select" id="bedNurseSelect"></select>
                </div>
              </div>
            </div>
          </details>
          <div class="body-map-card" id="bodyMap"></div>
        </div>
        <div class="bed-detail" id="bedDetail"></div>
      </div>
    </div>
  </div>

  <button class="bed-arrival-overlay" id="bedArrivalOverlay" type="button" onclick="openFixedBedArrival()">
    <span class="bed-arrival-name" id="bedArrivalName"></span>
  </button>

  <!-- 설정 패널 -->
  <div class="settings-panel" id="settingsPanel">
    <div class="staff-manager-grid">
      <div class="settings-column">
        <div class="card">
          <div class="card-label">치료 프리셋</div>
          <div class="preset-builder">
            <div class="preset-treatment-grid" id="presetTreatmentGrid"></div>
            <div class="treat-chips-wrap" id="presetTreatmentGridChips"></div>
            <button class="submit-btn" onclick="saveTreatmentPreset()">프리셋 저장</button>
            <div class="preset-list" id="treatmentPresetList"></div>
          </div>
        </div>
        <div class="card">
          <div class="card-label">치료시간 설정</div>
          <div class="treatment-time-list" id="treatmentMinutesList"></div>
          <button class="submit-btn" onclick="saveTreatmentMinutes()">저장</button>
        </div>
      </div>
      <div class="settings-column">
        <div class="card">
          <div class="card-label">원장 관리</div>
          <div class="staff-add-row">
            <input class="name-input" id="doctorNameInput" type="text" placeholder="원장 이름 입력" maxlength="20">
            <button class="timer-set-btn" onclick="addStaff('doctors')">추가</button>
          </div>
          <div class="staff-list" id="doctorList"></div>
        </div>
        <div class="card">
          <div class="card-label">베드 자동배정</div>
          <label class="rr-setting" style="margin-top:0">
            <span class="rr-setting-text">대기환자 빈 베드 자동배정</span>
            <span class="rr-switch">
              <input id="autoBedAssignEnabled" type="checkbox" onchange="saveAutoBedAssignEnabled(this.checked)">
              <span class="rr-slider"></span>
            </span>
          </label>
        </div>
        <div class="card">
          <div class="card-label">간호사 관리</div>
          <label class="rr-setting" style="margin-top:0;margin-bottom:10px">
            <span class="rr-setting-text">간호사 자동배정</span>
            <span class="rr-switch">
              <input id="nurseAutoAssignEnabled" type="checkbox" onchange="saveNurseAutoAssignEnabled(this.checked)">
              <span class="rr-slider"></span>
            </span>
          </label>
          <div class="staff-add-row">
            <input class="name-input" id="nurseNameInput" type="text" placeholder="간호사 이름 입력" maxlength="20">
            <button class="timer-set-btn" onclick="addStaff('nurses')">추가</button>
          </div>
          <div class="staff-list" id="nurseList"></div>
        </div>
        <div class="card">
          <div class="card-label">환자 차트 DB</div>
          <div class="rr-setting" style="margin-top:0">
            <span class="rr-setting-text" id="chartDbCountText">로딩 중...</span>
          </div>
          <button class="export-btn" onclick="document.getElementById('chartImportInput').click()" style="margin-top:10px">
            엑셀 추가
          </button>
          <input id="chartImportInput" type="file" accept=".xls,.xlsx,.csv" style="display:none"
            onchange="importChartFile(this.files?.[0]); this.value='';">
          <div id="chartImportStatus" style="font-size:12px;color:var(--text3);margin-top:8px;min-height:18px;line-height:1.5"></div>
        </div>
        <div class="card settings-link-card">
          <div class="card-label">관리 페이지</div>
          <div class="settings-link-row">
            <a class="export-btn settings-link-btn" href="db-viewer.html" target="_blank" rel="noopener">DB 열기</a>
            <a class="export-btn settings-link-btn" href="stats.html" target="_blank" rel="noopener">통계 열기</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 알림 팝업 오버레이 -->
<div class="notif-overlay" id="notifOverlay" onclick="closePopup()">
  <div class="notif-popup" onclick="event.stopPropagation()">
    <div class="popup-icon">🔔</div>
    <div class="popup-name" id="popupName"></div>
    <div class="popup-label" id="popupLabel">진료 준비</div>
    <div class="popup-treats" id="popupTreats"></div>
    <button class="popup-close" onclick="closePopup()">확인</button>
  </div>
</div>

<!-- 타이머 완료 알림 -->
<div class="notif-overlay" id="timerAlertOverlay" onclick="closeTimerAlert()">
  <div class="notif-popup timer-alert-popup" onclick="event.stopPropagation()">
    <div class="popup-icon">⏰</div>
    <div class="timer-alert-body" id="timerAlertBody"></div>
    <button class="popup-close" onclick="closeTimerAlert()">확인</button>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script type="module">
  const PATIENTS_PATH  = 'patients';
  const BEDS_PATH      = 'beds';
  const CALL_ALERTS_PATH = 'callAlerts';
  const APPOINTMENT_DESK_ALERTS_PATH = 'appointmentDeskAlerts';
  const BED_ASSIGNMENT_ALERTS_PATH = 'bedAssignmentAlerts';
  const DISCHARGED_PATIENTS_PATH_PREFIX = 'dischargedPatients';
  let bedScreenWakeLock = null;
  const SERVER_MODE = location.protocol === 'http:' || location.protocol === 'https:';

  // The local server is the only backend; beds + all state sync live over SSE.
  const BEDS_LOCAL_PRIMARY = SERVER_MODE;
  let bedsSSE = null;
  let bedsLocalLive = false;          // true while the SSE stream is connected
  let latestLocalBedsVersion = 0;     // last version seen from the local server
  let xlsxModulePromise = null;

  async function loadXlsx() {
    if (!xlsxModulePromise) {
      xlsxModulePromise = import("./vendor/xlsx/0.18.5/xlsx.mjs");
    }
    return xlsxModulePromise;
  }

  function updateConnectionStatusLabel() {
    const el = document.getElementById('connectionStatusText');
    if (!el) return;
    el.innerHTML = `<span class="status-dot"></span>${bedsLocalLive ? 'Online' : 'Offline'}`;
  }

  const debugCounters = {};
  const debugCounterTicks = {};
  const DEBUG_COUNTER_STORAGE_KEY = 'inhouse:debugCountersVisible';
  let debugCounterPanelTimer = 0;
  const debugCounterParams = new URLSearchParams(location.search);
  const debugCounterParam = debugCounterParams.get('debug');
  function readStoredDebugCountersVisible() {
    try {
      return localStorage.getItem(DEBUG_COUNTER_STORAGE_KEY) === '1';
    } catch {
      return false;
    }
  }
  function writeStoredDebugCountersVisible(visible) {
    try {
      if (visible) localStorage.setItem(DEBUG_COUNTER_STORAGE_KEY, '1');
      else localStorage.removeItem(DEBUG_COUNTER_STORAGE_KEY);
    } catch {}
  }
  if (debugCounterParam === '1') writeStoredDebugCountersVisible(true);
  if (debugCounterParam === '0') writeStoredDebugCountersVisible(false);
  let debugCountersVisible = debugCounterParam === '1' || (debugCounterParam !== '0' && readStoredDebugCountersVisible());

  function getDebugCounterPage() {
    const view = (new URLSearchParams(location.search).get('view') || '').toLowerCase();
    const activePanel = document.querySelector('.panel.active')?.id || '';
    return view || window.currentMode || activePanel || 'default';
  }

  function countDebugCounter(group, name, detail = '') {
    if (!debugCountersVisible) return;
    const key = `${group}:${name}`;
    const now = Date.now();
    if (!debugCounters[key]) {
      debugCounters[key] = { group, name, detail, count: 0, page: getDebugCounterPage(), lastAt: 0 };
      debugCounterTicks[key] = [];
    }
    const item = debugCounters[key];
    item.count += 1;
    item.detail = detail || item.detail;
    item.page = getDebugCounterPage();
    item.lastAt = now;
    const ticks = debugCounterTicks[key];
    ticks.push(now);
    while (ticks.length && now - ticks[0] > 5000) ticks.shift();
    scheduleDebugCounterPanelRender();
  }

  function scheduleDebugCounterPanelRender() {
    if (debugCounterPanelTimer || !debugCountersVisible) return;
    debugCounterPanelTimer = setTimeout(renderDebugCounterPanel, 500);
  }

  function renderDebugCounterPanel() {
    debugCounterPanelTimer = 0;
    if (!debugCountersVisible) return;
    let panel = document.getElementById('debugCounterPanel');
    if (!panel) {
      panel = document.createElement('div');
      panel.id = 'debugCounterPanel';
      panel.style.cssText = 'position:fixed;right:10px;bottom:10px;z-index:99999;width:320px;max-height:45vh;overflow:auto;background:rgba(15,23,42,.94);color:#e5e7eb;border:1px solid rgba(148,163,184,.35);border-radius:8px;box-shadow:0 12px 34px rgba(0,0,0,.35);font:12px/1.35 ui-monospace,SFMono-Regular,Consolas,monospace;padding:10px;';
      document.body.appendChild(panel);
    }
    const now = Date.now();
    const rows = Object.values(debugCounters)
      .sort((a, b) => (debugCounterTicks[b.group + ':' + b.name]?.length || 0) - (debugCounterTicks[a.group + ':' + a.name]?.length || 0) || b.count - a.count)
      .slice(0, 28)
      .map(item => {
        const key = `${item.group}:${item.name}`;
        const recent = (debugCounterTicks[key] || []).filter(ts => now - ts <= 5000).length;
        const ago = item.lastAt ? Math.round((now - item.lastAt) / 1000) : '-';
        return `<tr><td>${escapeHtml(item.group)}</td><td>${escapeHtml(item.name)}</td><td style="text-align:right">${item.count}</td><td style="text-align:right">${recent}/5s</td><td style="text-align:right">${ago}s</td></tr>`;
      }).join('');
    panel.innerHTML = `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <strong style="font-size:12px">SSE/render counter</strong>
        <span style="margin-left:auto;color:#93c5fd">${escapeHtml(getDebugCounterPage())}</span>
        <button onclick="window.resetDebugCounters()" style="font:inherit;background:#334155;color:#e5e7eb;border:0;border-radius:4px;padding:2px 6px">reset</button>
        <button onclick="window.hideDebugCounters()" style="font:inherit;background:#334155;color:#e5e7eb;border:0;border-radius:4px;padding:2px 6px">hide</button>
      </div>
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="color:#cbd5e1"><th style="text-align:left">type</th><th style="text-align:left">name</th><th style="text-align:right">total</th><th style="text-align:right">rate</th><th style="text-align:right">ago</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="5" style="color:#94a3b8">waiting...</td></tr>'}</tbody>
      </table>`;
  }

  window.resetDebugCounters = () => {
    Object.keys(debugCounters).forEach(key => delete debugCounters[key]);
    Object.keys(debugCounterTicks).forEach(key => delete debugCounterTicks[key]);
    renderDebugCounterPanel();
  };
  window.hideDebugCounters = () => {
    debugCountersVisible = false;
    writeStoredDebugCountersVisible(false);
    document.getElementById('debugCounterPanel')?.remove();
  };
  window.showDebugCounters = () => {
    debugCountersVisible = true;
    writeStoredDebugCountersVisible(true);
    renderDebugCounterPanel();
  };

  let lastLocalBedsSignature = '';
  function isRegularFixedBedScreen() {
    const bedNo = getFixedBedNoFromUrl();
    return isFixedBedScreen() && bedNo >= 1 && bedNo <= 15 && bedNo !== 7;
  }

  function isFixedDoctorAlertOnlyScreen() {
    if (!isFixedDoctorBedScreen()) return false;
    const fixedDoctorBedNo = Number(getFixedDoctorBedNoFromUrl?.() || 0);
    return Boolean(fixedDoctorBedNo && !getBedData(fixedDoctorBedNo));
  }

  function shouldRefreshSelectedBedNextStaffTask(changedBedNo, previousBed = null, nextBed = null) {
    if (Number(changedBedNo) === Number(selectedBedNo)) return false;
    const selectedBed = getBedData(selectedBedNo);
    if (!selectedBed) return false;
    const currentTreatment = selectedBed.treatments?.[selectedBed.currentIndex || 0] || '';
    if (!isDoctorProcedureTreatment(currentTreatment)) return false;
    const doctorId = selectedBed.doctorId || '';
    if (!doctorId) return false;
    return [previousBed, nextBed].some(candidate => candidate && candidate.doctorId === doctorId);
  }

  function applyBedsFromLocal(beds, version) {
    const signature = JSON.stringify({ version, beds: beds || {} });
    if (signature === lastLocalBedsSignature) return;
    lastLocalBedsSignature = signature;
    if (typeof version === 'number') latestLocalBedsVersion = version;
    bedsLocalLive = true;
    updateConnectionStatusLabel();
    const isRegularFixed = isRegularFixedBedScreen();
    applyBedsState(beds || {}, {
      allowMigration: !isFixedBedScreen(),
      allowAutoAssign: !isFixedBedScreen(),
      fromLocalFallback: false
    });
  }

  function getCurrentBedsMapFromLocalState() {
    const beds = {};
    bedAssignments.forEach((bed, index) => {
      if (bed) beds[String(index + 1)] = bed;
    });
    Object.entries(doctorBedMap).forEach(([bedNo, bed]) => {
      if (bed) beds[String(bedNo)] = bed;
    });
    Object.entries(holdBedMap).forEach(([bedNo, bed]) => {
      if (bed) beds[String(bedNo)] = bed;
    });
    return beds;
  }

  function setLocalBedState(bedNo, bed) {
    const numericBedNo = Number(bedNo);
    if (HOLD_BED_NUMBERS.includes(numericBedNo)) {
      if (bed) holdBedMap[numericBedNo] = bed;
      else delete holdBedMap[numericBedNo];
      return;
    }
    if (numericBedNo >= 101) {
      if (bed) doctorBedMap[numericBedNo] = bed;
      else delete doctorBedMap[numericBedNo];
      return;
    }
    if (numericBedNo >= 1 && numericBedNo <= BED_COUNT) {
      bedAssignments[numericBedNo - 1] = bed || null;
    }
  }

  async function applyBedDeltaFromLocal(bedNo, bed, version, op = 'update') {
    if (typeof version === 'number' && version < latestLocalBedsVersion) return;
    if (typeof version === 'number') latestLocalBedsVersion = version;
    bedsLocalLive = true;
    updateConnectionStatusLabel();

    const numericBedNo = Number(bedNo);
    if (isRegularFixedBedScreen() && numericBedNo !== getFixedBedNoFromUrl()) return;
    const previousChangedBed = getBedData(numericBedNo);
    setLocalBedState(numericBedNo, op === 'remove' ? null : (bed || null));
    const selectedBedNextTaskChanged = shouldRefreshSelectedBedNextStaffTask(
      numericBedNo,
      previousChangedBed,
      op === 'remove' ? null : (bed || null)
    );

    const beds = getCurrentBedsMapFromLocalState();
    const autoAssignBedSignature = getAutoAssignBedSignatureFromBeds(beds);
    const autoAssignRelevantChange = !lastAutoAssignBedSignature || autoAssignBedSignature !== lastAutoAssignBedSignature;
    lastAutoAssignBedSignature = autoAssignBedSignature;

    if (!isRegularFixedBedScreen()) pruneStaleBedAssignmentAlerts();
    if (selectedMoveBedNo && (DISABLED_BED_NUMBERS.has(selectedMoveBedNo) || !getBedData(selectedMoveBedNo))) selectedMoveBedNo = null;
    syncAssignedPatientKeys(hasLoadedBedsOnce);
    syncTimerAlertsWithBeds();
    handleRemoteTimerAlerts(false);
    syncDoctorProcedureAlerts();
    if (!isFixedBedScreen() && autoAssignRelevantChange) await assignWaitingPatientsToBeds();
    if (!isFixedBedScreen()) processHoldBedReleases();

    const fixedDoctorAlertOnly = isFixedDoctorAlertOnlyScreen();
    requestAppRender({
      bedSelector: !fixedDoctorAlertOnly,
      bedDetail: numericBedNo === selectedBedNo || selectedBedNextTaskChanged,
      doctorAlertPanel: fixedDoctorAlertOnly && numericBedNo !== selectedBedNo,
      receiveBedDetail: !fixedDoctorAlertOnly && numericBedNo === selectedReceiveBedNo,
      bedMonitors: !fixedDoctorAlertOnly,
      upcomingAlerts: !fixedDoctorAlertOnly,
      count: !fixedDoctorAlertOnly,
      fixedBedArrival: !fixedDoctorAlertOnly
    });
    ensureBedTicker();
  }

  function startBedsSSE() {
    if (!BEDS_LOCAL_PRIMARY || bedsSSE) return;
    try {
      const role = isFixedDoctorBedScreen() ? 'doctor-room' : (isFixedBedScreen() ? 'fixed-bed' : 'full');
      const params = new URLSearchParams({ role });
      const fixedBedNo = getFixedBedNoFromUrl();
      if (fixedBedNo) params.set('bed', String(fixedBedNo));
      const fixedDoctorBedNo = getFixedDoctorBedNoFromUrl();
      if (fixedDoctorBedNo) params.set('room', String(fixedDoctorBedNo - 100));
      bedsSSE = new EventSource(`/api/events?${params.toString()}`);
      bedsSSE.addEventListener('beds', (event) => {
        countDebugCounter('sse', 'beds');
        try {
          const data = JSON.parse(event.data);
          applyBedsFromLocal(data.beds, data.version);
        } catch (error) {
          console.warn('beds SSE 파싱 실패', error);
        }
      });
      bedsSSE.addEventListener('bed-update', (event) => {
        countDebugCounter('sse', 'bed-update');
        try {
          const data = JSON.parse(event.data);
          applyBedDeltaFromLocal(data.bedNo, data.bed, data.version, 'update');
        } catch (error) {
          console.warn('bed-update SSE parse failed', error);
        }
      });
      bedsSSE.addEventListener('bed-remove', (event) => {
        countDebugCounter('sse', 'bed-remove');
        try {
          const data = JSON.parse(event.data);
          applyBedDeltaFromLocal(data.bedNo, null, data.version, 'remove');
        } catch (error) {
          console.warn('bed-remove SSE parse failed', error);
        }
      });
      bedsSSE.addEventListener('state', (event) => {
        try {
          const data = JSON.parse(event.data);
          countDebugCounter('sse', `state:${data.key || ''}`);
          const handler = localStateSubscribers.get(data.key);
          localStateSnapshots.set(data.key, clonePlain(data.value || {}));
          if (handler) handler(data.value);
        } catch (error) {
          console.warn('state SSE 파싱 실패', error);
        }
      });
      bedsSSE.addEventListener('state-child', (event) => {
        try {
          const data = JSON.parse(event.data);
          countDebugCounter('sse', `state-child:${data.key || ''}`, `${data.op || ''}:${data.childKey || ''}`);
          const key = data.key;
          const handler = localStateSubscribers.get(key);
          if (!handler) return;
          const previous = localStateSnapshots.get(key) || {};
          const hadChild = Object.prototype.hasOwnProperty.call(previous, data.childKey);
          const next = { ...previous };
          if (data.op === 'delete') delete next[data.childKey];
          else next[data.childKey] = data.value;
          localStateSnapshots.set(key, clonePlain(next));
          if (key === PATIENTS_PATH) {
            if (data.op === 'delete') applyPatientRemoved(data.childKey);
            else if (hadChild) applyPatientChanged(data.childKey, data.value);
            else applyPatientAdded(data.childKey, data.value);
            prevPatientsSnapshot = clonePlain(next);
            return;
          }
          handler(next);
        } catch (error) {
          console.warn('state child SSE parse failed', error);
        }
      });
      bedsSSE.onopen = () => {
        countDebugCounter('sse', 'open');
        bedsLocalLive = true;
        updateConnectionStatusLabel();
        // Re-pull every subscribed state key on (re)connect so we don't miss
        // changes that happened while disconnected.
        localStateSubscribers.forEach((handler, key) => {
          localStateGet(key).then(value => {
            localStateSnapshots.set(key, clonePlain(value || {}));
            handler(value);
          }).catch(() => {});
        });
      };
      // EventSource auto-reconnects on its own after a drop.
      bedsSSE.onerror = () => { countDebugCounter('sse', 'error'); bedsLocalLive = false; updateConnectionStatusLabel(); };
    } catch (error) {
      console.warn('beds SSE 시작 실패', error);
    }
  }

  function closeBedsSSE() {
    if (!bedsSSE) return;
    try {
      bedsSSE.close();
    } catch (error) {
      console.warn('beds SSE close failed', error);
    }
    bedsSSE = null;
    bedsLocalLive = false;
    updateConnectionStatusLabel();
  }

  window.addEventListener('pagehide', closeBedsSSE);
  window.addEventListener('beforeunload', closeBedsSSE);

  // --- Local-server realtime nodes (staff, settings, alerts, patients) -------
  // Collection state keys are read via /api/state (+ SSE "state" events for live
  // cross-device updates) and written via atomic child ops on the server, so
  // concurrent edits to different children don't clobber each other.
  const localStateSubscribers = new Map(); // key -> handler(value)
  const localStateSnapshots = new Map();   // key -> latest full local snapshot

  function shouldSubscribeLocalNode(key) {
    if (!isFixedBedScreen()) return true;
    if (isFixedDoctorBedScreen()) {
      return key === 'settings/treatmentMinutes'
        || key === 'settings/doctorAlertManualOrder'
        || key === 'staff/doctors'
        || key === 'staff/nurses';
    }
    return key === 'settings/treatmentMinutes'
      || key === 'settings/treatmentPresets'
      || key === 'settings/doctorAlertManualOrder'
      || key === getDischargedPatientsPath()
      || key === 'staff/doctors'
      || key === 'staff/nurses'
      || key === BED_ASSIGNMENT_ALERTS_PATH;
  }

  async function subscribeLocalNode(key, applyFn) {
    if (!shouldSubscribeLocalNode(key)) return;
    localStateSubscribers.set(key, applyFn);
    try {
      const value = await localStateGet(key);
      localStateSnapshots.set(key, clonePlain(value || {}));
      applyFn(value);
    } catch (error) {
      console.warn('로컬 노드 초기 로드 실패', key, error);
    }
  }

  async function setLocalNode(key, value) {
    await localStatePut(key, value);
  }

  async function localStateChild(op, body) {
    countDebugCounter('write', `state-child:${op}:${body?.key || ''}`, body?.childKey || '');
    const res = await fetch(`/api/state-child/${op}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json; charset=utf-8' },
      body: JSON.stringify(body || {})
    });
    if (!res.ok) throw new Error(`로컬 child ${op} 실패 (${res.status})`);
    return res.json();
  }

  async function pushLocalNode(collectionKey, value) {
    const { childKey } = await localStateChild('push', { key: collectionKey, value });
    return childKey;
  }

  async function updateLocalNodeChild(collectionKey, childKey, patch) {
    await localStateChild('merge', { key: collectionKey, childKey, patch });
  }

  async function removeLocalNodeChild(collectionKey, childKey) {
    await localStateChild('delete', { key: collectionKey, childKey });
  }

  // Subscribe a node to the local server (live via SSE "state" events).
  function migrateNode(key, applyFn) {
    subscribeLocalNode(key, applyFn);
  }

  // Alert queues (callAlerts, bedAssignmentAlerts) — collections; push adds a
  // child, remove drops one.
  const pushCallAlert = (data) => pushLocalNode(CALL_ALERTS_PATH, data);
  const removeCallAlert = (key) => removeLocalNodeChild(CALL_ALERTS_PATH, key);
  const saveAppointmentDeskAlert = (key, data) => updateLocalNodeChild(APPOINTMENT_DESK_ALERTS_PATH, key, data);
  const removeAppointmentDeskAlert = (key) => removeLocalNodeChild(APPOINTMENT_DESK_ALERTS_PATH, key);
  const clearAppointmentDeskAlerts = (value = {}) => setLocalNode(APPOINTMENT_DESK_ALERTS_PATH, value);
  const pushBedAssignmentAlert = (data) => pushLocalNode(BED_ASSIGNMENT_ALERTS_PATH, data);
  const removeBedAssignmentAlert = (key) => removeLocalNodeChild(BED_ASSIGNMENT_ALERTS_PATH, key);
  const clearBedAssignmentAlerts = () => setLocalNode(BED_ASSIGNMENT_ALERTS_PATH, {});

  const longTermChartSaveTimers = new Map();
  const longTermChartPendingSyncs = new Map();

  function shouldSyncLongTermChartPatch(patch = {}) {
    return Object.prototype.hasOwnProperty.call(patch, 'packages')
      || Object.prototype.hasOwnProperty.call(patch, 'spineSettings')
      || Object.prototype.hasOwnProperty.call(patch, 'memo1')
      || Object.prototype.hasOwnProperty.call(patch, 'memo2')
      || Object.prototype.hasOwnProperty.call(patch, 'memo2History')
      || Object.prototype.hasOwnProperty.call(patch, 'chiefComplaint');
  }

  function hasMemoLongTermChartPatch(patch = {}) {
    return Object.prototype.hasOwnProperty.call(patch, 'memo1')
      || Object.prototype.hasOwnProperty.call(patch, 'memo2')
      || Object.prototype.hasOwnProperty.call(patch, 'memo2History')
      || Object.prototype.hasOwnProperty.call(patch, 'chiefComplaint');
  }

  function getBedSnapshotByPatientKey(patientKey) {
    if (!patientKey) return null;
    try {
      return getAllBedEntries()
        .map(entry => entry.bed)
        .find(bed => String(bed?.patientKey || '') === String(patientKey)) || null;
    } catch {
      return null;
    }
  }

  function buildLongTermChartSyncPayload(patientKey, patch = {}) {
    const patient = patientsByKey.get(patientKey) || {};
    const bed = getBedSnapshotByPatientKey(patientKey) || {};
    const source = { ...patient, ...bed, ...patch };
    const chartNo = normalizeChartNo(source.chartNo || '');
    if (!chartNo) return null;

    const payload = {
      patientId: source.patientId || '',
      chartNo,
      name: source.name || '',
      age: source.age || '',
      gender: source.gender || '',
      visitType: source.visitType || '',
      chiefComplaint: source.chiefComplaint || source.memo1 || '',
      memo1: source.memo1 || source.chiefComplaint || '',
      memo2: source.memo2 || '',
      memo2History: normalizeMemo2History(source)
    };

    if (Object.prototype.hasOwnProperty.call(patch, 'spineSettings')) {
      payload.spineSettings = source.spineSettings || {};
    }

    if (Object.prototype.hasOwnProperty.call(patch, 'packages')) {
      const packages = getPackageStateFromPatient(source);
      payload.packages = packages;
      Object.assign(payload, getPCreditsFromPackages(packages));
      payload.credit = null;
    }

    return payload;
  }

  function scheduleLongTermChartPatientSync(patientKey, patch = {}) {
    if (!patientKey || !shouldSyncLongTermChartPatch(patch)) return;
    const timerKey = String(patientKey);
    longTermChartPendingSyncs.set(timerKey, { type: 'patient', patientKey, patch: { ...patch } });
    clearTimeout(longTermChartSaveTimers.get(timerKey));
    if (hasMemoLongTermChartPatch(patch)) {
      flushLongTermChartSync(timerKey);
      return;
    }
    longTermChartSaveTimers.set(timerKey, setTimeout(() => {
      flushLongTermChartSync(timerKey);
    }, 700));
  }

  function buildLongTermChartGridSyncPayload(gridId, patch = {}) {
    const scope = getScopeFromGridId(gridId);
    if (!scope) return null;
    const selected = selectedChartPatientByScope[scope] || {};
    const form = typeof getFormValues === 'function' ? getFormValues(scope) : null;
    const chartNo = normalizeChartNo(form?.chartNo || selected.chartNo || '');
    const name = String(form?.name || selected.name || '').trim();
    if (!chartNo || !name) return null;

    const payload = {
      patientId: selected.patientId || '',
      chartNo,
      name,
      age: form?.age || selected.age || '',
      gender: form?.gender || selected.gender || '',
      visitType: form?.visitType || selected.visitType || '',
      chiefComplaint: form?.memo1 || selected.memo1 || selected.chiefComplaint || '',
      memo1: form?.memo1 || selected.memo1 || selected.chiefComplaint || '',
      memo2: form?.memo2 || selected.memo2 || '',
      memo2History: form ? withMemo2ForDate(selected, form.memo2 || '', getMemo2HistoryDate(selected)).memo2History : normalizeMemo2History(selected)
    };

    if (Object.prototype.hasOwnProperty.call(patch, 'spineSettings')) {
      payload.spineSettings = patch.spineSettings || {};
    }

    if (Object.prototype.hasOwnProperty.call(patch, 'packages')) {
      const packages = normalizePackageState(patch.packages || {});
      payload.packages = packages;
      Object.assign(payload, getPCreditsFromPackages(packages));
      payload.credit = null;
    }

    return payload;
  }

  function scheduleLongTermChartGridSync(gridId, patch = {}) {
    if (!gridId || !shouldSyncLongTermChartPatch(patch)) return;
    const timerKey = `grid:${gridId}`;
    longTermChartPendingSyncs.set(timerKey, { type: 'grid', gridId, patch: { ...patch } });
    clearTimeout(longTermChartSaveTimers.get(timerKey));
    longTermChartSaveTimers.set(timerKey, setTimeout(() => {
      flushLongTermChartSync(timerKey);
    }, 700));
  }

  async function runBedRecordTransaction(bedNo, mutator) {
    const key = String(bedNo);
    for (let attempt = 0; attempt < 6; attempt++) {
      const cur = await fetch('/api/beds', { cache: 'no-store' }).then(r => r.json());
      const beds = cur.beds || {};
      const current = beds[key] !== undefined ? beds[key] : null;
      const next = mutator(clonePlain(current));
      if (next === undefined) return { committed: false, snapshot: { val: () => current } };
      const nextBeds = clonePlain(beds) || {};
      if (next === null) delete nextBeds[key]; else nextBeds[key] = next;
      const res = await localBedsRequest('/api/beds/cas', { expectedVersion: cur.version, beds: nextBeds });
      if (res.ok) return { committed: true, snapshot: { val: () => next } };
      // 409 conflict → another device wrote first; retry with fresh state.
    }
    throw new Error('beds 트랜잭션 재시도 초과');
  }

  async function runBedsRecordTransaction(mutator) {

      const cur = await fetch('/api/beds', { cache: 'no-store' }).then(r => r.json());
      const next = mutator(clonePlain(cur.beds || {}));

  const SPINE_CERVICAL_LEVELS = ['C1-3', 'C2-4', 'C3-5', 'C4-6', 'C5-7', 'C6-T1'];
  const SPINE_LUMBAR_LEVELS = ['L5-S1', 'L4-S1', 'L3-5', 'L2-5', 'L1-4', 'T12-L3'];
  const SPINE_ROTATION_OPTIONS = [0, 2, 4, 6, 8];

  function clampSpineForce(value, min, max) {
    const num = Number(value);
    if (!Number.isFinite(num)) return null;
    return Math.round(Math.max(min, Math.min(max, num)) * 2) / 2;
  }

  function normalizeSpineSettings(value) {
    const v = value && typeof value === 'object' ? value : {};
    const legacyCondition = SPINE_CONDITION_OPTIONS.some(o => o.key === v.condition) ? v.condition : '';
    const legacyRotation = (v.rotation === '' || v.rotation == null) ? null : (SPINE_ROTATION_OPTIONS.includes(Number(v.rotation)) ? Number(v.rotation) : null);
    const validCondition = (condition) => SPINE_CONDITION_OPTIONS.some(o => o.key === condition) ? condition : '';
    const validRotation = (rotation) => (rotation === '' || rotation == null) ? null : (SPINE_ROTATION_OPTIONS.includes(Number(rotation)) ? Number(rotation) : null);
    return {
      cervicalLevels: Array.isArray(v.cervicalLevels) ? v.cervicalLevels.filter(x => SPINE_CERVICAL_LEVELS.includes(x)) : [],
      lumbarLevels: Array.isArray(v.lumbarLevels) ? v.lumbarLevels.filter(x => SPINE_LUMBAR_LEVELS.includes(x)) : [],
      cervicalForce: (v.cervicalForce === '' || v.cervicalForce == null) ? null : clampSpineForce(v.cervicalForce, 0.5, 16),
      lumbarForce: (v.lumbarForce === '' || v.lumbarForce == null) ? null : clampSpineForce(v.lumbarForce, 0.5, 50),
      cervicalCondition: validCondition(v.cervicalCondition) || legacyCondition,
      lumbarCondition: validCondition(v.lumbarCondition) || legacyCondition,
      cervicalRotation: validRotation(v.cervicalRotation) ?? legacyRotation,
      lumbarRotation: validRotation(v.lumbarRotation) ?? legacyRotation,
      updatedAt: Number(v.updatedAt || 0) || null
    };
  }

  function formatSpineUpdatedAgo(updatedAt) {
    const ts = Number(updatedAt || 0);
    if (!ts) return '수정 기록 없음';
    const updated = new Date(ts);
    if (Number.isNaN(updated.getTime())) return '수정 기록 없음';
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    updated.setHours(0, 0, 0, 0);
    const days = Math.max(0, Math.floor((today - updated) / 86400000));
    if (days === 0) return '오늘 수정';
    return `${days}일 전 수정`;
  }

  function applyPostTreatmentPackageBalances(packages = {}, bed = {}, usageDate = '') {
    const next = normalizePackageState(packages);
    const balances = getPCreditsFromPackages(next);
    const treatments = Array.isArray(bed?.treatments) ? bed.treatments : [];
    if (!treatments.length) return next;
    const date = usageDate || toLocalDateInputValue();

    const normalizedTreatments = treatments.map(treatment => String(treatment || '').replace(/\s+/g, ''));
    const treatmentIds = getTreatmentIdsFromNames(treatments);
    const hasChuna = normalizedTreatments.some(name => name.includes('추나') || name === '단추' || name === '복추');
    const unitMapById = {
      pharmacopuncture_1: hasChuna ? 0.5 : 1,
      pharmacopuncture_2: hasChuna ? 1 : 2,
      pharmacopuncture_3: hasChuna ? 1 : 2,
      pharmacopuncture_4: hasChuna ? 2 : 4
    };
    const deduction = treatmentIds.reduce((sum, id) => sum + (unitMapById[id] || 0), 0);
    const hasPackageRecord = (key) => {
      const pkg = next?.[key] || {};
      return Number(pkg.openingQty || 0) > 0
        || normalizePackageEntries(pkg.purchases, 'purchase').length > 0
        || normalizePackageEntries(pkg.usages, 'usage').length > 0
        || Number(balances[key] || 0) > 0;
    };
    const addUsage = (key, qty) => {
      if (!next[key]) return;
      const currentBalance = Number(balances[key] || 0);
      const usageQty = Math.max(0, Math.min(currentBalance, Number(qty) || 0));
      if (!usageQty) return;
      const usages = normalizePackageEntries(next[key].usages, 'usage');
      usages.push({
        id: `bed-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
        date,
        qty: usageQty
      });
      next[key] = { ...next[key], usages };
      balances[key] = Math.max(0, currentBalance - usageQty);
    };

    // 약침은 p13·p6 잔여량을 합쳐서 쓰므로, 차감도 두 키에 걸쳐(있는 잔여부터) 분배한다
    const pharmaMergeKeys = (PCREDIT_FIELDS.find(field => Array.isArray(field.mergeKeys)) || {}).mergeKeys || ['p13', 'p6'];
    let pharmaRemaining = deduction;
    [...pharmaMergeKeys].reverse().forEach(key => {
      if (pharmaRemaining <= 0) return;
      const take = Math.min(Number(balances[key] || 0), pharmaRemaining);
      if (take > 0) {
        addUsage(key, take);
        pharmaRemaining -= take;
      }
    });

    [
      { key: 'p자하거', treatment: '약침자' },
      { key: 'p라인', treatment: '약침l' }
    ].forEach(({ key, treatment }) => {
      const treatmentId = treatment.toLowerCase().includes('l') ? 'pharmacopuncture_L' : 'pharmacopuncture_ja';
      const treatmentCount = countTreatmentId(treatmentIds, treatmentId);
      if (treatmentCount && hasPackageRecord(key)) addUsage(key, treatmentCount);
    });

    return normalizePackageState(next);
  }

    countDebugCounter('render-call', 'packagePopup');

    const packages = getPackageStateForGrid(activeCreditGridId);
    const today = toLocalDateInputValue();

    const balances = getPCreditsFromPackages(packages);
    const popupTreatments = (treatmentSelections[activeCreditGridId] || []).map(item => item.name);
    const postTreatmentMessage = getPostTreatmentPackageBalanceMessage({ treatments: popupTreatments }, packages, balances);
    const entriesByDate = new Map();
    const addToDate = (entry, field, type) => {
      const list = entriesByDate.get(entry.date) || [];
      list.push({ ...entry, key: field.key, label: field.label, type });
      entriesByDate.set(entry.date, list);
    };
    PCREDIT_FIELDS.forEach(field => {
      const pkg = packages[field.key] || { openingQty: 0, purchases: [], usages: [], balance: 0 };
      normalizePackageEntries(pkg.purchases, 'purchase').forEach(entry => addToDate(entry, field, entry.kind === 'bonus' ? 'bonus' : 'purchase'));
      normalizePackageEntries(pkg.usages, 'usage').forEach(entry => addToDate(entry, field, 'usage'));
    });

    const [year, month] = activePackageMonth.split('-').map(Number);
    const firstDate = new Date(year, month - 1, 1);
    const daysInMonth = new Date(year, month, 0).getDate();
    const leading = firstDate.getDay();
    const dayCells = [];
    for (let i = 0; i < leading; i++) dayCells.push('<button class="package-calendar-day empty" type="button" tabindex="-1"></button>');
    for (let day = 1; day <= daysInMonth; day++) {
      const date = `${activePackageMonth}-${String(day).padStart(2, '0')}`;
      const entries = entriesByDate.get(date) || [];
      const badges = PCREDIT_FIELDS.flatMap(field => {
        const fieldEntries = entries.filter(entry => entry.key === field.key);
        const purchaseQty = fieldEntries.filter(entry => entry.type === 'purchase').reduce((sum, entry) => sum + Number(entry.qty || 0), 0);
        const bonusQty = fieldEntries.filter(entry => entry.type === 'bonus').reduce((sum, entry) => sum + Number(entry.qty || 0), 0);
        const usageQty = fieldEntries.filter(entry => entry.type === 'usage').reduce((sum, entry) => sum + Number(entry.qty || 0), 0);

          purchaseQty ? `<div class="package-calendar-badge purchase">${escapeHtml(field.label)} 결제 ${purchaseQty}</div>` : '',
          bonusQty ? `<div class="package-calendar-badge bonus">${escapeHtml(field.label)} 보너스 ${bonusQty}</div>` : '',
          usageQty ? `<div class="package-calendar-badge usage">${escapeHtml(field.label)} 사용 ${usageQty}</div>` : ''
        ];
      }).filter(Boolean).join('');
      dayCells.push(`
        <button class="package-calendar-day${date === activePackageDate ? ' selected' : ''}" type="button" onclick="selectPackageDate('${date}')">
          <div class="package-calendar-date">${day}</div>
          ${badges ? `<div class="package-calendar-badges">${badges}</div>` : ''}

    }

    const selectedEntries = (entriesByDate.get(activePackageDate) || [])
      .sort((a, b) => (a.key === b.key ? (a.type === b.type ? 0 : a.type === 'usage' ? 1 : -1) : a.key.localeCompare(b.key)));
    const detailRows = selectedEntries.length

        <div class="package-history-row">

          <span>${escapeHtml(entry.qty)}개</span>

      : `<div class="package-history-row"><span>-</span><span>기록 없음</span><span></span></div>`;

          </div>

      : `<input class="package-input" id="pkg-selected-purchase-qty" type="text" inputmode="decimal" maxlength="5" value="${escapeHtml(activeField.defaultPurchaseQty)}" aria-label="결제 수량" ${activeField.fixedPurchaseQty ? 'readonly' : ''}>`;

    form.innerHTML = `
      <div class="package-balance-strip">
        ${PCREDIT_DISPLAY_FIELDS.map(field => `
            <div class="package-balance-tile">
              <div class="package-balance-name">${escapeHtml(field.label)}</div>
              <div class="package-balance-value">${escapeHtml(getFieldBalance(field, packages))}</div>
            </div>`).join('')}
      </div>
      ${postTreatmentMessage ? `<div class="package-after-treatment">${escapeHtml(postTreatmentMessage)}</div>` : ''}
      <div class="package-card">
        <div class="package-entry-grid">
          <div class="package-radio-group package-entry-full" id="pkg-selected-key" role="radiogroup" aria-label="패키지 종류">

          <input class="package-input" id="pkg-selected-bonus-qty" type="text" inputmode="decimal" maxlength="5" value="1" aria-label="보너스 수량">

  function getPackageQtyInputValue(id, allowDecimal = false) {
    const raw = String(document.getElementById(id)?.value || '');
    if (allowDecimal) {
      // 보너스만 소수 허용(예: 2.5). 소수점 한 개만 남기고 0~999로 클램프, 소수 둘째 자리 반올림.
      const cleaned = raw.replace(/[^0-9.]/g, '').replace(/(\..*)\./g, '$1');
      const num = Math.round((Number(cleaned) || 0) * 100) / 100;
      return Math.max(0, Math.min(999, num));
    }
    return Math.max(1, Math.min(999, Number(raw.replace(/[^0-9]/g, '')) || 1));
  }

  async function persistPackageState(gridId) {
    const packages = getPackageStateForGrid(gridId);
    const payload = { packages, ...getPCreditsFromPackages(packages), credit: null };
    const patientKey = getPatientKeyForCreditGrid(gridId);
    if (patientKey) {
      await updatePatient(patientKey,payload);
      const nextPatient = {
        ...(patientsByKey.get(patientKey) || {}),
        ...payload
      };
      delete nextPatient.credit;
      patientsByKey.set(patientKey, nextPatient);
      renderBedMonitors();
    } else {
      scheduleLongTermChartGridSync(gridId, payload);
    }
    updateCreditChip(gridId);
  }

  window.addPackageEntry = async function(key, type) {
    const gridId = activeCreditGridId;
    if (!gridId) return;
    const packages = getPackageStateForGrid(gridId);
    const pkg = packages[key] || { openingQty: 0, purchases: [], usages: [] };
    const isIncrease = type === 'purchase' || type === 'bonus';
    const dateId = `pkg-${key}-${isIncrease ? 'purchase' : 'usage'}-date`;
    const qtyId = `pkg-${key}-${type}-qty`;
    const dateEl = document.getElementById(dateId);
    const date = (dateEl && !dateEl.hidden ? dateEl.value : '')
      || document.getElementById(`pkg-${key}-purchase-date`)?.value
      || document.getElementById('pkg-selected-date')?.value
      || toLocalDateInputValue();
    const selectedQtyId = type === 'purchase' ? 'pkg-selected-purchase-qty' : (type === 'bonus' ? 'pkg-selected-bonus-qty' : 'pkg-selected-usage-qty');
    // 결제·보너스·사용 모두 소수 허용 (예: 2.5)
    const qty = document.getElementById(qtyId) ? getPackageQtyInputValue(qtyId, true) : getPackageQtyInputValue(selectedQtyId, true);
    const entry = { id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`, date, qty };
    if (isIncrease) pkg.purchases = [...normalizePackageEntries(pkg.purchases, 'purchase'), { ...entry, kind: type === 'bonus' ? 'bonus' : 'purchase' }];
    else pkg.usages = [...normalizePackageEntries(pkg.usages, 'usage'), entry];
    packages[key] = pkg;
    activePackageKey = key;
    activePackageDate = date;
    activePackageMonth = date.slice(0, 7);
    setPackageStateForGrid(gridId, packages);
    await persistPackageState(gridId);
    renderPackagePopup();
    showToast(type === 'purchase' ? '결제 기록 추가' : (type === 'bonus' ? '보너스 기록 추가' : '사용 기록 추가'));
  };

  window.removePackageEntry = async function(key, type, id) {
    const gridId = activeCreditGridId;
    if (!gridId) return;
    const packages = getPackageStateForGrid(gridId);
    const pkg = packages[key] || { openingQty: 0, purchases: [], usages: [] };
    const isIncrease = type === 'purchase' || type === 'bonus';
    const field = isIncrease ? 'purchases' : 'usages';
    pkg[field] = normalizePackageEntries(pkg[field], isIncrease ? 'purchase' : 'usage').filter(entry => entry.id !== id);
    packages[key] = pkg;
    setPackageStateForGrid(gridId, packages);
    await persistPackageState(gridId);
    renderPackagePopup();
    showToast('패키지 기록 삭제');
  };

  window.closeCreditPopup = function() {
    flushLongTermChartGridSync(activeCreditGridId);
    document.getElementById('creditOverlay')?.classList.remove('show');
    activeCreditGridId = '';
  };

  window.saveCreditPopup = async function() {
    closeCreditPopup();
  };

  function renderTreatmentPresetSelect(select) {
    const options = treatmentPresets.length
      ? treatmentPresets.map(p => `<option value="${escapeHtml(p.key)}">${escapeHtml(p.name)}</option>`).join('')
      : '<option value="" disabled>저장된 프리셋 없음</option>';
    select.innerHTML = `<option value="">프리셋</option>${options}`;
    select.value = '';
  }

  function renderAllTreatmentPresetSelects() {
    document.querySelectorAll('.treatment-preset-select').forEach(select => renderTreatmentPresetSelect(select));
  }

  window.applyTreatmentPreset = (gridId, presetKey) => {
    if (!presetKey) return;
    const preset = treatmentPresets.find(p => p.key === presetKey);
    const select = document.querySelector(`.treatment-preset-select[data-grid-id="${gridId}"]`);
    if (select) select.value = '';
    if (!preset) return;
    setTreatmentSelection(gridId, preset.treatments || []);
    const scope = getScopeFromGridId?.(gridId);
    if (scope) scheduleSelectFieldSave(scope, 0);

  function treatBtnClick(gridId, treatment) {
    if (!treatmentSelections[gridId]) treatmentSelections[gridId] = [];
    const sel = treatmentSelections[gridId];
    const idx = sel.findIndex(s => s.id === treatment.id);
    if (isRepeatableTreatment(treatment)) {
      sel.push(createTreatmentSelectionItem(treatment));
    } else if (idx >= 0) {
      sel.splice(idx, 1);
    } else {
      sel.push(createTreatmentSelectionItem(treatment));
    }
    renderTreatmentChips(gridId);
    syncTreatBtnStates(gridId);
    const scope = getScopeFromGridId?.(gridId);
    if (scope) scheduleSelectFieldSave(scope, 0);
  }

  function removeChip(gridId, chipIndex) {
    if (!treatmentSelections[gridId]) return;
    const index = Number(chipIndex);
    if (Number.isInteger(index)) {
      treatmentSelections[gridId].splice(index, 1);
    } else {
      treatmentSelections[gridId] = treatmentSelections[gridId].filter(s => s.id !== chipIndex);
    }
    renderTreatmentChips(gridId);
    syncTreatBtnStates(gridId);
    const scope = getScopeFromGridId?.(gridId);
    if (scope) scheduleSelectFieldSave(scope, 0);
  }

  let selectedTreatmentChip = null;

  function treatmentSelectionChipAttrs(gridId, index) {
    return `draggable="true"
        onclick="handleTreatmentChipClick(event,'${gridId}',${index})"
        ondragstart="chipDragStart(event,'${gridId}',${index})"
        ondragover="chipDragOver(event,'${gridId}',${index})"
        ondragleave="chipDragLeave(event)"
        ondrop="chipDrop(event,'${gridId}',${index})"
        ondragend="chipDragEndSel(event)"`;
  }

  function saveTreatmentSelectionChange(gridId) {
    renderTreatmentChips(gridId);
    syncTreatBtnStates(gridId);
    const scope = getScopeFromGridId?.(gridId);
    if (scope) scheduleSelectFieldSave(scope, 0);
  }

  // 클릭-클릭 재정렬: 첫 번째 클릭한 칩을 두 번째 클릭한 칩의 "앞"으로 옮긴다(자리 교환 아님).
  window.handleTreatmentChipClick = (event, gridId, index) => {
    event.preventDefault();
    event.stopPropagation();
    const sel = treatmentSelections[gridId] || [];
    if (!sel[index]) {
      selectedTreatmentChip = null;
      renderTreatmentChips(gridId);
      return;
    }

    if (!selectedTreatmentChip || selectedTreatmentChip.gridId !== gridId) {
      selectedTreatmentChip = { gridId, index };
      renderTreatmentChips(gridId);
      return;
    }

    const fromIndex = selectedTreatmentChip.index;
    selectedTreatmentChip = null;
    if (fromIndex === index) {
      // 같은 칩을 또 클릭 — 삭제
      removeChip(gridId, index);
      return;
    }
    if (sel[fromIndex] && sel[index]) {
      const [moved] = sel.splice(fromIndex, 1);
      const insertAt = fromIndex < index ? index - 1 : index;
      sel.splice(insertAt, 0, moved);
    }
    treatmentSelections[gridId] = sel;
    saveTreatmentSelectionChange(gridId);
  };

  function renderTreatmentChips(gridId) {
    countDebugCounter('render-call', `treatmentChips:${gridId || ''}`);
    const chipsWrap = document.getElementById(getTreatmentChipsId(gridId));
    if (!chipsWrap) return;
    const sel = treatmentSelections[gridId] || [];
    if (selectedTreatmentChip?.gridId === gridId && !sel[selectedTreatmentChip.index]) selectedTreatmentChip = null;
    const html = sel.map((s, i) => {
      const selectedClass = selectedTreatmentChip?.gridId === gridId && selectedTreatmentChip.index === i ? 'selected' : '';
      const className = ['treat-chip', getTreatmentBadgeClass(s.name), selectedClass].filter(Boolean).join(' ');
      return `
      <span class="${className}" data-grid="${gridId}" data-index="${i}" ${treatmentSelectionChipAttrs(gridId, i)}>${escapeHtml(s.name)}</span>`;
    }).join('');
    if (lastTreatmentChipsHtml.get(gridId) === html && chipsWrap.innerHTML === html) return;
    chipsWrap.innerHTML = html;
    lastTreatmentChipsHtml.set(gridId, html);
  }

  let _chipDragFromIndex = null;
  let _chipDragGridId = null;

  window.chipDragStart = (event, gridId, index) => {
    event.stopPropagation();
    _chipDragFromIndex = index;
    _chipDragGridId = gridId;
    event.dataTransfer.effectAllowed = 'move';
    event.dataTransfer.setData('text/plain', `select-treat:${gridId}:${index}`);
    event.currentTarget.style.opacity = '0.4';
  };
  window.chipDragOver = (event, gridId, index) => {
    event.stopPropagation();
    if (_chipDragGridId !== gridId || _chipDragFromIndex === null || _chipDragFromIndex === index) return;
    event.preventDefault();
    event.dataTransfer.dropEffect = 'move';
    event.currentTarget.classList.add('treat-drag-over');
  };
  window.chipDragLeave = (event) => {
    event.stopPropagation();
    event.currentTarget.classList.remove('treat-drag-over');
  };
  window.chipDrop = (event, gridId, toIndex) => {
    event.stopPropagation();
    event.preventDefault();
    event.currentTarget.classList.remove('treat-drag-over');
    if (_chipDragGridId !== gridId || _chipDragFromIndex === null || _chipDragFromIndex === toIndex) return;
    const sel = treatmentSelections[gridId] || [];
    const [moved] = sel.splice(_chipDragFromIndex, 1);
    sel.splice(toIndex, 0, moved);
    treatmentSelections[gridId] = sel;
    renderTreatmentChips(gridId);
    syncTreatBtnStates(gridId);
    const scope = getScopeFromGridId?.(gridId);
    if (scope) scheduleSelectFieldSave(scope, 0);
    _chipDragFromIndex = null;
    _chipDragGridId = null;
  };
  window.chipDragEndSel = (event) => {
    event.stopPropagation();
    event.currentTarget.style.opacity = '';
    document.querySelectorAll('.treat-drag-over').forEach(el => el.classList.remove('treat-drag-over'));
  };

  document.addEventListener('dragover', (event) => {
    if (_chipDragGridId === null || _chipDragFromIndex === null) return;
    if (event.target?.closest?.('.treat-chips-wrap, .treat-chip')) return;
    event.preventDefault();
    event.dataTransfer.dropEffect = 'move';
  });

  document.addEventListener('drop', (event) => {
    if (_chipDragGridId === null || _chipDragFromIndex === null) return;
    if (event.target?.closest?.('.treat-chips-wrap, .treat-chip')) return;
    event.preventDefault();
    event.stopPropagation();
    const gridId = _chipDragGridId;
    const fromIndex = _chipDragFromIndex;
    const sel = treatmentSelections[gridId] || [];
    if (sel[fromIndex]) {
      sel.splice(fromIndex, 1);
      treatmentSelections[gridId] = sel;
      renderTreatmentChips(gridId);
      syncTreatBtnStates(gridId);
      const scope = getScopeFromGridId?.(gridId);
      if (scope) scheduleSelectFieldSave(scope, 0);
    }
    _chipDragFromIndex = null;
    _chipDragGridId = null;
    document.querySelectorAll('.treat-drag-over').forEach(el => el.classList.remove('treat-drag-over'));
  });

  function syncTreatBtnStates(gridId) {
    const grid = document.getElementById(gridId);
    if (!grid) return;
    const sel = new Set((treatmentSelections[gridId] || []).map(s => s.id));
    grid.querySelectorAll('.treat-btn').forEach(btn => {
      btn.classList.toggle('active', sel.has(btn.dataset.id));
    });
  }

  window.removeChip = removeChip;

  function renderTreatmentPresetSettings() {
    const grid = document.getElementById('presetTreatmentGrid');
    const list = document.getElementById('treatmentPresetList');
    if (grid) {
      grid.innerHTML = '';
      if (!treatmentSelections.presetTreatmentGrid) treatmentSelections.presetTreatmentGrid = [];
      TREATMENTS.forEach(t => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = ['treat-btn', getTreatmentBadgeClass(t.name)].filter(Boolean).join(' ');
        btn.dataset.id = t.id;
        btn.dataset.name = t.name;
        btn.innerHTML = `<span class="treat-name">${escapeHtml(t.name)}</span>`;
        btn.onclick = () => treatBtnClick('presetTreatmentGrid', t);
        grid.appendChild(btn);
      });
      renderTreatmentChips('presetTreatmentGrid');
      syncTreatBtnStates('presetTreatmentGrid');
    }
    if (list) {
      list.innerHTML = treatmentPresets.length
        ? treatmentPresets.map(p => `
          <div class="preset-item">
            <div>
              <div class="preset-name">${escapeHtml(p.name)}</div>
              <div class="preset-treats">${(p.treatments || []).map(escapeHtml).join(' · ')}</div>
            </div>
            <button class="staff-delete-btn" onclick="deleteTreatmentPreset('${escapeHtml(p.key)}')">삭제</button>
          </div>
        `).join('')
        : '<div class="empty-state"><div class="empty-icon">＋</div><div class="empty-text">저장된 프리셋이 없습니다</div></div>';
    }
  }

  window.saveTreatmentPreset = async () => {
    const treatments = (treatmentSelections.presetTreatmentGrid || []).map(s => s.name);
    if (!treatments.length) { showToast('치료를 1개 이상 선택해주세요'); return; }
    const name = treatments.join(',');
    try {
      const record = { name, treatments, timestamp: Date.now() };
      await pushLocalNode('settings/treatmentPresets', record);
      treatmentSelections.presetTreatmentGrid = [];
      renderTreatmentChips('presetTreatmentGrid');
      syncTreatBtnStates('presetTreatmentGrid');
      showToast('프리셋 저장 완료');
    } catch (e) {
      console.error(e);
      showToast('프리셋 저장 실패');
    }
  };

  window.deleteTreatmentPreset = async (key) => {
    if (!key) return;
    if (!confirm('프리셋을 삭제하시겠습니까?')) return;
    try {
      await removeLocalNodeChild('settings/treatmentPresets', key);
      showToast('프리셋 삭제 완료');
    } catch (e) {
      console.error(e);
      showToast('프리셋 삭제 실패');
    }
  };

  function renderTreatmentMinutesSettings() {
    const list = document.getElementById('treatmentMinutesList');
    if (!list) return;

    const procValue = Math.max(0, Math.min(120, Number(procedureMinutes) || 0));
    const procRow = `
      <label class="treatment-time-row treatment-time-row--procedure">
        <span class="treatment-time-name">처치</span>
        <div class="treatment-time-row-inner">
          <input class="treatment-time-input" id="procedureMinutesInput" type="number" min="0" max="120" step="1" value="${procValue}" aria-label="처치시간">
          <span class="treatment-time-unit">분</span>

        <label class="treatment-time-row">
          <span class="treatment-time-name"><span class="treatment-time-badge ${badgeClass}">${escapeHtml(t.name)}</span></span>
          <div class="treatment-time-row-inner">
            <input class="treatment-time-input" data-treatment-name="${escapeHtml(t.name)}" type="number" min="1" max="120" step="1" value="${value}" aria-label="${escapeHtml(t.name)} 치료시간">

  renderTreatmentGrid('treatmentGrid');
  renderTreatmentGrid('receiveTreatmentGrid');
  renderTreatmentGrid('bedTreatmentGrid');
  renderTreatmentMinutesSettings();
  renderTreatmentPresetSettings();

  // toggleCheck는 버튼+칩 방식으로 교체됨 (레거시 호환용 유지)
  window.toggleCheck = () => {};

  function getStaffLabel(type) {
    return type === 'doctors' ? '원장' : '간호사';
  }

  function getStaffInputId(type) {
    return type === 'doctors' ? 'doctorNameInput' : 'nurseNameInput';
  }
