<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경희홍익 진료보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #052a61;
    --surface: #073b83;
    --surface2: #0a4a99;
    --surface3: #0d5eb8;
    --border: #1d65ad;
    --accent: #39a9f5;
    --accent2: #1687d9;
    --accent-dim: rgba(57,169,245,0.15);
    --text: #f7fbff;
    --text2: #c8ddf4;
    --text3: #7fa8cc;
    --danger: #ff6b6b;
    --gold: #ffb21a;
    --radius: 14px;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 배경 패턴 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle at 20% 20%, rgba(57,169,245,0.10) 0%, transparent 50%),
                      radial-gradient(circle at 80% 80%, rgba(255,178,26,0.07) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 1360px; margin: 0 auto; padding: 20px 16px 60px; }
  body.app-role-bed .app {
    max-width: min(1500px, calc(100vw - 16px));
    padding: 10px 8px 24px;
  }

  /* 헤더 */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: #083f88;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
  }
  body.app-role-bed .header {
    padding: 10px 14px;
    margin-bottom: 10px;
    border-radius: 12px;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }
  .brand-icon {
    width: 44px;
    height: 44px;
    object-fit: contain;
    flex-shrink: 0;
  }
  body.app-role-bed .brand-icon {
    width: 38px;
    height: 38px;
  }
  .brand-copy { min-width: 0; }
  .header-left-desk-controls {
    display: none;
    align-items: center;
    gap: 6px;
    margin-left: 8px;
  }
  body.app-mode-input .header-left-desk-controls,
  body.app-role-desk .header-left-desk-controls {
    display: flex;
  }
  .header-left h1 {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 24px;
    line-height: 1;
    font-weight: 900;
    color: #fff;
    letter-spacing: 0;
  }
  body.app-role-bed .header-left h1 { font-size: 21px; }
  .brand-highlight { color: var(--gold); }
  .bed-header-bed-chip {
    display: none;
    margin-left: 8px;
    padding: 3px 9px;
    border-radius: 999px;
    background: rgba(255,255,255,0.14);
    border: 1px solid rgba(255,255,255,0.35);
    color: var(--gold);
    font-size: 16px;
    font-weight: 900;
    vertical-align: middle;
    white-space: nowrap;
  }
  body.app-mode-bed .bed-header-bed-chip,
  body.app-role-bed .bed-header-bed-chip {
    display: inline-flex;
    align-items: center;
  }
  body.app-mode-bed .bed-header-bed-chip,
  body.app-role-bed .bed-header-bed-chip {
    min-height: 38px;
    padding: 0 13px 2px;
    font-size: 26px;
    line-height: 1;
  }
  .header-left p { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .mode-toggle {
    display: flex;
    background: rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-desk-controls {
    display: none;
    align-items: center;
    gap: 6px;
  }
  body.app-mode-input .header-desk-controls,
  body.app-role-doctor .header-desk-controls,
  body.app-role-desk .header-desk-controls {
    display: flex;
  }
  .header-notify-controls {
    display: none;
    align-items: center;
    gap: 6px;
  }
  body.app-mode-notify .header-notify-controls,
  body.app-mode-doctor .header-notify-controls,
  body.app-mode-receive .header-notify-controls {
    display: flex;
  }
  .doctor-alert-select-wrap {
    display: none;
    position: relative;
    align-items: center;
    min-width: 190px;
    max-width: 240px;
    height: 32px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .doctor-alert-select-label {
    min-width: 0;
    flex: 1;
    padding: 0 30px 0 10px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 900;
    line-height: 32px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    pointer-events: none;
  }
  .doctor-alert-select-wrap::after {
    content: '▾';
    position: absolute;
    right: 10px;
    top: 50%;
    color: var(--text2);
    font-size: 12px;
    transform: translateY(-50%);
    pointer-events: none;
  }
  .doctor-alert-select {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .doctor-alert-select option {
    background: var(--surface2);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
  }
  body.app-mode-doctor .doctor-alert-select-wrap {
    display: flex;
  }
  .header-bed-controls {
    display: none;
    align-items: center;
    gap: 6px;
  }
  body.app-mode-bed .header-bed-controls,
  body.app-role-bed .header-bed-controls {
    display: flex;
  }
  .header-wait-chip {
    background: rgba(255,178,26,0.16);
    border: 1px solid rgba(255,178,26,0.55);
    border-radius: 999px;
    color: var(--gold);
    font-size: 12px;
    font-weight: 900;
    padding: 7px 10px;
    white-space: nowrap;
  }
  .random-test-btn {
    background: rgba(57,169,245,0.16);
    border: 1px solid rgba(57,169,245,0.5);
    border-radius: 999px;
    color: var(--accent);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 900;
    padding: 7px 10px;
    cursor: pointer;
    white-space: nowrap;
  }
  .random-test-btn.danger {
    background: rgba(220,53,69,0.14);
    border-color: rgba(220,53,69,0.5);
    color: #ff6b7a;
  }
  .random-test-btn.danger:hover {
    background: rgba(220,53,69,0.26);
    border-color: #ff6b7a;
  }
  .random-test-btn:hover {
    background: rgba(57,169,245,0.26);
    border-color: var(--accent);
  }
  .mode-btn {
    padding: 6px 12px;
    border: none;
    border-radius: 6px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: var(--text2);
  }
  .mode-btn.active { background: var(--accent); color: #053063; font-weight: 900; }
  body.app-role-locked .mode-toggle { display: none; }
  body.app-role-bed.app-fixed-bed #bedSelector { display: none; }

  /* ─── 입력 패널 ─── */
  .input-panel { display: none; }
  .input-panel.active { display: block; }
  .input-layout { display: grid; gap: 12px; }
  .input-panel:not(.input-form-open) .input-form-column { display: none; }
  .input-panel:not(.input-form-open) .input-layout { grid-template-columns: 1fr; }
  .input-panel.input-form-open .input-detail-column { display: none; }
  .receive-panel.receive-form-open .receive-detail-column > .card { display: none; }
  .receive-panel:not(.receive-form-open) .receive-form-column { display: none; }
  body.app-mode-doctor .receive-panel.receive-form-open:not(.receive-edit-open) .receive-form-column,
  body.app-mode-receive .receive-panel.receive-form-open:not(.receive-edit-open) .receive-form-column,
  body.app-role-doctor .receive-panel.receive-form-open:not(.receive-edit-open) .receive-form-column,
  body.app-role-clinic .receive-panel.receive-form-open:not(.receive-edit-open) .receive-form-column { display: none !important; }
  body.app-mode-doctor .receive-panel.receive-form-open:not(.receive-edit-open) .receive-detail-column > .card,
  body.app-mode-receive .receive-panel.receive-form-open:not(.receive-edit-open) .receive-detail-column > .card,
  body.app-role-doctor .receive-panel.receive-form-open:not(.receive-edit-open) .receive-detail-column > .card,
  body.app-role-clinic .receive-panel.receive-form-open:not(.receive-edit-open) .receive-detail-column > .card { display: block; }
  .input-form-column,
  .input-monitor-column,
  .input-detail-column,
  .receive-form-column { min-width: 0; }
  .input-monitor-column,
  .receive-main-column {
    display: grid;
    gap: 12px;
    align-content: start;
  }
  .input-panel.input-form-open .input-form-column > .card,
  .receive-panel.receive-form-open .receive-form-column > .card {
    display: grid;
    grid-template-columns: minmax(0, 2fr) minmax(0, 3fr);
    gap: 12px;
    align-items: start;
  }
  .input-panel.input-form-open #deskBodyPartSection,
  .receive-panel.receive-form-open #receiveBodyPartSection {
    grid-column: 2;
    grid-row: 1 / span 4;
    align-self: center;
    margin-top: 0;
  }
  .input-panel.input-form-open #deskBodyPartForm,
  .receive-panel.receive-form-open #receiveBodyPartForm {
    height: auto;
    min-height: 420px;
  }
  .input-drawer-toggle {
    display: none;
    position: fixed;
    left: 0;
    top: 50%;
    z-index: 40;
    width: 34px;
    height: 72px;
    background: var(--accent);
    border: 1px solid var(--accent);
    border-left: none;
    border-radius: 0 12px 12px 0;
    color: #053063;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 26px;
    font-weight: 900;
    line-height: 1;
    transform: translateY(-50%);
    box-shadow: 0 10px 24px rgba(0,0,0,0.32);
  }
  .input-panel.active > #inputFormToggle { display: block; }
  .receive-panel.active .receive-drawer-toggle { display: block; }
  body.app-mode-notify .receive-drawer-toggle { display: none !important; }
  body.app-mode-doctor .receive-drawer-toggle,
  body.app-mode-receive .receive-drawer-toggle,
  body.app-role-doctor .receive-drawer-toggle,
  body.app-role-clinic .receive-drawer-toggle { display: none !important; }
  body.app-mode-doctor .receive-panel.receive-edit-open .receive-drawer-toggle,
  body.app-mode-receive .receive-panel.receive-edit-open .receive-drawer-toggle,
  body.app-role-doctor .receive-panel.receive-edit-open .receive-drawer-toggle,
  body.app-role-clinic .receive-panel.receive-edit-open .receive-drawer-toggle { display: block !important; }
  .input-panel.input-form-open .input-drawer-toggle {
    background: var(--gold);
    border-color: var(--gold);
  }
  .receive-panel.receive-form-open .receive-drawer-toggle {
    background: var(--gold);
    border-color: var(--gold);
  }
  .bed-panel.active .bed-drawer-toggle { display: none; }
  .bed-panel.bed-edit-open .bed-drawer-toggle {
    background: var(--gold);
    border-color: var(--gold);
  }
  .bed-schedule-toggle { display: none !important; }
  .bed-schedule-panel {
    background: rgba(5, 42, 97, 0.22);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-top: 10px;
    padding: 12px;
  }
  body.app-mode-bed .bed-schedule-panel,
  body.app-role-bed .bed-schedule-panel {
    margin-top: 0;
  }
  .bed-schedule-panel .card-label { margin-bottom: 8px; }
  .bed-schedule-calendar {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 8px;
  }
  .bed-schedule-day {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 900;
    min-height: 48px;
    padding: 8px 6px;
    text-align: center;
    min-width: 0;
  }
  .bed-schedule-day:hover,
  .bed-schedule-day.today {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(57,169,245,0.14);
  }
  .bed-schedule-day.selected {
    border-color: rgba(255,178,26,0.7);
    color: var(--gold);
    background: rgba(255,178,26,0.12);
  }
  .bed-schedule-custom-input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    display: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 900;
    margin-top: 8px;
    padding: 10px;
    outline: none;
  }
  .bed-schedule-custom-input.show { display: block; }
  .bed-schedule-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 10px;
  }
  .bed-schedule-confirm,
  .bed-schedule-cancel {
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 900;
    min-height: 42px;
    padding: 9px 10px;
  }
  .bed-schedule-confirm {
    background: var(--accent);
    border: 1px solid var(--accent);
    color: #053063;
  }
  .bed-schedule-confirm:disabled {
    cursor: not-allowed;
    opacity: 0.45;
  }
  .bed-schedule-cancel {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
  }
  .bed-schedule-hint {
    color: var(--text3);
    font-size: 12px;
    font-weight: 700;
    margin-top: 8px;
  }
  .input-drawer-toggle:hover { filter: brightness(1.08); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 12px;
  }
  .card-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text3);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .form-section { margin-top: 16px; }
  .form-section:first-child { margin-top: 0; }
  .waiting-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .waiting-list--compact {
    flex-direction: row;
    flex-wrap: wrap;
    gap: 6px;
  }
  .waiting-item {
    display: grid;
    grid-template-columns: auto minmax(0, 1fr) auto;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    cursor: grab;
  }
  .waiting-list--compact .waiting-item {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 3px;
    padding: 7px 10px;
    min-width: 90px;
    max-width: 140px;
    flex: 1 1 100px;
  }
  .waiting-list--compact .waiting-rank {
    width: 18px;
    height: 18px;
    font-size: 10px;
    position: absolute;
    top: 5px; right: 6px;
  }
  .waiting-list--compact .waiting-item { position: relative; }
  .waiting-list--compact .waiting-name {
    font-size: 13px;
    padding-right: 22px;
  }
  .waiting-list--compact .waiting-info {
    margin-top: 2px;
    gap: 3px;
  }
  .waiting-item.waiting-dragging {
    opacity: 0.55;
    cursor: grabbing;
  }
  .waiting-rank {
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: var(--accent-dim);
    color: var(--accent);
    font-size: 12px;
    font-weight: 900;
  }
  .waiting-name {
    font-size: 15px;
    font-weight: 900;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .waiting-treats {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 4px;
  }
  .waiting-info,
  .waiting-staff {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 4px;
  }
  .waiting-tag {
    background: var(--surface3);
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: 20px;
    padding: 2px 7px;
    font-size: 10px;
    font-weight: 700;
  }
  .waiting-item .bed-meta-chip {
    font-size: 10px;
    padding: 2px 6px;
  }
  .waiting-time {
    color: var(--text3);
    font-size: 11px;
    white-space: nowrap;
  }
  .upcoming-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .upcoming-item {
    display: grid;
    grid-template-columns: 72px minmax(0, 1fr);
    gap: 10px;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
  }
  .upcoming-item.assignment {
    cursor: pointer;
    border-color: rgba(57,169,245,0.42);
    background: rgba(57,169,245,0.12);
  }
  .upcoming-item.assignment:hover {
    border-color: var(--accent);
  }
  .upcoming-time {
    color: var(--gold);
    font-size: 14px;
    font-weight: 900;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .upcoming-main {
    min-width: 0;
    color: var(--text);
    font-size: 14px;
    font-weight: 900;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .upcoming-sub {
    color: var(--text3);
    font-size: 11px;
    font-weight: 700;
    margin-top: 2px;
  }
  .upcoming-staff {
    color: var(--text2);
    font-size: 13px;
    font-weight: 900;
    margin-top: 4px;
  }

  .name-input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    outline: none;
    transition: border 0.2s;
  }
  .name-input:focus { border-color: var(--accent2); }
  .name-input::placeholder { color: var(--text3); font-weight: 400; font-size: 15px; }
  .name-input.identity-chip-field {
    background: rgba(57,169,245,0.14);
    border-color: rgba(57,169,245,0.55);
    border-radius: 999px;
    color: var(--accent);
    cursor: default;
    text-align: center;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
  }
  .name-input.identity-chip-field:focus {
    border-color: rgba(57,169,245,0.55);
  }
  #ageInput::-webkit-outer-spin-button,
  #ageInput::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  #ageInput {
    appearance: textfield;
    -moz-appearance: textfield;
  }

  .staff-select-grid {
    display: grid;
    gap: 10px;
  }
  .monitor-staff-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
  .staff-select {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 800;
    color: var(--text);
    outline: none;
  }
  .staff-select:focus { border-color: var(--accent2); }
  .patient-info-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }
  .monitor-patient-grid {
    grid-template-columns: 3fr 3fr 2fr;
  }
  .monitor-patient-grid > .name-input {
    text-align: center;
  }
  .bed-edit-hidden-fields {
    display: none;
  }
  .bed-edit-visible-grid {
    display: grid;
    grid-column: 1 / -1;
    grid-template-columns: minmax(0, 1fr) 74px;
    grid-template-rows: minmax(44px, auto) auto;
    gap: 10px;
    align-items: stretch;
  }
  .bed-edit-visible-grid .bed-chief-field {
    grid-column: 1;
    grid-row: 1;
  }
  .bed-memo-wrap {
    grid-column: 1;
    grid-row: 2;
    display: grid;
    gap: 8px;
  }
  .bed-memo-toggle {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text2);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 900;
    min-height: 44px;
    padding: 10px 12px;
  }
  .bed-memo-toggle.has-memo {
    color: var(--gold);
    border-color: rgba(255,178,26,0.55);
    background: rgba(255,178,26,0.12);
  }

  .rr-setting {

    background: rgba(255,107,107,0.10);

  /* ─── 수신 / 베드 패널 ─── */

  .receive-panel.active,
  .bed-panel.active,

  .receive-header {
    display: flex;

    justify-content: space-between;
    margin-bottom: 14px;
  }
  .receive-title { font-size: 14px; font-weight: 700; color: var(--text2); }
  .today-count {

  .notification-list { display: flex; flex-direction: column; gap: 10px; }

  /* 베드 모니터 */
  .bed-monitor {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    margin-bottom: 12px;
  }
  .receive-layout {
    display: grid;
    gap: 12px;
  }

  .receive-detail-column { min-width: 0; }
  .receive-detail-column { order: 1; }
  .receive-main-column { order: 2; }
  #inputBedMonitor { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  #receiveBedMonitor { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .bed-status {
    background: linear-gradient(180deg, var(--surface2), var(--surface));
    border: 1px solid rgba(125, 177, 224, 0.45);
    border-radius: 10px;
    padding: 10px;
    min-height: 118px;
    position: relative;
    cursor: pointer;
    box-shadow: 0 3px 0 rgba(0,0,0,0.28), 0 8px 18px rgba(0,0,0,0.16);
    transition: transform 0.12s ease, border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
  }
  .bed-status:hover,
  .bed-status:focus {
    transform: translateY(-1px);
    border-color: var(--accent);
    box-shadow: 0 4px 0 rgba(0,0,0,0.30), 0 12px 24px rgba(0,0,0,0.22);
    outline: none;

  @keyframes bedAlertPulse {

    50% { box-shadow: 0 0 0 4px rgba(255,107,107,0.9); background: rgba(255,107,107,0.22); }

  .bed-status-top {

    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 6px;
  }
  .bed-status-no {

  .bed-status-time {

    overflow: hidden;
    text-overflow: ellipsis;

  .bed-status-info {

  .bed-meta-chip--fixed {

  }
  .bed-meta-chip--flex {

    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .bed-status-treatment {

    align-items: center;

    margin-top: 4px;

    font-weight: 900;

  }

  .bed-stage-badge {
    display: inline-flex;

  .bed-stage-badge.running { background: rgba(57,169,245,0.18); border: 1px solid rgba(57,169,245,0.65); color: var(--accent); }
  .bed-stage-badge.paused { background: rgba(200,221,244,0.12); border: 1px solid rgba(200,221,244,0.32); color: var(--text2); }
  .bed-stage-badge.complete { background: rgba(255,178,26,0.18); border: 1px solid rgba(255,178,26,0.65); color: var(--gold); }
  .bed-stage-badge.empty { background: rgba(127,168,204,0.12); border: 1px solid rgba(127,168,204,0.28); color: var(--text3); }
  .bed-popover {

    body.app-role-bed .bed-left-column {
      grid-template-areas:
        "body"
        "edit";
    }
    .bed-detail-card--bed {
      grid-template-areas:
        "info"
        "timer"
        "schedule";
    }
  }

  @media (max-height: 820px) and (orientation: landscape) {
    body.app-role-bed .app { padding: 8px 8px 16px; }
    body.app-role-bed .header { padding: 8px 12px; margin-bottom: 8px; }
    body.app-role-bed .brand-icon { width: 34px; height: 34px; }
    body.app-role-bed .bed-header-bed-chip {
      min-height: 34px;
      padding: 0 11px 2px;
      font-size: 23px;
    }
    body.app-role-bed .header-left h1 { font-size: 19px; }
    body.app-role-bed .header-left p { display: none; }
    body.app-role-bed .receive-title { font-size: 13px; }
    body.app-role-bed .bed-name { font-size: 22px; }
    body.app-role-bed .bed-name-meta-chip { font-size: 22px; }
    body.app-role-bed .body-map-card,
    body.app-role-bed .timer-card { padding: 10px; }
    body.app-role-bed .bed-detail-info { padding: 9px; }
    body.app-role-bed .timer-clock {
      font-size: clamp(46px, 5vw, 68px);
      min-width: 156px;
    }
    body.app-role-bed .timer-treatment { font-size: 25px; }
    body.app-role-bed .timer-actions.bed-timer-actions .timer-btn {
      min-height: 50px;
      padding: 12px;
    }
  }

  /* 빈 상태 */
  .bed-arrival-overlay {
    position: fixed;
    inset: 0;
    z-index: 120;
    display: none;
    place-items: center;
    border: 0;
    background: radial-gradient(circle at 50% 35%, rgba(57,169,245,0.24), rgba(5,42,97,0.96) 48%, rgba(2,18,42,0.98));
    color: var(--text);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 28px;
    text-align: center;
  }
  .bed-arrival-overlay.show {
    display: grid;
  }
  .bed-arrival-name {
    max-width: 92vw;
    overflow-wrap: anywhere;
    font-size: clamp(64px, 15vw, 168px);
    font-weight: 900;
    line-height: 1.06;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
  .empty-text { font-size: 14px; }

  /* 토스트 */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent2);
    color: #053063;
    font-size: 13px;
    font-weight: 700;
    padding: 12px 24px;
    border-radius: 30px;
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* 알림 팝업 오버레이 */
  .notif-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding-top: 60px;
  }
  .notif-overlay.show { display: flex; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .notif-popup {
    background: var(--surface);
    border: 2px solid var(--gold);
    border-radius: 20px;
    padding: 28px 24px;
    width: calc(100% - 32px);
    max-width: 400px;
    text-align: center;
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(240,192,96,0.15);
  }
  .notif-popup.credit-popup {
    width: min(1120px, calc(100vw - 32px));
    max-width: min(1120px, calc(100vw - 32px));
    padding-inline: 28px;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.8) translateY(-20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .popup-icon { font-size: 36px; margin-bottom: 12px; }
  .popup-name { font-size: 28px; font-weight: 900; color: var(--text); margin-bottom: 8px; }
  .popup-label { font-size: 12px; color: var(--text3); margin-bottom: 14px; }
  .popup-treats { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 20px; }
  .popup-tag {
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 13px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 20px;
  }
  .popup-close {
    width: 100%;
    padding: 14px;
    background: var(--gold);
    color: #053063;
    border: none;
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.15s;
  }
  .popup-close:hover { background: #f5ce70; }
  .timer-alert-popup {
    border-color: var(--danger);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(255,107,107,0.18);
  }
  .timer-alert-title { display: none; }
  .timer-alert-body {
    font-size: 26px;
    font-weight: 900;
    line-height: 1.25;
    color: var(--text);
    margin-bottom: 22px;
    word-break: keep-all;
  }

  /* 데스크/치료실 차트 조회 폼 */
  .desk-chart-grid,
  .receive-chart-grid {
    grid-template-columns: minmax(132px, 1.65fr) minmax(72px, 1fr) minmax(52px, 0.62fr) 40px 40px;
    align-items: stretch;
  }
  .input-panel.input-form-open .desk-chart-grid,
  .receive-panel.receive-form-open .receive-chart-grid {
    grid-template-columns: minmax(82px, 1.4fr) minmax(54px, 0.95fr) minmax(42px, 0.55fr) 30px 30px;
    gap: 8px;
  }
  .chart-lookup-row {
    grid-column: 1 / 2;
    display: grid;
    grid-template-columns: minmax(0, 1fr);
    gap: 8px;
    align-items: stretch;
    align-self: stretch;
    min-width: 0;
    height: 52px;
  }
  .desk-chart-grid > .form-segment-row,
  .receive-chart-grid > .form-segment-row {
    display: contents;
  }
  .desk-chart-grid > .name-input,
  .desk-chart-grid .chart-lookup-row .name-input,
  .receive-chart-grid > .name-input {
    min-width: 0;
    padding: 12px 10px;
    font-size: 17px;
    height: 52px;
    box-sizing: border-box;
  }
  .input-panel.input-form-open .desk-chart-grid > .name-input,
  .input-panel.input-form-open .desk-chart-grid .chart-lookup-row .name-input,
  .receive-panel.receive-form-open .receive-chart-grid > .name-input {
    padding: 10px 7px;
    font-size: 14px;
  }
  .desk-chart-grid > .name-input::placeholder,
  .desk-chart-grid .chart-lookup-row .name-input::placeholder,
  .receive-chart-grid > .name-input::placeholder {
    font-size: 13px;
  }
  .receive-chart-grid #receiveChartNo {
    grid-column: 1 / 2;
    grid-row: 1;
  }
  .receive-chart-grid #receivePatientName {
    grid-column: 2 / 3;
    grid-row: 1;
  }
  .receive-chart-grid #receiveAgeInput {
    grid-column: 3 / 4;
    grid-row: 1;
  }
  .desk-gender-segment,
  .receive-gender-segment {
    grid-column: 5 / 6;
    grid-row: 1;
    grid-template-columns: 1fr;
    grid-template-rows: repeat(2, minmax(0, 1fr));
    gap: 3px;
    padding: 3px;
    min-width: 0;
    min-height: 52px;
    box-sizing: border-box;
  }
  .desk-visit-segment,
  .receive-visit-segment {
    grid-column: 4 / 5;
    grid-row: 1;
    display: grid;
    grid-template-columns: 1fr;
    grid-template-rows: repeat(2, minmax(0, 1fr));
    gap: 3px;
    padding: 3px;
    min-width: 0;
    min-height: 52px;
    box-sizing: border-box;
  }
  .desk-visit-segment .segment-item,
  .desk-gender-segment .segment-item,
  .receive-visit-segment .segment-item,
  .receive-gender-segment .segment-item {
    min-height: 0;
    font-size: 13px;
  }
  .input-panel.input-form-open .desk-visit-segment .segment-item,
  .input-panel.input-form-open .desk-gender-segment .segment-item,
  .receive-panel.receive-form-open .receive-visit-segment .segment-item,
  .receive-panel.receive-form-open .receive-gender-segment .segment-item {
    font-size: 12px;
  }
  .desk-visit-segment .segment-item span,
  .desk-gender-segment .segment-item span,
  .receive-visit-segment .segment-item span,
  .receive-gender-segment .segment-item span {
    padding: 3px 2px;
  }
  .chart-lookup-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 900;
    white-space: nowrap;
    min-width: 60px;
    transition: opacity 0.15s;
  }
  .desk-chart-grid .chart-lookup-badge {
    display: none;
  }
  .desk-chart-grid #chiefComplaint,
  .receive-chart-grid #receiveChiefComplaint {
    grid-column: 1 / 5;
    grid-row: 2;
  }
  .desk-chart-grid #memoInput,
  .receive-chart-grid #receiveMemoInput {
    grid-column: 1 / 5;
    grid-row: 3;
    height: 92px;
    min-height: 92px;
    line-height: 1.35;
    resize: none;
  }
  .desk-chart-grid .desk-submit-btn,
  .receive-chart-grid .receive-submit-btn {
    grid-column: 5 / 6;
    grid-row: 2 / 4;
    height: 100%;
    min-height: 154px;
    padding: 10px 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    word-break: keep-all;
    writing-mode: vertical-rl;
    text-orientation: upright;
    letter-spacing: 0;
  }
  .input-panel.input-form-open .desk-chart-grid .desk-submit-btn,
  .receive-panel.receive-form-open .receive-chart-grid .receive-submit-btn {
    min-width: 0;
    padding: 8px 2px;
    font-size: 13px;
  }
  .chart-lookup-badge:empty { display: none; }
  .chart-lookup-badge.new {
    background: rgba(255,178,26,0.18);
    border: 1px solid rgba(255,178,26,0.65);
    color: var(--gold);
  }
  .chart-lookup-badge.returning {
    background: rgba(57,169,245,0.18);
    border: 1px solid rgba(57,169,245,0.65);
    color: var(--accent);
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
    margin-right: 5px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- 헤더 -->
  <div class="header">
    <div class="header-left">
      <img class="brand-icon" src="assets/logo-icon.png" alt="경희홍익한의원 로고">
      <div class="brand-copy">
        <h1><span>경희</span><span class="brand-highlight">홍익</span><span>한의원</span><span class="bed-header-bed-chip" id="bedHeaderBedChip">1번</span></h1>
        <p><span class="status-dot"></span>실시간 연결됨</p>
      </div>
      <div class="header-left-desk-controls">
        <button class="random-test-btn" onclick="openRandomTestGenerator()">랜덤 테스트생성</button>
        <button class="random-test-btn danger" id="clearPatientDbBtn" onclick="clearPatientDatabase()">비우기</button>
      </div>
    </div>
    <div class="header-actions">
      <div class="header-desk-controls">
        <button class="random-test-btn" onclick="assignWaitingPatientsManually()">배정</button>
        <span class="header-wait-chip" id="deskWaitChip">예상대기시간 0분</span>
      </div>
      <div class="header-notify-controls">
        <span class="header-wait-chip" id="notifyWaitChip">예상대기시간 0분</span>
        <div class="doctor-call-controls">
          <button class="doctor-call-btn" onclick="sendDoctorCallAlert('desk')">데스크 호출</button>
          <button class="doctor-call-btn" onclick="sendDoctorCallAlert('clinic')">치료실 호출</button>
        </div>
        <div class="doctor-alert-select-wrap">
          <span class="doctor-alert-select-label" id="doctorAlertSelectLabel">원장 선택</span>
          <select class="doctor-alert-select" id="doctorAlertSelect" onchange="setDoctorAlertFilter(this.value)"></select>
        </div>
      </div>
      <div class="header-bed-controls">
        <span class="header-wait-chip bed-count-chip" id="bedPatientCount">0/13</span>
        <span class="header-wait-chip" id="bedRemainingChip">남은 진료 시간 0분</span>
      </div>
      <div class="mode-toggle">
        <button class="mode-btn active" onclick="setMode('input')">데스크</button>
        <button class="mode-btn" onclick="setMode('doctor')">원장실</button>
        <button class="mode-btn" onclick="setMode('notify')">치료실알림</button>
        <button class="mode-btn" onclick="setMode('receive')">치료실</button>
        <button class="mode-btn" onclick="setMode('bed')">베드</button>
        <button class="mode-btn" onclick="setMode('settings')">설정</button>
      </div>
    </div>
  </div>
  <input id="randomTestExcelInput" type="file" accept=".xls,.xlsx,.csv" style="display:none" onchange="handleRandomTestExcel(this.files?.[0]); this.value = '';">

  <!-- 입력 패널 -->
  <div class="input-panel active" id="inputPanel">
    <button class="input-drawer-toggle" id="inputFormToggle" data-open="0" onclick="toggleDeskInputForm()" aria-label="입력 열기">›</button>
    <div class="input-layout">
      <div class="input-form-column">
        <div class="card">
          <div class="form-section">
            <div class="patient-info-grid desk-chart-grid">
              <div class="chart-lookup-row">
                <span class="chart-lookup-badge" id="chartLookupBadge"></span>
                <input class="name-input" id="chartNo" type="text" placeholder="차트번호" maxlength="20"
                  onkeydown="if(event.key==='Enter'){event.preventDefault(); window.runDeskChartNoLookup?.();}"
                  onchange="window.runDeskChartNoLookup?.()"
                  oninput="window.clearChartLookupBadge?.()">
              </div>
              <input class="name-input" id="patientName" type="text" placeholder="성함" maxlength="10">
              <input class="name-input" id="ageInput" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="나이" maxlength="3">
              <div class="form-segment-row">
                <div class="segmented desk-visit-segment">
                  <label class="segment-item"><input type="radio" name="visitType" value="초진" checked><span>초</span></label>
                  <label class="segment-item"><input type="radio" name="visitType" value="재진"><span>재</span></label>
                </div>
                <div class="segmented desk-gender-segment">
                  <label class="segment-item"><input type="radio" name="gender" value="남" checked><span>남</span></label>
                  <label class="segment-item"><input type="radio" name="gender" value="여"><span>여</span></label>
                </div>
              </div>
              <input class="name-input wide" id="chiefComplaint" type="text" placeholder="주상병명" maxlength="60">
              <textarea class="name-input wide" id="memoInput" placeholder="메모" maxlength="120" rows="3"></textarea>
              <button class="submit-btn desk-submit-btn" id="submitBtn" onclick="submitPatient()">입력</button>
            </div>
          </div>

          <div class="form-section">
            <div class="staff-select-grid monitor-staff-grid">
              <select class="staff-select" id="doctorSelect"></select>
              <select class="staff-select" id="nurseSelect"></select>
            </div>
          </div>

          <div class="form-section" id="deskTreatmentSection">
            <div class="treatment-grid monitor-treatment-grid" id="treatmentGrid"></div>
          </div>
          <div class="form-section" id="deskBodyPartSection">
            <div class="form-body-map" id="deskBodyPartForm"></div>
          </div>
        </div>
      </div>

      <div class="input-detail-column">
        <div class="card">
          <div class="card-label">알림</div>
          <div class="upcoming-list" id="inputUpcomingAlerts"></div>
        </div>
      </div>

      <div class="input-monitor-column">
        <div class="card">
          <div class="bed-monitor" id="inputBedMonitor"></div>
        </div>
        <div class="card">
          <div class="card-label">대기</div>
          <div class="waiting-list waiting-list--compact" id="inputWaitingList" ondragover="handleWaitingListDragOver(event)" ondrop="handleWaitingListDrop(event)"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 수신 패널 -->
  <div class="receive-panel" id="receivePanel">
    <button class="input-drawer-toggle receive-drawer-toggle" id="receiveFormToggle" data-open="0" onclick="toggleReceiveForm()" aria-label="입력 열기">›</button>
    <div class="receive-layout">
      <div class="receive-main-column">
        <div class="card">
          <div class="bed-monitor" id="receiveBedMonitor"></div>
        </div>
        <div class="card">
          <div class="card-label">대기</div>
          <div class="waiting-list waiting-list--compact" id="receiveWaitingList" ondragover="handleWaitingListDragOver(event)" ondrop="handleWaitingListDrop(event)"></div>
        </div>
      </div>
      <div class="receive-detail-column">
        <div class="receive-form-column">
          <div class="card">
            <div class="form-section">
              <div class="patient-info-grid receive-chart-grid">
                <input class="name-input" id="receiveChartNo" type="text" placeholder="차트번호" maxlength="20">
                <input class="name-input" id="receivePatientName" type="text" placeholder="성함" maxlength="10">
                <input class="name-input" id="receiveAgeInput" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="나이" maxlength="3">
                <div class="form-segment-row">
                  <div class="segmented receive-visit-segment">
                    <label class="segment-item"><input type="radio" name="receiveVisitType" value="초진" checked><span>초</span></label>
                    <label class="segment-item"><input type="radio" name="receiveVisitType" value="재진"><span>재</span></label>
                  </div>
                  <div class="segmented receive-gender-segment">
                    <label class="segment-item"><input type="radio" name="receiveGender" value="남" checked><span>남</span></label>
                    <label class="segment-item"><input type="radio" name="receiveGender" value="여"><span>여</span></label>
                  </div>
                </div>
                <input class="name-input wide" id="receiveChiefComplaint" type="text" placeholder="주상병명" maxlength="60">
                <textarea class="name-input wide" id="receiveMemoInput" placeholder="메모" maxlength="120" rows="3"></textarea>
                <button class="submit-btn receive-submit-btn" id="receiveSubmitBtn" onclick="submitPatient('receive')">입력</button>
              </div>
            </div>

            <div class="form-section">
              <div class="staff-select-grid monitor-staff-grid">
                <select class="staff-select" id="receiveDoctorSelect"></select>
                <select class="staff-select" id="receiveNurseSelect"></select>
              </div>
            </div>

            <div class="form-section" id="receiveTreatmentSection">
              <div class="treatment-grid monitor-treatment-grid" id="receiveTreatmentGrid"></div>
            </div>
            <div class="form-section" id="receiveBodyPartSection">
              <div class="form-body-map" id="receiveBodyPartForm"></div>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-label">알림</div>
          <div class="upcoming-list" id="receiveUpcomingAlerts"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 베드 패널 -->
  <div class="bed-panel" id="bedPanel">
    <div class="bed-layout">
      <select class="bed-selector" id="bedSelector" onchange="selectBed(Number(this.value))"></select>
      <div class="bed-workspace">
        <div class="bed-left-column">
          <details class="bed-input-section" id="bedEditSection" open>
            <summary>정보 수정</summary>
            <div class="bed-input-body">
              <div class="form-section">
                <div class="treatment-grid monitor-treatment-grid" id="bedTreatmentGrid"></div>
              </div>

              <div class="form-section">
                <div class="patient-info-grid monitor-patient-grid">
                  <div class="bed-edit-hidden-fields">
                    <input class="name-input" id="bedPatientName" type="text" placeholder="성함을 입력하세요" maxlength="10">
                    <input class="name-input" id="bedChartNo" type="text" placeholder="차트번호" maxlength="20">
                    <input class="name-input" id="bedAgeInput" type="number" placeholder="나이" min="0" max="130">
                    <div class="form-segment-row">
                      <div class="segmented">
                        <label class="segment-item"><input type="radio" name="bedVisitType" value="초진" checked><span>초진</span></label>
                        <label class="segment-item"><input type="radio" name="bedVisitType" value="재진"><span>재진</span></label>
                      </div>
                      <div class="segmented">
                        <label class="segment-item"><input type="radio" name="bedGender" value="남" checked><span>남</span></label>
                        <label class="segment-item"><input type="radio" name="bedGender" value="여"><span>여</span></label>
                      </div>
                    </div>
                  </div>
                  <div class="bed-edit-visible-grid">
                    <input class="name-input bed-chief-field" id="bedChiefComplaint" type="text" placeholder="주상병명" maxlength="60">
                    <div class="bed-memo-wrap" id="bedMemoWrap">
                      <button class="bed-memo-toggle" id="bedMemoToggle" type="button" onclick="toggleBedMemoInput()">메모</button>
                      <textarea class="name-input bed-memo-field" id="bedMemoInput" placeholder="메모" maxlength="300" rows="3"></textarea>
                    </div>
                    <button class="submit-btn bed-submit-btn" id="bedSubmitBtn" onclick="saveBedPatientInfo()">확인</button>
                  </div>
                </div>
              </div>

              <div class="form-section">
                <div class="staff-select-grid monitor-staff-grid">
                  <select class="staff-select" id="bedDoctorSelect"></select>
                  <select class="staff-select" id="bedNurseSelect"></select>
                </div>
              </div>
            </div>

  function normalizePCredits(values = {}) {
    return Object.fromEntries(PCREDIT_FIELDS.map(({ key }) => {

      return [key, value];
    }));
  }

  function normalizePackageEntries(entries = [], type = 'purchase') {
    if (Array.isArray(entries)) {
      return entries.map((entry, index) => {
        const date = String(entry?.date || toLocalDateInputValue());
        const qty = Math.max(0, Math.min(999, Number(entry?.qty ?? entry?.totalQty ?? 0) || 0));
        return {
          id: String(entry?.id || `${type}-${date}-${qty}-${index}`),
          date,
          qty
        };
      }).filter(entry => entry.qty > 0);
    }
    return Object.entries(entries || {}).map(([id, entry]) => ({
      id,
      date: String(entry?.date || toLocalDateInputValue()),
      qty: Math.max(0, Math.min(999, Number(entry?.qty ?? entry?.totalQty ?? 0) || 0))
    })).filter(entry => entry.qty > 0);
  }

  function createEmptyPackageState(source = {}) {
    const sourcePackages = source?.packages || {};
    const result = {};
    PCREDIT_FIELDS.forEach(({ key }) => {
      const saved = sourcePackages[key] || {};
      const purchases = normalizePackageEntries(saved.purchases, 'purchase');
      const usages = normalizePackageEntries(saved.usages, 'usage');
      const hasPackageData = Boolean(sourcePackages[key]);
      const openingQty = Math.max(0, Math.min(999, Number(saved.openingQty ?? (!hasPackageData ? source?.[key] : 0)) || 0));
      const balance = calculatePackageBalance({ openingQty, purchases, usages });
      result[key] = { openingQty, purchases, usages, balance };
    });
    return result;
  }

  function calculatePackageBalance(pkg = {}) {
    const openingQty = Number(pkg.openingQty || 0);
    const purchaseQty = normalizePackageEntries(pkg.purchases, 'purchase').reduce((sum, entry) => sum + Number(entry.qty || 0), 0);
    const usageQty = normalizePackageEntries(pkg.usages, 'usage').reduce((sum, entry) => sum + Number(entry.qty || 0), 0);
    return Math.max(0, openingQty + purchaseQty - usageQty);
  }

      const usages = normalizePackageEntries(pkg.usages, 'usage');
      const openingQty = Math.max(0, Math.min(999, Number(pkg.openingQty || 0) || 0));
      result[key] = {
        openingQty,
        purchases,
        usages,
        balance: calculatePackageBalance({ openingQty, purchases, usages })
      };
    });
    return result;
  }

  function getPCreditsFromPackages(packages = {}) {
    return Object.fromEntries(PCREDIT_FIELDS.map(({ key }) => [key, Number(packages?.[key]?.balance || 0)]));
  }

  function getPackageStateFromPatient(data = {}) {
    return normalizePackageState(createEmptyPackageState(data));
  }

  function getPCreditsFromPatient(data = {}) {
    return getPCreditsFromPackages(getPackageStateFromPatient(data));
  }

  function getPCreditPayload(gridId) {
    return normalizePCredits(pCreditValuesByGrid[gridId]);
  }

  function getPackageStateForGrid(gridId) {
    if (!packageStatesByGrid[gridId]) packageStatesByGrid[gridId] = createEmptyPackageState();
    return normalizePackageState(packageStatesByGrid[gridId]);
  }

  function setPackageStateForGrid(gridId, state) {
    const normalized = normalizePackageState(state);
    packageStatesByGrid[gridId] = normalized;
    pCreditValuesByGrid[gridId] = getPCreditsFromPackages(normalized);
    updateCreditChip(gridId);
    return normalized;
  }

  function getPackagePayload(gridId) {
    const packages = getPackageStateForGrid(gridId);
    return {
      packages,
      ...getPCreditsFromPackages(packages)
    };
  }

  function getPCreditTotal(values = {}) {
    return Object.values(normalizePCredits(values)).reduce((sum, value) => sum + value, 0);
  }

  function getPatientKeyForCreditGrid(gridId) {
    const scope = getScopeFromGridId(gridId);
    if (scope === 'bed') {
      return getBedData(selectedBedNo)?.patientKey || '';
    }
    if (scope === 'desk' || scope === 'receive') {
      if (formEditPatientKeyByScope[scope]) return formEditPatientKeyByScope[scope];
      const bedNo = formEditBedNoByScope[scope];
      return bedNo ? (getBedData(bedNo)?.patientKey || '') : '';
    }
    return '';
  }

  function resetPCredits(gridId) {
    setPackageStateForGrid(gridId, createEmptyPackageState());
    updateCreditChip(gridId);
  }

  window.updateCreditChip = function(gridId, values = null) {
    if (values !== null && values !== undefined) {
      if (values.packages) setPackageStateForGrid(gridId, createEmptyPackageState(values));
      else {
        pCreditValuesByGrid[gridId] = normalizePCredits(typeof values === 'number' ? {} : values);
        packageStatesByGrid[gridId] = createEmptyPackageState(values);
      }
    }
    return getPCreditPayload(gridId);
  };

  window.getCreditValue = function(gridId) {
    return getPCreditPayload(gridId);
  };

  window.openCreditPopup = function(gridId) {
    activeCreditGridId = gridId;
    const overlay = document.getElementById('creditOverlay');
    if (!overlay) return;
    renderPackagePopup();
    overlay.classList.add('show');
  };

  function renderPackagePopup() {
    const form = document.getElementById('creditForm');
    if (!form || !activeCreditGridId) return;
    const packages = getPackageStateForGrid(activeCreditGridId);
    const today = toLocalDateInputValue();
    form.innerHTML = PCREDIT_FIELDS.map(({ key, label, defaultPurchaseQty }) => {
      const pkg = packages[key] || { openingQty: 0, purchases: [], usages: [], balance: 0 };
      const purchases = normalizePackageEntries(pkg.purchases, 'purchase');
      const usages = normalizePackageEntries(pkg.usages, 'usage');
      const renderRows = (items, type) => items.length
        ? items.map(item => `
          <div class="package-history-row">
            <span>${escapeHtml(item.date)}</span>
            <span>${type === 'purchase' ? '결제' : '사용'} ${escapeHtml(item.qty)}개</span>
            <button class="package-history-delete" type="button" onclick="removePackageEntry('${key}', '${type}', '${escapeHtml(item.id)}')">×</button>
          </div>`).join('')
        : `<div class="package-history-row"><span>-</span><span>기록 없음</span><span></span></div>`;
      return `
        <div class="package-card">
          <div class="package-card-head">
            <div class="package-title">${escapeHtml(label)}</div>
            <div class="package-balance">잔량 ${escapeHtml(pkg.balance)}</div>
          </div>
          <div class="package-entry-grid">
            <input class="package-input" id="pkg-${key}-purchase-date" type="date" value="${today}">
            <input class="package-input" id="pkg-${key}-purchase-qty" type="text" inputmode="numeric" maxlength="3" value="${escapeHtml(defaultPurchaseQty)}" aria-label="${escapeHtml(label)} 결제 수량">
            <button class="package-entry-btn" type="button" onclick="addPackageEntry('${key}', 'purchase')">결제 추가</button>
          </div>
          <div class="package-entry-grid">
            <input class="package-input" id="pkg-${key}-usage-date" type="date" value="${today}">
            <input class="package-input" id="pkg-${key}-usage-qty" type="text" inputmode="numeric" maxlength="3" value="1" aria-label="${escapeHtml(label)} 사용 수량">
            <button class="package-entry-btn" type="button" onclick="addPackageEntry('${key}', 'usage')">사용 추가</button>
          </div>
          <div class="package-history-title">결제일</div>
          <div class="package-history">${renderRows(purchases, 'purchase')}</div>
          <div class="package-history-title">사용일</div>
          <div class="package-history">${renderRows(usages, 'usage')}</div>
        </div>`;
    }).join('');
  }

  function getPackageQtyInputValue(id) {
    return Math.max(1, Math.min(999, Number(String(document.getElementById(id)?.value || '').replace(/[^0-9]/g, '')) || 1));
  }

  async function persistPackageState(gridId) {
    const packages = getPackageStateForGrid(gridId);
    const payload = { packages, ...getPCreditsFromPackages(packages), credit: null };
    const patientKey = getPatientKeyForCreditGrid(gridId);
    if (patientKey) {
      await update(ref(db, `${PATIENTS_PATH}/${patientKey}`), payload);
      const nextPatient = {
        ...(patientsByKey.get(patientKey) || {}),
        ...payload
      };
      delete nextPatient.credit;
      patientsByKey.set(patientKey, nextPatient);
      renderBedMonitors();
    }
    updateCreditChip(gridId);
  }

  window.addPackageEntry = async function(key, type) {
    const gridId = activeCreditGridId;
    if (!gridId) return;
    const packages = getPackageStateForGrid(gridId);
    const pkg = packages[key] || { openingQty: 0, purchases: [], usages: [] };
    const dateId = `pkg-${key}-${type === 'purchase' ? 'purchase' : 'usage'}-date`;
    const qtyId = `pkg-${key}-${type === 'purchase' ? 'purchase' : 'usage'}-qty`;
    const date = document.getElementById(dateId)?.value || toLocalDateInputValue();
    const qty = getPackageQtyInputValue(qtyId);
    const entry = { id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`, date, qty };
    if (type === 'purchase') pkg.purchases = [...normalizePackageEntries(pkg.purchases, 'purchase'), entry];
    else pkg.usages = [...normalizePackageEntries(pkg.usages, 'usage'), entry];
    packages[key] = pkg;
    setPackageStateForGrid(gridId, packages);
    await persistPackageState(gridId);
    renderPackagePopup();
    showToast(type === 'purchase' ? '결제 기록 추가' : '사용 기록 추가');
  };

  window.removePackageEntry = async function(key, type, id) {
    const gridId = activeCreditGridId;
    if (!gridId) return;
    const packages = getPackageStateForGrid(gridId);
    const pkg = packages[key] || { openingQty: 0, purchases: [], usages: [] };
    const field = type === 'purchase' ? 'purchases' : 'usages';
    pkg[field] = normalizePackageEntries(pkg[field], type).filter(entry => entry.id !== id);
    packages[key] = pkg;
    setPackageStateForGrid(gridId, packages);
    await persistPackageState(gridId);
    renderPackagePopup();
    showToast('패키지 기록 삭제');
  };

  window.closeCreditPopup = function() {
    document.getElementById('creditOverlay')?.classList.remove('show');
    activeCreditGridId = '';
  };

  window.saveCreditPopup = async function() {
    closeCreditPopup();
  };

  function renderTreatmentPresetSelect(select) {
    const options = treatmentPresets.length
      ? treatmentPresets.map(p => `<option value="${escapeHtml(p.key)}">${escapeHtml(p.name)}</option>`).join('')
      : '<option value="" disabled>저장된 프리셋 없음</option>';
    select.innerHTML = `<option value="">프리셋</option>${options}`;
    select.value = '';
  }

  function renderAllTreatmentPresetSelects() {
    document.querySelectorAll('.treatment-preset-select').forEach(select => renderTreatmentPresetSelect(select));
  }

  window.applyTreatmentPreset = (gridId, presetKey) => {
    if (!presetKey) return;
    const preset = treatmentPresets.find(p => p.key === presetKey);
    const select = document.querySelector(`.treatment-preset-select[data-grid-id="${gridId}"]`);
    if (select) select.value = '';
    if (!preset) return;
    setTreatmentSelection(gridId, preset.treatments || []);
    const scope = getScopeFromGridId?.(gridId);
    if (scope) scheduleSelectFieldSave(scope, 0);
  };

  function treatBtnClick(gridId, treatment) {
    if (!treatmentSelections[gridId]) treatmentSelections[gridId] = [];
    const sel = treatmentSelections[gridId];
    const idx = sel.findIndex(s => s.id === treatment.id);
    if (idx >= 0) {
      sel.splice(idx, 1);
    } else {
      sel.push({ id: treatment.id, name: treatment.name });
    }
    renderTreatmentChips(gridId);
    syncTreatBtnStates(gridId);
    const scope = getScopeFromGridId?.(gridId);
    if (scope) scheduleSelectFieldSave(scope, 0);
  }

  function removeChip(gridId, treatmentId) {
    if (!treatmentSelections[gridId]) return;
    treatmentSelections[gridId] = treatmentSelections[gridId].filter(s => s.id !== treatmentId);
    renderTreatmentChips(gridId);
    syncTreatBtnStates(gridId);
    const scope = getScopeFromGridId?.(gridId);
    if (scope) scheduleSelectFieldSave(scope, 0);
  }

  function renderTreatmentChips(gridId) {
    const chipsWrap = document.getElementById(getTreatmentChipsId(gridId));
    if (!chipsWrap) return;
    const sel = treatmentSelections[gridId] || [];
    chipsWrap.innerHTML = sel.map((s, i) => `
      <span class="treat-chip treat-chip--drag" draggable="true"
        data-grid="${gridId}" data-index="${i}"
        ondragstart="chipDragStart(event,'${gridId}',${i})"
        ondragover="chipDragOver(event,'${gridId}',${i})"
        ondragleave="chipDragLeave(event)"
        ondrop="chipDrop(event,'${gridId}',${i})"
        ondragend="chipDragEndSel(event)"
      >${escapeHtml(s.name)}</span>`
    ).join('');
  }

  let _chipDragFromIndex = null;
  let _chipDragGridId = null;

  window.chipDragStart = (event, gridId, index) => {
    event.stopPropagation();
    _chipDragFromIndex = index;
    _chipDragGridId = gridId;
    event.dataTransfer.effectAllowed = 'move';
    event.dataTransfer.setData('text/plain', `select-treat:${gridId}:${index}`);
    event.currentTarget.style.opacity = '0.4';
  };
  window.chipDragOver = (event, gridId, index) => {
    event.stopPropagation();
    if (_chipDragGridId !== gridId || _chipDragFromIndex === null || _chipDragFromIndex === index) return;
    event.preventDefault();
    event.dataTransfer.dropEffect = 'move';
    event.currentTarget.classList.add('treat-drag-over');
  };
  window.chipDragLeave = (event) => {
    event.stopPropagation();
    event.currentTarget.classList.remove('treat-drag-over');
  };
  window.chipDrop = (event, gridId, toIndex) => {
    event.stopPropagation();
    event.preventDefault();
    event.currentTarget.classList.remove('treat-drag-over');
    if (_chipDragGridId !== gridId || _chipDragFromIndex === null || _chipDragFromIndex === toIndex) return;
    const sel = treatmentSelections[gridId] || [];
    const [moved] = sel.splice(_chipDragFromIndex, 1);
    sel.splice(toIndex, 0, moved);
    treatmentSelections[gridId] = sel;
    renderTreatmentChips(gridId);
    syncTreatBtnStates(gridId);
    const scope = getScopeFromGridId?.(gridId);
    if (scope) scheduleSelectFieldSave(scope, 0);
    _chipDragFromIndex = null;
    _chipDragGridId = null;
  };
  window.chipDragEndSel = (event) => {
    event.stopPropagation();
    event.currentTarget.style.opacity = '';
    document.querySelectorAll('.treat-drag-over').forEach(el => el.classList.remove('treat-drag-over'));
  };

  document.addEventListener('dragover', (event) => {
    if (_chipDragGridId === null || _chipDragFromIndex === null) return;
    if (event.target?.closest?.('.treat-chips-wrap, .treat-chip')) return;
    event.preventDefault();
    event.dataTransfer.dropEffect = 'move';
  });

  document.addEventListener('drop', (event) => {
    if (_chipDragGridId === null || _chipDragFromIndex === null) return;
    if (event.target?.closest?.('.treat-chips-wrap, .treat-chip')) return;
    event.preventDefault();
    event.stopPropagation();
    const gridId = _chipDragGridId;
    const fromIndex = _chipDragFromIndex;
    const sel = treatmentSelections[gridId] || [];
    if (sel[fromIndex]) {
      sel.splice(fromIndex, 1);
      treatmentSelections[gridId] = sel;
      renderTreatmentChips(gridId);
      syncTreatBtnStates(gridId);
      const scope = getScopeFromGridId?.(gridId);
      if (scope) scheduleSelectFieldSave(scope, 0);
    }
    _chipDragFromIndex = null;
    _chipDragGridId = null;
    document.querySelectorAll('.treat-drag-over').forEach(el => el.classList.remove('treat-drag-over'));
  });

  function syncTreatBtnStates(gridId) {
    const grid = document.getElementById(gridId);
    if (!grid) return;
    const sel = new Set((treatmentSelections[gridId] || []).map(s => s.id));
    grid.querySelectorAll('.treat-btn').forEach(btn => {
      btn.classList.toggle('active', sel.has(btn.dataset.id));
    });
  }

  window.removeChip = removeChip;

  function renderTreatmentPresetSettings() {
    const grid = document.getElementById('presetTreatmentGrid');
    const list = document.getElementById('treatmentPresetList');
    if (grid) {
      grid.innerHTML = '';
      if (!treatmentSelections.presetTreatmentGrid) treatmentSelections.presetTreatmentGrid = [];
      TREATMENTS.forEach(t => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'treat-btn';
        btn.dataset.id = t.id;
        btn.dataset.name = t.name;
        btn.innerHTML = `<span class="treat-icon">${t.icon}</span><span class="treat-name">${t.name}</span>`;
        btn.onclick = () => treatBtnClick('presetTreatmentGrid', t);
        grid.appendChild(btn);
      });
      renderTreatmentChips('presetTreatmentGrid');
      syncTreatBtnStates('presetTreatmentGrid');
    }
    if (list) {
      list.innerHTML = treatmentPresets.length
        ? treatmentPresets.map(p => `
          <div class="preset-item">
            <div>
              <div class="preset-name">${escapeHtml(p.name)}</div>
              <div class="preset-treats">${(p.treatments || []).map(escapeHtml).join(' · ')}</div>
            </div>
            <button class="staff-delete-btn" onclick="deleteTreatmentPreset('${escapeHtml(p.key)}')">삭제</button>
          </div>
        `).join('')
        : '<div class="empty-state"><div class="empty-icon">＋</div><div class="empty-text">저장된 프리셋이 없습니다</div></div>';
    }
  }

  window.saveTreatmentPreset = async () => {
    const treatments = (treatmentSelections.presetTreatmentGrid || []).map(s => s.name);
    if (!treatments.length) { showToast('치료를 1개 이상 선택해주세요'); return; }
    const name = treatments.join(',');
    try {
      await push(ref(db, 'settings/treatmentPresets'), {
        name,
        treatments,
        timestamp: Date.now()
      });
      treatmentSelections.presetTreatmentGrid = [];
      renderTreatmentChips('presetTreatmentGrid');
      syncTreatBtnStates('presetTreatmentGrid');
      showToast('프리셋 저장 완료');
    } catch (e) {
      console.error(e);
      showToast('프리셋 저장 실패');
    }
  };

  window.deleteTreatmentPreset = async (key) => {
    if (!key) return;
    if (!confirm('프리셋을 삭제하시겠습니까?')) return;
    try {
      await remove(ref(db, `settings/treatmentPresets/${key}`));
      showToast('프리셋 삭제 완료');
    } catch (e) {
      console.error(e);
      showToast('프리셋 삭제 실패');
    }
  };

  function renderTreatmentMinutesSettings() {
    const list = document.getElementById('treatmentMinutesList');
    if (!list) return;

    const procValue = Math.max(0, Math.min(120, Number(procedureMinutes) || 0));
    const procRow = `
      <label class="treatment-time-row treatment-time-row--procedure">
        <span class="treatment-time-name">🩺 처치</span>
        <div class="treatment-time-row-inner">
          <input class="treatment-time-input" id="procedureMinutesInput" type="number" min="0" max="120" step="1" value="${procValue}" aria-label="처치시간">
          <span class="treatment-time-unit">분</span>
        </div>
      </label>`;

    list.innerHTML = procRow + TREATMENTS.map(t => {
      const value = Math.max(1, Math.min(120, Number(treatmentMinutes[t.name] || DEFAULT_TREATMENT_MINUTES[t.name] || 5)));
      return `
        <label class="treatment-time-row">
          <span class="treatment-time-name">${t.icon} ${escapeHtml(t.name)}</span>
          <div class="treatment-time-row-inner">
            <input class="treatment-time-input" data-treatment-name="${escapeHtml(t.name)}" type="number" min="1" max="120" step="1" value="${value}" aria-label="${escapeHtml(t.name)} 치료시간">
            <span class="treatment-time-unit">분</span>
          </div>
        </label>`;
    }).join('');
  }

  renderTreatmentGrid('treatmentGrid');
  renderTreatmentGrid('receiveTreatmentGrid');
  renderTreatmentGrid('bedTreatmentGrid');
  renderTreatmentMinutesSettings();
  renderTreatmentPresetSettings();

  // toggleCheck는 버튼+칩 방식으로 교체됨 (레거시 호환용 유지)
  window.toggleCheck = () => {};

  function getStaffLabel(type) {
    return type === 'doctors' ? '원장' : '간호사';
  }

  function getStaffInputId(type) {
    return type === 'doctors' ? 'doctorNameInput' : 'nurseNameInput';
  }

  function getStaffSelectIds(type) {
    return type === 'doctors'
      ? ['doctorSelect', 'receiveDoctorSelect', 'bedDoctorSelect']
      : ['nurseSelect', 'receiveNurseSelect', 'bedNurseSelect'];
  }

  function getStaffListId(type) {
    return type === 'doctors' ? 'doctorList' : 'nurseList';
  }

  function getSortedStaff(type) {
    return [...staffByType[type].entries()]
      .sort((a, b) => (a[1].timestamp || 0) - (b[1].timestamp || 0));
  }

  function renderStaffControls() {
    ['doctors', 'nurses'].forEach(type => {
      const label = getStaffLabel(type);
      const list = document.getElementById(getStaffListId(type));
      const staff = getSortedStaff(type);

      getStaffSelectIds(type).forEach(selectId => {
        const select = document.getElementById(selectId);
        if (!select) return;
        const selectedValue = select.value;
        select.innerHTML = `<option value="">${label} 선택 안함</option>` + staff.map(([key, data]) =>
          `<option value="${escapeHtml(key)}">${escapeHtml(data.name || '')}</option>`
        ).join('');
        if (staffByType[type].has(selectedValue)) select.value = selectedValue;
        const scope = selectId.startsWith('receive') ? 'receive' : selectId.startsWith('bed') ? 'bed' : 'desk';
        select.onchange = () => scheduleSelectFieldSave?.(scope, 0);
      });

      if (list) {
        list.innerHTML = staff.length
          ? staff.map(([key, data]) => `
            <div class="staff-item${type === 'nurses' && data.vacation ? ' vacation' : ''}">
              <div class="staff-name">${escapeHtml(data.name || '')}</div>
              ${type === 'nurses' ? `<label class="staff-vacation-toggle">
                <input type="checkbox" ${data.vacation ? 'checked' : ''} onchange="toggleNurseVacation('${key}', this.checked)">
                휴가
              </label>` : ''}
              <button class="staff-delete-btn" onclick="deleteStaff('${type}', '${key}')">삭제</button>
            </div>`).join('')
          : `<div class="empty-state"><div class="empty-icon">+</div><div class="empty-text">등록된 ${label}이 없습니다</div></div>`;
      }

    renderDoctorAlertSelect();

  function renderDoctorAlertSelect() {
    const select = document.getElementById('doctorAlertSelect');
    const label = document.getElementById('doctorAlertSelectLabel');
    if (!select) return;
    const doctors = getSortedStaff('doctors');
    const selectedValue = selectedDoctorAlertId;
    select.innerHTML = doctors.length
      ? '<option value="">원장 선택</option>' + doctors.map(([key, data]) => `<option value="${escapeHtml(key)}">${escapeHtml(data.name || '')}</option>`).join('')
      : '<option value="">원장 없음</option>';
    if (selectedValue && staffByType.doctors.has(selectedValue)) {
      select.value = selectedValue;
    } else if (doctors.length) {
      selectedDoctorAlertId = doctors[0][0];
      select.value = selectedDoctorAlertId;
      localStorage.setItem('selectedDoctorAlertId', selectedDoctorAlertId);
    } else {
      selectedDoctorAlertId = '';
      select.value = '';
      localStorage.removeItem('selectedDoctorAlertId');
    }
    const selectedName = staffByType.doctors.get(selectedDoctorAlertId)?.name || (doctors.length ? '원장 선택' : '원장 없음');
    if (label) label.textContent = selectedName;
  }

  window.setDoctorAlertFilter = (doctorId) => {
    selectedDoctorAlertId = doctorId || '';
    if (selectedDoctorAlertId) localStorage.setItem('selectedDoctorAlertId', selectedDoctorAlertId);
    else localStorage.removeItem('selectedDoctorAlertId');
    const label = document.getElementById('doctorAlertSelectLabel');
    if (label) label.textContent = staffByType.doctors.get(selectedDoctorAlertId)?.name || '원장 선택';
    activeDoctorProcedureAlert = null;
    doctorProcedureAlertQueue.length = 0;
    queuedDoctorProcedureAlerts.clear();
    syncDoctorProcedureAlerts();
    renderUpcomingAlerts();
  };

  function getSelectedDoctorCallInfo() {
    const doctors = getSortedStaff('doctors');
    let id = selectedDoctorAlertId;
    if (!id && doctors.length) id = doctors[0][0];
    const doctor = id ? staffByType.doctors.get(id) : null;
    return doctor ? { id, name: doctor.name || '원장' } : null;
  }

  window.sendDoctorCallAlert = async (target) => {
    const doctor = getSelectedDoctorCallInfo();
    if (!doctor) {
      showToast('원장을 먼저 선택해주세요');
      return;
    }
    const safeTarget = target === 'desk' ? 'desk' : 'clinic';
    try {
      await push(ref(db, CALL_ALERTS_PATH), {
        target: safeTarget,
        doctorId: doctor.id,
        doctorName: doctor.name,
        message: `${doctor.name}원장님 호출`,
        timestamp: Date.now()
      });
      showToast(safeTarget === 'desk' ? '데스크 호출 전송' : '치료실 호출 전송');
    } catch (e) {
      console.error(e);
      showToast('호출 전송 실패');
    }
  };

  function getSelectedStaff(type, scope = 'desk') {
    const selectId = type === 'doctors'
      ? (scope === 'bed' ? 'bedDoctorSelect' : scope === 'receive' ? 'receiveDoctorSelect' : 'doctorSelect')
      : (scope === 'bed' ? 'bedNurseSelect' : scope === 'receive' ? 'receiveNurseSelect' : 'nurseSelect');
    const select = document.getElementById(selectId);
    const key = select?.value || '';
    const data = key ? staffByType[type].get(key) : null;
    return data ? { id: key, name: data.name || '' } : { id: '', name: '' };
  }

  function getTodayKey() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const d = String(now.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function getDailyStartOffset(count) {
    if (!count) return 0;
    const date = new Date();
    const start = new Date(date.getFullYear(), 0, 0);
    const dayOfYear = Math.floor((date - start) / 86400000);
    return dayOfYear % count;
  }

  async function getRoundRobinNurse() {
    const nurses = getSortedStaff('nurses').filter(([, data]) => !data.vacation);
    if (!nurseRrEnabled || !nurses.length) return null;

    const dateKey = getTodayKey();
    const counterRef = ref(db, `settings/nurseRoundRobinState/${dateKey}/count`);
    const result = await runTransaction(counterRef, value => (Number(value || 0) + 1));
    const count = Number(result.snapshot.val() || 1);
    const serial = Math.max(0, count - 1);
    const index = (getDailyStartOffset(nurses.length) + serial) % nurses.length;
    const [id, data] = nurses[index];
    return { id, name: data.name || '' };
  }

  async function applyRoundRobinNurseToForm(scope = 'desk') {
    if (!nurseRrEnabled) return;

    const serial = Number(snapshot.val() || 0);
    const index = (getDailyStartOffset(nurses.length) + serial) % nurses.length;
    const [id, data] = nurses[index];
    const rrNurse = { id, name: data.name || '' };

  function normalizeExcelHeader(value) {
    return String(value || '').replace(/\s+/g, '').replace(/[()［］\[\]_/.-]/g, '').toLowerCase();
  }

  function findExcelColumn(headers, candidates) {
    const normalizedCandidates = candidates.map(normalizeExcelHeader);
    const exactIndex = headers.findIndex(header => {
      const normalized = normalizeExcelHeader(header);
      return normalizedCandidates.includes(normalized);
    });
    if (exactIndex >= 0) return exactIndex;

    return headers.findIndex(header => {
      const normalized = normalizeExcelHeader(header);
      return normalizedCandidates.some(candidate => normalized.includes(candidate));
    });
  }

  function parseExcelPatients(arrayBuffer) {
    if (!window.XLSX) throw new Error('엑셀 파서가 로드되지 않았습니다.');
    const workbook = window.XLSX.read(arrayBuffer, { type: 'array', cellDates: false });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = window.XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
    const headerRowIndex = rows.findIndex(row => {
      const joined = row.map(normalizeExcelHeader).join('|');
      return /(성명|이름|환자|차트|등록|나이|연령|성별|상병|병명)/.test(joined);
    });
    const headers = rows[Math.max(0, headerRowIndex)] || [];
    const startIndex = headerRowIndex >= 0 ? headerRowIndex + 1 : 0;
    const nameIndex = findExcelColumn(headers, ['환자명', '환자성명', '성명', '이름', '수진자명']);
    const chartIndex = findExcelColumn(headers, ['차트번호', '챠트번호']);
    const ageIndex = findExcelColumn(headers, ['나이', '연령']);
    const genderIndex = findExcelColumn(headers, ['성별', '남녀']);
    const visitIndex = findExcelColumn(headers, ['초재진', '초진재진', '초진', '진료구분', '구분','초재진구  분']);
    const complaintIndex = findExcelColumn(headers, ['주상병명']);

    return rows.slice(startIndex).map(row => {
      const fallbackNameIndex = nameIndex >= 0 ? nameIndex : row.findIndex(cell => /[가-힣]{2,}/.test(String(cell || '').trim()));
      const name = String(row[fallbackNameIndex] || '').trim();
      const genderText = String(genderIndex >= 0 ? row[genderIndex] : '').trim();
      const visitText = String(visitIndex >= 0 ? row[visitIndex] : '').trim();
      return {
        name,
        chartNo: chartIndex >= 0 ? String(row[chartIndex] || '').trim() : '',
        age: ageIndex >= 0 ? Number(String(row[ageIndex] || '').replace(/[^0-9]/g, '')) || '' : '',
        gender: genderText.includes('여') ? '여' : '남',
        visitType: visitText.includes('초') ? '초진' : '재진',
        chiefComplaint: complaintIndex >= 0 ? String(row[complaintIndex] || '').trim() : ''
      };
    }).filter(patient => patient.name && !/성명|이름|환자명/.test(patient.name));
  }

  window.handleRandomTestExcel = async (file) => {
    if (!file || !pendingRandomTestCount) return;
    try {
      const patients = parseExcelPatients(await file.arrayBuffer());
      if (!patients.length) {
        alert('엑셀에서 이름을 찾지 못했습니다. 성명/이름 열이 있는 파일인지 확인해주세요.');
        return;
      }

      const count = pendingRandomTestCount;
      pendingRandomTestCount = 0;
      showToast(`테스트 ${count}명 생성 중...`);

      for (let i = 0; i < count; i++) {
        const source = patients[Math.floor(Math.random() * patients.length)];
        const doctor = await getRoundRobinStaffForTest('doctors');
        const nurse = await getRoundRobinStaffForTest('nurses');
        const now = new Date(Date.now() + i);
        await push(ref(db, PATIENTS_PATH), {
          name: source.name,
          treatments: getRandomTreatments(),
          timestamp: now.getTime(),
          timeStr: now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }),
          date: now.toLocaleDateString('ko-KR'),
          bedStatus: 'waiting',
          chartNo: normalizeChartNo(source.chartNo),
          visitType: source.visitType || '재진',
          chiefComplaint: source.chiefComplaint || '',

          age: source.age || '',

          nurseId: nurse.id,

          testGenerated: true,
          ...normalizePCredits()
        });

      showToast(`테스트 ${count}명 생성 완료`);
    } catch (e) {

  function toLocalDateInputValue(date = new Date()) {
    const yyyy = date.getFullYear();
    const mm = String(date.getMonth() + 1).padStart(2, '0');
    const dd = String(date.getDate()).padStart(2, '0');
    return `${yyyy}-${mm}-${dd}`;
  }

  function addLocalDays(date, days) {
    const next = new Date(date);
    next.setHours(0, 0, 0, 0);
    next.setDate(next.getDate() + days);
    return next;
  }

  function formatScheduleDayLabel(date) {
    const weekdays = ['일', '월', '화', '수', '목', '금', '토'];
    return `${date.getMonth() + 1}/${date.getDate()}(${weekdays[date.getDay()]})`;
  }

  let pendingBedScheduleDate = '';

  function renderBedScheduleCalendar(selectedDate = '') {
    const calendar = document.getElementById('bedScheduleCalendar');
    const customInput = document.getElementById('bedScheduleCustomInput');
    const confirmBtn = document.getElementById('bedScheduleConfirmBtn');
    if (!calendar) return;
    pendingBedScheduleDate = selectedDate || '';
    const today = addLocalDays(new Date(), 0);
    const presetDateItems = [];
    for (let offset = 1; presetDateItems.length < 7; offset += 1) {
      const date = addLocalDays(today, offset);
      if (date.getDay() === 0) continue;
      presetDateItems.push({ date, dateValue: toLocalDateInputValue(date), offset });
    }
    const presetDates = presetDateItems.map(item => item.dateValue);
    calendar.innerHTML = presetDateItems.map(({ date, dateValue, offset }) => {
      const className = [
        'bed-schedule-day',
        offset === 0 ? 'today' : '',
        dateValue === pendingBedScheduleDate ? 'selected' : ''
      ].filter(Boolean).join(' ');
      const label = offset === 0 ? `오늘 ${formatScheduleDayLabel(date)}` : formatScheduleDayLabel(date);
      return `<button type="button" class="${className}" onclick="selectBedScheduleDate('${dateValue}')">${escapeHtml(label)}</button>`;
    }).join('') + `<button type="button" class="bed-schedule-day${pendingBedScheduleDate && !presetDates.includes(pendingBedScheduleDate) ? ' selected' : ''}" onclick="openBedScheduleCustomDate()">기타</button>`;
    if (customInput) {
      customInput.min = toLocalDateInputValue(today);
      customInput.value = pendingBedScheduleDate && !presetDates.includes(pendingBedScheduleDate) ? pendingBedScheduleDate : '';
      customInput.classList.toggle('show', Boolean(customInput.value));
    }
    if (confirmBtn) confirmBtn.disabled = !pendingBedScheduleDate;
  }
