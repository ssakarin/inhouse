  window.handleTreatChipDragOver = (event, bedNo, toIndex) => {
    event.stopPropagation();
    if (!draggedTreatment || draggedTreatment.bedNo !== bedNo) return;
    if (draggedTreatment.fromIndex === toIndex) return;
    event.preventDefault();
    event.dataTransfer.dropEffect = 'move';
    event.currentTarget.classList.add('treat-drag-over');

  window.handleTreatChipDragLeave = (event) => {
    event.stopPropagation();
    event.currentTarget.classList.remove('treat-drag-over');

  window.handleTreatChipDragEnd = (event) => {
    event.stopPropagation();
    draggedTreatment = null;
    // 남아있는 스타일 정리
    document.querySelectorAll('.treat-drag-over, .treat-dragging').forEach(el => {
      el.classList.remove('treat-drag-over', 'treat-dragging');

  window.handleTreatChipDrop = async (event, bedNo, toIndex) => {
    event.stopPropagation();
    event.preventDefault();
    event.currentTarget.classList.remove('treat-drag-over');
    if (!draggedTreatment || draggedTreatment.bedNo !== bedNo) return;
    const fromIndex = draggedTreatment.fromIndex;
    draggedTreatment = null;
    if (fromIndex === toIndex) return;

    const bed = getBedData(bedNo);
    if (!bed) return;

    const treatments = [...(bed.treatments || [])];
    // 순서 교체
    const [moved] = treatments.splice(fromIndex, 1);
    treatments.splice(toIndex, 0, moved);

    const firstTreatment = treatments[0] || '';
    const firstTotal = getTreatmentSeconds(firstTreatment);
    const resetPayload = {
      treatments,
      currentIndex: 0,
      total: firstTotal,
      remaining: firstTotal,
      running: false,
      startedAt: null,
      complete: false,
      lastAlertId: null,
      lastAlertMessage: null,
      doctorProcedureAlert: null
    };

    try {
      await update(ref(db, `${BEDS_PATH}/${bedNo}`), resetPayload);
      if (bed.patientKey) {
        await update(ref(db, `${PATIENTS_PATH}/${bed.patientKey}`), { treatments });
      }
      clearLocalTimerAlertsForBed(bedNo);
    } catch(e) {
      console.error(e);
      showToast('순서 변경 실패 — 연결을 확인해주세요');
    }
  };

  async function removeTreatmentFromBed(bedNo, fromIndex) {
    const bed = getBedData(bedNo);
    if (!bed) return;

    const treatments = [...(bed.treatments || [])];
    if (!treatments[fromIndex]) return;
    if (treatments.length <= 1) {
      showToast('치료는 최소 1개가 필요합니다');
      return;
    }

    const [removed] = treatments.splice(fromIndex, 1);
    const firstTreatment = treatments[0] || '';
    const firstTotal = getTreatmentSeconds(firstTreatment);
    const resetPayload = {
      treatments,
      currentIndex: 0,
      total: firstTotal,
      remaining: firstTotal,
      running: false,
      startedAt: null,
      complete: false,
      lastAlertId: null,
      lastAlertMessage: null,
      doctorProcedureAlert: null
    };

    try {
      await update(ref(db, `${BEDS_PATH}/${bedNo}`), resetPayload);
      if (bed.patientKey) {
        await update(ref(db, `${PATIENTS_PATH}/${bed.patientKey}`), { treatments });
      }
      clearLocalTimerAlertsForBed(bedNo);
      showToast(`${removed} 제거 완료`);
    } catch(e) {
      console.error(e);
      showToast('치료 제거 실패 - 연결을 확인해주세요');

    event.preventDefault();

    const { bedNo, fromIndex } = draggedTreatment;
    draggedTreatment = null;

  function getBedStatus(bedNo) {
    const bed = getBedData(bedNo);
    const bedLabel = getBedLabel(bedNo);
    if (!bed) {
      return { bedNo, bedLabel, empty: true, stageState: 'empty', stageLabel: '비어 있음' };
    }

    const treatments = bed.treatments || [];
    const currentIndex = Number(bed.currentIndex || 0);
    const treatment = bed.complete ? '완료' : treatments[currentIndex];
    const remainingSeconds = getRemaining(bed);
    const totalSeconds = Number(bed.total || 0);
    const previousTreatment = currentIndex > 0 ? treatments[currentIndex - 1] : '';
    const lastTreatment = treatments[treatments.length - 1] || '';
    const procedureBlinking = isDoctorProcedureBlinking(bedNo, bed);
    const statusLabel = bed.complete
      ? (lastTreatment ? `${lastTreatment} 완료` : '완료')
      : (previousTreatment ? `${previousTreatment} 완료 ${treatment} 준비` : `${treatment} 준비`);
    const isWaitingToStart = !bed.complete && !bed.running && remainingSeconds >= totalSeconds;
    const stageState = bed.complete
      ? 'complete'
      : ((bed.running || procedureBlinking) ? 'running' : (isWaitingToStart ? 'ready' : 'paused'));
    const stageLabel = bed.complete
      ? '완료'
      : (bed.running ? '진행중' : (isWaitingToStart ? '시작 전' : '일시정지'));
    return {
      bedNo,
      bedLabel,
      empty: false,
      complete: bed.complete,
      alerting: Boolean(bed.lastAlertId),
      name: bed.name,
      doctorName: bed.doctorName || '',
      nurseName: bed.nurseName || '',
      treatment,
      statusLabel,
      stageState,
      stageLabel,
      statusDetail: bed.running ? `${treatment} 진행중` : (isWaitingToStart ? statusLabel : treatment),
      noTimer: !bed.complete && isNoTimerTreatment(treatments[currentIndex]),
      procedureBlinking,
      remaining: bed.complete ? '완료' : formatTimer(remainingSeconds),
      currentIndex,
      treatments,
      timeStr: bed.timeStr || '',
      visitType: bed.visitType || '',
      gender: bed.gender || '',
      age: bed.age || '',
      chiefComplaint: bed.chiefComplaint || '',
      memo: bed.memo || '',
      bodyParts: normalizeBodyParts(bed.bodyParts),
      pCredits: getPCreditsFromPatient(bed.patientKey ? patientsByKey.get(bed.patientKey) : {})
    };
  }

  function renderBedPopover(status) {

          <div class="bed-popover-line">현재 비어 있습니다</div>
        </div>`;
    }

    const chips = status.treatments.map((treatment, index) => {
      const chipClass = status.complete
        ? 'done'
        : (index < status.currentIndex ? 'done' : (index === status.currentIndex ? 'current' : 'waiting'));
      const runningClass = status.stageState === 'running' && index === status.currentIndex ? ' running' : '';
      return `<span class="bed-treatment-chip ${chipClass}${runningClass}" draggable="true"
        ondragstart="handleTreatChipDragStart(event,${status.bedNo},${index})"
        ondragover="handleTreatChipDragOver(event,${status.bedNo},${index})"
        ondrop="handleTreatChipDrop(event,${status.bedNo},${index})"
        ondragend="handleTreatChipDragEnd(event)"
        ondragleave="handleTreatChipDragLeave(event)"
      >${escapeHtml(treatment)}</span>`;

    return `
      <div class="bed-popover">

  function renderBedStatusCard(status, context) {

    const isEditingBed = compact && editingBedNo && status.bedNo === editingBedNo;
    const activeClass = [
      isEditingBed ? ' selected' : '',
      canMoveBed && status.bedNo === selectedMoveBedNo ? ' move-source' : '',
      canMoveBed && selectedMoveBedNo && status.bedNo !== selectedMoveBedNo ? ' move-target' : ''
    ].join('');

      ? ` onclick="handleInputBedClick(${status.bedNo})" oncontextmenu="confirmClearBed(event, ${status.bedNo})" ondragover="handleBedDragOver(event, ${status.bedNo})" ondrop="handleBedDrop(event, ${status.bedNo})"`

      const compactLabel = `${getCompactBedMarker(status.bedNo)} 비어 있음`;
      return `
        <div class="bed-status${compact ? ' compact' : ''}${activeClass}" tabindex="0"${moveHandlers}>

            <span class="bed-status-no">${compact ? escapeHtml(compactLabel) : `${escapeHtml(status.bedLabel)} 비어 있음`}</span>
            ${compact ? '' : '<span class="bed-status-time">-</span>'}
          </div>
          ${compact ? '' : '<div class="bed-status-treatment"><span class="bed-stage-badge empty">비어 있음</span></div>'}
          ${compact ? '' : renderBedPopover(status)}
        </div>`;
    }

    const clickAction = canMoveBed ? `handleInputBedClick(${status.bedNo})` : `selectReceiveBed(${status.bedNo})`;
    const dragHandlers = canMoveBed
      ? ` draggable="true" ondragstart="handleBedDragStart(event, ${status.bedNo})" ondragover="handleBedDragOver(event, ${status.bedNo})" ondrop="handleBedDrop(event, ${status.bedNo})" ondragend="handleBedDragEnd()"`
      : '';
    const infoChips = [
      status.gender ? `<span class="bed-meta-chip bed-meta-chip--fixed">${escapeHtml(status.gender)}</span>` : '',
      status.age ? `<span class="bed-meta-chip bed-meta-chip--fixed">${escapeHtml(String(status.age))}세</span>` : '',
      status.doctorName ? `<span class="bed-meta-chip">${escapeHtml(status.doctorName)}</span>` : '',

    ].filter(Boolean).join('');
    const staffHtml = [
      status.memo ? `<span class="bed-meta-chip bed-meta-chip--flex">메모있음</span>` : ''
    ].filter(Boolean).join('');
    const compactName = `${getCompactBedMarker(status.bedNo)} ${status.name}`;
    return `
      <div class="bed-status${compact ? ' compact' : ''}${status.complete ? ' done' : ' active'}${activeClass}${status.alerting ? ' alerting' : ''}" tabindex="0" onclick="${clickAction}"${dragHandlers}${canMoveBed ? ` oncontextmenu="confirmClearBed(event, ${status.bedNo})"` : ''}>
        <div class="bed-status-top">
          <span class="bed-status-no">${compact ? escapeHtml(compactName) : `${escapeHtml(status.bedLabel)} ${escapeHtml(status.name)}`}</span>
          ${compact ? '' : `<span class="bed-status-time">${status.noTimer ? '' : escapeHtml(status.remaining)}</span>`}
        </div>
        ${compact ? '' : (infoChips ? `<div class="bed-status-info">${infoChips}</div>` : '')}

  function isDoctorProcedureTreatment(treatment) {
    const name = String(treatment || '').trim();
    if (/약침/.test(name)) return true;
    return new Set([
      '왕뜸',
      '전자뜸',
      '전침',
      '진료',
      '진찰',
      '추나',
      '침',
      '건부항',
      '습부항'
    ]).has(name);
  }

  function getDoctorProcedureAlertId(bedNo, bed, treatment) {
    return `${bed.patientKey || bed.chartNo || bedNo}:${bedNo}:${Number(bed.currentIndex || 0)}:${treatment}`;
  }

  function getCurrentDoctorProcedureAlertId(bedNo, bed) {
    if (!bed || bed.complete) return '';
    const treatment = bed.treatments?.[bed.currentIndex || 0] || '';
    if (!isDoctorProcedureTreatment(treatment)) return '';
    return getDoctorProcedureAlertId(bedNo, bed, treatment);
  }

  function isDoctorProcedureAlertDismissed(bedNo, bed) {
    const alertId = getCurrentDoctorProcedureAlertId(bedNo, bed);
    return Boolean(alertId && bed?.doctorProcedureAlert?.id === alertId && bed.doctorProcedureAlert.dismissed);
  }

  function isDoctorProcedureBlinking(bedNo, bed) {
    return isDoctorProcedureAlertDismissed(bedNo, bed);
  }

  function getDoctorProcedureAlertItems() {
    if (!selectedDoctorAlertId) return [];
    return [...getDoctorBedNumbers(), ...ACTIVE_BED_NUMBERS]
      .map(bedNo => ({ bedNo, bed: getBedData(bedNo) }))
      .filter(({ bed }) => {
        if (!bed || bed.complete || bed.running) return false;
        if (bed.doctorId !== selectedDoctorAlertId) return false;
        const treatment = bed.treatments?.[bed.currentIndex || 0];
        return isDoctorProcedureTreatment(treatment);
      })
      .map(({ bedNo, bed }) => {
        const treatment = bed.treatments?.[bed.currentIndex || 0] || '침';
        const doctorName = bed.doctorName || staffByType.doctors.get(selectedDoctorAlertId)?.name || '원장';
        const alertId = getDoctorProcedureAlertId(bedNo, bed, treatment);
        if (isDoctorProcedureAlertDismissed(bedNo, bed)) return null;
        return {
          alertId,
          bedNo,
          doctorId: bed.doctorId || '',
          bedLabel: getBedLabel(bedNo),
          name: bed.name || '',
          treatment,
          timestamp: Number(bed.doctorProcedureAlert?.dismissedAt || bed.startedAt || bed.timestamp || 0),
          message: `${doctorName} 원장님 ${bed.name || '환자'} ${getBedLabel(bedNo)} ${treatment} 시술`

  function syncAssignedPatientKeys(showNewAssignments = false) {
    const allBeds = [
      ...bedAssignments.map((bed, index) => bed ? { bed, bedNo: index + 1 } : null).filter(Boolean),
      ...Object.entries(doctorBedMap).map(([bedNo, bed]) => ({ bed, bedNo: Number(bedNo) }))
    ];
    allBeds.forEach(({ bed, bedNo }) => {
      if (Number(bedNo) >= 101) return;
      if (!bed?.patientKey) return;
      const alreadyKnown = knownAssignedPatientKeys.has(bed.patientKey);
      knownAssignedPatientKeys.add(bed.patientKey);
      const isNewAfterPageLoad = Number(bed.timestamp || 0) > pageLoadedAt;
      if (!alreadyKnown && shouldShowAssignmentAlerts() && (showNewAssignments || isNewAfterPageLoad)) {
        const staffLine = [
          bed.doctorName ? `원장 ${escapeHtml(bed.doctorName)}` : '',
          bed.nurseName ? `간호사 ${escapeHtml(bed.nurseName)}` : ''
        ].filter(Boolean).join(' · ');
        assignmentAlertItems.unshift({
          id: `${bed.patientKey}-${bedNo}-${Date.now()}`,
          name: bed.name || '',
          bedLabel: getBedLabel(bedNo),
          staffLine
        });
        renderUpcomingAlerts();

    });

  function syncTimerAlertsWithBeds() {
    const activeAlertIds = getActiveBedAlertIds();
    let changed = false;

    if (activeTimerAlert?.alertId && !activeAlertIds.has(activeTimerAlert.alertId)) {
      activeTimerAlert = null;
      isTimerAlertOpen = false;
      document.getElementById('timerAlertOverlay').classList.remove('show');
      stopTimerAlertBeeps();
      changed = true;
    }

    for (let i = timerAlertQueue.length - 1; i >= 0; i--) {
      const alert = timerAlertQueue[i];
      if (alert.alertId && !activeAlertIds.has(alert.alertId)) {
        timerAlertQueue.splice(i, 1);
        changed = true;
      }
    }

    queuedTimerAlerts.forEach(alertId => {
      if (!activeAlertIds.has(alertId)) queuedTimerAlerts.delete(alertId);
    });
    seenTimerAlerts.forEach(alertId => {
      if (!activeAlertIds.has(alertId)) seenTimerAlerts.delete(alertId);
    });

    if (changed) syncPendingTimerAlertBeds();
  }

  function handleRemoteTimerAlerts(markOnly = false) {
    bedAssignments.forEach((bed, index) => {
      if (!bed?.lastAlertId || seenTimerAlerts.has(bed.lastAlertId)) return;
      seenTimerAlerts.add(bed.lastAlertId);
      if (markOnly) return;

  function playSoftTimerChime() {
    try {
      if (!timerAlertAudioCtx) {
        timerAlertAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      const ctx = timerAlertAudioCtx;
      const master = ctx.createGain();
      master.gain.setValueAtTime(0.42, ctx.currentTime);
      master.connect(ctx.destination);

      const notes = [
        { freq: 392.00, at: 0.00, volume: 0.13 },
        { freq: 493.88, at: 0.34, volume: 0.12 }
      ];

      notes.forEach(({ freq, at, volume }) => {
        const start = ctx.currentTime + at;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, start);
        osc.connect(gain);
        gain.connect(master);
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(volume, start + 0.08);
        gain.gain.exponentialRampToValueAtTime(0.001, start + 1.15);
        osc.start(start);
        osc.stop(start + 1.2);
      });
    } catch(e) {}
  }

  function startTimerAlertBeeps() {

    playSoftTimerChime();
    timerAlertBeepTimer = setInterval(playSoftTimerChime, 3000);
    timerAlertStopTimer = setTimeout(stopTimerAlertBeeps, 60000);

  function playTimerStartSound() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const now = ctx.currentTime;
      const notes = [
        { freq: 659.25, at: 0 },
        { freq: 987.77, at: 0.11 }
      ];

      notes.forEach(({ freq, at }) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const start = now + at;
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, start);
        osc.connect(gain);
        gain.connect(ctx.destination);
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(0.16, start + 0.025);
        gain.gain.exponentialRampToValueAtTime(0.001, start + 0.28);
        osc.start(start);
        osc.stop(start + 0.3);
      });
    } catch(e) {}
  }

  function showNextTimerAlert() {
    activeTimerAlert = timerAlertQueue.shift() || null;

    isTimerAlertOpen = true;

  function syncPendingTimerAlertBeds() {
    pendingTimerAlertBeds.clear();
    if (activeTimerAlert?.bedNo) pendingTimerAlertBeds.add(activeTimerAlert.bedNo);
    timerAlertQueue.forEach(alert => {
      if (alert.bedNo) pendingTimerAlertBeds.add(alert.bedNo);
    });
    renderBedMonitors();

  function syncDoctorProcedureAlerts() {
    const activeItems = getDoctorProcedureAlertItems();
    const activeIds = new Set(activeItems.map(item => item.alertId));

    if (activeDoctorProcedureAlert?.alertId && !activeIds.has(activeDoctorProcedureAlert.alertId)) {
      activeDoctorProcedureAlert = null;
    }

    for (let i = doctorProcedureAlertQueue.length - 1; i >= 0; i--) {
      if (!activeIds.has(doctorProcedureAlertQueue[i].alertId)) {
        queuedDoctorProcedureAlerts.delete(doctorProcedureAlertQueue[i].alertId);
        doctorProcedureAlertQueue.splice(i, 1);
      }
    }
  }

  function clearLocalTimerAlertsForBed(bedNo) {
    let changed = false;

    if (activeTimerAlert?.bedNo === bedNo) {
      if (activeTimerAlert.alertId) {
        queuedTimerAlerts.delete(activeTimerAlert.alertId);
        seenTimerAlerts.delete(activeTimerAlert.alertId);
      }
      activeTimerAlert = null;
      isTimerAlertOpen = false;
      document.getElementById('timerAlertOverlay').classList.remove('show');
      stopTimerAlertBeeps();
      changed = true;
    }

    for (let i = timerAlertQueue.length - 1; i >= 0; i--) {
      if (timerAlertQueue[i].bedNo === bedNo) {
        if (timerAlertQueue[i].alertId) {
          queuedTimerAlerts.delete(timerAlertQueue[i].alertId);
          seenTimerAlerts.delete(timerAlertQueue[i].alertId);
        }
        timerAlertQueue.splice(i, 1);
        changed = true;
      }
    }

    pendingTimerAlertBeds.delete(bedNo);
    if (changed) syncPendingTimerAlertBeds();
    else renderBedMonitors();
    if (changed && shouldShowAlerts() && !isTimerAlertOpen && timerAlertQueue.length > 0) {
      showNextTimerAlert();
    }
  }

  function showTimerCompleteAlert(message, bedNo = null, alertId = null) {
    if (alertId) seenTimerAlerts.add(alertId);
    renderBedDetail();
    renderBedMonitors();
  }

  async function acknowledgeTimerAlert(alert) {
    if (!alert?.bedNo || !alert?.alertId) return;

    await runTransaction(ref(db, `${BEDS_PATH}/${alert.bedNo}`), (bed) => {
      if (!bed || bed.lastAlertId !== alert.alertId) return bed;
      return {
        ...bed,
        lastAlertId: null,
        lastAlertMessage: null
      };
    });
  }

  window.acknowledgeBedAlert = async (bedNo) => {
    const bed = bedAssignments[bedNo - 1];
    if (!bed?.lastAlertId) return;
    const alertId = bed.lastAlertId;

    await runTransaction(ref(db, `${BEDS_PATH}/${bedNo}`), (currentBed) => {
      if (!currentBed || currentBed.lastAlertId !== alertId) return currentBed;
      return {
        ...currentBed,
        lastAlertId: null,
        lastAlertMessage: null
      };
    });

    queuedTimerAlerts.delete(alertId);
    seenTimerAlerts.delete(alertId);
    clearLocalTimerAlertsForBed(bedNo);
    renderBedDetail();
    renderBedMonitors();
  };

  window.closeTimerAlert = () => {
    stopTimerAlertBeeps();
    const alertToAcknowledge = activeTimerAlert;
    activeTimerAlert = null;
    acknowledgeTimerAlert(alertToAcknowledge);
    showNextTimerAlert();
  };

  window.openQueuedTimerAlertIfNeeded = () => {
    if (!shouldShowAlerts() || isTimerAlertOpen || timerAlertQueue.length === 0) return;
    showNextTimerAlert();
  };

  // ─── 팝업 ───────────────────────────────
  window.showPopup = (data) => {
    document.getElementById('popupName').textContent = data.name;
    document.getElementById('popupLabel').textContent = data.bedLabel ? `${data.bedLabel} 배정` : '진료 준비';
    document.getElementById('popupTreats').innerHTML = data.treatments.map(t => `<span class="popup-tag">${t}</span>`).join('');
    document.getElementById('notifOverlay').classList.add('show');
  };

  window.closePopup = () => {
    document.getElementById('notifOverlay').classList.remove('show');
  };

  // ─── 소리 ───────────────────────────────
  function playSound() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const notes = [523, 659, 784]; // C E G
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.15);
        gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + i * 0.15 + 0.05);
        gain.gain.linearRampToValueAtTime(0, ctx.currentTime + i * 0.15 + 0.4);
        osc.start(ctx.currentTime + i * 0.15);
        osc.stop(ctx.currentTime + i * 0.15 + 0.4);
      });
    } catch(e) {}
  }

  // 브라우저 권한 팝업은 입력 화면에서 방해되지 않도록 사용하지 않습니다.

  // ── 로컬 환자 차트 DB (IndexedDB) ────────────────────────────────
  const CHART_DB_NAME = 'patientChartDB';
  const CHART_STORE = 'patients';
  let _chartDb = null;

  function openChartDb() {
    return new Promise((resolve, reject) => {
      if (_chartDb) { resolve(_chartDb); return; }
      const req = indexedDB.open(CHART_DB_NAME, 1);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(CHART_STORE)) {
          db.createObjectStore(CHART_STORE, { keyPath: 'chartNo' });
        }
      };
      req.onsuccess = e => { _chartDb = e.target.result; resolve(_chartDb); };
      req.onerror = e => reject(e.target.error);
    });
  }

  async function lookupChartPatient(chartNo) {
    if (!chartNo) return null;
    try {
      const db = await openChartDb();
      return await new Promise((resolve, reject) => {
        const req = db.transaction(CHART_STORE, 'readonly').objectStore(CHART_STORE).get(chartNo);
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => reject(req.error);
      });
    } catch { return null; }
  }

  async function lookupChartPatientFlexible(rawChartNo) {
    const raw = String(rawChartNo ?? '').trim();
    const normalized = normalizeChartNo(raw);
    const excelText = raw.replace(/\.0$/, '');
    const candidates = [
      normalized,
      raw,
      excelText,
      normalizeChartNo(excelText)
    ].filter(Boolean);
    const uniqueCandidates = [...new Set(candidates)];
    for (const key of uniqueCandidates) {
      const patient = await lookupChartPatient(key);
      if (patient) return patient;
    }
    return null;
  }

  window.saveChartPatient = async function(data) {
    if (!data.chartNo) return;
    try {
      const db = await openChartDb();
      await new Promise((resolve, reject) => {
        const tx = db.transaction(CHART_STORE, 'readwrite');
        const store = tx.objectStore(CHART_STORE);
        const getReq = store.get(data.chartNo);
        getReq.onsuccess = () => {
          const existing = getReq.result || {};
          const next = { ...existing, ...data };
          if (data.appointmentDate === null) delete next.appointmentDate;
          store.put(next);
        };
        getReq.onerror = () => reject(getReq.error);
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
    } catch(e) { console.error('차트DB 저장 실패', e); }
  };

  async function getAllChartPatients() {
    try {
      const db = await openChartDb();
      return await new Promise((resolve, reject) => {
        const req = db.transaction(CHART_STORE, 'readonly').objectStore(CHART_STORE).getAll();
        req.onsuccess = () => resolve(Array.isArray(req.result) ? req.result : []);
        req.onerror = () => reject(req.error);
      });
    } catch {
      return [];
    }
  }

  async function refreshAppointmentAlerts() {
    renderUpcomingAlerts();
  }

  async function setPatientAppointment(patientKey, data, appointmentDate) {
    if (!patientKey || !appointmentDate) return false;
    const appointmentAlert = {
      date: appointmentDate,
      deskDismissed: false,
      receiveDismissed: false,
      notifyDismissed: false
    };
    await update(ref(db, `${PATIENTS_PATH}/${patientKey}`), {
      ...data,
      appointmentDate,
      appointmentAlert
    });
    patientsByKey.set(patientKey, {
      ...(patientsByKey.get(patientKey) || {}),
      ...data,
      appointmentDate,
      appointmentAlert
    });
    renderUpcomingAlerts();
    return true;
  }

  // 치료 항목을 폼에 적용 (데스크 숨김 그리드 포함)
  window.applyTreatmentsToForm = function(scope, treatmentNames) {
    const ids = PATIENT_FORM_IDS[scope] || PATIENT_FORM_IDS.desk;
    const gridId = ids.treatmentGrid;
    if (!gridId) return;
    treatmentSelections[gridId] = (treatmentNames || [])
      .map(name => TREATMENTS.find(t => t.name === name))
      .filter(Boolean);
    renderTreatmentChips(gridId);
    syncTreatBtnStates(gridId);
  };

  // 치료 부위를 폼에 적용
  window.applyBodyPartsToForm = function(scope, bodyParts) {
    formBodyPartsByScope[scope] = normalizeBodyParts(bodyParts);
    renderFormBodyPartSelector(scope);
  };

  window.clearChartLookupBadge = function() {
    const badge = document.getElementById('chartLookupBadge');
    if (badge) { badge.textContent = ''; badge.className = 'chart-lookup-badge'; }
  };

  // ── 차트 DB 건수 표시 ─────────────────────────────────────────────
  async function updateChartDbCount() {
    try {
      const db = await openChartDb();
      const count = await new Promise((resolve, reject) => {
        const req = db.transaction(CHART_STORE, 'readonly').objectStore(CHART_STORE).count();
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
      const el = document.getElementById('chartDbCountText');
      if (el) el.textContent = `저장된 환자 ${count.toLocaleString()}명`;
    } catch {}
  }
  window.updateChartDbCount = updateChartDbCount;

  // ── 차트 DB 전체 삭제 ─────────────────────────────────────────────
  window.clearChartDb = async function() {
    if (!confirm('로컬 환자 차트 DB를 전체 삭제하시겠습니까?')) return;
    try {
      const db = await openChartDb();
      await new Promise((resolve, reject) => {
        const tx = db.transaction(CHART_STORE, 'readwrite');
        tx.objectStore(CHART_STORE).clear();
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
      updateChartDbCount();
      refreshAppointmentAlerts();
      document.getElementById('chartImportStatus').textContent = '전체 삭제 완료';
    } catch(e) { alert('삭제 실패: ' + e.message); }
  };

  refreshAppointmentAlerts();

  // ── XLS / XLSX / CSV import ────────────────────────────────────────
  function detectColumn(headers, candidates) {
    return headers.find(h => candidates.some(c => String(h).replace(/\s/g, '').includes(c))) ?? null;
  }

  window.importChartFile = async function(file) {
    if (!file) return;
    const statusEl = document.getElementById('chartImportStatus');
    statusEl.textContent = '파일 읽는 중...';

    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: 'array', cellText: true, cellDates: false });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: '', raw: false });

      if (!rows.length) { statusEl.textContent = '데이터가 없습니다'; return; }

      const headers = Object.keys(rows[0]);

      // 컬럼 자동 매핑
      const colName   = detectColumn(headers, ['수진자명','환자명','이름','환자이름','성명']);
      const colChart  = detectColumn(headers, ['차트번호','레지스터번호','환자번호','등록번호','차트']);
      const colAgeSex = detectColumn(headers, ['연령/성별','연령성별','나이/성별']);
      const colAge    = colAgeSex ?? detectColumn(headers, ['연령','나이','Age']);
      const colSex    = colAgeSex ?? detectColumn(headers, ['성별','Sex','Gender']);
      const colDiag   = detectColumn(headers, ['주상병명']);

      if (!colChart) { statusEl.textContent = '❌ 차트번호 컬럼을 찾을 수 없습니다. 컬럼명을 확인해주세요.'; return; }
      if (!colName)  { statusEl.textContent = '❌ 환자명 컬럼을 찾을 수 없습니다.'; return; }

      statusEl.textContent = `컬럼 감지 완료 → 저장 중...`;

      const db = await openChartDb();
      let saved = 0, skipped = 0;

      const BATCH = 500;
      for (let i = 0; i < rows.length; i += BATCH) {
        const batch = rows.slice(i, i + BATCH);
        await new Promise((resolve, reject) => {
          const tx = db.transaction(CHART_STORE, 'readwrite');
          const store = tx.objectStore(CHART_STORE);
          for (const row of batch) {
            const chartNo = normalizeChartNo(String(row[colChart] || '').trim().replace(/\.0$/, ''));
            const name    = String(row[colName]  || '').trim();
            if (!chartNo || !name) { skipped++; continue; }

            // 연령/성별 파싱 (예: "45/남", "38세/여", "45남")
            let age = '', gender = '';
            if (colAgeSex) {
              const raw = String(row[colAgeSex] || '');
              const m = raw.match(/(\d+)[^\d]*(남|여)/);
              if (m) { age = m[1]; gender = m[2]; }
              else { const n = raw.match(/(\d+)/); if (n) age = n[1]; }
            } else {
              if (colAge !== colAgeSex) age = String(row[colAge] || '').replace(/[^0-9]/g, '');
              if (colSex !== colAgeSex) {
                const s = String(row[colSex] || '');
                gender = s.includes('여') ? '여' : s.includes('남') ? '남' : '';
              }
            }

            const chiefComplaint = colDiag ? String(row[colDiag] || '').trim() : '';

            store.put({ chartNo, name, age: age ? Number(age) : '', gender, chiefComplaint, memo: '', packages: createEmptyPackageState(), ...normalizePCredits() });
            saved++;
          }
          tx.oncomplete = resolve;
          tx.onerror = () => reject(tx.error);
        });
        statusEl.textContent = `저장 중... ${Math.min(i + BATCH, rows.length)} / ${rows.length}`;
      }

      updateChartDbCount();
      refreshAppointmentAlerts();
      statusEl.textContent = `✅ ${saved.toLocaleString()}명 저장 완료${skipped ? ` (${skipped}건 건너뜀)` : ''}`;
    } catch(e) {
      console.error(e);
      statusEl.textContent = '❌ 오류: ' + e.message;
    }
  };

  window.handleChartNoLookup = async function(scope = 'desk') {
    const ids = PATIENT_FORM_IDS[scope] || PATIENT_FORM_IDS.desk;
    const chartNoEl = document.getElementById(ids.chartNo);
    const rawChartNo = chartNoEl?.value?.trim() || '';
    const chartNo = normalizeChartNo(rawChartNo);
    if (!chartNo) { document.getElementById(ids.name)?.focus(); return; }
    if (chartNoEl) chartNoEl.value = chartNo;

    const badge = document.getElementById('chartLookupBadge');
    const patient = await lookupChartPatientFlexible(rawChartNo);

    if (patient) {
      document.getElementById(ids.name).value = patient.name || '';
      document.getElementById(ids.age).value = patient.age || '';
      document.getElementById(ids.chiefComplaint).value = patient.chiefComplaint || '';
      document.getElementById(ids.memo).value = patient.memo || '';
      document.querySelector(`input[name="${ids.visitType}"][value="재진"]`)?.click();
      document.querySelector(`input[name="${ids.gender}"][value="${patient.gender || '남'}"]`)?.click();
      // 치료 항목 복원
      window.applyTreatmentsToForm?.(scope, patient.treatments || []);
      // 치료 부위 복원
      window.applyBodyPartsToForm?.(scope, patient.bodyParts);
      window.updateCreditChip?.(ids.treatmentGrid, patient);
      if (badge && scope === 'desk') {
        badge.textContent = '재';
        badge.className = 'chart-lookup-badge returning';
      }
    } else {
      document.getElementById(ids.name).value = '';
      document.getElementById(ids.age).value = '';
      document.getElementById(ids.chiefComplaint).value = '';
      document.getElementById(ids.memo).value = '';
      document.querySelector(`input[name="${ids.visitType}"][value="초진"]`)?.click();
      window.applyTreatmentsToForm?.(scope, []);
      window.applyBodyPartsToForm?.(scope, null);
      resetPCredits(ids.treatmentGrid);
      if (badge && scope === 'desk') {
        badge.textContent = '초';
        badge.className = 'chart-lookup-badge new';
      }
    }
    document.getElementById(ids.name)?.focus();
  };
</script>

<script>
  const FALLBACK_CHART_DB_NAME = 'patientChartDB';
  const FALLBACK_CHART_STORE = 'patients';
  let fallbackChartDb = null;

  function fallbackNormalizeChartNo(value) {
    const text = String(value ?? '').trim();
    if (!/^\d+$/.test(text)) return text;
    return text.replace(/^0+(?=\d)/, '');
  }

  function fallbackOpenChartDb() {
    return new Promise((resolve, reject) => {
      if (fallbackChartDb) { resolve(fallbackChartDb); return; }
      const req = indexedDB.open(FALLBACK_CHART_DB_NAME, 1);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(FALLBACK_CHART_STORE)) {
          db.createObjectStore(FALLBACK_CHART_STORE, { keyPath: 'chartNo' });
        }
      };
      req.onsuccess = e => { fallbackChartDb = e.target.result; resolve(fallbackChartDb); };
      req.onerror = e => reject(e.target.error);
    });
  }

  async function fallbackLookupChartPatient(chartNo) {
    if (!chartNo) return null;
    try {
      const db = await fallbackOpenChartDb();
      return await new Promise((resolve, reject) => {
        const req = db.transaction(FALLBACK_CHART_STORE, 'readonly').objectStore(FALLBACK_CHART_STORE).get(chartNo);
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => reject(req.error);
      });
    } catch {
      return null;
    }
  }

  async function fallbackLookupChartPatientFlexible(rawChartNo) {
    const raw = String(rawChartNo ?? '').trim();
    const excelText = raw.replace(/\.0$/, '');
    const candidates = [
      fallbackNormalizeChartNo(raw),
      raw,
      excelText,
      fallbackNormalizeChartNo(excelText)
    ].filter(Boolean);
    for (const key of [...new Set(candidates)]) {
      const patient = await fallbackLookupChartPatient(key);
      if (patient) return patient;
    }
    return null;
  }

  async function runDeskChartNoLookup() {
    if (typeof window.handleChartNoLookup === 'function') {
      await window.handleChartNoLookup('desk');
      return;
    }

    const chartNoEl = document.getElementById('chartNo');
    const rawChartNo = chartNoEl?.value?.trim() || '';
    const chartNo = fallbackNormalizeChartNo(rawChartNo);
    if (!chartNo) { document.getElementById('patientName')?.focus(); return; }
    if (chartNoEl) chartNoEl.value = chartNo;

    const patient = await fallbackLookupChartPatientFlexible(rawChartNo);
    const badge = document.getElementById('chartLookupBadge');
    if (patient) {
      document.getElementById('patientName').value = patient.name || '';
      document.getElementById('ageInput').value = patient.age || '';
      document.getElementById('chiefComplaint').value = patient.chiefComplaint || '';
      document.getElementById('memoInput').value = patient.memo || '';
      document.querySelector('input[name="visitType"][value="재진"]')?.click();
      document.querySelector(`input[name="gender"][value="${patient.gender || '남'}"]`)?.click();
      if (badge) {
        badge.textContent = '재';
        badge.className = 'chart-lookup-badge returning';
      }
    } else {
      document.getElementById('patientName').value = '';
      document.getElementById('ageInput').value = '';
      document.getElementById('chiefComplaint').value = '';
      document.getElementById('memoInput').value = '';
      document.querySelector('input[name="visitType"][value="초진"]')?.click();
      if (badge) {
        badge.textContent = '초';
        badge.className = 'chart-lookup-badge new';
      }
    }
    document.getElementById('patientName')?.focus();
  }
  window.runDeskChartNoLookup = runDeskChartNoLookup;

  // 모드 전환
  const VIEW_TO_MODE = {
    desk: 'input',
    doctor: 'doctor',
    notify: 'notify',
    clinic: 'receive',
    bed: 'bed'
  };

  function getAppView() {
    const view = (new URLSearchParams(window.location.search).get('view') || '').toLowerCase();
    return Object.prototype.hasOwnProperty.call(VIEW_TO_MODE, view) ? view : '';
  }

  function getModeFromView() {
    const view = getAppView();
    return view ? VIEW_TO_MODE[view] : '';
  }

  function getFixedBedNoFromUrl() {
    const value = Number(new URLSearchParams(window.location.search).get('bed'));
    return Number.isInteger(value) && value >= 1 && value <= 15 && value !== 7 ? value : 0;
  }

  function getInitialMode() {
    return getModeFromView() || 'input';
  }

  function syncAppViewClass() {
    const view = getAppView();
    document.body.classList.toggle('app-role-locked', Boolean(view));
    ['desk', 'doctor', 'notify', 'clinic', 'bed'].forEach(name => {
      document.body.classList.toggle(`app-role-${name}`, view === name);
    });
    document.body.classList.toggle(
      'app-fixed-bed',
      view === 'bed' && Boolean(getFixedBedNoFromUrl())
    );
  }

  function getFixedBedArrivalBedNo() {
    const fixedBedNo = getFixedBedNoFromUrl();
    if (fixedBedNo) return fixedBedNo;
    return window.currentMode === 'bed' ? selectedBedNo : 0;
  }

  function getFixedBedArrivalSeenStorageKey(bedNo) {
    return `fixedBedArrivalSeen:${bedNo}`;
  }

  function hideFixedBedArrivalOverlay() {
    const overlay = document.getElementById('bedArrivalOverlay');
    if (overlay) overlay.classList.remove('show');
    fixedBedArrivalVisiblePatientKey = '';
  }

  function syncFixedBedArrivalOverlay() {
    const bedNo = getFixedBedArrivalBedNo();
    const overlay = document.getElementById('bedArrivalOverlay');
    const nameEl = document.getElementById('bedArrivalName');
    if (!overlay || !nameEl || !bedNo) {
      hideFixedBedArrivalOverlay();
      return;
    }

    const bed = getBedData(bedNo);
    const patientKey = bed?.patientKey ? String(bed.patientKey) : '';
    if (!patientKey) {
      localStorage.removeItem(getFixedBedArrivalSeenStorageKey(bedNo));
      hideFixedBedArrivalOverlay();
      return;
    }

    if (localStorage.getItem(getFixedBedArrivalSeenStorageKey(bedNo)) === patientKey) {
      hideFixedBedArrivalOverlay();
      return;
    }

    fixedBedArrivalVisiblePatientKey = patientKey;
    nameEl.textContent = bed.name || '';
    overlay.classList.add('show');
  }

  window.openFixedBedArrival = () => {
    const bedNo = getFixedBedArrivalBedNo();
    if (!bedNo) {
      hideFixedBedArrivalOverlay();
      return;
    }
    const patientKey = fixedBedArrivalVisiblePatientKey || String(getBedData(bedNo)?.patientKey || '');
    if (patientKey) localStorage.setItem(getFixedBedArrivalSeenStorageKey(bedNo), patientKey);
    selectedBedNo = bedNo;
    hideFixedBedArrivalOverlay();
    renderBedSelector();
    renderBedDetail();
    updateBedHeaderBedChip();
    updateBedRemainingChip();
  };

  function setMode(mode, updateHash = true) {
    const fixedMode = getModeFromView();
    if (fixedMode) mode = fixedMode;
    window.currentMode = mode;
    document.getElementById('inputPanel').classList.toggle('active', mode === 'input');
    document.getElementById('receivePanel').classList.toggle('active', mode === 'doctor' || mode === 'receive' || mode === 'notify');
    document.getElementById('bedPanel').classList.toggle('active', mode === 'bed');
    document.getElementById('settingsPanel').classList.toggle('active', mode === 'settings');
    ['input', 'doctor', 'notify', 'receive', 'bed', 'settings'].forEach(name => {
      document.body.classList.toggle(`app-mode-${name}`, mode === name);
    });
    const modes = ['input', 'doctor', 'notify', 'receive', 'bed', 'settings'];
    document.querySelectorAll('.mode-btn').forEach((btn, i) => {
      btn.classList.toggle('active', modes[i] === mode);
    });
    if (updateHash && !fixedMode && window.location.hash) {
      history.replaceState(null, '', window.location.pathname + window.location.search);
    }
    window.updateBedHeaderBedChip?.();
    window.updateBedRemainingChip?.();
    if (mode === 'bed') window.openQueuedTimerAlertIfNeeded?.();
    window.updateReceiveAlertAudioState?.();
    if (mode === 'settings') window.updateChartDbCount?.();
    if (mode === 'notify') setReceiveFormOpen(false);
    syncDoctorProcedureAlerts();
    renderUpcomingAlerts();
    syncFixedBedArrivalOverlay();
  }

  function setInputFormOpen(open) {
    const panel = document.getElementById('inputPanel');
    const button = document.getElementById('inputFormToggle');
    const column = panel?.querySelector('.input-form-column');
    const detailColumn = panel?.querySelector('.input-detail-column');
    if (!panel) return;
    panel.classList.toggle('input-form-open', Boolean(open));
    if (column) {
      column.hidden = !open;
      if (open) {
        column.style.removeProperty('display');
      } else {
        column.style.display = 'none';
      }
    }
    if (detailColumn) {
      detailColumn.hidden = Boolean(open);
      if (open) {
        detailColumn.style.display = 'none';
      } else {
        detailColumn.style.removeProperty('display');
      }
    }
    if (button) {
      button.textContent = open ? '‹' : '›';
      button.dataset.open = open ? '1' : '0';
      button.setAttribute('aria-label', open ? '입력 닫기' : '입력 열기');
      button.title = open ? '입력 닫기' : '입력 열기';
    }
    const headerButton = document.getElementById('deskInputHeaderBtn');
    if (headerButton) {
      headerButton.textContent = open ? '‹' : '›';
      headerButton.classList.toggle('active', Boolean(open));
      headerButton.setAttribute('aria-label', open ? '입력 닫기' : '입력 열기');
      headerButton.title = open ? '입력 닫기' : '입력 열기';
    }
    window.renderBedMonitors?.();
  }

  function resetDeskInputToggles() {
    document.querySelector('input[name="visitType"][value="초진"]')?.click();
    document.querySelector('input[name="gender"][value="남"]')?.click();
    window.clearChartLookupBadge?.();
    resetPCredits('treatmentGrid');
  }

  window.openDeskInputForm = () => {
    window.setFormEditMode?.('desk', null);
    window.populatePatientForm?.('desk', null);
    resetDeskInputToggles();
    setInputFormOpen(true);
    window.applyRoundRobinNurseToForm?.('desk');
  };

  window.toggleDeskInputForm = () => {
    const isOpen = document.getElementById('inputPanel')?.classList.contains('input-form-open');
    if (isOpen) {
      setInputFormOpen(false);
      window.setFormEditMode?.('desk', null);
      window.populatePatientForm?.('desk');
      resetDeskInputToggles();
    } else {
      window.openDeskInputForm?.();
    }
  };

  window.toggleInputForm = () => {
    const button = document.getElementById('inputFormToggle');
    const shouldClose = button?.getAttribute('aria-label')?.includes('닫기');
    if (shouldClose) {
      setInputFormOpen(false);
      window.setFormEditMode?.('desk', null);
      window.populatePatientForm?.('desk');
      resetDeskInputToggles();
    } else {
      window.setFormEditMode?.('desk', null);
      setInputFormOpen(true);
      window.populatePatientForm?.('desk');
      resetDeskInputToggles();
      window.applyRoundRobinNurseToForm?.('desk');
    }
  };

  function setReceiveFormOpen(open) {
    const panel = document.getElementById('receivePanel');
    const button = document.getElementById('receiveFormToggle');
    const column = panel?.querySelector('.receive-form-column');
    if (!panel) return;
    panel.classList.toggle('receive-form-open', Boolean(open));
    if (!open) panel.classList.remove('receive-edit-open');
    if (column) {
      column.hidden = !open;
      if (open) {
        column.style.removeProperty('display');
      } else {
        column.style.display = 'none';
      }
    }
    if (button) {
      button.textContent = open ? '‹' : '›';
      button.dataset.open = open ? '1' : '0';
      button.setAttribute('aria-label', open ? '입력 닫기' : '입력 열기');
      button.title = open ? '입력 닫기' : '입력 열기';
    }
    window.renderBedMonitors?.();
  }

  window.toggleReceiveForm = () => {
    const button = document.getElementById('receiveFormToggle');
    const shouldClose = button?.getAttribute('aria-label')?.includes('닫기');
    if (shouldClose) {
      setReceiveFormOpen(false);
      window.setFormEditMode?.('receive', null);
      setWaitingPatientEditMode('receive', null);
      window.populatePatientForm?.('receive');
    } else {
      document.getElementById('receivePanel')?.classList.remove('receive-edit-open');
      window.setFormEditMode?.('receive', null);
      setWaitingPatientEditMode('receive', null);
      setReceiveFormOpen(true);
      window.populatePatientForm?.('receive');
      window.applyRoundRobinNurseToForm?.('receive');
    }
  };

  // 토스트
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // 엔터키로 전송
  document.addEventListener('DOMContentLoaded', () => {
    syncAppViewClass();
    setMode(getInitialMode(), false);
    setInputFormOpen(false);
    setReceiveFormOpen(false);
    const nurseRrInput = document.getElementById('nurseRrEnabled');
    if (nurseRrInput) nurseRrInput.checked = nurseRrEnabled;
    const autoBedAssignInput = document.getElementById('autoBedAssignEnabled');
    if (autoBedAssignInput) autoBedAssignInput.checked = autoBedAssignEnabled;

    // 차트번호 Enter/변경 → 로컬 차트 조회
    document.getElementById('chartNo')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); runDeskChartNoLookup(); }
    });
    document.getElementById('chartNo')?.addEventListener('change', () => runDeskChartNoLookup());
    // 차트번호 입력 중에는 배지 초기화
    document.getElementById('chartNo')?.addEventListener('input', () => window.clearChartLookupBadge?.());

    document.getElementById('patientName').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('submitBtn').click();
    });
    document.getElementById('receivePatientName')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('receiveSubmitBtn').click();
    });
    document.getElementById('bedPatientName')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('bedSubmitBtn').click();
    });
    document.getElementById('bedMemoInput')?.addEventListener('input', () => {
      const open = document.getElementById('bedMemoWrap')?.classList.contains('open');
      setBedMemoOpen(open);
    });
    document.getElementById('doctorNameInput')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') addStaff('doctors');
    });
    document.getElementById('nurseNameInput')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') addStaff('nurses');
    });
  });
</script>
</body>
</html>
