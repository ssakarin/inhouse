  function ensureBedTicker() {
    if (bedRenderTicker) return;

    bedRenderTicker = setInterval(() => {
      const tickBed = (bed, bedNo) => {
        if (!bed || bed.complete) return;
        if (bed.running && getRemaining(bed) <= 0) {
          finishBedStep(bedNo);
        } else {
          updateTimerDom(bedNo);
        }
      };
      bedAssignments.forEach((bed, index) => tickBed(bed, index + 1));
      Object.entries(doctorBedMap).forEach(([bedNo, bed]) => tickBed(bed, Number(bedNo)));
      renderUpcomingAlerts();
      updateDeskWaitChip();
      updateBedRemainingChip();
      syncDoctorProcedureAlerts();
    }, 1000);
  }

  function playSoftTimerChime() {
    try {
      if (!timerAlertAudioCtx) {
        timerAlertAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      const ctx = timerAlertAudioCtx;
      const master = ctx.createGain();
      master.gain.setValueAtTime(0.42, ctx.currentTime);
      master.connect(ctx.destination);

      const notes = [
        { freq: 392.00, at: 0.00, volume: 0.13 },
        { freq: 493.88, at: 0.34, volume: 0.12 }
      ];

      notes.forEach(({ freq, at, volume }) => {
        const start = ctx.currentTime + at;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, start);
        osc.connect(gain);
        gain.connect(master);
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(volume, start + 0.08);
        gain.gain.exponentialRampToValueAtTime(0.001, start + 1.15);
        osc.start(start);
        osc.stop(start + 1.2);
      });
    } catch(e) {}
  }

  function startTimerAlertBeeps() {
    stopTimerAlertBeeps();
    playSoftTimerChime();
    timerAlertBeepTimer = setInterval(playSoftTimerChime, 3000);
    timerAlertStopTimer = setTimeout(stopTimerAlertBeeps, 60000);
  }

  function stopTimerAlertBeeps() {
    if (timerAlertBeepTimer) clearInterval(timerAlertBeepTimer);
    if (timerAlertStopTimer) clearTimeout(timerAlertStopTimer);
    timerAlertBeepTimer = null;
    timerAlertStopTimer = null;
  }

  function stopReceiveAlertBeeps() {
    if (receiveAlertBeepTimer) clearInterval(receiveAlertBeepTimer);
    receiveAlertBeepTimer = null;
  }

  function shouldPlayAlertListAudio() {
    if (window.currentMode !== 'receive') return false;
    return getAllBedEntries().some(({ bed }) => Boolean(bed?.lastAlertId));
  }

  function startAlertListBeeps() {
    const intervalMs = window.currentMode === 'doctor' ? 20000 : 8000;
    if (alertListBeepTimer && alertListBeepIntervalMs === intervalMs) return;
    if (alertListBeepTimer) clearInterval(alertListBeepTimer);
    alertListBeepIntervalMs = intervalMs;
    playSoftTimerChime();
    alertListBeepTimer = setInterval(playSoftTimerChime, intervalMs);
  }

  function stopAlertListBeeps() {
    if (alertListBeepTimer) clearInterval(alertListBeepTimer);
    alertListBeepTimer = null;
    alertListBeepIntervalMs = 0;
  }

  function updateAlertListAudioState() {
    stopReceiveAlertBeeps();
    if (shouldPlayAlertListAudio()) startAlertListBeeps();
    else stopAlertListBeeps();
  }
  window.updateAlertListAudioState = updateAlertListAudioState;

  function updateReceiveAlertAudioState() {
    updateAlertListAudioState();
  }
  window.updateReceiveAlertAudioState = updateReceiveAlertAudioState;

  function playTimerStartSound() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const now = ctx.currentTime;
      const notes = [
        { freq: 659.25, at: 0 },
        { freq: 987.77, at: 0.11 }
      ];

      notes.forEach(({ freq, at }) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const start = now + at;
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, start);
        osc.connect(gain);
        gain.connect(ctx.destination);
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(0.16, start + 0.025);
        gain.gain.exponentialRampToValueAtTime(0.001, start + 0.28);
        osc.start(start);
        osc.stop(start + 0.3);
      });
    } catch(e) {}
  }

  function showNextTimerAlert() {
    activeTimerAlert = timerAlertQueue.shift() || null;
    if (!activeTimerAlert) {
      isTimerAlertOpen = false;
      document.getElementById('timerAlertOverlay').classList.remove('show');
      stopTimerAlertBeeps();
      syncPendingTimerAlertBeds();
      return;
    }

    isTimerAlertOpen = true;
    document.getElementById('timerAlertBody').textContent = activeTimerAlert.message;
    document.getElementById('timerAlertOverlay').classList.add('show');
    startTimerAlertBeeps();
    syncPendingTimerAlertBeds();
  }

  function syncPendingTimerAlertBeds() {
    pendingTimerAlertBeds.clear();
    if (activeTimerAlert?.bedNo) pendingTimerAlertBeds.add(activeTimerAlert.bedNo);
    timerAlertQueue.forEach(alert => {
      if (alert.bedNo) pendingTimerAlertBeds.add(alert.bedNo);
    });
    renderBedMonitors();
  }

  function syncDoctorProcedureAlerts() {
    const activeItems = getDoctorProcedureAlertItems();
    const activeIds = new Set(activeItems.map(item => item.alertId));

    if (activeDoctorProcedureAlert?.alertId && !activeIds.has(activeDoctorProcedureAlert.alertId)) {
      activeDoctorProcedureAlert = null;
    }

    for (let i = doctorProcedureAlertQueue.length - 1; i >= 0; i--) {
      if (!activeIds.has(doctorProcedureAlertQueue[i].alertId)) {
        queuedDoctorProcedureAlerts.delete(doctorProcedureAlertQueue[i].alertId);
        doctorProcedureAlertQueue.splice(i, 1);
      }
    }
  }

  function clearLocalTimerAlertsForBed(bedNo) {
    let changed = false;

    if (activeTimerAlert?.bedNo === bedNo) {
      if (activeTimerAlert.alertId) {
        queuedTimerAlerts.delete(activeTimerAlert.alertId);
        seenTimerAlerts.delete(activeTimerAlert.alertId);
      }
      activeTimerAlert = null;
      isTimerAlertOpen = false;
      document.getElementById('timerAlertOverlay').classList.remove('show');
      stopTimerAlertBeeps();
      changed = true;
    }

    for (let i = timerAlertQueue.length - 1; i >= 0; i--) {
      if (timerAlertQueue[i].bedNo === bedNo) {
        if (timerAlertQueue[i].alertId) {
          queuedTimerAlerts.delete(timerAlertQueue[i].alertId);
          seenTimerAlerts.delete(timerAlertQueue[i].alertId);
        }
        timerAlertQueue.splice(i, 1);
        changed = true;
      }
    }

    pendingTimerAlertBeds.delete(bedNo);
    if (changed) syncPendingTimerAlertBeds();
    else renderBedMonitors();
    if (changed && shouldShowAlerts() && !isTimerAlertOpen && timerAlertQueue.length > 0) {
      showNextTimerAlert();
    }
  }

  function showTimerCompleteAlert(message, bedNo = null, alertId = null) {
    if (alertId) seenTimerAlerts.add(alertId);
    renderBedDetail();
    renderBedMonitors();
  }

  async function acknowledgeTimerAlert(alert) {
    if (!alert?.bedNo || !alert?.alertId) return;

    await runBedRecordTransaction(alert.bedNo, (bed) => {
      if (!bed || bed.lastAlertId !== alert.alertId) return bed;
      return {
        ...bed,
        lastAlertId: null,
        lastAlertMessage: null
      };
    });
  }

  window.acknowledgeBedAlert = async (bedNo) => {
    const bed = getBedData(bedNo);
    if (!bed?.lastAlertId) return;
    const alertId = bed.lastAlertId;

    await runBedRecordTransaction(bedNo, (currentBed) => {
      if (!currentBed || currentBed.lastAlertId !== alertId) return currentBed;
      return {
        ...currentBed,
        lastAlertId: null,
        lastAlertMessage: null
      };
    });

    queuedTimerAlerts.delete(alertId);
    seenTimerAlerts.delete(alertId);
    clearLocalTimerAlertsForBed(bedNo);
    renderBedDetail();
    renderBedMonitors();
  };

  window.closeTimerAlert = () => {
    stopTimerAlertBeeps();
    const alertToAcknowledge = activeTimerAlert;
    activeTimerAlert = null;
    acknowledgeTimerAlert(alertToAcknowledge);
    showNextTimerAlert();
  };

  function playSound() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const notes = [523, 659, 784]; // C E G
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.15);
        gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + i * 0.15 + 0.05);
        gain.gain.linearRampToValueAtTime(0, ctx.currentTime + i * 0.15 + 0.4);
        osc.start(ctx.currentTime + i * 0.15);
        osc.stop(ctx.currentTime + i * 0.15 + 0.4);
      });
    } catch(e) {}
  }

  // ── 로컬 환자 차트 DB (IndexedDB) ────────────────────────────────
  const CHART_DB_NAME = 'patientChartDB';
  const CHART_STORE = 'patients';
  let _chartDb = null;

  function openChartDb() {
    return new Promise((resolve, reject) => {
      if (_chartDb) { resolve(_chartDb); return; }
      const req = indexedDB.open(CHART_DB_NAME, 1);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(CHART_STORE)) {
          db.createObjectStore(CHART_STORE, { keyPath: 'chartNo' });
        }
      };
      req.onsuccess = e => { _chartDb = e.target.result; resolve(_chartDb); };
      req.onerror = e => reject(e.target.error);
    });
  }

  async function lookupChartPatient(chartNo) {
    if (!chartNo) return null;
    if (SERVER_MODE) {
      try {
        const res = await fetch(`/api/patients/${encodeURIComponent(chartNo)}`, { cache: 'no-store' });
        if (res.status === 404) return null;
        if (!res.ok) throw new Error('server patient lookup failed');
        return await res.json();
      } catch (error) {
        console.error('서버 차트 조회 실패', error);
        return null;
      }
    }
    try {
      const db = await openChartDb();
      return await new Promise((resolve, reject) => {
        const req = db.transaction(CHART_STORE, 'readonly').objectStore(CHART_STORE).get(chartNo);
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => reject(req.error);
      });
    } catch { return null; }
  }

  async function lookupChartPatientFlexible(rawChartNo) {
    const raw = String(rawChartNo ?? '').trim();
    const normalized = normalizeChartNo(raw);
    const excelText = raw.replace(/\.0$/, '');
    const candidates = [
      normalized,
      raw,
      excelText,
      normalizeChartNo(excelText)
    ].filter(Boolean);
    const uniqueCandidates = [...new Set(candidates)];
    for (const key of uniqueCandidates) {
      const patient = await lookupChartPatient(key);
      if (patient) return patient;
    }
    return null;
  }

  window.saveChartPatient = async function(data) {
    if (!data.chartNo) return;
    try {
      if (SERVER_MODE) {
        const existing = await lookupChartPatient(data.chartNo) || {};
        const { visitEntry, visitEntries, ...plainData } = data;
        const visitPatch = mergeChartVisitHistory(existing, { visitEntry, visitEntries });
        const { latestVisit, latestChiefComplaint, ...visitFields } = visitPatch;
        const next = { ...existing, ...plainData, ...visitFields };
        if (latestVisit) {
          next.treatments = latestVisit.treatments || [];
          next.bodyParts = normalizeBodyParts(latestVisit.bodyParts);
          next.doctorName = latestVisit.doctorName || '';
          next.visitType = latestVisit.visitType || next.visitType || '';
        }
        if (latestChiefComplaint) next.chiefComplaint = latestChiefComplaint;
        if (data.appointmentDate === null) delete next.appointmentDate;
        const res = await fetch(`/api/patients/${encodeURIComponent(next.chartNo)}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json; charset=utf-8' },
          body: JSON.stringify(next)
        });
        if (!res.ok) throw new Error('server patient save failed');
        return;
      }
      const db = await openChartDb();
      await new Promise((resolve, reject) => {
        const tx = db.transaction(CHART_STORE, 'readwrite');
        const store = tx.objectStore(CHART_STORE);
        const getReq = store.get(data.chartNo);
        getReq.onsuccess = () => {
          const existing = getReq.result || {};
          const { visitEntry, visitEntries, ...plainData } = data;
          const visitPatch = mergeChartVisitHistory(existing, { visitEntry, visitEntries });
          const { latestVisit, latestChiefComplaint, ...visitFields } = visitPatch;
          const next = { ...existing, ...plainData, ...visitFields };
          if (latestVisit) {
            next.treatments = latestVisit.treatments || [];
            next.bodyParts = normalizeBodyParts(latestVisit.bodyParts);
            next.doctorName = latestVisit.doctorName || '';
            next.visitType = latestVisit.visitType || next.visitType || '';
          }
          if (latestChiefComplaint) next.chiefComplaint = latestChiefComplaint;
          if (data.appointmentDate === null) delete next.appointmentDate;
          store.put(next);
        };
        getReq.onerror = () => reject(getReq.error);
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
    } catch(e) { console.error('차트DB 저장 실패', e); }
  };

  function getLatestChartVisit(patient = {}) {
    const byDate = patient.visitHistory || {};
    const dates = [
      ...(Array.isArray(patient.visitDates) ? patient.visitDates : []),
      ...Object.keys(byDate)
    ]
      .map(date => String(date || '').trim())
      .filter(date => /^\d{4}-\d{2}-\d{2}$/.test(date));
    const latestDate = [...new Set(dates)].sort().pop() || '';
    return latestDate ? (byDate[latestDate] || {}) : {};
  }

  function shuffleRows(rows) {
    const next = [...rows];
    for (let i = next.length - 1; i > 0; i -= 1) {
      const j = Math.floor(Math.random() * (i + 1));
      [next[i], next[j]] = [next[j], next[i]];
    }
    return next;
  }

  function randomItem(rows) {
    return rows.length ? rows[Math.floor(Math.random() * rows.length)] : null;
  }

  function getRandomDoctorForRandomTest() {
    const picked = randomItem(getSortedStaff('doctors'));
    return picked ? { id: picked[0], name: picked[1]?.name || '' } : { id: '', name: '' };
  }

  function getRandomPresetTreatmentsForRandomTest(patient = {}, latestVisit = {}) {
    const presets = treatmentPresets.filter(preset => Array.isArray(preset.treatments) && preset.treatments.length);
    const picked = randomItem(presets);
    if (picked) return [...picked.treatments];
    if (Array.isArray(latestVisit.treatments) && latestVisit.treatments.length) return [...latestVisit.treatments];
    if (Array.isArray(patient.treatments) && patient.treatments.length) return [...patient.treatments];
    return ['침'];
  }

  function getRandomBodyPartsForRandomTest() {
    const allParts = [
      ...BODY_PARTS.front.map(part => ({ side: 'front', id: part.id })),
      ...BODY_PARTS.back.map(part => ({ side: 'back', id: part.id }))
    ];
    const picked = shuffleRows(allParts).slice(0, Math.min(3, allParts.length));
    return normalizeBodyParts({
      front: picked.filter(part => part.side === 'front').map(part => part.id),
      back: picked.filter(part => part.side === 'back').map(part => part.id)
    });
  }

  function buildRandomTestPatientPayload(patient = {}) {
    const latestVisit = getLatestChartVisit(patient);
    const treatments = getRandomPresetTreatmentsForRandomTest(patient, latestVisit);
    const doctor = getRandomDoctorForRandomTest();
    const now = new Date();
    return {
      name: patient.name || '',
      treatments,
      timestamp: now.getTime(),
      timeStr: now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }),
      date: now.toLocaleDateString('ko-KR'),
      bedStatus: 'waiting',
      chartNo: normalizeChartNo(patient.chartNo),
      visitType: latestVisit.visitType || patient.visitType || '재진',
      chiefComplaint: latestVisit.chiefComplaint || patient.chiefComplaint || '',
      memo: '',
      age: patient.age || '',
      gender: patient.gender || '',
      bodyParts: getRandomBodyPartsForRandomTest(),
      doctorId: doctor.id,
      doctorName: doctor.name,
      nurseId: '',
      nurseName: ''
    };
  }

  window.createRandomTestPatients = async function() {
    const input = document.getElementById('randomTestCountInput');
    const btn = document.getElementById('randomTestCreateBtn');
    const status = document.getElementById('randomTestStatus');
    const count = Math.max(1, Math.min(50, Number(input?.value || 10)));
    if (input) input.value = String(count);
    if (btn) {
      btn.disabled = true;
      btn.textContent = '생성 중...';
    }
    if (status) status.textContent = 'DB 환자 목록 불러오는 중...';
    try {
      const records = (await getAllChartPatients())
        .filter(patient => patient?.name && normalizeChartNo(patient.chartNo));
      const currentChartNos = new Set(
        [...patientsByKey.values()]
          .map(patient => normalizeChartNo(patient?.chartNo))
          .filter(Boolean)
      );
      const candidates = records.filter(patient => !currentChartNos.has(normalizeChartNo(patient.chartNo)));
      const source = candidates.length ? candidates : records;
      if (!source.length) {
        if (status) status.textContent = 'DB에 불러올 환자가 없습니다.';
        showToast('DB에 불러올 환자가 없습니다');
        return;
      }
      const selected = shuffleRows(source).slice(0, Math.min(count, source.length));
      await Promise.all(selected.map(patient => push(ref(db, PATIENTS_PATH), buildRandomTestPatientPayload(patient))));
      if (autoBedAssignEnabled) setTimeout(() => assignWaitingPatientsToBeds(true), 300);
      const suffix = selected.length < count ? ` (요청 ${count}명 중 ${selected.length}명)` : '';
      if (status) status.textContent = `DB 환자 ${selected.length}명 생성 완료${suffix}`;
      showToast(`랜덤 테스트 ${selected.length}명 생성 완료`);
    } catch (error) {
      console.error(error);
      if (status) status.textContent = '랜덤 테스트 생성 실패';
      showToast('랜덤 테스트 생성 실패');
    } finally {
      if (btn) {
        btn.disabled = false;
        btn.textContent = '랜덤 테스트 생성';
      }
    }
  };

  async function setPatientAppointment(patientKey, data, appointmentDates) {
    if (!patientKey) return false;
    const dates = normalizeAppointmentDates(appointmentDates);
    if (!dates.length) return false;
    const existingPatient = patientsByKey.get(patientKey) || {};
    const existingAlerts = existingPatient.appointmentAlerts || {};
    const appointmentAlerts = Object.fromEntries(dates.map(date => [
      date,
      createAppointmentAlert(date, existingAlerts[date] || (existingPatient.appointmentAlert?.date === date ? existingPatient.appointmentAlert : {}))
    ]));
    const appointmentDate = dates[0] || '';
    const appointmentAlert = appointmentAlerts[appointmentDate] || createAppointmentAlert(appointmentDate);
    await update(ref(db, `${PATIENTS_PATH}/${patientKey}`), {
      ...data,
      appointmentDates: dates,
      appointmentDate,
      appointmentAlerts,
      appointmentAlert
    });
    patientsByKey.set(patientKey, {
      ...existingPatient,
      ...data,
      appointmentDates: dates,
      appointmentDate,
      appointmentAlerts,
      appointmentAlert
    });
    renderUpcomingAlerts();
    return true;
  }

  // ── XLS / XLSX / CSV import ────────────────────────────────────────
  function detectColumn(headers, candidates) {
    const normalize = (value) => String(value || '').replace(/\s+/g, '').replace(/[()·\[\]_/.-]/g, '').toLowerCase();
    const normalizedCandidates = candidates.map(normalize);
    return headers.find(h => normalizedCandidates.includes(normalize(h)))
      ?? headers.find(h => normalizedCandidates.some(c => normalize(h).includes(c)))
      ?? null;
  }

  // 엑셀 진료일 → 'YYYY-MM-DD' (엑셀 날짜 시리얼 / 텍스트 날짜 모두 지원)
  function parseImportDate(value) {
    const s = String(value ?? '').trim();
    if (!s) return '';
    // 엑셀 날짜 시리얼 (예: 46167 → 2026-05-25)
    if (/^\d+(\.\d+)?$/.test(s)) {
      const n = Number(s);
      if (n > 20000 && n < 90000) {
        const d = new Date(Math.round((n - 25569) * 86400000));
        if (!isNaN(d)) return `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, '0')}-${String(d.getUTCDate()).padStart(2, '0')}`;
      }
    }
    // YYYYMMDD
    const m2 = s.match(/^(\d{4})(\d{2})(\d{2})$/);
    if (m2) return `${m2[1]}-${m2[2]}-${m2[3]}`;
    // 구분자 있는 텍스트 날짜 (2026-05-25, 26.05.25, 2026/5/25 ...)
    const m = s.match(/(\d{2,4})[.\-/](\d{1,2})[.\-/](\d{1,2})/);
    if (m) {
      let [, y, mo, d] = m;
      if (y.length === 2) y = '20' + y;
      return `${y}-${mo.padStart(2, '0')}-${d.padStart(2, '0')}`;
    }
    return '';
  }

  window.importChartFile = async function(file) {
    if (!file) return;
    const statusEl = document.getElementById('chartImportStatus');
    statusEl.textContent = '파일 읽는 중...';

    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: 'array', cellText: true, cellDates: false });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: '', raw: false });

      if (!rows.length) { statusEl.textContent = '데이터가 없습니다'; return; }

      const headers = Object.keys(rows[0]);

      // 컬럼 자동 매핑
      const colName   = detectColumn(headers, ['수진자명','환자명','이름','환자이름','성명']);
      const colChart  = detectColumn(headers, ['차트번호','레지스터번호','환자번호','등록번호','차트']);
      const colAgeSex = detectColumn(headers, ['연령/성별','연령성별','나이/성별']);
      const colAge    = colAgeSex ?? detectColumn(headers, ['연령','나이','Age']);
      const colSex    = colAgeSex ?? detectColumn(headers, ['성별','Sex','Gender']);
      const colDiag   = detectColumn(headers, ['주상병명']);
      const colDate   = detectColumn(headers, ['진료일자','진료일','내원일']);
      const colVisit  = detectColumn(headers, ['초재진','초진재진','초진/재진','초진','재진','진료구분','구분','초재진구분']);
      const colDoctor = detectColumn(headers, ['진료의사','진료의','담당의','담당원장']);
      const colPhone  = detectColumn(headers, ['연락처','전화번호','휴대폰','핸드폰','휴대전화','전화','Tel','TEL','Mobile','Phone']);

      if (!colChart) { statusEl.textContent = '❌ 차트번호 컬럼을 찾을 수 없습니다. 컬럼명을 확인해주세요.'; return; }
      if (!colName)  { statusEl.textContent = '❌ 환자명 컬럼을 찾을 수 없습니다.'; return; }

      statusEl.textContent = `컬럼 감지 완료 → 저장 중...`;

      // 같은 차트번호가 여러 진료일로 들어오므로 환자별로 먼저 합침
      const byChart = new Map();
      let skipped = 0;
      for (const row of rows) {
        const chartNo = normalizeChartNo(String(row[colChart] || '').trim().replace(/\.0$/, ''));
        const name    = String(row[colName]  || '').trim();
        if (!chartNo || !name) { skipped++; continue; }

        // 연령/성별 파싱 (예: "45/남", "38세/여", "45남")
        let age = '', gender = '';
        if (colAgeSex) {
          const raw = String(row[colAgeSex] || '');
          const m = raw.match(/(\d+)[^\d]*(남|여)/);
          if (m) { age = m[1]; gender = m[2]; }
          else { const n = raw.match(/(\d+)/); if (n) age = n[1]; }
        } else {
          if (colAge !== colAgeSex) age = String(row[colAge] || '').replace(/[^0-9]/g, '');
          if (colSex !== colAgeSex) {
            const s = String(row[colSex] || '');
            gender = s.includes('여') ? '여' : s.includes('남') ? '남' : '';
          }
        }

        const chiefComplaint = colDiag   ? String(row[colDiag]   || '').trim() : '';
        const doctorName     = colDoctor ? String(row[colDoctor] || '').trim() : '';
        const visitDate      = colDate   ? parseImportDate(row[colDate]) : '';
        const visitText      = colVisit  ? String(row[colVisit]  || '').trim() : '';
        const visitType      = visitText.includes('초') ? '초진' : (visitText.includes('재') ? '재진' : '');
        const phone          = colPhone  ? String(row[colPhone]  || '').trim() : '';

        const agg = byChart.get(chartNo) || { chartNo, name, age: '', gender: '', phone: '', chiefComplaint: '', doctorName: '', visitEntries: [] };
        // 마스터 정보는 최신(나중) 행 값으로 갱신, 빈 값은 기존 유지
        agg.name = name || agg.name;
        if (age) agg.age = Number(age);
        if (gender) agg.gender = gender;
        if (phone) agg.phone = phone;
        if (chiefComplaint) agg.chiefComplaint = chiefComplaint;
        if (doctorName) agg.doctorName = doctorName;
        if (visitType) agg.visitType = visitType;
        if (visitDate) agg.visitEntries.push({ date: visitDate, visitType, doctorName, chiefComplaint });
        byChart.set(chartNo, agg);
      }

      let saved = 0;
      const patients = [...byChart.values()];
      const buildImportRecord = (agg, existing = {}) => {
        const visitPatch = mergeChartVisitHistory(existing, { visitEntries: agg.visitEntries });
        const { latestVisit, latestChiefComplaint, ...visitFields } = visitPatch;
        const record = {
          visitType: '',
          memo: '',
          treatments: [],
          bodyParts: normalizeBodyParts(),
          doctorName: '',
          appointmentDate: '',
          ...existing,
          chartNo: agg.chartNo,
          name: agg.name,
          age: agg.age !== '' ? agg.age : (existing.age ?? ''),
          gender: agg.gender || existing.gender || '',
          phone: agg.phone || existing.phone || existing.phoneNumber || existing.tel || existing.mobile || existing.contact || '',
          visitType: agg.visitType || existing.visitType || '',
          doctorName: agg.doctorName || existing.doctorName || '',
          chiefComplaint: latestChiefComplaint || agg.chiefComplaint || existing.chiefComplaint || '',
          bodyParts: normalizeBodyParts(existing.bodyParts),
          packages: createEmptyPackageState(existing),
          ...visitFields
        };
        Object.assign(record, getPCreditsFromPatient(existing));
        return record;
      };

      if (SERVER_MODE) {
        const existingRecords = await getAllChartPatients();
        const existingByChart = new Map(existingRecords.map(record => [String(record.chartNo || ''), record]));
        const records = patients.map(agg => buildImportRecord(agg, existingByChart.get(agg.chartNo) || {}));
        const BATCH = 1000;
        for (let i = 0; i < records.length; i += BATCH) {
          const batch = records.slice(i, i + BATCH);
          const res = await fetch('/api/import/patients', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json; charset=utf-8' },
            body: JSON.stringify({ mode: 'merge', patients: batch })
          });
          if (!res.ok) throw new Error('server patient import failed');
          saved += batch.length;
          statusEl.textContent = `저장 중... ${Math.min(i + BATCH, records.length)} / ${records.length}`;
        }
        updateChartDbCount();
        refreshAppointmentAlerts();
        statusEl.textContent = `총 ${saved.toLocaleString()}명 저장 완료 (원본 ${rows.length.toLocaleString()}행${skipped ? ` · ${skipped}행 건너뜀` : ''})`;
        return;
      }

      const db = await openChartDb();
      const BATCH = 500;
      for (let i = 0; i < patients.length; i += BATCH) {
        const batch = patients.slice(i, i + BATCH);
        await new Promise((resolve, reject) => {
          const tx = db.transaction(CHART_STORE, 'readwrite');
          const store = tx.objectStore(CHART_STORE);
          for (const agg of batch) {
            // 기존 레코드와 병합 → 진료기록/패키지 등 보존, 누락 필드는 기본값으로 스키마 정합성 유지
            const getReq = store.get(agg.chartNo);
            getReq.onsuccess = () => {
              const existing = getReq.result || {};
              store.put(buildImportRecord(agg, existing));
            };
            saved++;
          }
          tx.oncomplete = resolve;
          tx.onerror = () => reject(tx.error);
        });
        statusEl.textContent = `저장 중... ${Math.min(i + BATCH, patients.length)} / ${patients.length}`;
      }

      updateChartDbCount();
      refreshAppointmentAlerts();
      statusEl.textContent = `✅ ${saved.toLocaleString()}명 저장 완료 (총 ${rows.length.toLocaleString()}행)${skipped ? ` · ${skipped}행 건너뜀` : ''}`;
    } catch(e) {
      console.error(e);
      statusEl.textContent = '❌ 오류: ' + e.message;
    }
  };

  window.handleChartNoLookup = async function(scope = 'desk') {
    const ids = PATIENT_FORM_IDS[scope] || PATIENT_FORM_IDS.desk;
    const chartNoEl = document.getElementById(ids.chartNo);
    const rawChartNo = chartNoEl?.value?.trim() || '';
    const chartNo = normalizeChartNo(rawChartNo);
    if (!chartNo) { document.getElementById(ids.name)?.focus(); return; }
    if (chartNoEl) chartNoEl.value = chartNo;

    const badge = document.getElementById('chartLookupBadge');
    const patient = await lookupChartPatientFlexible(rawChartNo);

    if (patient) {
      document.getElementById(ids.name).value = patient.name || '';
      document.getElementById(ids.age).value = patient.age || '';
      document.getElementById(ids.chiefComplaint).value = patient.chiefComplaint || '';
      document.getElementById(ids.memo).value = patient.memo || '';
      document.querySelector(`input[name="${ids.visitType}"][value="재진"]`)?.click();
      document.querySelector(`input[name="${ids.gender}"][value="${patient.gender || '남'}"]`)?.click();
      setSelectedStaffByStoredValue('doctors', scope, patient);
      // 치료 항목 복원
      window.applyTreatmentsToForm?.(scope, patient.treatments || []);
      // 치료 부위 복원
      window.applyBodyPartsToForm?.(scope, patient.bodyParts);
      window.updateCreditChip?.(ids.treatmentGrid, patient);
      if (badge && scope === 'desk') {
        badge.textContent = '재';
        badge.className = 'chart-lookup-badge returning';
      }
    } else {
      document.getElementById(ids.name).value = '';
      document.getElementById(ids.age).value = '';
      document.getElementById(ids.chiefComplaint).value = '';
      document.getElementById(ids.memo).value = '';
      document.querySelector(`input[name="${ids.visitType}"][value="초진"]`)?.click();
      window.applyTreatmentsToForm?.(scope, []);
      window.applyBodyPartsToForm?.(scope, null);
      resetPCredits(ids.treatmentGrid);
      if (badge && scope === 'desk') {
        badge.textContent = '초';
        badge.className = 'chart-lookup-badge new';
      }
    }
    document.getElementById(ids.name)?.focus();
  };

  // ─── 베드 도착 팝업 (모듈 스코프: getBedData/bedAssignmentAlertItems/selectedBedNo 등 참조) ───
  function getFixedBedArrivalBedNo() {
    const bedParam = Number(new URLSearchParams(window.location.search).get('bed'));
    const isRegular = Number.isInteger(bedParam) && bedParam >= 1 && bedParam <= 15 && bedParam !== 7;
    const fixedBedNo = isRegular ? bedParam : 0;
    if (fixedBedNo) return fixedBedNo;
    const bedPanelActive = document.getElementById('bedPanel')?.classList.contains('active');
    return bedPanelActive && selectedBedNo < 101 ? selectedBedNo : 0;
  }

  function getBedAssignmentAlertForBedPatient(bedNo, patientKey) {
    if (!bedNo || !patientKey) return null;
    return [...bedAssignmentAlertItems.entries()]
      .map(([key, data]) => ({ key, ...(data || {}) }))
      .filter(item => String(item.patientKey || '') === String(patientKey) && Number(item.bedNo) === Number(bedNo))
      .sort((a, b) => Number(a.timestamp || 0) - Number(b.timestamp || 0))[0] || null;
  }

  function getBedAssignmentAlertForBed(bedNo) {
    if (!bedNo) return null;
    return [...bedAssignmentAlertItems.entries()]
      .map(([key, data]) => ({ key, ...(data || {}) }))
      .filter(item => Number(item.bedNo) === Number(bedNo))
      .sort((a, b) => Number(a.timestamp || 0) - Number(b.timestamp || 0))[0] || null;
  }

  async function removeBedAssignmentAlertForBedPatient(bedNo, patientKey) {
    const alert = getBedAssignmentAlertForBedPatient(bedNo, patientKey) || getBedAssignmentAlertForBed(bedNo);
    if (!alert?.key) return;
    bedAssignmentAlertItems.delete(alert.key);
    renderUpcomingAlerts();
    try {
      await remove(ref(db, `${BED_ASSIGNMENT_ALERTS_PATH}/${alert.key}`));
    } catch (e) {
      console.error(e);
      showToast('베드 배정 알림 확인 실패');
    }
  }

  function hideFixedBedArrivalOverlay() {
    const overlay = document.getElementById('bedArrivalOverlay');
    if (overlay) overlay.classList.remove('show');
    fixedBedArrivalVisiblePatientKey = '';
    fixedBedArrivalVisibleAlertKey = '';
  }

  function syncFixedBedArrivalOverlay() {
    const bedNo = getFixedBedArrivalBedNo();
    const overlay = document.getElementById('bedArrivalOverlay');
    const nameEl = document.getElementById('bedArrivalName');
    if (!overlay || !nameEl || !bedNo) {
      hideFixedBedArrivalOverlay();
      return;
    }

    const bed = getBedData(bedNo);
    const bedPatientKey = bed?.patientKey ? String(bed.patientKey) : '';
    const assignmentAlert = getBedAssignmentAlertForBed(bedNo);
    const patientKey = String(assignmentAlert?.patientKey || bedPatientKey || assignmentAlert?.key || '');
    if (!assignmentAlert || !patientKey) {
      if (overlay.classList.contains('show') && fixedBedArrivalVisibleAlertKey) return;
      delete fixedBedArrivalAcknowledgedByBed[bedNo];
      hideFixedBedArrivalOverlay();
      return;
    }

    if (fixedBedArrivalAcknowledgedByBed[bedNo] === assignmentAlert.key) {
      hideFixedBedArrivalOverlay();
      return;
    }

    fixedBedArrivalVisiblePatientKey = patientKey;
    fixedBedArrivalVisibleAlertKey = assignmentAlert.key;
    nameEl.textContent = assignmentAlert.patientName || bed?.name || '';
    requestBedScreenWakeLock('bed-assignment-overlay');
    overlay.classList.add('show');
  }
  window.syncFixedBedArrivalOverlay = syncFixedBedArrivalOverlay;
  // 일반 스크립트(블록2)의 setMode 등에서 호출할 수 있도록 모듈 함수 노출
  window.syncDoctorProcedureAlerts = syncDoctorProcedureAlerts;
  window.renderUpcomingAlerts = renderUpcomingAlerts;

  window.openFixedBedArrival = () => {
    const bedNo = getFixedBedArrivalBedNo();
    if (!bedNo) {
      hideFixedBedArrivalOverlay();
      return;
    }
    const patientKey = fixedBedArrivalVisiblePatientKey || String(getBedData(bedNo)?.patientKey || '');
    if (fixedBedArrivalVisibleAlertKey) fixedBedArrivalAcknowledgedByBed[bedNo] = fixedBedArrivalVisibleAlertKey;
    selectedBedNo = bedNo;
    hideFixedBedArrivalOverlay();
    renderBedSelector();
    renderBedDetail();
    updateBedHeaderBedChip();
    updateBedRemainingChip();
    removeBedAssignmentAlertForBedPatient(bedNo, patientKey);
  };
</script>

<script>
  const FALLBACK_CHART_DB_NAME = 'patientChartDB';
  const FALLBACK_CHART_STORE = 'patients';
  let fallbackChartDb = null;

  function fallbackNormalizeChartNo(value) {
    const text = String(value ?? '').trim();
    if (!/^\d+$/.test(text)) return text;
    return text.replace(/^0+(?=\d)/, '');
  }

  function fallbackOpenChartDb() {
    return new Promise((resolve, reject) => {
      if (fallbackChartDb) { resolve(fallbackChartDb); return; }
      const req = indexedDB.open(FALLBACK_CHART_DB_NAME, 1);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(FALLBACK_CHART_STORE)) {
          db.createObjectStore(FALLBACK_CHART_STORE, { keyPath: 'chartNo' });
        }
      };
      req.onsuccess = e => { fallbackChartDb = e.target.result; resolve(fallbackChartDb); };
      req.onerror = e => reject(e.target.error);
    });
  }

  async function fallbackLookupChartPatient(chartNo) {
    if (!chartNo) return null;
    try {
      const db = await fallbackOpenChartDb();
      return await new Promise((resolve, reject) => {
        const req = db.transaction(FALLBACK_CHART_STORE, 'readonly').objectStore(FALLBACK_CHART_STORE).get(chartNo);
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => reject(req.error);
      });
    } catch {
      return null;
    }
  }

  async function fallbackLookupChartPatientFlexible(rawChartNo) {
    const raw = String(rawChartNo ?? '').trim();
    const excelText = raw.replace(/\.0$/, '');
    const candidates = [
      fallbackNormalizeChartNo(raw),
      raw,
      excelText,
      fallbackNormalizeChartNo(excelText)
    ].filter(Boolean);
    for (const key of [...new Set(candidates)]) {
      const patient = await fallbackLookupChartPatient(key);
      if (patient) return patient;
    }
    return null;
  }

  async function runDeskChartNoLookup() {
    if (typeof window.handleChartNoLookup === 'function') {
      await window.handleChartNoLookup('desk');
      return;
    }

    const chartNoEl = document.getElementById('chartNo');
    const rawChartNo = chartNoEl?.value?.trim() || '';
    const chartNo = fallbackNormalizeChartNo(rawChartNo);
    if (!chartNo) { document.getElementById('patientName')?.focus(); return; }
    if (chartNoEl) chartNoEl.value = chartNo;

    const patient = await fallbackLookupChartPatientFlexible(rawChartNo);
    const badge = document.getElementById('chartLookupBadge');
    if (patient) {
      document.getElementById('patientName').value = patient.name || '';
      document.getElementById('ageInput').value = patient.age || '';
      document.getElementById('chiefComplaint').value = patient.chiefComplaint || '';
      document.getElementById('memoInput').value = patient.memo || '';
      document.querySelector('input[name="visitType"][value="재진"]')?.click();
      document.querySelector(`input[name="gender"][value="${patient.gender || '남'}"]`)?.click();
      setSelectedStaffByStoredValue?.('doctors', 'desk', patient);
      window.applyTreatmentsToForm?.('desk', patient.treatments || []);
      window.applyBodyPartsToForm?.('desk', patient.bodyParts);
      if (badge) {
        badge.textContent = '재';
        badge.className = 'chart-lookup-badge returning';
      }
    } else {
      document.getElementById('patientName').value = '';
      document.getElementById('ageInput').value = '';
      document.getElementById('chiefComplaint').value = '';
      document.getElementById('memoInput').value = '';
      document.querySelector('input[name="visitType"][value="초진"]')?.click();
      if (badge) {
        badge.textContent = '초';
        badge.className = 'chart-lookup-badge new';
      }
    }
    document.getElementById('patientName')?.focus();
  }
  window.runDeskChartNoLookup = runDeskChartNoLookup;

  // 모드 전환
  const VIEW_TO_MODE = {
    desk: 'input',
    doctor: 'doctor',
    notify: 'notify',
    clinic: 'receive',
    bed: 'bed'
  };

  function getAppView() {
    const view = (new URLSearchParams(window.location.search).get('view') || '').toLowerCase();
    return Object.prototype.hasOwnProperty.call(VIEW_TO_MODE, view) ? view : '';
  }

  function getModeFromView() {
    const view = getAppView();
    return view ? VIEW_TO_MODE[view] : '';
  }

  function getFixedBedNoFromUrl() {
    const value = Number(new URLSearchParams(window.location.search).get('bed'));
    if (Number.isInteger(value) && value >= 1 && value <= 15 && value !== 7) return value;
    if (Number.isInteger(value) && value >= 101 && value <= 110) return value; // 원장실1~10 (베드 101~110)
    return 0;
  }

  function getInitialMode() {
    return getModeFromView() || 'input';
  }

  function syncAppViewClass() {
    const view = getAppView();
    document.body.classList.toggle('app-role-locked', Boolean(view));
    ['desk', 'doctor', 'notify', 'clinic', 'bed'].forEach(name => {
      document.body.classList.toggle(`app-role-${name}`, view === name);
    });
    document.body.classList.toggle(
      'app-fixed-bed',
      view === 'bed' && Boolean(getFixedBedNoFromUrl())
    );
  }

  function setMode(mode, updateHash = true) {
    const fixedMode = getModeFromView();
    if (fixedMode) mode = fixedMode;
    window.currentMode = mode;
    document.getElementById('inputPanel').classList.toggle('active', mode === 'input');
    document.getElementById('receivePanel').classList.toggle('active', mode === 'doctor' || mode === 'receive' || mode === 'notify');
    document.getElementById('bedPanel').classList.toggle('active', mode === 'bed');
    document.getElementById('settingsPanel').classList.toggle('active', mode === 'settings');
    ['input', 'doctor', 'notify', 'receive', 'bed', 'settings'].forEach(name => {
      document.body.classList.toggle(`app-mode-${name}`, mode === name);
    });
    const modes = ['input', 'notify', 'receive', 'bed', 'settings'];
    document.querySelectorAll('.mode-btn').forEach((btn, i) => {
      btn.classList.toggle('active', modes[i] === mode);
    });
    if (updateHash && !fixedMode && window.location.hash) {
      history.replaceState(null, '', window.location.pathname + window.location.search);
    }
    window.updateBedHeaderBedChip?.();
    window.updateBedRemainingChip?.();
    if (mode === 'bed') window.openQueuedTimerAlertIfNeeded?.();
    window.updateReceiveAlertAudioState?.();
    if (mode === 'settings') { window.updateChartDbCount?.(); }
    if (mode === 'notify') setReceiveFormOpen(false);
    window.syncDoctorProcedureAlerts?.();
    window.renderUpcomingAlerts?.();
    window.syncFixedBedArrivalOverlay?.();
  }

  function setInputFormOpen(open) {
    const panel = document.getElementById('inputPanel');
    const button = document.getElementById('inputFormToggle');
    const column = panel?.querySelector('.input-form-column');
    const detailColumn = panel?.querySelector('.input-detail-column');
    if (!panel) return;
    panel.classList.toggle('input-form-open', Boolean(open));
    if (column) {
      column.hidden = !open;
      if (open) {
        column.style.removeProperty('display');
      } else {
        column.style.display = 'none';
      }
    }
    if (detailColumn) {
      detailColumn.hidden = Boolean(open);
      if (open) {
        detailColumn.style.display = 'none';
      } else {
        detailColumn.style.removeProperty('display');
      }
    }
    if (button) {
      button.textContent = open ? '‹' : '›';
      button.dataset.open = open ? '1' : '0';
      button.setAttribute('aria-label', open ? '입력 닫기' : '입력 열기');
      button.title = open ? '입력 닫기' : '입력 열기';
    }
    const headerButton = document.getElementById('deskInputHeaderBtn');
    if (headerButton) {
      headerButton.textContent = open ? '‹' : '›';
      headerButton.classList.toggle('active', Boolean(open));
      headerButton.setAttribute('aria-label', open ? '입력 닫기' : '입력 열기');
      headerButton.title = open ? '입력 닫기' : '입력 열기';
    }
    window.renderBedMonitors?.();
  }

  function resetDeskInputToggles() {
    document.querySelector('input[name="visitType"][value="초진"]')?.click();
    document.querySelector('input[name="gender"][value="남"]')?.click();
    window.clearChartLookupBadge?.();
    resetPCredits('treatmentGrid');
  }

  window.openDeskInputForm = () => {
    window.setFormEditMode?.('desk', null);
    window.populatePatientForm?.('desk', null);
    resetDeskInputToggles();
    setInputFormOpen(true);
  };

  window.toggleDeskInputForm = () => {
    const isOpen = document.getElementById('inputPanel')?.classList.contains('input-form-open');
    if (isOpen) {
      setInputFormOpen(false);
      window.setFormEditMode?.('desk', null);
      window.populatePatientForm?.('desk');
      resetDeskInputToggles();
    } else {
      window.openDeskInputForm?.();
    }
  };

  window.toggleInputForm = () => {
    const button = document.getElementById('inputFormToggle');
    const shouldClose = button?.getAttribute('aria-label')?.includes('닫기');
    if (shouldClose) {
      setInputFormOpen(false);
      window.setFormEditMode?.('desk', null);
      window.populatePatientForm?.('desk');
      resetDeskInputToggles();
    } else {
      window.setFormEditMode?.('desk', null);
      setInputFormOpen(true);
      window.populatePatientForm?.('desk');
      resetDeskInputToggles();
    }
  };

  function setReceiveFormOpen(open) {
    const panel = document.getElementById('receivePanel');
    const button = document.getElementById('receiveFormToggle');
    const column = panel?.querySelector('.receive-form-column');
    if (!panel) return;
    panel.classList.toggle('receive-form-open', Boolean(open));
    if (!open) panel.classList.remove('receive-edit-open');
    if (column) {
      column.hidden = !open;
      if (open) {
        column.style.removeProperty('display');
      } else {
        column.style.display = 'none';
      }
    }
    if (button) {
      button.textContent = open ? '‹' : '›';
      button.dataset.open = open ? '1' : '0';
      button.setAttribute('aria-label', open ? '입력 닫기' : '입력 열기');
      button.title = open ? '입력 닫기' : '입력 열기';
    }
    window.renderBedMonitors?.();
  }

  window.toggleReceiveForm = () => {
    const button = document.getElementById('receiveFormToggle');
    const shouldClose = button?.getAttribute('aria-label')?.includes('닫기');
    if (shouldClose) {
      setReceiveFormOpen(false);
      window.setFormEditMode?.('receive', null);
      setWaitingPatientEditMode('receive', null);
      window.populatePatientForm?.('receive');
    } else {
      document.getElementById('receivePanel')?.classList.remove('receive-edit-open');
      window.setFormEditMode?.('receive', null);
      setWaitingPatientEditMode('receive', null);
      setReceiveFormOpen(true);
      window.populatePatientForm?.('receive');
    }
  };

  // 토스트
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // 엔터키로 전송
  function disableAutocomplete(root = document) {
    root.querySelectorAll?.('input, textarea, select').forEach(el => {
      el.setAttribute('autocomplete', 'off');
      el.setAttribute('autocorrect', 'off');
      el.setAttribute('autocapitalize', 'off');
      el.setAttribute('spellcheck', 'false');
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    window.registerPwaServiceWorker?.();
    window.setupBedScreenWakeLock?.();
    disableAutocomplete();
    syncAppViewClass();
    setMode(getInitialMode(), false);
    setInputFormOpen(false);
    setReceiveFormOpen(false);
    const autoBedAssignInput = document.getElementById('autoBedAssignEnabled');
    if (autoBedAssignInput) autoBedAssignInput.checked = autoBedAssignEnabled;

    // 차트번호 Enter/변경 → 로컬 차트 조회
    document.getElementById('chartNo')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); runDeskChartNoLookup(); }
    });
    document.getElementById('chartNo')?.addEventListener('change', () => runDeskChartNoLookup());
    // 차트번호 입력 중에는 배지 초기화
    document.getElementById('chartNo')?.addEventListener('input', () => window.clearChartLookupBadge?.());

    document.getElementById('patientName').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('submitBtn').click();
    });
    document.getElementById('receivePatientName')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('receiveSubmitBtn').click();
    });
    document.getElementById('bedPatientName')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('bedSubmitBtn').click();
    });
    document.getElementById('bedMemoInput')?.addEventListener('input', () => {
      const open = document.getElementById('bedMemoWrap')?.classList.contains('open');
      setBedMemoOpen(open);
    });
    document.getElementById('doctorNameInput')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') addStaff('doctors');
    });
    document.getElementById('nurseNameInput')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') addStaff('nurses');
    });
  });
</script>
