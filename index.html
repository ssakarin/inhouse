<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경희홍익한의원 진료 알림</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #052a61;
    --surface: #073b83;
    --surface2: #0a4a99;
    --surface3: #0d5eb8;
    --border: #1d65ad;
    --accent: #39a9f5;
    --accent2: #1687d9;
    --accent-dim: rgba(57,169,245,0.15);
    --text: #f7fbff;
    --text2: #c8ddf4;
    --text3: #7fa8cc;
    --danger: #ff6b6b;
    --gold: #ffb21a;
    --radius: 14px;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 배경 패턴 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle at 20% 20%, rgba(57,169,245,0.10) 0%, transparent 50%),
                      radial-gradient(circle at 80% 80%, rgba(255,178,26,0.07) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 1360px; margin: 0 auto; padding: 20px 16px 60px; }
  body.app-role-bed .app {
    max-width: min(1500px, calc(100vw - 16px));
    padding: 10px 8px 24px;
  }

  /* 헤더 */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: #083f88;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
  }
  body.app-role-bed .header {
    padding: 10px 14px;
    margin-bottom: 10px;
    border-radius: 12px;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }
  .brand-icon {
    width: 44px;
    height: 44px;
    object-fit: contain;
    flex-shrink: 0;
  }
  body.app-role-bed .brand-icon {
    width: 38px;
    height: 38px;
  }
  .brand-copy { min-width: 0; }
  .header-left h1 {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 24px;
    line-height: 1;
    font-weight: 900;
    color: #fff;
    letter-spacing: 0;
  }
  body.app-role-bed .header-left h1 { font-size: 21px; }
  .brand-highlight { color: var(--gold); }
  .header-left p { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .mode-toggle {
    display: flex;
    background: rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-desk-controls {
    display: none;
    align-items: center;
    gap: 6px;
  }
  body.app-mode-input .header-desk-controls,
  body.app-mode-receive .header-desk-controls,
  body.app-role-doctor .header-desk-controls,
  body.app-role-desk .header-desk-controls {
    display: flex;
  }
  .header-bed-controls {
    display: none;
    align-items: center;
    gap: 6px;
  }
  body.app-mode-bed .header-bed-controls,
  body.app-role-bed .header-bed-controls {
    display: flex;
  }
  .header-wait-chip {
    background: rgba(255,178,26,0.16);
    border: 1px solid rgba(255,178,26,0.55);
    border-radius: 999px;
    color: var(--gold);
    font-size: 12px;
    font-weight: 900;
    padding: 7px 10px;
    white-space: nowrap;
  }
  .random-test-btn {
    background: rgba(57,169,245,0.16);
    border: 1px solid rgba(57,169,245,0.5);
    border-radius: 999px;
    color: var(--accent);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 900;
    padding: 7px 10px;
    cursor: pointer;
    white-space: nowrap;
  }
  .random-test-btn:hover {
    background: rgba(57,169,245,0.26);
    border-color: var(--accent);
  }
  .mode-btn {
    padding: 6px 12px;
    border: none;
    border-radius: 6px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: var(--text2);
  }
  .mode-btn.active { background: var(--accent); color: #053063; font-weight: 900; }
  body.app-role-locked .mode-toggle { display: none; }
  body.app-role-bed.app-fixed-bed #bedSelector { display: none; }

  /* ─── 입력 패널 ─── */
  .input-panel { display: none; }
  .input-panel.active { display: block; }
  .input-layout { display: grid; gap: 12px; }
  .input-panel:not(.input-form-open) .input-form-column { display: none; }
  .input-panel:not(.input-form-open) .input-layout { grid-template-columns: 1fr; }
  .receive-panel.receive-form-open .receive-detail-column > .card { display: none; }
  .receive-panel:not(.receive-form-open) .receive-form-column { display: none; }
  .input-form-column,
  .input-monitor-column,
  .receive-form-column { min-width: 0; }
  .input-drawer-toggle {
    display: none;
    position: fixed;
    left: 0;
    top: 50%;
    z-index: 40;
    width: 34px;
    height: 72px;
    background: var(--accent);
    border: 1px solid var(--accent);
    border-left: none;
    border-radius: 0 12px 12px 0;
    color: #053063;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 26px;
    font-weight: 900;
    line-height: 1;
    transform: translateY(-50%);
    box-shadow: 0 10px 24px rgba(0,0,0,0.32);
  }
  .input-panel.active .input-drawer-toggle { display: block; }
  .receive-panel.active .receive-drawer-toggle { display: block; }
  .input-panel.input-form-open .input-drawer-toggle {
    background: var(--gold);
    border-color: var(--gold);
  }
  .receive-panel.receive-form-open .receive-drawer-toggle {
    background: var(--gold);
    border-color: var(--gold);
  }
  .bed-panel.active .bed-drawer-toggle { display: block; }
  .bed-panel.bed-edit-open .bed-drawer-toggle {
    background: var(--gold);
    border-color: var(--gold);
  }
  .input-drawer-toggle:hover { filter: brightness(1.08); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 12px;
  }
  .card-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text3);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .form-section { margin-top: 16px; }
  .form-section:first-child { margin-top: 0; }
  .waiting-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .waiting-item {
    display: grid;
    grid-template-columns: auto minmax(0, 1fr) auto;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
  }
  .waiting-rank {
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: var(--accent-dim);
    color: var(--accent);
    font-size: 12px;
    font-weight: 900;
  }
  .waiting-name {
    font-size: 15px;
    font-weight: 900;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .waiting-treats {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 4px;
  }
  .waiting-info,
  .waiting-staff {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 4px;
  }
  .waiting-tag {
    background: var(--surface3);
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: 20px;
    padding: 2px 7px;
    font-size: 10px;
    font-weight: 700;
  }
  .waiting-item .bed-meta-chip {
    font-size: 10px;
    padding: 2px 6px;
  }
  .waiting-time {
    color: var(--text3);
    font-size: 11px;
    white-space: nowrap;
  }
  .upcoming-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .upcoming-item {
    display: grid;
    grid-template-columns: 72px minmax(0, 1fr);
    gap: 10px;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
  }
  .upcoming-time {
    color: var(--gold);
    font-size: 14px;
    font-weight: 900;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .upcoming-main {
    min-width: 0;
    color: var(--text);
    font-size: 14px;
    font-weight: 900;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .upcoming-sub {
    color: var(--text3);
    font-size: 11px;
    font-weight: 700;
    margin-top: 2px;
  }
  .upcoming-staff {
    color: var(--text2);
    font-size: 13px;
    font-weight: 900;
    margin-top: 4px;
  }

  .name-input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    outline: none;
    transition: border 0.2s;
  }
  .name-input:focus { border-color: var(--accent2); }
  .name-input::placeholder { color: var(--text3); font-weight: 400; font-size: 15px; }

  .staff-select-grid {
    display: grid;
    gap: 10px;
  }
  .monitor-staff-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
  .staff-select {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 800;
    color: var(--text);
    outline: none;
  }
  .staff-select:focus { border-color: var(--accent2); }
  .patient-info-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }
  .monitor-patient-grid {
    grid-template-columns: 3fr 3fr 2fr;
  }
  .monitor-patient-grid > .name-input {
    text-align: center;
  }
  .form-segment-row {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    grid-column: 1 / -1;
  }
  .patient-info-grid .wide { grid-column: 1 / -1; }
  .segmented {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 4px;
  }
  .segment-item {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 40px;
    border-radius: 8px;
    color: var(--text2);
    font-size: 13px;
    font-weight: 900;
    cursor: pointer;
    user-select: none;
  }
  .segment-item input { display: none; }
  .segment-item span {
    width: 100%;
    padding: 10px 8px;
    border-radius: 8px;
    text-align: center;
  }
  .segment-item input:checked + span {
    background: var(--accent);
    color: #053063;
  }
  .staff-manager-grid {
    display: grid;
    gap: 12px;
  }
  .settings-column {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 0;
  }
  .staff-add-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 8px;
  }
  .staff-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .staff-item {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto auto;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
  }
  .staff-item.vacation {
    opacity: 0.62;
    border-color: rgba(255,107,107,0.38);
  }
  .staff-name {
    color: var(--text);
    font-size: 15px;
    font-weight: 900;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .staff-delete-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text2);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 900;
    padding: 7px 10px;
  }
  .staff-delete-btn:hover { border-color: var(--danger); color: var(--danger); }
  .staff-vacation-toggle {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    color: var(--text2);
    cursor: pointer;
    font-size: 12px;
    font-weight: 900;
    white-space: nowrap;
  }
  .staff-vacation-toggle input { accent-color: var(--danger); }
  .rr-setting {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-top: 10px;
    padding: 10px 12px;
  }
  .rr-setting-text {
    color: var(--text);
    font-size: 13px;
    font-weight: 900;
  }
  .rr-switch {
    position: relative;
    width: 48px;
    height: 26px;
    flex: 0 0 auto;
  }
  .rr-switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }
  .rr-slider {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.12);
    border: 1px solid var(--border);
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.18s, border-color 0.18s;
  }
  .rr-slider::before {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    left: 2px;
    top: 2px;
    background: var(--text2);
    border-radius: 50%;
    transition: transform 0.18s, background 0.18s;
  }
  .rr-switch input:checked + .rr-slider {
    background: rgba(57,169,245,0.28);
    border-color: var(--accent);
  }
  .rr-switch input:checked + .rr-slider::before {
    transform: translateX(22px);
    background: var(--accent);
  }

  /* 체크박스 그리드 */
  .treatment-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .monitor-treatment-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
  .treat-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .treat-item:hover { border-color: var(--accent2); background: var(--surface3); }
  .treat-item.checked { border-color: var(--accent); background: var(--accent-dim); }
  .treat-item input[type=checkbox] { display: none; }
  .check-box {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    font-size: 12px;
  }
  .treat-item.checked .check-box { border-color: var(--accent); background: var(--accent); }
  .treat-icon { font-size: 16px; }
  .treat-name { font-size: 13px; font-weight: 500; color: var(--text2); }
  .treat-item.checked .treat-name { color: var(--accent); font-weight: 700; }

  /* 완료 버튼 */
  .submit-btn {
    width: 100%;
    padding: 18px;
    background: var(--accent2);
    color: #f7fbff;
    border: none;
    border-radius: var(--radius);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: -0.3px;
  }
  .submit-btn:hover { background: var(--accent); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(57,169,245,0.35); }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn:disabled { background: var(--surface3); color: var(--text3); cursor: not-allowed; transform: none; box-shadow: none; }
  .export-btn {
    width: 100%;
    margin-top: 10px;
    padding: 13px;
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.2s;
  }
  .export-btn:hover { border-color: var(--accent); color: var(--accent); }
  .export-btn:disabled { opacity: 0.55; cursor: not-allowed; }

  /* ─── 수신 / 베드 패널 ─── */
  .receive-panel,
  .bed-panel,
  .settings-panel { display: none; }
  .receive-panel.active,
  .bed-panel.active,
  .settings-panel.active { display: block; }

  .receive-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .receive-title { font-size: 14px; font-weight: 700; color: var(--text2); }
  .today-count {
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
  }

  /* 알림 카드 */
  .notification-list { display: flex; flex-direction: column; gap: 10px; }

  .notif-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    animation: slideIn 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .notif-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--accent);
    border-radius: 4px 0 0 4px;
  }
  .notif-card.new::before { background: var(--gold); }
  .notif-card:hover { border-color: var(--accent2); background: var(--surface2); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .notif-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .notif-name { font-size: 18px; font-weight: 900; color: var(--text); }
  .notif-new-badge {
    background: var(--gold);
    color: #053063;
    font-size: 10px;
    font-weight: 900;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }
  .notif-time { font-size: 11px; color: var(--text3); }

  .notif-treats {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .notif-tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    font-size: 11px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 20px;
  }
  .notif-hint { font-size: 11px; color: var(--text3); margin-top: 8px; }

  /* 베드 모니터 */
  .bed-monitor {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    margin-bottom: 12px;
  }
  .receive-layout {
    display: grid;
    gap: 12px;
  }
  .receive-main-column,
  .receive-detail-column { min-width: 0; }
  .receive-detail-column { order: 1; }
  .receive-main-column { order: 2; }
  #inputBedMonitor { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  #receiveBedMonitor { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .bed-status {
    background: linear-gradient(180deg, var(--surface2), var(--surface));
    border: 1px solid rgba(125, 177, 224, 0.45);
    border-radius: 10px;
    padding: 10px;
    min-height: 118px;
    position: relative;
    cursor: pointer;
    box-shadow: 0 3px 0 rgba(0,0,0,0.28), 0 8px 18px rgba(0,0,0,0.16);
    transition: transform 0.12s ease, border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
  }
  .bed-status:hover,
  .bed-status:focus {
    transform: translateY(-1px);
    border-color: var(--accent);
    box-shadow: 0 4px 0 rgba(0,0,0,0.30), 0 12px 24px rgba(0,0,0,0.22);
    outline: none;
  }
  .bed-status:active { transform: translateY(1px); box-shadow: 0 1px 0 rgba(0,0,0,0.30), 0 6px 12px rgba(0,0,0,0.16); }
  .bed-status.active { border-color: var(--accent); background: linear-gradient(180deg, var(--surface3), var(--surface)); }
  .bed-status.selected { box-shadow: 0 0 0 2px rgba(240,192,96,0.55); border-color: var(--gold); }

    const grid = document.getElementById(gridId);
    if (!grid) return;
    grid.innerHTML = '';
    TREATMENTS.forEach(t => {

      item.className = 'treat-item';

    const list = document.getElementById('treatmentMinutesList');

    list.innerHTML = TREATMENTS.map(t => {

  function getTodayKey() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const d = String(now.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function getDailyStartOffset(count) {
    if (!count) return 0;
    const date = new Date();
    const start = new Date(date.getFullYear(), 0, 0);
    const dayOfYear = Math.floor((date - start) / 86400000);
    return dayOfYear % count;
  }

  async function getRoundRobinNurse() {
    const nurses = getSortedStaff('nurses').filter(([, data]) => !data.vacation);
    if (!nurseRrEnabled || !nurses.length) return null;

    const dateKey = getTodayKey();
    const counterRef = ref(db, `settings/nurseRoundRobinState/${dateKey}/count`);
    const result = await runTransaction(counterRef, value => (Number(value || 0) + 1));
    const count = Number(result.snapshot.val() || 1);
    const serial = Math.max(0, count - 1);
    const index = (getDailyStartOffset(nurses.length) + serial) % nurses.length;
    const [id, data] = nurses[index];
    return { id, name: data.name || '' };
  }

  async function applyRoundRobinNurseToForm(scope = 'desk') {
    if (!nurseRrEnabled) return;
    const selectId = scope === 'receive' ? 'receiveNurseSelect' : scope === 'bed' ? 'bedNurseSelect' : 'nurseSelect';
    const select = document.getElementById(selectId);
    if (!select) return;

    const nurses = getSortedStaff('nurses').filter(([, data]) => !data.vacation);
    if (!nurses.length) return;
    const dateKey = getTodayKey();
    const snapshot = await get(ref(db, `settings/nurseRoundRobinState/${dateKey}/count`));
    const serial = Number(snapshot.val() || 0);
    const index = (getDailyStartOffset(nurses.length) + serial) % nurses.length;
    const [id, data] = nurses[index];
    const rrNurse = { id, name: data.name || '' };
    if (rrNurse?.id && Array.from(select.options).some(option => option.value === rrNurse.id)) {
      select.value = rrNurse.id;
    }
  }
  window.applyRoundRobinNurseToForm = applyRoundRobinNurseToForm;

  async function getRoundRobinStaffForTest(type) {
    const staff = getSortedStaff(type).filter(([, data]) => type !== 'nurses' || !data.vacation);
    if (!staff.length) return { id: '', name: '' };

    const dateKey = getTodayKey();
    const counterRef = ref(db, `settings/testRoundRobinState/${type}/${dateKey}/count`);
    const result = await runTransaction(counterRef, value => (Number(value || 0) + 1));
    const count = Number(result.snapshot.val() || 1);
    const serial = Math.max(0, count - 1);
    const index = (getDailyStartOffset(staff.length) + serial) % staff.length;
    const [id, data] = staff[index];
    return { id, name: data.name || '' };
  }

  function getRandomTreatments() {
    const count = 3 + Math.floor(Math.random() * 3);

  function normalizeExcelHeader(value) {
    return String(value || '').replace(/\s+/g, '').replace(/[()［］\[\]_/.-]/g, '').toLowerCase();
  }

  function findExcelColumn(headers, candidates) {
    const normalizedCandidates = candidates.map(normalizeExcelHeader);
    const exactIndex = headers.findIndex(header => {
      const normalized = normalizeExcelHeader(header);
      return normalizedCandidates.includes(normalized);
    });
    if (exactIndex >= 0) return exactIndex;

    return headers.findIndex(header => {
      const normalized = normalizeExcelHeader(header);
      return normalizedCandidates.some(candidate => normalized.includes(candidate));
    });
  }

  function parseExcelPatients(arrayBuffer) {
    if (!window.XLSX) throw new Error('엑셀 파서가 로드되지 않았습니다.');
    const workbook = window.XLSX.read(arrayBuffer, { type: 'array', cellDates: false });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = window.XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
    const headerRowIndex = rows.findIndex(row => {
      const joined = row.map(normalizeExcelHeader).join('|');
      return /(성명|이름|환자|차트|등록|나이|연령|성별|상병|병명)/.test(joined);
    });
    const headers = rows[Math.max(0, headerRowIndex)] || [];
    const startIndex = headerRowIndex >= 0 ? headerRowIndex + 1 : 0;
    const nameIndex = findExcelColumn(headers, ['환자명', '환자성명', '성명', '이름', '수진자명']);
    const chartIndex = findExcelColumn(headers, ['차트번호', '챠트번호']);
    const ageIndex = findExcelColumn(headers, ['나이', '연령']);
    const genderIndex = findExcelColumn(headers, ['성별', '남녀']);
    const visitIndex = findExcelColumn(headers, ['초재진', '초진재진', '초진', '진료구분', '구분']);
    const complaintIndex = findExcelColumn(headers, ['주상병명']);

    return rows.slice(startIndex).map(row => {
      const fallbackNameIndex = nameIndex >= 0 ? nameIndex : row.findIndex(cell => /[가-힣]{2,}/.test(String(cell || '').trim()));
      const name = String(row[fallbackNameIndex] || '').trim();
      const genderText = String(genderIndex >= 0 ? row[genderIndex] : '').trim();
      const visitText = String(visitIndex >= 0 ? row[visitIndex] : '').trim();
      return {
        name,
        chartNo: chartIndex >= 0 ? String(row[chartIndex] || '').trim() : '',
        age: ageIndex >= 0 ? Number(String(row[ageIndex] || '').replace(/[^0-9]/g, '')) || '' : '',
        gender: genderText.includes('여') ? '여' : '남',
        visitType: visitText.includes('초') ? '초진' : '재진',
        chiefComplaint: complaintIndex >= 0 ? String(row[complaintIndex] || '').trim() : ''
      };
    }).filter(patient => patient.name && !/성명|이름|환자명/.test(patient.name));
  }

  let pendingRandomTestCount = 0;

  window.openRandomTestGenerator = () => {
    const count = Number(prompt('생성할 테스트 수를 입력하세요.', '10'));
    if (!Number.isFinite(count) || count < 1) return;
    pendingRandomTestCount = Math.min(200, Math.floor(count));

  window.handleRandomTestExcel = async (file) => {
    if (!file || !pendingRandomTestCount) return;
    try {
      const patients = parseExcelPatients(await file.arrayBuffer());
      if (!patients.length) {
        alert('엑셀에서 이름을 찾지 못했습니다. 성명/이름 열이 있는 파일인지 확인해주세요.');
        return;
      }

      const count = pendingRandomTestCount;
      pendingRandomTestCount = 0;
      showToast(`테스트 ${count}명 생성 중...`);

      for (let i = 0; i < count; i++) {
        const source = patients[Math.floor(Math.random() * patients.length)];
        const doctor = await getRoundRobinStaffForTest('doctors');
        const nurse = await getRoundRobinStaffForTest('nurses');
        const now = new Date(Date.now() + i);
        await push(ref(db, 'patients'), {
          name: source.name,
          treatments: getRandomTreatments(),
          timestamp: now.getTime(),
          timeStr: now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }),
          date: now.toLocaleDateString('ko-KR'),
          bedStatus: 'waiting',
        chartNo: normalizeChartNo(source.chartNo),
          visitType: source.visitType || '재진',
          chiefComplaint: source.chiefComplaint || '',
          memo: '',
          age: source.age || '',
          gender: source.gender || '남',
          doctorId: doctor.id,
          doctorName: doctor.name,
          nurseId: nurse.id,
          nurseName: nurse.name,
          testGenerated: true
        });
      }

      showToast(`테스트 ${count}명 생성 완료`);
    } catch (e) {
      console.error(e);
      alert('엑셀 파일을 읽거나 테스트를 생성하지 못했습니다.');

  window.submitPatient = async (scope = 'desk') => {
    const ids = PATIENT_FORM_IDS[scope] || PATIENT_FORM_IDS.desk;
    if ((scope === 'desk' || scope === 'receive') && formEditBedNoByScope[scope]) {
      await saveMonitorBedPatientInfo(scope);
      return;
    }
    const name = document.getElementById(ids.name).value.trim();
    const chartNo = normalizeChartNo(document.getElementById(ids.chartNo).value);
    const chiefComplaint = document.getElementById(ids.chiefComplaint).value.trim();
    const memo = document.getElementById(ids.memo).value.trim();
    const age = document.getElementById(ids.age).value.trim();
    const visitType = document.querySelector(`input[name="${ids.visitType}"]:checked`)?.value || '초진';
    const gender = document.querySelector(`input[name="${ids.gender}"]:checked`)?.value || '남';
    const doctor = getSelectedStaff('doctors', scope);
    let nurse = getSelectedStaff('nurses', scope);
    const checked = [...document.querySelectorAll(`#${ids.treatmentGrid} input:checked`)];
    const treatments = checked.map(c => {
      const t = TREATMENTS.find(t => t.id === c.value);
      return t ? t.name : c.value;
    });

    if (!name) { showToast('❗ 성함을 입력해주세요'); return; }
    if (treatments.length === 0) { showToast('❗ 진료 종류를 선택해주세요'); return; }

    const btn = document.getElementById(ids.submitBtn);
    btn.disabled = true;
    btn.textContent = '입력 중...';

    try {
      if (nurseRrEnabled) {
        const rrNurse = await getRoundRobinNurse();
        if (rrNurse) nurse = rrNurse;

      const now = new Date();
      await push(ref(db, 'patients'), {
        name,
        treatments,
        timestamp: now.getTime(),
        timeStr: now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }),
        date: now.toLocaleDateString('ko-KR'),
        bedStatus: 'waiting',

      document.getElementById(ids.memo).value = '';

    }

  function csvRow(values) {

  window.exportFirebaseCsv = async () => {

    }

    try {

        get(ref(db, 'beds')),
        get(ref(db, 'staff/doctors')),
        get(ref(db, 'staff/nurses'))
      ]);
      const patients = patientsSnapshot.val() || {};
      const beds = bedsSnapshot.val() || {};
      const doctors = doctorsSnapshot.val() || {};
      const nurses = nursesSnapshot.val() || {};
      const lines = [];

      lines.push('patients');
      lines.push(csvRow(['patientKey', 'name', 'chartNo', 'visitType', 'chiefComplaint', 'memo', 'age', 'gender', 'treatments', 'timestamp', 'timeStr', 'date', 'bedStatus', 'bedNo', 'doctorId', 'doctorName', 'nurseId', 'nurseName']));
      Object.entries(patients)
        .sort((a, b) => ((a[1]?.timestamp || 0) - (b[1]?.timestamp || 0)))
        .forEach(([key, patient]) => {
          lines.push(csvRow([
            key,
            patient.name,
            patient.chartNo,
            patient.visitType,
            patient.chiefComplaint,
            patient.memo,
            patient.age,
            patient.gender,
            patient.treatments || [],
            patient.timestamp,
            patient.timeStr,
            patient.date,
            patient.bedStatus,
            patient.bedNo,
            patient.doctorId,
            patient.doctorName,
            patient.nurseId,
            patient.nurseName
          ]));
        });

      lines.push('');
      lines.push('beds');
      lines.push(csvRow(['bedNo', 'patientKey', 'name', 'chartNo', 'visitType', 'chiefComplaint', 'memo', 'age', 'gender', 'treatments', 'timeStr', 'timestamp', 'doctorId', 'doctorName', 'nurseId', 'nurseName', 'currentIndex', 'total', 'remaining', 'running', 'startedAt', 'complete', 'lastAlertId', 'lastAlertMessage']));
      Object.entries(beds)
        .sort((a, b) => Number(a[0]) - Number(b[0]))
        .forEach(([bedNo, bed]) => {
          lines.push(csvRow([
            bedNo,
            bed.patientKey,
            bed.name,
            bed.chartNo,
            bed.visitType,
            bed.chiefComplaint,
            bed.memo,
            bed.age,
            bed.gender,
            bed.treatments || [],
            bed.timeStr,
            bed.timestamp,
            bed.doctorId,
            bed.doctorName,
            bed.nurseId,
            bed.nurseName,
            bed.currentIndex,
            bed.total,
            bed.remaining,
            bed.running,
            bed.startedAt,
            bed.complete,
            bed.lastAlertId,
            bed.lastAlertMessage
          ]));
        });

      lines.push('');
      lines.push('staff_doctors');
      lines.push(csvRow(['staffKey', 'name', 'timestamp']));
      Object.entries(doctors)
        .sort((a, b) => ((a[1]?.timestamp || 0) - (b[1]?.timestamp || 0)))

        .forEach(([key, staff]) => lines.push(csvRow([key, staff.name, staff.timestamp])));

      const now = new Date();
      const dateKey = now.toISOString().slice(0, 19).replace(/[:T]/g, '-');
      const blob = new Blob(['\ufeff' + lines.join('\r\n')], { type: 'text/csv;charset=utf-8;' });

      const link = document.createElement('a');
      link.href = url;

  // ─── 수신 ───────────────────────────────
  let isFirstLoad = true;
  let loadedKeys = new Set();
  const pageLoadedAt = Date.now();
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);

  const patientsRef = query(
    ref(db, 'patients'),
    orderByChild('timestamp'),
    startAt(todayStart.getTime())
  );

  onChildAdded(patientsRef, (snapshot) => {
    const key = snapshot.key;
    if (loadedKeys.has(key)) return;
    loadedKeys.add(key);

    const data = snapshot.val();
    const normalizedChartNo = normalizeChartNo(data.chartNo);
    if ((data.chartNo || '') !== normalizedChartNo) {
      data.chartNo = normalizedChartNo;

    }
    const isNew = Number(data.timestamp || 0) > pageLoadedAt;
    patientsByKey.set(key, data);

    renderNotif(key, data, isNew);

    if (isNew && shouldShowAlerts()) {

  onChildRemoved(patientsRef, (snapshot) => {

    const assignedBedNo = bedAssignments.findIndex(bed => bed?.patientKey === key) + 1;

    patientsByKey.delete(key);
    loadedKeys.delete(key);

    renderBedDetail();
    renderReceiveBedDetail();

    renderUpcomingAlerts();

  async function migrateDisabledBedsToWaiting(beds) {
    let movedCount = 0;
    Object.entries(beds).forEach(([bedNo, bed]) => {
      if (!bed) return;
      if (DISABLED_BED_NUMBERS.has(Number(bedNo))) return;
      const normalizedChartNo = normalizeChartNo(bed.chartNo);
      const normalizeKey = `${bedNo}:${bed.chartNo || ''}`;
      if ((bed.chartNo || '') !== normalizedChartNo && !normalizedBedChartKeys.has(normalizeKey)) {
        normalizedBedChartKeys.add(normalizeKey);
        bed.chartNo = normalizedChartNo;
      }
    });
    DISABLED_BED_NUMBERS.forEach(bedNo => {
      const key = String(bedNo);
      const bed = beds[key];
      if (!bed) return;
      if (migratingDisabledBedKeys.has(key)) return;
      migratingDisabledBedKeys.add(key);

      if (bed.patientKey) {
        const firstQueueTimestamp = todayStart.getTime();
        patientsByKey.set(bed.patientKey, {
          ...(patientsByKey.get(bed.patientKey) || {}),
          ...bed,
          bedStatus: 'waiting',
          bedNo: null,
          timestamp: firstQueueTimestamp
        });
        movedCount += 1;
      }

      delete beds[key];
    });
    return movedCount;
  }

  onValue(ref(db, 'beds'), async (snapshot) => {
    const beds = snapshot.val() || {};
    let migratedCount = 0;
    try {
      migratedCount = await migrateDisabledBedsToWaiting(beds);
    } catch (e) {
      console.error('비활성 베드 정리 실패', e);
    }
    bedAssignments = Array.from({ length: BED_COUNT }, (_, i) => beds[String(i + 1)] || null);
    if (DISABLED_BED_NUMBERS.has(selectedBedNo)) selectedBedNo = getUrlBedNo();
    if (DISABLED_BED_NUMBERS.has(selectedReceiveBedNo)) selectedReceiveBedNo = getUrlBedNo();
    if (selectedMoveBedNo && (DISABLED_BED_NUMBERS.has(selectedMoveBedNo) || !bedAssignments[selectedMoveBedNo - 1])) selectedMoveBedNo = null;
    syncTimerAlertsWithBeds();
    handleRemoteTimerAlerts(!hasLoadedBedsOnce);
    hasLoadedBedsOnce = true;
    if (!migratedCount) assignWaitingPatientsToBeds();
    renderBedSelector();
    renderBedDetail();
    renderReceiveBedDetail();
    renderBedMonitors();
    renderWaitingLists();
    renderUpcomingAlerts();
    updateCount();
    ensureBedTicker();

  function updateCount() {
    const todayCount = document.getElementById('todayCount');
    if (todayCount) todayCount.textContent = `${loadedKeys.size}명`;
    const bedPatientCount = document.getElementById('bedPatientCount');
    if (bedPatientCount) {
      const activeOccupiedCount = ACTIVE_BED_NUMBERS.filter(bedNo => Boolean(bedAssignments[bedNo - 1])).length;
      bedPatientCount.textContent = `${activeOccupiedCount}/${ACTIVE_BED_COUNT}`;
    }
  }

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[ch]));
  }

  function normalizeChartNo(value) {
    const text = String(value ?? '').trim();
    if (!/^\d+$/.test(text)) return text;
    return text.replace(/^0+(?=\d)/, '');
  }

  function getTreatmentSeconds(treatment) {
    return (Number(treatmentMinutes[treatment] || DEFAULT_TREATMENT_MINUTES[treatment] || 1)) * 60;
  }

  function getProcedureSeconds() {
    return Math.max(0, Number(procedureMinutes || 0)) * 60;
  }

  function getPreferredBedOrder(gender) {
    const primary = gender === '여' ? FEMALE_PRIMARY_BED_NUMBERS : MALE_PRIMARY_BED_NUMBERS;
    const fallback = gender === '여' ? MALE_PRIMARY_BED_NUMBERS : FEMALE_PRIMARY_BED_NUMBERS;
    return [...primary, ...fallback]
      .filter((bedNo, index, rows) =>
        ACTIVE_BED_NUMBERS.includes(bedNo) && rows.indexOf(bedNo) === index
      );
  }

  async function assignPatientToBed(patientKey, data, silent = false) {
    if (data.bedStatus === 'discharged') return false;

    const result = await runTransaction(ref(db, 'beds'), (beds) => {
      beds = beds || {};
      const existingBedNo = Object.keys(beds).find(bedNo => beds[bedNo]?.patientKey === patientKey);
      if (existingBedNo) return beds;

      const emptyBedNo = getPreferredBedOrder(data.gender).map(String).find(bedNo => !beds[bedNo]);
      if (!emptyBedNo) return beds;

      const firstTreatment = data.treatments?.[0];
      const total = getTreatmentSeconds(firstTreatment);
      beds[emptyBedNo] = {
        patientKey,
        name: data.name,
        treatments: data.treatments || [],
        timeStr: data.timeStr || '',
        timestamp: data.timestamp || Date.now(),
        chartNo: normalizeChartNo(data.chartNo),
        visitType: data.visitType || '',
        chiefComplaint: data.chiefComplaint || '',
        memo: data.memo || '',
        age: data.age || '',
        gender: data.gender || '',
        doctorId: data.doctorId || '',
        doctorName: data.doctorName || '',
        nurseId: data.nurseId || '',
        nurseName: data.nurseName || '',
        bodyParts: data.bodyParts || { front: [], back: [] },
        currentIndex: 0,
        total,
        remaining: total,
        running: false,
        startedAt: null,
        complete: false
      };
      return beds;
    });

    const beds = result.snapshot.val() || {};
    const bedNo = Object.keys(beds).find(no => beds[no]?.patientKey === patientKey);
    if (result.committed && bedNo) {
      patientsByKey.set(patientKey, { ...data, bedStatus: 'assigned', bedNo: Number(bedNo) });
      await update(ref(db, `patients/${patientKey}`), { bedStatus: 'assigned', bedNo: Number(bedNo) });
      return true;
    }

    if (!silent) showToast('빈 베드가 없습니다');
    return false;
  }

  function assignWaitingPatientsToBeds() {
    const assignedPatientKeys = bedAssignments
      .filter(Boolean)
      .map(bed => bed.patientKey);

    const waitingPatients = getWaitingPatients(assignedPatientKeys);

    for (const [key, data] of waitingPatients) {
      const regularOccupiedCount = REGULAR_BED_NUMBERS.filter(bedNo => Boolean(bedAssignments[bedNo - 1])).length;
      if (regularOccupiedCount >= REGULAR_BED_COUNT) break;
      assignPatientToBed(key, data, true);
    }
  }

  function getWaitingPatients(assignedPatientKeys = null) {
    const assignedKeys = assignedPatientKeys || bedAssignments
      .filter(Boolean)
      .map(bed => bed.patientKey);

    return [...patientsByKey.entries()]
      .filter(([key, data]) => data.bedStatus !== 'discharged' && !assignedKeys.includes(key))
      .sort((a, b) => (a[1].timestamp || 0) - (b[1].timestamp || 0));
  }

  function renderWaitingLists() {
    const waitingPatients = getWaitingPatients();
    updateDeskWaitChip(waitingPatients);
    const html = waitingPatients.length
      ? waitingPatients.map(([key, data], index) => {
        const infoChips = [
          data.visitType ? `<span class="bed-meta-chip bed-meta-chip--fixed">${escapeHtml(data.visitType)}</span>` : '',
          data.gender ? `<span class="bed-meta-chip bed-meta-chip--fixed">${escapeHtml(data.gender)}</span>` : '',
          data.age ? `<span class="bed-meta-chip bed-meta-chip--fixed">${escapeHtml(String(data.age))}세</span>` : '',
          data.chiefComplaint ? `<span class="bed-meta-chip bed-meta-chip--flex">${escapeHtml(data.chiefComplaint)}</span>` : '',
          data.memo ? `<span class="bed-meta-chip bed-meta-chip--flex">${escapeHtml(data.memo)}</span>` : ''
        ].filter(Boolean).join('');
        const staffHtml = [
          data.doctorName ? `<span class="bed-meta-chip">${escapeHtml(data.doctorName)}</span>` : '',
          data.nurseName ? `<span class="bed-meta-chip">${escapeHtml(data.nurseName)}</span>` : ''
        ].filter(Boolean).join('');
        return `
          <div class="waiting-item" id="waiting-${key}" oncontextmenu="confirmDeleteWaitingPatient(event, '${key}')">
            <div class="waiting-rank">${index + 1}</div>
            <div>
              <div class="waiting-name">${escapeHtml(data.name)}</div>
              ${infoChips ? `<div class="waiting-info">${infoChips}</div>` : ''}
              ${staffHtml ? `<div class="waiting-staff">${staffHtml}</div>` : ''}
              <div class="waiting-treats">${(data.treatments || []).map(treatment => `<span class="waiting-tag">${escapeHtml(treatment)}</span>`).join('')}</div>
            </div>
            <div class="waiting-time">${escapeHtml(data.timeStr || '')}</div>
          </div>`;
      }).join('')
      : `<div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-text">대기가 없습니다</div></div>`;

    ['inputWaitingList', 'receiveWaitingList'].forEach(id => {
      const list = document.getElementById(id);
      if (list) list.innerHTML = html;
    });
  }

  window.confirmDeleteWaitingPatient = async (event, key) => {
    event?.preventDefault();
    event?.stopPropagation();
    const patient = patientsByKey.get(key);
    if (!patient) return;
    if (!confirm(`${patient.name || '대기'} 삭제하시겠습니까?`)) return;

    const assignedBedNo = bedAssignments.findIndex(bed => bed?.patientKey === key) + 1;
    if (assignedBedNo > 0) {
      clearLocalTimerAlertsForBed(assignedBedNo);
      await remove(ref(db, `beds/${assignedBedNo}`));
    }
    patientsByKey.delete(key);
    loadedKeys.delete(key);
    await remove(ref(db, `patients/${key}`));
    renderWaitingLists();
    showToast('대기 삭제 완료');
  };

  function getEstimatedWaitMinutesList(waitingPatients) {
    const regularBeds = REGULAR_BED_NUMBERS.map(bedNo => bedAssignments[bedNo - 1]);

    const minutesList = regularBeds
      .map(bed => {
        if (!bed) return 0;
        return getBedRemainingTreatmentSeconds(bed);
      })
      .sort((a, b) => a - b)
      .slice(0, 5)
      .map(seconds => Math.ceil(seconds / 60));

    if (minutesList.length === 5 && minutesList.every(minutes => minutes === 0)) return 'none';
    return minutesList.length ? minutesList : 0;
  }

  function updateDeskWaitChip(waitingPatients = getWaitingPatients()) {
    const chip = document.getElementById('deskWaitChip');
    if (!chip) return;
    const minutes = getEstimatedWaitMinutesList(waitingPatients);
    chip.textContent = minutes === 'none'
      ? '대기시간 없음'
      : Array.isArray(minutes)
      ? `예상대기시간 ${minutes.map(value => `${value}분`).join(', ')}`
      : `예상대기시간 ${minutes}분`;
  }

  function formatUpcomingTime(seconds) {
    const safeSeconds = Math.max(0, Number(seconds || 0));
    if (safeSeconds < 60) return '곧';
    return `${Math.ceil(safeSeconds / 60)}분 후`;
  }

  function getCompletedTreatmentFromAlert(bed) {
    const message = bed.lastAlertMessage || '';
    const match = message.match(/·\s*(.+?)\s*완료/);
    return match?.[1] || bed.treatments?.[Math.max(0, Number(bed.currentIndex || 0) - 1)] || bed.treatments?.[bed.currentIndex] || '치료';
  }

  function renderUpcomingAlerts() {
    const list = document.getElementById('receiveUpcomingAlerts');
    if (!list) return;

    const upcoming = bedAssignments
      .map((bed, index) => {
        if (!bed) return null;
        const remaining = getRemaining(bed);
        const isAlertPending = Boolean(bed.lastAlertId);
        if (!isAlertPending && (bed.complete || !bed.running || remaining <= 0)) return null;
        const treatment = isAlertPending
          ? getCompletedTreatmentFromAlert(bed)
          : (bed.treatments?.[bed.currentIndex] || '치료');
        return {
          bedNo: index + 1,
          bedLabel: getBedLabel(index + 1),
          name: bed.name || '',
          doctorName: bed.doctorName || '',
          nurseName: bed.nurseName || '',
          treatment,
          remaining,
          alertPending: isAlertPending
        };
      })
      .filter(Boolean)
      .sort((a, b) => {
        if (a.alertPending !== b.alertPending) return a.alertPending ? -1 : 1;
        return a.remaining - b.remaining;
      });

    list.innerHTML = upcoming.length
      ? upcoming.map(item => {
        const staffLine = [
          item.doctorName ? `원장 ${escapeHtml(item.doctorName)}` : '',
          item.nurseName ? `간호사 ${escapeHtml(item.nurseName)}` : ''
        ].filter(Boolean).join(' · ');
        return `
        <div class="upcoming-item">
          <div class="upcoming-time">${item.alertPending ? '완료' : formatUpcomingTime(item.remaining)}</div>
          <div>
            <div class="upcoming-main">${escapeHtml(item.bedLabel)} ${escapeHtml(item.treatment)} 완료</div>
            <div class="upcoming-sub">${escapeHtml(item.name)} · ${item.alertPending ? '확인 대기' : formatTimer(item.remaining)}</div>
            ${staffLine ? `<div class="upcoming-staff">${staffLine}</div>` : ''}
          </div>
        </div>`;
      }).join('')
      : `<div class="empty-state"><div class="empty-icon">⏱</div><div class="empty-text">진행 중인 타이머가 없습니다</div></div>`;
  }

  function formatTimer(seconds) {
    const safeSeconds = Math.max(0, seconds);
    const minutes = String(Math.floor(safeSeconds / 60)).padStart(2, '0');
    const rest = String(safeSeconds % 60).padStart(2, '0');
    return `${minutes}:${rest}`;
  }

  function renderBedSelector() {
    const selector = document.getElementById('bedSelector');
    renderBedSelectorOptions(selector, selectedBedNo);

  }

  function renderBedSelectorOptions(selector, selectedValue) {
    if (!selector) return;
    selector.innerHTML = ACTIVE_BED_NUMBERS.map((bedNo) => {
      const bed = bedAssignments[bedNo - 1];
      const bedLabel = getBedLabel(bedNo);
      const label = bed ? `${bedLabel} - ${bed.name}` : `${bedLabel} - 비어 있음`;
      return `<option value="${bedNo}">${escapeHtml(label)}</option>`;
    }).join('');
    selector.value = String(ACTIVE_BED_NUMBERS.includes(selectedValue) ? selectedValue : 1);
  }

  window.selectBed = (bedNo) => {
    if (!ACTIVE_BED_NUMBERS.includes(bedNo)) bedNo = 1;
    selectedBedNo = bedNo;
    renderBedSelector();
    renderBedDetail();
    if (document.getElementById('bedPanel')?.classList.contains('bed-edit-open')) populateBedEditForm();
  };

  function renderBedDetail() {
    const detail = document.getElementById('bedDetail');
    renderBodyPartSelector();
    renderBedDetailInto(detail, selectedBedNo, true);
    updateBedRemainingChip();
  }

  function renderReceiveBedDetail() {
    const detail = document.getElementById('receiveBedDetail');
    renderBedDetailInto(detail, selectedReceiveBedNo, true, 'receive');
  }

  function renderBedDetailInto(detail, bedNo, allowControls, context = 'bed') {
    if (!detail) return;
    detail.classList.add('active');
    detail.innerHTML = renderBedDetailMarkup(bedNo, allowControls, context);
  }

  function getBedRemainingTreatmentSeconds(bed) {
    if (!bed) return 0;
    const pendingAlertProcedureSeconds = bed.lastAlertId ? getProcedureSeconds() : 0;
    if (bed.complete) return pendingAlertProcedureSeconds;
    const treatments = Array.isArray(bed.treatments) ? bed.treatments : [];
    const currentIndex = Number(bed.currentIndex || 0);
    const remainingTreatments = treatments.slice(currentIndex);
    const currentRemaining = getRemaining(bed);
    const futureSeconds = treatments
      .slice(currentIndex + 1)
      .reduce((sum, treatment) => sum + getTreatmentSeconds(treatment), 0);
    return currentRemaining + futureSeconds + (remainingTreatments.length * getProcedureSeconds()) + pendingAlertProcedureSeconds;
  }

  function updateBedRemainingChip() {
    const chip = document.getElementById('bedRemainingChip');
    if (!chip) return;
    const bed = bedAssignments[selectedBedNo - 1];
    const minutes = Math.ceil(getBedRemainingTreatmentSeconds(bed) / 60);
    chip.textContent = `남은 진료 시간 ${minutes}분`;
  }
  window.updateBedRemainingChip = updateBedRemainingChip;

  function renderBedDetailTreatmentChips(bed, bedNo) {
    const treatments = Array.isArray(bed.treatments) ? bed.treatments : [];
    if (!treatments.length) {
      return '<span class="bed-treatment-chip waiting">치료 정보 -</span>';
    }

    const currentIndex = Number(bed.currentIndex || 0);
    return treatments.map((treatment, index) => {
      const chipClass = bed.complete
        ? 'done'
        : (index < currentIndex ? 'done' : (index === currentIndex ? 'current' : 'waiting'));
      const runningClass = bed.running && index === currentIndex ? ' running' : '';
      return `<span class="bed-treatment-chip ${chipClass}${runningClass}" draggable="true"
        ondragstart="handleTreatChipDragStart(event,${bedNo},${index})"
        ondragover="handleTreatChipDragOver(event,${bedNo},${index})"
        ondrop="handleTreatChipDrop(event,${bedNo},${index})"
        ondragend="handleTreatChipDragEnd(event)"
        ondragleave="handleTreatChipDragLeave(event)"
      >${escapeHtml(treatment)}</span>`;
    }).join('');
  }

  function renderBodyPartChips(bed) {
    const selectedParts = normalizeBodyParts(bed.bodyParts);
    const parts = [...selectedParts.front, ...selectedParts.back];
    if (!parts.length) return '<span class="bed-meta-chip">치료부위 선택 없음</span>';
    return parts.map(part => `<span class="body-part-chip">${escapeHtml(part)}</span>`).join('');
  }

  function getBedDetailPatientSummaryChips(bed) {
    const parts = [
      bed.chartNo ? `${bed.chartNo}번` : '',
      bed.visitType || '',
      bed.gender || '',
      bed.age ? `${bed.age}세` : '',
      bed.chiefComplaint || '',
      bed.memo || ''
    ].filter(Boolean);

    if (!parts.length) return '';
    return parts.map(part => `<span class="bed-patient-summary-chip">${escapeHtml(part)}</span>`).join('');
  }

  function renderBedDetailPatientInfo(bed, bedNo, showClearButton = false) {
    const patientSummary = getBedDetailPatientSummaryChips(bed);
    const infoChips = [
      bed.doctorName || '-',
      bed.nurseName || '-'
    ].map(value => `<span class="bed-meta-chip">${escapeHtml(value)}</span>`).join('');

    return `
      <div class="bed-detail-info${showClearButton ? ' has-action' : ''}">
        <div>
          ${patientSummary ? `<div class="bed-detail-chip-row">${patientSummary}</div>` : ''}
          <div class="bed-detail-chip-row">${infoChips}</div>
          <div class="body-selected-list">${renderBodyPartChips(bed)}</div>
          <div class="bed-detail-treatment-row">${renderBedDetailTreatmentChips(bed, bedNo)}</div>
        </div>
        ${showClearButton ? `<button class="bed-clear-btn" onclick="confirmClearBedNumber(${bedNo})">베드 비우기</button>` : ''}
      </div>`;
  }

  function renderBedDetailMarkup(bedNo, allowControls, context = 'bed') {
    const bed = bedAssignments[bedNo - 1];
    const bedLabel = getBedLabel(bedNo);
    if (!bed) {
      return `
        <div class="empty-state">
          <div class="empty-icon">⏱</div>
          <div class="empty-text">${escapeHtml(bedLabel)} 현재 비어 있습니다</div>
        </div>`;
    }

    const currentTreatment = bed.treatments?.[bed.currentIndex];
    return `
      <div class="card">
        <div class="bed-summary">
          <div>
            <div class="card-label">${escapeHtml(bedLabel)}</div>
            <div class="bed-name-row">
              <div class="bed-name">${escapeHtml(bed.name)}</div>
            </div>
          </div>
          <div class="bed-time">${escapeHtml(bed.timeStr || '')}</div>
        </div>
        ${renderBedDetailPatientInfo(bed, bedNo, allowControls && context === 'bed')}
        ${bed.lastAlertId ? `<div class="bed-alert-card">
          <div class="bed-alert-message">${escapeHtml(bed.lastAlertMessage || `${bed.name || ''} 치료 완료`)}</div>
          <button class="bed-alert-btn" onclick="acknowledgeBedAlert(${bedNo})">알림 확인</button>
        </div>` : ''}
        <div class="timer-list">
          ${bed.complete ? renderCompleteCard(bedNo, bed, allowControls, context) : renderTimerCard(bedNo, bed, currentTreatment, allowControls, context)}
        </div>
        ${allowControls && context !== 'bed' && !bed.complete ? `<button class="bed-clear-btn" onclick="confirmClearBedNumber(${bedNo})">베드 비우기</button>` : ''}
      </div>`;
  }

  function getRemaining(bed) {
    if (!bed || bed.complete) return 0;
    const baseRemaining = Number(bed.remaining || 0);
    if (!bed.running || !bed.startedAt) return Math.max(0, baseRemaining);
    return Math.max(0, baseRemaining - Math.floor((Date.now() - bed.startedAt) / 1000));
  }

  function renderTimerCard(bedNo, bed, treatment, allowControls = true, context = 'bed') {
    const remaining = getRemaining(bed);
    const percent = bed.total ? Math.max(0, Math.min(100, (remaining / bed.total) * 100)) : 0;
    const timerId = `${context}-timer-bed-${bedNo}`;
    const clockId = `${context}-timer-clock-bed-${bedNo}`;
    const barId = `${context}-timer-bar-bed-${bedNo}`;
    const inputId = `${context}-timer-minutes-bed-${bedNo}`;
    const toggleLabel = bed.running ? '일시정지' : '시작';
    const toggleClass = bed.running ? 'pause' : 'primary';
    const isBedContext = context === 'bed';
    return `
      <div class="timer-card" id="${timerId}">
        <div class="timer-top">
          <div>
            <div class="timer-treatment">${escapeHtml(treatment)}</div>
            <div class="timer-step">${bed.currentIndex + 1}/${bed.treatments.length}번째 치료</div>
            <div class="bed-patient-meta">기본 ${Math.round(bed.total / 60)}분</div>
          </div>
          <div class="timer-clock" id="${clockId}">${formatTimer(remaining)}</div>
        </div>
        <div class="timer-progress"><div class="timer-bar" id="${barId}" style="width:${percent}%"></div></div>
        ${allowControls ? `<div class="treatment-nav">
          <button class="timer-btn" onclick="moveTreatment(${bedNo}, -1)" ${bed.currentIndex <= 0 ? 'disabled' : ''}>이전 치료</button>
          <button class="timer-btn" onclick="moveTreatment(${bedNo}, 1)" ${bed.currentIndex >= bed.treatments.length - 1 ? 'disabled' : ''}>이후 치료</button>
        </div>` : ''}
        ${allowControls ? `<div class="timer-settings${isBedContext ? ' bed-timer-settings' : ''}">
          <input class="timer-minute-input" id="${inputId}" type="number" min="1" max="120" step="1" value="${Math.max(1, Math.round(bed.total / 60))}" aria-label="타이머 시간 분">
          <button class="timer-set-btn" onclick="setTimerMinutes(${bedNo}, '${context}')">시간 설정</button>
          ${isBedContext ? `<button class="timer-set-btn" onclick="resetTimer(${bedNo})">초기화</button>` : ''}
        </div>` : ''}
        ${allowControls ? `<div class="timer-actions${isBedContext ? ' bed-timer-actions' : ''}">
          <button class="timer-btn ${toggleClass}" onclick="toggleTimer(${bedNo})">${toggleLabel}</button>
          ${isBedContext ? '' : `<button class="timer-btn" onclick="resetTimer(${bedNo})">초기화</button>`}
        </div>` : ''}
      </div>`;
  }

  function renderCompleteCard(bedNo, bed, allowControls = true, context = 'bed') {
    return `
      <div class="timer-card done">
        <div class="timer-top">
          <div>
            <div class="timer-treatment">모든 치료 완료</div>
            <div class="timer-step">${(bed.treatments || []).map(escapeHtml).join(' → ')}</div>
          </div>
          <div class="timer-clock">완료</div>
        </div>
        ${allowControls ? `<div class="treatment-nav">
          <button class="timer-btn" onclick="moveTreatment(${bedNo}, -1)" ${(bed.currentIndex || 0) <= 0 ? 'disabled' : ''}>이전 치료</button>
          <button class="timer-btn" disabled>이후 치료</button>
        </div>
        ${context === 'bed' ? '' : `<button class="bed-clear-btn" onclick="confirmClearBedNumber(${bedNo})">베드 비우기</button>`}` : ''}
      </div>`;
  }

  function updateTimerDom(bedNo) {
    const bed = bedAssignments[bedNo - 1];
    if (!bed) return;

    const remaining = getRemaining(bed);
    const percent = bed.total ? Math.max(0, Math.min(100, (remaining / bed.total) * 100)) : 0;

    ['bed', 'receive'].forEach(context => {
      const clock = document.getElementById(`${context}-timer-clock-bed-${bedNo}`);
      const bar = document.getElementById(`${context}-timer-bar-bed-${bedNo}`);
      const card = document.getElementById(`${context}-timer-bed-${bedNo}`);

      if (clock) clock.textContent = formatTimer(remaining);
      if (bar) bar.style.width = `${percent}%`;
      if (card) card.classList.toggle('done', remaining <= 0);
    });
    renderBedMonitors();
    renderUpcomingAlerts();
    if (bedNo === selectedBedNo) updateBedRemainingChip();
  }

  window.startTimer = async (bedNo) => {
    const bed = bedAssignments[bedNo - 1];
    if (!bed || bed.running || bed.complete || getRemaining(bed) <= 0) return;

    await update(ref(db, `beds/${bedNo}`), {
      running: true,
      startedAt: Date.now(),
      remaining: getRemaining(bed)
    });
    playTimerStartSound();
  };

  window.toggleTimer = async (bedNo) => {
    const bed = bedAssignments[bedNo - 1];
    if (!bed || bed.complete || getRemaining(bed) <= 0) return;
    if (bed.running) {
      await pauseTimer(bedNo);
    } else {
      await startTimer(bedNo);
    }
  };

  async function finishBedStep(bedNo) {
    if (finishingBeds.has(bedNo)) return;
    finishingBeds.add(bedNo);

    const bedBefore = bedAssignments[bedNo - 1];
    const completedTreatment = bedBefore?.treatments?.[bedBefore.currentIndex] || '치료';
    const patientName = bedBefore?.name || '';
    const alertId = `${bedBefore?.patientKey || bedNo}-${bedBefore?.currentIndex || 0}-${Date.now()}`;

    const result = await runTransaction(ref(db, `beds/${bedNo}`), (bed) => {
      if (!bed || bed.complete) return bed;

      const remaining = getRemaining(bed);
      if (!bed.running || remaining > 0) return bed;

      const nextIndex = bed.currentIndex + 1;
      if (nextIndex >= (bed.treatments || []).length) {
        return {
          ...bed,
          running: false,
          startedAt: null,
          remaining: 0,
          complete: true,
          lastAlertId: alertId,
          lastAlertMessage: `${bedNo}번 베드 ${bed.name} · ${bed.treatments[bed.currentIndex]} 완료`
        };
      }

      const nextTotal = getTreatmentSeconds(bed.treatments[nextIndex]);
      return {
        ...bed,
        currentIndex: nextIndex,
        total: nextTotal,
        remaining: nextTotal,
        running: false,
        startedAt: null,
        complete: false,
        lastAlertId: alertId,
        lastAlertMessage: `${bedNo}번 베드 ${bed.name} · ${bed.treatments[bed.currentIndex]} 완료`
      };
    });

    finishingBeds.delete(bedNo);

    if (result.committed && bedBefore) {
      if (!queuedTimerAlerts.has(alertId)) {
        showTimerCompleteAlert(`${bedNo}번 베드 ${patientName} · ${completedTreatment} 완료`, bedNo, alertId);
      }
      seenTimerAlerts.add(alertId);
    }
  }

  window.pauseTimer = async (bedNo) => {
    const bed = bedAssignments[bedNo - 1];
    if (!bed) return;

    await update(ref(db, `beds/${bedNo}`), {
      running: false,
      startedAt: null,
      remaining: getRemaining(bed)
    });
  };

  window.toggleBodyPart = async (side, part) => {
    const bed = bedAssignments[selectedBedNo - 1];
    if (!bed || !BODY_PARTS[side]) return;

    const bodyParts = normalizeBodyParts(bed.bodyParts);
    const current = new Set(bodyParts[side]);
    if (current.has(part)) {
      current.delete(part);
    } else {
      current.add(part);
    }

    const nextBodyParts = {
      ...bodyParts,
      [side]: [...current]
    };

    const updates = [
      update(ref(db, `beds/${selectedBedNo}`), { bodyParts: nextBodyParts })
    ];

    if (bed.patientKey) {
      updates.push(update(ref(db, `patients/${bed.patientKey}`), { bodyParts: nextBodyParts }));
    }

    await Promise.all(updates);
  };

  window.toggleFormBodyPart = (scope, side, part) => {
    if (!BODY_PARTS[side]) return;
    const currentParts = normalizeBodyParts(formBodyPartsByScope[scope]);
    const current = new Set(currentParts[side]);
    if (current.has(part)) {
      current.delete(part);
    } else {
      current.add(part);
    }

    formBodyPartsByScope[scope] = {
      ...currentParts,
      [side]: [...current]
    };
    renderFormBodyPartSelector(scope);
  };
  renderAllFormBodyPartSelectors();

  window.resetTimer = async (bedNo) => {
    const bed = bedAssignments[bedNo - 1];
    if (!bed) return;

    const total = getTreatmentSeconds(bed.treatments[bed.currentIndex]);
    await update(ref(db, `beds/${bedNo}`), {
      running: false,
      startedAt: null,
      total,
      remaining: total
    });
  };

  window.moveTreatment = async (bedNo, direction) => {
    const bed = bedAssignments[bedNo - 1];
    if (!bed) return;

    const treatments = bed.treatments || [];
    const nextIndex = Math.max(0, Math.min(treatments.length - 1, (bed.currentIndex || 0) + direction));
    if (nextIndex === bed.currentIndex || !treatments[nextIndex]) return;

    const total = getTreatmentSeconds(treatments[nextIndex]);
    await update(ref(db, `beds/${bedNo}`), {
      currentIndex: nextIndex,
      running: false,
      startedAt: null,
      complete: false,
      total,
      remaining: total,
      lastAlertId: null,
      lastAlertMessage: null
    });
    clearLocalTimerAlertsForBed(bedNo);
  };

  window.setTimerMinutes = async (bedNo, context = 'bed') => {
    const bed = bedAssignments[bedNo - 1];
    const input = document.getElementById(`${context}-timer-minutes-bed-${bedNo}`) ||
      document.querySelector(`[id$="-timer-minutes-bed-${bedNo}"]`);
    if (!bed || !input) return;

    const minutes = Math.max(1, Math.min(120, Number(input.value) || 1));
    const total = Math.round(minutes * 60);
    await update(ref(db, `beds/${bedNo}`), {
      running: false,
      startedAt: null,
      total,
      remaining: total
    });
    showToast(`${bedNo}번 베드 ${minutes}분으로 설정`);

  window.clearBed = async (bedNo) => {

    if (bed?.patientKey) {
      patientsByKey.delete(bed.patientKey);
      loadedKeys.delete(bed.patientKey);
      await remove(ref(db, `patients/${bed.patientKey}`));
    }
    await remove(ref(db, `beds/${bedNo}`));

  window.confirmClearBedNumber = async (bedNo) => {

      await clearBed(bedNo);

  window.confirmClearSelectedBed = async () => {

  async function updatePatientBedNoForBed(bedNo, bed) {
    if (!bed?.patientKey) return;
    await update(ref(db, `patients/${bed.patientKey}`), { bedNo, bedStatus: 'assigned' });
  }

  function remapLocalAlertBedNo(alertId, bedNo) {
    if (!alertId) return;
    if (activeTimerAlert?.alertId === alertId) activeTimerAlert.bedNo = bedNo;
    timerAlertQueue.forEach(alert => {
      if (alert.alertId === alertId) alert.bedNo = bedNo;
    });
  }

  window.moveOrSwapBed = async (fromBedNo, toBedNo) => {
    if (fromBedNo === toBedNo) return false;

    const fromBed = bedAssignments[fromBedNo - 1];
    if (!fromBed) return false;

    const result = await runTransaction(ref(db, 'beds'), (beds) => {
      beds = beds || {};
      const fromKey = String(fromBedNo);
      const toKey = String(toBedNo);
      const movingBed = beds[fromKey];
      if (!movingBed) return;

      const targetBed = beds[toKey] || null;
      if (targetBed) {
        beds[fromKey] = targetBed;
        beds[toKey] = movingBed;
      } else {
        beds[toKey] = movingBed;
        delete beds[fromKey];
      }
      return beds;
    });

    if (result.committed) {
      const movedBeds = result.snapshot.val() || {};
      await Promise.all([
        updatePatientBedNoForBed(fromBedNo, movedBeds[String(fromBedNo)]),
        updatePatientBedNoForBed(toBedNo, movedBeds[String(toBedNo)])
      ]);
      remapLocalAlertBedNo(movedBeds[String(fromBedNo)]?.lastAlertId, fromBedNo);
      remapLocalAlertBedNo(movedBeds[String(toBedNo)]?.lastAlertId, toBedNo);
      showToast(`${getBedLabel(fromBedNo)} → ${getBedLabel(toBedNo)} 이동 완료`);
      return true;
    }

    showToast('베드 이동 실패');
    return false;

    if (event.dataTransfer.getData('text/plain')?.startsWith?.('treat:')) return;

      event.preventDefault();

  window.handleBedDragOver = (event, bedNo) => {

    event.dataTransfer.dropEffect = 'move';

  window.handleBedDrop = async (event, bedNo) => {
    event.preventDefault();

  window.handleTreatChipDragStart = (event, bedNo, fromIndex) => {
    // 베드 드래그가 시작되지 않도록 버블링 차단

  window.handleTreatChipDragOver = (event, bedNo, toIndex) => {

  window.handleTreatChipDragEnd = (event) => {

  window.handleTreatChipDrop = async (event, bedNo, toIndex) => {
    event.stopPropagation();
    event.preventDefault();
    event.currentTarget.classList.remove('treat-drag-over');
    if (!draggedTreatment || draggedTreatment.bedNo !== bedNo) return;
    const fromIndex = draggedTreatment.fromIndex;
    draggedTreatment = null;
    if (fromIndex === toIndex) return;

    const bed = bedAssignments[bedNo - 1];
    if (!bed) return;

    const treatments = [...(bed.treatments || [])];
    // 순서 교체
    const [moved] = treatments.splice(fromIndex, 1);
    treatments.splice(toIndex, 0, moved);

    const firstTreatment = treatments[0] || '';
    const firstTotal = getTreatmentSeconds(firstTreatment);
    const resetPayload = {
      treatments,
      currentIndex: 0,
      total: firstTotal,
      remaining: firstTotal,
      running: false,
      startedAt: null,
      complete: false,
      lastAlertId: null,
      lastAlertMessage: null
    };

    try {
      await update(ref(db, `beds/${bedNo}`), resetPayload);
      if (bed.patientKey) {
        await update(ref(db, `patients/${bed.patientKey}`), { treatments });
      }
      clearLocalTimerAlertsForBed(bedNo);
    } catch(e) {
      console.error(e);
      showToast('순서 변경 실패 — 연결을 확인해주세요');
    }
  };

  function getBedStatus(bedNo) {
    const bed = bedAssignments[bedNo - 1];
    const bedLabel = getBedLabel(bedNo);
    if (!bed) {
      return { bedNo, bedLabel, empty: true, stageState: 'empty', stageLabel: '비어 있음' };
    }

    const treatments = bed.treatments || [];
    const currentIndex = Number(bed.currentIndex || 0);
    const treatment = bed.complete ? '완료' : treatments[currentIndex];
    const remainingSeconds = getRemaining(bed);
    const totalSeconds = Number(bed.total || 0);
    const previousTreatment = currentIndex > 0 ? treatments[currentIndex - 1] : '';
    const lastTreatment = treatments[treatments.length - 1] || '';
    const statusLabel = bed.complete
      ? (lastTreatment ? `${lastTreatment} 완료` : '완료')
      : (previousTreatment ? `${previousTreatment} 완료 ${treatment} 준비` : `${treatment} 준비`);
    const isWaitingToStart = !bed.complete && !bed.running && remainingSeconds >= totalSeconds;
    const stageState = bed.complete
      ? 'complete'
      : (bed.running ? 'running' : (isWaitingToStart ? 'ready' : 'paused'));
    const stageLabel = bed.complete
      ? '완료'
      : (bed.running ? '진행중' : (isWaitingToStart ? '시작 전' : '일시정지'));
    return {
      bedNo,
      bedLabel,
      empty: false,
      complete: bed.complete,
      alerting: Boolean(bed.lastAlertId),
      name: bed.name,
      doctorName: bed.doctorName || '',
      nurseName: bed.nurseName || '',
      treatment,
      statusLabel,
      stageState,
      stageLabel,
      statusDetail: bed.running ? `${treatment} 진행중` : (isWaitingToStart ? statusLabel : treatment),
      remaining: bed.complete ? '완료' : formatTimer(remainingSeconds),
      currentIndex,
      treatments,
      timeStr: bed.timeStr || '',
      visitType: bed.visitType || '',
      gender: bed.gender || '',
      age: bed.age || '',
      chiefComplaint: bed.chiefComplaint || '',
      memo: bed.memo || '',
      bodyParts: normalizeBodyParts(bed.bodyParts)
    };
  }

  function renderBedPopover(status) {
    if (status.empty) {
      return `
        <div class="bed-popover">

          <div class="bed-popover-line">현재 비어 있습니다</div>
        </div>`;
    }

    const chips = status.treatments.map((treatment, index) => {
      const chipClass = status.complete
        ? 'done'
        : (index < status.currentIndex ? 'done' : (index === status.currentIndex ? 'current' : 'waiting'));
      const runningClass = status.stageState === 'running' && index === status.currentIndex ? ' running' : '';
      return `<span class="bed-treatment-chip ${chipClass}${runningClass}" draggable="true"
        ondragstart="handleTreatChipDragStart(event,${status.bedNo},${index})"
        ondragover="handleTreatChipDragOver(event,${status.bedNo},${index})"
        ondrop="handleTreatChipDrop(event,${status.bedNo},${index})"
        ondragend="handleTreatChipDragEnd(event)"
        ondragleave="handleTreatChipDragLeave(event)"
        >${escapeHtml(treatment)}</span>`;
    }).join('');

    return `
      <div class="bed-popover">
        <div class="bed-treatment-strip">${chips}</div>
        <div class="body-selected-list">${renderBodyPartChips({ bodyParts: status.bodyParts })}</div>

    ].join('');

            <span class="bed-status-time">-</span>

      status.memo ? `<span class="bed-meta-chip bed-meta-chip--flex">${escapeHtml(status.memo)}</span>` : ''
    ].filter(Boolean).join('');
    return `
      <div class="bed-status${status.complete ? ' done' : ' active'}${activeClass}${status.alerting ? ' alerting' : ''}" tabindex="0" onclick="${clickAction}"${dragHandlers}${canMoveBed ? ` oncontextmenu="confirmClearBed(event, ${status.bedNo})"` : ''}>
        <div class="bed-status-top">
          <span class="bed-status-no">${escapeHtml(status.bedLabel)} ${escapeHtml(status.name)}</span>
          <span class="bed-status-time">${escapeHtml(status.remaining)}</span>
        </div>
        ${infoChips ? `<div class="bed-status-info">${infoChips}</div>` : ''}
        <div class="bed-status-treatment">
          ${staffHtml}
        </div>
        ${renderBedPopover(status)}
      </div>`;
  }

  function syncTimerAlertsWithBeds() {
    const activeAlertIds = getActiveBedAlertIds();
    let changed = false;

    if (activeTimerAlert?.alertId && !activeAlertIds.has(activeTimerAlert.alertId)) {
      activeTimerAlert = null;
      isTimerAlertOpen = false;
      document.getElementById('timerAlertOverlay').classList.remove('show');
      stopTimerAlertBeeps();
      changed = true;
    }

    for (let i = timerAlertQueue.length - 1; i >= 0; i--) {
      const alert = timerAlertQueue[i];
      if (alert.alertId && !activeAlertIds.has(alert.alertId)) {
        timerAlertQueue.splice(i, 1);
        changed = true;
      }
    }

    queuedTimerAlerts.forEach(alertId => {
      if (!activeAlertIds.has(alertId)) queuedTimerAlerts.delete(alertId);
    });
    seenTimerAlerts.forEach(alertId => {
      if (!activeAlertIds.has(alertId)) seenTimerAlerts.delete(alertId);
    });

    if (changed) syncPendingTimerAlertBeds();

  function playSoftTimerChime() {
    try {
      if (!timerAlertAudioCtx) {
        timerAlertAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      const ctx = timerAlertAudioCtx;
      const master = ctx.createGain();
      master.gain.setValueAtTime(0.55, ctx.currentTime);
      master.connect(ctx.destination);

      const notes = [
        { freq: 523.25, at: 0.00, type: 'sine', volume: 0.18 },
        { freq: 659.25, at: 0.16, type: 'sine', volume: 0.16 },
        { freq: 783.99, at: 0.32, type: 'triangle', volume: 0.14 },
        { freq: 1046.5, at: 0.52, type: 'sine', volume: 0.10 }
      ];

      notes.forEach(({ freq, at, type, volume }) => {
        const start = ctx.currentTime + at;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, start);
        osc.connect(gain);
        gain.connect(master);
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(volume, start + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, start + 0.9);
        osc.start(start);
        osc.stop(start + 0.95);
      });
    } catch(e) {}
  }

  function startTimerAlertBeeps() {
    stopTimerAlertBeeps();
    playSoftTimerChime();
    timerAlertBeepTimer = setInterval(playSoftTimerChime, 3000);
    timerAlertStopTimer = setTimeout(stopTimerAlertBeeps, 60000);
  }

  function stopTimerAlertBeeps() {
    if (timerAlertBeepTimer) clearInterval(timerAlertBeepTimer);
    if (timerAlertStopTimer) clearTimeout(timerAlertStopTimer);
    timerAlertBeepTimer = null;
    timerAlertStopTimer = null;
  }

  function hasAnyBedAlert() {
    return bedAssignments.some(bed => Boolean(bed?.lastAlertId));

  function isReceivePanelActive() {
    return document.getElementById('receivePanel')?.classList.contains('active');

  function startReceiveAlertBeeps() {
    if (receiveAlertBeepTimer) return;
    playSoftTimerChime();
    receiveAlertBeepTimer = setInterval(playSoftTimerChime, 3000);
  }

  function stopReceiveAlertBeeps() {
    if (receiveAlertBeepTimer) clearInterval(receiveAlertBeepTimer);
    receiveAlertBeepTimer = null;
  }

  function updateReceiveAlertAudioState() {
    if (isReceivePanelActive() && hasAnyBedAlert()) {
      startReceiveAlertBeeps();
    } else {
      stopReceiveAlertBeeps();
    }
