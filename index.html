<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#07111f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest" id="appManifestLink">
<script>
  (() => {
    const manifestLink = document.getElementById('appManifestLink');
    const params = new URLSearchParams(window.location.search);
    const view = (params.get('view') || '').toLowerCase();
    const bedNo = Number(params.get('bed'));
    if (new Set(['desk', 'notify', 'clinic']).has(view)) {
      manifestLink.href = `manifest-${view}.webmanifest`;
      return;
    }
    const regularBeds = new Set([1, 2, 3, 4, 5, 6, 8, 9, 10, 11, 12, 13, 14, 15]);
    if (regularBeds.has(bedNo)) manifestLink.href = `manifest-bed${bedNo}.webmanifest`;
    if (bedNo === 101 || bedNo === 102) manifestLink.href = `manifest-doctor${bedNo - 100}.webmanifest`;
  })();
</script>
<link rel="apple-touch-icon" href="assets/logo-icon.png">
<title>경희홍익 진료보드</title>

  /* ─── 입력 패널 ─── */

  body.app-mode-receive .receive-panel.receive-form-open:not(.receive-edit-open) .receive-form-column,
  body.app-role-doctor .receive-panel.receive-form-open:not(.receive-edit-open) .receive-form-column,

    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 900;
    padding: 7px 8px;
    text-align: right;
  }
  .treatment-time-unit {
    font-size: 11px;
    color: var(--text2);
    margin-left: 2px;
    white-space: nowrap;
  }
  .treatment-time-row--procedure {
    border-color: var(--accent2);
    grid-column: 1 / -1;
  }
  .treatment-time-row-inner {
    display: flex;
    align-items: center;
    gap: 3px;
  }

  @media (min-width: 560px) {
    .bed-monitor { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  }

  @media (min-width: 860px) {
    .input-panel:not(.input-form-open) .input-layout { grid-template-columns: minmax(320px, 1fr) minmax(0, 2fr); align-items: start; }
    .input-panel.input-form-open .input-layout { grid-template-columns: minmax(0, 2fr) minmax(260px, 1fr); align-items: start; }
    .receive-layout { grid-template-columns: minmax(320px, 1fr) minmax(0, 2fr); align-items: start; }
    .receive-panel.receive-form-open .receive-layout { grid-template-columns: minmax(0, 2fr) minmax(260px, 1fr); align-items: start; }
    .staff-manager-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); align-items: start; }
  }

  @media (max-width: 1050px) {
    .input-panel.input-form-open .input-form-column > .card,
    .receive-panel.receive-form-open .receive-form-column > .card {
      grid-template-columns: 1fr;
    }
    .input-panel.input-form-open #deskBodyPartSection,
    .receive-panel.receive-form-open #receiveBodyPartSection {
      grid-column: 1;
      grid-row: auto;
    }
    .input-panel.input-form-open #deskBodyPartForm,
    .receive-panel.receive-form-open #receiveBodyPartForm {
      min-height: 0;
    }
  }

  @media (min-width: 1200px) {
    #inputBedMonitor,
    #receiveBedMonitor { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  }

  @media (max-width: 859px) {
    .bed-workspace { grid-template-columns: 1fr; }
    body.app-mode-bed .bed-workspace,
    body.app-role-bed .bed-workspace {
      grid-template-columns: 1fr;
      grid-template-areas:
        "info"
        "timer"
        "schedule"
        "body"
        "edit"
        "package";
    }
    body.app-mode-bed .bed-left-column,
    body.app-role-bed .bed-left-column,
    .bed-detail-card--bed {
      grid-template-columns: 1fr;
    }
    body.app-mode-bed .bed-left-column,
    body.app-role-bed .bed-left-column {
      grid-template-areas:
        "body"
        "edit";
    }
    .bed-detail-card--bed {
      grid-template-areas:
        "info"
        "timer"
        "schedule";
    }
  }

  @media (max-height: 820px) and (orientation: landscape) {
    body.app-role-bed .app { padding: 8px 8px 16px; }
    body.app-role-bed .header { padding: 8px 12px; margin-bottom: 8px; }
    body.app-role-bed .brand-icon { width: 34px; height: 34px; }
    body.app-role-bed .bed-header-bed-chip {
      min-height: 34px;
      padding: 0 11px 2px;
      font-size: 23px;
    }
    body.app-role-bed .header-left h1 { font-size: 19px; }
    body.app-role-bed .header-left p { display: none; }
    body.app-role-bed .receive-title { font-size: 13px; }
    body.app-role-bed .bed-name { font-size: 22px; }
    body.app-role-bed .bed-name-meta-chip { font-size: 22px; }
    body.app-role-bed .body-map-card,
    body.app-role-bed .timer-card { padding: 10px; }
    body.app-role-bed .bed-detail-info { padding: 9px; }
    body.app-role-bed .timer-clock {
      font-size: clamp(46px, 5vw, 68px);
      min-width: 156px;
    }
    body.app-role-bed .timer-treatment { font-size: 25px; }
    body.app-role-bed .timer-actions.bed-timer-actions .timer-btn {
      min-height: 50px;
      padding: 12px;
    }
  }

  /* 빈 상태 */
  .bed-arrival-overlay {
    position: fixed;
    inset: 72px 12px 16px;
    z-index: 10000;
    display: none;
    place-items: center;
    border: 0;
    appearance: none;
    background: radial-gradient(circle at 50% 35%, rgba(57,169,245,0.24), rgba(16,27,45,0.98) 52%, rgba(7,17,31,0.99));
    border: 2px solid var(--gold);
    border-radius: 20px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.72), 0 0 60px rgba(240,192,96,0.22);
    color: var(--text);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 28px;
    pointer-events: auto;
    text-align: center;
  }
  .bed-arrival-overlay.show {
    display: grid !important;
  }
  .bed-arrival-name {
    max-width: 96%;
    overflow-wrap: anywhere;
    font-size: clamp(72px, 19vw, 220px);
    font-weight: 900;
    line-height: 1.06;
  }
  @media (max-width: 760px) {
    .bed-arrival-overlay {
      inset: 66px 8px 12px;
      border-radius: 16px;
      padding: 18px;
    }
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
  .empty-text { font-size: 14px; }

  /* 토스트 */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent2);
    color: var(--bg);
    font-size: 13px;
    font-weight: 700;
    padding: 12px 24px;
    border-radius: 30px;
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* 알림 팝업 오버레이 */
  .notif-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding-top: 60px;
  }
  .notif-overlay.show { display: flex; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .notif-popup {
    background: var(--surface);
    border: 2px solid var(--gold);
    border-radius: 20px;
    padding: 28px 24px;
    width: calc(100% - 32px);
    max-width: 400px;
    text-align: center;
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(240,192,96,0.15);
  }
  .notif-popup.credit-popup {
    width: min(1120px, calc(100vw - 32px));
    max-width: min(1120px, calc(100vw - 32px));
    padding-inline: 28px;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.8) translateY(-20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .popup-icon { font-size: 36px; margin-bottom: 12px; }
  .popup-name { font-size: 28px; font-weight: 900; color: var(--text); margin-bottom: 8px; }
  .popup-label { font-size: 12px; color: var(--text3); margin-bottom: 14px; }
  .popup-treats { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 20px; }
  .popup-tag {
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 13px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 20px;
  }
  .popup-close {
    width: 100%;
    padding: 14px;
    background: var(--gold);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.15s;
  }
  .popup-close:hover { background: #f5ce70; }
  .timer-alert-popup {
    border-color: var(--danger);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(251,113,133,0.18);
  }
  .timer-alert-title { display: none; }
  .timer-alert-body {
    font-size: 26px;
    font-weight: 900;
    line-height: 1.25;
    color: var(--text);
    margin-bottom: 22px;
    word-break: keep-all;
  }

  /* 데스크/치료실 차트 조회 폼 */
  .desk-chart-grid,
  .receive-chart-grid {
    grid-template-columns: minmax(132px, 1.65fr) minmax(72px, 1fr) minmax(52px, 0.62fr) 40px 40px;
    align-items: stretch;
  }
  .input-panel.input-form-open .desk-chart-grid,
  .receive-panel.receive-form-open .receive-chart-grid {
    grid-template-columns: minmax(82px, 1.4fr) minmax(54px, 0.95fr) minmax(42px, 0.55fr) 30px 30px;
    gap: 8px;
  }
  .chart-lookup-row {
    grid-column: 1 / 2;
    display: grid;
    grid-template-columns: minmax(0, 1fr);
    gap: 8px;
    align-items: stretch;
    align-self: stretch;
    min-width: 0;
    height: 52px;
  }
  .desk-chart-grid > .form-segment-row,
  .receive-chart-grid > .form-segment-row {
    display: contents;
  }
  .desk-chart-grid > .name-input,
  .desk-chart-grid .chart-lookup-row .name-input,
  .receive-chart-grid > .name-input {
    min-width: 0;
    padding: 12px 10px;
    font-size: 17px;
    height: 52px;
    box-sizing: border-box;
  }
  .input-panel.input-form-open .desk-chart-grid > .name-input,
  .input-panel.input-form-open .desk-chart-grid .chart-lookup-row .name-input,
  .receive-panel.receive-form-open .receive-chart-grid > .name-input {
    padding: 10px 7px;
    font-size: 14px;
  }
  .desk-chart-grid > .name-input::placeholder,
  .desk-chart-grid .chart-lookup-row .name-input::placeholder,
  .receive-chart-grid > .name-input::placeholder {
    font-size: 13px;
  }
  .receive-chart-grid #receiveChartNo {
    grid-column: 1 / 2;
    grid-row: 1;
  }
  .receive-chart-grid #receivePatientName {
    grid-column: 2 / 3;
    grid-row: 1;
  }
  .receive-chart-grid #receiveAgeInput {
    grid-column: 3 / 4;
    grid-row: 1;
  }
  .desk-gender-segment,
  .receive-gender-segment {
    grid-column: 5 / 6;
    grid-row: 1;
    grid-template-columns: 1fr;
    grid-template-rows: repeat(2, minmax(0, 1fr));
    gap: 3px;
    padding: 3px;
    min-width: 0;
    min-height: 52px;
    box-sizing: border-box;
  }
  .desk-visit-segment,
  .receive-visit-segment {
    grid-column: 4 / 5;
    grid-row: 1;
    display: grid;
    grid-template-columns: 1fr;
    grid-template-rows: repeat(2, minmax(0, 1fr));
    gap: 3px;
    padding: 3px;
    min-width: 0;
    min-height: 52px;
    box-sizing: border-box;
  }
  .desk-visit-segment .segment-item,
  .desk-gender-segment .segment-item,
  .receive-visit-segment .segment-item,
  .receive-gender-segment .segment-item {
    min-height: 0;
    font-size: 13px;
  }
  .input-panel.input-form-open .desk-visit-segment .segment-item,
  .input-panel.input-form-open .desk-gender-segment .segment-item,
  .receive-panel.receive-form-open .receive-visit-segment .segment-item,
  .receive-panel.receive-form-open .receive-gender-segment .segment-item {
    font-size: 12px;
  }
  .desk-visit-segment .segment-item span,
  .desk-gender-segment .segment-item span,
  .receive-visit-segment .segment-item span,
  .receive-gender-segment .segment-item span {
    padding: 3px 2px;
  }
  .chart-lookup-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 900;
    white-space: nowrap;
    min-width: 60px;
    transition: opacity 0.15s;
  }
  .desk-chart-grid .chart-lookup-badge {
    display: none;
  }
  .desk-chart-grid #chiefComplaint,
  .receive-chart-grid #receiveChiefComplaint {
    grid-column: 1 / 5;
    grid-row: 2;
  }
  .desk-chart-grid #memoInput,
  .receive-chart-grid #receiveMemoInput {
    grid-column: 1 / 5;
    grid-row: 3;
    height: 92px;
    min-height: 92px;
    line-height: 1.35;
    resize: none;
  }
  .desk-chart-grid .desk-submit-btn,
  .receive-chart-grid .receive-submit-btn {
    grid-column: 5 / 6;
    grid-row: 2 / 4;
    height: 100%;
    min-height: 154px;
    padding: 10px 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    word-break: keep-all;
    writing-mode: vertical-rl;
    text-orientation: upright;
    letter-spacing: 0;
  }
  .input-panel.input-form-open .desk-chart-grid .desk-submit-btn,
  .receive-panel.receive-form-open .receive-chart-grid .receive-submit-btn {
    min-width: 0;
    padding: 8px 2px;
    font-size: 13px;
  }
  .chart-lookup-badge:empty { display: none; }
  .chart-lookup-badge.new {
    background: rgba(255,202,106,0.18);
    border: 1px solid rgba(255,202,106,0.65);
    color: var(--gold);
  }
  .chart-lookup-badge.returning {
    background: rgba(57,169,245,0.18);
    border: 1px solid rgba(57,169,245,0.65);
    color: var(--accent);
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
    margin-right: 5px;
    animation: pulse 2s infinite;
  }
  body.local-fallback-mode .status-dot { background: var(--gold); }
  body.firebase-offline-mode .status-dot { background: var(--danger); }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- 헤더 -->
  <div class="header">
    <div class="header-left">
      <img class="brand-icon" src="assets/logo-icon.png" alt="경희홍익한의원 로고">
      <div class="brand-copy">
        <h1><span>경희</span><span class="brand-highlight">홍익</span><span>한의원</span><span class="bed-header-bed-chip" id="bedHeaderBedChip">1번</span></h1>
        <p id="connectionStatusText"><span class="status-dot"></span>Online</p>
      </div>
      <div class="header-left-desk-controls">
      </div>
    </div>
    <div class="header-actions">
      <div class="header-desk-controls">
        <span class="header-wait-chip bed-count-chip" id="deskBedPatientCount">0/13</span>
        <span class="header-wait-chip" id="deskWaitChip">예상대기시간 0분</span>
        <span class="header-current-time" id="deskCurrentTime"></span>
      </div>
      <div class="header-notify-controls">
        <span class="header-wait-chip" id="notifyWaitChip">예상대기시간 0분</span>
        <div class="doctor-alert-btns" id="doctorAlertBtns"></div>
        <span class="header-current-time" id="notifyCurrentTime"></span>
      </div>
      <div class="header-bed-controls">
        <span class="header-wait-chip bed-count-chip" id="bedPatientCount">0/13</span>
        <span class="header-wait-chip" id="bedRemainingChip">남은 진료 시간 0분</span>
        <span class="header-current-time" id="bedCurrentTime"></span>
      </div>
      <div class="mode-toggle">
        <button class="mode-btn active" onclick="setMode('input')">데스크</button>
        <button class="mode-btn" onclick="setMode('notify')" style="display:none">치료실알림</button>
        <button class="mode-btn" onclick="setMode('receive')">치료실</button>
        <button class="mode-btn" onclick="setMode('bed')">베드</button>
        <button class="mode-btn" onclick="setMode('settings')">설정</button>
      </div>
    </div>
  </div>

  <!-- 입력 패널 -->
  <div class="input-panel active" id="inputPanel">
    <button class="input-drawer-toggle" id="inputFormToggle" data-open="0" onclick="toggleDeskInputForm()" aria-label="입력 열기">›</button>
    <div class="input-layout">
      <div class="input-form-column">
        <div class="card">
          <div class="form-section">
            <div class="patient-info-grid desk-chart-grid">
              <div class="chart-lookup-row">
                <span class="chart-lookup-badge" id="chartLookupBadge"></span>
                <input class="name-input" id="chartNo" type="text" placeholder="차트번호" maxlength="20" autocomplete="off"
                  onkeydown="if(event.key==='Enter'){event.preventDefault(); window.runDeskChartNoLookup?.();}"
                  onchange="window.runDeskChartNoLookup?.()"
                  oninput="window.clearChartLookupBadge?.()">
              </div>
              <input class="name-input" id="patientName" type="text" placeholder="성함" maxlength="10" autocomplete="off">
              <input class="name-input" id="ageInput" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="나이" maxlength="3" autocomplete="off">
              <div class="form-segment-row">
                <div class="segmented desk-visit-segment">
                  <label class="segment-item"><input type="radio" name="visitType" value="초진" checked><span>초</span></label>
                  <label class="segment-item"><input type="radio" name="visitType" value="재진"><span>재</span></label>
                </div>
                <div class="segmented desk-gender-segment">
                  <label class="segment-item"><input type="radio" name="gender" value="남" checked><span>남</span></label>
                  <label class="segment-item"><input type="radio" name="gender" value="여"><span>여</span></label>
                </div>
              </div>
              <input class="name-input wide" id="chiefComplaint" type="text" placeholder="주상병명" maxlength="60" autocomplete="off">
              <textarea class="name-input wide" id="memoInput" placeholder="메모" maxlength="120" rows="3" autocomplete="off"></textarea>
              <button class="submit-btn desk-submit-btn" id="submitBtn" onclick="submitPatient()">입력</button>
            </div>
          </div>

          <div class="form-section">
            <div class="staff-select-grid monitor-staff-grid">
              <select class="staff-select" id="doctorSelect"></select>
              <select class="staff-select" id="nurseSelect"></select>
            </div>
          </div>

          <div class="form-section" id="deskTreatmentSection">
            <div class="treatment-grid monitor-treatment-grid" id="treatmentGrid"></div>
          </div>
          <div class="form-section" id="deskBodyPartSection">
            <div class="form-body-map" id="deskBodyPartForm"></div>
          </div>
        </div>
      </div>

      <div class="input-detail-column">
        <div class="card">
          <div class="card-label">알림</div>
          <div class="upcoming-list" id="inputUpcomingAlerts"></div>
          <div class="doctor-alert-split" id="inputDoctorAlertSplit"></div>
        </div>
      </div>

      <div class="input-monitor-column">
        <div class="card">
          <div class="bed-monitor" id="inputBedMonitor"></div>
        </div>
        <div class="card">
          <div class="card-label">대기</div>
          <div class="waiting-list waiting-list--compact" id="inputWaitingList" ondragover="handleWaitingListDragOver(event)" ondrop="handleWaitingListDrop(event)"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 수신 패널 -->
  <div class="receive-panel" id="receivePanel">
    <button class="input-drawer-toggle receive-drawer-toggle" id="receiveFormToggle" data-open="0" onclick="toggleReceiveForm()" aria-label="입력 열기">›</button>
    <div class="receive-layout">
      <div class="receive-main-column">
        <div class="card">
          <div class="bed-monitor" id="receiveBedMonitor"></div>
        </div>
        <div class="card receive-waiting-card">
          <div class="card-label">대기</div>
          <div class="waiting-list waiting-list--compact" id="receiveWaitingList" ondragover="handleWaitingListDragOver(event)" ondrop="handleWaitingListDrop(event)"></div>
        </div>
      </div>
      <div class="receive-detail-column">
        <div class="receive-form-column">
          <div class="card">
            <div class="form-section">
              <div class="patient-info-grid receive-chart-grid">
                <input class="name-input" id="receiveChartNo" type="text" placeholder="차트번호" maxlength="20" autocomplete="off">
                <input class="name-input" id="receivePatientName" type="text" placeholder="성함" maxlength="10" autocomplete="off">
                <input class="name-input" id="receiveAgeInput" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="나이" maxlength="3" autocomplete="off">
                <div class="form-segment-row">
                  <div class="segmented receive-visit-segment">
                    <label class="segment-item"><input type="radio" name="receiveVisitType" value="초진" checked><span>초</span></label>
                    <label class="segment-item"><input type="radio" name="receiveVisitType" value="재진"><span>재</span></label>
                  </div>
                  <div class="segmented receive-gender-segment">
                    <label class="segment-item"><input type="radio" name="receiveGender" value="남" checked><span>남</span></label>
                    <label class="segment-item"><input type="radio" name="receiveGender" value="여"><span>여</span></label>
                  </div>
                </div>
                <input class="name-input wide" id="receiveChiefComplaint" type="text" placeholder="주상병명" maxlength="60" autocomplete="off">
                <textarea class="name-input wide" id="receiveMemoInput" placeholder="메모" maxlength="120" rows="3" autocomplete="off"></textarea>
                <button class="submit-btn receive-submit-btn" id="receiveSubmitBtn" onclick="submitPatient('receive')">입력</button>
              </div>
            </div>

            <div class="form-section">
              <div class="staff-select-grid monitor-staff-grid">
                <select class="staff-select" id="receiveDoctorSelect"></select>
                <select class="staff-select" id="receiveNurseSelect"></select>
              </div>
            </div>

            <div class="form-section" id="receiveTreatmentSection">
              <div class="treatment-grid monitor-treatment-grid" id="receiveTreatmentGrid"></div>
            </div>
            <div class="form-section" id="receiveBodyPartSection">
              <div class="form-body-map" id="receiveBodyPartForm"></div>
            </div>
          </div>

  async function localStateGet(key) {
    if (!SERVER_MODE) return null;
    const res = await fetch(`/api/state/${encodeURIComponent(key)}`, { cache: 'no-store' });
    if (!res.ok) throw new Error(`로컬 상태 조회 실패: ${key}`);
    return (await res.json()).value;
  }

  async function localStatePut(key, value) {
    if (!SERVER_MODE) return null;
    const res = await fetch(`/api/state/${encodeURIComponent(key)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json; charset=utf-8' },
      body: JSON.stringify({ value })
    });
    if (!res.ok) throw new Error(`로컬 상태 저장 실패: ${key}`);
    return (await res.json()).value;
  }

  async function syncLocalSnapshot(key, value) {
    try {
      await localStatePut(key, value || {});

        await localStatePut('bedsDirty', false);
      }
    } catch (error) {

    if (!SERVER_MODE) return;

      await syncLocalSnapshot('beds', snapshot);
    }, LOCAL_BEDS_MIRROR_DELAY_MS);

  async function runBedRecordTransaction(bedNo, mutator) {
    if (localFallbackActive && SERVER_MODE) {
      const beds = getCurrentBedsObject();
      const key = String(bedNo);
      const current = beds[key] || null;
      const next = mutator(clonePlain(current));
      if (next === undefined) return { committed: false, snapshot: { val: () => current } };
      if (next === null) delete beds[key];
      else beds[key] = next;
      await saveLocalBedsObject(beds);
      return { committed: true, snapshot: { val: () => next } };
    }
    return runTransaction(ref(db, `${BEDS_PATH}/${bedNo}`), mutator);
  }

  function normalizePCredits(values = {}) {
    return Object.fromEntries(PCREDIT_FIELDS.map(({ key }) => {
      const value = Math.max(0, Math.min(999, Number(String(values?.[key] ?? '').replace(/[^0-9]/g, '')) || 0));

  }

  function normalizePackageEntries(entries = [], type = 'purchase') {
    if (Array.isArray(entries)) {
      return entries.map((entry, index) => {
        const date = String(entry?.date || toLocalDateInputValue());
        const qty = Math.max(0, Math.min(999, Number(entry?.qty ?? entry?.totalQty ?? 0) || 0));
        return {
          id: String(entry?.id || `${type}-${date}-${qty}-${index}`),
          date,
          qty,
          ...(entry?.kind ? { kind: String(entry.kind) } : {})
        };
      }).filter(entry => entry.qty > 0);
    }
    return Object.entries(entries || {}).map(([id, entry]) => ({
      id,
      date: String(entry?.date || toLocalDateInputValue()),
      qty: Math.max(0, Math.min(999, Number(entry?.qty ?? entry?.totalQty ?? 0) || 0)),
      ...(entry?.kind ? { kind: String(entry.kind) } : {})
    })).filter(entry => entry.qty > 0);
  }

  function createEmptyPackageState(source = {}) {
    const sourcePackages = source?.packages || {};
    const result = {};
    PCREDIT_FIELDS.forEach(({ key }) => {
      const saved = sourcePackages[key] || {};
      const purchases = normalizePackageEntries(saved.purchases, 'purchase');
      const usages = normalizePackageEntries(saved.usages, 'usage');
      const hasPackageData = Boolean(sourcePackages[key]);
      const openingQty = Math.max(0, Math.min(999, Number(saved.openingQty ?? (!hasPackageData ? source?.[key] : 0)) || 0));
      const balance = calculatePackageBalance({ openingQty, purchases, usages });
      result[key] = { openingQty, purchases, usages, balance };
    });
    return result;
  }

  function calculatePackageBalance(pkg = {}) {
    const openingQty = Number(pkg.openingQty || 0);
    const purchaseQty = normalizePackageEntries(pkg.purchases, 'purchase').reduce((sum, entry) => sum + Number(entry.qty || 0), 0);
    const usageQty = normalizePackageEntries(pkg.usages, 'usage').reduce((sum, entry) => sum + Number(entry.qty || 0), 0);
    return Math.max(0, openingQty + purchaseQty - usageQty);
  }

  function normalizePackageState(state = {}) {
    const result = {};
    PCREDIT_FIELDS.forEach(({ key }) => {
      const pkg = state[key] || {};
      const purchases = normalizePackageEntries(pkg.purchases, 'purchase');
      const usages = normalizePackageEntries(pkg.usages, 'usage');
      const openingQty = Math.max(0, Math.min(999, Number(pkg.openingQty || 0) || 0));
      result[key] = {
        openingQty,
        purchases,
        usages,
        balance: calculatePackageBalance({ openingQty, purchases, usages })
      };
    });
    return result;
  }

  function applyPostTreatmentPackageBalances(packages = {}, bed = {}, usageDate = '') {
    const next = normalizePackageState(packages);
    const balances = getPCreditsFromPackages(next);
    const treatments = Array.isArray(bed?.treatments) ? bed.treatments : [];
    if (!treatments.length) return next;
    const date = usageDate || toLocalDateInputValue();

    const normalizedTreatments = treatments.map(treatment => String(treatment || '').replace(/\s+/g, ''));
    const treatmentIds = getTreatmentIdsFromNames(treatments);
    const hasChuna = normalizedTreatments.some(name => name.includes('추나') || name === '단추' || name === '복추');
    const unitMapById = {
      pharmacopuncture_1: hasChuna ? 0.5 : 1,
      pharmacopuncture_2: hasChuna ? 1 : 2,
      pharmacopuncture_3: hasChuna ? 1 : 2,
      pharmacopuncture_4: hasChuna ? 2 : 4
    };
    const deduction = treatmentIds.reduce((sum, id) => sum + (unitMapById[id] || 0), 0);
    const hasPackageRecord = (key) => {
      const pkg = next?.[key] || {};
      return Number(pkg.openingQty || 0) > 0
        || normalizePackageEntries(pkg.purchases, 'purchase').length > 0
        || normalizePackageEntries(pkg.usages, 'usage').length > 0
        || Number(balances[key] || 0) > 0;
    };
    const addUsage = (key, qty) => {
      if (!next[key]) return;
      const currentBalance = Number(balances[key] || 0);
      const usageQty = Math.max(0, Math.min(currentBalance, Number(qty) || 0));
      if (!usageQty) return;
      const usages = normalizePackageEntries(next[key].usages, 'usage');
      usages.push({
        id: `bed-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
        date,
        qty: usageQty
      });
      next[key] = { ...next[key], usages };
      balances[key] = Math.max(0, currentBalance - usageQty);
    };

    const targetKey = hasPackageRecord('p13') ? 'p13' : (hasPackageRecord('p6') ? 'p6' : '');
    if (deduction && targetKey) addUsage(targetKey, deduction);

    [
      { key: 'p자하거', treatment: '약침자' },
      { key: 'p라인', treatment: '약침l' }
    ].forEach(({ key, treatment }) => {
      const treatmentId = treatment.toLowerCase().includes('l') ? 'pharmacopuncture_L' : 'pharmacopuncture_ja';
      const treatmentCount = countTreatmentId(treatmentIds, treatmentId);
      if (treatmentCount && hasPackageRecord(key)) addUsage(key, treatmentCount);
    });

    return normalizePackageState(next);
  }

        const fieldEntries = entries.filter(entry => entry.key === field.key);
        const purchaseQty = fieldEntries.filter(entry => entry.type === 'purchase').reduce((sum, entry) => sum + Number(entry.qty || 0), 0);
        const bonusQty = fieldEntries.filter(entry => entry.type === 'bonus').reduce((sum, entry) => sum + Number(entry.qty || 0), 0);

          purchaseQty ? `<div class="package-calendar-badge purchase">${escapeHtml(field.label)} 결제 ${purchaseQty}</div>` : '',
          bonusQty ? `<div class="package-calendar-badge bonus">${escapeHtml(field.label)} 보너스 ${bonusQty}</div>` : '',

    form.innerHTML = `

      <div class="package-card">

            ${PCREDIT_FIELDS.map(field => `<option value="${escapeHtml(field.key)}" ${field.key === activePackageKey ? 'selected' : ''}>${escapeHtml(field.label)}</option>`).join('')}

          <button class="package-entry-btn" type="button" onclick="addSelectedPackageEntry('bonus')">보너스 추가</button>

        <div class="package-calendar-head">
          <button class="package-entry-btn" type="button" onclick="changePackageMonth(-1)">이전</button>
          <div class="package-calendar-title">${year}년 ${month}월</div>
          <button class="package-entry-btn" type="button" onclick="changePackageMonth(1)">다음</button>
        </div>
        <div class="package-calendar">
          ${['일','월','화','수','목','금','토'].map(day => `<div class="package-calendar-dow">${day}</div>`).join('')}
          ${dayCells.join('')}
        </div>
        <div class="package-day-detail">
          <div class="package-history-title">${escapeHtml(activePackageDate)} 상세</div>
          <div class="package-history">${detailRows}</div>

      </div>`;

  function getPackageQtyInputValue(id) {
    return Math.max(1, Math.min(999, Number(String(document.getElementById(id)?.value || '').replace(/[^0-9]/g, '')) || 1));
  }

  window.selectPackageEntryType = function(key) {
    if (!PCREDIT_FIELDS.some(field => field.key === key)) return;
    activePackageKey = key;
    const field = PCREDIT_FIELDS.find(item => item.key === key);
    const purchaseQty = document.getElementById('pkg-selected-purchase-qty');
    if (purchaseQty && field) purchaseQty.value = field.defaultPurchaseQty;
  };

  window.addSelectedPackageEntry = function(type) {
    const key = document.getElementById('pkg-selected-key')?.value || activePackageKey || PCREDIT_FIELDS[0].key;
    return addPackageEntry(key, type);
  };

  window.selectPackageType = function(key) {
    activePackageKey = key;
    renderPackagePopup();
  };

  window.selectPackageDate = function(date) {
    activePackageDate = date;
    activePackageMonth = String(date || '').slice(0, 7) || activePackageMonth;
    renderPackagePopup();
  };

  window.changePackageMonth = function(offset) {
    const [year, month] = activePackageMonth.split('-').map(Number);
    const next = new Date(year, month - 1 + Number(offset || 0), 1);
    activePackageMonth = `${next.getFullYear()}-${String(next.getMonth() + 1).padStart(2, '0')}`;
    activePackageDate = `${activePackageMonth}-01`;
    renderPackagePopup();
  };

  async function persistPackageState(gridId) {
    const packages = getPackageStateForGrid(gridId);
    const payload = { packages, ...getPCreditsFromPackages(packages), credit: null };
    const patientKey = getPatientKeyForCreditGrid(gridId);
    if (patientKey) {
      await update(ref(db, `${PATIENTS_PATH}/${patientKey}`), payload);
      const nextPatient = {
        ...(patientsByKey.get(patientKey) || {}),
        ...payload
      };
      delete nextPatient.credit;
      patientsByKey.set(patientKey, nextPatient);
      renderBedMonitors();
    }
    updateCreditChip(gridId);
  }

  window.addPackageEntry = async function(key, type) {
    const gridId = activeCreditGridId;
    if (!gridId) return;
    const packages = getPackageStateForGrid(gridId);
    const pkg = packages[key] || { openingQty: 0, purchases: [], usages: [] };
    const isIncrease = type === 'purchase' || type === 'bonus';
    const dateId = `pkg-${key}-${isIncrease ? 'purchase' : 'usage'}-date`;
    const qtyId = `pkg-${key}-${type}-qty`;
    const dateEl = document.getElementById(dateId);
    const date = (dateEl && !dateEl.hidden ? dateEl.value : '')
      || document.getElementById(`pkg-${key}-purchase-date`)?.value
      || document.getElementById('pkg-selected-date')?.value
      || toLocalDateInputValue();
    const selectedQtyId = type === 'purchase' ? 'pkg-selected-purchase-qty' : (type === 'bonus' ? 'pkg-selected-bonus-qty' : 'pkg-selected-usage-qty');
    const qty = document.getElementById(qtyId) ? getPackageQtyInputValue(qtyId) : getPackageQtyInputValue(selectedQtyId);
    const entry = { id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`, date, qty };
    if (isIncrease) pkg.purchases = [...normalizePackageEntries(pkg.purchases, 'purchase'), { ...entry, kind: type === 'bonus' ? 'bonus' : 'purchase' }];
    else pkg.usages = [...normalizePackageEntries(pkg.usages, 'usage'), entry];
    packages[key] = pkg;
    activePackageKey = key;
    activePackageDate = date;
    activePackageMonth = date.slice(0, 7);
    setPackageStateForGrid(gridId, packages);
    await persistPackageState(gridId);
    renderPackagePopup();
    showToast(type === 'purchase' ? '결제 기록 추가' : (type === 'bonus' ? '보너스 기록 추가' : '사용 기록 추가'));
  };

  window.removePackageEntry = async function(key, type, id) {
    const gridId = activeCreditGridId;
    if (!gridId) return;
    const packages = getPackageStateForGrid(gridId);
    const pkg = packages[key] || { openingQty: 0, purchases: [], usages: [] };
    const isIncrease = type === 'purchase' || type === 'bonus';
    const field = isIncrease ? 'purchases' : 'usages';
    pkg[field] = normalizePackageEntries(pkg[field], isIncrease ? 'purchase' : 'usage').filter(entry => entry.id !== id);
    packages[key] = pkg;
    setPackageStateForGrid(gridId, packages);
    await persistPackageState(gridId);
    renderPackagePopup();
    showToast('패키지 기록 삭제');
  };

  window.closeCreditPopup = function() {
    document.getElementById('creditOverlay')?.classList.remove('show');
    activeCreditGridId = '';
  };

  window.saveCreditPopup = async function() {
    closeCreditPopup();
  };

  function renderTreatmentPresetSelect(select) {
    const options = treatmentPresets.length
      ? treatmentPresets.map(p => `<option value="${escapeHtml(p.key)}">${escapeHtml(p.name)}</option>`).join('')
      : '<option value="" disabled>저장된 프리셋 없음</option>';
    select.innerHTML = `<option value="">프리셋</option>${options}`;
    select.value = '';
  }

  function renderAllTreatmentPresetSelects() {
    document.querySelectorAll('.treatment-preset-select').forEach(select => renderTreatmentPresetSelect(select));
  }

  window.applyTreatmentPreset = (gridId, presetKey) => {
    if (!presetKey) return;
    const preset = treatmentPresets.find(p => p.key === presetKey);
    const select = document.querySelector(`.treatment-preset-select[data-grid-id="${gridId}"]`);
    if (select) select.value = '';
    if (!preset) return;
    setTreatmentSelection(gridId, preset.treatments || []);
    const scope = getScopeFromGridId?.(gridId);
    if (scope) scheduleSelectFieldSave(scope, 0);
  };

  function treatBtnClick(gridId, treatment) {
    selectedTreatmentChip = null;
    if (!treatmentSelections[gridId]) treatmentSelections[gridId] = [];
    const sel = treatmentSelections[gridId];
    const idx = sel.findIndex(s => s.id === treatment.id);
    if (isRepeatableTreatment(treatment)) {
      sel.push(createTreatmentSelectionItem(treatment));
    } else if (idx >= 0) {
      sel.splice(idx, 1);
    } else {
      sel.push(createTreatmentSelectionItem(treatment));
    }
    renderTreatmentChips(gridId);
    syncTreatBtnStates(gridId);
    const scope = getScopeFromGridId?.(gridId);
    if (scope) scheduleSelectFieldSave(scope, 0);
  }

  function removeChip(gridId, chipIndex) {
    selectedTreatmentChip = null;
    if (!treatmentSelections[gridId]) return;
    const index = Number(chipIndex);
    if (Number.isInteger(index)) {
      treatmentSelections[gridId].splice(index, 1);
    } else {
      treatmentSelections[gridId] = treatmentSelections[gridId].filter(s => s.id !== chipIndex);
    }
    renderTreatmentChips(gridId);
    syncTreatBtnStates(gridId);
    const scope = getScopeFromGridId?.(gridId);
    if (scope) scheduleSelectFieldSave(scope, 0);
  }

  let selectedTreatmentChip = null;

  function useClickTreatmentReorder() {
    return Boolean(window.matchMedia?.('(pointer: coarse)')?.matches || (navigator.maxTouchPoints > 0 && !window.matchMedia?.('(hover: hover)')?.matches));
  }

  function treatmentSelectionChipAttrs(gridId, index) {
    if (useClickTreatmentReorder()) return `onclick="handleTreatmentChipClick(event,'${gridId}',${index})"`;
    return `draggable="true"
        ondragstart="chipDragStart(event,'${gridId}',${index})"
        ondragover="chipDragOver(event,'${gridId}',${index})"
        ondragleave="chipDragLeave(event)"
        ondrop="chipDrop(event,'${gridId}',${index})"
        ondragend="chipDragEndSel(event)"`;
  }

  function saveTreatmentSelectionChange(gridId) {
    renderTreatmentChips(gridId);
    syncTreatBtnStates(gridId);
    const scope = getScopeFromGridId?.(gridId);
    if (scope) scheduleSelectFieldSave(scope, 0);
  }

  window.handleTreatmentChipClick = (event, gridId, index) => {
    event.preventDefault();
    event.stopPropagation();
    const sel = treatmentSelections[gridId] || [];
    if (!sel[index]) {
      selectedTreatmentChip = null;
      renderTreatmentChips(gridId);
      return;
    }

    if (!selectedTreatmentChip || selectedTreatmentChip.gridId !== gridId) {
      selectedTreatmentChip = { gridId, index };
      renderTreatmentChips(gridId);
      return;
    }

    const fromIndex = selectedTreatmentChip.index;
    selectedTreatmentChip = null;
    if (fromIndex === index) {
      sel.splice(index, 1);
    } else if (sel[fromIndex] && sel[index]) {
      [sel[fromIndex], sel[index]] = [sel[index], sel[fromIndex]];
    }
    treatmentSelections[gridId] = sel;
    saveTreatmentSelectionChange(gridId);
  };

  function renderTreatmentChips(gridId) {
    const chipsWrap = document.getElementById(getTreatmentChipsId(gridId));
    if (!chipsWrap) return;
    const sel = treatmentSelections[gridId] || [];
    if (selectedTreatmentChip?.gridId === gridId && !sel[selectedTreatmentChip.index]) selectedTreatmentChip = null;
    chipsWrap.innerHTML = sel.map((s, i) => {
      const selectedClass = useClickTreatmentReorder() && selectedTreatmentChip?.gridId === gridId && selectedTreatmentChip.index === i ? 'selected' : '';
      const className = ['treat-chip', getTreatmentBadgeClass(s.name), selectedClass].filter(Boolean).join(' ');
      return `
      <span class="${className}" data-grid="${gridId}" data-index="${i}" ${treatmentSelectionChipAttrs(gridId, i)}>${escapeHtml(s.name)}</span>`;
    }).join('');
  }

  let _chipDragFromIndex = null;
  let _chipDragGridId = null;

  window.chipDragStart = (event, gridId, index) => {
    event.stopPropagation();
    _chipDragFromIndex = index;
    _chipDragGridId = gridId;
    event.dataTransfer.effectAllowed = 'move';
    event.dataTransfer.setData('text/plain', `select-treat:${gridId}:${index}`);
    event.currentTarget.style.opacity = '0.4';
  };
  window.chipDragOver = (event, gridId, index) => {
    event.stopPropagation();
    if (_chipDragGridId !== gridId || _chipDragFromIndex === null || _chipDragFromIndex === index) return;
    event.preventDefault();
    event.dataTransfer.dropEffect = 'move';
    event.currentTarget.classList.add('treat-drag-over');
  };
  window.chipDragLeave = (event) => {
    event.stopPropagation();
    event.currentTarget.classList.remove('treat-drag-over');
  };
  window.chipDrop = (event, gridId, toIndex) => {
    event.stopPropagation();
    event.preventDefault();
    event.currentTarget.classList.remove('treat-drag-over');
    if (_chipDragGridId !== gridId || _chipDragFromIndex === null || _chipDragFromIndex === toIndex) return;
    const sel = treatmentSelections[gridId] || [];
    const [moved] = sel.splice(_chipDragFromIndex, 1);
    sel.splice(toIndex, 0, moved);
    treatmentSelections[gridId] = sel;
    renderTreatmentChips(gridId);
    syncTreatBtnStates(gridId);
    const scope = getScopeFromGridId?.(gridId);
    if (scope) scheduleSelectFieldSave(scope, 0);
    _chipDragFromIndex = null;
    _chipDragGridId = null;
  };
  window.chipDragEndSel = (event) => {
    event.stopPropagation();
    event.currentTarget.style.opacity = '';
    document.querySelectorAll('.treat-drag-over').forEach(el => el.classList.remove('treat-drag-over'));
  };

  document.addEventListener('dragover', (event) => {
    if (_chipDragGridId === null || _chipDragFromIndex === null) return;
    if (event.target?.closest?.('.treat-chips-wrap, .treat-chip')) return;
    event.preventDefault();
    event.dataTransfer.dropEffect = 'move';
  });

  document.addEventListener('drop', (event) => {
    if (_chipDragGridId === null || _chipDragFromIndex === null) return;
    if (event.target?.closest?.('.treat-chips-wrap, .treat-chip')) return;
    event.preventDefault();
    event.stopPropagation();
    const gridId = _chipDragGridId;
    const fromIndex = _chipDragFromIndex;
    const sel = treatmentSelections[gridId] || [];
    if (sel[fromIndex]) {
      sel.splice(fromIndex, 1);
      treatmentSelections[gridId] = sel;
      renderTreatmentChips(gridId);
      syncTreatBtnStates(gridId);
      const scope = getScopeFromGridId?.(gridId);
      if (scope) scheduleSelectFieldSave(scope, 0);
    }
    _chipDragFromIndex = null;
    _chipDragGridId = null;
    document.querySelectorAll('.treat-drag-over').forEach(el => el.classList.remove('treat-drag-over'));
  });

  function syncTreatBtnStates(gridId) {
    const grid = document.getElementById(gridId);
    if (!grid) return;
    const sel = new Set((treatmentSelections[gridId] || []).map(s => s.id));
    grid.querySelectorAll('.treat-btn').forEach(btn => {
      btn.classList.toggle('active', sel.has(btn.dataset.id));
    });
  }

  window.removeChip = removeChip;

  function renderTreatmentPresetSettings() {
    const grid = document.getElementById('presetTreatmentGrid');
    const list = document.getElementById('treatmentPresetList');
    if (grid) {
      grid.innerHTML = '';
      if (!treatmentSelections.presetTreatmentGrid) treatmentSelections.presetTreatmentGrid = [];
      TREATMENTS.forEach(t => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = ['treat-btn', getTreatmentBadgeClass(t.name)].filter(Boolean).join(' ');
        btn.dataset.id = t.id;
        btn.dataset.name = t.name;
        btn.innerHTML = `<span class="treat-name">${escapeHtml(t.name)}</span>`;
        btn.onclick = () => treatBtnClick('presetTreatmentGrid', t);
        grid.appendChild(btn);
      });
      renderTreatmentChips('presetTreatmentGrid');
      syncTreatBtnStates('presetTreatmentGrid');
    }
    if (list) {
      list.innerHTML = treatmentPresets.length
        ? treatmentPresets.map(p => `
          <div class="preset-item">
            <div>
              <div class="preset-name">${escapeHtml(p.name)}</div>
              <div class="preset-treats">${(p.treatments || []).map(escapeHtml).join(' · ')}</div>
            </div>
            <button class="staff-delete-btn" onclick="deleteTreatmentPreset('${escapeHtml(p.key)}')">삭제</button>
          </div>
        `).join('')
        : '<div class="empty-state"><div class="empty-icon">＋</div><div class="empty-text">저장된 프리셋이 없습니다</div></div>';
    }
  }

  window.saveTreatmentPreset = async () => {
    const treatments = (treatmentSelections.presetTreatmentGrid || []).map(s => s.name);
    if (!treatments.length) { showToast('치료를 1개 이상 선택해주세요'); return; }
    const name = treatments.join(',');
    try {
      await push(ref(db, 'settings/treatmentPresets'), {
        name,
        treatments,
        timestamp: Date.now()
      });
      treatmentSelections.presetTreatmentGrid = [];
      renderTreatmentChips('presetTreatmentGrid');
      syncTreatBtnStates('presetTreatmentGrid');
      showToast('프리셋 저장 완료');
    } catch (e) {
      console.error(e);
      showToast('프리셋 저장 실패');
    }
  };

  window.deleteTreatmentPreset = async (key) => {
    if (!key) return;
    if (!confirm('프리셋을 삭제하시겠습니까?')) return;
    try {
      await remove(ref(db, `settings/treatmentPresets/${key}`));
      showToast('프리셋 삭제 완료');
    } catch (e) {
      console.error(e);
      showToast('프리셋 삭제 실패');
    }
  };

  function renderTreatmentMinutesSettings() {
    const list = document.getElementById('treatmentMinutesList');
    if (!list) return;

    const procValue = Math.max(0, Math.min(120, Number(procedureMinutes) || 0));
    const procRow = `
      <label class="treatment-time-row treatment-time-row--procedure">
        <span class="treatment-time-name">🩺 처치</span>
        <div class="treatment-time-row-inner">
          <input class="treatment-time-input" id="procedureMinutesInput" type="number" min="0" max="120" step="1" value="${procValue}" aria-label="처치시간">
          <span class="treatment-time-unit">분</span>
        </div>
      </label>`;

    list.innerHTML = procRow + TREATMENTS.map(t => {
      const value = Math.max(1, Math.min(120, Number(treatmentMinutes[t.name] || DEFAULT_TREATMENT_MINUTES[t.name] || 5)));
      return `
        <label class="treatment-time-row">
          <span class="treatment-time-name">${t.icon} ${escapeHtml(t.name)}</span>
          <div class="treatment-time-row-inner">
            <input class="treatment-time-input" data-treatment-name="${escapeHtml(t.name)}" type="number" min="1" max="120" step="1" value="${value}" aria-label="${escapeHtml(t.name)} 치료시간">
            <span class="treatment-time-unit">분</span>
          </div>
        </label>`;
    }).join('');
  }

  renderTreatmentGrid('treatmentGrid');
  renderTreatmentGrid('receiveTreatmentGrid');
  renderTreatmentGrid('bedTreatmentGrid');
  renderTreatmentMinutesSettings();
  renderTreatmentPresetSettings();

  // toggleCheck는 버튼+칩 방식으로 교체됨 (레거시 호환용 유지)
  window.toggleCheck = () => {};

  function getStaffLabel(type) {
    return type === 'doctors' ? '원장' : '간호사';
  }

  function getStaffInputId(type) {
    return type === 'doctors' ? 'doctorNameInput' : 'nurseNameInput';
  }

  function getStaffSelectIds(type) {
    return type === 'doctors'
      ? ['doctorSelect', 'receiveDoctorSelect', 'bedDoctorSelect']
      : ['nurseSelect', 'receiveNurseSelect', 'bedNurseSelect'];
  }

  function getStaffListId(type) {
    return type === 'doctors' ? 'doctorList' : 'nurseList';
  }

  function getSortedStaff(type) {
    return [...staffByType[type].entries()]
      .sort((a, b) => (a[1].timestamp || 0) - (b[1].timestamp || 0));
  }

  function renderStaffControls() {
    ['doctors', 'nurses'].forEach(type => {
      const label = getStaffLabel(type);
      const list = document.getElementById(getStaffListId(type));
      const staff = getSortedStaff(type);

      getStaffSelectIds(type).forEach(selectId => {
        const select = document.getElementById(selectId);
        if (!select) return;
        const selectedValue = select.value;
        select.innerHTML = `<option value="">${label} 선택 안함</option>` + staff.map(([key, data]) =>
          `<option value="${escapeHtml(key)}">${escapeHtml(data.name || '')}</option>`
        ).join('');
        if (staffByType[type].has(selectedValue)) select.value = selectedValue;
        const scope = selectId.startsWith('receive') ? 'receive' : selectId.startsWith('bed') ? 'bed' : 'desk';
        select.onchange = () => scheduleSelectFieldSave?.(scope, 0);
      });

      if (list) {
        list.innerHTML = staff.length
          ? staff.map(([key, data]) => `
            <div class="staff-item${type === 'nurses' && data.vacation ? ' vacation' : ''}">
              <div class="staff-name">${escapeHtml(data.name || '')}</div>
              ${type === 'nurses' ? `
                <label class="staff-vacation-toggle">
                  <input type="checkbox" ${data.vacation ? 'checked' : ''} onchange="toggleNurseVacation('${key}', this.checked)">
                  <span>자리비움</span>
                </label>` : ''}
              <button class="staff-delete-btn" onclick="deleteStaff('${type}', '${key}')">삭제</button>
            </div>`).join('')
          : `<div class="empty-state"><div class="empty-icon">+</div><div class="empty-text">등록된 ${label}이 없습니다</div></div>`;
      }
    });
    renderDoctorAlertSelect();

  function renderDoctorAlertSelect() {
    const containers = ['doctorAlertBtns', 'bedDoctorAlertBtns']
      .map(id => document.getElementById(id))
      .filter(Boolean);
    const doctors = getSortedStaff('doctors');

    // 존재하지 않는 원장이 선택돼 있으면 해제
    if (selectedDoctorAlertId && !staffByType.doctors.has(selectedDoctorAlertId)) {
      selectedDoctorAlertId = '';
      localStorage.removeItem('selectedDoctorAlertId');
    }
    // 등록 원장이 있으면 항상 실제 원장 중 하나를 선택
    if (!selectedDoctorAlertId && doctors.length) {
      selectedDoctorAlertId = doctors[0][0];
      localStorage.setItem('selectedDoctorAlertId', selectedDoctorAlertId);
    }
    if (doctors.length) doctorAlertSelectInitialized = true;

    const setHtml = (html) => containers.forEach(container => { container.innerHTML = html; });
    if (!doctors.length) {
      setHtml('<span class="doctor-alert-empty">원장 없음</span>');
      renderBedDoctorAlertPanel();
      return;
    }
    // 버튼 1개: 누를 때마다 등록된 원장만 순환
    const name = staffByType.doctors.get(selectedDoctorAlertId)?.name || doctors[0][1]?.name || '원장';
    const active = selectedDoctorAlertId ? ' active' : '';
    setHtml('<button type="button" class="doctor-alert-btn doctor-alert-toggle' + active + '" onclick="cycleDoctorAlertFilter()">' + escapeHtml(name) + '</button>');
    renderBedDoctorAlertPanel();
  }

  window.setDoctorAlertFilter = (doctorId) => {
    selectedDoctorAlertId = doctorId || '';
    if (selectedDoctorAlertId) localStorage.setItem('selectedDoctorAlertId', selectedDoctorAlertId);
    else localStorage.removeItem('selectedDoctorAlertId');
    activeDoctorProcedureAlert = null;
    doctorProcedureAlertQueue.length = 0;
    queuedDoctorProcedureAlerts.clear();
    renderDoctorAlertSelect();
    syncDoctorProcedureAlerts();
    renderUpcomingAlerts();
  };

  // 버튼 1개 순환: 누를 때마다 등록된 원장만 순환
  window.cycleDoctorAlertFilter = () => {
    const doctors = getSortedStaff('doctors');
    if (!doctors.length) return;
    const cycle = doctors.map(([key]) => key);
    const idx = cycle.indexOf(selectedDoctorAlertId);
    const next = cycle[(idx + 1) % cycle.length];
    window.setDoctorAlertFilter(next);
  };

  function getTreatmentBadgeClass(treatment) {
    const name = String(treatment || '').trim().toLowerCase();
    if (name === '핫팩') return 'treatment-hotpack';
    if (name === '물리치료' || name === 'sw') return 'treatment-physical';
    if (name === '적외선') return 'treatment-infrared';
    if (name === '침' || name === '전침') return 'treatment-acu';
    if (name === '건부항' || name === '습부항') return 'treatment-cupping';
    if (name === '단추' || name === '복추' || name === '추나' || name === '벤치') return 'treatment-chuna';
    if (name === '왕뜸' || name === '전자뜸') return 'treatment-moxa';
    if (/^약침/.test(name)) return 'treatment-pharm';
    if (name === '진찰' || name === '베드진찰') return 'treatment-exam';
    return '';
  }

  function renderTreatmentBadge(treatment) {
    const label = String(treatment || '치료').trim() || '치료';
    const className = getTreatmentBadgeClass(label);
    return `<div class="upcoming-time treatment-badge ${className}">${escapeHtml(label)}</div>`;
  }

  function renderBedDoctorAlertPanel() {
    const panel = document.getElementById('bedDoctorAlertPanel');
    const list = document.getElementById('bedDoctorAlertList');
    if (!panel || !list) return;

    const isDoctorBed = Number(selectedBedNo) >= 101;
    panel.classList.toggle('show', isDoctorBed);
    if (!isDoctorBed) {
      list.innerHTML = '';
      return;
    }

    const items = selectedDoctorAlertId ? getDoctorProcedureAlertItems(selectedDoctorAlertId) : [];
    list.innerHTML = items.length
      ? items
        .sort((a, b) => Number(a.timestamp || 0) - Number(b.timestamp || 0))
        .map(item => `
        <div class="upcoming-item assignment no-dismiss">
          ${renderTreatmentBadge(item.treatment)}
          <div>
            <div class="upcoming-main">${escapeHtml(item.bedLabel)} ${escapeHtml(item.name || '환자')}</div>
          </div>
        </div>`)
        .join('')
      : `<div class="empty-state"><div class="empty-icon">-</div><div class="empty-text">알림 없음</div></div>`;
  }

  function getSelectedDoctorCallInfo() {
    const doctors = getSortedStaff('doctors');
    let id = selectedDoctorAlertId;
    if (!id && doctors.length) id = doctors[0][0];
    const doctor = id ? staffByType.doctors.get(id) : null;
    return doctor ? { id, name: doctor.name || '원장' } : null;
  }

  window.sendDoctorCallAlert = async (target) => {
    const doctor = getSelectedDoctorCallInfo();
    if (!doctor) {
      showToast('원장을 먼저 선택해주세요');
      return;
    }
    const safeTarget = target === 'desk' ? 'desk' : 'clinic';
    try {
      await push(ref(db, CALL_ALERTS_PATH), {
        target: safeTarget,
        doctorId: doctor.id,
        doctorName: doctor.name,
        message: `${doctor.name}원장님 호출`,
        timestamp: Date.now()
      });
      showToast(safeTarget === 'desk' ? '데스크 호출 전송' : '치료실 호출 전송');
    } catch (e) {
      console.error(e);
      showToast('호출 전송 실패');
    }
  };

  function getSelectedStaff(type, scope = 'desk') {
    const selectId = type === 'doctors'
      ? (scope === 'bed' ? 'bedDoctorSelect' : scope === 'receive' ? 'receiveDoctorSelect' : 'doctorSelect')
      : (scope === 'bed' ? 'bedNurseSelect' : scope === 'receive' ? 'receiveNurseSelect' : 'nurseSelect');
    const select = document.getElementById(selectId);
    const key = select?.value || '';
    const data = key ? staffByType[type].get(key) : null;
    return data ? { id: key, name: data.name || '' } : { id: '', name: '' };
  }

  function setSelectedStaffByStoredValue(type, scope = 'desk', stored = {}) {
    const selectId = type === 'doctors'
      ? (scope === 'bed' ? 'bedDoctorSelect' : scope === 'receive' ? 'receiveDoctorSelect' : 'doctorSelect')
      : (scope === 'bed' ? 'bedNurseSelect' : scope === 'receive' ? 'receiveNurseSelect' : 'nurseSelect');
    const select = document.getElementById(selectId);
    if (!select) return;

    const id = stored[`${type === 'doctors' ? 'doctor' : 'nurse'}Id`] || '';
    const name = stored[`${type === 'doctors' ? 'doctor' : 'nurse'}Name`] || '';
    if (id && staffByType[type].has(id)) {
      select.value = id;
      return;
    }
    if (name) {
      const match = getSortedStaff(type).find(([, data]) => (data?.name || '') === name);
      if (match) select.value = match[0];
    }
  }

  function getTodayKey() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const d = String(now.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function getDailyStartOffset(count) {
    if (!count) return 0;
    const date = new Date();
    const start = new Date(date.getFullYear(), 0, 0);
    const dayOfYear = Math.floor((date - start) / 86400000);
    return dayOfYear % count;
  }

  window.toggleNurseVacation = async (key, checked) => {
    if (!staffByType.nurses.has(key)) return;
    const prev = Boolean(staffByType.nurses.get(key)?.vacation);
    staffByType.nurses.set(key, { ...staffByType.nurses.get(key), vacation: Boolean(checked) });
    renderStaffControls();
    try {
      await update(ref(db, `staff/nurses/${key}`), { vacation: Boolean(checked) });
      showToast(checked ? '간호사 자리비움 처리 완료' : '간호사 자리비움 해제 완료');
    } catch (e) {
      console.error(e);
      staffByType.nurses.set(key, { ...staffByType.nurses.get(key), vacation: prev });
      renderStaffControls();
      showToast('자리비움 상태 저장 실패');
    }
  };

  window.addStaff = async (type) => {
    if (!staffByType[type]) return;
    const input = document.getElementById(getStaffInputId(type));
    const name = input?.value.trim();
    const label = getStaffLabel(type);
    if (!name) { showToast(`${label} 이름을 입력해주세요`); return; }

    try {
      await push(ref(db, `staff/${type}`), {

        timestamp: Date.now()
      });
      input.value = '';
      showToast(`${label} 추가 완료`);

      console.error(e);
      showToast(`${label} 추가 실패`);
    }

  window.deleteStaff = async (type, key) => {
    if (!staffByType[type]?.has(key)) return;
    const label = getStaffLabel(type);
    const name = staffByType[type].get(key)?.name || '';
    if (!confirm(`${name} ${label}을 삭제하시겠습니까?`)) return;

    try {
      await remove(ref(db, `staff/${type}/${key}`));
      showToast(`${label} 삭제 완료`);
    } catch (e) {
      console.error(e);
      showToast(`${label} 삭제 실패`);

  };

  ['doctors', 'nurses'].forEach(type => {
    onValue(ref(db, `staff/${type}`), (snapshot) => {
      const rows = snapshot.val() || {};
      staffByType[type] = new Map(Object.entries(rows));
      renderStaffControls();
      if (type === 'doctors') renderBedMonitors();
    });
  });

  onValue(ref(db, 'settings/procedureMinutes'), (snapshot) => {
    const value = Number(snapshot.val() || 0);
    procedureMinutes = Math.max(0, Math.min(120, Number.isFinite(value) ? value : 0));
    // procedureMinutesInput은 이제 treatmentMinutesList 안에 있음

    if (input && document.activeElement !== input) input.value = String(procedureMinutes);
    updateDeskWaitChip();
    updateBedRemainingChip();

  onValue(ref(db, 'settings/treatmentMinutes'), (snapshot) => {
    const rows = snapshot.val() || {};
    treatmentMinutes = { ...DEFAULT_TREATMENT_MINUTES, ...rows };

    updateDeskWaitChip();
    updateBedRemainingChip();
    renderUpcomingAlerts();
  });

  onValue(ref(db, 'settings/treatmentPresets'), (snapshot) => {
    const rows = snapshot.val() || {};
    treatmentPresets = Object.entries(rows)
      .map(([key, value]) => ({
        key,
        name: value?.name || '',

          ? value.treatments.map(name => getTreatmentByName(name)?.name).filter(Boolean)
          : [],
        timestamp: Number(value?.timestamp || 0)
      }))
      .filter(p => p.name && p.treatments.length)
      .sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
    renderTreatmentPresetSettings();

  onValue(ref(db, 'settings/autoBedAssignEnabled'), (snapshot) => {
    autoBedAssignEnabled = Boolean(snapshot.val());
    const input = document.getElementById('autoBedAssignEnabled');
    if (input) input.checked = autoBedAssignEnabled;
    if (autoBedAssignEnabled) assignWaitingPatientsToBeds();

  onValue(ref(db, CALL_ALERTS_PATH), (snapshot) => {

    });
    renderUpcomingAlerts();
  });

  onValue(ref(db, BED_ASSIGNMENT_ALERTS_PATH), (snapshot) => {
    bedAssignmentAlertItems.clear();
    const rows = snapshot.val() || {};
    Object.entries(rows).forEach(([key, data]) => {
      if (!data) return;
      if (Number(data.bedNo) >= 101) {
        remove(ref(db, `${BED_ASSIGNMENT_ALERTS_PATH}/${key}`)).catch((e) => console.error('원장실 배정 알림 삭제 실패', e));
        return;

      bedAssignmentAlertItems.set(key, data);

    renderUpcomingAlerts();
    syncFixedBedArrivalOverlay();

  window.saveProcedureMinutes = async () => {
    const input = document.getElementById('procedureMinutesInput');
    const value = Math.max(0, Math.min(120, Number(input?.value) || 0));
    try {
      await set(ref(db, 'settings/procedureMinutes'), value);
      showToast(`처치시간 ${value}분 저장 완료`);
    } catch (e) {
      console.error(e);
      showToast('처치시간 저장 실패');

  };

  window.saveTreatmentMinutes = async () => {
    const rows = {};
    document.querySelectorAll('#treatmentMinutesList .treatment-time-input[data-treatment-name]').forEach(input => {
      const name = input.dataset.treatmentName;
      rows[name] = Math.max(1, Math.min(120, Number(input.value) || 1));

    const procValue = Math.max(0, Math.min(120, Number(procInput?.value) || 0));
    try {
      await Promise.all([
        set(ref(db, 'settings/treatmentMinutes'), rows),
        set(ref(db, 'settings/procedureMinutes'), procValue),
      ]);
      showToast('저장 완료');

      console.error(e);
      showToast('저장 실패');

  };

    if (autoBedAssignEnabled) assignWaitingPatientsToBeds();
    showToast(enabled ? '베드 자동배정 켜짐' : '베드 자동배정 꺼짐');

  window.submitPatient = async (scope = 'desk') => {
    const ids = PATIENT_FORM_IDS[scope] || PATIENT_FORM_IDS.desk;
    if ((scope === 'desk' || scope === 'receive') && formEditBedNoByScope[scope]) {
      const saved = await saveMonitorBedPatientInfo(scope);
      if (saved) closeMonitorEditForm(scope);
      return;
    }
    if ((scope === 'desk' || scope === 'receive') && formEditPatientKeyByScope[scope]) {
      const saved = await saveWaitingPatientInfo(scope);
      if (saved) closeMonitorEditForm(scope);
      return;
    }
    const name = document.getElementById(ids.name).value.trim();
    const chartNo = normalizeChartNo(document.getElementById(ids.chartNo).value);
    const chiefComplaint = document.getElementById(ids.chiefComplaint).value.trim();
    const memo = document.getElementById(ids.memo).value.trim();
    const age = document.getElementById(ids.age).value.trim();
    const visitType = document.querySelector(`input[name="${ids.visitType}"]:checked`)?.value || '초진';
    const gender = document.querySelector(`input[name="${ids.gender}"]:checked`)?.value || '남';
    const doctor = getSelectedStaff('doctors', scope);
    let nurse = getSelectedStaff('nurses', scope);
    let treatments = (treatmentSelections[ids.treatmentGrid] || []).map(s => s.name);
    const packagePayload = getPackagePayload(ids.treatmentGrid);

    if (!name) { showToast('❗ 성함을 입력해주세요'); return; }
    if (treatments.length === 0) { showToast('❗ 진료 종류를 선택해주세요'); return; }

    const btn = document.getElementById(ids.submitBtn);
    btn.disabled = true;
    btn.textContent = '입력 중...';

    try {
      const now = new Date();
      await push(ref(db, PATIENTS_PATH), {
        name,
        treatments,
        timestamp: now.getTime(),
        timeStr: now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }),
        date: now.toLocaleDateString('ko-KR'),
        bedStatus: 'waiting',
        chartNo,
        visitType,
        chiefComplaint,
        memo,
        age: age ? Number(age) : '',
        gender,
        bodyParts: normalizeBodyParts(formBodyPartsByScope[scope]),
        doctorId: doctor.id,
        doctorName: doctor.name,
        nurseId: nurse.id,
        nurseName: nurse.name,
        ...packagePayload
      });

      // 초기화
      document.getElementById(ids.name).value = '';
      document.getElementById(ids.chartNo).value = '';
      document.getElementById(ids.chiefComplaint).value = '';
      document.getElementById(ids.memo).value = '';
      document.getElementById(ids.age).value = '';
      const visitDefault = document.querySelector(`input[name="${ids.visitType}"]`);
      const genderDefault = document.querySelector(`input[name="${ids.gender}"]`);
      if (visitDefault) visitDefault.checked = true;
      if (genderDefault) genderDefault.checked = true;
      formBodyPartsByScope[scope] = { front: [], back: [] };
      renderFormBodyPartSelector(scope);
      treatmentSelections[ids.treatmentGrid] = [];
      renderTreatmentChips(ids.treatmentGrid);
      syncTreatBtnStates(ids.treatmentGrid);

      if (scope === 'desk') window.clearChartLookupBadge?.();
      resetPCredits(ids.treatmentGrid);

      showToast(`✅ ${name} 알림 전송 완료`);
      if (scope === 'desk') {
        setInputFormOpen(false);
        renderUpcomingAlerts();
        renderWaitingLists();
      }
      if (scope === 'receive') setReceiveFormOpen(false);
    } catch (e) {
      showToast('❌ 전송 실패 — 연결을 확인해주세요');
      console.error(e);
    }

    btn.disabled = false;
    btn.textContent = '입력';
  };

  function closeMonitorEditForm(scope) {
    setFormEditMode(scope, null);
    setWaitingPatientEditMode(scope, null);
    if (scope === 'receive') {
      setReceiveFormOpen(false);
    } else {
      setInputFormOpen(false);
    }

  function getFormValues(scope) {
    const ids = PATIENT_FORM_IDS[scope] || PATIENT_FORM_IDS.desk;
    const treatments = (treatmentSelections[ids.treatmentGrid] || []).map(s => s.name);
    const doctor = getSelectedStaff('doctors', scope);
    const nurse = getSelectedStaff('nurses', scope);
    return {
      ids,
      name: document.getElementById(ids.name).value.trim(),
      chartNo: normalizeChartNo(document.getElementById(ids.chartNo).value),
      chiefComplaint: document.getElementById(ids.chiefComplaint).value.trim(),
      memo: document.getElementById(ids.memo).value.trim(),
      age: document.getElementById(ids.age).value.trim(),
      visitType: document.querySelector(`input[name="${ids.visitType}"]:checked`)?.value || '초진',
      gender: document.querySelector(`input[name="${ids.gender}"]:checked`)?.value || '남',
      bodyParts: normalizeBodyParts(formBodyPartsByScope[scope]),
      treatments,
      packagePayload: getPackagePayload(ids.treatmentGrid),
      doctor,
      nurse
    };
  }

  function setTreatmentSelection(gridId, treatments = []) {
    // treatments는 이름 배열 (예: ['침', '핫팩'])
    const normalizedTreatments = treatments.map(name => getTreatmentByName(name)?.name).filter(Boolean);
    // 순서는 원래 treatments 배열 순서대로 유지
    const ordered = [];
    normalizedTreatments.forEach(name => {
      const t = getTreatmentByName(name);
      if (t) ordered.push(createTreatmentSelectionItem(t));
    });
    treatmentSelections[gridId] = ordered;
    renderTreatmentChips(gridId);
    syncTreatBtnStates(gridId);
  }

  function populatePatientForm(scope, bed = null) {
    const ids = PATIENT_FORM_IDS[scope] || PATIENT_FORM_IDS.desk;
    document.getElementById(ids.name).value = bed?.name || '';
    document.getElementById(ids.chartNo).value = normalizeChartNo(bed?.chartNo);
    document.getElementById(ids.chiefComplaint).value = bed?.chiefComplaint || '';
    document.getElementById(ids.memo).value = bed?.memo || '';
    document.getElementById(ids.age).value = bed?.age || '';
    document.querySelector(`input[name="${ids.visitType}"][value="${bed?.visitType || '초진'}"]`)?.click();
    document.querySelector(`input[name="${ids.gender}"][value="${bed?.gender || '남'}"]`)?.click();
    const doctorSelect = document.getElementById(scope === 'receive' ? 'receiveDoctorSelect' : 'doctorSelect');
    const nurseSelect = document.getElementById(scope === 'receive' ? 'receiveNurseSelect' : 'nurseSelect');
    if (doctorSelect) doctorSelect.value = bed?.doctorId || '';
    if (nurseSelect) nurseSelect.value = bed?.nurseId || '';
    setTreatmentSelection(ids.treatmentGrid, bed?.treatments || []);
    formBodyPartsByScope[scope] = normalizeBodyParts(bed?.bodyParts);
    renderFormBodyPartSelector(scope);
    const patient = bed?.patientKey ? patientsByKey.get(bed.patientKey) : null;
    window.updateCreditChip?.(ids.treatmentGrid, patient || bed || {});

  window.populatePatientForm = populatePatientForm;

  function setIdentityFieldsLocked(scope, locked) {
    const ids = PATIENT_FORM_IDS[scope] || PATIENT_FORM_IDS.desk;
    [ids.chartNo, ids.name, ids.age].forEach(id => {
      const field = document.getElementById(id);
      if (!field) return;
      field.readOnly = Boolean(locked);
      field.classList.toggle('identity-chip-field', Boolean(locked));
      field.setAttribute('aria-readonly', locked ? 'true' : 'false');
    });
  }

    formEditBedNoByScope[scope] = bedNo;
    if (bedNo || bedNo === null) formEditPatientKeyByScope[scope] = null;
    const ids = PATIENT_FORM_IDS[scope] || PATIENT_FORM_IDS.desk;
    const button = document.getElementById(ids.submitBtn);
    const patientKey = formEditPatientKeyByScope[scope];
    if (button) button.textContent = bedNo || patientKey ? '확인' : '입력';
    setIdentityFieldsLocked(scope, Boolean(bedNo));
  }

  function setWaitingPatientEditMode(scope, patientKey = null) {
    formEditPatientKeyByScope[scope] = patientKey;

    const ids = PATIENT_FORM_IDS[scope] || PATIENT_FORM_IDS.desk;

    if (wrap) wrap.classList.toggle('open', Boolean(open));

      toggle.classList.toggle('has-memo', Boolean(memo));

    setBedMemoOpen(!wrap?.classList.contains('open'));

  function setBedEditOpen(open) {
    const panel = document.getElementById('bedPanel');
    const section = document.getElementById('bedEditSection');
    const button = document.getElementById('bedEditToggle');
    if (!panel || !section) return;

    panel.classList.remove('bed-edit-open');
    section.setAttribute('open', '');

  function toLocalDateInputValue(date = new Date()) {
    const yyyy = date.getFullYear();
    const mm = String(date.getMonth() + 1).padStart(2, '0');
    const dd = String(date.getDate()).padStart(2, '0');
    return `${yyyy}-${mm}-${dd}`;
  }

  function getVisitDateFromTimestamp(timestamp) {
    const value = Number(timestamp || 0);
    return toLocalDateInputValue(value ? new Date(value) : new Date());
  }

  function createChartVisitEntry(source = {}) {
    const date = source.visitDate || getVisitDateFromTimestamp(source.timestamp);
    return {
      date,
      visitType: source.visitType || '',
      treatments: Array.isArray(source.treatments) ? source.treatments : [],
      bodyParts: normalizeBodyParts(source.bodyParts),
      doctorName: source.doctorName || '',
      chiefComplaint: source.chiefComplaint || ''
    };
  }

  function mergeChartVisitHistory(existing = {}, data = {}) {
    const entries = [];
    const pushEntry = (entry) => {
      if (!entry?.date) return;
      entries.push({
        date: String(entry.date),
        treatments: Array.isArray(entry.treatments) ? entry.treatments : [],
        bodyParts: normalizeBodyParts(entry.bodyParts),
        doctorName: entry.doctorName || '',
        visitType: entry.visitType || '',
        chiefComplaint: entry.chiefComplaint || ''
      });
    };

    (Array.isArray(existing.visitDates) ? existing.visitDates : []).forEach(date => {
      const saved = existing.visitHistory?.[date] || {};
      pushEntry({ date, ...saved });
    });
    Object.entries(existing.visitHistory || {}).forEach(([date, saved]) => {
      if (entries.some(entry => entry.date === date)) return;
      pushEntry({ date, ...saved });
    });
    (Array.isArray(data.visitEntries) ? data.visitEntries : []).forEach(pushEntry);
    pushEntry(data.visitEntry);

    const byDate = {};
    entries.forEach(entry => {
      byDate[entry.date] = {
        treatments: entry.treatments,
        bodyParts: entry.bodyParts,
        doctorName: entry.doctorName,
        visitType: entry.visitType,
        chiefComplaint: entry.chiefComplaint
      };
    });
    const visitDates = Object.keys(byDate).sort();
    const latestDate = visitDates[visitDates.length - 1] || '';
    const latestVisit = latestDate ? (byDate[latestDate] || null) : null;
    const latestChiefComplaint = latestVisit?.chiefComplaint || '';
    return { visitDates, visitHistory: byDate, latestVisit, latestChiefComplaint };
  }

  function addLocalDays(date, days) {
    const next = new Date(date);
    next.setHours(0, 0, 0, 0);
    next.setDate(next.getDate() + days);
    return next;
  }

  function formatScheduleDayLabel(date) {
    const weekdays = ['일', '월', '화', '수', '목', '금', '토'];
    return `${date.getMonth() + 1}/${date.getDate()}(${weekdays[date.getDay()]})`;
  }

  let pendingBedScheduleDates = [];

  function normalizeAppointmentDates(dataOrDates) {
    const rawDates = Array.isArray(dataOrDates)
      ? dataOrDates
      : [
          ...(Array.isArray(dataOrDates?.appointmentDates) ? dataOrDates.appointmentDates : []),
          dataOrDates?.appointmentDate || ''
        ];
    return [...new Set(rawDates
      .map(date => String(date || '').trim())
      .filter(date => /^\d{4}-\d{2}-\d{2}$/.test(date))
    )].sort();
  }

  function renderBedScheduleCalendar(selectedDates = []) {
    const calendar = document.getElementById('bedScheduleCalendar');
    const customInput = document.getElementById('bedScheduleCustomInput');
    const confirmBtn = document.getElementById('bedScheduleConfirmBtn');
    if (!calendar) return;
    pendingBedScheduleDates = normalizeAppointmentDates(selectedDates);
    const today = addLocalDays(new Date(), 0);
    const presetDateItems = [];
    for (let offset = 1; presetDateItems.length < 7; offset += 1) {
      const date = addLocalDays(today, offset);
      if (date.getDay() === 0) continue;
      presetDateItems.push({ date, dateValue: toLocalDateInputValue(date), offset });
    }
    const presetDates = presetDateItems.map(item => item.dateValue);
    calendar.innerHTML = presetDateItems.map(({ date, dateValue, offset }) => {
      const className = [
        'bed-schedule-day',
        offset === 0 ? 'today' : '',
        pendingBedScheduleDates.includes(dateValue) ? 'selected' : ''
      ].filter(Boolean).join(' ');
      const label = offset === 0 ? `오늘 ${formatScheduleDayLabel(date)}` : formatScheduleDayLabel(date);
      return `<button type="button" class="${className}" onclick="selectBedScheduleDate('${dateValue}')">${escapeHtml(label)}</button>`;
    }).join('') + `<button type="button" class="bed-schedule-day${pendingBedScheduleDates.some(date => !presetDates.includes(date)) ? ' selected' : ''}" onclick="openBedScheduleCustomDate()">기타</button>`;
    if (customInput) {
      customInput.min = toLocalDateInputValue(today);
      customInput.value = pendingBedScheduleDates.find(date => !presetDates.includes(date)) || '';
      customInput.classList.toggle('show', Boolean(customInput.value));
    }
    if (confirmBtn) confirmBtn.disabled = pendingBedScheduleDates.length === 0;
    disableAutocomplete(calendar.closest('.bed-schedule-panel') || calendar);
  }

      patch.packages = packages;
