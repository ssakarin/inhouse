  window.exportFirebaseCsv = async () => {
    const btn = document.getElementById('exportCsvBtn');
    if (btn) {
      btn.disabled = true;
      btn.textContent = 'CSV 저장 중...';
    }

    try {
      const [patientsSnapshot, bedsSnapshot, doctorsSnapshot, nursesSnapshot] = await Promise.all([
        get(ref(db, PATIENTS_PATH)),
        get(ref(db, BEDS_PATH)),
        get(ref(db, 'staff/doctors')),
        get(ref(db, 'staff/nurses'))
      ]);
      const patients = patientsSnapshot.val() || {};
      const beds = bedsSnapshot.val() || {};
      const doctors = doctorsSnapshot.val() || {};
      const nurses = nursesSnapshot.val() || {};
      const lines = [];

      lines.push('patients');
      lines.push(csvRow(['patientKey', 'name', 'chartNo', 'visitType', 'chiefComplaint', 'memo', 'age', 'gender', 'treatments', 'timestamp', 'timeStr', 'date', 'bedStatus', 'bedNo', 'doctorId', 'doctorName', 'nurseId', 'nurseName']));
      Object.entries(patients)
        .sort((a, b) => ((a[1]?.timestamp || 0) - (b[1]?.timestamp || 0)))
        .forEach(([key, patient]) => {
          lines.push(csvRow([
            key,
            patient.name,
            patient.chartNo,
            patient.visitType,
            patient.chiefComplaint,
            patient.memo,
            patient.age,
            patient.gender,
            patient.treatments || [],
            patient.timestamp,
            patient.timeStr,
            patient.date,
            patient.bedStatus,
            patient.bedNo,
            patient.doctorId,
            patient.doctorName,
            patient.nurseId,
            patient.nurseName
          ]));
        });

      lines.push('');
      lines.push('beds');
      lines.push(csvRow(['bedNo', 'patientKey', 'name', 'chartNo', 'visitType', 'chiefComplaint', 'memo', 'age', 'gender', 'treatments', 'timeStr', 'timestamp', 'doctorId', 'doctorName', 'nurseId', 'nurseName', 'currentIndex', 'total', 'remaining', 'running', 'startedAt', 'complete', 'lastAlertId', 'lastAlertMessage']));
      Object.entries(beds)
        .sort((a, b) => Number(a[0]) - Number(b[0]))
        .forEach(([bedNo, bed]) => {
          lines.push(csvRow([
            bedNo,
            bed.patientKey,
            bed.name,
            bed.chartNo,
            bed.visitType,
            bed.chiefComplaint,
            bed.memo,
            bed.age,
            bed.gender,
            bed.treatments || [],
            bed.timeStr,
            bed.timestamp,
            bed.doctorId,
            bed.doctorName,
            bed.nurseId,
            bed.nurseName,
            bed.currentIndex,
            bed.total,
            bed.remaining,
            bed.running,
            bed.startedAt,
            bed.complete,
            bed.lastAlertId,
            bed.lastAlertMessage
          ]));
        });

      lines.push('');
      lines.push('staff_doctors');
      lines.push(csvRow(['staffKey', 'name', 'timestamp']));
      Object.entries(doctors)
        .sort((a, b) => ((a[1]?.timestamp || 0) - (b[1]?.timestamp || 0)))
        .forEach(([key, staff]) => lines.push(csvRow([key, staff.name, staff.timestamp])));

      lines.push('');
      lines.push('staff_nurses');
      lines.push(csvRow(['staffKey', 'name', 'timestamp']));
      Object.entries(nurses)
        .sort((a, b) => ((a[1]?.timestamp || 0) - (b[1]?.timestamp || 0)))
        .forEach(([key, staff]) => lines.push(csvRow([key, staff.name, staff.timestamp])));

      const now = new Date();
      const dateKey = now.toISOString().slice(0, 19).replace(/[:T]/g, '-');
      const blob = new Blob(['\ufeff' + lines.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `inhouse-firebase-${dateKey}.csv`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      showToast('CSV 저장 완료');
    } catch (e) {
      console.error(e);
      showToast('CSV 저장 실패');
    } finally {
      if (btn) {
        btn.disabled = false;
        btn.textContent = 'DB CSV 저장';
      }
    }
  };

      }
    }
  };

  let isFirstLoad = true;
  let loadedKeys = new Set();
  const pageLoadedAt = Date.now();
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);

  const patientsRef = query(
    ref(db, PATIENTS_PATH),
    orderByChild('timestamp'),
    startAt(todayStart.getTime())
  );

  function syncPatientPCreditSchema(patientKey, data) {
    if (!patientKey || !data) return;
    const patch = {};
    if (!data.packages) {
      const packages = createEmptyPackageState(data);
      patch.packages = packages;
      data.packages = packages;
    } else {
      const packages = getPackageStateFromPatient(data);
      if (JSON.stringify(data.packages) !== JSON.stringify(packages)) patch.packages = packages;
      data.packages = packages;
    }
    const balances = getPCreditsFromPackages(data.packages);
    PCREDIT_FIELDS.forEach(({ key }) => {
      if (!Object.prototype.hasOwnProperty.call(data, key) || Number(data[key] || 0) !== Number(balances[key] || 0)) {
        patch[key] = Number(balances[key] || 0);
        data[key] = Number(balances[key] || 0);
      }
    });
    if (Object.prototype.hasOwnProperty.call(data, 'credit')) {
      patch.credit = null;
      delete data.credit;
    }
    if (!Object.keys(patch).length) return;
    update(ref(db, `${PATIENTS_PATH}/${patientKey}`), patch).catch(e => {
      console.error('크레딧 필드 동기화 실패', e);
    });
  }

  onChildAdded(patientsRef, (snapshot) => {
    if (isClearingPatientDatabase) return;
    const key = snapshot.key;
    if (loadedKeys.has(key)) return;
    loadedKeys.add(key);

    const data = snapshot.val();
    syncPatientPCreditSchema(key, data);
    const normalizedChartNo = normalizeChartNo(data.chartNo);
    if ((data.chartNo || '') !== normalizedChartNo) {
      data.chartNo = normalizedChartNo;
      update(ref(db, `${PATIENTS_PATH}/${key}`), { chartNo: normalizedChartNo });
    }
    const isNew = Number(data.timestamp || 0) > pageLoadedAt;
    patientsByKey.set(key, data);
    if (autoBedAssignEnabled) assignPatientToBed(key, data, true);

    renderNotif(key, data, isNew);

    updateCount();
    if (isFirstLoad) setTimeout(() => { isFirstLoad = false; }, 500);
    renderWaitingLists();
    renderUpcomingAlerts();
  });

  onChildChanged(patientsRef, (snapshot) => {
    if (isClearingPatientDatabase) return;
    const key = snapshot.key;
    const data = snapshot.val();
    syncPatientPCreditSchema(key, data);
    const normalizedChartNo = normalizeChartNo(data.chartNo);
    if ((data.chartNo || '') !== normalizedChartNo) {
      data.chartNo = normalizedChartNo;
      update(ref(db, `${PATIENTS_PATH}/${key}`), { chartNo: normalizedChartNo });
    }
    loadedKeys.add(key);
    patientsByKey.set(key, data);
    renderBedSelector();
    renderBedDetail();
    renderReceiveBedDetail();
    renderBedMonitors();
    renderWaitingLists();
    renderUpcomingAlerts();
    updateCount();
  });

  onChildRemoved(patientsRef, (snapshot) => {
    const key = snapshot.key;
    const assignedBedNo = bedAssignments.findIndex(bed => bed?.patientKey === key) + 1;
    if (assignedBedNo > 0) clearLocalTimerAlertsForBed(assignedBedNo);
    patientsByKey.delete(key);
    loadedKeys.delete(key);

    renderBedSelector();
    renderBedDetail();
    renderReceiveBedDetail();
    renderBedMonitors();
    renderWaitingLists();
    renderUpcomingAlerts();
    updateCount();
  });

  function scheduleDisabledBedCleanup(bedNo, bed) {
    const key = String(bedNo);
    if (cleaningDisabledBedKeys.has(key)) return;
    cleaningDisabledBedKeys.add(key);

    setTimeout(async () => {
      try {
        const currentSnap = await get(ref(db, `${BEDS_PATH}/${key}`));
        const currentBed = currentSnap.val();
        if (!currentBed) return;

        if (currentBed.patientKey) {
          await update(ref(db, `${PATIENTS_PATH}/${currentBed.patientKey}`), {
            bedStatus: 'waiting',
            bedNo: null,
            timestamp: todayStart.getTime()
          });
        }
        await remove(ref(db, `${BEDS_PATH}/${key}`));
      } catch (e) {
        console.error('비활성 베드 DB 정리 실패', e);
      } finally {
        cleaningDisabledBedKeys.delete(key);
      }
    }, 0);
  }

  async function migrateDisabledBedsToWaiting(beds) {
    let movedCount = 0;
    Object.entries(beds).forEach(([bedNo, bed]) => {
      if (!bed) return;
      if (DISABLED_BED_NUMBERS.has(Number(bedNo))) return;
      const normalizedChartNo = normalizeChartNo(bed.chartNo);
      const normalizeKey = `${bedNo}:${bed.chartNo || ''}`;
      if ((bed.chartNo || '') !== normalizedChartNo && !normalizedBedChartKeys.has(normalizeKey)) {
        normalizedBedChartKeys.add(normalizeKey);
        bed.chartNo = normalizedChartNo;
      }
    });
    DISABLED_BED_NUMBERS.forEach(bedNo => {
      const key = String(bedNo);
      const bed = beds[key];
      if (!bed) return;
      scheduleDisabledBedCleanup(bedNo, bed);

      if (!migratingDisabledBedKeys.has(key) && bed.patientKey) {
        migratingDisabledBedKeys.add(key);
        const firstQueueTimestamp = todayStart.getTime();
        patientsByKey.set(bed.patientKey, {
          ...(patientsByKey.get(bed.patientKey) || {}),
          ...bed,
          bedStatus: 'waiting',
          bedNo: null,
          timestamp: firstQueueTimestamp
        });
        movedCount += 1;
      }

      delete beds[key];
    });
    return movedCount;
  }

  onValue(ref(db, BEDS_PATH), async (snapshot) => {
    const beds = snapshot.val() || {};
    if (isClearingPatientDatabase) {
      bedAssignments = Array(BED_COUNT).fill(null);
      doctorBedMap = {};
      renderBedSelector();
      renderBedDetail();
      renderReceiveBedDetail();
      renderBedMonitors();
      renderWaitingLists();
      renderUpcomingAlerts();
      updateCount();
      syncFixedBedArrivalOverlay();
      return;
    }
let migratedCount = 0;
    try {
      migratedCount = await migrateDisabledBedsToWaiting(beds);
    } catch (e) {
      console.error('비활성 베드 정리 실패', e);
    }
    bedAssignments = Array.from({ length: BED_COUNT }, (_, i) => beds[String(i + 1)] || null);
    doctorBedMap = {};
    for (let i = 1; i <= 10; i++) {
      if (beds[String(100 + i)]) doctorBedMap[100 + i] = beds[String(100 + i)];
    }
    if (DISABLED_BED_NUMBERS.has(selectedBedNo)) selectedBedNo = getUrlBedNo();
    if (DISABLED_BED_NUMBERS.has(selectedReceiveBedNo)) selectedReceiveBedNo = getUrlBedNo();
    if (selectedMoveBedNo && (DISABLED_BED_NUMBERS.has(selectedMoveBedNo) || !getBedData(selectedMoveBedNo))) selectedMoveBedNo = null;
    syncAssignedPatientKeys(hasLoadedBedsOnce);
    syncTimerAlertsWithBeds();
    handleRemoteTimerAlerts(!hasLoadedBedsOnce);
    syncDoctorProcedureAlerts();
    hasLoadedBedsOnce = true;
    if (!migratedCount) await assignWaitingPatientsToBeds();
    renderBedSelector();
    renderBedDetail();
    renderReceiveBedDetail();
    renderBedMonitors();
    renderWaitingLists();
    renderUpcomingAlerts();
    updateCount();
    syncFixedBedArrivalOverlay();
    ensureBedTicker();
  });

  function renderNotif(key, data, isNew) {
    const list = document.getElementById('notifList');
    if (!list) return;
    const empty = list.querySelector('.empty-state');
    if (empty) empty.remove();

    const card = document.createElement('div');
    card.className = `notif-card${isNew ? ' new' : ''}`;
    card.id = `notif-${key}`;
    card.innerHTML = `
      <div class="notif-top">
        <span class="notif-name">${data.name}</span>
        <span>${isNew ? '<span class="notif-new-badge">NEW</span>' : ''}<span class="notif-time">${data.timeStr}</span></span>
      </div>
      <div class="notif-treats">${data.treatments.map(t => `<span class="notif-tag">${t}</span>`).join('')}</div>
      <div class="notif-hint">탭하여 확인</div>`;
    card.onclick = () => {
      card.classList.remove('new');
      card.querySelector('.notif-hint').style.display = 'none';
      card.querySelector('.notif-new-badge') && (card.querySelector('.notif-new-badge').style.display = 'none');
    };
    list.insertBefore(card, list.firstChild);
  }

  function updateCount() {
    const todayCount = document.getElementById('todayCount');
    if (todayCount) todayCount.textContent = `${loadedKeys.size}명`;
    const bedPatientCount = document.getElementById('bedPatientCount');
    if (bedPatientCount) {
      const regularOccupiedCount = REGULAR_BED_NUMBERS.filter(bedNo => Boolean(bedAssignments[bedNo - 1])).length;
      bedPatientCount.textContent = `${regularOccupiedCount}/${REGULAR_BED_COUNT}`;
    }
  }

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[ch]));
  }

  function normalizeChartNo(value) {
    const text = String(value ?? '').trim();
    if (!/^\d+$/.test(text)) return text;
    return text.replace(/^0+(?=\d)/, '');
  }

  function getTreatmentSeconds(treatment) {
    return (Number(treatmentMinutes[treatment] || DEFAULT_TREATMENT_MINUTES[treatment] || 5)) * 60;
  }

  function getProcedureSeconds() {
    return Math.max(0, Number(procedureMinutes || 0)) * 60;
  }

  function isNeedleMoxaPair(first, second) {
    const a = String(first || '').trim();
    const b = String(second || '').trim();
    const isNeedle = value => value === '침';
    const isMoxa = value => value === '왕뜸' || value === '전자뜸';
    return (isNeedle(a) && isMoxa(b)) || (isMoxa(a) && isNeedle(b));
  }

  function getPreferredBedOrder(gender) {
    const primary = gender === '여' ? FEMALE_PRIMARY_BED_NUMBERS : MALE_PRIMARY_BED_NUMBERS;
    const fallback = gender === '여' ? MALE_PRIMARY_BED_NUMBERS : FEMALE_PRIMARY_BED_NUMBERS;
    return [...primary, ...fallback]
      .filter((bedNo, index, rows) =>
        REGULAR_BED_NUMBERS.includes(bedNo) && !AUTO_ASSIGN_EXCLUDED_BED_NUMBERS.has(bedNo) && rows.indexOf(bedNo) === index
      );
  }

  function getBedAssignedNurse(bedNo) {
    const nurseGroups = [
      { beds: [1, 2, 8, 13, 14], index: 0 },
      { beds: [3, 4, 9, 10], index: 1 },
      { beds: [5, 6, 11, 12], index: 2 }
    ];
    const group = nurseGroups.find(item => item.beds.includes(Number(bedNo)));
    if (!group) return null;

    const nurses = getSortedStaff('nurses');
    const [id, nurse] = nurses[group.index] || [];
    return id ? { id, name: nurse?.name || '' } : null;
  }

  function applyBedAssignedNurse(data, bedNo) {
    const nurse = getBedAssignedNurse(bedNo);
    if (!nurse) return data;
    return {
      ...data,
      nurseId: nurse.id,
      nurseName: nurse.name
    };
  }

  function createBedAssignment(patientKey, data, bedNo = null) {
    const assignmentData = bedNo ? applyBedAssignedNurse(data, bedNo) : data;
    const firstTreatment = assignmentData.treatments?.[0];
    const total = getTreatmentSeconds(firstTreatment);
    return {
      patientKey,
      name: assignmentData.name,
      treatments: assignmentData.treatments || [],
      timeStr: assignmentData.timeStr || '',
      timestamp: assignmentData.timestamp || Date.now(),
      chartNo: normalizeChartNo(assignmentData.chartNo),
      visitType: assignmentData.visitType || '',
      chiefComplaint: assignmentData.chiefComplaint || '',
      memo: assignmentData.memo || '',
      age: assignmentData.age || '',
      gender: assignmentData.gender || '',
      doctorId: assignmentData.doctorId || '',
      doctorName: assignmentData.doctorName || '',
      nurseId: assignmentData.nurseId || '',
      nurseName: assignmentData.nurseName || '',
      bodyParts: assignmentData.bodyParts || { front: [], back: [] },
      currentIndex: 0,
      total,
      remaining: total,
      running: false,
      startedAt: null,
      complete: false,
      doctorProcedureAlert: null
    };
  }

  function getDoctorBedNoForPatient(doctorId) {
    if (!doctorId) return null;
    const doctors = getSortedStaff('doctors');
    const index = doctors.findIndex(([key]) => key === doctorId);
    return index >= 0 ? 101 + index : null;
  }

  async function createDoctorAssignmentAlert(patientKey, data, bedNo) {
    if (!patientKey || Number(bedNo) < 101) return;
    const doctorId = data.doctorId || '';
    if (!doctorId) return;
    const doctorName = data.doctorName || getBedLabel(bedNo) || '원장';
    const name = data.name || '환자';
    try {
      await push(ref(db, DOCTOR_ASSIGNMENT_ALERTS_PATH), {
        patientKey,
        bedNo: Number(bedNo),
        bedLabel: getBedLabel(bedNo),
        doctorId,
        doctorName,
        patientName: name,
        message: `${doctorName} 원장님 ${name} ${getBedLabel(bedNo)} 배정`,
        timestamp: Date.now()
      });
    } catch (e) {
      console.error('원장 베드 배정 알림 저장 실패', e);
    }
  }

  async function createBedAssignmentAlert(patientKey, data, bedNo) {
    if (!patientKey || !bedNo) return;
    const name = data.name || '환자';
    try {
      await push(ref(db, BED_ASSIGNMENT_ALERTS_PATH), {
        patientKey,
        bedNo: Number(bedNo),
        bedLabel: getBedLabel(bedNo),
        patientName: name,
        doctorId: data.doctorId || '',
        doctorName: data.doctorName || '',
        nurseId: data.nurseId || '',
        nurseName: data.nurseName || '',
        message: `${getBedLabel(bedNo)} ${name} 배정`,
        timestamp: Date.now()
      });
    } catch (e) {
      console.error('베드 배정 알림 저장 실패', e);
    }
  }

  async function assignPatientToBed(patientKey, data, silent = false, force = false) {
    if (!force && !autoBedAssignEnabled) return false;
    if (data.bedStatus === 'discharged') return false;

    // 초진: 담당 원장 베드로만 배정
    if (data.visitType === '초진') {
      const docBedNo = getDoctorBedNoForPatient(data.doctorId);
      if (!docBedNo) return false;

      const result = await runTransaction(ref(db, BEDS_PATH), (beds) => {
        beds = beds || {};
        const existing = Object.keys(beds).find(no => beds[no]?.patientKey === patientKey);
        if (existing || beds[String(docBedNo)]) return beds;
        beds[String(docBedNo)] = createBedAssignment(patientKey, data, docBedNo);
        return beds;
      });

      const beds = result.snapshot.val() || {};
      const bedNo = Object.keys(beds).find(no => beds[no]?.patientKey === patientKey);
      if (result.committed && bedNo) {
        const assignedData = applyBedAssignedNurse(data, Number(bedNo));
        patientsByKey.set(patientKey, { ...assignedData, bedStatus: 'assigned', bedNo: Number(bedNo) });
        await update(ref(db, `${PATIENTS_PATH}/${patientKey}`), {
          bedStatus: 'assigned',
          bedNo: Number(bedNo),
          nurseId: assignedData.nurseId || '',
          nurseName: assignedData.nurseName || ''
        });
        await createDoctorAssignmentAlert(patientKey, assignedData, Number(bedNo));
        await createBedAssignmentAlert(patientKey, assignedData, Number(bedNo));
        return Number(bedNo);
      }
      return false;
    }

    // 재진: 기존 일반 베드 배정
    const result = await runTransaction(ref(db, BEDS_PATH), (beds) => {
      beds = beds || {};
      const existingBedNo = Object.keys(beds).find(bedNo => beds[bedNo]?.patientKey === patientKey);
      if (existingBedNo) return beds;

      const emptyBedNo = getPreferredBedOrder(data.gender)
        .map(String)
        .find(bedNo => !AUTO_ASSIGN_EXCLUDED_BED_NUMBERS.has(Number(bedNo)) && !beds[bedNo]);
      if (!emptyBedNo) return beds;

      beds[emptyBedNo] = createBedAssignment(patientKey, data, Number(emptyBedNo));
      return beds;
    });

    const beds = result.snapshot.val() || {};
    const bedNo = Object.keys(beds).find(no => beds[no]?.patientKey === patientKey);
    if (result.committed && bedNo) {
      const assignedData = applyBedAssignedNurse(data, Number(bedNo));
      patientsByKey.set(patientKey, { ...assignedData, bedStatus: 'assigned', bedNo: Number(bedNo) });
      await update(ref(db, `${PATIENTS_PATH}/${patientKey}`), {
        bedStatus: 'assigned',
        bedNo: Number(bedNo),
        nurseId: assignedData.nurseId || '',
        nurseName: assignedData.nurseName || ''
      });
      await createBedAssignmentAlert(patientKey, assignedData, Number(bedNo));
      return Number(bedNo);
    }

    if (!silent) showToast('빈 베드가 없습니다');
    return false;
  }

  async function assignWaitingPatientsToBeds(force = false) {
    if (!force && !autoBedAssignEnabled) return 0;
    if (isAssigningWaitingPatients) {
      shouldAssignWaitingAgain = true;
      return 0;
    }

    isAssigningWaitingPatients = true;
    shouldAssignWaitingAgain = false;
    let assignedCount = 0;
    const assignedPatientKeys = bedAssignments
      .filter(Boolean)
      .map(bed => bed.patientKey);

    const waitingPatients = getWaitingPatients(assignedPatientKeys);
    const occupiedBeds = new Set(
      REGULAR_BED_NUMBERS.filter(bedNo => Boolean(bedAssignments[bedNo - 1]))
    );

    // 앞선 대기자가 모두 재진인지 추적 (초진 우선 배정 조건)
    let allPrecedingAreJaejin = true;

    try {
      for (const [key, data] of waitingPatients) {
        const isChojin = data.visitType === '초진';

        if (isChojin) {
          // 초진: 앞선 대기자가 모두 재진인 경우에만 원장 베드 우선 배정
          let assigned = false;
          if (allPrecedingAreJaejin) {
            const assignedBedNo = await assignPatientToBed(key, data, true, force);
            if (assignedBedNo) {
              assignedCount += 1;
              assigned = true;
            }
          }
          if (!assigned) allPrecedingAreJaejin = false;
        } else {
          // 재진: 일반 베드 배정 (정원 초과 시 스킵하되 이후 초진은 계속 처리)
          if (occupiedBeds.size < REGULAR_BED_COUNT) {
            const assignedBedNo = await assignPatientToBed(key, data, true, force);
            if (assignedBedNo) {
              occupiedBeds.add(Number(assignedBedNo));
              assignedCount += 1;
            }
          }
        }
      }
    } finally {
      isAssigningWaitingPatients = false;
      if (shouldAssignWaitingAgain) {
        assignWaitingPatientsToBeds(force);
      }
    }
    return assignedCount;
  }

  window.assignWaitingPatientsManually = async () => {
    const count = await assignWaitingPatientsToBeds(true);
    showToast(count ? `${count}명 배정 완료` : '배정할 대기환자 또는 빈 베드가 없습니다');
  };

  async function assignWaitingPatientToSpecificBed(patientKey, bedNo) {
    bedNo = Number(bedNo);
    const isDocBed = bedNo >= 101;
    if (!isDocBed && !ACTIVE_BED_NUMBERS.includes(bedNo)) {
      showToast('배정할 수 없는 베드입니다');
      return false;
    }
    if (isDocBed && !getDoctorBedNumbers().includes(bedNo)) {
      showToast('등록되지 않은 원장실 베드입니다');
      return false;
    }

    const data = patientsByKey.get(patientKey);
    if (!data || data.bedStatus === 'discharged') {
      showToast('대기환자 정보를 찾을 수 없습니다');
      return false;
    }

    const result = await runTransaction(ref(db, BEDS_PATH), (beds) => {
      beds = beds || {};
      const existingBedNo = Object.keys(beds).find(no => beds[no]?.patientKey === patientKey);
      if (existingBedNo || beds[String(bedNo)]) return beds;
      beds[String(bedNo)] = createBedAssignment(patientKey, data, bedNo);
      return beds;
    });

    const beds = result.snapshot.val() || {};
    if (result.committed && beds[String(bedNo)]?.patientKey === patientKey) {
      const assignedData = applyBedAssignedNurse(data, bedNo);
      patientsByKey.set(patientKey, { ...assignedData, bedStatus: 'assigned', bedNo });
      await update(ref(db, `${PATIENTS_PATH}/${patientKey}`), {
        bedStatus: 'assigned',
        bedNo,
        nurseId: assignedData.nurseId || '',
        nurseName: assignedData.nurseName || ''
      });
      if (isDocBed) await createDoctorAssignmentAlert(patientKey, assignedData, bedNo);
      await createBedAssignmentAlert(patientKey, assignedData, bedNo);
      showToast(`${bedNo}번 배정 완료`);
      return true;
    }

    showToast('이미 사용 중인 베드입니다');
    return false;
  }

  function getWaitingPatients(assignedPatientKeys = null) {
    const assignedKeys = assignedPatientKeys || [
      ...bedAssignments.filter(Boolean).map(bed => bed.patientKey),
      ...Object.values(doctorBedMap).map(bed => bed.patientKey)
    ];

    return [...patientsByKey.entries()]
      .filter(([key, data]) => data?.name && data.bedStatus !== 'discharged' && !assignedKeys.includes(key))
      .sort((a, b) => (a[1].timestamp || 0) - (b[1].timestamp || 0));
  }

  function renderWaitingLists() {
    const waitingPatients = getWaitingPatients();
    updateDeskWaitChip(waitingPatients);
    const html = waitingPatients.length
      ? waitingPatients.map(([key, data], index) => {
        const infoChips = [
          data.gender ? `<span class="bed-meta-chip bed-meta-chip--fixed">${escapeHtml(data.gender)}</span>` : '',
          data.age ? `<span class="bed-meta-chip bed-meta-chip--fixed">${escapeHtml(String(data.age))}세</span>` : '',
          data.doctorName ? `<span class="bed-meta-chip">${escapeHtml(data.doctorName)}</span>` : '',
          data.nurseName ? `<span class="bed-meta-chip">${escapeHtml(data.nurseName)}</span>` : '',
        ].filter(Boolean).join('');
        return `
          <div class="waiting-item" id="waiting-${key}" draggable="true" onclick="handleWaitingPatientClick(event, '${key}')" ondragstart="handleWaitingDragStart(event, '${key}')" ondragend="handleWaitingDragEnd(event)" oncontextmenu="confirmDeleteWaitingPatient(event, '${key}')">
            <div class="waiting-rank">${index + 1}</div>
            <div>
              <div class="waiting-name">${escapeHtml(data.name)}</div>
              ${infoChips ? `<div class="waiting-info">${infoChips}</div>` : ''}
            </div>
          </div>`;
      }).join('')
      : `<div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-text">대기가 없습니다</div></div>`;

    ['inputWaitingList', 'receiveWaitingList'].forEach(id => {
      const list = document.getElementById(id);
      if (list) list.innerHTML = html;
    });
  }

  window.handleWaitingPatientClick = (event, key) => {
    if (event?.button && event.button !== 0) return;
    if (!key || draggedWaitingPatientKey) return;
    if (window.currentMode === 'notify') return;
    const patient = patientsByKey.get(key);
    if (!patient) {
      showToast('대기환자 정보를 찾을 수 없습니다');
      return;
    }

    const scope = window.currentMode === 'receive' || window.currentMode === 'doctor' ? 'receive' : 'desk';

    setWaitingPatientEditMode(scope, key);
    populatePatientForm(scope, patient);
    if (scope === 'receive') {
      document.getElementById('receivePanel')?.classList.add('receive-edit-open');
      setReceiveFormOpen(true);
    } else {
      setInputFormOpen(true);
    }
    showToast(`${patient.name || '대기환자'} 정보 불러옴`);
  };

  window.confirmDeleteWaitingPatient = async (event, key) => {
    event?.preventDefault();
    event?.stopPropagation();
    const patient = patientsByKey.get(key);
    if (!patient) return;
    if (!confirm(`${patient.name || '대기'} 삭제하시겠습니까?`)) return;

    if (patient.chartNo) {
      const assignedBed = bedAssignments.find(bed => bed?.patientKey === key);
      await window.saveChartPatient?.({
        chartNo: normalizeChartNo(patient.chartNo),
        name: patient.name || '',
        age: patient.age || '',
        gender: patient.gender || '',
        visitType: patient.visitType || '',
        chiefComplaint: patient.chiefComplaint || '',
        memo: patient.memo || '',
        treatments: patient.treatments || [],
        bodyParts: normalizeBodyParts(assignedBed?.bodyParts || patient.bodyParts),
        appointmentDate: patient.appointmentDate || '',
        packages: getPackageStateFromPatient(patient),
        ...getPCreditsFromPatient(patient)
      });
    }

    const assignedBedNo = bedAssignments.findIndex(bed => bed?.patientKey === key) + 1;
    if (assignedBedNo > 0) {
      clearLocalTimerAlertsForBed(assignedBedNo);
      await remove(ref(db, `${BEDS_PATH}/${assignedBedNo}`));
    }
    patientsByKey.delete(key);
    loadedKeys.delete(key);
    await remove(ref(db, `${PATIENTS_PATH}/${key}`));
    renderWaitingLists();
    showToast('대기 삭제 완료');
  };

  window.handleWaitingDragStart = (event, key) => {
    draggedWaitingPatientKey = key;
    draggedBedNo = null;
    event.currentTarget?.classList.add('waiting-dragging');
    event.dataTransfer.effectAllowed = 'move';
    event.dataTransfer.setData('text/plain', `waiting:${key}`);
  };

  window.handleWaitingDragEnd = (event) => {
    draggedWaitingPatientKey = null;
    event.currentTarget?.classList.remove('waiting-dragging');
    document.querySelectorAll('.waiting-drag-over').forEach(el => el.classList.remove('waiting-drag-over'));
  };

  window.handleWaitingListDragOver = (event) => {
    const bedNo = draggedBedNo || Number(event.dataTransfer?.getData('text/plain'));
    if (!bedNo || !getBedData(bedNo)) return;
    event.preventDefault();
    event.dataTransfer.dropEffect = 'move';
  };

  window.handleWaitingListDrop = async (event) => {
    event.preventDefault();
    event.stopPropagation();
    const bedNo = draggedBedNo || Number(event.dataTransfer?.getData('text/plain'));
    draggedBedNo = null;
    selectedMoveBedNo = null;
    suppressBedClickUntil = Date.now() + 350;
    if (!bedNo) return;
    await moveBedToWaiting(bedNo);
    renderWaitingLists();
    renderBedMonitors();
  };

  function getEstimatedWaitMinutesList(waitingPatients) {
    const regularBeds = REGULAR_BED_NUMBERS.map(bedNo => bedAssignments[bedNo - 1]);

    const minutesList = regularBeds
      .map(bed => {
        if (!bed) return 0;
        return getBedRemainingTreatmentSeconds(bed);
      })
      .sort((a, b) => a - b)
      .slice(0, 5)
      .map(seconds => Math.ceil(seconds / 60));

    if (minutesList.length === 5 && minutesList.every(minutes => minutes === 0)) return 'none';
    return minutesList.length ? minutesList : 0;
  }

  function updateDeskWaitChip(waitingPatients = getWaitingPatients()) {
    const minutes = getEstimatedWaitMinutesList(waitingPatients);
    const text = minutes === 'none'
      ? '대기시간 없음'
      : Array.isArray(minutes)
      ? `예상대기시간 ${minutes.map(value => `${value}분`).join(', ')}`
      : `예상대기시간 ${minutes}분`;
    const chip = document.getElementById('deskWaitChip');
    if (chip) chip.textContent = text;
    const notifyChip = document.getElementById('notifyWaitChip');
    if (notifyChip) notifyChip.textContent = text;
  }

  function formatUpcomingTime(seconds) {
    const safeSeconds = Math.max(0, Number(seconds || 0));
    if (safeSeconds < 60) return '곧';
    return `${Math.ceil(safeSeconds / 60)}분 후`;
  }

  function formatAppointmentDate(dateStr) {
    const parts = String(dateStr || '').split('-').map(Number);
    if (parts.length !== 3 || parts.some(n => !Number.isFinite(n))) return '';
    return `${parts[1]}월 ${parts[2]}일`;
  }

  function getCompletedTreatmentFromAlert(bed) {
    const message = bed.lastAlertMessage || '';
    const match = message.match(/·\s*(.+?)\s*완료/);
    return match?.[1] || bed.treatments?.[Math.max(0, Number(bed.currentIndex || 0) - 1)] || bed.treatments?.[bed.currentIndex] || '치료';
  }

  function getAppointmentAlertDismissField(mode = window.currentMode) {
    if (mode === 'input') return 'deskDismissed';
    if (mode === 'receive') return 'receiveDismissed';
    if (mode === 'notify') return 'notifyDismissed';
    return '';
  }

  function shouldShowAppointmentAlertForMode(data, mode = window.currentMode) {
    const field = getAppointmentAlertDismissField(mode);
    if (!field) return false;
    if (!data?.appointmentDate) return false;
    const alert = data.appointmentAlert || {};
    if (alert.date && alert.date !== data.appointmentDate) return true;
    return alert[field] !== true;
  }

  function getVisibleCallAlertItems(mode = window.currentMode) {
    return [...callAlertItems.entries()]
      .map(([key, data]) => ({ key, ...(data || {}) }))
      .filter(item => {
        if (!item.message) return false;
        if (mode === 'input') return item.target === 'desk';
        if (mode === 'notify' || mode === 'receive') return item.target === 'clinic';
        return false;
      })
      .sort((a, b) => Number(a.timestamp || 0) - Number(b.timestamp || 0));
  }

  function getVisibleDoctorAssignmentAlertItems(mode = window.currentMode) {
    if (mode !== 'doctor') return [];
    return [...doctorAssignmentAlertItems.entries()]
      .map(([key, data]) => ({ key, ...(data || {}) }))
      .filter(item => {
        if (!item.message) return false;
        if (!selectedDoctorAlertId) return false;
        return item.doctorId === selectedDoctorAlertId;
      })
      .sort((a, b) => Number(a.timestamp || 0) - Number(b.timestamp || 0));
  }

  function getVisibleBedAssignmentAlertItems(mode = window.currentMode) {
    if (mode !== 'notify' && mode !== 'receive') return [];
    return [...bedAssignmentAlertItems.entries()]
      .map(([key, data]) => ({ key, ...(data || {}) }))
      .filter(item => item.message)
      .sort((a, b) => Number(a.timestamp || 0) - Number(b.timestamp || 0));
  }

  function renderUpcomingAlerts() {
    const renderAlertItemsHtml = (items) => items
      .sort((a, b) => Number(a.timestamp || 0) - Number(b.timestamp || 0))
      .map(item => item.html)
      .join('');

    const renderBedAssignmentItems = (mode) => getVisibleBedAssignmentAlertItems(mode).map(item => ({
      timestamp: Number(item.timestamp || 0),
      html: `
      <div class="upcoming-item assignment" onclick="dismissBedAssignmentAlert('${escapeHtml(item.key)}')">
        <div class="upcoming-time">배정</div>
        <div>
          <div class="upcoming-main">${escapeHtml(item.message)}</div>
          <div class="upcoming-sub">클릭하면 사라집니다</div>
        </div>
      </div>`
    }));
    const inputAssignmentItems = renderBedAssignmentItems('input');
    const receiveModeForAlerts = window.currentMode === 'notify'
      ? 'notify'
      : (window.currentMode === 'receive' ? 'receive' : window.currentMode);
    const receiveAssignmentItems = renderBedAssignmentItems(receiveModeForAlerts);

    const doctorAssignmentItems = getVisibleDoctorAssignmentAlertItems().map(item => ({
      timestamp: Number(item.timestamp || 0),
      html: `
      <div class="upcoming-item assignment" onclick="dismissDoctorAssignmentAlert('${escapeHtml(item.key)}')">
        <div class="upcoming-time">배정</div>
        <div>
          <div class="upcoming-main">${escapeHtml(item.message)}</div>
          <div class="upcoming-sub">클릭하면 사라집니다</div>
        </div>
      </div>`
    }));

    const appointmentItems = [...patientsByKey.entries()]
      .map(([key, data]) => ({
        id: `${key}:${data?.appointmentDate || ''}`,
        key,
        name: data?.name || '',
        appointmentDate: data?.appointmentDate || '',
        data
      }))
      .filter(item => item.name && shouldShowAppointmentAlertForMode(item.data))
      .sort((a, b) => String(a.appointmentDate).localeCompare(String(b.appointmentDate)) || String(a.name).localeCompare(String(b.name)));

    const appointmentAlertItems = appointmentItems.map(item => ({
      timestamp: Number(item.data?.appointmentAlert?.timestamp || item.data?.timestamp || 0),
      html: `
      <div class="upcoming-item assignment" onclick="dismissAppointmentAlert('${escapeHtml(item.key)}')">
        <div class="upcoming-time">예약</div>
        <div>
          <div class="upcoming-main">${escapeHtml(item.name)}님 ${escapeHtml(formatAppointmentDate(item.appointmentDate))} 예약</div>
          <div class="upcoming-sub">클릭하면 사라집니다</div>
        </div>
      </div>`
    }));

    const renderCallItems = (mode) => getVisibleCallAlertItems(mode).map(item => ({
      timestamp: Number(item.timestamp || 0),
      html: `
      <div class="upcoming-item assignment" onclick="dismissDoctorCallAlert('${escapeHtml(item.key)}')">
        <div class="upcoming-time">호출</div>
        <div>
          <div class="upcoming-main">${escapeHtml(item.message)}</div>
          <div class="upcoming-sub">클릭하면 사라집니다</div>
        </div>
      </div>`
    }));
    const inputCallItems = renderCallItems('input');
    const receiveCallItems = renderCallItems(receiveModeForAlerts);

    const upcoming = bedAssignments
      .map((bed, index) => {
        if (!bed) return null;
        const remaining = getRemaining(bed);
        const isAlertPending = Boolean(bed.lastAlertId);
        if (!isAlertPending && (bed.complete || !bed.running || remaining <= 0)) return null;
        const treatment = isAlertPending
          ? getCompletedTreatmentFromAlert(bed)
          : (bed.treatments?.[bed.currentIndex] || '치료');
        return {
          bedNo: index + 1,
          bedLabel: getBedLabel(index + 1),
          name: bed.name || '',
          doctorName: bed.doctorName || '',
          nurseName: bed.nurseName || '',
          treatment,
          remaining,
          alertPending: isAlertPending,
          timestamp: Number(String(bed.lastAlertId || '').split('-').pop()) || Number(bed.startedAt || bed.timestamp || 0)
        };
      })
      .filter(Boolean)
      .sort((a, b) => Number(a.timestamp || 0) - Number(b.timestamp || 0));

    const timerAlertItems = upcoming.length
      ? upcoming.map(item => {
        const staffLine = [
          item.doctorName ? `원장 ${escapeHtml(item.doctorName)}` : '',
          item.nurseName ? `간호사 ${escapeHtml(item.nurseName)}` : ''
        ].filter(Boolean).join(' · ');
        return {
          timestamp: Number(item.timestamp || 0),
          html: `
        <div class="upcoming-item">
          <div class="upcoming-time">${item.alertPending ? '완료' : formatUpcomingTime(item.remaining)}</div>
          <div>
            <div class="upcoming-main">${escapeHtml(item.bedLabel)} ${escapeHtml(item.treatment)} 완료</div>
            <div class="upcoming-sub">${escapeHtml(item.name)} · ${item.alertPending ? '확인 대기' : formatTimer(item.remaining)}</div>
            ${staffLine ? `<div class="upcoming-staff">${staffLine}</div>` : ''}
          </div>
        </div>`
        };
      })
      : [];

    const doctorProcedureItems = shouldShowDoctorProcedureAlerts()
      ? getDoctorProcedureAlertItems()
        .map(item => ({
          timestamp: Number(item.timestamp || 0),
          html: `
        <div class="upcoming-item assignment" onclick="dismissDoctorProcedureAlert(${item.bedNo}, '${escapeHtml(item.alertId)}')">
          <div class="upcoming-time">시술</div>
          <div>
            <div class="upcoming-main">${escapeHtml(item.message)}</div>
            <div class="upcoming-sub">클릭하면 확인 처리됩니다</div>
          </div>
        </div>`
        }))
      : [];

    const receiveTimerItems = (receiveModeForAlerts === 'notify' || receiveModeForAlerts === 'receive') ? timerAlertItems : [];
    const inputItems = [...inputCallItems, ...inputAssignmentItems, ...appointmentAlertItems];
    const receiveItems = [...doctorProcedureItems, ...doctorAssignmentItems, ...receiveCallItems, ...receiveAssignmentItems, ...appointmentAlertItems, ...receiveTimerItems];
    const baseHasAlerts = inputItems.length > 0;
    const receiveHasAlerts = receiveItems.length > 0;
    const html = baseHasAlerts
      ? renderAlertItemsHtml(inputItems)
      : `<div class="empty-state"><div class="empty-icon">⏱</div><div class="empty-text">진행 중인 타이머가 없습니다</div></div>`;
    const receiveHtml = receiveHasAlerts
      ? renderAlertItemsHtml(receiveItems)
      : html;

    const inputList = document.getElementById('inputUpcomingAlerts');
    if (inputList) inputList.innerHTML = html;
    const receiveList = document.getElementById('receiveUpcomingAlerts');
    if (receiveList) receiveList.innerHTML = receiveHtml;
    updateAlertListAudioState();
  }

  window.dismissAssignmentAlert = (id) => {
    const index = assignmentAlertItems.findIndex(item => item.id === id);
    if (index >= 0) {
      assignmentAlertItems.splice(index, 1);
      renderUpcomingAlerts();
    }
  };

  window.dismissBedAssignmentAlert = async (id) => {
    if (!id) return;
    bedAssignmentAlertItems.delete(id);
    renderUpcomingAlerts();
    try {
      await remove(ref(db, `${BED_ASSIGNMENT_ALERTS_PATH}/${id}`));
    } catch (e) {
      console.error(e);
      showToast('베드 배정 알림 확인 실패');
    }
  };

  window.dismissDoctorAssignmentAlert = async (id) => {
    if (!id) return;
    doctorAssignmentAlertItems.delete(id);
    renderUpcomingAlerts();
    try {
      await remove(ref(db, `${DOCTOR_ASSIGNMENT_ALERTS_PATH}/${id}`));
    } catch (e) {
      console.error(e);
      showToast('원장 배정 알림 확인 실패');
    }
  };

  window.dismissDoctorCallAlert = async (id) => {
    if (!id) return;
    callAlertItems.delete(id);
    renderUpcomingAlerts();
    try {
      await remove(ref(db, `${CALL_ALERTS_PATH}/${id}`));
    } catch (e) {
      console.error(e);
      showToast('호출 확인 실패');
    }
  };

  window.dismissAppointmentAlert = async (patientKey) => {
    const field = getAppointmentAlertDismissField();
    if (!patientKey || !field) return;
    const patient = patientsByKey.get(patientKey) || {};
    const appointmentDate = patient.appointmentDate || '';
    await update(ref(db, `${PATIENTS_PATH}/${patientKey}/appointmentAlert`), {
      date: appointmentDate,
      [field]: true
    });
    patientsByKey.set(patientKey, {
      ...patient,
      appointmentAlert: {
        ...(patient.appointmentAlert || {}),
        date: appointmentDate,
        [field]: true
      }
    });
    renderUpcomingAlerts();
  };

  window.dismissDoctorProcedureAlert = async (bedNo, id) => {
    if (!bedNo || !id) return;
    const bed = getBedData(bedNo);
    const treatment = bed?.treatments?.[bed.currentIndex || 0] || '';
    const patch = {
      id,
      bedNo,
      treatment,
      dismissed: true,
      dismissedAt: Date.now()
    };
    seenDoctorProcedureAlerts.add(id);
    queuedDoctorProcedureAlerts.delete(id);
    if (activeDoctorProcedureAlert?.alertId === id) activeDoctorProcedureAlert = null;
    if (bed) bed.doctorProcedureAlert = patch;
    selectedReceiveBedNo = Number(bedNo);
    if (window.currentMode === 'bed') selectedBedNo = Number(bedNo);
    renderUpcomingAlerts();
    renderBedMonitors();
    renderBedDetail();
    renderReceiveBedDetail();
    try {
      await update(ref(db, `${BEDS_PATH}/${bedNo}/doctorProcedureAlert`), patch);
    } catch (e) {
      console.error(e);
      showToast('시술 알림 확인 저장 실패');
    }
    syncDoctorProcedureAlerts();
  };

  function formatTimer(seconds) {
    const safeSeconds = Math.max(0, seconds);
    const minutes = String(Math.floor(safeSeconds / 60)).padStart(2, '0');
    const rest = String(safeSeconds % 60).padStart(2, '0');
    return `${minutes}:${rest}`;
  }

  function renderBedSelector() {
    const selector = document.getElementById('bedSelector');
    renderBedSelectorOptions(selector, selectedBedNo);

  }

  function renderBedSelectorOptions(selector, selectedValue) {
    if (!selector) return;
    const doctorBedNums = getDoctorBedNumbers();
    const allBedNums = [...doctorBedNums, ...ACTIVE_BED_NUMBERS];
    selector.innerHTML = allBedNums.map((bedNo) => {
      const bed = getBedData(bedNo);
      const bedLabel = getBedLabel(bedNo);
      const label = bed ? `${bedLabel} - ${bed.name}` : `${bedLabel} - 비어 있음`;
      return `<option value="${bedNo}">${escapeHtml(label)}</option>`;
    }).join('');
    const validNums = allBedNums;
    selector.value = String(validNums.includes(selectedValue) ? selectedValue : (doctorBedNums[0] || 1));
  }

  window.selectBed = (bedNo) => {
    const doctorBedNums = getDoctorBedNumbers();
    if (!ACTIVE_BED_NUMBERS.includes(bedNo) && !doctorBedNums.includes(bedNo)) bedNo = doctorBedNums[0] || 1;
    selectedBedNo = bedNo;
    renderBedSelector();
    renderBedDetail();
    if (document.getElementById('bedPanel')?.classList.contains('bed-schedule-open')) populateBedSchedulePanel();
    if (document.getElementById('bedPanel')?.classList.contains('bed-edit-open')) populateBedEditForm();
    syncFixedBedArrivalOverlay();
  };

  function renderBedDetail() {
    const detail = document.getElementById('bedDetail');
    renderBodyPartSelector();
    populateBedEditForm();
    renderBedDetailInto(detail, selectedBedNo, true);
    updateBedRemainingChip();
  }

  function renderReceiveBedDetail() {
    const detail = document.getElementById('receiveBedDetail');
    renderBedDetailInto(detail, selectedReceiveBedNo, true, 'receive');
  }

  function renderBedDetailInto(detail, bedNo, allowControls, context = 'bed') {
    if (!detail) return;
    detail.classList.add('active');
    detail.innerHTML = renderBedDetailMarkup(bedNo, allowControls, context);
    if (context === 'bed') populateBedSchedulePanel();
  }

  function getBedRemainingTreatmentSeconds(bed) {
    if (!bed) return 0;
    const pendingAlertProcedureSeconds = bed.lastAlertId ? getProcedureSeconds() : 0;
    if (bed.complete) return pendingAlertProcedureSeconds;
    const treatments = Array.isArray(bed.treatments) ? bed.treatments : [];
    const currentIndex = Number(bed.currentIndex || 0);
    const remainingTreatments = treatments.slice(currentIndex);
    const currentRemaining = getRemaining(bed);
    const futureSeconds = treatments
      .slice(currentIndex + 1)
      .reduce((sum, treatment) => sum + getTreatmentSeconds(treatment), 0);
    return currentRemaining + futureSeconds + (remainingTreatments.length * getProcedureSeconds()) + pendingAlertProcedureSeconds;
  }

  function updateBedRemainingChip() {
    updateBedHeaderBedChip();
    const chip = document.getElementById('bedRemainingChip');
    if (!chip) return;
    const bed = bedAssignments[selectedBedNo - 1];
    const minutes = Math.ceil(getBedRemainingTreatmentSeconds(bed) / 60);
    chip.textContent = `남은 진료 시간 ${minutes}분`;
  }
  window.updateBedRemainingChip = updateBedRemainingChip;

  function updateBedHeaderBedChip() {
    const chip = document.getElementById('bedHeaderBedChip');
    if (!chip) return;
    chip.textContent = getBedHeaderLabel(selectedBedNo);
  }
  window.updateBedHeaderBedChip = updateBedHeaderBedChip;

  function normalizeBodyParts(bodyParts) {
    const bp = bodyParts || {};
    return {
      front: Array.isArray(bp.front) ? bp.front : [],
      back: Array.isArray(bp.back) ? bp.back : []
    };
  }

  function renderBodyPartSelector() {
    const map = document.getElementById('bodyMap');
    if (!map) return;

    const bed = getBedData(selectedBedNo);
    if (!bed) {
      map.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">◎</div>
          <div class="empty-text">현재 비어 있습니다</div>
        </div>`;
      return;
    }

    const selectedParts = normalizeBodyParts(bed.bodyParts);

    map.innerHTML = `
      <div class="body-map-grid">
        ${renderBodyFigure('front', '전면', selectedParts.front)}
        ${renderBodyFigure('back', '후면', selectedParts.back)}
      </div>
      <div class="body-selected-list">${renderBodyPartChips({ bodyParts: selectedParts })}</div>`;
  }

  function renderFormBodyPartSelector(scope) {
    const ids = PATIENT_FORM_IDS[scope] || PATIENT_FORM_IDS.desk;
    const map = document.getElementById(ids.bodyPartForm);
    if (!map) return;

    const selectedParts = normalizeBodyParts(formBodyPartsByScope[scope]);
    map.innerHTML = `
      <div class="card-label">치료부위 선택</div>
      <div class="body-map-grid">
        ${renderBodyFigure('front', '전면', selectedParts.front, `toggleFormBodyPart('${scope}', 'front', '__PART__')`)}
        ${renderBodyFigure('back', '후면', selectedParts.back, `toggleFormBodyPart('${scope}', 'back', '__PART__')`)}
      </div>
      <div class="body-selected-list">${renderBodyPartChips({ bodyParts: selectedParts })}</div>`;
  }

  function renderAllFormBodyPartSelectors() {
    ['desk', 'receive', 'bed'].forEach(scope => renderFormBodyPartSelector(scope));
  }

  function renderBodyFigure(side, title, selectedParts, onclickTemplate = `toggleBodyPart('${side}', '__PART__')`) {
    const leftLabel = side === 'back' ? '좌' : '우';
    const rightLabel = side === 'back' ? '우' : '좌';
    return `
      <div class="body-figure-panel">
        <div class="body-figure-title">${title}</div>
        <div class="body-figure-lr-wrap">
          <span class="body-lr-label">${leftLabel}</span>
          <div class="body-figure">
            ${renderBodySvg(side, selectedParts, onclickTemplate)}
          </div>
          <span class="body-lr-label">${rightLabel}</span>
        </div>
      </div>`;
  }

  function renderBodySvg(side, selectedParts = [], onclickTemplate = '') {
    const sel = new Set(
      BODY_PARTS[side]
        .filter(p => selectedParts.includes(p.label))
        .map(p => p.id)
    );
    const labelMap = Object.fromEntries(BODY_PARTS[side].map(p => [p.id, p.label]));
    const BASE = '#c8a87a';
    const ACT  = '#39a9f5';

    function seg(id, d) {
      const active = sel.has(id);
      const label  = labelMap[id] || id;
      const oc     = onclickTemplate.replace('__PART__', escapeHtml(label));
      return `<path d="${d}" fill="${active ? ACT : BASE}"
        style="cursor:pointer;transition:fill .15s;"
        onmouseenter="this.style.filter='brightness(1.2)'"
        onmouseleave="this.style.filter=''"
        onclick="${oc}"><title>${escapeHtml(label)}</title></path>`;
    }

    // ── 전면 ──────────────────────────────────────────────
    // viewBox 0 0 200 400  (SVG 좌=환자 우, SVG 우=환자 좌)
    if (side === 'front') { return `
<svg viewBox="0 0 200 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 머리 -->
  ${seg('head',        'M100,6 C82,6 70,18 70,34 C70,50 82,62 100,62 C118,62 130,50 130,34 C130,18 118,6 100,6 Z')}
  <!-- 목 -->
  ${seg('neck',        'M88,62 C88,68 87,74 86,80 L114,80 C113,74 112,68 112,62 Z')}
  <!-- 우측 회전근개 (SVG좌, 팔-몸통 접합부) -->

  function renderBedDetailTreatmentChips(bed, bedNo) {
    const treatments = Array.isArray(bed.treatments) ? bed.treatments : [];
    if (!treatments.length) {
      return '<span class="bed-treatment-chip waiting">치료 정보 -</span>';
    }

    const currentIndex = Number(bed.currentIndex || 0);
    const procedureBlinking = isDoctorProcedureBlinking(bedNo, bed);
    return treatments.map((treatment, index) => {
      const chipClass = bed.complete
        ? 'done'
        : (index < currentIndex ? 'done' : (index === currentIndex ? 'current' : 'waiting'));
      const runningClass = (bed.running || procedureBlinking) && index === currentIndex ? ' running' : '';
      return `<span class="bed-treatment-chip ${chipClass}${runningClass}" draggable="true"
        ondragstart="handleTreatChipDragStart(event,${bedNo},${index})"
        ondragover="handleTreatChipDragOver(event,${bedNo},${index})"
        ondrop="handleTreatChipDrop(event,${bedNo},${index})"
        ondragend="handleTreatChipDragEnd(event)"
        ondragleave="handleTreatChipDragLeave(event)"
      >${escapeHtml(treatment)}</span>`;
    }).join('');
  }

  function renderBodyPartChips(bed) {
    const selectedParts = normalizeBodyParts(bed.bodyParts);
    const parts = [...selectedParts.front, ...selectedParts.back];
    if (!parts.length) return '<span class="bed-meta-chip">치료부위 선택 없음</span>';
    return parts.map(part => `<span class="body-part-chip">${escapeHtml(part)}</span>`).join('');
  }

  function getShortVisitTypeLabel(visitType) {
    const value = String(visitType || '').trim();
    if (!value) return '';
    if (value.includes('초')) return '초진';
    if (value.includes('재')) return '재진';
    return value;
  }

  function getBedNameMetaChips(bed) {
    const parts = [
      bed.chartNo ? `${bed.chartNo}` : '',
      getShortVisitTypeLabel(bed.visitType),
      bed.gender || '',
      bed.age ? `${bed.age}세` : ''
    ].filter(Boolean);

    if (!parts.length) return '';
    return `<span class="bed-name-meta">${parts.map(part => `<span class="bed-name-meta-chip">${escapeHtml(part)}</span>`).join('')}</span>`;
  }

  function getBedDetailPatientSummaryChips(bed, includeIdentity = true) {
    const identityParts = includeIdentity ? [
      bed.chartNo ? `${bed.chartNo}번` : '',
      bed.visitType || '',
      bed.gender || '',
      bed.age ? `${bed.age}세` : ''
    ] : [];
    const parts = [
      ...identityParts,
      bed.chiefComplaint || '',
      bed.memo ? '메모있음' : ''
    ].filter(Boolean);

    if (!parts.length) return '';
    return parts.map(part => `<span class="bed-patient-summary-chip">${escapeHtml(part)}</span>`).join('');
  }

  function renderBedDetailPatientInfo(bed, bedNo, showClearButton = false, options = {}) {
    const patientSummary = getBedDetailPatientSummaryChips(bed, options.includeIdentity !== false);
    const infoChips = [
      bed.doctorName || '-',
      bed.nurseName || '-'
    ].map(value => `<span class="bed-meta-chip">${escapeHtml(value)}</span>`).join('');

    return `
      <div class="bed-detail-info${showClearButton ? ' has-action' : ''}">
        <div>
          ${patientSummary ? `<div class="bed-detail-chip-row">${patientSummary}</div>` : ''}
          <div class="bed-detail-chip-row">${infoChips}</div>
          <div class="bed-detail-treatment-row">${renderBedDetailTreatmentChips(bed, bedNo)}</div>
        </div>
        ${showClearButton ? `<button class="bed-clear-btn" onclick="confirmClearBedNumber(${bedNo})">베드 비우기</button>` : ''}
      </div>`;
  }

  function renderBedPackageBalanceBox(bed) {
    const patient = bed?.patientKey ? patientsByKey.get(bed.patientKey) : null;
    const balances = getPCreditsFromPatient(patient || {});
    return `
      <div class="bed-package-zone">

        </div>
      </div>`;
  }

  function renderBedDetailMarkup(bedNo, allowControls, context = 'bed') {
    const bed = getBedData(bedNo);
    const bedLabel = getBedLabel(bedNo);
    if (!bed) {
      return `

          <div class="empty-icon">⏱</div>
          <div class="empty-text">${escapeHtml(bedLabel)} 현재 비어 있습니다</div>

    }

    const currentTreatment = bed.treatments?.[bed.currentIndex];
    if (context === 'bed') {
      return `
        <div class="card bed-detail-card--bed">
          <div class="bed-info-zone">
            <div class="bed-summary">
              <div>
                <div class="bed-name-row">

                  ${getBedNameMetaChips(bed)}
                </div>
              </div>
              <div class="bed-time">${escapeHtml(bed.timeStr || '')}</div>
            </div>
            ${renderBedDetailPatientInfo(bed, bedNo, allowControls, { includeIdentity: false })}
            ${bed.lastAlertId ? `<div class="bed-alert-card">

            </div>` : ''}
          </div>
          ${renderBedPackageBalanceBox(bed)}
          <div class="bed-timer-zone">
            <div class="timer-list">
              ${bed.complete ? renderCompleteCard(bedNo, bed, allowControls, context) : renderTimerCard(bedNo, bed, currentTreatment, allowControls, context)}
            </div>
          </div>
          <div class="bed-schedule-zone">
            ${allowControls ? renderBedSchedulePanelMarkup() : ''}
          </div>
        </div>`;
    }

    return `
      <div class="card">
        <div class="bed-summary">
          <div>
            <div class="bed-name-row">
              <div class="bed-name">${escapeHtml(bed.name)}</div>
            </div>
          </div>
          <div class="bed-time">${escapeHtml(bed.timeStr || '')}</div>
        </div>
        ${renderBedDetailPatientInfo(bed, bedNo, allowControls && context === 'bed')}
        ${bed.lastAlertId ? `<div class="bed-alert-card">
          <div class="bed-alert-message">${escapeHtml(bed.lastAlertMessage || `${bed.name || ''} 치료 완료`)}</div>
          <button class="bed-alert-btn" onclick="acknowledgeBedAlert(${bedNo})">알림 확인</button>
        </div>` : ''}
        <div class="timer-list">
          ${bed.complete ? renderCompleteCard(bedNo, bed, allowControls, context) : renderTimerCard(bedNo, bed, currentTreatment, allowControls, context)}
        </div>
        ${allowControls && context === 'bed' ? renderBedSchedulePanelMarkup() : ''}
        ${allowControls && context !== 'bed' && !bed.complete ? `<button class="bed-clear-btn" onclick="confirmClearBedNumber(${bedNo})">베드 비우기</button>` : ''}
      </div>`;
  }

  function getRemaining(bed) {
    if (!bed || bed.complete) return 0;
    const baseRemaining = Number(bed.remaining || 0);
    if (!bed.running || !bed.startedAt) return Math.max(0, baseRemaining);
    return Math.max(0, baseRemaining - Math.floor((Date.now() - bed.startedAt) / 1000));
  }

  // 타이머 불필요 치료 (시행완료 버튼만 표시)
  const NO_TIMER_TREATMENTS = new Set(['진찰', '추나']);
  function isNoTimerTreatment(name) {
    if (!name) return false;
    if (NO_TIMER_TREATMENTS.has(name)) return true;
    if (/약침/.test(name)) return true;
    return false;
  }

  function renderTimerCard(bedNo, bed, treatment, allowControls = true, context = 'bed') {
    const noTimer = isNoTimerTreatment(treatment);
    const remaining = getRemaining(bed);
    const percent = bed.total ? Math.max(0, Math.min(100, (remaining / bed.total) * 100)) : 0;
    const timerId = `${context}-timer-bed-${bedNo}`;
    const clockId = `${context}-timer-clock-bed-${bedNo}`;
    const barId = `${context}-timer-bar-bed-${bedNo}`;
    const inputId = `${context}-timer-minutes-bed-${bedNo}`;
    const toggleLabel = bed.running ? '일시정지' : '시작';
    const toggleClass = bed.running ? 'pause' : 'primary';
    const isBedContext = context === 'bed';

    if (noTimer) {
      return `
        <div class="timer-card" id="${timerId}">
          <div class="timer-top">
            <div>
              <div class="timer-treatment">${escapeHtml(treatment)}</div>
              <div class="timer-step">${bed.currentIndex + 1}/${bed.treatments.length}번째 치료</div>
            </div>
          </div>
          ${allowControls ? `<div class="timer-actions${isBedContext ? ' bed-timer-actions' : ''}">
            <button class="timer-btn" onclick="moveTreatment(${bedNo}, -1)" ${bed.currentIndex <= 0 ? 'disabled' : ''}>이전 치료</button>
            <button class="timer-btn primary" onclick="completeNoTimerTreatment(${bedNo})">시행완료</button>
          </div>` : ''}
        </div>`;
    }

    return `
      <div class="timer-card" id="${timerId}">
        <div class="timer-top">
          <div>
            <div class="timer-treatment">${escapeHtml(treatment)}</div>
            <div class="timer-step">${bed.currentIndex + 1}/${bed.treatments.length}번째 치료</div>
          </div>
          <div class="timer-clock" id="${clockId}">${formatTimer(remaining)}</div>
        </div>
        <div class="timer-progress"><div class="timer-bar" id="${barId}" style="width:${percent}%"></div></div>
        ${allowControls ? `<div class="treatment-nav">
          <button class="timer-btn" onclick="moveTreatment(${bedNo}, -1)" ${bed.currentIndex <= 0 ? 'disabled' : ''}>이전 치료</button>
          <button class="timer-btn" onclick="moveTreatment(${bedNo}, 1)" ${bed.currentIndex >= bed.treatments.length - 1 ? 'disabled' : ''}>이후 치료</button>
        </div>` : ''}
        ${allowControls ? `<div class="timer-settings${isBedContext ? ' bed-timer-settings' : ''}">
          <input class="timer-minute-input" id="${inputId}" type="number" min="1" max="120" step="1" value="${Math.max(1, Math.round(bed.total / 60))}" aria-label="타이머 시간 분">
          <button class="timer-set-btn" onclick="setTimerMinutes(${bedNo}, '${context}')">시간 설정</button>
          ${isBedContext ? `<button class="timer-set-btn" onclick="resetTimer(${bedNo})">프리셋</button>` : ''}
        </div>` : ''}
        ${allowControls ? `<div class="timer-actions${isBedContext ? ' bed-timer-actions' : ''}">
          <button class="timer-btn ${toggleClass}" onclick="toggleTimer(${bedNo})">${toggleLabel}</button>
          ${isBedContext ? '' : `<button class="timer-btn" onclick="resetTimer(${bedNo})">초기화</button>`}
        </div>` : ''}
      </div>`;
  }

  function renderCompleteCard(bedNo, bed, allowControls = true, context = 'bed') {
    return `
      <div class="timer-card done">
        <div class="timer-top">
          <div>
            <div class="timer-treatment">모든 치료 완료</div>
            <div class="timer-step">${(bed.treatments || []).map(escapeHtml).join(' → ')}</div>
          </div>
          <div class="timer-clock">완료</div>
        </div>
        ${allowControls ? `<div class="treatment-nav">
          <button class="timer-btn" onclick="moveTreatment(${bedNo}, -1)" ${(bed.currentIndex || 0) <= 0 ? 'disabled' : ''}>이전 치료</button>
          <button class="timer-btn" disabled>이후 치료</button>
        </div>
        ${context === 'bed' ? '' : `<button class="bed-clear-btn" onclick="confirmClearBedNumber(${bedNo})">베드 비우기</button>`}` : ''}
      </div>`;
  }

  function updateTimerDom(bedNo) {
    const bed = bedAssignments[bedNo - 1];
    if (!bed) return;

    const remaining = getRemaining(bed);
    const percent = bed.total ? Math.max(0, Math.min(100, (remaining / bed.total) * 100)) : 0;

    ['bed', 'receive'].forEach(context => {
      const clock = document.getElementById(`${context}-timer-clock-bed-${bedNo}`);
      const bar = document.getElementById(`${context}-timer-bar-bed-${bedNo}`);
      const card = document.getElementById(`${context}-timer-bed-${bedNo}`);

      if (clock) clock.textContent = formatTimer(remaining);
      if (bar) bar.style.width = `${percent}%`;
      if (card) card.classList.toggle('done', remaining <= 0);
    });
    renderBedMonitors();
    renderUpcomingAlerts();
    if (bedNo === selectedBedNo) updateBedRemainingChip();
  }

  window.startTimer = async (bedNo) => {
    const bed = bedAssignments[bedNo - 1];
    if (!bed || bed.running || bed.complete || getRemaining(bed) <= 0) return;

    await update(ref(db, `${BEDS_PATH}/${bedNo}`), {
      running: true,
      startedAt: Date.now(),
      remaining: getRemaining(bed)
    });
    playTimerStartSound();
  };

  window.toggleTimer = async (bedNo) => {
    const bed = bedAssignments[bedNo - 1];
    if (!bed || bed.complete || getRemaining(bed) <= 0) return;
    if (bed.running) {
      await pauseTimer(bedNo);
    } else {
      await startTimer(bedNo);
    }
  };

  async function finishBedStep(bedNo) {
    if (finishingBeds.has(bedNo)) return;
    finishingBeds.add(bedNo);

    const bedBefore = bedAssignments[bedNo - 1];
    const completedTreatment = bedBefore?.treatments?.[bedBefore.currentIndex] || '치료';
    const patientName = bedBefore?.name || '';
    const alertId = `${bedBefore?.patientKey || bedNo}-${bedBefore?.currentIndex || 0}-${Date.now()}`;

    const result = await runTransaction(ref(db, `${BEDS_PATH}/${bedNo}`), (bed) => {
      if (!bed || bed.complete) return bed;

      const remaining = getRemaining(bed);
      if (!bed.running || remaining > 0) return bed;

      const treatments = bed.treatments || [];
      const currentTreatment = treatments[bed.currentIndex];
      const followingTreatment = treatments[bed.currentIndex + 1];
      const nextIndex = bed.currentIndex + (isNeedleMoxaPair(currentTreatment, followingTreatment) ? 2 : 1);
      if (nextIndex >= treatments.length) {
        return {
          ...bed,
          running: false,
          startedAt: null,
          remaining: 0,
          complete: true,
          lastAlertId: alertId,
          lastAlertMessage: `${bedNo}번 베드 ${bed.name} · ${currentTreatment} 완료`,
          doctorProcedureAlert: null
        };
      }

      const nextTotal = getTreatmentSeconds(treatments[nextIndex]);
      return {
        ...bed,
        currentIndex: nextIndex,
        total: nextTotal,
        remaining: nextTotal,
        running: false,
        startedAt: null,
        complete: false,
        lastAlertId: alertId,
        lastAlertMessage: `${bedNo}번 베드 ${bed.name} · ${currentTreatment} 완료`,
        doctorProcedureAlert: null
      };
    });

    finishingBeds.delete(bedNo);

    if (result.committed && bedBefore) {
      if (!queuedTimerAlerts.has(alertId)) {
        showTimerCompleteAlert(`${bedNo}번 베드 ${patientName} · ${completedTreatment} 완료`, bedNo, alertId);
      }
      seenTimerAlerts.add(alertId);
    }
  }

  window.pauseTimer = async (bedNo) => {
    const bed = bedAssignments[bedNo - 1];
    if (!bed) return;

    await update(ref(db, `${BEDS_PATH}/${bedNo}`), {
      running: false,
      startedAt: null,
      remaining: getRemaining(bed)
    });
  };

  window.toggleBodyPart = async (side, part) => {
    const bed = getBedData(selectedBedNo);
    if (!bed || !BODY_PARTS[side]) return;

    const bodyParts = normalizeBodyParts(bed.bodyParts);
    const current = new Set(bodyParts[side]);
    if (current.has(part)) {
      current.delete(part);
    } else {
      current.add(part);
    }

    const nextBodyParts = {
      ...bodyParts,
      [side]: [...current]
    };

    const updates = [
      update(ref(db, `${BEDS_PATH}/${selectedBedNo}`), { bodyParts: nextBodyParts })
    ];

    if (bed.patientKey) {
      updates.push(update(ref(db, `${PATIENTS_PATH}/${bed.patientKey}`), { bodyParts: nextBodyParts }));
    }

    await Promise.all(updates);
  };

  window.toggleFormBodyPart = (scope, side, part) => {
    if (!BODY_PARTS[side]) return;
    const currentParts = normalizeBodyParts(formBodyPartsByScope[scope]);
    const current = new Set(currentParts[side]);
    if (current.has(part)) {
      current.delete(part);
    } else {
      current.add(part);
    }

    formBodyPartsByScope[scope] = {
      ...currentParts,
      [side]: [...current]
    };
    renderFormBodyPartSelector(scope);
    scheduleSelectFieldSave(scope);
  };

  // ── 선택 필드 즉시 자동저장 (edit mode 전용) ────────────────────────
  const _selectSaveTimers = {};

  function scheduleSelectFieldSave(scope, delay = 250) {
    clearTimeout(_selectSaveTimers[scope]);
    _selectSaveTimers[scope] = setTimeout(() => autoSaveSelectFields(scope), delay);
  }

  function getScopeFromGridId(gridId) {
    for (const [scope, ids] of Object.entries(PATIENT_FORM_IDS)) {
      if (ids.treatmentGrid === gridId) return scope;
    }
    return null;
  }

  async function autoSaveSelectFields(scope) {
    const bedNo = formEditBedNoByScope[scope];
    if (!bedNo) return;
    const bed = getBedData(bedNo);
    if (!bed) return;

    const form = getFormValues(scope);
    if (!form.treatments.length) return;

    const currentTreatment = bed.treatments?.[bed.currentIndex || 0];
    const nextIdx = Math.min(bed.currentIndex || 0, form.treatments.length - 1);
    const nextTreatment = form.treatments[nextIdx];
    const treatmentChanged = currentTreatment !== nextTreatment;
    const timerUpdates = treatmentChanged ? {
      currentIndex: nextIdx,
      total: getTreatmentSeconds(nextTreatment),
      remaining: getTreatmentSeconds(nextTreatment),
      running: false, startedAt: null, complete: false,
      lastAlertId: null, lastAlertMessage: null,
      doctorProcedureAlert: null
    } : {};

    const payload = {
      treatments: form.treatments,
      doctorId: form.doctor.id,
      doctorName: form.doctor.name,
      nurseId: form.nurse.id,
      nurseName: form.nurse.name,
      bodyParts: form.bodyParts
    };

    try {
      await update(ref(db, `${BEDS_PATH}/${bedNo}`), { ...payload, ...timerUpdates });
      if (bed.patientKey) {
        await update(ref(db, `${PATIENTS_PATH}/${bed.patientKey}`), payload);
      }
      if (treatmentChanged) clearLocalTimerAlertsForBed(bedNo);
    } catch(e) {
      console.error('선택 필드 자동저장 실패', e);
    }
  }
  renderAllFormBodyPartSelectors();

  window.resetTimer = async (bedNo) => {
    const bed = bedAssignments[bedNo - 1];
    if (!bed) return;

    const total = getTreatmentSeconds(bed.treatments[bed.currentIndex]);
    await update(ref(db, `${BEDS_PATH}/${bedNo}`), {
      running: false,
      startedAt: null,
      total,
      remaining: total
    });
  };

  window.moveTreatment = async (bedNo, direction) => {
    const bed = bedAssignments[bedNo - 1];
    if (!bed) return;

    const treatments = bed.treatments || [];
    const nextIndex = Math.max(0, Math.min(treatments.length - 1, (bed.currentIndex || 0) + direction));
    if (nextIndex === bed.currentIndex || !treatments[nextIndex]) return;

    const total = getTreatmentSeconds(treatments[nextIndex]);
    await update(ref(db, `${BEDS_PATH}/${bedNo}`), {
      currentIndex: nextIndex,
      running: false,
      startedAt: null,
      complete: false,
      total,
      remaining: total,
      lastAlertId: null,
      lastAlertMessage: null,
      doctorProcedureAlert: null
    });
    clearLocalTimerAlertsForBed(bedNo);
  };

  window.completeNoTimerTreatment = async (bedNo) => {
    const bed = getBedData(bedNo);
    if (!bed) return;
    const treatments = bed.treatments || [];
    const nextIndex = (bed.currentIndex || 0) + 1;

    if (nextIndex >= treatments.length) {
      // 마지막 치료 → 전체 완료
      await update(ref(db, `${BEDS_PATH}/${bedNo}`), {
        running: false,
        startedAt: null,
        remaining: 0,
        complete: true,
        lastAlertId: null,
        lastAlertMessage: null,
        doctorProcedureAlert: null
      });
    } else {
      // 다음 치료로 이동
      const nextTotal = getTreatmentSeconds(treatments[nextIndex]);
      await update(ref(db, `${BEDS_PATH}/${bedNo}`), {
        currentIndex: nextIndex,
        running: false,
        startedAt: null,
        complete: false,
        total: nextTotal,
        remaining: nextTotal,
        lastAlertId: null,
        lastAlertMessage: null,
        doctorProcedureAlert: null
      });
    }
    clearLocalTimerAlertsForBed(bedNo);
  };

  window.setTimerMinutes = async (bedNo, context = 'bed') => {
    const bed = bedAssignments[bedNo - 1];
    const input = document.getElementById(`${context}-timer-minutes-bed-${bedNo}`) ||
      document.querySelector(`[id$="-timer-minutes-bed-${bedNo}"]`);
    if (!bed || !input) return;

    const minutes = Math.max(1, Math.min(120, Number(input.value) || 1));
    const total = Math.round(minutes * 60);
    await update(ref(db, `${BEDS_PATH}/${bedNo}`), {
      running: false,
      startedAt: null,
      total,
      remaining: total
    });
    showToast(`${bedNo}번 베드 ${minutes}분으로 설정`);
  };

  window.clearBed = async (bedNo) => {
    const bed = getBedData(bedNo);
    clearLocalTimerAlertsForBed(bedNo);

    // IndexedDB에 먼저 저장 (차트번호 있는 경우)
    if (bed?.chartNo) {
      const patient = bed.patientKey ? patientsByKey.get(bed.patientKey) : null;
      await window.saveChartPatient?.({
        chartNo: normalizeChartNo(bed.chartNo),
        name: bed.name || '',
        age: bed.age || '',
        gender: bed.gender || '',
        visitType: bed.visitType || '',
        chiefComplaint: bed.chiefComplaint || '',
        memo: patient?.memo || bed.memo || '',
        treatments: bed.treatments || [],
        bodyParts: normalizeBodyParts(bed.bodyParts),
        appointmentDate: patient?.appointmentDate || '',
        packages: getPackageStateFromPatient(patient || {}),
        ...getPCreditsFromPatient(patient || {})
      });
    }

    if (bed?.patientKey) {
      patientsByKey.delete(bed.patientKey);
      loadedKeys.delete(bed.patientKey);
      await remove(ref(db, `${PATIENTS_PATH}/${bed.patientKey}`));
    }
    await remove(ref(db, `${BEDS_PATH}/${bedNo}`));
  };

  window.confirmClearBed = async (event, bedNo) => {
    event?.preventDefault();
    event?.stopPropagation();
    await confirmClearBedNumber(bedNo);
  };

  window.confirmClearBedNumber = async (bedNo) => {
    const bed = getBedData(bedNo);
    if (!bed) return;

    if (confirm(`${getBedLabel(bedNo)} ${bed.name} 삭제하시겠습니까?`)) {
      await clearBed(bedNo);
    }
  };

  window.confirmClearSelectedBed = async () => {
    await confirmClearBedNumber(selectedBedNo);
  };

  async function updatePatientBedNoForBed(bedNo, bed) {
    if (!bed?.patientKey) return;
    await update(ref(db, `${PATIENTS_PATH}/${bed.patientKey}`), { bedNo, bedStatus: 'assigned' });
  }

  function remapLocalAlertBedNo(alertId, bedNo) {
    if (!alertId) return;
    if (activeTimerAlert?.alertId === alertId) activeTimerAlert.bedNo = bedNo;
    timerAlertQueue.forEach(alert => {
      if (alert.alertId === alertId) alert.bedNo = bedNo;
    });
  }

  window.moveOrSwapBed = async (fromBedNo, toBedNo) => {
    if (fromBedNo === toBedNo) return false;

    const fromBed = getBedData(fromBedNo);
    if (!fromBed) return false;
    const hadTargetBed = Boolean(getBedData(toBedNo));

    const result = await runTransaction(ref(db, BEDS_PATH), (beds) => {
      beds = beds || {};
      const fromKey = String(fromBedNo);
      const toKey = String(toBedNo);
      const movingBed = beds[fromKey];
      if (!movingBed) return;

      const targetBed = beds[toKey] || null;
      if (targetBed) {
        beds[fromKey] = targetBed;
        beds[toKey] = movingBed;
      } else {
        beds[toKey] = movingBed;
        delete beds[fromKey];
      }
      return beds;
    });

    if (result.committed) {
      const movedBeds = result.snapshot.val() || {};
      await Promise.all([
        updatePatientBedNoForBed(fromBedNo, movedBeds[String(fromBedNo)]),
        updatePatientBedNoForBed(toBedNo, movedBeds[String(toBedNo)])
      ]);
      const assignmentAlertPromises = [];
      if (Number(fromBedNo) >= 101 && movedBeds[String(fromBedNo)]?.patientKey) {
        assignmentAlertPromises.push(createDoctorAssignmentAlert(
          movedBeds[String(fromBedNo)].patientKey,
          movedBeds[String(fromBedNo)],
          Number(fromBedNo)
        ));
      }
      if (Number(toBedNo) >= 101 && movedBeds[String(toBedNo)]?.patientKey) {
        assignmentAlertPromises.push(createDoctorAssignmentAlert(
          movedBeds[String(toBedNo)].patientKey,
          movedBeds[String(toBedNo)],
          Number(toBedNo)
        ));
      }
      if (assignmentAlertPromises.length) await Promise.all(assignmentAlertPromises);
      remapLocalAlertBedNo(movedBeds[String(fromBedNo)]?.lastAlertId, fromBedNo);
      remapLocalAlertBedNo(movedBeds[String(toBedNo)]?.lastAlertId, toBedNo);
      showToast(hadTargetBed
        ? `${getBedLabel(fromBedNo)} ${getBedLabel(toBedNo)} 교환`
        : `${getBedLabel(fromBedNo)} → ${getBedLabel(toBedNo)} 이동 완료`);
      return true;
    }

    showToast('베드 이동 실패');
    return false;
  };

  window.moveBedToWaiting = async (bedNo) => {
    bedNo = Number(bedNo);
    const bed = getBedData(bedNo);
    if (!bed?.patientKey) {
      showToast('대기로 보낼 환자가 없습니다');
      return false;
    }

    clearLocalTimerAlertsForBed(bedNo);
    const queueTimestamp = Date.now();
    const patientPatch = {
      ...bed,
      bedStatus: 'waiting',
      bedNo: null,
      timestamp: queueTimestamp,
      timeStr: new Date(queueTimestamp).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }),
      date: new Date(queueTimestamp).toLocaleDateString('ko-KR')
    };
    delete patientPatch.currentIndex;
    delete patientPatch.total;
    delete patientPatch.remaining;
    delete patientPatch.running;
    delete patientPatch.startedAt;
    delete patientPatch.complete;
    delete patientPatch.lastAlertId;
    delete patientPatch.lastAlertMessage;
    delete patientPatch.doctorProcedureAlert;
    delete patientPatch.patientKey;

    try {
      await Promise.all([
        update(ref(db, `${PATIENTS_PATH}/${bed.patientKey}`), patientPatch),
        remove(ref(db, `${BEDS_PATH}/${bedNo}`))
      ]);
      patientsByKey.set(bed.patientKey, {
        ...(patientsByKey.get(bed.patientKey) || {}),
        ...patientPatch
      });
      showToast(`${bed.name || '환자'} 대기로 이동`);
      return true;
    } catch (e) {
      console.error(e);
      showToast('대기로 이동 실패');
      return false;
    }
  };

  window.handleInputBedClick = async (bedNo) => {
    if (Date.now() < suppressBedClickUntil) return;
    if (window.currentMode === 'notify') return;
    const scope = (window.currentMode === 'receive' || window.currentMode === 'doctor') ? 'receive' : 'desk';
    const bed = getBedData(bedNo);

    if (!bed) {
      showToast('현재 베드가 비어 있습니다');
      return;
    }

    // 이미 같은 베드가 열려있으면 닫기
    const panel = scope === 'receive' ? document.getElementById('receivePanel') : document.getElementById('inputPanel');
    const isOpen = scope === 'receive'
      ? panel?.classList.contains('receive-form-open')
      : panel?.classList.contains('input-form-open');
    if (isOpen && formEditBedNoByScope[scope] === bedNo) {
      if (scope === 'receive') {
        panel?.classList.remove('receive-edit-open');
        setReceiveFormOpen(false);
        setFormEditMode(scope, null);
      } else {
        setInputFormOpen(false);
        setFormEditMode(scope, null);
      }
      return;
    }

    setFormEditMode(scope, bedNo);
    populatePatientForm(scope, bed);
    if (scope === 'receive') {
      document.getElementById('receivePanel')?.classList.add('receive-edit-open');
      setReceiveFormOpen(true);
    } else {
      setInputFormOpen(true);
    }
    showToast(`${getBedLabel(bedNo)} 정보 불러옴`);
  };

  window.handleBedDragStart = (event, bedNo) => {
    // 치료 칩 드래그가 버블링됐다면 베드 드래그 무시
    if (event.dataTransfer.getData('text/plain')?.startsWith?.('treat:')) return;
    const target = event.target;
    if (target?.classList?.contains('bed-treatment-chip')) {
      event.preventDefault();
      return;
    }
    const bed = getBedData(bedNo);
    if (!bed) {
      event.preventDefault();
      return;
    }
    draggedBedNo = bedNo;
    selectedMoveBedNo = bedNo;
    event.currentTarget?.classList.add('move-source');
    event.dataTransfer.effectAllowed = 'move';
    event.dataTransfer.setData('text/plain', String(bedNo));
  };

  window.handleBedDragOver = (event, bedNo) => {
    if (draggedWaitingPatientKey) {
      const n = Number(bedNo);
      const isDocBed = n >= 101;
      if (!isDocBed && !ACTIVE_BED_NUMBERS.includes(n)) return;
      if (isDocBed && !getDoctorBedNumbers().includes(n)) return;
      event.preventDefault();
      event.dataTransfer.dropEffect = 'move';
      return;
    }
    if (!draggedBedNo || draggedBedNo === bedNo) return;
    event.preventDefault();
    event.dataTransfer.dropEffect = 'move';
  };

  window.handleBedDrop = async (event, bedNo) => {
    event.preventDefault();
    event.stopPropagation();
    const waitingKey = draggedWaitingPatientKey || String(event.dataTransfer.getData('text/plain') || '').replace(/^waiting:/, '');
    if (draggedWaitingPatientKey || waitingKey.startsWith('-')) {
      draggedWaitingPatientKey = null;
      draggedBedNo = null;
      selectedMoveBedNo = null;
      suppressBedClickUntil = Date.now() + 350;
      await assignWaitingPatientToSpecificBed(waitingKey, bedNo);
      renderWaitingLists();
      renderBedMonitors();
      return;
    }

    const fromBedNo = draggedBedNo || Number(event.dataTransfer.getData('text/plain'));
    draggedBedNo = null;
    selectedMoveBedNo = null;
    suppressBedClickUntil = Date.now() + 350;
    if (fromBedNo && fromBedNo !== bedNo) {
      await moveOrSwapBed(fromBedNo, bedNo);
    }
    renderBedMonitors();
  };

  window.handleBedDragEnd = () => {
    draggedBedNo = null;
    selectedMoveBedNo = null;
    suppressBedClickUntil = Date.now() + 250;
    renderBedMonitors();
  };

  // ── 치료 칩 드래그 앤 드롭 ──────────────────────────────────────────
  window.handleTreatChipDragStart = (event, bedNo, fromIndex) => {
    // 베드 드래그가 시작되지 않도록 버블링 차단
    event.stopPropagation();
    draggedTreatment = { bedNo, fromIndex };
    draggedBedNo = null; // 베드 드래그 상태 명시적 초기화
