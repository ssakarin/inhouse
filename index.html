  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[ch]));
  }

  function escapeHtmlJsString(value) {
    return JSON.stringify(String(value ?? '')).replace(/[&<>"]/g, ch => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;'
    }[ch]));
  }

  function normalizeChartNo(value) {
    const text = String(value ?? '').trim();
    if (!/^\d+$/.test(text)) return text;
    return text.replace(/^0+(?=\d)/, '');
  }

  function normalizePatientIdentity(value) {
    return String(value ?? '').trim().toLowerCase();
  }

  function isSameRealtimePatientIdentity(source = {}, target = {}) {
    const sourcePatientId = normalizePatientIdentity(source.patientId);
    const targetPatientId = normalizePatientIdentity(target.patientId);
    if (sourcePatientId && targetPatientId) return sourcePatientId === targetPatientId;

    const sourceChartNo = normalizeChartNo(source.chartNo);
    const targetChartNo = normalizeChartNo(target.chartNo);
    if (!sourceChartNo || !targetChartNo || sourceChartNo !== targetChartNo) return false;

    const sourceName = normalizePatientIdentity(source.name);
    const targetName = normalizePatientIdentity(target.name);
    return Boolean(sourceName && targetName && sourceName === targetName);
  }

  function findRealtimeRegisteredPatient(target = {}) {
    if (!normalizePatientIdentity(target.patientId) && !(normalizeChartNo(target.chartNo) && normalizePatientIdentity(target.name))) {
      return null;
    }

    for (const { bed, bedNo } of getAllBedEntries()) {
      if (isSameRealtimePatientIdentity(bed, target)) {
        return { ...bed, location: getBedLabel(bedNo) };
      }
    }

    for (const patient of patientsByKey.values()) {
      if (isSameRealtimePatientIdentity(patient, target)) {
        return { ...patient, location: '대기' };
      }
    }

    return null;
  }

  function getTreatmentSeconds(treatment) {
    if (!treatment) return 0;
    return (Number(treatmentMinutes[treatment] || DEFAULT_TREATMENT_MINUTES[treatment] || 5)) * 60;
  }

  function getProcedureSeconds() {
    return Math.max(0, Number(procedureMinutes || 0)) * 60;
  }

  // 그룹 안에서만 서로 동시치료로 묶인다(다른 그룹과는 안 묶임).
  const SIMULTANEOUS_TREATMENTS_1 = new Set(['핫팩']);
  const SIMULTANEOUS_TREATMENTS_2 = new Set(['침', '전침', '왕뜸', '전자뜸', '적외선']);
  const SIMULTANEOUS_TREATMENTS_3 = new Set(['단추', '복추', '벤치']);
  const SIMULTANEOUS_TREATMENT_GROUPS = [SIMULTANEOUS_TREATMENTS_1, SIMULTANEOUS_TREATMENTS_2, SIMULTANEOUS_TREATMENTS_3];
  const SIMULTANEOUS_TREATMENTS = new Set([...SIMULTANEOUS_TREATMENTS_1, ...SIMULTANEOUS_TREATMENTS_2, ...SIMULTANEOUS_TREATMENTS_3]);

  function isSimultaneousTreatment(treatment) {
    return SIMULTANEOUS_TREATMENTS.has(String(treatment || '').trim());
  }

  function getSimultaneousGroup(treatment) {
    const name = String(treatment || '').trim();
    return SIMULTANEOUS_TREATMENT_GROUPS.find(group => group.has(name)) || null;
  }

  function isNeedleMoxaPair(first, second) {
    const a = String(first || '').trim();
    const b = String(second || '').trim();
    const isNeedle = value => value === '침';
    const isMoxa = value => value === '왕뜸' || value === '전자뜸';
    return (isNeedle(a) && isMoxa(b)) || (isMoxa(a) && isNeedle(b));
  }

  function isNeedleInfraredPair(first, second) {
    const a = String(first || '').trim();
    const b = String(second || '').trim();
    return (a === '침' || a === '전침') && b === '적외선';
  }

  function shouldCompleteFollowingTreatmentTogether(first, second) {
    const groupA = getSimultaneousGroup(first);
    const groupB = getSimultaneousGroup(second);
    return Boolean(groupA && groupA === groupB);
  }

  function getConcurrentTreatmentEndIndex(treatments = [], currentIndex = 0) {
    if (!isSimultaneousTreatment(treatments[currentIndex])) return currentIndex;
    let endIndex = currentIndex;
    while (endIndex + 1 < treatments.length && shouldCompleteFollowingTreatmentTogether(treatments[endIndex], treatments[endIndex + 1])) {
      endIndex += 1;
    }
    return endIndex;
  }

  function getConcurrentTreatmentStartIndex(treatments = [], currentIndex = 0) {
    if (!isSimultaneousTreatment(treatments[currentIndex])) return currentIndex;
    let startIndex = currentIndex;
    while (startIndex > 0 && shouldCompleteFollowingTreatmentTogether(treatments[startIndex - 1], treatments[startIndex])) {
      startIndex -= 1;
    }
    return startIndex;
  }

  function getConcurrentTreatmentNamesAroundIndex(treatments = [], currentIndex = 0) {
    if (!treatments[currentIndex]) return [];
    const startIndex = getConcurrentTreatmentStartIndex(treatments, currentIndex);
    const endIndex = getConcurrentTreatmentEndIndex(treatments, startIndex);
    return treatments.slice(startIndex, endIndex + 1).filter(Boolean);
  }

  function shouldBlinkTreatmentChip(treatments = [], currentIndex = 0, index = 0, running = false) {
    if (!running) return false;
    return index >= currentIndex && index <= getConcurrentTreatmentEndIndex(treatments, currentIndex);
  }

  function getConcurrentTreatmentNames(treatments = [], currentIndex = 0) {
    if (!treatments[currentIndex]) return [];
    const endIndex = getConcurrentTreatmentEndIndex(treatments, currentIndex);
    return treatments.slice(currentIndex, endIndex + 1).filter(Boolean);
  }

  function formatTreatmentNames(treatments = []) {
    return treatments.filter(Boolean).join(', ');
  }

  function getConcurrentTimerTreatment(treatments = [], currentIndex = 0) {
    const names = getConcurrentTreatmentNames(treatments, currentIndex);
    return names.find(name => !isNoTimerTreatment(name)) || names[0] || '';
  }

  function getConcurrentTreatmentSeconds(treatments = [], currentIndex = 0) {
    const timerTreatment = getConcurrentTimerTreatment(treatments, currentIndex);
    return timerTreatment ? getTreatmentSeconds(timerTreatment) : 0;
  }

  function arraysEqualShallow(a = [], b = []) {
    return a.length === b.length && a.every((value, index) => value === b[index]);
  }

  function findMatchingTreatmentGroupIndex(previousTreatments = [], nextTreatments = [], previousIndex = 0) {
    const group = getConcurrentTreatmentNames(previousTreatments, previousIndex);
    if (!group.length) return -1;
    const previousStart = getConcurrentTreatmentStartIndex(previousTreatments, previousIndex);
    let occurrence = 0;
    for (let index = 0; index <= previousStart && index < previousTreatments.length;) {
      const names = getConcurrentTreatmentNames(previousTreatments, index);
      if (arraysEqualShallow(names, group)) occurrence += 1;
      index = getConcurrentTreatmentEndIndex(previousTreatments, index) + 1;
    }

    let seen = 0;
    for (let index = 0; index < nextTreatments.length;) {
      const names = getConcurrentTreatmentNames(nextTreatments, index);
      if (arraysEqualShallow(names, group)) {
        seen += 1;
        if (seen === occurrence) return index;
      }
      index = getConcurrentTreatmentEndIndex(nextTreatments, index) + 1;
    }
    return -1;
  }

  function getConcurrentTreatmentGroupCount(treatments = [], startIndex = 0) {
    let count = 0;
    for (let index = Math.max(0, Number(startIndex || 0)); index < treatments.length;) {
      count += 1;
      index = getConcurrentTreatmentEndIndex(treatments, index) + 1;
    }
    return count;
  }

  function getFutureConcurrentTreatmentSeconds(treatments = [], startIndex = 0) {
    let seconds = 0;
    for (let index = Math.max(0, Number(startIndex || 0)); index < treatments.length;) {
      seconds += getConcurrentTreatmentSeconds(treatments, index);
      index = getConcurrentTreatmentEndIndex(treatments, index) + 1;
    }
    return seconds;
  }

  function isConcurrentTreatmentGroupPreCompleted(treatments = [], startIndex = 0, preCompletedIndexes = []) {
    const completedSet = new Set(normalizePreCompletedTreatmentIndexes(preCompletedIndexes, treatments));
    const endIndex = getConcurrentTreatmentEndIndex(treatments, startIndex);
    for (let index = startIndex; index <= endIndex; index += 1) {
      if (!completedSet.has(index)) return false;
    }
    return true;
  }

  function getFuturePendingTreatmentSeconds(treatments = [], startIndex = 0, preCompletedIndexes = []) {
    let seconds = 0;
    for (let index = Math.max(0, Number(startIndex || 0)); index < treatments.length;) {
      if (!isConcurrentTreatmentGroupPreCompleted(treatments, index, preCompletedIndexes)) {
        seconds += getConcurrentTreatmentSeconds(treatments, index);
      }
      index = getConcurrentTreatmentEndIndex(treatments, index) + 1;
    }
    return seconds;
  }

  function getPendingTreatmentGroupCount(treatments = [], startIndex = 0, preCompletedIndexes = []) {
    let count = 0;
    for (let index = Math.max(0, Number(startIndex || 0)); index < treatments.length;) {
      if (!isConcurrentTreatmentGroupPreCompleted(treatments, index, preCompletedIndexes)) count += 1;
      index = getConcurrentTreatmentEndIndex(treatments, index) + 1;
    }
    return count;
  }

  function normalizeAddedTreatmentIndexes(indexes = [], treatments = []) {
    const max = Array.isArray(treatments) ? treatments.length : 0;
    return [...new Set((Array.isArray(indexes) ? indexes : [])
      .map(index => Number(index))
      .filter(index => Number.isInteger(index) && index >= 0 && index < max))]
      .sort((a, b) => a - b);
  }

  function getAddedTreatmentIndexesAfterEdit(previousTreatments = [], nextTreatments = [], previousAddedIndexes = []) {
    const addedBefore = new Set(normalizeAddedTreatmentIndexes(previousAddedIndexes, previousTreatments));
    const previousQueues = new Map();
    previousTreatments.forEach((treatment, index) => {
      const key = String(treatment || '').trim();
      if (!key) return;
      if (!previousQueues.has(key)) previousQueues.set(key, []);
      previousQueues.get(key).push({ added: addedBefore.has(index) });
    });

    const nextAdded = [];
    nextTreatments.forEach((treatment, index) => {
      const key = String(treatment || '').trim();
      const queue = previousQueues.get(key);
      if (queue?.length) {
        if (queue.shift().added) nextAdded.push(index);
      } else if (key) {
        nextAdded.push(index);
      }
    });
    return nextAdded;
  }

  function getTreatmentDiffNames(previousTreatments = [], nextTreatments = [], direction = 'added') {
    const sourceTreatments = direction === 'removed' ? nextTreatments : previousTreatments;
    const targetTreatments = direction === 'removed' ? previousTreatments : nextTreatments;
    const sourceQueues = new Map();
    sourceTreatments.forEach(treatment => {
      const key = String(treatment || '').trim();
      if (!key) return;
      sourceQueues.set(key, (sourceQueues.get(key) || 0) + 1);
    });
    const names = [];
    targetTreatments.forEach(treatment => {
      const key = String(treatment || '').trim();
      if (!key) return;
      const count = sourceQueues.get(key) || 0;
      if (count > 0) sourceQueues.set(key, count - 1);
      else names.push(key);
    });
    return names;
  }

  function getRemovedTreatmentNames(previousTreatments = [], nextTreatments = []) {
    return getTreatmentDiffNames(previousTreatments, nextTreatments, 'removed');
  }

  function getNewlyAddedTreatmentIndexes(previousTreatments = [], nextTreatments = []) {
    const addedNames = getTreatmentDiffNames(previousTreatments, nextTreatments, 'added');
    return nextTreatments
      .map((treatment, index) => ({ treatment: String(treatment || '').trim(), index }))
      .filter(({ treatment }) => {
        const foundIndex = addedNames.indexOf(treatment);
        if (foundIndex < 0) return false;
        addedNames.splice(foundIndex, 1);
        return true;
      })
      .map(({ index }) => index);
  }

  function getTreatmentAlertKey(bedNo) {
    return `added-bed-${bedNo}`;
  }

  function normalizeTreatmentNameList(treatmentNames = []) {
    return (Array.isArray(treatmentNames) ? treatmentNames : [treatmentNames])
      .map(name => String(name || '').trim())
      .filter(Boolean);
  }

  function suppressAddedTreatmentAlertNames(bedNo, treatmentNames = []) {
    const names = normalizeTreatmentNameList(treatmentNames);
    if (!bedNo || !names.length) return;
    const key = getTreatmentAlertKey(bedNo);
    const current = suppressedAddedTreatmentAlertNames.get(key) || new Map();
    const expiresAt = Date.now() + ADDED_TREATMENT_ALERT_MS;
    names.forEach(name => current.set(name, expiresAt));
    suppressedAddedTreatmentAlertNames.set(key, current);
  }

  function clearSuppressedAddedTreatmentAlertNames(bedNo, treatmentNames = []) {
    const names = normalizeTreatmentNameList(treatmentNames);
    if (!bedNo || !names.length) return;
    const key = getTreatmentAlertKey(bedNo);
    const current = suppressedAddedTreatmentAlertNames.get(key);
    if (!current) return;
    names.forEach(name => current.delete(name));
    if (!current.size) suppressedAddedTreatmentAlertNames.delete(key);
  }

  function filterSuppressedAddedTreatmentAlertNames(bedNo, treatmentNames = []) {
    const names = normalizeTreatmentNameList(treatmentNames);
    const key = getTreatmentAlertKey(bedNo);
    const current = suppressedAddedTreatmentAlertNames.get(key);
    if (!current) return names;
    const now = Date.now();
    current.forEach((expiresAt, name) => {
      if (Number(expiresAt || 0) <= now) current.delete(name);
    });
    if (!current.size) {
      suppressedAddedTreatmentAlertNames.delete(key);
      return names;
    }
    return names.filter(name => !current.has(name));
  }

  function setTransientTreatmentAlertTimer(key) {
    if (transientAddedTreatmentAlertTimers.has(key)) {
      clearTimeout(transientAddedTreatmentAlertTimers.get(key));
      transientAddedTreatmentAlertTimers.delete(key);
    }
    const timer = setTimeout(() => {
      const index = transientAddedTreatmentAlerts.findIndex(item => item.key === key);
      if (index >= 0) transientAddedTreatmentAlerts.splice(index, 1);
      transientAddedTreatmentAlertTimers.delete(key);
      renderUpcomingAlerts();
    }, ADDED_TREATMENT_ALERT_MS);
    transientAddedTreatmentAlertTimers.set(key, timer);
  }

  function pushTransientAddedTreatmentAlert(bedNo, bed = {}, treatmentNames = []) {
    const names = normalizeTreatmentNameList(treatmentNames);
    if (!bedNo || !names.length) return;
    clearSuppressedAddedTreatmentAlertNames(bedNo, names);
    const key = getTreatmentAlertKey(bedNo);
    const existingIndex = transientAddedTreatmentAlerts.findIndex(item => item.key === key);
    const previous = existingIndex >= 0 ? transientAddedTreatmentAlerts.splice(existingIndex, 1)[0] : null;
    const mergedNames = [...(previous?.treatments || []), ...names]
      .map(name => String(name || '').trim())
      .filter(Boolean);
    const uniqueNames = [...new Set(mergedNames)];
    const alert = {
      key,
      bedNo,
      bedLabel: getBedLabel(bedNo),
      treatment: uniqueNames.join(', '),
      treatments: uniqueNames,
      nurseName: bed.nurseName || previous?.nurseName || '',
      timestamp: Date.now(),
      alertPriority: -1
    };
    transientAddedTreatmentAlerts.unshift(alert);
    while (transientAddedTreatmentAlerts.length > 8) {
      const removed = transientAddedTreatmentAlerts.pop();
      if (removed?.key) {
        clearTimeout(transientAddedTreatmentAlertTimers.get(removed.key));
        transientAddedTreatmentAlertTimers.delete(removed.key);
      }
    }
    setTransientTreatmentAlertTimer(key);
    renderUpcomingAlerts();
  }

  function removeNamesFromTransientAddedTreatmentAlert(bedNo, treatmentNames = []) {
    const removeSet = new Set((Array.isArray(treatmentNames) ? treatmentNames : [treatmentNames])
      .map(name => String(name || '').trim())
      .filter(Boolean));
    if (!bedNo || !removeSet.size) return [];
    const key = getTreatmentAlertKey(bedNo);
    const index = transientAddedTreatmentAlerts.findIndex(item => item.key === key);
    if (index < 0) return [];
    const item = transientAddedTreatmentAlerts[index];
    const consumed = [];
    const treatments = (item.treatments || []).filter(name => {
      if (!removeSet.has(name)) return true;
      consumed.push(name);
      return false;
    });
    if (!consumed.length) return [];
    suppressAddedTreatmentAlertNames(bedNo, consumed);
    if (!treatments.length) {
      transientAddedTreatmentAlerts.splice(index, 1);
      clearTimeout(transientAddedTreatmentAlertTimers.get(key));
      transientAddedTreatmentAlertTimers.delete(key);
    } else {
      item.treatments = treatments;
      item.treatment = treatments.join(', ');
      item.timestamp = Date.now();
      setTransientTreatmentAlertTimer(key);
    }
    renderUpcomingAlerts();
    return consumed;
  }

  function removeNamesFromAddedTreatmentAlertPayload(alert = {}, treatmentNames = []) {
    const removeSet = new Set((Array.isArray(treatmentNames) ? treatmentNames : [treatmentNames])
      .map(name => String(name || '').trim())
      .filter(Boolean));
    if (!alert?.id || !Array.isArray(alert.treatments) || !removeSet.size) return { alert, consumed: [] };
    if (Date.now() - Number(alert.timestamp || 0) > ADDED_TREATMENT_ALERT_MS) return { alert, consumed: [] };
    const consumed = [];
    const treatments = alert.treatments
      .map(name => String(name || '').trim())
      .filter(name => {
        if (!removeSet.has(name)) return true;
        consumed.push(name);
        return false;
      });
    if (!consumed.length) return { alert, consumed: [] };
    if (!treatments.length) return { alert: null, consumed };
    return {
      alert: {
        ...alert,
        treatment: treatments.join(', '),
        treatments,
        timestamp: Date.now()
      },
      consumed
    };
  }

  function createAddedTreatmentAlertPayload(bedNo, bed = {}, treatmentNames = []) {
    const names = normalizeTreatmentNameList(treatmentNames);
    if (!bedNo || !names.length) return null;
    clearSuppressedAddedTreatmentAlertNames(bedNo, names);
    const previous = bed?.addedTreatmentAlert || {};
    const previousFresh = Date.now() - Number(previous.timestamp || 0) <= ADDED_TREATMENT_ALERT_MS;
    const mergedNames = [
      ...(previousFresh && Array.isArray(previous.treatments) ? previous.treatments : []),
      ...names
    ].map(name => String(name || '').trim()).filter(Boolean);
    const uniqueNames = [...new Set(mergedNames)];
    const timestamp = Date.now();
    return {
      id: getTreatmentAlertKey(bedNo),
      bedNo,
      bedLabel: getBedLabel(bedNo),
      treatment: uniqueNames.join(', '),
      treatments: uniqueNames,
      nurseName: bed.nurseName || previous.nurseName || '',
      timestamp
    };
  }

  function getVisibleAddedTreatmentAlertItems() {
    const now = Date.now();
    const sharedItems = getAllBedEntries()
      .map(({ bed, bedNo }) => ({ ...(bed?.addedTreatmentAlert || {}), bedNo }))
      .filter(item => item.id && Array.isArray(item.treatments) && item.treatments.length)
      .filter(item => now - Number(item.timestamp || 0) <= ADDED_TREATMENT_ALERT_MS)
      .map(item => ({
        key: item.id,
        bedNo: item.bedNo,
        bedLabel: item.bedLabel || getBedLabel(item.bedNo),
        treatments: filterSuppressedAddedTreatmentAlertNames(item.bedNo, item.treatments),
        nurseName: item.nurseName || '',
        timestamp: Number(item.timestamp || 0),
        alertPriority: -1
      }))
      .filter(item => item.treatments.length)
      .map(item => ({
        ...item,
        treatment: item.treatments.join(', ')
      }));
    const merged = [...transientAddedTreatmentAlerts, ...sharedItems]
      .sort((a, b) => Number(b.timestamp || 0) - Number(a.timestamp || 0));
    const seen = new Set();
    return merged.filter(item => {
      const key = getTreatmentAlertKey(item.bedNo);
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  }

  function swapAddedTreatmentIndexes(indexes = [], firstIndex, secondIndex, treatments = []) {
    return normalizeAddedTreatmentIndexes(indexes, treatments).map(index => {
      if (index === firstIndex) return secondIndex;
      if (index === secondIndex) return firstIndex;
      return index;
    }).sort((a, b) => a - b);
  }

  function moveAddedTreatmentIndexes(indexes = [], fromIndex, toIndex, treatments = []) {
    const movedSet = new Set(normalizeAddedTreatmentIndexes(indexes, treatments));
    const next = [];
    movedSet.forEach(index => {
      if (index === fromIndex) {
        next.push(toIndex);
      } else if (fromIndex < toIndex && index > fromIndex && index <= toIndex) {
        next.push(index - 1);
      } else if (fromIndex > toIndex && index >= toIndex && index < fromIndex) {
        next.push(index + 1);
      } else {
        next.push(index);
      }
    });
    return normalizeAddedTreatmentIndexes(next, treatments);
  }

  function moveAddedTreatmentRangeIndexes(indexes = [], fromStart, fromEnd, toIndex, previousTreatments = [], nextTreatments = []) {
    const rangeLength = Math.max(0, Number(fromEnd) - Number(fromStart) + 1);
    if (!rangeLength) return normalizeAddedTreatmentIndexes(indexes, nextTreatments);
    return normalizeAddedTreatmentIndexes(indexes, previousTreatments).map(index => {
      if (index >= fromStart && index <= fromEnd) return toIndex + (index - fromStart);
      if (toIndex < fromStart && index >= toIndex && index < fromStart) return index + rangeLength;
      if (toIndex > fromEnd && index > fromEnd && index < toIndex) return index - rangeLength;
      return index;
    }).sort((a, b) => a - b).filter(index => index >= 0 && index < nextTreatments.length);
  }

  function removeAddedTreatmentIndex(indexes = [], removedIndex, treatments = []) {
    const next = normalizeAddedTreatmentIndexes(indexes, treatments)
      .filter(index => index !== removedIndex)
      .map(index => index > removedIndex ? index - 1 : index);
    return normalizeAddedTreatmentIndexes(next, treatments);
  }

  function normalizePreCompletedTreatmentIndexes(indexes = [], treatments = []) {
    const max = Array.isArray(treatments) ? treatments.length : 0;
    return [...new Set((Array.isArray(indexes) ? indexes : [])
      .map(index => Number(index))
      .filter(index => Number.isInteger(index) && index >= 0 && index < max))]
      .sort((a, b) => a - b);
  }

  function getPreCompletedTreatmentIndexSet(bed = {}, treatments = []) {
    return new Set(normalizePreCompletedTreatmentIndexes(bed.preCompletedTreatmentIndexes, treatments));
  }

  function getNextPendingTreatmentIndex(treatments = [], startIndex = 0, preCompletedIndexes = []) {
    const completedSet = new Set(normalizePreCompletedTreatmentIndexes(preCompletedIndexes, treatments));
    for (let index = Math.max(0, Number(startIndex || 0)); index < treatments.length;) {
      const groupEndIndex = getConcurrentTreatmentEndIndex(treatments, index);
      let allCompleted = true;
      for (let groupIndex = index; groupIndex <= groupEndIndex; groupIndex += 1) {
        if (!completedSet.has(groupIndex)) {
          allCompleted = false;
          break;
        }
      }
      if (!allCompleted) return index;
      index = groupEndIndex + 1;
    }
    return -1;
  }

  function getPreCompletedIndexesAfterEdit(previousTreatments = [], nextTreatments = [], previousCompletedIndexes = []) {
    const completedBefore = new Set(normalizePreCompletedTreatmentIndexes(previousCompletedIndexes, previousTreatments));
    const previousQueues = new Map();
    previousTreatments.forEach((treatment, index) => {
      const key = String(treatment || '').trim();
      if (!key) return;
      if (!previousQueues.has(key)) previousQueues.set(key, []);
      previousQueues.get(key).push({ completed: completedBefore.has(index) });
    });

    const nextCompleted = [];
    nextTreatments.forEach((treatment, index) => {
      const key = String(treatment || '').trim();
      const queue = previousQueues.get(key);
      if (queue?.length && queue.shift().completed) nextCompleted.push(index);
    });
    return nextCompleted;
  }

  function removePreCompletedTreatmentIndex(indexes = [], removedIndex, treatments = []) {
    const next = normalizePreCompletedTreatmentIndexes(indexes, treatments)
      .filter(index => index !== removedIndex)
      .map(index => index > removedIndex ? index - 1 : index);
    return normalizePreCompletedTreatmentIndexes(next, treatments);
  }

  function getPreferredBedOrder(gender) {
    const primary = gender === '여' ? FEMALE_PRIMARY_BED_NUMBERS : MALE_PRIMARY_BED_NUMBERS;
    const fallback = gender === '여' ? MALE_PRIMARY_BED_NUMBERS : FEMALE_PRIMARY_BED_NUMBERS;
    return [...primary, ...fallback]
      .filter((bedNo, index, rows) =>
        REGULAR_BED_NUMBERS.includes(bedNo) && !AUTO_ASSIGN_EXCLUDED_BED_NUMBERS.has(bedNo) && rows.indexOf(bedNo) === index
      );
  }

  function getActiveRoundRobinNurses() {
    return getSortedStaff('nurses').filter(([, nurse]) => !nurse?.vacation);
  }

  function getCurrentNurseBedCounts() {
    const counts = {};
    getAllBedEntries().forEach(({ bed }) => {
      const nurseId = String(bed?.nurseId || '');
      if (!nurseId) return;
      counts[nurseId] = (counts[nurseId] || 0) + 1;
    });
    return counts;
  }

  function getRoundRobinStartOffset(state = {}, nurses = [], dateKey = getTodayKey()) {
    const configuredStartId = '';
    const configuredStartOffset = Math.max(0, nurses.findIndex(([id]) => id === configuredStartId));
    const sameStartSetting = String(state.startId || '') === configuredStartId;
    const previousDate = String(state.lastDate || '');
    const sameDate = previousDate === dateKey;
    const previousStartOffset = Math.max(0, Number(state.startOffset || 0)) % nurses.length;
    return sameStartSetting
      ? (sameDate ? previousStartOffset : (previousDate ? (previousStartOffset + 1) % nurses.length : configuredStartOffset))
      : configuredStartOffset;
  }

  async function getNextFairNurse() {
    const nurses = getActiveRoundRobinNurses();
    if (!nurses.length) return null;

    const dateKey = getTodayKey();
    let state;
    try {
      const current = await localStateGet('settings/nurseRoundRobinState');
      const baseState = current && typeof current === 'object' ? current : {};
      const configuredStartId = '';
      const startOffset = getRoundRobinStartOffset(baseState, nurses, dateKey);
      const sameDate = String(baseState.lastDate || '') === dateKey && String(baseState.startId || '') === configuredStartId;
      const todayAssignments = sameDate && baseState.todayAssignments && typeof baseState.todayAssignments === 'object'
        ? { ...baseState.todayAssignments }
        : {};
      const currentBedCounts = getCurrentNurseBedCounts();
      const ordered = nurses.map(([id, nurse], index) => {
        const rrRank = (index - startOffset + nurses.length) % nurses.length;
        const todayCount = Number(todayAssignments[id] || 0);
        const currentCount = Number(currentBedCounts[id] || 0);
        return {
          id,
          name: nurse?.name || '',
          todayCount,
          currentCount,
          score: todayCount + (currentCount * 2),
          rrRank
        };
      }).sort((a, b) =>
        a.score - b.score ||
        a.todayCount - b.todayCount ||
        a.currentCount - b.currentCount ||
        a.rrRank - b.rrRank
      );
      const picked = ordered[0];
      if (!picked) return null;
      todayAssignments[picked.id] = Number(todayAssignments[picked.id] || 0) + 1;
      const count = Object.values(todayAssignments).reduce((sum, value) => sum + Number(value || 0), 0);
      state = {
        ...baseState,
        startId: configuredStartId,
        lastDate: dateKey,
        startOffset,
        count,
        todayAssignments,
        updatedAt: Date.now()
      };
      await localStatePut('settings/nurseRoundRobinState', state);
      return { id: picked.id, name: picked.name };
    } catch (e) {
      console.error('간호사 공정배정 순번 저장 실패', e);
      return null;
    }
  }

  async function recordManualNurseAssignment(newNurseId, previousNurseId) {
    newNurseId = String(newNurseId || '');
    previousNurseId = String(previousNurseId || '');
    if (newNurseId === previousNurseId) return;
    try {
      const dateKey = getTodayKey();
      const current = await localStateGet('settings/nurseRoundRobinState');
      const baseState = current && typeof current === 'object' ? current : {};
      const sameDate = String(baseState.lastDate || '') === dateKey;
      const todayAssignments = sameDate && baseState.todayAssignments && typeof baseState.todayAssignments === 'object'
        ? { ...baseState.todayAssignments }
        : {};
      if (previousNurseId) {
        todayAssignments[previousNurseId] = Math.max(0, Number(todayAssignments[previousNurseId] || 0) - 1);
      }
      if (newNurseId) {
        todayAssignments[newNurseId] = Number(todayAssignments[newNurseId] || 0) + 1;
      }
      const count = Object.values(todayAssignments).reduce((sum, value) => sum + Number(value || 0), 0);
      await localStatePut('settings/nurseRoundRobinState', {
        ...baseState,
        lastDate: dateKey,
        count,
        todayAssignments,
        updatedAt: Date.now()
      });
    } catch (e) {
      console.error('간호사 수동배정 공정배정 카운터 갱신 실패', e);
    }
  }

  async function applyRoundRobinNurse(patientKey, data, bedNo) {
    if (!nurseAutoAssignEnabled || Number(bedNo) >= 101 || Number(bedNo) === 15) {
      const assignedData = { ...data, nurseId: '', nurseName: '' };
      await updateBedRecord(bedNo, {
        nurseId: '',
        nurseName: ''
      });
      return assignedData;
    }
    const nurse = await getNextFairNurse();
    const assignedData = nurse
      ? { ...data, nurseId: nurse.id, nurseName: nurse.name }
      : { ...data, nurseId: '', nurseName: '' };
    await updateBedRecord(bedNo, {
      nurseId: assignedData.nurseId || '',
      nurseName: assignedData.nurseName || ''
    });
    return assignedData;
  }

  function createBedAssignment(patientKey, data, bedNo = null) {
    const treatments = (data.treatments && data.treatments.length)
      ? data.treatments
      : (Number(bedNo) >= 101 ? ['진찰'] : (data.treatments || []));
    const firstTreatment = treatments[0];
    const total = firstTreatment ? getConcurrentTreatmentSeconds(treatments, 0) : 0;
    return {
      patientKey,
      name: data.name,
      treatments,
      addedTreatmentIndexes: [],
      preCompletedTreatmentIndexes: [],
      timeStr: data.timeStr || '',
      timestamp: data.timestamp || Date.now(),
      patientId: data.patientId || '',
      insuranceType: data.insuranceType || '',
      chartNo: normalizeChartNo(data.chartNo),
      visitType: data.visitType || '',
      chiefComplaint: data.chiefComplaint || '',
      memo1: data.memo1 || '',
      memo2: data.memo2 || '',
      memo2History: normalizeMemo2History(data),
      memo1Original: data.memo1 || '',
      memo2Original: data.memo2 || '',
      age: data.age || '',
      gender: data.gender || '',
      doctorId: data.doctorId || '',
      doctorName: data.doctorName || '',
      nurseId: '',
      nurseName: '',
      lastVisitDate: data.lastVisitDate || '',
      bodyParts: data.bodyParts || { front: [], back: [] },
      currentIndex: 0,
      total,
      remaining: total,
      running: false,
      startedAt: null,
      complete: false,
      doctorProcedureAlert: null
    };
  }

  function getDoctorBedNoForPatient(doctorId) {
    if (!doctorId) return null;
    const doctor = staffByType.doctors.get(doctorId);
    if (!doctor || isDoctorUnavailable(doctor)) return null;
    const doctors = getSortedStaff('doctors');
    const index = doctors.findIndex(([key]) => key === doctorId);
    return index >= 0 ? 101 + index : null;
  }

  // 치료가 끝나고 다음 치료로 넘어갈 때, "직후 치료"(바로 다음에 할 치료, 동시그룹 포함)가
  // 특정 조합이면 전용 베드로 자동 이동한다. 스파인이 치료목록 뒤쪽에 있다고 미리 옮기지 않고,
  // 정확히 그 단계에 도달했을 때만 본다.
  // - 직후 치료가 단추/복추 단독(벤치 없이) → 담당 원장의 원장실로 이동
  // - 직후 치료가 단추+벤치 / 복추+벤치 조합, 또는 스파인 단독 → 스파인실(15번)로 이동
  async function maybeAutoMoveBedForNextTreatment(bedNo, nextBed) {
    bedNo = Number(bedNo);
    if (!nextBed || nextBed.complete || bedNo === 15) return;
    const routingBeds = await getBedsSnapshotForRouting();
    const treatments = nextBed.treatments || [];
    const idx = Number(nextBed.currentIndex || 0);
    // 단추/복추/벤치는 SIMULTANEOUS_TREATMENTS_3로 묶여 있으므로 동시치료 엔진이 정확한
    // "직후 치료" 묶음(예: 단추+벤치)만 반환한다 — 뒤쪽에 따로 있는 스파인 등은 섞이지 않는다.
    const names = getConcurrentTreatmentNames(treatments, idx).map(name => String(name || '').trim());
    const has = (name) => names.includes(name);
    const hasBench = has('벤치');
    const hasSpine = has('스파인');
    const hasChunaTreatment = has('복추') || has('단추');
    const hasDoctorRoomTreatment = hasChunaTreatment || has('SW');
    const hasPharmacopuncture4 = has('약침4');

    if (hasSpine || (hasChunaTreatment && hasBench)) {
      if (!getBedDataForRouting(15, routingBeds)) {
        await window.moveOrSwapBed(bedNo, 15);
      } else {
        await moveToHoldBed(bedNo, 15, routingBeds);
      }
      return;
    }

    if (hasPharmacopuncture4) {
      const targetBedNo = 101;
      if (bedNo === targetBedNo) return;
      if (!getBedDataForRouting(targetBedNo, routingBeds)) {
        await window.moveOrSwapBed(bedNo, targetBedNo);
      } else {
        await moveToHoldBed(bedNo, targetBedNo, routingBeds);
      }
      return;
    }

    if (bedNo >= 101) return; // 이미 원장실에 있고 추나 단독이면 그대로 유지
    if (hasDoctorRoomTreatment && !hasBench) {
      const docBedNo = getDoctorBedNoForPatient(nextBed.doctorId);
      if (docBedNo) {
        if (!getBedDataForRouting(docBedNo, routingBeds)) {
          await window.moveOrSwapBed(bedNo, docBedNo);
        } else {
          await moveToHoldBed(bedNo, docBedNo, routingBeds);
        }
      }
    }
  }

  // 목적지(원장실/스파인실)가 차있어서 못 옮기는 경우, 빈 임시 베드에 잠시 보관해둔다.
  async function moveToHoldBed(bedNo, pendingTargetBedNo, bedsSnapshot = null) {
    const holdBedNo = findEmptyHoldBedNoForRouting(bedsSnapshot);
    if (!holdBedNo) return; // 임시 베드도 다 찼으면 그냥 현재 자리에 둔다
    const moved = await window.moveOrSwapBed(bedNo, holdBedNo);
    if (moved) await updateBedRecord(holdBedNo, { pendingTargetBedNo, holdQueuedAt: Date.now() });
  }

  async function assignWaitingPatientToHoldBed(patientKey, data, pendingTargetBedNo) {
    const holdBedNo = findEmptyHoldBedNo();
    if (!holdBedNo) {
      showToast('대기 큐가 가득 찼습니다');
      return false;
    }

    const queuedAt = Date.now();
    const assignment = {
      ...createBedAssignment(patientKey, data, pendingTargetBedNo),
      pendingTargetBedNo: Number(pendingTargetBedNo),
      holdQueuedAt: queuedAt,
      timestamp: queuedAt
    };

    const result = await runBedsRecordTransaction((beds) => {
      beds = beds || {};
      const existingBedNo = Object.keys(beds).find(no => beds[no]?.patientKey === patientKey);
      if (existingBedNo || beds[String(holdBedNo)]) return beds;
      beds[String(holdBedNo)] = assignment;
      return beds;
    });

    const beds = result.snapshot.val() || {};
    if (!result.committed || beds[String(holdBedNo)]?.patientKey !== patientKey) return false;

    patientsByKey.set(patientKey, { ...data, bedStatus: 'assigned', bedNo: holdBedNo });
    await updatePatient(patientKey, {
      bedStatus: 'assigned',
      bedNo: holdBedNo
    });
    return holdBedNo;
  }

  // 베드 상태가 바뀔 때마다(applyBedsState) 호출 — 임시 베드에 있는 환자 중
  // 목표 원장실/스파인실이 비어 있으면 그쪽으로 옮긴다. 같은 목적지를 기다리는 환자가
  // 여럿이면 먼저 들어온(timestamp가 빠른) 환자부터 처리한다.
  let isProcessingHoldBedReleases = false;
  async function processHoldBedReleases() {
    if (isProcessingHoldBedReleases) return;
    isProcessingHoldBedReleases = true;
    try {
      for (const { bedNo, bed } of getHoldBedEntries()) {
        const targetBedNo = Number(bed?.pendingTargetBedNo);
        if (!targetBedNo) continue;
        if (getBedData(targetBedNo)) continue;
        const moved = await window.moveOrSwapBed(bedNo, targetBedNo, { silent: true });
        if (moved) await updateBedRecord(targetBedNo, { pendingTargetBedNo: null });
      }
    } finally {
      isProcessingHoldBedReleases = false;
    }
  }

  // 베드가 비워지거나 다른 환자로 바뀌면 배정 알림을 정리한다.
  // 단, 치료 시작 전 다른 일반 베드로 이동한 경우에는 알림도 환자를 따라 이동한다.
  function pruneStaleBedAssignmentAlerts() {
    [...bedAssignmentAlertItems.entries()].forEach(([key, data]) => {
      const bedNo = Number(data?.bedNo);
      const patientKey = String(data?.patientKey || '');
      const bed = getBedData(bedNo);
      const stillAssigned = Boolean(patientKey) && bed && String(bed.patientKey || '') === patientKey;
      if (stillAssigned) return;

      const movedEntry = getAllBedEntries()
        .find(entry => String(entry.bed?.patientKey || '') === patientKey);
      if (movedEntry?.bed && Number(movedEntry.bedNo) < 101 && !hasBedTreatmentStarted(movedEntry.bed)) {
        const patch = {
          bedNo: Number(movedEntry.bedNo),
          bedLabel: getBedLabel(movedEntry.bedNo),
          patientName: movedEntry.bed.name || data.patientName || '',
          doctorId: movedEntry.bed.doctorId || data.doctorId || '',
          doctorName: movedEntry.bed.doctorName || data.doctorName || '',
          nurseId: movedEntry.bed.nurseId || data.nurseId || '',
          nurseName: movedEntry.bed.nurseName || data.nurseName || '',
          message: `${getBedLabel(movedEntry.bedNo)} ${movedEntry.bed.name || data.patientName || '환자'} 배정`
        };
        if (bedNo) {
          delete fixedBedArrivalAcknowledgedByBed[bedNo];
          delete fixedBedArrivalShownByBed[bedNo];
        }
        delete fixedBedArrivalAcknowledgedByBed[Number(movedEntry.bedNo)];
        delete fixedBedArrivalShownByBed[Number(movedEntry.bedNo)];
        bedAssignmentAlertItems.set(key, { ...(data || {}), ...patch });
        renderUpcomingAlerts();
        renderBedMonitors();
        syncFixedBedArrivalOverlay();
        updateLocalNodeChild(BED_ASSIGNMENT_ALERTS_PATH, key, patch)
          .catch((e) => console.error('배정 알림 이동 실패', e));
        return;
      }

      bedAssignmentAlertItems.delete(key);
      removeBedAssignmentAlert(key).catch((e) => console.error('배정 알림 정리 실패', e));
    });
  }

  async function createBedAssignmentAlert(patientKey, data, bedNo) {
    if (!patientKey || !bedNo) return;
    if (Number(bedNo) >= 101) return;
    const name = data.name || '환자';
    try {
      await pushBedAssignmentAlert({
        patientKey,
        bedNo: Number(bedNo),
        bedLabel: getBedLabel(bedNo),
        patientName: name,
        doctorId: data.doctorId || '',
        doctorName: data.doctorName || '',
        nurseId: data.nurseId || '',
        nurseName: data.nurseName || '',
        message: `${getBedLabel(bedNo)} ${name} 배정`,
        timestamp: Date.now()
      });
    } catch (e) {
      console.error('베드 배정 알림 저장 실패', e);
    }
  }

  async function assignPatientToBed(patientKey, data, silent = false, force = false) {
    if (!force && !autoBedAssignEnabled) return false;
    if (data.bedStatus === 'discharged') return false;

    // 초진: 담당 원장 베드로만 배정
    if (data.visitType === '초진') {
      const docBedNo = getDoctorBedNoForPatient(data.doctorId);
      if (!docBedNo) return false;

      let placed = false;
      const result = await runBedsRecordTransaction((beds) => {
        beds = beds || {};
        const existing = Object.keys(beds).find(no => beds[no]?.patientKey === patientKey);
        if (existing || beds[String(docBedNo)]) return undefined;
        beds[String(docBedNo)] = createBedAssignment(patientKey, data, docBedNo);
        placed = true;
        return beds;
      });
      if (!placed || !result.committed) return false;

      const beds = result.snapshot.val() || {};
      const bedNo = Object.keys(beds).find(no => beds[no]?.patientKey === patientKey);
      if (result.committed && bedNo) {
        const assignedData = await applyRoundRobinNurse(patientKey, data, Number(bedNo));
        patientsByKey.set(patientKey, { ...assignedData, bedStatus: 'assigned', bedNo: Number(bedNo) });
        await updatePatient(patientKey,{
          bedStatus: 'assigned',
          bedNo: Number(bedNo),
          nurseId: assignedData.nurseId || '',
          nurseName: assignedData.nurseName || ''
        });
        await createBedAssignmentAlert(patientKey, assignedData, Number(bedNo));
        return Number(bedNo);
      }
      return false;
    }

    // 재진: 기존 일반 베드 배정
    let placed = false;
    const result = await runBedsRecordTransaction((beds) => {
      beds = beds || {};
      const existingBedNo = Object.keys(beds).find(bedNo => beds[bedNo]?.patientKey === patientKey);
      if (existingBedNo) return undefined;

      const emptyBedNo = getPreferredBedOrder(data.gender)
        .map(String)
        .find(bedNo => !AUTO_ASSIGN_EXCLUDED_BED_NUMBERS.has(Number(bedNo)) && !beds[bedNo]);
      if (!emptyBedNo) return undefined;

      beds[emptyBedNo] = createBedAssignment(patientKey, data, Number(emptyBedNo));
      placed = true;
      return beds;
    });
    if (!placed || !result.committed) {
      if (!silent) showToast('鍮?踰좊뱶媛 ?놁뒿?덈떎');
      return false;
    }

    const beds = result.snapshot.val() || {};
    const bedNo = Object.keys(beds).find(no => beds[no]?.patientKey === patientKey);
    if (result.committed && bedNo) {
      const assignedData = await applyRoundRobinNurse(patientKey, data, Number(bedNo));
      patientsByKey.set(patientKey, { ...assignedData, bedStatus: 'assigned', bedNo: Number(bedNo) });
      await updatePatient(patientKey,{
        bedStatus: 'assigned',
        bedNo: Number(bedNo),
        nurseId: assignedData.nurseId || '',
        nurseName: assignedData.nurseName || ''
      });
      await createBedAssignmentAlert(patientKey, assignedData, Number(bedNo));
      return Number(bedNo);
    }

    if (!silent) showToast('빈 베드가 없습니다');
    return false;
  }

  async function assignWaitingPatientsToBeds(force = false) {
    if (!force && !autoBedAssignEnabled) return 0;
    if (isAssigningWaitingPatients) {
      shouldAssignWaitingAgain = true;
      return 0;
    }

    isAssigningWaitingPatients = true;
    shouldAssignWaitingAgain = false;
    let assignedCount = 0;
    const assignedPatientKeys = [
      ...bedAssignments.filter(Boolean).map(bed => bed.patientKey),
      ...Object.values(doctorBedMap).map(bed => bed.patientKey),
      ...getHoldBedEntries().map(({ bed }) => bed.patientKey)
    ].filter(Boolean);

    const waitingPatients = getWaitingPatients(assignedPatientKeys);
    if (!waitingPatients.length) {
      isAssigningWaitingPatients = false;
      return 0;
    }
    const occupiedBeds = new Set(
      REGULAR_BED_NUMBERS.filter(bedNo => Boolean(bedAssignments[bedNo - 1]))
    );

    // 앞선 대기자가 모두 재진인지 추적 (초진 우선 배정 조건)
    let allPrecedingAreJaejin = true;

    try {
      for (const [key, data] of waitingPatients) {
        const isChojin = data.visitType === '초진';

        if (isChojin) {
          // 초진: 앞선 대기자가 모두 재진인 경우에만 원장 베드 우선 배정
          let assigned = false;
          if (allPrecedingAreJaejin) {
            const assignedBedNo = await assignPatientToBed(key, data, true, force);
            if (assignedBedNo) {
              assignedCount += 1;
              assigned = true;
            }
          }
          if (!assigned) allPrecedingAreJaejin = false;
        } else {
          // 재진: 일반 베드 배정 (정원 초과 시 스킵하되 이후 초진은 계속 처리)
          if (occupiedBeds.size < REGULAR_BED_COUNT) {
            const assignedBedNo = await assignPatientToBed(key, data, true, force);
            if (assignedBedNo) {
              occupiedBeds.add(Number(assignedBedNo));
              assignedCount += 1;
            }
          }
        }
      }
    } finally {
      isAssigningWaitingPatients = false;
      if (shouldAssignWaitingAgain) {
        assignWaitingPatientsToBeds(force);
      }
    }
    return assignedCount;
  }

  window.assignWaitingPatientsManually = async () => {
    const count = await assignWaitingPatientsToBeds(true);
    showToast(count ? `${count}명 배정 완료` : '배정할 대기환자 또는 빈 베드가 없습니다');
  };

  async function assignWaitingPatientToSpecificBed(patientKey, bedNo) {
    bedNo = Number(bedNo);
    const isDocBed = bedNo >= 101;
    const canQueueIfOccupied = isDocBed || bedNo === 15;
    if (!isDocBed && !ACTIVE_BED_NUMBERS.includes(bedNo)) {
      showToast('배정할 수 없는 베드입니다');
      return false;
    }
    if (isDocBed && !getDoctorBedNumbers().includes(bedNo)) {
      showToast('등록되지 않은 원장실 베드입니다');
      return false;
    }

    const data = patientsByKey.get(patientKey);
    if (!data || data.bedStatus === 'discharged') {
      showToast('대기환자 정보를 찾을 수 없습니다');
      return false;
    }
    if (isCleaningBed(getBedData(bedNo))) {
      showToast('베드 정리 중입니다');
      return false;
    }
    if (canQueueIfOccupied && getBedData(bedNo)) {
      const holdBedNo = await assignWaitingPatientToHoldBed(patientKey, data, bedNo);
      if (holdBedNo) {
        showToast(`${data.name || '대기환자'} ${getBedLabel(bedNo)} 대기 큐 등록`);
        return true;
      }
      showToast('대기 큐 등록 실패');
      return false;
    }
    const result = await runBedsRecordTransaction((beds) => {
      beds = beds || {};
      const existingBedNo = Object.keys(beds).find(no => beds[no]?.patientKey === patientKey);
      if (existingBedNo || beds[String(bedNo)]) return beds;
      beds[String(bedNo)] = createBedAssignment(patientKey, data, bedNo);
      return beds;
    });

    const beds = result.snapshot.val() || {};
    if (result.committed && beds[String(bedNo)]?.patientKey === patientKey) {
      const assignedData = await applyRoundRobinNurse(patientKey, data, bedNo);
      patientsByKey.set(patientKey, { ...assignedData, bedStatus: 'assigned', bedNo });
      await updatePatient(patientKey,{
        bedStatus: 'assigned',
        bedNo,
        nurseId: assignedData.nurseId || '',
        nurseName: assignedData.nurseName || ''
      });
      await createBedAssignmentAlert(patientKey, assignedData, bedNo);
      showToast(`${bedNo}번 배정 완료`);
      return true;
    }

    showToast('이미 사용 중인 베드입니다');
    return false;
  }

  function getWaitingPatients(assignedPatientKeys = null) {
    const assignedKeys = assignedPatientKeys || [
      ...bedAssignments.filter(Boolean).map(bed => bed.patientKey),
      ...Object.values(doctorBedMap).map(bed => bed.patientKey),
      ...getHoldBedEntries().map(({ bed }) => bed.patientKey)
    ];

    return [...patientsByKey.entries()]
      .filter(([key, data]) => data?.name && data.bedStatus !== 'discharged' && !assignedKeys.includes(key))
      .sort((a, b) => (a[1].timestamp || 0) - (b[1].timestamp || 0));
  }

  function getHoldTargetBadge(targetBedNo) {
    const target = Number(targetBedNo);
    if (target >= 101) {
      const doctorIndex = target - 100;
      return {
        label: `원${doctorIndex}`,
        className: doctorIndex % 2 ? 'waiting-hold-target--doctor' : 'waiting-hold-target--doctor-alt'
      };
    }
    if (target === 15) return { label: '스파인', className: 'waiting-hold-target--spine' };
    return { label: '대기', className: 'waiting-hold-target--next' };
  }

  function renderWaitingLists() {
    countDebugCounter('render-call', 'waitingLists');
    const waitingPatients = getWaitingPatients();
    updateDeskWaitChip(waitingPatients);
    const heldEntries = getHoldBedEntries();
    const holdTargetCounts = new Map();
    const heldHtml = heldEntries
      .map(({ bedNo, bed }) => {
        const heldTreatments = bed?.treatments || [];
        const heldIdx = Number(bed?.currentIndex || 0);
        const heldNames = getConcurrentTreatmentNames(heldTreatments, heldIdx).map(name => String(name || '').trim());
        const nextTreatmentLabel = formatTreatmentNames(heldNames) || bed?.treatments?.[heldIdx] || getBedLabel(bed?.pendingTargetBedNo) || '대기';
        const targetBadge = getHoldTargetBadge(bed?.pendingTargetBedNo);
        const targetKey = getHoldTargetKey(bed);

  async function reorderHoldQueue(fromBedNo, toBedNo, insertAfter = false) {
    fromBedNo = Number(fromBedNo);
    toBedNo = Number(toBedNo);
    if (!HOLD_BED_NUMBERS.includes(fromBedNo) || !HOLD_BED_NUMBERS.includes(toBedNo) || fromBedNo === toBedNo) return false;

    const fromBed = getBedData(fromBedNo);
    const toBed = getBedData(toBedNo);
    const targetKey = getHoldTargetKey(fromBed);
    if (!fromBed || !toBed || !targetKey || targetKey !== getHoldTargetKey(toBed)) return false;

    const result = await runBedsRecordTransaction((beds) => {
      beds = beds || {};
      const entries = Object.entries(beds)
        .filter(([bedNo, bed]) => HOLD_BED_NUMBERS.includes(Number(bedNo)) && getHoldTargetKey(bed) === targetKey)
        .map(([bedNo, bed]) => ({ bedNo: Number(bedNo), bed }))
        .sort(compareHoldBedEntries);
      const order = entries.map(entry => entry.bedNo);
      const fromIndex = order.indexOf(fromBedNo);
      const toIndex = order.indexOf(toBedNo);
      if (fromIndex < 0 || toIndex < 0) return undefined;

      order.splice(fromIndex, 1);
      let insertIndex = order.indexOf(toBedNo);
      if (insertIndex < 0) return undefined;
      if (insertAfter) insertIndex += 1;
      order.splice(insertIndex, 0, fromBedNo);
      if (order.every((bedNo, index) => bedNo === entries[index]?.bedNo)) return undefined;

      const baseQueuedAt = Date.now();
      order.forEach((bedNo, index) => {
        const key = String(bedNo);
        beds[key] = { ...(beds[key] || {}), holdQueuedAt: baseQueuedAt + index };
      });
      return beds;
    });

    if (result.committed) {
      suppressBedClickUntil = Date.now() + 350;
      renderWaitingLists();
      return true;
    }
    return false;
  }

    const renderDoctorAlertSplitHtml = (options = {}) => {
      const enableOrderControls = options.enableOrderControls ?? showDoctorAlertOrderControls;
      const enableEditorOpen = Boolean(options.enableEditorOpen);
      const doctors = getActiveDoctors().slice(0, 2);
      return Array.from({ length: 2 }, (_, index) => {
        const doctor = doctors[index];
        const doctorId = doctor?.[0] || '';
        const doctorName = doctor?.[1]?.name || '';
        const doctorItems = doctorId ? getDoctorProcedureAlertItems(doctorId) : [];
        const items = doctorItems.map((item, itemIndex) => ({
          alertPriority: item.alertPriority,
          timestamp: Number(item.timestamp || 0),
          html: renderSimpleDoctorProcedureAlertHtml(item, itemIndex, doctorItems.length, {
            showOrderControls: enableOrderControls
          })
        }));
        const listHtml = items.length
          ? items.map(item => item.html).join('')
          : `<div class="empty-state"><div class="empty-icon">-</div><div class="empty-text">알림 없음</div></div>`;
        const resetHtml = '';
        const nameHtml = enableEditorOpen && doctorId
          ? `<button type="button" class="doctor-alert-box-name doctor-alert-box-name-btn" onclick="openReceiveDoctorAlertEditor(${escapeHtmlJsString(doctorId)})">${escapeHtml(doctorName || '원장 없음')}</button>`
          : `<span class="doctor-alert-box-name">${doctorName ? escapeHtml(doctorName) : '원장 없음'}</span>`;
        return `
        <div class="doctor-alert-box">
          <div class="doctor-alert-box-title">
            ${nameHtml}
            ${resetHtml}
          </div>
          <div class="doctor-alert-box-list">${listHtml}</div>
        </div>`;
      }).join('');
    };

    const renderBedAssignmentItems = (mode) => getVisibleBedAssignmentAlertItems(mode).map(item => ({
      timestamp: Number(item.timestamp || 0),
      html: `
      <div class="upcoming-item assignment no-dismiss">
        <div class="upcoming-time">배정</div>
        <div>
          <div class="upcoming-main">${escapeHtml(item.message)}</div>
        </div>
      </div>`
    }));
    const inputAssignmentItems = renderBedAssignmentItems('input');
    const receiveModeForAlerts = window.currentMode === 'notify'
      ? 'notify'
      : (window.currentMode === 'receive' ? 'receive' : window.currentMode);
    const receiveAssignmentItems = renderBedAssignmentItems(receiveModeForAlerts);

    const doctorAssignmentItems = getVisibleDoctorAssignmentAlertItems().map(item => ({
      timestamp: Number(item.timestamp || 0),
      html: `
      <div class="upcoming-item assignment no-dismiss">
        <div class="upcoming-time">배정</div>
        <div>
          <div class="upcoming-main">${escapeHtml(item.message)}</div>
        </div>
      </div>`
    }));

    const appointmentAlertItems = getVisibleAppointmentAlertItems('input').map(item => ({
      timestamp: Number(item.timestamp || 0),
      html: `
      <div class="upcoming-item assignment" onclick="dismissAppointmentAlert('${escapeHtml(item.patientKey)}')">
        <div class="upcoming-time">예약</div>
        <div>
          <div class="upcoming-main">${escapeHtml(item.name)} ${escapeHtml([item.dates.map(formatAppointmentDate).filter(Boolean).join(', '), item.undecided ? '미정' : ''].filter(Boolean).join(' '))}</div>
          ${item.chartNo ? `<div class="upcoming-sub">${escapeHtml(item.chartNo)}</div>` : ''}
        </div>
      </div>`
    }));

    const renderCallItems = (mode) => getVisibleCallAlertItems(mode).map(item => ({
      timestamp: Number(item.timestamp || 0),
      html: `
      <div class="upcoming-item assignment" onclick="dismissDoctorCallAlert('${escapeHtml(item.key)}')">
        <div class="upcoming-time">${item.kind === 'appointmentCancel' ? '예약취소' : '호출'}</div>
        <div>
          <div class="upcoming-main">${escapeHtml(item.message)}</div>
          ${item.chartNo ? `<div class="upcoming-sub">${escapeHtml(item.chartNo)}</div>` : ''}
        </div>
      </div>`
    }));
    const inputCallItems = renderCallItems('input');
    const receiveCallItems = renderCallItems(receiveModeForAlerts);

    const upcoming = getAllBedEntries()
      .map(({ bed, bedNo }) => {
        const remaining = getRemaining(bed);
        const isAlertPending = Boolean(bed.lastAlertId);
        if (!isAlertPending && (bed.complete || !bed.running || remaining <= 0)) return null;
        const treatment = isAlertPending
          ? getCompletedTreatmentFromAlert(bed)
          : (bed.treatments?.[bed.currentIndex] || '치료');
        const treatments = isAlertPending
          ? String(treatment || '').split(',').map(name => name.trim()).filter(Boolean)
          : getConcurrentTreatmentNames(bed.treatments || [], bed.currentIndex || 0);
        const nextTreatment = isAlertPending
          ? getNextTreatmentFromCompletionAlert(bed)
          : getNextTreatmentFromRunningAlert(bed);
        return {
          bedNo,
          bedLabel: getBedLabel(bedNo),
          name: bed.name || '',
          doctorName: bed.doctorName || '',
          nurseName: bed.nurseName || '',
          treatment,
          treatments,
          nextTreatment,
          remaining,
          alertPending: isAlertPending,
          timestamp: Number(String(bed.lastAlertId || '').split('-').pop()) || Number(bed.startedAt || bed.timestamp || 0)
        };
      })
      .filter(Boolean)
      .sort((a, b) => {
        if (a.alertPending !== b.alertPending) return a.alertPending ? -1 : 1;
        if (a.alertPending) return Number(b.timestamp || 0) - Number(a.timestamp || 0);
        return Number(a.timestamp || 0) - Number(b.timestamp || 0);
      });

    const timerAlertItems = upcoming.length
      ? upcoming.filter(item => item.alertPending || item.remaining <= 30).map(item => {
        const nurseBadge = renderNurseBadge(item.nurseName);
        const currentTreatmentHtml = nurseBadge ? renderTreatmentBadges(item) : '';
        const countdownHtml = item.alertPending ? '' : `<span class="upcoming-countdown-chip">${Math.max(0, Math.ceil(Number(item.remaining) || 0))}</span>`;
        const nextTreatmentHtml = item.nextTreatment ? renderTreatmentBadge(item.nextTreatment) : '';
        const completeHtml = item.alertPending ? renderTreatmentCompleteLabel(item) : '';
        const patientLineHtml = `<span class="upcoming-main-text">${escapeHtml(item.bedLabel)}</span>`;
        return {
          alertPending: item.alertPending,
          alertPriority: item.alertPending ? 0 : 1,
          timestamp: Number(item.timestamp || 0),
          html: `
        <div class="upcoming-item">
          ${nurseBadge || renderTreatmentBadges(item)}
          <div>
            <div class="upcoming-main alert-line-compact">${patientLineHtml}${currentTreatmentHtml}${countdownHtml}${completeHtml}${nextTreatmentHtml}</div>
          </div>
        </div>`
        };
      })
      : [];

    const doctorProcedureItems = shouldShowDoctorProcedureAlerts()
      ? getDoctorProcedureAlertItems()
        .map(item => ({
          alertPriority: item.alertPriority,
          timestamp: Number(item.timestamp || 0),
          html: renderDoctorProcedureAlertHtml(item)
        }))
      : [];

    const receiveTreatmentItems = shouldShowReceiveTreatmentAlerts()
      ? getReceiveTreatmentAlertItems().map(item => {
        return {
          timestamp: Number(item.timestamp || 0),
          html: renderTreatmentAlertHtml(item, { nurseName: item.nurseName || '' })
        };
      })
      : [];
    const transientAddedTreatmentItems = (receiveModeForAlerts === 'notify' || receiveModeForAlerts === 'receive')
      ? getVisibleAddedTreatmentAlertItems().map(item => ({
        alertPriority: -1,
        timestamp: Number(item.timestamp || 0),
        html: renderTreatmentAlertHtml(item, {
          main: `${item.bedLabel || ''}`.trim(),
          leadingBadge: '<div class="upcoming-time">추가</div>',
          nurseName: '',
          sub: ''
        })
      }))
      : [];

    const receiveTimerItems = (receiveModeForAlerts === 'notify' || receiveModeForAlerts === 'receive') ? timerAlertItems : [];
    const inputItems = [...inputCallItems, ...inputAssignmentItems, ...appointmentAlertItems];
    const receiveItems = [...transientAddedTreatmentItems, ...doctorProcedureItems, ...receiveTreatmentItems, ...doctorAssignmentItems, ...receiveCallItems, ...receiveAssignmentItems, ...receiveTimerItems];
    const baseHasAlerts = inputItems.length > 0;
    const receiveHasAlerts = receiveItems.length > 0;
    const html = baseHasAlerts
      ? renderAlertItemsHtml(inputItems)
      : '';
    const receiveHtml = receiveHasAlerts
      ? renderAlertItemsHtml(receiveItems)
      : '';

    const inputList = document.getElementById('inputUpcomingAlerts');
    if (inputList) inputList.innerHTML = html;
    const receiveList = document.getElementById('receiveUpcomingAlerts');
    if (receiveList) receiveList.innerHTML = receiveHtml;
    const doctorSplitHtml = renderDoctorAlertSplitHtml();
    const inputDoctorSplit = document.getElementById('inputDoctorAlertSplit');
    if (inputDoctorSplit) inputDoctorSplit.innerHTML = doctorSplitHtml;
    const receiveDoctorSplit = document.getElementById('receiveDoctorAlertSplit');
    if (receiveDoctorSplit) {
      receiveDoctorSplit.innerHTML = renderDoctorAlertSplitHtml({
        enableOrderControls: false,
        enableEditorOpen: false
      });
    }
    renderReceiveDoctorAlertEditor();
    renderBedDoctorAlertPanel();
    updateReceiveAlertView();
    syncFixedDoctorRoomAlertAudio();
    updateAlertListAudioState();
  }

  window.dismissAppointmentAlert = async (patientKey, appointmentDate = '') => {
    const field = getAppointmentAlertDismissField();
    if (!patientKey || !field) return;
    if (appointmentDeskAlertItems.has(patientKey)) {
      appointmentDeskAlertItems.delete(patientKey);
      renderUpcomingAlerts();
      try {
        await removeAppointmentDeskAlert(patientKey);
      } catch (e) {
        console.error(e);
        showToast('예약 알림 확인 실패');
      }
      return;
    }
    const patient = patientsByKey.get(patientKey) || {};
    const dates = appointmentDate
      ? [appointmentDate]
      : normalizeAppointmentDates(patient).filter(date => shouldShowAppointmentAlertForMode(patient, window.currentMode, date));
    // Dismissing the whole item (no specific date) also clears the 미정 entry.
    const dismissUndecided = !appointmentDate && shouldShowUndecidedAlertForMode(patient, window.currentMode);
    if (!dates.length && !dismissUndecided) return;
    const appointmentAlerts = { ...(patient.appointmentAlerts || {}) };
    dates.forEach(date => {
      appointmentAlerts[date] = {
        ...(appointmentAlerts[date] || {}),
        date,
        [field]: true,
        ...(field === 'clinicDismissed' ? { receiveDismissed: true, notifyDismissed: true } : {})
      };
    });
    const patch = { appointmentAlerts };
    if (dates.includes(patient.appointmentDate || '')) {
      patch.appointmentAlert = {
        ...(patient.appointmentAlert || {}),
        date: patient.appointmentDate || dates[0],
        [field]: true,
        ...(field === 'clinicDismissed' ? { receiveDismissed: true, notifyDismissed: true } : {})
      };
    }
    if (dismissUndecided) {
      patch.appointmentUndecidedAlert = {
        ...(patient.appointmentUndecidedAlert || {}),
        date: '미정',
        [field]: true,
        ...(field === 'clinicDismissed' ? { receiveDismissed: true, notifyDismissed: true } : {})
      };
    }
    await updatePatient(patientKey,patch);
    patientsByKey.set(patientKey, {
      ...patient,
      appointmentAlerts,
      ...(patch.appointmentAlert ? { appointmentAlert: patch.appointmentAlert } : {}),
      ...(patch.appointmentUndecidedAlert ? { appointmentUndecidedAlert: patch.appointmentUndecidedAlert } : {})
    });
    renderUpcomingAlerts();
  };

  function formatTimer(seconds) {
    const safeSeconds = Math.max(0, seconds);

    const rest = String(safeSeconds % 60).padStart(2, '0');
    return `${minutes}:${rest}`;
  }

  const lastBedDetailMarkup = new WeakMap();
  function renderBedDetailInto(detail, bedNo, allowControls, context = 'bed') {
    if (!detail) return;
    detail.classList.add('active');
    const markup = renderBedDetailMarkup(bedNo, allowControls, context);
    // 마크업이 바뀐 경우에만 교체한다. 비실행 베드의 상세는 고정이므로 다른 베드
    // 변경으로 재렌더가 호출돼도 버튼이 새 노드로 교체되지 않아(탭 누락 방지) 안정적이다.
    if (lastBedDetailMarkup.get(detail) !== markup) {

      lastBedDetailMarkup.set(detail, markup);

  function getBedRemainingTreatmentSeconds(bed) {
    if (!bed) return 0;
    const pendingAlertProcedureSeconds = bed.lastAlertId ? getProcedureSeconds() : 0;
    if (bed.complete) return pendingAlertProcedureSeconds;
    const treatments = Array.isArray(bed.treatments) ? bed.treatments : [];
    const currentIndex = Number(bed.currentIndex || 0);
    const currentGroupEndIndex = getConcurrentTreatmentEndIndex(treatments, currentIndex);
    const currentRemaining = getRemaining(bed);
    const preCompletedIndexes = bed.preCompletedTreatmentIndexes || [];
    const futureSeconds = getFuturePendingTreatmentSeconds(treatments, currentGroupEndIndex + 1, preCompletedIndexes);
    const remainingGroupCount = 1 + getPendingTreatmentGroupCount(treatments, currentGroupEndIndex + 1, preCompletedIndexes);
    return currentRemaining + futureSeconds + (remainingGroupCount * getProcedureSeconds()) + pendingAlertProcedureSeconds;
  }

  function normalizeBodyParts(bodyParts) {
    const bp = bodyParts || {};
    const normalizeSide = (side, values = []) => {
      const parts = BODY_PARTS[side] || [];
      const byId = new Map(parts.map(part => [part.id, part.label]));
      const labels = new Set(parts.map(part => part.label));
      return [...new Set((Array.isArray(values) ? values : [])
        .map(value => {
          const text = String(value || '').trim();
          return byId.get(text) || (labels.has(text) ? text : '');
        })
        .filter(Boolean))];
    };
    return {
      front: normalizeSide('front', bp.front),
      back: normalizeSide('back', bp.back)
    };
  }

  function renderBodyFigure(side, title, selectedParts, onclickTemplate = `toggleBodyPart('${side}', '__PART__')`) {
    const leftLabel = side === 'back' ? '좌' : '우';

      <div class="body-figure-panel">

  function renderBodySvg(side, selectedParts = [], onclickTemplate = '') {
    const sel = new Set(
      BODY_PARTS[side]
        .filter(p => selectedParts.includes(p.label))
        .map(p => p.id)
    );
    const labelMap = Object.fromEntries(BODY_PARTS[side].map(p => [p.id, p.label]));
    const BASE = '#c8a87a';
    const ACT  = '#39a9f5';

    function seg(id, d) {
      const active = sel.has(id);
      const label  = labelMap[id] || id;
      const oc     = onclickTemplate.replace('__PART__', escapeHtml(label));
      return `<path d="${d}" fill="${active ? ACT : BASE}"
        style="cursor:pointer;transition:fill .15s;"
        onmouseenter="this.style.filter='brightness(1.2)'"
        onmouseleave="this.style.filter=''"
        onclick="${oc}"><title>${escapeHtml(label)}</title></path>`;
    }

    // ── 전면 ──────────────────────────────────────────────
    // viewBox 0 0 200 400  (SVG 좌=환자 우, SVG 우=환자 좌)
    if (side === 'front') { return `
