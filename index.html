    } else {
      const packages = getPackageStateFromPatient(data);
      if (JSON.stringify(data.packages) !== JSON.stringify(packages)) patch.packages = packages;
      data.packages = packages;
    }
    const balances = getPCreditsFromPackages(data.packages);
    PCREDIT_FIELDS.forEach(({ key }) => {
      if (!Object.prototype.hasOwnProperty.call(data, key) || Number(data[key] || 0) !== Number(balances[key] || 0)) {
        patch[key] = Number(balances[key] || 0);
        data[key] = Number(balances[key] || 0);
      }
    });
    if (Object.prototype.hasOwnProperty.call(data, 'credit')) {
      patch.credit = null;
      delete data.credit;
    }
    if (!Object.keys(patch).length) return;
    update(ref(db, `${PATIENTS_PATH}/${patientKey}`), patch).catch(e => {
      console.error('크레딧 필드 동기화 실패', e);
    });
  }

  onChildAdded(patientsRef, (snapshot) => {
    if (isClearingPatientDatabase) return;
    const key = snapshot.key;
    if (loadedKeys.has(key)) return;
    loadedKeys.add(key);

    const data = snapshot.val();
    syncPatientPCreditSchema(key, data);
    const normalizedChartNo = normalizeChartNo(data.chartNo);
    if ((data.chartNo || '') !== normalizedChartNo) {
      data.chartNo = normalizedChartNo;
      update(ref(db, `${PATIENTS_PATH}/${key}`), { chartNo: normalizedChartNo });
    }
    const isNew = Number(data.timestamp || 0) > pageLoadedAt;
    patientsByKey.set(key, data);
    if (autoBedAssignEnabled) assignPatientToBed(key, data, true);

    renderNotif(key, data, isNew);

    updateCount();
    if (isFirstLoad) setTimeout(() => { isFirstLoad = false; }, 500);
    renderWaitingLists();
    renderUpcomingAlerts();
  });

  onChildChanged(patientsRef, (snapshot) => {
    if (isClearingPatientDatabase) return;
    const key = snapshot.key;
    const data = snapshot.val();
    syncPatientPCreditSchema(key, data);
    const normalizedChartNo = normalizeChartNo(data.chartNo);
    if ((data.chartNo || '') !== normalizedChartNo) {
      data.chartNo = normalizedChartNo;
      update(ref(db, `${PATIENTS_PATH}/${key}`), { chartNo: normalizedChartNo });
    }
    loadedKeys.add(key);
    patientsByKey.set(key, data);
    renderBedSelector();
    renderBedDetail();
    renderReceiveBedDetail();
    renderBedMonitors();
    renderWaitingLists();
    renderUpcomingAlerts();
    updateCount();
  });

  onChildRemoved(patientsRef, (snapshot) => {
    const key = snapshot.key;
    const assignedBedNo = bedAssignments.findIndex(bed => bed?.patientKey === key) + 1;
    if (assignedBedNo > 0) clearLocalTimerAlertsForBed(assignedBedNo);
    patientsByKey.delete(key);
    loadedKeys.delete(key);

    renderBedSelector();
    renderBedDetail();
    renderReceiveBedDetail();
    renderBedMonitors();
    renderWaitingLists();
    renderUpcomingAlerts();
    updateCount();
  });

  function scheduleDisabledBedCleanup(bedNo, bed) {
    const key = String(bedNo);
    if (cleaningDisabledBedKeys.has(key)) return;
    cleaningDisabledBedKeys.add(key);

    setTimeout(async () => {
      try {
        const currentSnap = await get(ref(db, `${BEDS_PATH}/${key}`));
        const currentBed = currentSnap.val();
        if (!currentBed) return;

        if (currentBed.patientKey) {
          await update(ref(db, `${PATIENTS_PATH}/${currentBed.patientKey}`), {
            bedStatus: 'waiting',
            bedNo: null,
            timestamp: todayStart.getTime()
          });
        }
        await remove(ref(db, `${BEDS_PATH}/${key}`));
      } catch (e) {
        console.error('비활성 베드 DB 정리 실패', e);
      } finally {
        cleaningDisabledBedKeys.delete(key);
      }
    }, 0);
  }

  async function migrateDisabledBedsToWaiting(beds) {
    let movedCount = 0;
    Object.entries(beds).forEach(([bedNo, bed]) => {
      if (!bed) return;
      if (DISABLED_BED_NUMBERS.has(Number(bedNo))) return;
      const normalizedChartNo = normalizeChartNo(bed.chartNo);
      const normalizeKey = `${bedNo}:${bed.chartNo || ''}`;
      if ((bed.chartNo || '') !== normalizedChartNo && !normalizedBedChartKeys.has(normalizeKey)) {
        normalizedBedChartKeys.add(normalizeKey);
        bed.chartNo = normalizedChartNo;
      }
    });
    DISABLED_BED_NUMBERS.forEach(bedNo => {
      const key = String(bedNo);
      const bed = beds[key];
      if (!bed) return;
      scheduleDisabledBedCleanup(bedNo, bed);

      if (!migratingDisabledBedKeys.has(key) && bed.patientKey) {
        migratingDisabledBedKeys.add(key);
        const firstQueueTimestamp = todayStart.getTime();
        patientsByKey.set(bed.patientKey, {
          ...(patientsByKey.get(bed.patientKey) || {}),
          ...bed,
          bedStatus: 'waiting',
          bedNo: null,
          timestamp: firstQueueTimestamp
        });
        movedCount += 1;
      }

      delete beds[key];
    });
    return movedCount;
  }

  async function applyBedsState(beds = {}, { allowMigration = true, allowAutoAssign = true, fromLocalFallback = false } = {}) {
    if (isClearingPatientDatabase) {
      bedAssignments = Array(BED_COUNT).fill(null);
      doctorBedMap = {};
      renderBedSelector();
      renderBedDetail();
      renderReceiveBedDetail();
      renderBedMonitors();
      renderWaitingLists();
      renderUpcomingAlerts();
      updateCount();
      syncFixedBedArrivalOverlay();
      return;
    }
    let migratedCount = 0;
    if (allowMigration) {
      try {
        migratedCount = await migrateDisabledBedsToWaiting(beds);
      } catch (e) {
        console.error('비활성 베드 정리 실패', e);
      }
    }
    bedAssignments = Array.from({ length: BED_COUNT }, (_, i) => beds[String(i + 1)] || null);
    doctorBedMap = {};
    for (let i = 1; i <= 10; i++) {
      if (beds[String(100 + i)]) doctorBedMap[100 + i] = beds[String(100 + i)];
    }
    pruneStaleBedAssignmentAlerts();
    if (DISABLED_BED_NUMBERS.has(selectedBedNo)) selectedBedNo = getUrlBedNo();
    if (DISABLED_BED_NUMBERS.has(selectedReceiveBedNo)) selectedReceiveBedNo = getUrlBedNo();
    if (selectedMoveBedNo && (DISABLED_BED_NUMBERS.has(selectedMoveBedNo) || !getBedData(selectedMoveBedNo))) selectedMoveBedNo = null;
    syncAssignedPatientKeys(hasLoadedBedsOnce);
    syncTimerAlertsWithBeds();
    handleRemoteTimerAlerts(!hasLoadedBedsOnce);
    syncDoctorProcedureAlerts();
    hasLoadedBedsOnce = true;
    if (allowAutoAssign && !migratedCount) await assignWaitingPatientsToBeds();
    renderBedSelector();
    renderBedDetail();
    renderReceiveBedDetail();
    renderBedMonitors();
    renderWaitingLists();
    renderUpcomingAlerts();
    updateCount();
    syncFixedBedArrivalOverlay();
    ensureBedTicker();
  }

  onValue(ref(db, BEDS_PATH), async (snapshot) => {
    const beds = snapshot.val() || {};
    if (localFallbackActive && localFallbackDirty) {
      return;
    }
    firebaseConnected = true;
    localFallbackActive = false;
    updateConnectionStatusLabel();
    scheduleLocalBedsMirror(beds);
    await applyBedsState(beds, { allowMigration: true, allowAutoAssign: true, fromLocalFallback: false });
  });

  async function syncPendingLocalBedsToFirebase() {
    if (!SERVER_MODE) return;
    let isDirty = localFallbackDirty;
    try {
      isDirty = Boolean(isDirty || await localStateGet('bedsDirty'));
    } catch (error) {
      console.warn('로컬 변경 여부 확인 실패', error);
    }
    if (!isDirty) return;

    try {
      const localBeds = await localStateGet('beds') || {};
      await set(ref(db, BEDS_PATH), localBeds);
      localFallbackDirty = false;
      await localStatePut('bedsDirty', false);
    } catch (error) {
      console.error('로컬 임시 beds Firebase 복구 실패', error);
      localFallbackDirty = true;
      throw error;
    }
  }

  async function loadLocalFallbackBeds() {
    if (!SERVER_MODE) {
      updateConnectionStatusLabel();
      return;
    }
    try {
      const beds = await localStateGet('beds') || {};
      localFallbackDirty = Boolean(await localStateGet('bedsDirty'));
      localFallbackActive = true;
      updateConnectionStatusLabel();
      await applyBedsState(beds, { allowMigration: false, allowAutoAssign: false, fromLocalFallback: true });
    } catch (error) {
      console.error('로컬 임시 beds 로드 실패', error);
      updateConnectionStatusLabel();
    }
  }

  onValue(ref(db, '.info/connected'), async (snapshot) => {
    firebaseConnected = snapshot.val() === true;
    if (firebaseConnected) {
      if (localFallbackPollTimer) {
        clearInterval(localFallbackPollTimer);
        localFallbackPollTimer = null;
      }
      try {
        await syncPendingLocalBedsToFirebase();
        localFallbackActive = false;
        updateConnectionStatusLabel();
      } catch (error) {
        localFallbackActive = true;
        updateConnectionStatusLabel();
      }
      return;
    }
    await flushLocalBedsMirror();
    loadLocalFallbackBeds();
    if (SERVER_MODE && !localFallbackPollTimer) {
      localFallbackPollTimer = setInterval(() => {
        if (!firebaseConnected) loadLocalFallbackBeds();

    }
  });

  function updateCount() {
    const todayCount = document.getElementById('todayCount');
    if (todayCount) todayCount.textContent = `${loadedKeys.size}명`;
    const regularOccupiedCount = REGULAR_BED_NUMBERS.filter(bedNo => Boolean(bedAssignments[bedNo - 1])).length;
    ['bedPatientCount', 'deskBedPatientCount'].forEach(id => {

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[ch]));
  }

  function normalizeChartNo(value) {
    const text = String(value ?? '').trim();
    if (!/^\d+$/.test(text)) return text;
    return text.replace(/^0+(?=\d)/, '');
  }

  function getTreatmentSeconds(treatment) {
    return (Number(treatmentMinutes[treatment] || DEFAULT_TREATMENT_MINUTES[treatment] || 5)) * 60;
  }

  function getProcedureSeconds() {
    return Math.max(0, Number(procedureMinutes || 0)) * 60;
  }

  function isNeedleMoxaPair(first, second) {
    const a = String(first || '').trim();
    const b = String(second || '').trim();
    const isNeedle = value => value === '침';
    const isMoxa = value => value === '왕뜸' || value === '전자뜸';
    return (isNeedle(a) && isMoxa(b)) || (isMoxa(a) && isNeedle(b));
  }

  function getPreferredBedOrder(gender) {
    const primary = gender === '여' ? FEMALE_PRIMARY_BED_NUMBERS : MALE_PRIMARY_BED_NUMBERS;
    const fallback = gender === '여' ? MALE_PRIMARY_BED_NUMBERS : FEMALE_PRIMARY_BED_NUMBERS;
    return [...primary, ...fallback]
      .filter((bedNo, index, rows) =>
        REGULAR_BED_NUMBERS.includes(bedNo) && !AUTO_ASSIGN_EXCLUDED_BED_NUMBERS.has(bedNo) && rows.indexOf(bedNo) === index
      );
  }

  function getActiveRoundRobinNurses() {
    return getSortedStaff('nurses').filter(([, nurse]) => !nurse?.vacation);
  }

  async function getNextRoundRobinNurse() {
    const nurses = getActiveRoundRobinNurses();
    if (!nurses.length) return null;

    const dateKey = getTodayKey();
    const stateRef = ref(db, 'settings/nurseRoundRobinState');
    let result;
    try {
      result = await runTransaction(stateRef, value => {
        const state = value && typeof value === 'object' ? value : {};
        const previousDate = String(state.lastDate || '');
        const sameDate = previousDate === dateKey;
        const previousStartOffset = Math.max(0, Number(state.startOffset || 0)) % nurses.length;
        const startOffset = sameDate ? previousStartOffset : (previousDate ? (previousStartOffset + 1) % nurses.length : 0);
        const count = sameDate ? Number(state.count || 0) + 1 : 1;
        return {
          ...state,
          lastDate: dateKey,
          startOffset,
          count,
          updatedAt: Date.now()
        };
      });
    } catch (e) {
      console.error('간호사 round robin 순번 저장 실패', e);
      return null;
    }
    const state = result.snapshot.val() || {};
    const count = Number(state.count || 1);
    const serial = Math.max(0, count - 1);
    const startOffset = Math.max(0, Number(state.startOffset || 0)) % nurses.length;
    const index = (startOffset + serial) % nurses.length;
    const [id, nurse] = nurses[index] || [];
    return id ? { id, name: nurse?.name || '' } : null;
  }

  async function applyRoundRobinNurse(patientKey, data, bedNo) {
    const nurse = await getNextRoundRobinNurse();
    const assignedData = nurse
      ? { ...data, nurseId: nurse.id, nurseName: nurse.name }
      : { ...data, nurseId: '', nurseName: '' };
    await updateBedRecord(bedNo, {
      nurseId: assignedData.nurseId || '',
      nurseName: assignedData.nurseName || ''
    });
    return assignedData;
  }

  function createBedAssignment(patientKey, data, bedNo = null) {
    const firstTreatment = data.treatments?.[0];
    const total = getTreatmentSeconds(firstTreatment);
    return {
      patientKey,
      name: data.name,
      treatments: data.treatments || [],
      timeStr: data.timeStr || '',
      timestamp: data.timestamp || Date.now(),
      chartNo: normalizeChartNo(data.chartNo),
      visitType: data.visitType || '',
      chiefComplaint: data.chiefComplaint || '',
      memo: data.memo || '',
      age: data.age || '',
      gender: data.gender || '',
      doctorId: data.doctorId || '',
      doctorName: data.doctorName || '',
      nurseId: '',
      nurseName: '',
      bodyParts: data.bodyParts || { front: [], back: [] },
      currentIndex: 0,
      total,
      remaining: total,
      running: false,
      startedAt: null,
      complete: false,
      doctorProcedureAlert: null
    };
  }

  function getDoctorBedNoForPatient(doctorId) {
    if (!doctorId) return null;
    const doctors = getSortedStaff('doctors');
    const index = doctors.findIndex(([key]) => key === doctorId);
    return index >= 0 ? 101 + index : null;
  }

  // 베드가 비워지거나 다른 환자로 바뀌면 그 베드의 배정 알림 제거
  // (다른 베드로 이동 / 대기로 이동 / 베드 비우기 등 베드에서 빠질 때 알림 끄기)
  function pruneStaleBedAssignmentAlerts() {
    [...bedAssignmentAlertItems.entries()].forEach(([key, data]) => {
      const bedNo = Number(data?.bedNo);
      const patientKey = String(data?.patientKey || '');
      const bed = getBedData(bedNo);
      const stillAssigned = Boolean(patientKey) && bed && String(bed.patientKey || '') === patientKey;
      if (stillAssigned) return;
      bedAssignmentAlertItems.delete(key);
      remove(ref(db, `${BED_ASSIGNMENT_ALERTS_PATH}/${key}`)).catch((e) => console.error('배정 알림 정리 실패', e));
    });
  }

  async function createBedAssignmentAlert(patientKey, data, bedNo) {
    if (!patientKey || !bedNo) return;
    if (Number(bedNo) >= 101) return;
    const name = data.name || '환자';
    try {
      await push(ref(db, BED_ASSIGNMENT_ALERTS_PATH), {
        patientKey,
        bedNo: Number(bedNo),
        bedLabel: getBedLabel(bedNo),
        patientName: name,
        doctorId: data.doctorId || '',
        doctorName: data.doctorName || '',
        nurseId: data.nurseId || '',
        nurseName: data.nurseName || '',
        message: `${getBedLabel(bedNo)} ${name} 배정`,
        timestamp: Date.now()
      });
    } catch (e) {
      console.error('베드 배정 알림 저장 실패', e);
    }
  }

  async function assignPatientToBed(patientKey, data, silent = false, force = false) {
    if (!force && !autoBedAssignEnabled) return false;
    if (data.bedStatus === 'discharged') return false;

    // 초진: 담당 원장 베드로만 배정
    if (data.visitType === '초진') {
      const docBedNo = getDoctorBedNoForPatient(data.doctorId);
      if (!docBedNo) return false;

      const result = await runBedsRecordTransaction((beds) => {
        beds = beds || {};
        const existing = Object.keys(beds).find(no => beds[no]?.patientKey === patientKey);
        if (existing || beds[String(docBedNo)]) return beds;
        beds[String(docBedNo)] = createBedAssignment(patientKey, data, docBedNo);
        return beds;
      });

      const beds = result.snapshot.val() || {};
      const bedNo = Object.keys(beds).find(no => beds[no]?.patientKey === patientKey);
      if (result.committed && bedNo) {
        const assignedData = await applyRoundRobinNurse(patientKey, data, Number(bedNo));
        patientsByKey.set(patientKey, { ...assignedData, bedStatus: 'assigned', bedNo: Number(bedNo) });
        await update(ref(db, `${PATIENTS_PATH}/${patientKey}`), {
          bedStatus: 'assigned',
          bedNo: Number(bedNo),
          nurseId: assignedData.nurseId || '',
          nurseName: assignedData.nurseName || ''
        });
        await createBedAssignmentAlert(patientKey, assignedData, Number(bedNo));
        return Number(bedNo);
      }
      return false;
    }

    // 재진: 기존 일반 베드 배정
    const result = await runBedsRecordTransaction((beds) => {
      beds = beds || {};
      const existingBedNo = Object.keys(beds).find(bedNo => beds[bedNo]?.patientKey === patientKey);
      if (existingBedNo) return beds;

      const emptyBedNo = getPreferredBedOrder(data.gender)
        .map(String)
        .find(bedNo => !AUTO_ASSIGN_EXCLUDED_BED_NUMBERS.has(Number(bedNo)) && !beds[bedNo]);
      if (!emptyBedNo) return beds;

      beds[emptyBedNo] = createBedAssignment(patientKey, data, Number(emptyBedNo));
      return beds;
    });

    const beds = result.snapshot.val() || {};
    const bedNo = Object.keys(beds).find(no => beds[no]?.patientKey === patientKey);
    if (result.committed && bedNo) {
      const assignedData = await applyRoundRobinNurse(patientKey, data, Number(bedNo));
      patientsByKey.set(patientKey, { ...assignedData, bedStatus: 'assigned', bedNo: Number(bedNo) });
      await update(ref(db, `${PATIENTS_PATH}/${patientKey}`), {
        bedStatus: 'assigned',
        bedNo: Number(bedNo),
        nurseId: assignedData.nurseId || '',
        nurseName: assignedData.nurseName || ''
      });
      await createBedAssignmentAlert(patientKey, assignedData, Number(bedNo));
      return Number(bedNo);
    }

    if (!silent) showToast('빈 베드가 없습니다');
    return false;
  }

  async function assignWaitingPatientsToBeds(force = false) {
    if (!force && !autoBedAssignEnabled) return 0;
    if (isAssigningWaitingPatients) {
      shouldAssignWaitingAgain = true;
      return 0;
    }

    isAssigningWaitingPatients = true;
    shouldAssignWaitingAgain = false;
    let assignedCount = 0;
    const assignedPatientKeys = bedAssignments
      .filter(Boolean)
      .map(bed => bed.patientKey);

    const waitingPatients = getWaitingPatients(assignedPatientKeys);
    const occupiedBeds = new Set(
      REGULAR_BED_NUMBERS.filter(bedNo => Boolean(bedAssignments[bedNo - 1]))
    );

    // 앞선 대기자가 모두 재진인지 추적 (초진 우선 배정 조건)
    let allPrecedingAreJaejin = true;

    try {
      for (const [key, data] of waitingPatients) {
        const isChojin = data.visitType === '초진';

        if (isChojin) {
          // 초진: 앞선 대기자가 모두 재진인 경우에만 원장 베드 우선 배정
          let assigned = false;
          if (allPrecedingAreJaejin) {
            const assignedBedNo = await assignPatientToBed(key, data, true, force);
            if (assignedBedNo) {
              assignedCount += 1;
              assigned = true;
            }
          }
          if (!assigned) allPrecedingAreJaejin = false;
        } else {
          // 재진: 일반 베드 배정 (정원 초과 시 스킵하되 이후 초진은 계속 처리)
          if (occupiedBeds.size < REGULAR_BED_COUNT) {
            const assignedBedNo = await assignPatientToBed(key, data, true, force);
            if (assignedBedNo) {
              occupiedBeds.add(Number(assignedBedNo));
              assignedCount += 1;
            }
          }
        }
      }
    } finally {
      isAssigningWaitingPatients = false;
      if (shouldAssignWaitingAgain) {
        assignWaitingPatientsToBeds(force);
      }
    }
    return assignedCount;
  }

  window.assignWaitingPatientsManually = async () => {
    const count = await assignWaitingPatientsToBeds(true);
    showToast(count ? `${count}명 배정 완료` : '배정할 대기환자 또는 빈 베드가 없습니다');
  };

  async function assignWaitingPatientToSpecificBed(patientKey, bedNo) {
    bedNo = Number(bedNo);
    const isDocBed = bedNo >= 101;
    if (!isDocBed && !ACTIVE_BED_NUMBERS.includes(bedNo)) {
      showToast('배정할 수 없는 베드입니다');
      return false;
    }
    if (isDocBed && !getDoctorBedNumbers().includes(bedNo)) {
      showToast('등록되지 않은 원장실 베드입니다');
      return false;
    }

    const data = patientsByKey.get(patientKey);
    if (!data || data.bedStatus === 'discharged') {
      showToast('대기환자 정보를 찾을 수 없습니다');
      return false;
    }

    const result = await runBedsRecordTransaction((beds) => {
      beds = beds || {};
      const existingBedNo = Object.keys(beds).find(no => beds[no]?.patientKey === patientKey);
      if (existingBedNo || beds[String(bedNo)]) return beds;
      beds[String(bedNo)] = createBedAssignment(patientKey, data, bedNo);
      return beds;
    });

    const beds = result.snapshot.val() || {};
    if (result.committed && beds[String(bedNo)]?.patientKey === patientKey) {
      const assignedData = await applyRoundRobinNurse(patientKey, data, bedNo);
      patientsByKey.set(patientKey, { ...assignedData, bedStatus: 'assigned', bedNo });
      await update(ref(db, `${PATIENTS_PATH}/${patientKey}`), {
        bedStatus: 'assigned',
        bedNo,
        nurseId: assignedData.nurseId || '',

        }),

  function getEstimatedWaitMinutesList(waitingPatients) {
    const regularBeds = REGULAR_BED_NUMBERS.map(bedNo => bedAssignments[bedNo - 1]);

    const minutesList = regularBeds
      .map(bed => {
        if (!bed) return 0;
        return getBedRemainingTreatmentSeconds(bed);
      })
      .sort((a, b) => a - b)
      .slice(0, 5)
      .map(seconds => Math.ceil(seconds / 60));

    if (minutesList.length === 5 && minutesList.every(minutes => minutes === 0)) return 'none';
    return minutesList.length ? minutesList : 0;
  }

  function updateDeskWaitChip(waitingPatients = getWaitingPatients()) {
    const minutes = getEstimatedWaitMinutesList(waitingPatients);
    const text = minutes === 'none'
      ? '대기시간 없음'
      : Array.isArray(minutes)
      ? `예상대기시간 ${minutes.map(value => `${value}분`).join(', ')}`
      : `예상대기시간 ${minutes}분`;
    const chip = document.getElementById('deskWaitChip');
    if (chip) chip.textContent = text;
    const notifyChip = document.getElementById('notifyWaitChip');
    if (notifyChip) notifyChip.textContent = text;
  }

  function formatUpcomingTime(seconds) {
    const safeSeconds = Math.max(0, Number(seconds || 0));
    if (safeSeconds < 60) return '곧';
    return `${Math.ceil(safeSeconds / 60)}분 후`;
  }

  function formatAppointmentDate(dateStr) {
    const parts = String(dateStr || '').split('-').map(Number);
    if (parts.length !== 3 || parts.some(n => !Number.isFinite(n))) return '';
    return `${parts[1]}월 ${parts[2]}일`;
  }

  function getCompletedTreatmentFromAlert(bed) {
    const message = bed.lastAlertMessage || '';
    const match = message.match(/·\s*(.+?)\s*완료/);
    return match?.[1] || bed.treatments?.[Math.max(0, Number(bed.currentIndex || 0) - 1)] || bed.treatments?.[bed.currentIndex] || '치료';
  }

  function getAppointmentAlertDismissField(mode = window.currentMode) {
    if (mode === 'input') return 'deskDismissed';
    if (mode === 'receive' || mode === 'notify') return 'clinicDismissed';

  }

  function shouldShowAppointmentAlertForMode(data, mode = window.currentMode, appointmentDate = '') {
    const field = getAppointmentAlertDismissField(mode);
    if (!field) return false;
    const date = appointmentDate || normalizeAppointmentDates(data || {})[0] || '';
    if (!date) return false;
    const alert = data?.appointmentAlerts?.[date] || (data?.appointmentAlert?.date === date ? data.appointmentAlert : {});
    if (alert.date && alert.date !== date) return true;
    if (field === 'clinicDismissed' && (alert.clinicDismissed === true || alert.receiveDismissed === true || alert.notifyDismissed === true)) return false;
    return alert[field] !== true;
  }

  function getVisibleCallAlertItems(mode = window.currentMode) {
    return [...callAlertItems.entries()]
      .map(([key, data]) => ({ key, ...(data || {}) }))
      .filter(item => {
        if (!item.message) return false;
        if (mode === 'input') return item.target === 'desk';
        if (mode === 'notify' || mode === 'receive') return item.target === 'clinic';
        return false;
      })
      .sort((a, b) => Number(a.timestamp || 0) - Number(b.timestamp || 0));
  }

  function getVisibleDoctorAssignmentAlertItems(mode = window.currentMode) {
    return [];
  }

  function getVisibleBedAssignmentAlertItems(mode = window.currentMode) {
    if (mode !== 'notify' && mode !== 'receive') return [];
    return [...bedAssignmentAlertItems.entries()]
      .map(([key, data]) => ({ key, ...(data || {}) }))
      .filter(item => item.message)
      .sort((a, b) => Number(a.timestamp || 0) - Number(b.timestamp || 0));
  }

  function renderUpcomingAlerts() {
    const renderAlertItemsHtml = (items) => items
      .sort((a, b) => {
        const priorityDiff = Number(a.alertPriority ?? 1) - Number(b.alertPriority ?? 1);
        if (priorityDiff) return priorityDiff;
        if (a.alertPending && b.alertPending) return Number(b.timestamp || 0) - Number(a.timestamp || 0);
        return Number(a.timestamp || 0) - Number(b.timestamp || 0);
      })
      .map(item => item.html)
      .join('');
    const getTreatmentBadgeClass = (treatment) => {
    const name = String(treatment || '').trim().toLowerCase();
    if (name === '핫팩') return 'treatment-hotpack';
    if (name === '물리치료' || name === 'sw') return 'treatment-physical';
    if (name === '적외선') return 'treatment-infrared';
    if (name === '침' || name === '전침') return 'treatment-acu';
      if (name === '건부항' || name === '습부항') return 'treatment-cupping';
      if (name === '단추' || name === '복추' || name === '추나' || name === '벤치') return 'treatment-chuna';
      if (name === '왕뜸' || name === '전자뜸') return 'treatment-moxa';
      if (/^약침/.test(name)) return 'treatment-pharm';
      if (name === '진찰' || name === '베드진찰') return 'treatment-exam';
      return '';
    };
    const renderTreatmentBadge = (treatment) => {
      const label = String(treatment || '치료').trim() || '치료';
      const className = getTreatmentBadgeClass(label);
      return `<div class="upcoming-time treatment-badge ${className}">${escapeHtml(label)}</div>`;
    };
    const renderTreatmentCompleteLabel = (treatment) => {
      const className = getTreatmentBadgeClass(treatment);
      return `<span class="treatment-complete-label ${className}">완료</span>`;
    };
    const renderTreatmentAlertHtml = (item, options = {}) => {
      const main = options.main || `${item.bedLabel || ''} ${item.name || '환자'}`.trim();
      return `
        <div class="upcoming-item assignment no-dismiss${options.hideBadge ? ' no-label' : ''}">
          ${options.hideBadge ? '' : renderTreatmentBadge(item.treatment)}
          <div>
            <div class="upcoming-main">${escapeHtml(main)}${options.staffLine ? `<span class="upcoming-staff-inline">${options.staffLine}</span>` : ''}</div>
            ${options.sub ? `<div class="upcoming-sub">${options.sub}</div>` : ''}
          </div>
        </div>`;
    };
    const renderDoctorProcedureAlertHtml = (item) => `
      ${renderTreatmentAlertHtml(item)}`;
    const renderSimpleDoctorProcedureAlertHtml = (item) => renderTreatmentAlertHtml(item, { main: item.bedLabel || '' });
    const renderDoctorAlertSplitHtml = () => {
      const doctors = getSortedStaff('doctors').slice(0, 2);
      return Array.from({ length: 2 }, (_, index) => {
        const doctor = doctors[index];
        const doctorId = doctor?.[0] || '';
        const doctorName = doctor?.[1]?.name || '';
        const items = doctorId
          ? getDoctorProcedureAlertItems(doctorId).map(item => ({
            timestamp: Number(item.timestamp || 0),
            html: renderSimpleDoctorProcedureAlertHtml(item)
          }))
          : [];
        const listHtml = items.length
          ? renderAlertItemsHtml(items)
          : `<div class="empty-state"><div class="empty-icon">-</div><div class="empty-text">알림 없음</div></div>`;
        return `
        <div class="doctor-alert-box">
          <div class="doctor-alert-box-title">${doctorName ? escapeHtml(doctorName) : '원장 없음'}</div>
          <div class="doctor-alert-box-list">${listHtml}</div>
        </div>`;
      }).join('');
    };

    const renderBedAssignmentItems = (mode) => getVisibleBedAssignmentAlertItems(mode).map(item => ({
      timestamp: Number(item.timestamp || 0),
      html: `
      <div class="upcoming-item assignment no-dismiss">
        <div class="upcoming-time">배정</div>
        <div>
          <div class="upcoming-main">${escapeHtml(item.message)}</div>
        </div>
      </div>`
    }));
    const inputAssignmentItems = renderBedAssignmentItems('input');
    const receiveModeForAlerts = window.currentMode === 'notify'
      ? 'notify'
      : (window.currentMode === 'receive' ? 'receive' : window.currentMode);
    const receiveAssignmentItems = renderBedAssignmentItems(receiveModeForAlerts);

    const doctorAssignmentItems = getVisibleDoctorAssignmentAlertItems().map(item => ({
      timestamp: Number(item.timestamp || 0),
      html: `
      <div class="upcoming-item assignment no-dismiss">
        <div class="upcoming-time">배정</div>
        <div>
          <div class="upcoming-main">${escapeHtml(item.message)}</div>
        </div>
      </div>`
    }));

    const appointmentItems = [...patientsByKey.entries()]
      .flatMap(([key, data]) => normalizeAppointmentDates(data || {}).map(appointmentDate => ({
        id: `${key}:${appointmentDate}`,

        name: data?.name || '',
        appointmentDate,
        data
      })))
      .filter(item => item.name && shouldShowAppointmentAlertForMode(item.data, window.currentMode, item.appointmentDate))
      .sort((a, b) => String(a.appointmentDate).localeCompare(String(b.appointmentDate)) || String(a.name).localeCompare(String(b.name)));

    const appointmentAlertItems = appointmentItems.map(item => ({
      timestamp: Number(item.data?.appointmentAlert?.timestamp || item.data?.timestamp || 0),
      html: `
      <div class="upcoming-item assignment" onclick="dismissAppointmentAlert('${escapeHtml(item.key)}', '${escapeHtml(item.appointmentDate)}')">
        <div class="upcoming-time">예약</div>
        <div>
          <div class="upcoming-main">${escapeHtml(item.name)}님 ${escapeHtml(formatAppointmentDate(item.appointmentDate))} 예약</div>
        </div>
      </div>`
    }));

    const renderCallItems = (mode) => getVisibleCallAlertItems(mode).map(item => ({
      timestamp: Number(item.timestamp || 0),
      html: `
      <div class="upcoming-item assignment" onclick="dismissDoctorCallAlert('${escapeHtml(item.key)}')">
        <div class="upcoming-time">호출</div>
        <div>
          <div class="upcoming-main">${escapeHtml(item.message)}</div>
        </div>
      </div>`
    }));
    const inputCallItems = renderCallItems('input');
    const receiveCallItems = renderCallItems(receiveModeForAlerts);

    const upcoming = getAllBedEntries()
      .map(({ bed, bedNo }) => {
        const remaining = getRemaining(bed);
        const isAlertPending = Boolean(bed.lastAlertId);
        if (!isAlertPending && (bed.complete || !bed.running || remaining <= 0)) return null;
        const treatment = isAlertPending
          ? getCompletedTreatmentFromAlert(bed)
          : (bed.treatments?.[bed.currentIndex] || '치료');
        return {
          bedNo,
          bedLabel: getBedLabel(bedNo),
          name: bed.name || '',
          doctorName: bed.doctorName || '',
          nurseName: bed.nurseName || '',
          treatment,
          remaining,
          alertPending: isAlertPending,
          timestamp: Number(String(bed.lastAlertId || '').split('-').pop()) || Number(bed.startedAt || bed.timestamp || 0)
        };
      })
      .filter(Boolean)
      .sort((a, b) => {
        if (a.alertPending !== b.alertPending) return a.alertPending ? -1 : 1;
        if (a.alertPending) return Number(b.timestamp || 0) - Number(a.timestamp || 0);
        return Number(a.timestamp || 0) - Number(b.timestamp || 0);
      });

    const timerAlertItems = upcoming.length
      ? upcoming.map(item => {
        const staffLine = [
          item.doctorName ? escapeHtml(item.doctorName) : '',
          item.nurseName ? escapeHtml(item.nurseName) : ''
        ].filter(Boolean).join('/');
        const inlineInfo = [
          staffLine,
          item.alertPending ? '' : formatTimer(item.remaining)
        ].filter(Boolean).join(' · ');
        return {
          alertPending: item.alertPending,
          alertPriority: item.alertPending ? 0 : 1,
          timestamp: Number(item.timestamp || 0),
          html: `
        <div class="upcoming-item">
          ${renderTreatmentBadge(item.treatment)}
          <div>
            <div class="upcoming-main">${escapeHtml(item.bedLabel)} ${escapeHtml(item.name)}${inlineInfo ? `<span class="upcoming-staff-inline">${inlineInfo}</span>` : ''}${item.alertPending ? ` ${renderTreatmentCompleteLabel(item.treatment)}` : ''}</div>
          </div>

        };
      })
      : [];

    const doctorProcedureItems = shouldShowDoctorProcedureAlerts()
      ? getDoctorProcedureAlertItems()
        .map(item => ({
          timestamp: Number(item.timestamp || 0),
          html: renderDoctorProcedureAlertHtml(item)

      : [];

    const receiveTreatmentItems = shouldShowReceiveTreatmentAlerts()
      ? getReceiveTreatmentAlertItems().map(item => {

        ].filter(Boolean).join('/');
        return {
          timestamp: Number(item.timestamp || 0),
          html: renderTreatmentAlertHtml(item, { staffLine })
        };
      })
      : [];

    const receiveTimerItems = (receiveModeForAlerts === 'notify' || receiveModeForAlerts === 'receive') ? timerAlertItems : [];
    const inputItems = [...inputCallItems, ...inputAssignmentItems, ...appointmentAlertItems];
    const receiveItems = [...doctorProcedureItems, ...receiveTreatmentItems, ...doctorAssignmentItems, ...receiveCallItems, ...receiveAssignmentItems, ...appointmentAlertItems, ...receiveTimerItems];
    const baseHasAlerts = inputItems.length > 0;
    const receiveHasAlerts = receiveItems.length > 0;
    const html = baseHasAlerts
      ? renderAlertItemsHtml(inputItems)
      : `<div class="empty-state"><div class="empty-icon">⏱</div><div class="empty-text">진행 중인 타이머가 없습니다</div></div>`;
    const receiveHtml = receiveHasAlerts
      ? renderAlertItemsHtml(receiveItems)

    const inputList = document.getElementById('inputUpcomingAlerts');

  window.dismissAppointmentAlert = async (patientKey, appointmentDate = '') => {
    const field = getAppointmentAlertDismissField();
    if (!patientKey || !field) return;
    const patient = patientsByKey.get(patientKey) || {};
    const date = appointmentDate || normalizeAppointmentDates(patient)[0] || '';
    if (!date) return;
    const appointmentAlerts = {
      ...(patient.appointmentAlerts || {}),
      [date]: {
        ...(patient.appointmentAlerts?.[date] || {}),

        [field]: true,
        ...(field === 'clinicDismissed' ? { receiveDismissed: true, notifyDismissed: true } : {})
      }
    };

    if ((patient.appointmentDate || '') === date) {

        date,
        [field]: true,
        ...(field === 'clinicDismissed' ? { receiveDismissed: true, notifyDismissed: true } : {})
      };

    await update(ref(db, `${PATIENTS_PATH}/${patientKey}`), patch);

    const button = document.getElementById('inputFormToggle');
    const column = panel?.querySelector('.input-form-column');
    const detailColumn = panel?.querySelector('.input-detail-column');
    if (!panel) return;
    panel.classList.toggle('input-form-open', Boolean(open));
    if (column) {
      column.hidden = !open;
      column.style.display = open ? '' : 'none';
    }
    if (detailColumn) {
      detailColumn.hidden = Boolean(open);
      detailColumn.style.display = open ? 'none' : '';
    }
    if (button) {
      button.textContent = open ? '‹' : '›';
      button.dataset.open = open ? '1' : '0';
      button.setAttribute('aria-label', open ? '입력 닫기' : '입력 열기');
      button.title = open ? '입력 닫기' : '입력 열기';
    }
    window.renderBedMonitors?.();
  }

  function resetDeskInputFormDefaults() {
    document.querySelector('input[name="visitType"][value="초진"]')?.click();
    document.querySelector('input[name="gender"][value="남"]')?.click();
    window.clearChartLookupBadge?.();
    resetPCredits('treatmentGrid');
  }

  window.openDeskInputForm = () => {
    setFormEditMode('desk', null);
    populatePatientForm('desk', null);
    resetDeskInputFormDefaults();
    setDeskInputFormOpen(true);
  };

  window.toggleDeskInputForm = () => {
    const isOpen = document.getElementById('inputPanel')?.classList.contains('input-form-open');
    if (isOpen) {
      setDeskInputFormOpen(false);
      setFormEditMode('desk', null);
      populatePatientForm('desk', null);
      resetDeskInputFormDefaults();
    } else {
      window.openDeskInputForm();
    }
  };

  function renderBedSelector() {
    const selector = document.getElementById('bedSelector');
    renderBedSelectorOptions(selector, selectedBedNo);

  }

  function renderBedSelectorOptions(selector, selectedValue) {
    if (!selector) return;
    const doctorBedNums = getDoctorBedNumbers();
    const allBedNums = [...doctorBedNums, ...ACTIVE_BED_NUMBERS];
    selector.innerHTML = allBedNums.map((bedNo) => {
      const bed = getBedData(bedNo);
      const bedLabel = getBedLabel(bedNo);
      const label = bed ? `${bedLabel} - ${bed.name}` : `${bedLabel} - 비어 있음`;
      return `<option value="${bedNo}">${escapeHtml(label)}</option>`;
    }).join('');
    const validNums = allBedNums;
    selector.value = String(validNums.includes(selectedValue) ? selectedValue : (doctorBedNums[0] || 1));
  }

  window.selectBed = (bedNo) => {
    const doctorBedNums = getDoctorBedNumbers();
    if (!ACTIVE_BED_NUMBERS.includes(bedNo) && !doctorBedNums.includes(bedNo)) bedNo = doctorBedNums[0] || 1;
    if (selectedBedNo !== bedNo) bedMovePanelOpenFor = null;
    selectedBedNo = bedNo;
    renderBedSelector();
    renderBedDetail();
    if (document.getElementById('bedPanel')?.classList.contains('bed-schedule-open')) populateBedSchedulePanel();
    if (document.getElementById('bedPanel')?.classList.contains('bed-edit-open')) populateBedEditForm();
    syncFixedBedArrivalOverlay();
  };

  function renderBedDetail() {
    const detail = document.getElementById('bedDetail');
    renderBodyPartSelector();
    populateBedEditForm();
    renderBedDetailInto(detail, selectedBedNo, true);
    updateBedRemainingChip();
    renderBedDoctorAlertPanel();
  }

  function renderReceiveBedDetail() {
    const detail = document.getElementById('receiveBedDetail');
    renderBedDetailInto(detail, selectedReceiveBedNo, true, 'receive');
  }

  function renderBedDetailInto(detail, bedNo, allowControls, context = 'bed') {
    if (!detail) return;
    detail.classList.add('active');
    detail.innerHTML = renderBedDetailMarkup(bedNo, allowControls, context);
    if (context === 'bed') populateBedSchedulePanel();
  }

  function getBedRemainingTreatmentSeconds(bed) {
    if (!bed) return 0;
    const pendingAlertProcedureSeconds = bed.lastAlertId ? getProcedureSeconds() : 0;
    if (bed.complete) return pendingAlertProcedureSeconds;
    const treatments = Array.isArray(bed.treatments) ? bed.treatments : [];
    const currentIndex = Number(bed.currentIndex || 0);
    const remainingTreatments = treatments.slice(currentIndex);
    const currentRemaining = getRemaining(bed);
    const futureSeconds = treatments
      .slice(currentIndex + 1)
      .reduce((sum, treatment) => sum + getTreatmentSeconds(treatment), 0);
    return currentRemaining + futureSeconds + (remainingTreatments.length * getProcedureSeconds()) + pendingAlertProcedureSeconds;
  }

  function updateBedRemainingChip() {
    updateBedHeaderBedChip();
    const chip = document.getElementById('bedRemainingChip');
    if (!chip) return;
    const bed = getBedData(selectedBedNo);
    const minutes = Math.ceil(getBedRemainingTreatmentSeconds(bed) / 60);
    chip.textContent = `남은 진료 시간 ${minutes}분`;
  }
  window.updateBedRemainingChip = updateBedRemainingChip;

  function updateBedHeaderBedChip() {
    const chip = document.getElementById('bedHeaderBedChip');
    if (!chip) return;
    chip.textContent = getBedHeaderLabel(selectedBedNo);
  }

    const bp = bodyParts || {};
    return {

      back: Array.isArray(bp.back) ? bp.back : []

    const map = document.getElementById('bodyMap');

    map.innerHTML = `

  <!-- 좌측 발(후) (SVG우) -->

</g>

  function renderBedDetailTreatmentChips(bed, bedNo) {
    const treatments = Array.isArray(bed.treatments) ? bed.treatments : [];
    if (!treatments.length) {
      return '<span class="bed-treatment-chip waiting">치료 정보 -</span>';
    }

    const currentIndex = Number(bed.currentIndex || 0);
    return treatments.map((treatment, index) => {
      const chipClass = bed.complete
        ? 'done'
        : (index < currentIndex ? 'done' : (index === currentIndex ? 'current' : 'waiting'));
      const treatmentClass = getTreatmentBadgeClass(treatment);
      const runningClass = bed.running && index === currentIndex ? ' running' : '';
      const selectedClass = useClickTreatmentReorder() && selectedBedTreatmentChip?.bedNo === bedNo && selectedBedTreatmentChip.index === index ? ' selected' : '';
      return `<span class="bed-treatment-chip ${treatmentClass} ${chipClass}${runningClass}${selectedClass}" ${bedTreatmentChipAttrs(bedNo, index)}>${escapeHtml(treatment)}</span>`;
    }).join('');
  }

  function renderBodyPartChips(bed) {
    const selectedParts = normalizeBodyParts(bed.bodyParts);
    const parts = [...selectedParts.front, ...selectedParts.back];
    if (!parts.length) return '<span class="bed-meta-chip">치료부위 선택 없음</span>';
    return parts.map(part => `<span class="body-part-chip">${escapeHtml(part)}</span>`).join('');
  }

  function getShortVisitTypeLabel(visitType) {
    const value = String(visitType || '').trim();
    if (!value) return '';
    if (value.includes('초')) return '초진';
    if (value.includes('재')) return '재진';
    return value;
  }

  function getBedNameMetaChips(bed) {

      bed.chartNo ? `${bed.chartNo}` : '',
      getShortVisitTypeLabel(bed.visitType),
      bed.gender || '',
      bed.age ? `${bed.age}세` : ''
    ].filter(Boolean);

    if (!parts.length) return '';
    return `<span class="bed-name-meta">${parts.map(part => `<span class="bed-name-meta-chip">${escapeHtml(part)}</span>`).join('')}</span>`;

  function getBedDetailPatientSummaryChips(bed, includeIdentity = true) {
    const identityParts = includeIdentity ? [
      bed.chartNo ? `${bed.chartNo}번` : '',
      bed.visitType || '',
      bed.gender || '',
      bed.age ? `${bed.age}세` : ''

      bed.chiefComplaint || '',

    const targets = getBedMoveTargetNumbers();

      const detail = occupied ? (targetBed.name || '환자') : '비어 있음';
      return `
        <button class="bed-move-target ${occupied ? 'occupied' : 'empty'}" type="button"
          ${isCurrent ? 'disabled' : `onclick="selectBedMoveTarget(${bedNo}, ${targetNo})"`}>

    const patientSummary = getBedDetailPatientSummaryChips(bed, options.includeIdentity !== false);
    const infoChips = [
      bed.doctorName || '-',

  function getPostTreatmentPackageBalanceMessage(bed, packages, balances) {
    const treatments = Array.isArray(bed?.treatments) ? bed.treatments : [];
    if (!treatments.length) return '';

    const normalizedTreatments = treatments.map(treatment => String(treatment || '').replace(/\s+/g, ''));
    const treatmentIds = getTreatmentIdsFromNames(treatments);
    const hasChuna = normalizedTreatments.some(name => name.includes('추나') || name === '단추' || name === '복추');
    const unitMapById = {
      pharmacopuncture_1: hasChuna ? 0.5 : 1,
      pharmacopuncture_2: hasChuna ? 1 : 2,
      pharmacopuncture_3: hasChuna ? 1 : 2,
      pharmacopuncture_4: hasChuna ? 2 : 4
    };
    const deduction = treatmentIds.reduce((sum, id) => sum + (unitMapById[id] || 0), 0);

    const hasPackageRecord = (key) => {
      const pkg = packages?.[key] || {};
      return Number(pkg.openingQty || 0) > 0
        || normalizePackageEntries(pkg.purchases, 'purchase').length > 0
        || normalizePackageEntries(pkg.usages, 'usage').length > 0
        || Number(balances[key] || 0) > 0;
    };

    const messages = [];
    const targetKey = hasPackageRecord('p13') ? 'p13' : (hasPackageRecord('p6') ? 'p6' : '');
    if (deduction && targetKey) {
      const afterBalance = Number(balances[targetKey] || 0) - deduction;
      messages.push(`오늘 치료 후 ${targetKey} 잔여량은 ${afterBalance} 입니다`);
    }

    const specialDeductions = [
      { key: 'p자하거', treatment: '약침자' },
      { key: 'p라인', treatment: '약침l' }
    ];
    specialDeductions.forEach(({ key, treatment }) => {
      const treatmentId = treatment.toLowerCase().includes('l') ? 'pharmacopuncture_L' : 'pharmacopuncture_ja';
      const treatmentCount = countTreatmentId(treatmentIds, treatmentId);
      if (!treatmentCount || !hasPackageRecord(key)) return;
      const afterBalance = Number(balances[key] || 0) - treatmentCount;
      messages.push(`오늘 치료 후 ${key} 잔여량은 ${afterBalance} 입니다`);
    });

    return messages.join(' / ');
  }

  function renderBedPackageBalanceBox(bed) {
    const patient = bed?.patientKey ? patientsByKey.get(bed.patientKey) : null;
    const packages = getPackageStateFromPatient(patient || {});

    return `

  function renderBedDetailMarkup(bedNo, allowControls, context = 'bed') {

    if (!bed) {

    return `

          </div>
          <div class="bed-time">${escapeHtml(bed.timeStr || '')}</div>
        </div>
        ${renderBedDetailPatientInfo(bed, bedNo, allowControls && context === 'bed')}
        ${bed.lastAlertId ? `<div class="bed-alert-card">
          <div class="bed-alert-message">${escapeHtml(bed.lastAlertMessage || `${bed.name || ''} 치료 완료`)}</div>
          <button class="bed-alert-btn" onclick="acknowledgeBedAlert(${bedNo})">알림 확인</button>
        </div>` : ''}
        <div class="timer-list">
          ${bed.complete ? renderCompleteCard(bedNo, bed, allowControls, context) : renderTimerCard(bedNo, bed, currentTreatment, allowControls, context)}
        </div>
        ${allowControls && context === 'bed' ? renderBedSchedulePanelMarkup() : ''}
        ${allowControls && context !== 'bed' && !bed.complete ? `<button class="bed-clear-btn" onclick="confirmClearBedNumber(${bedNo})">베드 비우기</button>` : ''}
      </div>`;
  }

  function getRemaining(bed) {
    if (!bed || bed.complete) return 0;
    const baseRemaining = Number(bed.remaining || 0);
    if (!bed.running || !bed.startedAt) return Math.max(0, baseRemaining);
    return Math.max(0, baseRemaining - Math.floor((Date.now() - bed.startedAt) / 1000));
  }

  // 타이머 불필요 치료 (시행완료 버튼만 표시)
  const NO_TIMER_TREATMENTS = new Set(['진찰', '베드진찰', '단추', '복추', '추나']);
  function isNoTimerTreatment(name) {
    if (!name) return false;
    if (NO_TIMER_TREATMENTS.has(name)) return true;
    if (/약침/.test(name)) return true;
    return false;
  }

  function renderTimerCard(bedNo, bed, treatment, allowControls = true, context = 'bed') {
    const noTimer = isNoTimerTreatment(treatment);
    const remaining = getRemaining(bed);
    const percent = bed.total ? Math.max(0, Math.min(100, (remaining / bed.total) * 100)) : 0;
    const timerId = `${context}-timer-bed-${bedNo}`;
    const clockId = `${context}-timer-clock-bed-${bedNo}`;
    const barId = `${context}-timer-bar-bed-${bedNo}`;
    const inputId = `${context}-timer-minutes-bed-${bedNo}`;
    const toggleLabel = bed.running ? '일시정지' : '시작';
    const toggleClass = bed.running ? 'pause' : 'primary';
    const isBedContext = context === 'bed';
    const editableClockAttrs = allowControls && isBedContext
      ? ` timer-clock-editable" role="button" tabindex="0" title="클릭해서 시간 수정" data-timer-edit-bed="${bedNo}"`
      : '"';

    if (noTimer) {
      return `
        <div class="timer-card" id="${timerId}">
          <div class="timer-top">
            <div>
              <div class="timer-treatment">${escapeHtml(treatment)}</div>
              <div class="timer-step">${bed.currentIndex + 1}/${bed.treatments.length}번째 치료</div>
            </div>
          </div>
          ${allowControls ? `<div class="timer-actions${isBedContext ? ' bed-timer-actions' : ''}">
            <button class="timer-btn" onclick="moveTreatment(${bedNo}, -1)" ${bed.currentIndex <= 0 ? 'disabled' : ''}>이전 치료</button>
            <button class="timer-btn primary" onclick="completeNoTimerTreatment(${bedNo})">시행완료</button>
          </div>` : ''}
        </div>`;
    }

    return `
      <div class="timer-card" id="${timerId}">
        <div class="timer-top">
          <div>
            <div class="timer-treatment">${escapeHtml(treatment)}</div>
            <div class="timer-step">${bed.currentIndex + 1}/${bed.treatments.length}번째 치료</div>
          </div>
          <div class="timer-clock${editableClockAttrs} id="${clockId}">${formatTimer(remaining)}</div>
        </div>
        <div class="timer-progress"><div class="timer-bar" id="${barId}" style="width:${percent}%"></div></div>
        ${allowControls ? `<div class="treatment-nav">
          <button class="timer-btn" onclick="moveTreatment(${bedNo}, -1)" ${bed.currentIndex <= 0 ? 'disabled' : ''}>이전 치료</button>
          <button class="timer-btn" onclick="moveTreatment(${bedNo}, 1)" ${bed.currentIndex >= bed.treatments.length - 1 ? 'disabled' : ''}>이후 치료</button>
        </div>` : ''}
        ${allowControls && !isBedContext ? `<div class="timer-settings">
          <input class="timer-minute-input" id="${inputId}" type="number" min="1" max="120" step="1" value="${Math.max(1, Math.round(bed.total / 60))}" aria-label="타이머 시간 분">
          <button class="timer-set-btn" onclick="setTimerMinutes(${bedNo}, '${context}')">시간 설정</button>
        </div>` : ''}
        ${allowControls ? `<div class="timer-actions${isBedContext ? ' bed-timer-actions' : ''}">
          <button class="timer-btn ${toggleClass}" onclick="toggleTimer(${bedNo})">${toggleLabel}</button>
          ${isBedContext ? '' : `<button class="timer-btn" onclick="resetTimer(${bedNo})">초기화</button>`}
        </div>` : ''}
      </div>`;
  }

  function renderCompleteCard(bedNo, bed, allowControls = true, context = 'bed') {
    return `
      <div class="timer-card done">
        <div class="timer-top">
          <div>
            <div class="timer-treatment">모든 치료 완료</div>
            <div class="timer-step">${(bed.treatments || []).map(escapeHtml).join(' → ')}</div>
          </div>
          <div class="timer-clock">완료</div>
        </div>
        ${allowControls ? `<div class="treatment-nav">
          <button class="timer-btn" onclick="moveTreatment(${bedNo}, -1)" ${(bed.currentIndex || 0) <= 0 ? 'disabled' : ''}>이전 치료</button>
          <button class="timer-btn" disabled>이후 치료</button>
        </div>
        ${context === 'bed' ? '' : `<button class="bed-clear-btn" onclick="confirmClearBedNumber(${bedNo})">베드 비우기</button>`}` : ''}
      </div>`;
  }

  function updateTimerDom(bedNo) {
    const bed = getBedData(bedNo);
    if (!bed) return;

    const remaining = getRemaining(bed);
    const percent = bed.total ? Math.max(0, Math.min(100, (remaining / bed.total) * 100)) : 0;

    ['bed', 'receive'].forEach(context => {
      const clock = document.getElementById(`${context}-timer-clock-bed-${bedNo}`);
      const bar = document.getElementById(`${context}-timer-bar-bed-${bedNo}`);
      const card = document.getElementById(`${context}-timer-bed-${bedNo}`);

      if (clock) clock.textContent = formatTimer(remaining);
      if (bar) bar.style.width = `${percent}%`;
      if (card) card.classList.toggle('done', remaining <= 0);
    });
    renderBedMonitors();
    renderUpcomingAlerts();
    if (bedNo === selectedBedNo) updateBedRemainingChip();
  }

  window.startTimer = async (bedNo) => {
    const bed = getBedData(bedNo);
    if (!bed || bed.running || bed.complete || getRemaining(bed) <= 0) return;

    await updateBedRecord(bedNo, {
      running: true,
      startedAt: Date.now(),
      remaining: getRemaining(bed)
    });
    playTimerStartSound();
  };

  window.toggleTimer = async (bedNo) => {
    const bed = getBedData(bedNo);
    if (!bed || bed.complete || getRemaining(bed) <= 0) return;
    if (bed.running) {
      await pauseTimer(bedNo);
    } else {
      await startTimer(bedNo);
    }
  };

  async function finishBedStep(bedNo) {
    if (finishingBeds.has(bedNo)) return;
    finishingBeds.add(bedNo);

    const bedBefore = getBedData(bedNo);
    const completedTreatment = bedBefore?.treatments?.[bedBefore.currentIndex] || '치료';
    const patientName = bedBefore?.name || '';
    const alertId = `${bedBefore?.patientKey || bedNo}-${bedBefore?.currentIndex || 0}-${Date.now()}`;

    const result = await runBedRecordTransaction(bedNo, (bed) => {
      if (!bed || bed.complete) return bed;

      const remaining = getRemaining(bed);
      if (!bed.running || remaining > 0) return bed;

      const treatments = bed.treatments || [];
      const currentTreatment = treatments[bed.currentIndex];
      const followingTreatment = treatments[bed.currentIndex + 1];
      const nextIndex = bed.currentIndex + (isNeedleMoxaPair(currentTreatment, followingTreatment) ? 2 : 1);
      if (nextIndex >= treatments.length) {
        return {
          ...bed,
          running: false,
          startedAt: null,
          remaining: 0,
          complete: true,
          lastAlertId: alertId,
          lastAlertMessage: `${bedNo}번 베드 ${bed.name} · ${currentTreatment} 완료`,
          doctorProcedureAlert: null
        };
      }

      const nextTotal = getTreatmentSeconds(treatments[nextIndex]);
      return {
        ...bed,
        currentIndex: nextIndex,
        total: nextTotal,
        remaining: nextTotal,
        running: false,
        startedAt: null,
        complete: false,
        lastAlertId: alertId,
        lastAlertMessage: `${bedNo}번 베드 ${bed.name} · ${currentTreatment} 완료`,
        doctorProcedureAlert: null
      };
    });

    finishingBeds.delete(bedNo);

    if (result.committed && bedBefore) {
      if (!queuedTimerAlerts.has(alertId)) {
        showTimerCompleteAlert(`${bedNo}번 베드 ${patientName} · ${completedTreatment} 완료`, bedNo, alertId);
      }
      seenTimerAlerts.add(alertId);
    }
  }

  window.pauseTimer = async (bedNo) => {
    const bed = getBedData(bedNo);
    if (!bed) return;

    await updateBedRecord(bedNo, {
      running: false,
      startedAt: null,
      remaining: getRemaining(bed)
    });
  };

  window.toggleBodyPart = async (side, part) => {
    const bed = getBedData(selectedBedNo);
    if (!bed || !BODY_PARTS[side]) return;

    const bodyParts = normalizeBodyParts(bed.bodyParts);
    const current = new Set(bodyParts[side]);
    if (current.has(part)) {
      current.delete(part);
    } else {
      current.add(part);
    }

    const nextBodyParts = {
      ...bodyParts,
      [side]: [...current]
    };

    const updates = [
      updateBedRecord(selectedBedNo, { bodyParts: nextBodyParts })
    ];

    if (bed.patientKey) {
      updates.push(update(ref(db, `${PATIENTS_PATH}/${bed.patientKey}`), { bodyParts: nextBodyParts }));
    }

    await Promise.all(updates);
  };

  window.toggleFormBodyPart = (scope, side, part) => {
    if (!BODY_PARTS[side]) return;
    const currentParts = normalizeBodyParts(formBodyPartsByScope[scope]);
    const current = new Set(currentParts[side]);
    if (current.has(part)) {
      current.delete(part);
    } else {
      current.add(part);
    }

    formBodyPartsByScope[scope] = {
      ...currentParts,
      [side]: [...current]
    };
    renderFormBodyPartSelector(scope);
    scheduleSelectFieldSave(scope);
  };

  // ── 선택 필드 즉시 자동저장 (edit mode 전용) ────────────────────────
  const _selectSaveTimers = {};

  function scheduleSelectFieldSave(scope, delay = 250) {
    clearTimeout(_selectSaveTimers[scope]);
    _selectSaveTimers[scope] = setTimeout(() => autoSaveSelectFields(scope), delay);
  }

  function getScopeFromGridId(gridId) {
    for (const [scope, ids] of Object.entries(PATIENT_FORM_IDS)) {
      if (ids.treatmentGrid === gridId) return scope;
    }
    return null;
  }

  async function autoSaveSelectFields(scope) {
    const bedNo = scope === 'bed' ? selectedBedNo : formEditBedNoByScope[scope];
    if (!bedNo) return;
    const bed = getBedData(bedNo);
    if (!bed) return;

    const form = getFormValues(scope);
    if (!form.treatments.length) return;

    const currentTreatment = bed.treatments?.[bed.currentIndex || 0];
    const nextIdx = Math.min(bed.currentIndex || 0, form.treatments.length - 1);
    const nextTreatment = form.treatments[nextIdx];
    const treatmentChanged = currentTreatment !== nextTreatment;
    const timerUpdates = treatmentChanged ? {
      currentIndex: nextIdx,
      total: getTreatmentSeconds(nextTreatment),
      remaining: getTreatmentSeconds(nextTreatment),
      running: false, startedAt: null, complete: false,
      lastAlertId: null, lastAlertMessage: null,
      doctorProcedureAlert: null
    } : {};

    const payload = {
      treatments: form.treatments,
      doctorId: form.doctor.id,
      doctorName: form.doctor.name,
      nurseId: form.nurse.id,
      nurseName: form.nurse.name,
      bodyParts: form.bodyParts
    };
    const previousBedState = { ...bed };
    Object.assign(bed, payload, timerUpdates);
    if (bed.patientKey) {
      patientsByKey.set(bed.patientKey, {
        ...(patientsByKey.get(bed.patientKey) || {}),
        ...payload
      });
    }

  function parseTimerEditSeconds(value) {
    const text = String(value || '').trim();
    if (!text) return null;
    if (text.includes(':')) {
      const parts = text.split(':').map(part => Number(part.trim()));
      if (parts.length !== 2 || parts.some(part => !Number.isFinite(part))) return null;
      const [minutes, seconds] = parts;
      if (minutes < 0 || seconds < 0 || seconds >= 60) return null;
      return Math.round((minutes * 60) + seconds);
    }
    const minutes = Number(text);
    if (!Number.isFinite(minutes) || minutes <= 0) return null;
    return Math.round(minutes * 60);
  }

  window.moveOrSwapBed = async (fromBedNo, toBedNo) => {
    if (fromBedNo === toBedNo) return false;

    const fromBed = getBedData(fromBedNo);
    if (!fromBed) return false;
    const hadTargetBed = Boolean(getBedData(toBedNo));

    const result = await runBedsRecordTransaction((beds) => {
      beds = beds || {};
      const fromKey = String(fromBedNo);
      const toKey = String(toBedNo);
      const movingBed = beds[fromKey];
      if (!movingBed) return;

      const targetBed = beds[toKey] || null;
      if (targetBed) {
        beds[fromKey] = targetBed;
        beds[toKey] = movingBed;
      } else {
        beds[toKey] = movingBed;
        delete beds[fromKey];
      }
      return beds;
    });

    if (result.committed) {
      const movedBeds = result.snapshot.val() || {};
      await Promise.all([
        updatePatientBedNoForBed(fromBedNo, movedBeds[String(fromBedNo)]),
        updatePatientBedNoForBed(toBedNo, movedBeds[String(toBedNo)])
      ]);
      const assignmentAlertPromises = [];
      if (Number(fromBedNo) >= 101 && movedBeds[String(fromBedNo)]?.patientKey) {
        assignmentAlertPromises.push(createBedAssignmentAlert(
          movedBeds[String(fromBedNo)].patientKey,
          movedBeds[String(fromBedNo)],
          Number(fromBedNo)
        ));
      }
      if (Number(toBedNo) >= 101 && movedBeds[String(toBedNo)]?.patientKey) {
        assignmentAlertPromises.push(createBedAssignmentAlert(
          movedBeds[String(toBedNo)].patientKey,
          movedBeds[String(toBedNo)],
          Number(toBedNo)
        ));
      }
      if (assignmentAlertPromises.length) await Promise.all(assignmentAlertPromises);
      remapLocalAlertBedNo(movedBeds[String(fromBedNo)]?.lastAlertId, fromBedNo);
      remapLocalAlertBedNo(movedBeds[String(toBedNo)]?.lastAlertId, toBedNo);
      showToast(hadTargetBed
        ? `${getBedLabel(fromBedNo)} ${getBedLabel(toBedNo)} 교환`
        : `${getBedLabel(fromBedNo)} → ${getBedLabel(toBedNo)} 이동 완료`);

    }

  };

  async function swapTreatmentInBed(bedNo, fromIndex, toIndex) {

    const treatments = [...(bed.treatments || [])];
    if (!treatments[fromIndex] || !treatments[toIndex] || fromIndex === toIndex) return;
    [treatments[fromIndex], treatments[toIndex]] = [treatments[toIndex], treatments[fromIndex]];

    const currentIndex = Number(bed.currentIndex || 0);
    let nextCurrentIndex = currentIndex;
    if (currentIndex === fromIndex) nextCurrentIndex = toIndex;
    else if (currentIndex === toIndex) nextCurrentIndex = fromIndex;
    nextCurrentIndex = Math.max(0, Math.min(treatments.length - 1, nextCurrentIndex));

    try {
      await updateBedRecord(bedNo, {
        treatments,
        currentIndex: nextCurrentIndex
      });
      if (bed.patientKey) {
        await update(ref(db, `${PATIENTS_PATH}/${bed.patientKey}`), { treatments });

    const [moved] = treatments.splice(fromIndex, 1);
    treatments.splice(toIndex, 0, moved);

    const currentIndex = Number(bed.currentIndex || 0);
    let nextCurrentIndex = currentIndex;
    if (fromIndex === currentIndex) {
      nextCurrentIndex = toIndex;
    } else if (fromIndex < currentIndex && toIndex >= currentIndex) {
      nextCurrentIndex = currentIndex - 1;
    } else if (fromIndex > currentIndex && toIndex <= currentIndex) {
      nextCurrentIndex = currentIndex + 1;
    }
    nextCurrentIndex = Math.max(0, Math.min(treatments.length - 1, nextCurrentIndex));

      return { bedNo, bedLabel, empty: true, stageState: 'empty', stageLabel: '비어 있음' };
    }

    const treatments = bed.treatments || [];
    const currentIndex = Number(bed.currentIndex || 0);
    const treatment = bed.complete ? '완료' : treatments[currentIndex];
    const remainingSeconds = getRemaining(bed);
    const totalSeconds = Number(bed.total || 0);
    const previousTreatment = currentIndex > 0 ? treatments[currentIndex - 1] : '';
    const lastTreatment = treatments[treatments.length - 1] || '';
    const procedureBlinking = isDoctorProcedureBlinking(bedNo, bed);
    const statusLabel = bed.complete
      ? (lastTreatment ? `${lastTreatment} 완료` : '완료')
      : (previousTreatment ? `${previousTreatment} 완료 ${treatment} 준비` : `${treatment} 준비`);
    const isWaitingToStart = !bed.complete && !bed.running && remainingSeconds >= totalSeconds;
    const stageState = bed.complete
      ? 'complete'
      : (bed.running ? 'running' : (isWaitingToStart ? 'ready' : 'paused'));
    const stageLabel = bed.complete
      ? '완료'
      : (bed.running ? '진행중' : (isWaitingToStart ? '시작 전' : '일시정지'));
    return {
      bedNo,
      bedLabel,
      empty: false,
      complete: bed.complete,
      alerting: Boolean(bed.lastAlertId),
      name: bed.name,
      doctorName: bed.doctorName || '',
      nurseName: bed.nurseName || '',
      treatment,
      statusLabel,
      stageState,
      stageLabel,
      statusDetail: bed.running ? `${treatment} 진행중` : (isWaitingToStart ? statusLabel : treatment),
      noTimer: !bed.complete && isNoTimerTreatment(treatments[currentIndex]),
      procedureBlinking,
      remaining: bed.complete ? '완료' : formatTimer(remainingSeconds),
      currentIndex,
      treatments,
      timeStr: bed.timeStr || '',
      visitType: bed.visitType || '',
      gender: bed.gender || '',
      age: bed.age || '',
      chiefComplaint: bed.chiefComplaint || '',
      memo: bed.memo || '',
      bodyParts: normalizeBodyParts(bed.bodyParts),
      pCredits: getPCreditsFromPatient(bed.patientKey ? patientsByKey.get(bed.patientKey) : {})
    };
  }

  function renderBedPopover(status) {
    if (status.empty) {
      return `
        <div class="bed-popover">
          <div class="bed-popover-title">${escapeHtml(status.bedLabel)}</div>
          <div class="bed-popover-line">현재 비어 있습니다</div>
        </div>`;
    }

    const chips = status.treatments.map((treatment, index) => {
      const chipClass = status.complete
        ? 'done'
        : (index < status.currentIndex ? 'done' : (index === status.currentIndex ? 'current' : 'waiting'));
      const treatmentClass = getTreatmentBadgeClass(treatment);
      const runningClass = status.stageState === 'running' && index === status.currentIndex ? ' running' : '';
      return `<span class="bed-treatment-chip ${treatmentClass} ${chipClass}${runningClass}">${escapeHtml(treatment)}</span>`;
    }).join('');
    const densityClass = status.treatments.length >= 9
      ? ' ultra-dense'
      : status.treatments.length >= 6
        ? ' dense'
        : '';

    return `
      <div class="bed-popover">
        <div class="bed-treatment-strip${densityClass}">${chips}</div>

  function renderBedStatusCard(status, context) {
    const isReceive = context === 'receive';
    const isInput = context === 'input';

    const compact = (isInput && document.getElementById('inputPanel')?.classList.contains('input-form-open'))

    const isEditingBed = compact && editingBedNo && status.bedNo === editingBedNo;
    const activeClass = [
      isEditingBed ? ' selected' : '',

      canMoveBed && selectedMoveBedNo && status.bedNo !== selectedMoveBedNo ? ' move-target' : ''
    ].join('');

          <div class="bed-status-top">
            <span class="bed-status-no">${compact ? escapeHtml(compactLabel) : `${escapeHtml(status.bedLabel)} 비어 있음`}</span>
            ${compact ? '' : '<span class="bed-status-time">-</span>'}
          </div>
          ${compact ? '' : '<div class="bed-status-treatment"><span class="bed-stage-badge empty">비어 있음</span></div>'}
          ${compact ? '' : renderBedPopover(status)}
        </div>`;
    }

    const clickAction = canMoveBed ? `handleInputBedClick(${status.bedNo})` : `selectReceiveBed(${status.bedNo})`;
    const dragHandlers = canMoveBed
      ? ` draggable="true" ondragstart="handleBedDragStart(event, ${status.bedNo})" ondragover="handleBedDragOver(event, ${status.bedNo})" ondrop="handleBedDrop(event, ${status.bedNo})" ondragend="handleBedDragEnd()"`
      : '';
    const infoChips = [
      status.gender ? `<span class="bed-meta-chip bed-meta-chip--fixed">${escapeHtml(status.gender)}</span>` : '',
      !isReceive && status.age ? `<span class="bed-meta-chip bed-meta-chip--fixed">${escapeHtml(String(status.age))}세</span>` : '',
      status.doctorName ? `<span class="bed-meta-chip">${escapeHtml(status.doctorName)}</span>` : '',
      status.nurseName ? `<span class="bed-meta-chip">${escapeHtml(status.nurseName)}</span>` : '',
    ].filter(Boolean).join('');
    const staffHtml = [
      status.memo ? `<span class="bed-meta-chip bed-meta-chip--flex">메모있음</span>` : ''
    ].filter(Boolean).join('');
    const compactName = `${getCompactBedMarker(status.bedNo)} ${status.name}`;
    return `
      <div class="bed-status${compact ? ' compact' : ''}${status.complete ? ' done' : ' active'}${activeClass}${status.alerting ? ' alerting' : ''}" tabindex="0" onclick="${clickAction}"${dragHandlers}>
        <div class="bed-status-top">
          <span class="bed-status-no">${compact ? escapeHtml(compactName) : `${escapeHtml(status.bedLabel)} ${escapeHtml(status.name)}`}</span>
          ${compact ? '' : `<span class="bed-status-time">${status.noTimer ? '' : escapeHtml(status.remaining)}</span>`}
        </div>
        ${compact ? '' : (infoChips ? `<div class="bed-status-info">${infoChips}</div>` : '')}
        ${compact ? '' : (staffHtml ? `<div class="bed-status-treatment">${staffHtml}</div>` : '')}

    const receivePanelActive = document.getElementById('receivePanel')?.classList.contains('active');
    if (view) return view === 'doctor' && receivePanelActive;

  function isDoctorProcedureTreatment(treatment) {
    const name = String(treatment || '').trim();
    if (/약침/.test(name)) return true;
    return new Set([
      '왕뜸',
      '전자뜸',
      '전침',
      '진료',
      '진찰',
      '베드진찰',
      '단추',
      '복추',
      '추나',
      '침',
      '건부항',
      '습부항'
    ]).has(name);
  }

  function getDoctorProcedureAlertId(bedNo, bed, treatment) {
    return `${bed.patientKey || bed.chartNo || bedNo}:${bedNo}:${Number(bed.currentIndex || 0)}:${treatment}`;
  }

  function getCurrentDoctorProcedureAlertId(bedNo, bed) {
    if (!bed || bed.complete) return '';
    const treatment = bed.treatments?.[bed.currentIndex || 0] || '';
    if (!isDoctorProcedureTreatment(treatment)) return '';
    return getDoctorProcedureAlertId(bedNo, bed, treatment);
  }

  function isDoctorProcedureAlertDismissed(bedNo, bed) {
    const alertId = getCurrentDoctorProcedureAlertId(bedNo, bed);
    return Boolean(alertId && bed?.doctorProcedureAlert?.id === alertId && bed.doctorProcedureAlert.dismissed);
  }

  function isDoctorProcedureBlinking(bedNo, bed) {
    // 원장실 시술 알림 확인 기능 제거 → 확인에 의한 점멸 없음
    return false;
  }

  function getDoctorProcedureAlertItems(doctorId = selectedDoctorAlertId) {
    if (!doctorId) return [];
    return [...getDoctorBedNumbers(), ...ACTIVE_BED_NUMBERS]
      .map(bedNo => ({ bedNo, bed: getBedData(bedNo) }))
      .filter(({ bed }) => {
        if (!bed || bed.complete || bed.running) return false;
        if (bed.doctorId !== doctorId) return false;
        const treatment = bed.treatments?.[bed.currentIndex || 0];
        return isDoctorProcedureTreatment(treatment);
      })
      .map(({ bedNo, bed }) => {
        const treatment = bed.treatments?.[bed.currentIndex || 0] || '침';
        const alertId = getDoctorProcedureAlertId(bedNo, bed, treatment);
        if (isDoctorProcedureAlertDismissed(bedNo, bed)) return null;
        return {
          alertId,
          bedNo,
          doctorId: bed.doctorId || '',
          bedLabel: getBedLabel(bedNo),
          name: bed.name || '',
          treatment,
          timestamp: Number(bed.doctorProcedureAlert?.dismissedAt || bed.startedAt || bed.timestamp || 0),
          message: `${getBedLabel(bedNo)} ${bed.name || '환자'} ${treatment}`
        };
      })
      .filter(Boolean);

  // ── 치료실/치료실알림 치료 시작 알림 (핫팩·물리치료·적외선) ──
  // 원장 시술 알림과 동일: 해당 치료가 현재 단계이고 아직 시작 안 했을 때 표시,
  // 베드에서 타이머 시작(running) 또는 치료 완료 시 자동으로 사라짐. 알림 클릭 삭제 불가.

  function shouldShowReceiveTreatmentAlerts() {

    const receivePanelActive = document.getElementById('receivePanel')?.classList.contains('active');

  function getReceiveTreatmentAlertItems() {

        };

  function syncAssignedPatientKeys(showNewAssignments = false) {
    const allBeds = [
      ...bedAssignments.map((bed, index) => bed ? { bed, bedNo: index + 1 } : null).filter(Boolean),
      ...Object.entries(doctorBedMap).map(([bedNo, bed]) => ({ bed, bedNo: Number(bedNo) }))
    ];
    allBeds.forEach(({ bed, bedNo }) => {
      if (Number(bedNo) >= 101) return;
      if (!bed?.patientKey) return;
      const alreadyKnown = knownAssignedPatientKeys.has(bed.patientKey);
      knownAssignedPatientKeys.add(bed.patientKey);
      const isNewAfterPageLoad = Number(bed.timestamp || 0) > pageLoadedAt;
      if (!alreadyKnown && shouldShowAssignmentAlerts() && (showNewAssignments || isNewAfterPageLoad)) {
        const staffLine = [
          bed.doctorName ? `원장 ${escapeHtml(bed.doctorName)}` : '',
          bed.nurseName ? `간호사 ${escapeHtml(bed.nurseName)}` : ''
        ].filter(Boolean).join(' · ');
        assignmentAlertItems.unshift({
          id: `${bed.patientKey}-${bedNo}-${Date.now()}`,
          name: bed.name || '',
          bedLabel: getBedLabel(bedNo),
          staffLine
        });
        renderUpcomingAlerts();
      }
    });
  }

  function getActiveBedAlertIds() {
    return new Set(getAllBedEntries().map(({ bed }) => bed?.lastAlertId).filter(Boolean));
  }

  function syncTimerAlertsWithBeds() {
    const activeAlertIds = getActiveBedAlertIds();
    let changed = false;

    if (activeTimerAlert?.alertId && !activeAlertIds.has(activeTimerAlert.alertId)) {
      activeTimerAlert = null;
      isTimerAlertOpen = false;
      document.getElementById('timerAlertOverlay').classList.remove('show');
      stopTimerAlertBeeps();
      changed = true;
    }

    for (let i = timerAlertQueue.length - 1; i >= 0; i--) {
      const alert = timerAlertQueue[i];
      if (alert.alertId && !activeAlertIds.has(alert.alertId)) {
        timerAlertQueue.splice(i, 1);
        changed = true;
      }
    }

    queuedTimerAlerts.forEach(alertId => {
      if (!activeAlertIds.has(alertId)) queuedTimerAlerts.delete(alertId);
    });
    seenTimerAlerts.forEach(alertId => {
      if (!activeAlertIds.has(alertId)) seenTimerAlerts.delete(alertId);
    });

    if (changed) syncPendingTimerAlertBeds();
  }

  function handleRemoteTimerAlerts(markOnly = false) {
    getAllBedEntries().forEach(({ bed, bedNo }) => {
      if (!bed?.lastAlertId || seenTimerAlerts.has(bed.lastAlertId)) return;
      seenTimerAlerts.add(bed.lastAlertId);
      if (markOnly) return;
      showTimerCompleteAlert(bed.lastAlertMessage || `${bed.name || ''} 치료 완료`, bedNo, bed.lastAlertId);
    });

  window.toggleBedPopover = (el) => {
    document.querySelectorAll('.bed-status.open').forEach(item => {

    el.classList.toggle('open');
