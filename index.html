  function renderBedDetailTreatmentChips(bed, bedNo) {
    const treatments = Array.isArray(bed.treatments) ? bed.treatments : [];
    if (!treatments.length) {
      return '<span class="bed-treatment-chip waiting">치료 미선택</span>';
    }

    const currentIndex = Number(bed.currentIndex || 0);
    const addedIndexes = new Set(normalizeAddedTreatmentIndexes(bed.addedTreatmentIndexes, treatments));
    const preCompletedIndexes = getPreCompletedTreatmentIndexSet(bed, treatments);
    return treatments.map((treatment, index) => {
      const chipClass = bed.complete
        ? 'done'
        : (index < currentIndex || preCompletedIndexes.has(index) ? 'done' : (index === currentIndex ? 'current' : 'waiting'));
      const treatmentClass = getTreatmentBadgeClass(treatment);
      const runningClass = shouldBlinkTreatmentChip(treatments, currentIndex, index, bed.running) ? ' running' : '';
      const addedClass = addedIndexes.has(index) ? ' added' : '';
      const content = escapeHtml(treatment);
      return `<span class="bed-treatment-chip ${treatmentClass} ${chipClass}${runningClass}${addedClass}" ${bedTreatmentChipAttrs(bedNo, index)}>${content}</span>`;
    }).join('');
  }

  function renderBodyPartChips(bed) {
    const selectedParts = normalizeBodyParts(bed.bodyParts);
    const parts = [...selectedParts.front, ...selectedParts.back];
    if (!parts.length) return '<span class="bed-meta-chip">치료부위 선택 없음</span>';
    return parts.map(part => `<span class="body-part-chip">${escapeHtml(part)}</span>`).join('');
  }

  function getShortVisitTypeLabel(visitType) {
    const value = String(visitType || '').trim();
    if (!value) return '';
    if (value.includes('초')) return '초진';
    if (value.includes('재')) return '재진';
    return value;
  }

  // 보험종별 → 베드 칩 라벨. 미해당/일반 건강보험은 빈 문자열(칩 미표시).
  function getInsuranceChipLabel(insuranceType) {
    const value = String(insuranceType || '').trim();
    if (!value) return '';
    if (value.startsWith('자보')) return 'TA';
    if (value.includes('2종')) return '2종';
    if (value.includes('1종')) return '1종';
    if (value.includes('비보험')) return '비보험';
    if (value.includes('건강보험')) return '';
    return '';
  }

  function getBedNameMetaChips(bed) {
    const chip = (text, cls = '') => `<span class="bed-name-meta-chip${cls}">${escapeHtml(text)}</span>`;
    const insuranceLabel = getInsuranceChipLabel(bed.insuranceType);
    const chips = [];
    if (bed.chartNo) chips.push(chip(`${bed.chartNo}`));
    if (getShortVisitTypeLabel(bed.visitType)) chips.push(chip(getShortVisitTypeLabel(bed.visitType)));
    if (bed.gender) chips.push(chip(bed.gender));
    if (insuranceLabel) chips.push(chip(insuranceLabel, ' bed-name-meta-chip--insurance'));
    if (bed.age) chips.push(chip(`${bed.age}세`));

    if (!chips.length) return '';
    return `<span class="bed-name-meta">${chips.join('')}</span>`;
  }

  function getBedDetailPatientSummaryChips(bed, includeIdentity = true) {
    const chip = (text, cls = '') => `<span class="bed-patient-summary-chip${cls}">${escapeHtml(text)}</span>`;
    const insuranceLabel = getInsuranceChipLabel(bed.insuranceType);
    const chips = [];
    if (includeIdentity) {
      if (bed.chartNo) chips.push(chip(`${bed.chartNo}번`));
      if (bed.visitType) chips.push(chip(bed.visitType));
      if (bed.gender) chips.push(chip(bed.gender));
      if (insuranceLabel) chips.push(chip(insuranceLabel, ' bed-patient-summary-chip--insurance'));
      if (bed.age) chips.push(chip(`${bed.age}세`));
    }
    const memo1Edited = bed.memo1 && bed.memo1 !== (bed.memo1Original || '');
    const memo2Edited = bed.memo2 && bed.memo2 !== (bed.memo2Original || '');
    if (bed.memo1) chips.push(chip(bed.memo1, memo1Edited ? ' bed-patient-summary-chip--memo-edited' : ''));
    if (bed.memo2) chips.push(chip('메모2있음', memo2Edited ? ' bed-patient-summary-chip--memo-edited' : ''));
    return chips.join('');
  }

  function getBedMoveTargetNumbers() {
    return [...getDoctorBedNumbers(), ...ACTIVE_BED_NUMBERS];
  }

  function renderBedMovePanel(bedNo) {
    const targets = getBedMoveTargetNumbers();
    const limitedBedState = isRegularFixedBedScreen();
    const buttons = targets.map(targetNo => {
      const targetBed = getBedData(targetNo);
      const isCurrent = Number(targetNo) === Number(bedNo);
      const occupied = Boolean(targetBed);
      const status = isCurrent ? '현재' : (limitedBedState ? '선택' : (occupied ? '교환' : '이동'));
      const detail = limitedBedState && !isCurrent ? '서버 확인' : (occupied ? (targetBed.name || '환자') : '비어 있음');
      return `
        <button class="bed-move-target ${occupied ? 'occupied' : 'empty'}" type="button"
          ${isCurrent ? 'disabled' : `onclick="selectBedMoveTarget(${bedNo}, ${targetNo})"`}>
          ${escapeHtml(getBedLabel(targetNo))}<br><span>${escapeHtml(status)} · ${escapeHtml(detail)}</span>
        </button>`;
    }).join('');
    return `
      <div class="bed-move-panel">
        <div class="bed-move-panel-head">
          <span>이동/교환할 베드 선택</span>
          <span>${limitedBedState ? '서버 확인 후 이동' : `${targets.length}개`}</span>
        </div>
        <div class="bed-move-grid">${buttons}</div>
      </div>`;
  }

  function formatRecentVisitDate(dateStr) {
    const match = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(dateStr || ''));
    if (!match) return '';
    const [, yyyy, mm, dd] = match;
    const visitDate = new Date(Number(yyyy), Number(mm) - 1, Number(dd));
    if (Number.isNaN(visitDate.getTime())) return '';
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    visitDate.setHours(0, 0, 0, 0);
    const elapsedDays = Math.floor((today - visitDate) / 86400000);
    if (elapsedDays < 0) return '';
    if (elapsedDays === 0) return '오늘';
    if (elapsedDays <= 90) return `${elapsedDays}일 전`;
    return '초진';
  }

  function renderBedDetailPatientInfo(bed, bedNo, showClearButton = false, options = {}) {
    const patientSummary = getBedDetailPatientSummaryChips(bed, options.includeIdentity !== false);
    const recentVisitLabel = formatRecentVisitDate(bed.lastVisitDate);
    const infoChips = [
      bed.doctorName || '-',
      bed.nurseName || '-',
      ...(recentVisitLabel ? [recentVisitLabel] : [])
    ].map(value => `<span class="bed-meta-chip">${escapeHtml(value)}</span>`).join('');
    const showMovePanel = showClearButton && contextIsBedMoveTarget(bedNo);
    const actionButtons = showClearButton ? `
      <div class="bed-detail-actions">
        <button class="bed-move-btn" type="button" onclick="toggleBedMovePanel(${bedNo})">베드 이동</button>
        <button class="bed-clear-btn" type="button" onclick="confirmClearBedNumber(${bedNo})">베드 비우기</button>
      </div>` : '';

    return `
      <div class="bed-detail-info${showClearButton ? ' has-action' : ''}">
        <div>
          ${patientSummary ? `<div class="bed-detail-chip-row">${patientSummary}</div>` : ''}
          <div class="bed-detail-chip-row">${infoChips}</div>
          <div class="bed-detail-treatment-row">${renderBedDetailTreatmentChips(bed, bedNo)}</div>
        </div>
        ${actionButtons}
        ${showMovePanel ? renderBedMovePanel(bedNo) : ''}
      </div>`;
  }

  function contextIsBedMoveTarget(bedNo) {
    return Number(bedMovePanelOpenFor) === Number(bedNo);
  }

  function getPostTreatmentPackageBalanceMessage(bed, packages, balances) {
    const treatments = Array.isArray(bed?.treatments) ? bed.treatments : [];
    if (!treatments.length) return '';

    const normalizedTreatments = treatments.map(treatment => String(treatment || '').replace(/\s+/g, ''));
    const treatmentIds = getTreatmentIdsFromNames(treatments);
    const hasChuna = normalizedTreatments.some(name => name.includes('추나') || name === '단추' || name === '복추');
    const unitMapById = {
      pharmacopuncture_1: hasChuna ? 0.5 : 1,
      pharmacopuncture_2: hasChuna ? 1 : 2,
      pharmacopuncture_3: hasChuna ? 1 : 2,
      pharmacopuncture_4: hasChuna ? 2 : 4
    };
    const deduction = treatmentIds.reduce((sum, id) => sum + (unitMapById[id] || 0), 0);

    const hasPackageRecord = (key) => {
      const pkg = packages?.[key] || {};
      return Number(pkg.openingQty || 0) > 0
        || normalizePackageEntries(pkg.purchases, 'purchase').length > 0
        || normalizePackageEntries(pkg.usages, 'usage').length > 0
        || Number(balances[key] || 0) > 0;
    };

    const messages = [];
    const pharmaField = PCREDIT_FIELDS.find(field => Array.isArray(field.mergeKeys));
    const hasPharma = pharmaField && (pharmaField.mergeKeys || []).some(key => hasPackageRecord(key));
    if (deduction && hasPharma) {
      const currentBalance = getFieldBalance(pharmaField, packages);
      const afterBalance = currentBalance - deduction;
      messages.push(`${pharmaField.label} 현재 ${currentBalance}개, 오늘 사용 ${deduction}개, 오늘 치료 후 ${afterBalance}개 입니다`);
    }

    const specialDeductions = [
      { key: 'p자하거', treatment: '약침자' },
      { key: 'p라인', treatment: '약침l' }
    ];
    specialDeductions.forEach(({ key, treatment }) => {
      const treatmentId = treatment.toLowerCase().includes('l') ? 'pharmacopuncture_L' : 'pharmacopuncture_ja';
      const treatmentCount = countTreatmentId(treatmentIds, treatmentId);
      if (!treatmentCount || !hasPackageRecord(key)) return;
      const label = (PCREDIT_FIELDS.find(field => field.key === key) || {}).label || key;
      const currentBalance = Number(balances[key] || 0);
      const afterBalance = currentBalance - treatmentCount;
      messages.push(`${label} 현재 ${currentBalance}개, 오늘 사용 ${treatmentCount}개, 오늘 치료 후 ${afterBalance}개 입니다`);
    });

    return messages.join(' / ');
  }

  function renderBedPackageBalanceBox(bed) {
    const patient = bed?.patientKey ? patientsByKey.get(bed.patientKey) : null;
    const packages = getPackageStateFromPatient(patient || {});
    const balances = getPCreditsFromPackages(packages);
    const postTreatmentMessage = getPostTreatmentPackageBalanceMessage(bed, packages, balances);
    return `
      <div class="bed-package-zone">
        <div class="bed-package-title">패키지 잔여량</div>
        <div class="bed-package-grid">
          ${PCREDIT_DISPLAY_FIELDS.map(field => `
            <div class="bed-package-chip">
              <span class="bed-package-name">${escapeHtml(field.label)}</span>
              <span class="bed-package-count">${escapeHtml(getFieldBalance(field, packages))}</span>
            </div>`).join('')}
        </div>
        ${postTreatmentMessage ? `<div class="bed-package-after">${escapeHtml(postTreatmentMessage)}</div>` : ''}
      </div>`;
  }

  function renderBedSchedulePanelMarkup() {
    return `
      <div class="bed-schedule-panel" id="bedSchedulePanel">
        <div class="bed-schedule-calendar" id="bedScheduleCalendar"></div>
      </div>`;
  }

  function renderBedAlertCard(bedNo, bed) {
    if (!bed?.lastAlertId) return '';
    return `<div class="bed-alert-card">
      <div class="bed-alert-message">${escapeHtml(bed.lastAlertMessage || `${bed.name || ''} 치료 완료`)}</div>
      <button class="bed-alert-btn" onclick="acknowledgeBedAlert(${bedNo})">알림 확인</button>
    </div>`;
  }

  function renderBedCleaningMarkup(bedNo, bed) {
    const movedTo = bed?.movedToBedNo ? `${getBedLabel(bed.movedToBedNo)}로 이동됨` : '환자 이동 후 정리 중';
    const previous = bed?.previousPatientName ? `${bed.previousPatientName}님 ` : '';
    const started = bed?.timeStr ? `정리 시작 ${bed.timeStr}` : '';
    return `
      <div class="card">
        <div class="bed-cleaning-card">
          <div class="bed-cleaning-title">${escapeHtml(getBedLabel(bedNo))} 베드 정리 중</div>
          <div class="bed-cleaning-sub">${escapeHtml(`${previous}${movedTo}`)}</div>
          ${started ? `<div class="bed-cleaning-sub">${escapeHtml(started)}</div>` : ''}
          <button class="bed-cleaning-complete-btn" type="button" onclick="completeBedCleaning(${bedNo})">정리 완료</button>
        </div>
      </div>`;
  }

  function renderBedDetailMarkup(bedNo, allowControls, context = 'bed') {
    const bed = getBedData(bedNo);
    const bedLabel = getBedLabel(bedNo);
    if (!bed) {
      if (context === 'bed' && isFixedDoctorBedScreen() && getFixedDoctorBedNoFromUrl() === Number(bedNo)) {
        return `
          <div class="card bed-detail-card--bed">
            <div class="bed-info-zone"></div>
          </div>`;
      }
      return `
        <div class="empty-state">
          <div class="empty-icon">⏱</div>
          <div class="empty-text">${escapeHtml(bedLabel)} 현재 비어 있습니다</div>
        </div>`;
    }
    if (isCleaningBed(bed)) return renderBedCleaningMarkup(bedNo, bed);

    const currentTreatment = bed.treatments?.[bed.currentIndex];
    if (context === 'bed') {
      return `
        <div class="card bed-detail-card--bed">
          <div class="bed-info-zone">
            <div class="bed-summary">
              <div>
                <div class="bed-name-row">
                  <div class="bed-name">${escapeHtml(bed.name)}</div>
                  ${getBedNameMetaChips(bed)}
                </div>
              </div>
              <div class="bed-time">${escapeHtml(bed.timeStr || '')}</div>
            </div>
            ${renderBedDetailPatientInfo(bed, bedNo, allowControls, { includeIdentity: false })}
            ${renderBedAlertCard(bedNo, bed)}
          </div>
          ${renderBedPackageBalanceBox(bed)}
          <div class="bed-timer-zone">
            <div class="timer-list">
              ${bed.complete ? renderCompleteCard(bedNo, bed, allowControls, context) : renderTimerCard(bedNo, bed, currentTreatment, allowControls, context)}
            </div>
          </div>
          <div class="bed-schedule-zone">
            ${allowControls ? renderBedSchedulePanelMarkup() : ''}
          </div>
        </div>`;
    }

    return `
      <div class="card">
        <div class="bed-summary">
          <div>
            <div class="bed-name-row">
              <div class="bed-name">${escapeHtml(bed.name)}</div>
            </div>
          </div>
          <div class="bed-time">${escapeHtml(bed.timeStr || '')}</div>
        </div>
        ${renderBedDetailPatientInfo(bed, bedNo, allowControls && context === 'bed')}
        ${bed.lastAlertId ? `<div class="bed-alert-card">
          <div class="bed-alert-message">${escapeHtml(bed.lastAlertMessage || `${bed.name || ''} 치료 완료`)}</div>
          <button class="bed-alert-btn" onclick="acknowledgeBedAlert(${bedNo})">알림 확인</button>
        </div>` : ''}
        <div class="timer-list">
          ${bed.complete ? renderCompleteCard(bedNo, bed, allowControls, context) : renderTimerCard(bedNo, bed, currentTreatment, allowControls, context)}
        </div>
        ${allowControls && context === 'bed' ? renderBedSchedulePanelMarkup() : ''}
        ${allowControls && context !== 'bed' && !bed.complete ? `<button class="bed-clear-btn" onclick="confirmClearBedNumber(${bedNo})">베드 비우기</button>` : ''}
      </div>`;
  }

  function getRemaining(bed) {
    if (!bed || bed.complete) return 0;
    const baseRemaining = Number(bed.remaining || 0);
    if (!bed.running || !bed.startedAt) return Math.max(0, baseRemaining);
    return Math.max(0, baseRemaining - Math.floor((Date.now() - bed.startedAt) / 1000));
  }

  // 타이머 불필요 치료 (시행완료 버튼만 표시)
  const NO_TIMER_TREATMENTS = new Set(['진찰', '베드진찰', '단추', '복추', '추나', '적외선', '아이스팩', '테이핑', '벤치']);
  function isNoTimerTreatment(name) {
    if (!name) return false;
    if (NO_TIMER_TREATMENTS.has(name)) return true;
    if (/약침/.test(name)) return true;
    return false;
  }

  // 현재 치료를 맡은 원장의 다음 시술을 안내(간호사는 안내하지 않음).
  // 판단 기준은 치료실알림 보드에 떠 있는 원장 시술 알림: 같은 원장의 남은 알림 중
  // 가장 먼저 뜬 알림(타임스탬프가 빠른 것)부터 표시한다.
  function getNextStaffTaskInfo(currentBedNo, bed) {
    if (!bed) return null;
    const treatment = bed.treatments?.[bed.currentIndex || 0] || '';
    if (!isDoctorProcedureTreatment(treatment)) return null;
    const doctorId = bed.doctorId || '';
    if (!doctorId) return null;

    // 보드에 떠 있는 동일 원장의 남은 시술 알림 목록
    const items = getDoctorProcedureAlertItems(doctorId)
      .filter(it => it.bedNo !== currentBedNo);

    if (!items.length) return null;
    const next = items[0];
    return {
      staffName: bed.doctorName || '원장',
      item: next
    };
  }

  function renderNextStaffTaskContentHtml(bedNo, bed) {
    const next = getNextStaffTaskInfo(bedNo, bed);
    return next ? renderDoctorRoomAlertChips(next.item) : '';
  }

  function renderNextStaffTaskHtml(bedNo, bed, context = 'bed') {
    return `<div class="timer-next" id="${context}-timer-next-bed-${bedNo}">${renderNextStaffTaskContentHtml(bedNo, bed)}</div>`;
  }

  function updateTimerNextStaffTaskDom(bedNo, bed, context = 'bed') {
    const el = document.getElementById(`${context}-timer-next-bed-${bedNo}`);
    if (!el) return;
    el.innerHTML = renderNextStaffTaskContentHtml(bedNo, bed);
  }

  function renderTimerCard(bedNo, bed, treatment, allowControls = true, context = 'bed') {
    const treatments = Array.isArray(bed.treatments) ? bed.treatments : [];
    const hasTreatment = treatments.length > 0 && Boolean(treatment);
    const currentIndex = Number(bed.currentIndex || 0);
    const concurrentTreatments = getConcurrentTreatmentNames(treatments, currentIndex);
    const concurrentEndIndex = getConcurrentTreatmentEndIndex(treatments, currentIndex);
    const displayTreatment = formatTreatmentNames(concurrentTreatments) || treatment;
    const noTimer = concurrentTreatments.length ? concurrentTreatments.every(isNoTimerTreatment) : isNoTimerTreatment(treatment);
    const nextTaskHtml = renderNextStaffTaskHtml(bedNo, bed, context);
    const remaining = getRemaining(bed);
    const totalForDisplay = getConcurrentTreatmentSeconds(treatments, currentIndex) || bed.total;
    const percent = totalForDisplay ? Math.max(0, Math.min(100, (remaining / totalForDisplay) * 100)) : 0;
    const timerId = `${context}-timer-bed-${bedNo}`;
    const clockId = `${context}-timer-clock-bed-${bedNo}`;
    const barId = `${context}-timer-bar-bed-${bedNo}`;
    const inputId = `${context}-timer-minutes-bed-${bedNo}`;
    const toggleLabel = bed.running ? '일시정지' : '시작';
    const toggleClass = bed.running ? 'pause' : 'primary';
    const isBedContext = context === 'bed';
    const editableClockAttrs = allowControls && isBedContext
      ? ` timer-clock-editable" role="button" tabindex="0" title="클릭해서 시간 수정" data-timer-edit-bed="${bedNo}"`
      : '"';

    if (!hasTreatment) {
      return `
        <div class="timer-card" id="${timerId}">
          <div class="timer-top">
            <div class="timer-head">
              <div>
                <div class="timer-treatment">치료 미선택</div>
                <div class="timer-step">치료를 선택하면 타이머가 준비됩니다</div>
              </div>
            </div>
            <div class="timer-clock" id="${clockId}">대기</div>
          </div>
          <div class="timer-progress"><div class="timer-bar" id="${barId}" style="width:0%"></div></div>
          ${allowControls && context !== 'bed' ? `<button class="bed-clear-btn" onclick="confirmClearBedNumber(${bedNo})">베드 비우기</button>` : ''}
        </div>`;
    }

    if (noTimer) {
      return `
        <div class="timer-card" id="${timerId}">
          <div class="timer-top">
            <div class="timer-head">
              <div>
                <div class="timer-treatment">${escapeHtml(displayTreatment)}</div>
                <div class="timer-step">${currentIndex + 1}${concurrentEndIndex > currentIndex ? `-${concurrentEndIndex + 1}` : ''}/${bed.treatments.length}번째 치료</div>
              </div>
              ${nextTaskHtml}
            </div>
          </div>
          ${allowControls ? `<div class="timer-actions${isBedContext ? ' bed-timer-actions' : ''}">
            <button class="timer-btn" onclick="moveTreatment(${bedNo}, -1)" ${currentIndex <= 0 ? 'disabled' : ''}>이전 치료</button>
            <button class="timer-btn primary" onclick="completeNoTimerTreatment(${bedNo})">시행완료</button>
          </div>` : ''}
        </div>`;
    }

    return `
      <div class="timer-card" id="${timerId}">
        <div class="timer-top">
          <div class="timer-head">
            <div>
              <div class="timer-treatment">${escapeHtml(displayTreatment)}</div>
              <div class="timer-step">${currentIndex + 1}${concurrentEndIndex > currentIndex ? `-${concurrentEndIndex + 1}` : ''}/${bed.treatments.length}번째 치료</div>
            </div>
            ${nextTaskHtml}
          </div>
          <div class="timer-clock-control">
            ${allowControls && isBedContext ? `<div class="timer-stepper" aria-label="타이머 1분 조정">
              <button class="timer-stepper-btn" type="button" title="1분 증가" onclick="adjustTimerMinutes(event, ${bedNo}, 1)">▲</button>
              <button class="timer-stepper-btn" type="button" title="1분 감소" onclick="adjustTimerMinutes(event, ${bedNo}, -1)">▼</button>
            </div>` : ''}
            <div class="timer-clock${editableClockAttrs} id="${clockId}">${formatTimer(remaining)}</div>
          </div>
        </div>
        <div class="timer-progress"><div class="timer-bar" id="${barId}" style="width:${percent}%"></div></div>
        ${allowControls ? `<div class="treatment-nav">
          <button class="timer-btn" onclick="moveTreatment(${bedNo}, -1)" ${currentIndex <= 0 ? 'disabled' : ''}>이전 치료</button>
          <button class="timer-btn" onclick="moveTreatment(${bedNo}, 1)" ${concurrentEndIndex >= bed.treatments.length - 1 ? 'disabled' : ''}>이후 치료</button>
        </div>` : ''}
        ${allowControls && !isBedContext ? `<div class="timer-settings">
          <input class="timer-minute-input" id="${inputId}" type="number" min="1" max="120" step="1" value="${Math.max(1, Math.round(bed.total / 60))}" aria-label="타이머 시간 분">
          <button class="timer-set-btn" onclick="setTimerMinutes(${bedNo}, '${context}')">시간 설정</button>
        </div>` : ''}
        ${allowControls ? `<div class="timer-actions${isBedContext ? ' bed-timer-actions' : ''}">
          <button class="timer-btn ${toggleClass}" onclick="toggleTimer(${bedNo})">${toggleLabel}</button>
          ${isBedContext ? '' : `<button class="timer-btn" onclick="resetTimer(${bedNo})">초기화</button>`}
        </div>` : ''}
      </div>`;
  }

  function renderCompleteCard(bedNo, bed, allowControls = true, context = 'bed') {
    return `
      <div class="timer-card done">
        <div class="timer-top">
          <div>
            <div class="timer-treatment">모든 치료 완료</div>
            <div class="timer-step">${(bed.treatments || []).map(escapeHtml).join(' → ')}</div>
          </div>
          <div class="timer-clock">완료</div>
        </div>
        ${allowControls ? `<div class="treatment-nav">
          <button class="timer-btn" onclick="moveTreatment(${bedNo}, -1)" ${(bed.currentIndex || 0) <= 0 ? 'disabled' : ''}>이전 치료</button>
          <button class="timer-btn" disabled>이후 치료</button>
        </div>
        ${context === 'bed' ? '' : `<button class="bed-clear-btn" onclick="confirmClearBedNumber(${bedNo})">베드 비우기</button>`}` : ''}
      </div>`;
  }

  function updateTimerDom(bedNo) {
    const bed = getBedData(bedNo);
    if (!bed) return;

    const remaining = getRemaining(bed);
    const percent = bed.total ? Math.max(0, Math.min(100, (remaining / bed.total) * 100)) : 0;

    ['bed', 'receive'].forEach(context => {
      const clock = document.getElementById(`${context}-timer-clock-bed-${bedNo}`);
      const bar = document.getElementById(`${context}-timer-bar-bed-${bedNo}`);
      const card = document.getElementById(`${context}-timer-bed-${bedNo}`);

      if (clock) clock.textContent = (bed.treatments || []).length ? formatTimer(remaining) : '대기';
      if (bar) bar.style.width = `${percent}%`;
      if (card) card.classList.toggle('done', remaining <= 0);
    });
    // 모니터 그리드는 매초 통째로 다시 그리지 않고 남은시간 텍스트만 제자리 갱신한다.
    // (전체 renderBedMonitors를 매초 호출하면 베드 카드가 교체되어 hover 떨림과
    //  황색 펄스 애니메이션 재시작이 발생했다. 스텝 완료/상태 변경은 SSE로 재렌더됨.)
    const monitorStatus = getBedStatus(bedNo);
    ['input', 'receive'].forEach(context => {
      const span = document.getElementById(`monitor-time-${context}-${bedNo}`);
      if (span) span.textContent = monitorStatus.noTimer ? '' : monitorStatus.remaining;
    });
    if (bedNo === selectedBedNo) updateBedRemainingChip();
  }

  window.startTimer = async (bedNo) => {
    const bed = getBedData(bedNo);
    if (!(bed?.treatments || []).length) return;
    if (!bed || bed.running || bed.complete || getRemaining(bed) <= 0) return;
    const remaining = getRemaining(bed);
    const storedTotal = Number(bed.total || 0);
    const fallbackTotal = getConcurrentTreatmentSeconds(bed.treatments || [], bed.currentIndex || 0);
    const nextTotal = storedTotal || fallbackTotal || remaining;
    const nextRemaining = remaining || nextTotal;

    await updateBedRecord(bedNo, {
      running: true,
      startedAt: Date.now(),
      total: nextTotal,
      remaining: nextRemaining
    });
    playTimerStartSound();
  };

  window.toggleTimer = async (bedNo) => {
    const bed = getBedData(bedNo);
    if (!(bed?.treatments || []).length) return;
    if (!bed || bed.complete || getRemaining(bed) <= 0) return;
    if (bed.running) {
      await pauseTimer(bedNo);
    } else {
      await startTimer(bedNo);
    }
  };

  async function finishBedStep(bedNo) {
    if (finishingBeds.has(bedNo)) return;
    finishingBeds.add(bedNo);

    const bedBefore = getBedData(bedNo);
    const completedTreatment = formatTreatmentNames(getConcurrentTreatmentNames(bedBefore?.treatments || [], bedBefore?.currentIndex || 0)) || '치료';
    const patientName = bedBefore?.name || '';
    const alertId = `${bedBefore?.patientKey || bedNo}-${bedBefore?.currentIndex || 0}-${Date.now()}`;

    const result = await runBedRecordTransaction(bedNo, (bed) => {
      if (!bed || bed.complete) return bed;
      if (!(bed.treatments || []).length) return bed;

      const remaining = getRemaining(bed);
      if (!bed.running || remaining > 0) return bed;

      const treatments = bed.treatments || [];
      const currentTreatment = treatments[bed.currentIndex];
      const groupEndIndex = getConcurrentTreatmentEndIndex(treatments, bed.currentIndex);
      const completedTreatmentLabel = formatTreatmentNames(getConcurrentTreatmentNames(treatments, bed.currentIndex)) || currentTreatment;
      const nextIndex = getNextPendingTreatmentIndex(treatments, groupEndIndex + 1, bed.preCompletedTreatmentIndexes || []);
      if (nextIndex < 0 || nextIndex >= treatments.length) {
        return {
          ...bed,
          running: false,
          startedAt: null,
          remaining: 0,
          complete: true,
          lastAlertId: alertId,
          lastAlertMessage: `${bedNo}번 베드 ${bed.name} · ${completedTreatmentLabel} 완료`,
          lastCompletedTreatmentLabel: completedTreatmentLabel,
          doctorProcedureAlert: null
        };
      }

      const nextTotal = getConcurrentTreatmentSeconds(treatments, nextIndex);
      return {
        ...bed,
        currentIndex: nextIndex,
        total: nextTotal,
        remaining: nextTotal,
        running: false,
        startedAt: null,
        complete: false,
        lastAlertId: alertId,
        lastAlertMessage: `${bedNo}번 베드 ${bed.name} · ${completedTreatmentLabel} 완료`,
        lastCompletedTreatmentLabel: completedTreatmentLabel,
        doctorProcedureAlert: null
      };
    });

    finishingBeds.delete(bedNo);

    if (result.committed && bedBefore) {
      if (!queuedTimerAlerts.has(alertId)) {
        showTimerCompleteAlert(`${bedNo}번 베드 ${patientName} · ${completedTreatment} 완료`, bedNo, alertId);
      }
      seenTimerAlerts.add(alertId);
    }
  }

  window.pauseTimer = async (bedNo) => {
    const bed = getBedData(bedNo);
    if (!bed) return;

    await updateBedRecord(bedNo, {
      running: false,
      startedAt: null,
      remaining: getRemaining(bed)
    });
  };

  window.toggleBodyPart = async (side, part) => {
    const bed = getBedData(selectedBedNo);
    if (!bed || !BODY_PARTS[side]) return;

    const bodyParts = normalizeBodyParts(bed.bodyParts);
    const current = new Set(bodyParts[side]);
    if (current.has(part)) {
      current.delete(part);
    } else {
      current.add(part);
    }

    const nextBodyParts = {
      ...bodyParts,
      [side]: [...current]
    };

    const updates = [
      updateBedRecord(selectedBedNo, { bodyParts: nextBodyParts })
    ];

    if (bed.patientKey) {
      updates.push(updatePatient(bed.patientKey,{ bodyParts: nextBodyParts }));
    }

    await Promise.all(updates);
  };

  window.toggleFormBodyPart = (scope, side, part) => {
    if (!BODY_PARTS[side]) return;
    const currentParts = normalizeBodyParts(formBodyPartsByScope[scope]);
    const current = new Set(currentParts[side]);
    if (current.has(part)) {
      current.delete(part);
    } else {
      current.add(part);
    }

    formBodyPartsByScope[scope] = {
      ...currentParts,
      [side]: [...current]
    };
    renderFormBodyPartSelector(scope);
    scheduleSelectFieldSave(scope);
  };

  // ── 선택 필드 즉시 자동저장 (edit mode 전용) ────────────────────────
  const _selectSaveTimers = {};
  let isPopulatingFormFromState = false;

  function suppressSelectFieldAutosaveForPopulation() {
    isPopulatingFormFromState = true;
    queueMicrotask(() => {
      isPopulatingFormFromState = false;
    });
  }

  function scheduleSelectFieldSave(scope, delay = 250) {
    if (isPopulatingFormFromState) return;
    clearTimeout(_selectSaveTimers[scope]);
    _selectSaveTimers[scope] = setTimeout(() => autoSaveSelectFields(scope), delay);
  }

  function getScopeFromGridId(gridId) {
    for (const [scope, ids] of Object.entries(PATIENT_FORM_IDS)) {
      if (ids.treatmentGrid === gridId) return scope;
    }
    return null;
  }

  async function autoSaveSelectFields(scope) {
    const editBedNo = scope === 'bed' ? selectedBedNo : formEditBedNoByScope[scope];
    const waitingPatientKey = !editBedNo && (scope === 'desk' || scope === 'receive')
      ? formEditPatientKeyByScope[scope]
      : null;
    if (waitingPatientKey) {
      const patient = patientsByKey.get(waitingPatientKey);
      if (!patient) return;

      const form = getFormValues(scope);
      const payload = {
        treatments: form.treatments,
        doctorId: form.doctor.id,
        doctorName: form.doctor.name,
        nurseId: form.nurse.id,
        nurseName: form.nurse.name,
        bodyParts: form.bodyParts,
        ...form.packagePayload
      };
      patientsByKey.set(waitingPatientKey, { ...patient, ...payload });
      renderWaitingLists();
      try {
        await updatePatient(waitingPatientKey, payload);
      } catch (e) {
        patientsByKey.set(waitingPatientKey, patient);
        renderWaitingLists();
        console.error('waiting patient auto-save failed', e);
      }
      return;
    }

    const bedNo = editBedNo;
    if (!bedNo) return;
    const bed = getBedData(bedNo);
    if (!bed) return;

    const form = getFormValues(scope);
    const currentTreatment = bed.treatments?.[bed.currentIndex || 0] || '';
    const addedTreatmentIndexes = getAddedTreatmentIndexesAfterEdit(
      bed.treatments || [],
      form.treatments,
      bed.addedTreatmentIndexes || []
    );
    const newlyAddedTreatmentIndexes = getNewlyAddedTreatmentIndexes(bed.treatments || [], form.treatments);
    const newlyAddedTreatmentNames = newlyAddedTreatmentIndexes
      .map(index => form.treatments[index])
      .filter(Boolean);
    const newlyRemovedTreatmentNames = getRemovedTreatmentNames(bed.treatments || [], form.treatments);
    let addedTreatmentAlert = createAddedTreatmentAlertPayload(bedNo, bed, newlyAddedTreatmentNames);
    let shouldPatchAddedTreatmentAlert = Boolean(addedTreatmentAlert);
    if (newlyRemovedTreatmentNames.length) {
      removeNamesFromTransientAddedTreatmentAlert(bedNo, newlyRemovedTreatmentNames);
      const { alert: adjustedAddedTreatmentAlert, consumed: consumedSharedAddedNames } = removeNamesFromAddedTreatmentAlertPayload(
        addedTreatmentAlert || bed.addedTreatmentAlert,
        newlyRemovedTreatmentNames
      );
      if (consumedSharedAddedNames.length) {
        suppressAddedTreatmentAlertNames(bedNo, consumedSharedAddedNames);
        addedTreatmentAlert = adjustedAddedTreatmentAlert;
        shouldPatchAddedTreatmentAlert = true;
      }
    }
    const preCompletedTreatmentIndexes = getPreCompletedIndexesAfterEdit(
      bed.treatments || [],
      form.treatments,
      bed.preCompletedTreatmentIndexes || []
    );
    const nextIndexBase = form.treatments.length ? Math.min(bed.currentIndex || 0, form.treatments.length - 1) : 0;
    const preservedRunningIndex = bed.running ? findMatchingTreatmentGroupIndex(bed.treatments || [], form.treatments, bed.currentIndex || 0) : -1;
    const completedBedAddedIndex = bed.complete && newlyAddedTreatmentIndexes.length ? newlyAddedTreatmentIndexes[0] : -1;
    const nextIdx = completedBedAddedIndex >= 0
      ? completedBedAddedIndex
      : preservedRunningIndex >= 0
      ? preservedRunningIndex
      : (form.treatments.length ? Math.max(0, getNextPendingTreatmentIndex(form.treatments, nextIndexBase, preCompletedTreatmentIndexes)) : 0);
    const nextTreatment = form.treatments[nextIdx] || '';
    const treatmentChanged = completedBedAddedIndex >= 0 || (preservedRunningIndex < 0 && (currentTreatment !== nextTreatment || !form.treatments.length));
    const nextTotal = nextTreatment ? getConcurrentTreatmentSeconds(form.treatments, nextIdx) : 0;
    const timerUpdates = treatmentChanged ? {
      currentIndex: nextIdx,
      total: nextTotal,
      remaining: nextTotal,
      running: false, startedAt: null, complete: false,
      lastAlertId: null, lastAlertMessage: null,
      doctorProcedureAlert: null
    } : {};

    const payload = {
      treatments: form.treatments,
      addedTreatmentIndexes,
      preCompletedTreatmentIndexes,
      ...(shouldPatchAddedTreatmentAlert ? { addedTreatmentAlert } : {}),
      doctorId: form.doctor.id,
      doctorName: form.doctor.name,
      nurseId: form.nurse.id,
      nurseName: form.nurse.name,
      bodyParts: form.bodyParts
    };
    const previousBedState = { ...bed };
    Object.assign(bed, payload, timerUpdates);
    if (bed.patientKey) {
      patientsByKey.set(bed.patientKey, {
        ...(patientsByKey.get(bed.patientKey) || {}),
        ...payload
      });
    }
    renderBedDetailInto(document.getElementById('bedDetail'), bedNo, true);
    if (scope === 'bed' && bedNo === selectedBedNo) {
      renderBodyPartSelector();
      renderTreatmentChips(PATIENT_FORM_IDS.bed.treatmentGrid);
      syncTreatBtnStates(PATIENT_FORM_IDS.bed.treatmentGrid);
      updateBedRemainingChip();
    }
    renderBedMonitors();

    try {
      await updateBedRecord(bedNo, { ...payload, ...timerUpdates });
      if (bed.patientKey) {
        const { addedTreatmentAlert: _addedTreatmentAlert, ...patientPayload } = payload;
        await updatePatient(bed.patientKey,patientPayload);
      }
      if (treatmentChanged) clearLocalTimerAlertsForBed(bedNo);
      if (newlyAddedTreatmentNames.length) {
        pushTransientAddedTreatmentAlert(bedNo, { ...bed, ...payload }, newlyAddedTreatmentNames);
      }
    } catch(e) {
      Object.assign(bed, previousBedState);
      renderBedDetailInto(document.getElementById('bedDetail'), bedNo, true);
      if (scope === 'bed' && bedNo === selectedBedNo) {
        renderBodyPartSelector();
        renderTreatmentChips(PATIENT_FORM_IDS.bed.treatmentGrid);
        syncTreatBtnStates(PATIENT_FORM_IDS.bed.treatmentGrid);
        updateBedRemainingChip();
      }
      renderBedMonitors();
      console.error('선택 필드 자동저장 실패', e);
    }
  }
  renderAllFormBodyPartSelectors();

  window.resetTimer = async (bedNo) => {
    const bed = getBedData(bedNo);

    const treatment = bed.treatments?.[bed.currentIndex];
    if (!treatment) return;
    const total = getConcurrentTreatmentSeconds(bed.treatments || [], bed.currentIndex || 0);

  window.moveTreatment = async (bedNo, direction) => {
    const bed = getBedData(bedNo);
    if (!bed) return;

    const treatments = bed.treatments || [];
    const currentIndex = Number(bed.currentIndex || 0);
    const nextIndex = direction > 0
      ? getNextPendingTreatmentIndex(treatments, getConcurrentTreatmentEndIndex(treatments, currentIndex) + 1, bed.preCompletedTreatmentIndexes || [])
      : getConcurrentTreatmentStartIndex(treatments, Math.max(0, currentIndex - 1));
    if (direction > 0 && nextIndex < 0) return;
    if (nextIndex === bed.currentIndex || !treatments[nextIndex]) return;

    const total = getConcurrentTreatmentSeconds(treatments, nextIndex);
    await updateBedRecord(bedNo, {
      currentIndex: nextIndex,
      running: false,
      startedAt: null,
      complete: false,
      total,
      remaining: total,
      lastAlertId: null,
      lastAlertMessage: null,
      doctorProcedureAlert: null
    });

      treatments,
      getConcurrentTreatmentEndIndex(treatments, bed.currentIndex || 0) + 1,
      bed.preCompletedTreatmentIndexes || []
    );

    if (nextIndex < 0 || nextIndex >= treatments.length) {
      // 마지막 치료 → 전체 완료
      await updateBedRecord(bedNo, {
        running: false,
        startedAt: null,

        complete: true,

      const nextBedPatch = {
        currentIndex: nextIndex,
        running: false,
        startedAt: null,
        complete: false,
        total: nextTotal,
        remaining: nextTotal,
        lastAlertId: null,

  function parseTimerEditSeconds(value) {
    const text = String(value || '').trim();
    if (!text) return null;
    if (text.includes(':')) {
      const parts = text.split(':').map(part => Number(part.trim()));
      if (parts.length !== 2 || parts.some(part => !Number.isFinite(part))) return null;
      const [minutes, seconds] = parts;
      if (minutes < 0 || seconds < 0 || seconds >= 60) return null;
      return Math.round((minutes * 60) + seconds);
    }
    const minutes = Number(text);
    if (!Number.isFinite(minutes) || minutes <= 0) return null;
    return Math.round(minutes * 60);
  }

  async function setTimerSeconds(bedNo, total) {
    const bed = getBedData(bedNo);
    if (!bed) return;
    const safeTotal = Math.max(1, Math.min(120 * 60, Math.round(Number(total) || 0)));
    await updateBedRecord(bedNo, {
      running: false,
      startedAt: null,
      total: safeTotal,
      remaining: safeTotal
    });
    showToast(`${getBedLabel(bedNo)} ${formatTimer(safeTotal)}으로 설정`);
  }

  window.adjustTimerMinutes = async (event, bedNo, deltaMinutes) => {
    event?.preventDefault();
    event?.stopPropagation();
    const bed = getBedData(bedNo);
    if (!bed || bed.complete || !(bed.treatments || []).length) return;
    const currentRemaining = Number(getRemaining(bed) || bed.remaining || bed.total || 0);
    const nextRemaining = Math.max(1, Math.min(120 * 60, Math.round(currentRemaining + (Number(deltaMinutes || 0) * 60))));
    const nextTotal = Math.max(Number(bed.total || 0), nextRemaining);
    await updateBedRecord(bedNo, {
      running: Boolean(bed.running),
      startedAt: bed.running ? Date.now() : null,
      total: nextTotal,
      remaining: nextRemaining
    });
    showToast(`${getBedLabel(bedNo)} ${formatTimer(nextRemaining)}으로 조정`);
  };

  function remapLocalAlertBedNo(alertId, bedNo) {
    if (!alertId) return;

  function hasBedTreatmentStarted(bed = {}) {
    const preCompleted = normalizePreCompletedTreatmentIndexes(bed.preCompletedTreatmentIndexes || [], bed.treatments || []);
    const currentIndex = Number(bed.currentIndex || 0);
    const remaining = Number(bed.remaining || 0);
    const total = Number(bed.total || 0);
    return Boolean(
      bed.running ||
      bed.complete ||
      currentIndex > 0 ||
      preCompleted.length ||
      (total > 0 && remaining > 0 && remaining < total)
    );
  }

  function getBedAssignmentAlertForPatient(patientKey) {
    if (!patientKey) return null;
    return [...bedAssignmentAlertItems.entries()]
      .map(([key, data]) => ({ key, ...(data || {}) }))
      .filter(item => String(item.patientKey || '') === String(patientKey))
      .sort((a, b) => Number(a.timestamp || 0) - Number(b.timestamp || 0))[0] || null;

  async function remapBedAssignmentAlertForMovedPatient(patientKey, bed, toBedNo) {
    if (!patientKey || !bed || !toBedNo || Number(toBedNo) >= 101) return;
    if (hasBedTreatmentStarted(bed)) return;
    const alert = getBedAssignmentAlertForPatient(patientKey);
    if (!alert?.key) return;
    const patch = {
      bedNo: Number(toBedNo),
      bedLabel: getBedLabel(toBedNo),
      patientName: bed.name || alert.patientName || '',
      doctorId: bed.doctorId || alert.doctorId || '',
      doctorName: bed.doctorName || alert.doctorName || '',

      delete fixedBedArrivalAcknowledgedByBed[Number(alert.bedNo)];
      delete fixedBedArrivalShownByBed[Number(alert.bedNo)];

  window.moveOrSwapBed = async (fromBedNo, toBedNo, options = {}) => {
    if (fromBedNo === toBedNo) return false;

    const fromBed = getBedData(fromBedNo);
    if (!fromBed) return false;
    if (isCleaningBed(fromBed)) {
      if (!options.silent) showToast('정리 중인 베드는 이동할 수 없습니다');
      return false;
    }
    const routingBeds = await getBedsSnapshotForRouting();
    const targetBedBefore = getBedDataForRouting(toBedNo, routingBeds);
    if (isCleaningBed(targetBedBefore)) {
      if (!options.silent) showToast('정리 중인 베드에는 이동할 수 없습니다');
      return false;
    }
    const movingFromPatientKey = fromBed.patientKey || '';
    const movingToPatientKey = targetBedBefore?.patientKey || '';
    const hadTargetBed = Boolean(targetBedBefore);

    const result = await runBedsRecordTransaction((beds) => {
      beds = beds || {};
      const fromKey = String(fromBedNo);
      const toKey = String(toBedNo);
      const movingBed = beds[fromKey];
      if (!movingBed) return;

      const targetBed = beds[toKey] || null;
      if (targetBed) {
        beds[fromKey] = targetBed;
        beds[toKey] = movingBed;
      } else {
        beds[toKey] = movingBed;
        if (HOLD_BED_NUMBERS.includes(Number(fromBedNo)) || Number(fromBedNo) >= 101 || Number(fromBedNo) === 15) delete beds[fromKey];
        else beds[fromKey] = createBedCleaningRecord(fromBedNo, movingBed, toBedNo);
      }
      return beds;
    });

    if (result.committed) {
      const movedBeds = result.snapshot.val() || {};
      await Promise.all([
        updatePatientBedNoForBed(fromBedNo, movedBeds[String(fromBedNo)]),
        updatePatientBedNoForBed(toBedNo, movedBeds[String(toBedNo)])
      ]);
      const movedToTargetBed = movedBeds[String(toBedNo)];
      if (nurseAutoAssignEnabled && Number(fromBedNo) >= 101 && Number(toBedNo) < 101 && movedToTargetBed?.patientKey && !movedToTargetBed.nurseId) {
        const assignedData = await applyRoundRobinNurse(movedToTargetBed.patientKey, movedToTargetBed, Number(toBedNo));
        if (assignedData.nurseId) {
          await updatePatient(movedToTargetBed.patientKey, { nurseId: assignedData.nurseId, nurseName: assignedData.nurseName });
        }
      }
      const assignmentAlertPromises = [];
      if (Number(fromBedNo) >= 101 && movedBeds[String(fromBedNo)]?.patientKey) {
        assignmentAlertPromises.push(createBedAssignmentAlert(
          movedBeds[String(fromBedNo)].patientKey,
          movedBeds[String(fromBedNo)],
          Number(fromBedNo)
        ));
      }
      if (Number(toBedNo) >= 101 && movedBeds[String(toBedNo)]?.patientKey) {
        assignmentAlertPromises.push(createBedAssignmentAlert(
          movedBeds[String(toBedNo)].patientKey,
          movedBeds[String(toBedNo)],
          Number(toBedNo)
        ));
      }
      if (assignmentAlertPromises.length) await Promise.all(assignmentAlertPromises);
      const remapAssignmentPromises = [];
      if (movingFromPatientKey && Number(toBedNo) < 101) {
        remapAssignmentPromises.push(remapBedAssignmentAlertForMovedPatient(
          movingFromPatientKey,
          movedBeds[String(toBedNo)],
          Number(toBedNo)
        ));
      }
      if (movingToPatientKey && Number(fromBedNo) < 101) {
        remapAssignmentPromises.push(remapBedAssignmentAlertForMovedPatient(
          movingToPatientKey,
          movedBeds[String(fromBedNo)],
          Number(fromBedNo)
        ));
      }
      if (remapAssignmentPromises.length) await Promise.all(remapAssignmentPromises);
      remapLocalAlertBedNo(movedBeds[String(fromBedNo)]?.lastAlertId, fromBedNo);
      remapLocalAlertBedNo(movedBeds[String(toBedNo)]?.lastAlertId, toBedNo);
      if (!options.silent) showToast(hadTargetBed
        ? `${getBedLabel(fromBedNo)} ${getBedLabel(toBedNo)} 교환`
        : `${getBedLabel(fromBedNo)} → ${getBedLabel(toBedNo)} 이동 완료`);
      return true;
    }

    if (!options.silent) showToast('베드 이동 실패');
    return false;
  };

  window.moveBedToWaiting = async (bedNo) => {

    delete patientPatch.lastAlertMessage;

    try {
      await Promise.all([
        updatePatient(bed.patientKey,patientPatch),
        removeBedRecord(bedNo)
      ]);
      patientsByKey.set(bed.patientKey, {
        ...(patientsByKey.get(bed.patientKey) || {}),
        ...patientPatch
      });
      showToast(`${bed.name || '환자'} 대기로 이동`);

  async function swapTreatmentInBed(bedNo, fromIndex, toIndex) {
    const bed = getBedData(bedNo);
    if (!bed) return;

    const treatments = [...(bed.treatments || [])];
    if (!treatments[fromIndex] || !treatments[toIndex] || fromIndex === toIndex) return;
    [treatments[fromIndex], treatments[toIndex]] = [treatments[toIndex], treatments[fromIndex]];
    const addedTreatmentIndexes = swapAddedTreatmentIndexes(
      bed.addedTreatmentIndexes || [],
      fromIndex,
      toIndex,
      treatments
    );

    const currentIndex = Number(bed.currentIndex || 0);
    let nextCurrentIndex = currentIndex;
    if (currentIndex === fromIndex) nextCurrentIndex = toIndex;
    else if (currentIndex === toIndex) nextCurrentIndex = fromIndex;
    nextCurrentIndex = Math.max(0, Math.min(treatments.length - 1, nextCurrentIndex));

    try {
      await updateBedRecord(bedNo, {
        treatments,
        addedTreatmentIndexes,
        currentIndex: nextCurrentIndex
      });
      if (bed.patientKey) {
        await updatePatient(bed.patientKey,{ treatments, addedTreatmentIndexes });
      }
    } catch(e) {
      console.error(e);
      showToast('치료 순서 변경 실패 - 연결을 확인해주세요');

  }

  window.handleBedTreatmentChipClick = async (event, bedNo, index) => {
    event.preventDefault();
    event.stopPropagation();
    selectedBedTreatmentChip = null;
    const bed = getBedData(bedNo);
    if (!bed?.treatments?.[index]) {
      renderBedMonitors();
      renderBedDetail();
      renderReceiveBedDetail();
      return;
    }

    const treatments = [...(bed.treatments || [])];
    const currentIndex = Math.max(0, Math.min(treatments.length - 1, Number(bed.currentIndex || 0)));
    const groupStart = getConcurrentTreatmentStartIndex(treatments, index);
    const groupEnd = getConcurrentTreatmentEndIndex(treatments, groupStart);

    const preCompletedSet = getPreCompletedTreatmentIndexSet(bed, treatments);
    let alreadyCompleted = true;
    for (let groupIndex = groupStart; groupIndex <= groupEnd; groupIndex += 1) {
      if (!preCompletedSet.has(groupIndex)) {
        alreadyCompleted = false;
        break;
      }
    }
    if (alreadyCompleted) {
      for (let groupIndex = groupStart; groupIndex <= groupEnd; groupIndex += 1) {
        preCompletedSet.delete(groupIndex);
      }
      const preCompletedTreatmentIndexes = normalizePreCompletedTreatmentIndexes([...preCompletedSet], treatments);
      const uncompletedLabel = formatTreatmentNames(treatments.slice(groupStart, groupEnd + 1)) || treatments[index] || '치료';
      const shouldReturnToGroup = bed.complete || groupEnd < currentIndex;
      const timerPatch = shouldReturnToGroup
        ? {
            currentIndex: groupStart,
            total: getConcurrentTreatmentSeconds(treatments, groupStart),
            remaining: getConcurrentTreatmentSeconds(treatments, groupStart),
            running: false,
            startedAt: null,
            complete: false,
            lastAlertId: null,
            lastAlertMessage: null,
            doctorProcedureAlert: null
          }
        : {
            complete: false
          };

      try {
        await updateBedRecord(bedNo, {
          preCompletedTreatmentIndexes,
          ...timerPatch
        });
        if (bed.patientKey) {
          await updatePatient(bed.patientKey, { preCompletedTreatmentIndexes });
        }
        clearLocalTimerAlertsForBed(bedNo);
        showToast(`${uncompletedLabel} 미완료 처리`);
      } catch (e) {
        console.error(e);
        showToast('치료 미완료 처리 실패');
      }
      renderBedMonitors();
      renderBedDetail();
      renderReceiveBedDetail();
      return;
    }

    if (bed.complete) return;
    if (groupEnd < currentIndex) {
      showToast('이미 완료된 치료입니다');
      return;
    }

    for (let groupIndex = groupStart; groupIndex <= groupEnd; groupIndex += 1) {
      preCompletedSet.add(groupIndex);
    }
    const preCompletedTreatmentIndexes = normalizePreCompletedTreatmentIndexes([...preCompletedSet], treatments);
    const completedLabel = formatTreatmentNames(treatments.slice(groupStart, groupEnd + 1)) || treatments[index] || '치료';
    const nextIndex = getNextPendingTreatmentIndex(treatments, currentIndex, preCompletedTreatmentIndexes);
    const timerPatch = nextIndex === currentIndex
      ? {}
      : nextIndex < 0 || nextIndex >= treatments.length
      ? {
          currentIndex: Math.max(0, treatments.length - 1),
          total: 0,
          remaining: 0,
          running: false,
          startedAt: null,
          complete: true,
          lastAlertId: null,
          lastAlertMessage: null,
          doctorProcedureAlert: null
        }
      : {
          currentIndex: nextIndex,
          total: getConcurrentTreatmentSeconds(treatments, nextIndex),
          remaining: getConcurrentTreatmentSeconds(treatments, nextIndex),
          running: false,
          startedAt: null,
          complete: false,
          lastAlertId: null,
          lastAlertMessage: null,
          doctorProcedureAlert: null
        };

    try {
      await updateBedRecord(bedNo, {
        preCompletedTreatmentIndexes,
        ...timerPatch
      });
      if (bed.patientKey) {
        await updatePatient(bed.patientKey, { preCompletedTreatmentIndexes });
      }
      clearLocalTimerAlertsForBed(bedNo);
      showToast(`${completedLabel} 완료 처리`);
      if (timerPatch.currentIndex !== undefined && timerPatch.complete === false) {
        await maybeAutoMoveBedForNextTreatment(bedNo, { ...bed, preCompletedTreatmentIndexes, ...timerPatch });
      }
    } catch (e) {
      console.error(e);
      showToast('치료 완료 처리 실패');
    }
    renderBedMonitors();
    renderBedDetail();
    renderReceiveBedDetail();
  };

  window.handleTreatChipDrop = async (event, bedNo, toIndex) => {

    if (draggedWaitingPatientKey) return;

    const treatments = [...(bed.treatments || [])];
    // 순서 교체
    const [moved] = treatments.splice(fromIndex, 1);
    treatments.splice(toIndex, 0, moved);
    const addedTreatmentIndexes = moveAddedTreatmentIndexes(
      bed.addedTreatmentIndexes || [],
      fromIndex,
      toIndex,
      treatments
    );

    const currentIndex = Number(bed.currentIndex || 0);
    let nextCurrentIndex = currentIndex;
    if (fromIndex === currentIndex) {
      nextCurrentIndex = toIndex;
    } else if (fromIndex < currentIndex && toIndex >= currentIndex) {
      nextCurrentIndex = currentIndex - 1;
    } else if (fromIndex > currentIndex && toIndex <= currentIndex) {
      nextCurrentIndex = currentIndex + 1;
    }
    nextCurrentIndex = Math.max(0, Math.min(treatments.length - 1, nextCurrentIndex));

    try {
      await updateBedRecord(bedNo, {
        treatments,
        addedTreatmentIndexes,
        currentIndex: nextCurrentIndex
      });

        await updatePatient(bed.patientKey,{ treatments, addedTreatmentIndexes });

  async function removeTreatmentFromBed(bedNo, fromIndex) {
    const bed = getBedData(bedNo);
    if (!bed) return;

    const treatments = [...(bed.treatments || [])];
    if (!treatments[fromIndex]) return;

    const previousTreatments = [...treatments];
    const [removed] = treatments.splice(fromIndex, 1);
    const addedTreatmentIndexes = removeAddedTreatmentIndex(
      bed.addedTreatmentIndexes || [],
      fromIndex,
      bed.treatments || []
    );
    const preCompletedTreatmentIndexes = removePreCompletedTreatmentIndex(
      bed.preCompletedTreatmentIndexes || [],
      fromIndex,
      bed.treatments || []
    );
    const preservedRunningIndex = bed.running
      ? findMatchingTreatmentGroupIndex(previousTreatments, treatments, bed.currentIndex || 0)
      : -1;
    const nextIndexBase = Math.max(0, Math.min(Number(bed.currentIndex || 0), Math.max(0, treatments.length - 1)));
    const nextPendingIndex = treatments.length
      ? getNextPendingTreatmentIndex(treatments, nextIndexBase, preCompletedTreatmentIndexes)
      : -1;
    const nextIndex = preservedRunningIndex >= 0
      ? preservedRunningIndex
      : (nextPendingIndex >= 0 ? nextPendingIndex : 0);
    const nextTotal = treatments[nextIndex] ? getConcurrentTreatmentSeconds(treatments, nextIndex) : 0;
    const preserveTimer = preservedRunningIndex >= 0;
    const removedTreatmentNames = [removed].filter(Boolean);
    removeNamesFromTransientAddedTreatmentAlert(bedNo, removedTreatmentNames);
    const { alert: adjustedAddedTreatmentAlert, consumed: consumedSharedAddedNames } = removeNamesFromAddedTreatmentAlertPayload(
      bed.addedTreatmentAlert,
      removedTreatmentNames
    );
    const shouldPatchAddedTreatmentAlert = consumedSharedAddedNames.length > 0;
    if (consumedSharedAddedNames.length) suppressAddedTreatmentAlertNames(bedNo, consumedSharedAddedNames);
    const resetPayload = {
      treatments,
      addedTreatmentIndexes,
      preCompletedTreatmentIndexes,
      currentIndex: nextIndex,
      ...(shouldPatchAddedTreatmentAlert ? { addedTreatmentAlert: adjustedAddedTreatmentAlert } : {}),
      ...(preserveTimer
        ? {}
        : {
            total: nextTotal,
            remaining: nextTotal,
            running: false,
            startedAt: null,
            complete: !treatments.length || nextPendingIndex < 0
          }),
      lastAlertId: null,
      lastAlertMessage: null,
      doctorProcedureAlert: null
    };

    try {
      await updateBedRecord(bedNo, resetPayload);
      if (bed.patientKey) {
        await updatePatient(bed.patientKey,{ treatments, addedTreatmentIndexes, preCompletedTreatmentIndexes });
      }
      if (!preserveTimer) clearLocalTimerAlertsForBed(bedNo);
      showToast(`${removed} 제거 완료`);
    } catch(e) {
      console.error(e);
      showToast('치료 제거 실패 - 연결을 확인해주세요');
    }
  }

  document.addEventListener('dragover', (event) => {

  document.addEventListener('drop', async (event) => {

    event.preventDefault();

    draggedTreatment = null;

      el.classList.remove('treat-drag-over', 'treat-dragging');

  function getBedStatus(bedNo) {
    const bed = getBedData(bedNo);
    const bedLabel = getBedLabel(bedNo);
    if (!bed) {
      return { bedNo, bedLabel, empty: true, stageState: 'empty', stageLabel: '비어 있음' };
    }
    if (isCleaningBed(bed)) {
      return {
        bedNo,
        bedLabel,
        cleaning: true,
        empty: false,
        name: '베드 정리 중',
        statusLabel: bed.movedToBedNo ? `${getBedLabel(bed.movedToBedNo)} 이동 후 정리` : '환자 이동 후 정리',
        stageState: 'cleaning',
        stageLabel: '정리 중',
        remaining: '',
        timeStr: bed.timeStr || '',
        previousPatientName: bed.previousPatientName || ''
      };
    }

    const treatments = bed.treatments || [];
    const assignmentAlert = getBedAssignmentAlertForBed(bedNo);
    const patient = bed.patientKey ? patientsByKey.get(bed.patientKey) : null;
    const appointmentSource = patient || bed || {};
    const appointmentDates = normalizeAppointmentDates(appointmentSource);
    const appointmentDate = appointmentDates[0] || '';
    const hasTreatment = treatments.length > 0;
    const currentIndex = Number(bed.currentIndex || 0);
    const concurrentTreatments = getConcurrentTreatmentNames(treatments, currentIndex);
    const treatment = bed.complete ? '완료' : (formatTreatmentNames(concurrentTreatments) || treatments[currentIndex] || '');
    const remainingSeconds = getRemaining(bed);
    const totalSeconds = Number(bed.total || 0);
    const previousTreatment = currentIndex > 0 ? (formatTreatmentNames(getConcurrentTreatmentNamesAroundIndex(treatments, currentIndex - 1)) || treatments[currentIndex - 1]) : '';
    const lastTreatment = treatments[treatments.length - 1] || '';
    const procedureBlinking = isDoctorProcedureBlinking(bedNo, bed);
    const statusLabel = bed.complete
      ? (lastTreatment ? `${lastTreatment} 완료` : '완료')
      : (!hasTreatment ? '치료 미선택' : (previousTreatment ? `${previousTreatment} 완료 ${treatment} 준비` : `${treatment} 준비`));
    const isWaitingToStart = !bed.complete && !bed.running && hasTreatment && remainingSeconds >= totalSeconds;
    const stageState = bed.complete
      ? 'complete'
      : (!hasTreatment ? 'ready' : (bed.running ? 'running' : (isWaitingToStart ? 'ready' : 'paused')));
    const stageLabel = bed.complete
      ? '완료'
      : (!hasTreatment ? '치료 미선택' : (bed.running ? '진행중' : (isWaitingToStart ? '시작 전' : '일시정지')));
    return {
      bedNo,
      bedLabel,
      empty: false,
      complete: bed.complete,
      alerting: Boolean(bed.lastAlertId || assignmentAlert),
      assignmentAlerting: Boolean(assignmentAlert),
      name: bed.name,
      doctorName: bed.doctorName || '',
      nurseName: bed.nurseName || '',
      treatment: treatment || '치료 미선택',
      statusLabel,
      stageState,
      stageLabel,
      statusDetail: !hasTreatment ? '치료 선택 대기' : (bed.running ? `${treatment} 진행중` : (isWaitingToStart ? statusLabel : treatment)),
      noTimer: !bed.complete && concurrentTreatments.length > 0 && concurrentTreatments.every(isNoTimerTreatment),
      procedureBlinking,
      remaining: bed.complete ? '완료' : (hasTreatment ? formatTimer(remainingSeconds) : '대기'),
      currentIndex,
      treatments,
      addedTreatmentIndexes: normalizeAddedTreatmentIndexes(bed.addedTreatmentIndexes, treatments),
      preCompletedTreatmentIndexes: normalizePreCompletedTreatmentIndexes(bed.preCompletedTreatmentIndexes, treatments),
      timeStr: bed.timeStr || '',
      visitType: bed.visitType || '',
      gender: bed.gender || '',
      insuranceType: bed.insuranceType || patient?.insuranceType || '',
      age: bed.age || '',
      appointmentDate,
      appointmentDateCount: appointmentDates.length,
      appointmentUndecided: Boolean(appointmentSource.appointmentUndecided),
      chiefComplaint: bed.chiefComplaint || '',
      memo2: bed.memo2 || '',
      bodyParts: normalizeBodyParts(bed.bodyParts),
      pCredits: getPCreditsFromPatient(bed.patientKey ? patientsByKey.get(bed.patientKey) : {})
    };
  }

  function renderBedPopover(status) {
    if (status.empty) {
      return `
        <div class="bed-popover">
          <div class="bed-popover-title">${escapeHtml(status.bedLabel)}</div>
          <div class="bed-popover-line">현재 비어 있습니다</div>
        </div>`;
    }

    const addedIndexes = new Set(normalizeAddedTreatmentIndexes(status.addedTreatmentIndexes, status.treatments));
    const preCompletedIndexes = new Set(normalizePreCompletedTreatmentIndexes(status.preCompletedTreatmentIndexes, status.treatments));
    const chips = status.treatments.length ? status.treatments.map((treatment, index) => {
      const chipClass = status.complete
        ? 'done'
        : (index < status.currentIndex || preCompletedIndexes.has(index) ? 'done' : (index === status.currentIndex ? 'current' : 'waiting'));
      const treatmentClass = getTreatmentBadgeClass(treatment);
      const runningClass = shouldBlinkTreatmentChip(status.treatments, status.currentIndex, index, status.stageState === 'running') ? ' running' : '';
      const addedClass = addedIndexes.has(index) ? ' added' : '';
      const content = escapeHtml(treatment);
      return `<span class="bed-treatment-chip ${treatmentClass} ${chipClass}${runningClass}${addedClass}">${content}</span>`;
    }).join('') : '<span class="bed-treatment-chip waiting">치료 미선택</span>';
    const densityClass = status.treatments.length >= 9
      ? ' ultra-dense'
      : status.treatments.length >= 6
        ? ' dense'
        : '';

    return `
      <div class="bed-popover">
        <div class="bed-treatment-strip${densityClass}">${chips}</div>
      </div>`;
  }

  function renderBedMonitors() {
    if (isRegularFixedBedScreen() || isFixedDoctorBedScreen()) return;
    countDebugCounter('render-call', 'bedMonitors');
    if (bedDragActive()) { bedRenderPending = true; return; }
    bedRenderPending = false;
    const doctorBedNums = getDoctorBedNumbers();
    const monitorBedNums = [...ACTIVE_BED_NUMBERS, ...doctorBedNums];

    const inputHtml = monitorBedNums.map((bedNo) => {
      const status = getBedStatus(bedNo);
      return renderBedStatusCard(status, 'input');
    }).join('');

    const receiveHtml = monitorBedNums.map((bedNo) => {
      const status = getBedStatus(bedNo);
      return renderBedStatusCard(status, 'receive');
    }).join('');

    const inputStableHtml = getBedMonitorStableHtml(inputHtml);
    const receiveStableHtml = getBedMonitorStableHtml(receiveHtml);
    const inputEl = document.getElementById('inputBedMonitor');
    if (inputEl && inputStableHtml !== lastInputBedHtml) {
      inputEl.innerHTML = inputHtml;
      lastInputBedHtml = inputStableHtml;
    }

    if (status.cleaning) {

          </div>

          ${compact ? '' : '<div class="bed-status-treatment"><span class="bed-stage-badge cleaning">정리 중</span></div>'}

    const dragHandlers = canMoveBed
      ? ` draggable="true" ondragstart="handleBedDragStart(event, ${status.bedNo})" ondragover="handleBedDragOver(event, ${status.bedNo})" ondrop="handleBedDrop(event, ${status.bedNo})" ondragend="handleBedDragEnd()"`
      : '';
    // 우클릭 → 기록 없이 삭제(베드 비우기와 달리 patient DB에 남기지 않음)
    const contextHandler = canMoveBed ? ` oncontextmenu="purgeBedPatient(event, ${status.bedNo})"` : '';

      ? formatAppointmentChipDate(status.appointmentDate, status.appointmentDateCount + (status.appointmentUndecided ? 1 : 0))

    const infoChipItems = [
      status.gender ? { text: status.gender, cls: ' bed-meta-chip--fixed' } : null,
      insuranceChipLabel ? { text: insuranceChipLabel, cls: ' bed-meta-chip--insurance' } : null,
      status.doctorName ? { text: status.doctorName, cls: '' } : null,
      status.nurseName ? { text: status.nurseName, cls: '' } : null,

      <div class="bed-status${compact ? ' compact' : ''}${status.complete ? ' done' : ' active'}${activeClass}${status.alerting ? ' alerting' : ''}${status.assignmentAlerting ? ' assignment-alerting' : ''}" tabindex="0" onclick="${clickAction}"${dragHandlers}${contextHandler}>
        <div class="bed-status-top">
          <span class="bed-status-no">${compact ? escapeHtml(compactName) : `${escapeHtml(monitorLabel)} ${escapeHtml(status.name)}`}</span>
          ${compact ? '' : `<span class="bed-status-time" id="monitor-time-${context}-${status.bedNo}">${status.noTimer ? '' : escapeHtml(status.remaining)}</span>`}
        </div>
        ${compact ? '' : (infoChips ? `<div class="bed-status-info${infoDensityClass}">${infoChips}</div>` : '')}
        ${compact ? '' : (staffHtml ? `<div class="bed-status-treatment">${staffHtml}</div>` : '')}

  function shouldShowAlerts() {

    const receivePanelActive = document.getElementById('receivePanel')?.classList.contains('active');
    if (view) return (view === 'doctor' || view === 'clinic') && receivePanelActive;
    return receivePanelActive;

  function shouldShowDoctorProcedureAlerts() {
    const view = (new URLSearchParams(window.location.search).get('view') || '').toLowerCase();
    const receivePanelActive = document.getElementById('receivePanel')?.classList.contains('active');
    if (view) return view === 'doctor' && receivePanelActive;

  function isDoctorProcedureTreatment(treatment) {
    const name = String(treatment || '').trim();
    if (/약침/.test(name)) return true;
    return new Set([
      '왕뜸',
      '전자뜸',
      '전침',
      '진료',
      '진찰',
      '베드진찰',
      '단추',
      '복추',
      '추나',
      '침',
      '건부항',
      '습부항'
    ]).has(name);
  }

  function getDoctorProcedureAlertId(bedNo, bed, treatment) {
    return `${bed.patientKey || bed.chartNo || bedNo}:${bedNo}:${Number(bed.currentIndex || 0)}:${treatment}`;
  }

  function getCurrentDoctorProcedureAlertId(bedNo, bed) {
    if (!bed || bed.complete) return '';
    if (bed.lastAlertId) return ''; // 직전 치료 완료 알림을 베드에서 확인하기 전엔 다음 치료 알림을 띄우지 않음
    const treatment = bed.treatments?.[bed.currentIndex || 0] || '';
    if (!isDoctorProcedureTreatment(treatment)) return '';
    return getDoctorProcedureAlertId(bedNo, bed, treatment);
  }

  function isDoctorProcedureAlertDismissed(bedNo, bed) {
    const alertId = getCurrentDoctorProcedureAlertId(bedNo, bed);
    return Boolean(alertId && bed?.doctorProcedureAlert?.id === alertId && bed.doctorProcedureAlert.dismissed);
  }

  function isLongDoctorProcedureTreatment(treatment) {
    const badgeClass = getTreatmentBadgeClass(treatment);
    return badgeClass === 'treatment-chuna' || badgeClass === 'treatment-exam';
  }

  function isChunaDoctorProcedureTreatment(treatment) {
    const name = String(treatment || '').trim();
    if (name === '진찰') return true;
    const badgeClass = getTreatmentBadgeClass(treatment);
    return badgeClass === 'treatment-chuna';
  }

  function isShortDoctorProcedureTreatment(treatment) {
    return isDoctorProcedureTreatment(treatment) && !isLongDoctorProcedureTreatment(treatment);
  }

  function hasWaitingChunaDoctorProcedure(doctorId, excludeBedNo = null) {
    if (!doctorId) return false;
    return [...getDoctorBedNumbers(), ...ACTIVE_BED_NUMBERS].some(bedNo => {
      if (Number(bedNo) === Number(excludeBedNo)) return false;
      const bed = getBedData(bedNo);
      if (!bed || bed.complete || bed.running || bed.lastAlertId || isFixedBedArrivalPending(bedNo, bed)) return false;
      if (bed.doctorId !== doctorId) return false;
      const treatments = getConcurrentTreatmentNames(bed.treatments || [], bed.currentIndex || 0);
      return treatments.some(isChunaDoctorProcedureTreatment);
    });
  }

  function getUpcomingShortDoctorProcedureInfo(bed, bedNo = null) {
    if (!bed || bed.complete || !bed.running || bed.lastAlertId) return null;
    if (!hasWaitingChunaDoctorProcedure(bed.doctorId || '', bedNo)) return null;
    const remaining = getRemaining(bed);
    if (remaining > 120) return null;
    const treatments = bed.treatments || [];
    const currentIndex = Number(bed.currentIndex || 0);
    const nextIndex = getNextPendingTreatmentIndex(
      treatments,
      getConcurrentTreatmentEndIndex(treatments, currentIndex) + 1,
      bed.preCompletedTreatmentIndexes || []
    );
    if (nextIndex < 0) return null;
    const nextTreatments = getConcurrentTreatmentNames(treatments, nextIndex);
    const shortTreatments = nextTreatments.filter(isShortDoctorProcedureTreatment);
    if (!shortTreatments.length) return null;
    return {
      nextIndex,
      treatments: shortTreatments,
      treatment: formatTreatmentNames(shortTreatments),
      remaining
    };
  }

  function getCleanupShortDoctorProcedureInfo(bed, bedNo = null) {
    if (!bed || bed.complete || bed.running || !bed.lastAlertId) return null;
    if (!hasWaitingChunaDoctorProcedure(bed.doctorId || '', bedNo)) return null;
    const treatments = bed.treatments || [];
    const currentIndex = Number(bed.currentIndex || 0);
    const currentTreatments = getConcurrentTreatmentNames(treatments, currentIndex);
    const shortTreatments = currentTreatments.filter(isShortDoctorProcedureTreatment);
    if (!shortTreatments.length) return null;
    const nextLabel = formatTreatmentNames(shortTreatments) || shortTreatments[0] || '다음치료';
    return {
      treatments: [nextLabel],
      treatment: nextLabel,
      nextTreatments: shortTreatments
    };
  }

  function isDoctorProcedureBlinking(bedNo, bed) {
    // 원장실 시술 알림 확인 기능 제거 → 확인에 의한 점멸 없음
    return false;
  }

  function buildDoctorProcedureAlertItemsAuto(doctorId = selectedDoctorAlertId) {
    if (!doctorId) return [];
    const items = [];
    [...getDoctorBedNumbers(), ...ACTIVE_BED_NUMBERS].forEach(bedNo => {
      const bed = getBedData(bedNo);
      if (!bed || bed.complete || isFixedBedArrivalPending(bedNo, bed) || bed.doctorId !== doctorId) return;

      const cleanup = getCleanupShortDoctorProcedureInfo(bed, bedNo);
      if (cleanup) {
        const alertTimestamp = Number(String(bed.lastAlertId || '').split('-').pop()) || Number(bed.startedAt || bed.timestamp || 0);
        items.push({
          alertId: `${bed.lastAlertId}:cleanup:${cleanup.treatment}`,
          bedNo,
          doctorId: bed.doctorId || '',
          bedLabel: getBedLabel(bedNo),
          name: bed.name || '',
          nurseName: bed.nurseName || '',
          treatment: cleanup.treatment,
          treatments: cleanup.treatments,
          cleanup: true,
          alertPriority: 1,
          sortPriority: 0,
          timestamp: alertTimestamp,
          message: `${getBedLabel(bedNo)} ${bed.name || '환자'} ${cleanup.treatment}`
        });
        return;
      }

      if (bed.lastAlertId) return;

      if (bed.running) {
        const upcoming = getUpcomingShortDoctorProcedureInfo(bed, bedNo);
        if (!upcoming) return;
        const alertId = `${bed.patientKey || bed.chartNo || bedNo}:${bedNo}:soon:${upcoming.nextIndex}:${upcoming.treatment}`;
        items.push({
          alertId,
          bedNo,
          doctorId: bed.doctorId || '',
          bedLabel: getBedLabel(bedNo),
          name: bed.name || '',
          nurseName: bed.nurseName || '',
          treatment: upcoming.treatment,
          treatments: upcoming.treatments,
          soon: true,
          soonRemainingSeconds: upcoming.remaining,
          alertPriority: 1,
          sortPriority: 1,
          timestamp: Number(bed.startedAt || bed.timestamp || 0),
          message: `${getBedLabel(bedNo)} ${bed.name || '환자'} ${upcoming.treatment}`
        });
        return;
      }

      const treatments = getConcurrentTreatmentNames(bed.treatments || [], bed.currentIndex || 0);
      const currentTreatment = bed.treatments?.[bed.currentIndex || 0] || '치료';
      const treatment = formatTreatmentNames(treatments) || '치료';
      if (!treatments.some(isDoctorProcedureTreatment)) return;
      const alertId = getDoctorProcedureAlertId(bedNo, bed, currentTreatment);
      if (isDoctorProcedureAlertDismissed(bedNo, bed)) return;
      items.push({
        alertId,
        bedNo,
        doctorId: bed.doctorId || '',
        bedLabel: getBedLabel(bedNo),
        name: bed.name || '',
        nurseName: bed.nurseName || '',
        treatment,
        treatments,
        alertPriority: 1,
        sortPriority: treatments.some(isShortDoctorProcedureTreatment) ? 0 : 2,
        timestamp: Number(bed.doctorProcedureAlert?.dismissedAt || bed.startedAt || bed.timestamp || 0),
        message: `${getBedLabel(bedNo)} ${bed.name || '환자'} ${treatment}`
      });
    });
    return items.sort((a, b) => {
      const sortPriorityDiff = Number(a.sortPriority ?? 2) - Number(b.sortPriority ?? 2);
      if (sortPriorityDiff) return sortPriorityDiff;
      const priorityDiff = Number(a.alertPriority ?? 1) - Number(b.alertPriority ?? 1);
      if (priorityDiff) return priorityDiff;
      return Number(a.timestamp || 0) - Number(b.timestamp || 0);
    });
  }

  function getDoctorProcedureAlertItems(doctorId = selectedDoctorAlertId) {
    return applyDoctorAlertManualOrder(doctorId, buildDoctorProcedureAlertItemsAuto(doctorId));
    if (!doctorId) return [];
    const items = [...getDoctorBedNumbers(), ...ACTIVE_BED_NUMBERS]
      .map(bedNo => ({ bedNo, bed: getBedData(bedNo) }))
      .filter(({ bedNo, bed }) => {
        if (!bed || bed.complete || bed.running) return false;
        if (isFixedBedArrivalPending(bedNo, bed)) return false;
        if (bed.lastAlertId) return false;
        if (bed.doctorId !== doctorId) return false;
        const treatment = bed.treatments?.[bed.currentIndex || 0];
        return isDoctorProcedureTreatment(treatment);
      })
      .map(({ bedNo, bed }) => {
        const treatments = getConcurrentTreatmentNames(bed.treatments || [], bed.currentIndex || 0);
        const currentTreatment = bed.treatments?.[bed.currentIndex || 0] || '침';
        const treatment = formatTreatmentNames(treatments) || '침';
        const alertId = getDoctorProcedureAlertId(bedNo, bed, currentTreatment);
        if (isDoctorProcedureAlertDismissed(bedNo, bed)) return null;
        return {
          alertId,
          bedNo,
          doctorId: bed.doctorId || '',
          bedLabel: getBedLabel(bedNo),
          name: bed.name || '',
          nurseName: bed.nurseName || '',
          treatment,
          treatments,
          alertPriority: 1,
          timestamp: Number(bed.doctorProcedureAlert?.dismissedAt || bed.startedAt || bed.timestamp || 0),
          message: `${getBedLabel(bedNo)} ${bed.name || '환자'} ${treatment}`
        };
      })
      .filter(Boolean)
      .sort((a, b) => {
        const priorityDiff = Number(a.alertPriority ?? 1) - Number(b.alertPriority ?? 1);
        if (priorityDiff) return priorityDiff;
        return Number(a.timestamp || 0) - Number(b.timestamp || 0);
      });
    return applyDoctorAlertManualOrder(doctorId, items);
  }

  // ── 치료실/치료실알림 치료 시작 알림 (핫팩·물리치료·적외선) ──
  // 원장 시술 알림과 동일: 해당 치료가 현재 단계이고 아직 시작 안 했을 때 표시,
  // 베드에서 타이머 시작(running) 또는 치료 완료 시 자동으로 사라짐. 알림 클릭 삭제 불가.

  function getReceiveTreatmentAlertItems() {

  function syncAssignedPatientKeys(showNewAssignments = false) {
    const allBeds = [
      ...bedAssignments.map((bed, index) => bed ? { bed, bedNo: index + 1 } : null).filter(Boolean),
      ...Object.entries(doctorBedMap).map(([bedNo, bed]) => ({ bed, bedNo: Number(bedNo) }))
    ];
    allBeds.forEach(({ bed, bedNo }) => {
      if (Number(bedNo) >= 101) return;
      if (!bed?.patientKey) return;
      const alreadyKnown = knownAssignedPatientKeys.has(bed.patientKey);
      knownAssignedPatientKeys.add(bed.patientKey);
      const isNewAfterPageLoad = Number(bed.timestamp || 0) > pageLoadedAt;
      if (!alreadyKnown && shouldShowAssignmentAlerts() && (showNewAssignments || isNewAfterPageLoad)) {
        const staffLine = [
          bed.doctorName ? `원장 ${escapeHtml(bed.doctorName)}` : '',
          bed.nurseName ? `간호사 ${escapeHtml(bed.nurseName)}` : ''
        ].filter(Boolean).join(' · ');
        assignmentAlertItems.unshift({
          id: `${bed.patientKey}-${bedNo}-${Date.now()}`,
          name: bed.name || '',
          bedLabel: getBedLabel(bedNo),
          staffLine
        });
        renderUpcomingAlerts();
      }
    });
  }

  function getActiveBedAlertIds() {
    return new Set(getAllBedEntries().map(({ bed }) => bed?.lastAlertId).filter(Boolean));
  }

  function syncTimerAlertsWithBeds() {
    const activeAlertIds = getActiveBedAlertIds();
    let changed = false;

    if (activeTimerAlert?.alertId && !activeAlertIds.has(activeTimerAlert.alertId)) {
      activeTimerAlert = null;
      isTimerAlertOpen = false;
      document.getElementById('timerAlertOverlay').classList.remove('show');
      stopTimerAlertBeeps();
      changed = true;
    }

    for (let i = timerAlertQueue.length - 1; i >= 0; i--) {
      const alert = timerAlertQueue[i];
      if (alert.alertId && !activeAlertIds.has(alert.alertId)) {
        timerAlertQueue.splice(i, 1);
        changed = true;
      }
    }

    queuedTimerAlerts.forEach(alertId => {
      if (!activeAlertIds.has(alertId)) queuedTimerAlerts.delete(alertId);
    });
    seenTimerAlerts.forEach(alertId => {
      if (!activeAlertIds.has(alertId)) seenTimerAlerts.delete(alertId);
    });

    if (changed) syncPendingTimerAlertBeds();
  }

  function handleRemoteTimerAlerts(markOnly = false) {
    getAllBedEntries().forEach(({ bed, bedNo }) => {
      if (!bed?.lastAlertId || seenTimerAlerts.has(bed.lastAlertId)) return;
      seenTimerAlerts.add(bed.lastAlertId);
      if (markOnly) return;
      showTimerCompleteAlert(bed.lastAlertMessage || `${bed.name || ''} 치료 완료`, bedNo, bed.lastAlertId);
    });
  }

  window.toggleBedPopover = (el) => {
    document.querySelectorAll('.bed-status.open').forEach(item => {
      if (item !== el) item.classList.remove('open');
    });
    el.classList.toggle('open');
  };

  let lastPassiveUpcomingAlertsRenderAt = 0;
  function renderUpcomingAlertsPassively() {
    const now = Date.now();
    if (now - lastPassiveUpcomingAlertsRenderAt < 5000) return;
    lastPassiveUpcomingAlertsRenderAt = now;
    renderUpcomingAlerts();
  }

  function ensureBedTicker() {
    if (bedRenderTicker) return;

    bedRenderTicker = setInterval(() => {
      const tickBed = (bed, bedNo) => {
        if (!bed || bed.complete) return;
        if (bed.running && getRemaining(bed) <= 0) {
          finishBedStep(bedNo);
        } else {
          updateTimerDom(bedNo);
        }
      };
      if (isRegularFixedBedScreen()) {
        const fixedBedNo = getFixedBedNoFromUrl();
        tickBed(getBedData(fixedBedNo), fixedBedNo);
        updateBedRemainingChip();
        return;
      }
      if (isFixedDoctorBedScreen()) {
        const fixedDoctorBedNo = getFixedDoctorBedNoFromUrl();
        const fixedDoctorBed = getBedData(fixedDoctorBedNo);
        if (fixedDoctorBed) {
          tickBed(fixedDoctorBed, fixedDoctorBedNo);
          updateTimerNextStaffTaskDom(fixedDoctorBedNo, fixedDoctorBed, 'bed');
          updateBedRemainingChip();
        } else {
          renderBedDoctorAlertPanel();
          syncFixedDoctorRoomAlertAudio();
        }
        return;
      }
      bedAssignments.forEach((bed, index) => tickBed(bed, index + 1));
      Object.entries(doctorBedMap).forEach(([bedNo, bed]) => tickBed(bed, Number(bedNo)));
      renderUpcomingAlertsPassively();
      updateDeskWaitChip();
      updateBedRemainingChip();
      syncDoctorProcedureAlerts();
    }, 1000);
  }

  function playSoftTimerChime() {
    try {
      if (!timerAlertAudioCtx) {
        timerAlertAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      const ctx = timerAlertAudioCtx;
      const master = ctx.createGain();
      master.gain.setValueAtTime(0.42, ctx.currentTime);
      master.connect(ctx.destination);

      const notes = [
        { freq: 392.00, at: 0.00, volume: 0.13 },
        { freq: 493.88, at: 0.34, volume: 0.12 }
      ];

      notes.forEach(({ freq, at, volume }) => {
        const start = ctx.currentTime + at;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, start);
        osc.connect(gain);
        gain.connect(master);
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(volume, start + 0.08);
        gain.gain.exponentialRampToValueAtTime(0.001, start + 1.15);
        osc.start(start);
        osc.stop(start + 1.2);
      });
    } catch(e) {}
  }
