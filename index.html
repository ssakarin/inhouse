    return type === 'doctors'
      ? ['doctorSelect', 'receiveDoctorSelect', 'bedDoctorSelect']
      : ['nurseSelect', 'receiveNurseSelect', 'bedNurseSelect'];
  }

  function getStaffListId(type) {
    return type === 'doctors' ? 'doctorList' : 'nurseList';
  }

  function getStaffListIds(type) {
    return type === 'doctors' ? ['doctorList'] : ['nurseList', 'nurseQuickList'];
  }

  function syncNurseAutoAssignInputs() {
    ['nurseAutoAssignEnabled', 'nurseQuickAutoAssignEnabled'].forEach(id => {
      const input = document.getElementById(id);
      if (input) input.checked = nurseAutoAssignEnabled;
    });
  }

  function syncAutoBedAssignInputs() {
    ['autoBedAssignEnabled', 'autoBedAssignEnabledDesk'].forEach(id => {
      const input = document.getElementById(id);
      if (input) input.checked = autoBedAssignEnabled;
    });
  }

  function getSortedStaff(type) {
    return [...staffByType[type].entries()]
      .sort((a, b) => (a[1].timestamp || 0) - (b[1].timestamp || 0));
  }

  const DOCTOR_VACATION_WEEKDAYS = [
    { day: 1, label: '월' },
    { day: 2, label: '화' },
    { day: 3, label: '수' },
    { day: 4, label: '목' },
    { day: 5, label: '금' },
    { day: 6, label: '토' }
  ];

  function normalizeDoctorVacationWeekdays(value) {
    return [...new Set((Array.isArray(value) ? value : [])
      .map(day => Number(day))
      .filter(day => Number.isInteger(day) && day >= 1 && day <= 6))]
      .sort((a, b) => a - b);
  }

  function isDoctorAutoVacationToday(doctor = {}, date = new Date()) {
    const weekdays = normalizeDoctorVacationWeekdays(doctor.vacationWeekdays);
    return weekdays.includes(date.getDay());
  }

  function isDoctorUnavailable(doctor = {}) {
    return Boolean(doctor?.vacation || isDoctorAutoVacationToday(doctor));
  }

  function getActiveDoctors() {
    return getSortedStaff('doctors').filter(([, doctor]) => !isDoctorUnavailable(doctor));
  }

  function getFirstActiveDoctor() {
    const [id, doctor] = getActiveDoctors()[0] || [];
    return id ? { id, name: doctor?.name || '' } : { id: '', name: '' };
  }

  function renderStaffControls() {
    ['doctors', 'nurses'].forEach(type => {
      const label = getStaffLabel(type);
      const staff = getSortedStaff(type);

      getStaffSelectIds(type).forEach(selectId => {
        const select = document.getElementById(selectId);
        if (!select) return;
        const selectedValue = select.value;
        select.innerHTML = `<option value="">${label} 선택 안함</option>` + staff.map(([key, data]) =>
          `<option value="${escapeHtml(key)}" ${type === 'doctors' && isDoctorUnavailable(data) ? 'disabled' : ''}>${escapeHtml(data.name || '')}${type === 'doctors' && isDoctorUnavailable(data) ? ' (자리비움)' : ''}</option>`
        ).join('');
        const selectedStaff = staffByType[type].get(selectedValue);
        if (selectedStaff && !(type === 'doctors' && isDoctorUnavailable(selectedStaff))) select.value = selectedValue;
        const scope = selectId.startsWith('receive') ? 'receive' : selectId.startsWith('bed') ? 'bed' : 'desk';
        select.onchange = () => scheduleSelectFieldSave?.(scope, 0);
      });

      const listHtml = staff.length
        ? staff.map(([key, data]) => {
          const doctorWeekdays = type === 'doctors' ? normalizeDoctorVacationWeekdays(data.vacationWeekdays) : [];
          return `
          <div class="staff-item${data.vacation ? ' vacation' : ''}">
            <div class="staff-name">${escapeHtml(data.name || '')}</div>
            ${(type === 'nurses' || type === 'doctors') ? `
              <label class="staff-vacation-toggle">
                <input type="checkbox" ${data.vacation ? 'checked' : ''} onchange="${type === 'doctors' ? 'toggleDoctorVacation' : 'toggleNurseVacation'}('${key}', this.checked)">
                <span>자리비움</span>
              </label>` : ''}
            ${type === 'doctors' ? `
              <div class="staff-weekday-toggle" aria-label="요일별 자동 자리비움">
                ${DOCTOR_VACATION_WEEKDAYS.map(({ day, label: dayLabel }) => `
                  <label title="${dayLabel}요일 자동 자리비움">
                    <input type="checkbox" ${doctorWeekdays.includes(day) ? 'checked' : ''} onchange="toggleDoctorVacationWeekday('${key}', ${day}, this.checked)">
                    <span>${dayLabel}</span>
                  </label>`).join('')}
              </div>` : ''}
            <button class="staff-delete-btn" onclick="deleteStaff('${type}', '${key}')">삭제</button>
          </div>`;
        }).join('')
        : `<div class="empty-state"><div class="empty-icon">+</div><div class="empty-text">등록된 ${label}이 없습니다</div></div>`;

      getStaffListIds(type).forEach(listId => {
        const list = document.getElementById(listId);
        if (!list) return;
        list.innerHTML = listHtml;
      });
    });
    renderDoctorAlertSelect();
  }

  function renderDoctorAlertSelect() {
    const doctors = getActiveDoctors();
    if (doctors.length) doctorAlertSelectInitialized = true;

    // 데스크 원장 호출 토글 (방과 무관, 전역 selectedDoctorAlertId 하나)
    if (selectedDoctorAlertId && !doctors.some(([id]) => id === selectedDoctorAlertId)) {
      selectedDoctorAlertId = '';
      localStorage.removeItem('selectedDoctorAlertId');
    }
    if (!selectedDoctorAlertId && doctors.length) {
      selectedDoctorAlertId = doctors[0][0];
      localStorage.setItem('selectedDoctorAlertId', selectedDoctorAlertId);
    }
    const deskContainer = document.getElementById('doctorAlertBtns');
    if (deskContainer) {
      if (!doctors.length) {
        deskContainer.innerHTML = '<span class="doctor-alert-empty">원장 없음</span>';
      } else {
        const name = staffByType.doctors.get(selectedDoctorAlertId)?.name || doctors[0][1]?.name || '원장';
        const active = selectedDoctorAlertId ? ' active' : '';
        deskContainer.innerHTML = '<button type="button" class="doctor-alert-btn doctor-alert-toggle' + active + '" onclick="cycleDoctorAlertFilter()">' + escapeHtml(name) + '</button>';
      }
    }

    // 베드(원장실)별 알림 토글 — 현재 보고 있는 원장실 번호 기준으로 독립적으로 선택/저장
    // (원장실1 → 기본 첫번째 등록원장, 원장실2 → 기본 두번째 등록원장, ...)
    const bedContainer = document.getElementById('bedDoctorAlertBtns');
    const bedResetContainer = document.getElementById('bedDoctorAlertReset');
    if (bedContainer) {
      if (!doctors.length) {
        bedContainer.innerHTML = '<span class="doctor-alert-empty">원장 없음</span>';
        if (bedResetContainer) bedResetContainer.innerHTML = '';
      } else {
        const roomBedNo = Number(selectedBedNo);
        let bedDoctorId = getSelectedDoctorAlertIdForBed(roomBedNo);
        if (bedDoctorId && !doctors.some(([id]) => id === bedDoctorId)) {
          bedDoctorId = '';
        }
        setSelectedDoctorAlertIdForBed(roomBedNo, bedDoctorId);
        const name = bedDoctorId ? (staffByType.doctors.get(bedDoctorId)?.name || '원장') : '원장선택';
        bedContainer.innerHTML = '<button type="button" class="doctor-alert-btn doctor-alert-toggle' + (bedDoctorId ? ' active' : '') + '" onclick="cycleBedDoctorAlertFilter()">' + escapeHtml(name) + '</button>';
        if (bedResetContainer) bedResetContainer.innerHTML = '';
      }
    }

    renderBedDoctorAlertPanel();
  }

  window.setDoctorAlertFilter = (doctorId) => {
    selectedDoctorAlertId = doctorId || '';
    if (selectedDoctorAlertId) localStorage.setItem('selectedDoctorAlertId', selectedDoctorAlertId);
    else localStorage.removeItem('selectedDoctorAlertId');
    activeDoctorProcedureAlert = null;
    doctorProcedureAlertQueue.length = 0;
    queuedDoctorProcedureAlerts.clear();
    renderDoctorAlertSelect();
    syncDoctorProcedureAlerts();
    syncFixedDoctorRoomAlertAudio(true);
    renderUpcomingAlerts();
  };

  // 버튼 1개 순환: 누를 때마다 등록된 원장만 순환
  window.cycleDoctorAlertFilter = () => {
    const doctors = getActiveDoctors();
    if (!doctors.length) return;
    const cycle = doctors.map(([key]) => key);
    const idx = cycle.indexOf(selectedDoctorAlertId);
    const next = cycle[(idx + 1) % cycle.length];
    window.setDoctorAlertFilter(next);
  };

  // 원장실(베드)별 알림 토글 순환 — 현재 보고 있는 원장실 번호에만 영향을 주고,
  // 다른 원장실의 선택값은 그대로 둔다.
  window.cycleBedDoctorAlertFilter = () => {
    const doctors = getActiveDoctors();
    if (!doctors.length) return;
    const roomBedNo = Number(selectedBedNo);
    const cycle = ['', ...doctors.map(([key]) => key)];
    const idx = cycle.indexOf(getSelectedDoctorAlertIdForBed(roomBedNo));
    const next = cycle[(idx + 1) % cycle.length];

  function getTreatmentBadgeClass(treatment) {
    const name = String(treatment || '').trim().toLowerCase();
    if (name === '핫팩') return 'treatment-hotpack';
    if (name === '물리치료' || name === 'sw' || name === '아이스팩' || name === '테이핑') return 'treatment-physical';
    if (name === '적외선') return 'treatment-infrared';
    if (name === '침' || name === '전침') return 'treatment-acu';
    if (name === '건부항' || name === '습부항') return 'treatment-cupping';
    if (name === '단추' || name === '복추' || name === '추나' || name === '벤치') return 'treatment-chuna';
    if (name === '왕뜸' || name === '전자뜸') return 'treatment-moxa';
    if (/^약침/.test(name)) return 'treatment-pharm';
    if (name === '진찰' || name === '베드진찰') return 'treatment-exam';
    return '';
  }

  function renderTreatmentBadge(treatment) {
    const label = String(treatment || '치료').trim() || '치료';
    const className = getTreatmentBadgeClass(label);
    return `<div class="upcoming-time treatment-badge ${className}">${escapeHtml(label)}</div>`;

  function renderDoctorRoomAlertChips(item, options = {}) {
    const treatmentNames = (Array.isArray(item?.treatments) && item.treatments.length ? item.treatments : [item?.treatment])
      .map(name => String(name || '').trim())
      .filter(Boolean);
    const normalizeTreatmentNameForColor = (name) => String(name || '').replace(/\s*정리중\s*$/, '').trim();
    const doctorRoomTreatmentTextClass = (name) => (
      normalizeTreatmentNameForColor(name) === '단추' || normalizeTreatmentNameForColor(name) === '복추'
        ? `${getTreatmentBadgeClass(normalizeTreatmentNameForColor(name))} doctor-room-alert-treatment-purple`
        : getTreatmentBadgeClass(normalizeTreatmentNameForColor(name))
    );
    const renderTreatmentName = (name) => {
      const cleanName = normalizeTreatmentNameForColor(name);
      const suffix = cleanName && cleanName !== name ? name.slice(cleanName.length).trim() : '';
      const colorClass = doctorRoomTreatmentTextClass(name);
      if (!suffix) {
        return `<span class="upcoming-time treatment-badge doctor-room-alert-treatment-text ${colorClass}">${escapeHtml(name)}</span>`;
      }
      return `<span class="doctor-room-alert-treatment-wrap"><span class="upcoming-time treatment-badge doctor-room-alert-treatment-text ${colorClass}">${escapeHtml(cleanName)}</span><span class="doctor-room-alert-cleanup-text">${escapeHtml(suffix)}</span></span>`;
    };
    const bedLabel = item?.bedLabel || (item?.bedNo ? String(item.bedNo) : '');
    const patientName = options.includePatientName ? String(item?.name || '').trim() : '';
    const orderControlsHtml = options.orderControlsHtml || '';
    return `
      <div class="doctor-room-alert-chips">
        <span class="doctor-room-alert-bed-chip">${escapeHtml(bedLabel)}</span>
        ${treatmentNames.map(renderTreatmentName).join('')}
        ${patientName ? `<span class="doctor-alert-patient-chip">${escapeHtml(patientName)}</span>` : ''}
        ${orderControlsHtml}
      </div>`;
  }

  function isPriorityDoctorRoomTreatment(item) {
    const names = (Array.isArray(item?.treatments) && item.treatments.length ? item.treatments : [item?.treatment])
      .map(name => String(name || '').replace(/\s+/g, '').toLowerCase())
      .filter(Boolean);
    return names.some(name =>
      name.includes('추나') ||
      name.includes('복추') ||
      name.includes('버치') ||
      name.includes('진찰') ||
      name.includes('베드진찰')
    );
  }

  function shouldShowPatientNameInTreatmentRoomDoctorAlert(item) {
    const names = (Array.isArray(item?.treatments) && item.treatments.length ? item.treatments : [item?.treatment])
      .map(name => String(name || '').replace(/\s+/g, '').toLowerCase())
      .filter(Boolean);
    return names.some(name => {
      const badgeClass = getTreatmentBadgeClass(name);
      return badgeClass === 'treatment-chuna'
        || badgeClass === 'treatment-exam'
        || name.includes('단추')
        || name.includes('추나')
        || name.includes('복추')
        || name.includes('진찰')
        || name.includes('베드진찰');
    });
  }

    return items.length ? renderBedDoctorAlertItems(items) : `<div class="empty-state"><div class="empty-icon">-</div><div class="empty-text">알림 없음</div></div>`;

  function syncFixedDoctorRoomAlertAudio(markOnly = false) {
    if (!isFixedDoctorBedScreen()) {
      seenFixedDoctorRoomAlertIds.clear();
      fixedDoctorRoomAlertAudioInitialized = false;
      stopFixedDoctorRoomAlertBeeps();
      return;
    }
    const fixedBedNo = Number(getFixedDoctorBedNoFromUrl());
    const doctorId = getSelectedDoctorAlertIdForBed(fixedBedNo) || '';
    const activeIds = new Set(
      (doctorId ? getDoctorProcedureAlertItems(doctorId) : [])
        .map(item => item.alertId)
        .filter(Boolean)
    );
    seenFixedDoctorRoomAlertIds.forEach(alertId => {
      if (!activeIds.has(alertId)) seenFixedDoctorRoomAlertIds.delete(alertId);
    });
    const newIds = [...activeIds].filter(alertId => !seenFixedDoctorRoomAlertIds.has(alertId));
    activeIds.forEach(alertId => seenFixedDoctorRoomAlertIds.add(alertId));
    const roomOccupied = Boolean(getBedData(window.getFixedDoctorBedNoFromUrl?.()));
    if (activeIds.size && !roomOccupied) {
      startFixedDoctorRoomAlertBeeps(fixedDoctorRoomAlertAudioInitialized && !markOnly && newIds.length > 0);
    } else {
      stopFixedDoctorRoomAlertBeeps();
    }
    if (!fixedDoctorRoomAlertAudioInitialized || markOnly) {
      fixedDoctorRoomAlertAudioInitialized = true;
      return;
    }
  }

    const selectId = type === 'doctors'
      ? (scope === 'bed' ? 'bedDoctorSelect' : scope === 'receive' ? 'receiveDoctorSelect' : 'doctorSelect')
      : (scope === 'bed' ? 'bedNurseSelect' : scope === 'receive' ? 'receiveNurseSelect' : 'nurseSelect');

    const id = stored[`${type === 'doctors' ? 'doctor' : 'nurse'}Id`] || '';

    if (storedIdData && !(type === 'doctors' && isDoctorUnavailable(storedIdData))) {
      select.value = id;
      return;
    }
    if (name) {
      const match = getSortedStaff(type).find(([, data]) => (data?.name || '') === name && !(type === 'doctors' && isDoctorUnavailable(data)));
      if (match) {
        select.value = match[0];
        return;

      select.value = fallback.id || '';

  function getTodayKey() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const d = String(now.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function getDateKeyFromDate(date = new Date()) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function isTimestampOnDate(timestamp, dateKey = getTodayKey()) {
    const value = Number(timestamp || 0);
    if (!value) return false;
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return false;
    return getDateKeyFromDate(date) === dateKey;
  }

  let lastAppointmentDeskAlertDate = getTodayKey();
  async function cleanupStaleAppointmentDeskAlerts(dateKey = getTodayKey()) {
    const keptEntries = [...appointmentDeskAlertItems.entries()]
      .filter(([, data]) => isTimestampOnDate(data?.timestamp, dateKey));
    if (keptEntries.length === appointmentDeskAlertItems.size) return;
    const next = Object.fromEntries(keptEntries);
    appointmentDeskAlertItems.clear();
    keptEntries.forEach(([key, data]) => appointmentDeskAlertItems.set(key, data));
    renderUpcomingAlerts();
    try {
      await clearAppointmentDeskAlerts(next);
    } catch (e) {
      console.error('appointment desk alert cleanup failed', e);
    }
  }

  function syncAppointmentDeskAlertsForCurrentDate() {
    const today = getTodayKey();
    if (today === lastAppointmentDeskAlertDate) return;
    lastAppointmentDeskAlertDate = today;
    cleanupStaleAppointmentDeskAlerts(today);
  }

  function getDailyStartOffset(count) {
    if (!count) return 0;
    const date = new Date();
    const start = new Date(date.getFullYear(), 0, 0);
    const dayOfYear = Math.floor((date - start) / 86400000);
    return dayOfYear % count;
  }

  function getMemoOriginalsFromRecord(record = {}) {
    if (!record) return { memo1: '', memo2: '' };
    const memo2Date = getMemo2HistoryDate(record || {});
    const currentMemo2 = getMemo2ForDate(record || {}, memo2Date);
    return {
      memo1: String(Object.prototype.hasOwnProperty.call(record, 'memo1Original') ? record.memo1Original : (record.memo1 || record.chiefComplaint || '')).trim(),
      memo2: String(Object.prototype.hasOwnProperty.call(record, 'memo2Original') ? record.memo2Original : currentMemo2).trim()
    };
  }

  function setFormMemoOriginals(scope, record = null) {
    const originals = record ? getMemoOriginalsFromRecord(record) : { memo1: '', memo2: '' };
    formMemoOriginalByScope[scope] = { ...originals, active: Boolean(record) };
    formMemo2HistorySourceByScope[scope] = record || null;
    updateFormMemoEditedState(scope);
  }

  function updateFormMemoEditedState(scope) {
    const ids = PATIENT_FORM_IDS[scope] || PATIENT_FORM_IDS.desk;
    const originals = formMemoOriginalByScope[scope] || { memo1: '', memo2: '', active: false };
    const memo1El = document.getElementById(ids.chiefComplaint);
    const memo2El = document.getElementById(ids.memo);
    if (memo1El) {
      const edited = originals.active && memo1El.value.trim() !== originals.memo1;
      memo1El.classList.toggle('memo-edited-field', edited);
    }
    if (memo2El) {
      const edited = originals.active && memo2El.value.trim() !== originals.memo2;
      memo2El.classList.toggle('memo-edited-field', edited);
    }
    renderMemo2HistoryDropdown(scope);
  }

  function shouldShowMemo2HistoryForScope(scope) {
    if (scope === 'bed') {
      return Boolean(formMemoOriginalByScope.bed?.active);
    }
    return Boolean(
      formEditBedNoByScope[scope]
      || formEditPatientKeyByScope[scope]
      || formEditDischargedKeyByScope[scope]
    );
  }

  function getMemo2HistoryItemsForScope(scope) {
    const ids = PATIENT_FORM_IDS[scope] || PATIENT_FORM_IDS.desk;
    const source = formMemo2HistorySourceByScope[scope] || selectedChartPatientByScope[scope] || {};
    const currentDate = toLocalDateInputValue();
    const currentMemo = String(document.getElementById(ids.memo)?.value || '').trim();
    return Object.entries(normalizeMemo2History(source))
      .map(([date, memo]) => [date, String(memo || '').trim()])
      .filter(([date, memo]) => date !== currentDate && memo && memo !== currentMemo)
      .sort(([dateA], [dateB]) => dateB.localeCompare(dateA))
      .slice(0, 4);
  }

  function renderMemo2HistoryDropdown(scope) {
    const ids = PATIENT_FORM_IDS[scope] || PATIENT_FORM_IDS.desk;
    const list = document.getElementById(ids.memoHistoryList);
    if (!list) return;
    if (!shouldShowMemo2HistoryForScope(scope)) {
      list.classList.remove('show');
      list.innerHTML = '';
      return;
    }
    const items = getMemo2HistoryItemsForScope(scope);
    list.classList.toggle('show', items.length > 0);
    if (!items.length) {
      list.innerHTML = '';
      return;
    }
    list.innerHTML = items.map(([date, memo]) => {
      const shortDate = date.slice(5).replace('-', '/');
      return `<button type="button" class="memo2-history-item" onclick="applyMemo2HistoryEntry('${scope}', ${escapeHtmlJsString(memo)})"><span class="memo2-history-date">${escapeHtml(shortDate)}</span>${escapeHtml(memo)}</button>`;
    }).join('');
  }

  window.applyMemo2HistoryEntry = function(scope, memo) {
    const ids = PATIENT_FORM_IDS[scope] || PATIENT_FORM_IDS.desk;
    const input = document.getElementById(ids.memo);
    if (!input) return;
    input.value = String(memo || '');
    input.dispatchEvent(new Event('input', { bubbles: true }));
    updateFormMemoEditedState(scope);
    if (scope === 'bed') setBedMemoOpen(true);
  }

  async function hydrateMemo2HistorySource(scope, record = null) {
    if (!record?.chartNo && !record?.patientId) return;
    const requestId = `${Date.now()}:${Math.random()}`;
    formMemo2HistorySourceByScope[`${scope}RequestId`] = requestId;
    try {
      const patientId = String(record.patientId || '').trim();
      const chartRecord = patientId
        ? await lookupChartPatientById(patientId)
        : null;
      const chartMatches = chartRecord ? [chartRecord] : await lookupChartPatientsFlexible(record.chartNo);
      const matched = chartMatches.find(patient => {
        const sameId = patientId && String(patient?.patientId || '') === patientId;
        const sameName = !patientId && String(patient?.name || '').trim() === String(record.name || '').trim();
        return sameId || sameName || chartMatches.length === 1;
      }) || null;
      if (!matched || formMemo2HistorySourceByScope[`${scope}RequestId`] !== requestId) return;
      formMemo2HistorySourceByScope[scope] = {
        ...record,
        ...matched,
        memo2History: {
          ...normalizeMemo2History(record),
          ...normalizeMemo2History(matched)
        }
      };
      renderMemo2HistoryDropdown(scope);
    } catch (error) {
      console.error('메모2 과거 기록 조회 실패', error);
    }
  }

  function setSelectedChartPatient(scope, patient = null) {

  }

  window.submitPatient = async (scope = 'desk') => {
    const ids = PATIENT_FORM_IDS[scope] || PATIENT_FORM_IDS.desk;
    if ((scope === 'desk' || scope === 'receive') && formEditBedNoByScope[scope]) {
      const saved = await saveMonitorBedPatientInfo(scope);
      if (saved) closeMonitorEditForm(scope);
      return;
    }
    if ((scope === 'desk' || scope === 'receive') && formEditPatientKeyByScope[scope]) {
      const saved = await saveWaitingPatientInfo(scope);
      if (saved) closeMonitorEditForm(scope);
      return;
    }
    if ((scope === 'desk' || scope === 'receive') && formEditDischargedKeyByScope[scope]) {
      const saved = await saveDischargedPatientInfo(scope);
      if (saved) closeMonitorEditForm(scope);
      return;
    }
    if (scope === 'desk') syncInitialVisitTreatment('desk');
    const name = document.getElementById(ids.name).value.trim();
    const chartNo = normalizeChartNo(document.getElementById(ids.chartNo).value);
    const memo1 = document.getElementById(ids.chiefComplaint).value.trim();
    const memo2 = document.getElementById(ids.memo).value.trim();
    const memo2Patch = withMemo2ForDate({}, memo2, toLocalDateInputValue());
    const age = document.getElementById(ids.age).value.trim();
    const visitType = document.querySelector(`input[name="${ids.visitType}"]:checked`)?.value || '초진';
    const gender = document.querySelector(`input[name="${ids.gender}"]:checked`)?.value || '남';
    let doctor = getSelectedStaff('doctors', scope);
    let nurse = getSelectedStaff('nurses', scope);
    let treatments = (treatmentSelections[ids.treatmentGrid] || []).map(s => s.name);
    const packagePayload = getPackagePayload(ids.treatmentGrid);
    const spineSettings = getSpineSettingsForGrid(ids.treatmentGrid);

    if (!name) { showToast('❗ 성함을 입력해주세요'); return; }
    if (scope !== 'desk' && treatments.length === 0) { showToast('❗ 진료 종류를 선택해주세요'); return; }

    // 차트번호 조회로 기존 환자가 자동 선택돼도, 입력한 이름이 다르면
    // 동일 차트번호의 다른 사람이므로 그 환자의 patientId를 재사용하지 않는다.
    // (재사용하면 베드비우기 저장 시 기존 환자 레코드를 덮어써 한 명만 남는다)
    const selectedChartPatient = selectedChartPatientByScope[scope];
    const isSameChartPatient = Boolean(selectedChartPatient &&
      normalizePatientIdentity(selectedChartPatient.name) === normalizePatientIdentity(name));
    const patientId = isSameChartPatient ? (selectedChartPatient.patientId || '') : '';
    // 보험 정보는 동일 환자일 때만 차트 레코드에서 가져온다(다른 사람이면 그 사람 정보가 아니므로 제외).
    const insuranceType = isSameChartPatient ? (selectedChartPatient.insuranceType || '') : '';
    const duplicatePatient = findRealtimeRegisteredPatient({ patientId, chartNo, name });
    if (duplicatePatient) {
      showToast(`${duplicatePatient.name || name} 이미 ${duplicatePatient.location || '등록'}에 있습니다`);
      return;
    }
    const lastVisitDate = isSameChartPatient ? getPatientLatestVisitDate(selectedChartPatient) : '';
    if (!doctor.id && selectedChartPatientByScope[scope]?.doctorName) {
      doctor = getFirstActiveDoctor();
    }

    const btn = document.getElementById(ids.submitBtn);
    btn.disabled = true;
    btn.textContent = '입력 중...';

    try {
      const now = new Date();
      await pushPatient({
        name,
        treatments,
        timestamp: now.getTime(),
        timeStr: now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }),
        date: now.toLocaleDateString('ko-KR'),
        bedStatus: 'waiting',
        patientId,
        insuranceType,
        chartNo,
        visitType,
        age: age ? Number(age) : '',
        gender,
        bodyParts: normalizeBodyParts(formBodyPartsByScope[scope]),
        doctorId: doctor.id,
        doctorName: doctor.name,
        nurseId: nurse.id,
        nurseName: nurse.name,
        lastVisitDate,
        memo1,
        memo2,
        memo2History: memo2Patch.memo2History,
        spineSettings,
        ...packagePayload
      });

      if (chartNo) {
        await window.saveChartPatient?.({
          patientId,
          chartNo,
          name,
          age: age ? Number(age) : '',
          gender,
          visitType,
          chiefComplaint: memo1,
          memo1,
          memo2,
          memo2History: memo2Patch.memo2History
        });
      }

      // 초기화
      document.getElementById(ids.name).value = '';
      document.getElementById(ids.chartNo).value = '';
      document.getElementById(ids.chiefComplaint).value = '';
      document.getElementById(ids.memo).value = '';
      document.getElementById(ids.age).value = '';
      setFormMemoOriginals(scope, null);
      const visitDefault = document.querySelector(`input[name="${ids.visitType}"]`);
      const genderDefault = document.querySelector(`input[name="${ids.gender}"]`);
      if (visitDefault) visitDefault.checked = true;
      if (genderDefault) genderDefault.checked = true;
      formBodyPartsByScope[scope] = { front: [], back: [] };
      renderFormBodyPartSelector(scope);
      treatmentSelections[ids.treatmentGrid] = [];
      renderTreatmentChips(ids.treatmentGrid);
      syncTreatBtnStates(ids.treatmentGrid);

      if (scope === 'desk') window.clearChartLookupBadge?.();
      setSelectedChartPatient(scope, null);
      resetPCredits(ids.treatmentGrid);
      resetSpineSettings(ids.treatmentGrid);

      showToast(`✅ ${name} 알림 전송 완료`);
      if (scope === 'desk') {
        setInputFormOpen(false);
        renderUpcomingAlerts();
        renderWaitingLists();
      }
      if (scope === 'receive') setReceiveFormOpen(false);
    } catch (e) {
      showToast('❌ 전송 실패 — 연결을 확인해주세요');
      console.error(e);
    }

    btn.disabled = false;
    btn.textContent = '입력';
  };

  function setTreatmentSelection(gridId, treatments = []) {
    // treatments는 이름 배열 (예: ['침', '핫팩'])
    const normalizedTreatments = treatments.map(name => getTreatmentByName(name)?.name).filter(Boolean);
    const currentNames = (treatmentSelections[gridId] || []).map(item => item.name);
    if (currentNames.length === normalizedTreatments.length && currentNames.every((name, index) => name === normalizedTreatments[index])) return;
    // 순서는 원래 treatments 배열 순서대로 유지
    const ordered = [];
    normalizedTreatments.forEach(name => {
      const t = getTreatmentByName(name);
      if (t) ordered.push(createTreatmentSelectionItem(t));

    treatmentSelections[gridId] = ordered;
    renderTreatmentChips(gridId);

  function toLocalDateInputValue(date = new Date()) {
    const yyyy = date.getFullYear();
    const mm = String(date.getMonth() + 1).padStart(2, '0');
    const dd = String(date.getDate()).padStart(2, '0');
    return `${yyyy}-${mm}-${dd}`;
  }

  function getVisitDateFromTimestamp(timestamp) {
    const value = Number(timestamp || 0);
    return toLocalDateInputValue(value ? new Date(value) : new Date());
  }

  function normalizeMemo2History(record = {}) {
    record = record || {};
    const history = {};
    [record.memo2History, record.memo2ByDate].forEach(source => {
      if (!source || typeof source !== 'object' || Array.isArray(source)) return;
      Object.entries(source)
        .filter(([date]) => /^\d{4}-\d{2}-\d{2}$/.test(String(date || '')))
        .forEach(([date, memo]) => {
          history[String(date)] = String(memo || '');
        });
    });
    Object.entries(record.visitHistory || {})
      .filter(([date, visit]) => /^\d{4}-\d{2}-\d{2}$/.test(String(date || '')) && Object.prototype.hasOwnProperty.call(visit || {}, 'memo2'))
      .forEach(([date, visit]) => {
        history[String(date)] = String(visit?.memo2 || '');
      });
    return history;
  }

  function getMemo2HistoryDate(source = {}) {
    const candidates = [
      source.visitDate,
      source.visitEntry?.date,
      source.dischargeDate,
      source.date
    ];
    const isoDate = candidates.map(value => String(value || '').trim()).find(value => /^\d{4}-\d{2}-\d{2}$/.test(value));
    return isoDate || getVisitDateFromTimestamp(source.timestamp);
  }

  function getMemo2ForDate(record = {}, date = toLocalDateInputValue()) {
    const history = normalizeMemo2History(record);
    if (Object.prototype.hasOwnProperty.call(history, date)) return history[date] || '';
    return Object.keys(history).length ? '' : (record.memo2 || '');
  }

  function withMemo2ForDate(record = {}, memo2 = '', date = toLocalDateInputValue()) {
    const history = normalizeMemo2History(record);
    history[date] = String(memo2 || '').trim();
    return { memo2: history[date], memo2History: history };
  }

  function createChartVisitEntry(source = {}) {
    const date = source.visitDate || getVisitDateFromTimestamp(source.timestamp);
    return {
      date,
      visitType: source.visitType || '',
      treatments: Array.isArray(source.treatments) ? source.treatments : [],
      bodyParts: normalizeBodyParts(source.bodyParts),
      doctorName: source.doctorName || '',
      chiefComplaint: source.chiefComplaint || '',
      memo2: source.memo2 || ''
    };
  }

  function mergeChartVisitHistory(existing = {}, data = {}) {
    const entries = [];
    const pushEntry = (entry) => {
      if (!entry?.date) return;
      const hasMemo2 = Object.prototype.hasOwnProperty.call(entry, 'memo2');
      entries.push({
        date: String(entry.date),
        treatments: Array.isArray(entry.treatments) ? entry.treatments : [],
        bodyParts: normalizeBodyParts(entry.bodyParts),
        doctorName: entry.doctorName || '',
        visitType: entry.visitType || '',
        chiefComplaint: entry.chiefComplaint || '',
        ...(hasMemo2 ? { memo2: entry.memo2 || '' } : {})
      });
    };

    (Array.isArray(existing.visitDates) ? existing.visitDates : []).forEach(date => {
      const saved = existing.visitHistory?.[date] || {};
      pushEntry({ date, ...saved });
    });
    Object.entries(existing.visitHistory || {}).forEach(([date, saved]) => {
      if (entries.some(entry => entry.date === date)) return;
      pushEntry({ date, ...saved });
    });
    (Array.isArray(data.visitEntries) ? data.visitEntries : []).forEach(pushEntry);
    pushEntry(data.visitEntry);

    const byDate = {};
    entries.forEach(entry => {
      byDate[entry.date] = {
        treatments: entry.treatments,
        bodyParts: entry.bodyParts,
        doctorName: entry.doctorName,
        visitType: entry.visitType,
        chiefComplaint: entry.chiefComplaint,
        ...(Object.prototype.hasOwnProperty.call(entry, 'memo2') ? { memo2: entry.memo2 || '' } : {})
      };
    });
    const visitDates = Object.keys(byDate).sort();
    const latestDate = visitDates[visitDates.length - 1] || '';
    const latestVisit = latestDate ? (byDate[latestDate] || null) : null;
    const latestChiefComplaint = latestVisit?.chiefComplaint || '';
    const memo2History = {
      ...normalizeMemo2History(existing),
      ...normalizeMemo2History(data),
      ...Object.fromEntries(Object.entries(byDate)
        .filter(([, entry]) => Object.prototype.hasOwnProperty.call(entry, 'memo2'))
        .map(([date, entry]) => [date, entry.memo2 || '']))
    };
    return { visitDates, visitHistory: byDate, memo2History, latestDate, latestVisit, latestChiefComplaint };
  }

  function addLocalDays(date, days) {
    const next = new Date(date);
    next.setHours(0, 0, 0, 0);
    next.setDate(next.getDate() + days);
    return next;
  }

  function formatScheduleDayLabel(date) {
    const weekdays = ['일', '월', '화', '수', '목', '금', '토'];
    return `${date.getMonth() + 1}/${date.getDate()}(${weekdays[date.getDay()]})`;
  }

  let pendingBedScheduleDates = [];
  let bedScheduleCustomMonthDate = null;

  function normalizeAppointmentDates(dataOrDates) {
    const rawDates = Array.isArray(dataOrDates)
      ? dataOrDates
      : [
          ...(Array.isArray(dataOrDates?.appointmentDates) ? dataOrDates.appointmentDates : []),
          dataOrDates?.appointmentDate || ''
        ];
    return [...new Set(rawDates
      .map(date => String(date || '').trim())
      .filter(date => /^\d{4}-\d{2}-\d{2}$/.test(date))
    )].sort();
  }

  function renderBedScheduleCalendar(selectedDates = []) {
    const calendar = document.getElementById('bedScheduleCalendar');
    if (!calendar) return;
    pendingBedScheduleDates = normalizeAppointmentDates(selectedDates);
    const bed = getBedData(selectedBedNo);
    const patient = bed?.patientKey ? (patientsByKey.get(bed.patientKey) || null) : null;
    const appointmentSource = patient || bed || {};
    const undecided = Boolean(appointmentSource.appointmentUndecided);
    const today = addLocalDays(new Date(), 0);
    const presetDateItems = getBedSchedulePresetDateItems(today);
    calendar.innerHTML = presetDateItems.map(({ date, dateValue, offset }) => {
      const className = [
        'bed-schedule-day',
        offset === 0 ? 'today' : '',
        pendingBedScheduleDates.includes(dateValue) ? 'selected' : ''
      ].filter(Boolean).join(' ');
      const label = offset === 0 ? `오늘 ${formatScheduleDayLabel(date)}` : formatScheduleDayLabel(date);
      return `<button type="button" class="${className}" onclick="selectBedScheduleDate('${dateValue}')">${escapeHtml(label)}</button>`;
    }).join('') + `<button type="button" class="bed-schedule-day${undecided ? ' selected' : ''}" onclick="toggleBedScheduleUndecided()">기타</button>`;
    disableAutocomplete(calendar.closest('.bed-schedule-panel') || calendar);
  }

  function getLocalMonthStart(date = new Date()) {
    const source = date instanceof Date && !Number.isNaN(date.getTime()) ? date : new Date();
    return new Date(source.getFullYear(), source.getMonth(), 1);
  }

  function parseLocalDateValue(dateValue) {
    const [year, month, day] = String(dateValue || '').split('-').map(Number);
    if (![year, month, day].every(Number.isFinite)) return null;
    return new Date(year, month - 1, day);
  }

  function addLocalMonths(date, months) {
    const source = getLocalMonthStart(date);
    return new Date(source.getFullYear(), source.getMonth() + Number(months || 0), 1);
  }

  function renderBedScheduleCustomCalendar() {
    const panel = document.getElementById('bedScheduleCustomCalendar');
    if (!panel || !panel.classList.contains('show')) return;
    const monthDate = getLocalMonthStart(bedScheduleCustomMonthDate || new Date());
    bedScheduleCustomMonthDate = monthDate;
    const todayValue = toLocalDateInputValue(new Date());
    const year = monthDate.getFullYear();
    const month = monthDate.getMonth();
    const leading = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const cells = [];
    for (let i = 0; i < leading; i += 1) {
      cells.push('<button class="bed-schedule-month-day empty" type="button" tabindex="-1"></button>');
    }
    for (let day = 1; day <= daysInMonth; day += 1) {
      const date = new Date(year, month, day);
      const dateValue = toLocalDateInputValue(date);
      const isPast = dateValue < todayValue;
      const className = [
        'bed-schedule-month-day',
        dateValue === todayValue ? 'today' : '',
        pendingBedScheduleDates.includes(dateValue) ? 'selected' : ''
      ].filter(Boolean).join(' ');
      cells.push(`<button class="${className}" type="button" ${isPast ? 'disabled' : `onclick="selectBedScheduleDate('${dateValue}')"`}>${day}</button>`);
    }
    panel.innerHTML = `
      <div class="bed-schedule-calendar-head">
        <button class="bed-schedule-calendar-nav" type="button" onclick="changeBedScheduleCustomMonth(-1)">‹</button>
        <div class="bed-schedule-calendar-title">${year}년 ${month + 1}월</div>
        <button class="bed-schedule-calendar-nav" type="button" onclick="changeBedScheduleCustomMonth(1)">›</button>
      </div>
      <div class="bed-schedule-month-grid">
        ${['일','월','화','수','목','금','토'].map(day => `<div class="bed-schedule-month-dow">${day}</div>`).join('')}
        ${cells.join('')}
      </div>`;
  }

  function getBedSchedulePresetDateItems(startDate = new Date()) {
    const today = addLocalDays(startDate, 0);
    const presetDateItems = [];
    for (let offset = 1; presetDateItems.length < 7; offset += 1) {
      const date = addLocalDays(today, offset);
      if (date.getDay() === 0) continue;
      presetDateItems.push({ date, dateValue: toLocalDateInputValue(date), offset });
    }
    return presetDateItems;
  }

  // Save the bed's appointment immediately (no confirm step). Real dates and the
  // "미정" marker (undecided) can coexist — both are toggled independently.
  async function commitBedSchedule(nextDates, undecided) {
    const bed = getBedData(selectedBedNo);
    if (!bed) {
      showToast('현재 베드가 비어 있습니다');
      return;
    }
    if (!bed.patientKey) {
      showToast('환자 정보가 있어야 예약을 저장할 수 있습니다');
      return;
    }
    const appointmentDates = normalizeAppointmentDates(nextDates);
    const isUndecided = Boolean(undecided);
    const ok = await setPatientAppointment(bed.patientKey, {
      chartNo: normalizeChartNo(bed.chartNo || ''),
      name: bed.name || '',
      age: bed.age || '',
      gender: bed.gender || '',
      visitType: bed.visitType || '',
      chiefComplaint: bed.chiefComplaint || '',
      treatments: Array.isArray(bed.treatments) ? bed.treatments : [],
      bodyParts: normalizeBodyParts(bed.bodyParts)
    }, appointmentDates, isUndecided);
    if (ok) {
      const patient = patientsByKey.get(bed.patientKey) || {};
      const bedAppointmentPatch = {
        appointmentDates: normalizeAppointmentDates(patient || {}),
        appointmentDate: normalizeAppointmentDates(patient || {})[0] || '',
        appointmentAlerts: patient.appointmentAlerts || {},
        appointmentAlert: patient.appointmentAlert || null,
        appointmentUndecided: Boolean(patient.appointmentUndecided),
        appointmentUndecidedAlert: patient.appointmentUndecidedAlert || null
      };
      Object.assign(bed, bedAppointmentPatch);
      try {
        await updateBedRecord(selectedBedNo, bedAppointmentPatch);
      } catch (e) {
        console.error('베드 예약 정보 저장 실패', e);
        showToast('베드 예약 표시 저장 실패');
      }
      const total = appointmentDates.length + (isUndecided ? 1 : 0);
      if (!total) {
        showToast(`${bed.name || '환자'}님 예약 삭제`);
      } else {
        const parts = [];
        if (appointmentDates.length) {
          parts.push(appointmentDates.length === 1
            ? formatAppointmentDate(appointmentDates[0])
            : `${formatAppointmentDate(appointmentDates[0])} 외 ${appointmentDates.length - 1}개`);
        }
        if (isUndecided) parts.push('미정');
        showToast(`${bed.name || '환자'}님 ${parts.join(' ')} 예약`);
      }
      populateBedSchedulePanel();
    }
  }

  // Pressing a date toggles it and saves right away (keeps the 미정 marker as-is).

      );
      const newlyAddedTreatmentIndexes = getNewlyAddedTreatmentIndexes(bed.treatments || [], form.treatments);

      );

        : preservedRunningIndex >= 0

        : (form.treatments.length ? Math.max(0, getNextPendingTreatmentIndex(form.treatments, nextIndexBase, preCompletedTreatmentIndexes)) : 0);
      const nextTreatment = form.treatments[nextIndex] || '';
      const currentTreatmentChanged = completedBedAddedIndex >= 0 || (preservedRunningIndex < 0 && (nextTreatment !== (bed.treatments?.[nextIndex] || '') || !form.treatments.length));
      const nextTotal = nextTreatment ? getConcurrentTreatmentSeconds(form.treatments, nextIndex) : 0;
      const timerPatch = currentTreatmentChanged
        ? {

          running: false,
          startedAt: null,
          complete: false,
          total: nextTotal,
          remaining: nextTotal,
          lastAlertId: null,
          lastAlertMessage: null,

        ...bedPatch,

  function syncPatientPCreditSchema(patientKey, data) {
    if (!patientKey || !data) return;
    const patch = {};
    if (!data.packages) {
      const packages = createEmptyPackageState(data);
      patch.packages = packages;
      data.packages = packages;
    } else {
      const packages = getPackageStateFromPatient(data);
      if (JSON.stringify(data.packages) !== JSON.stringify(packages)) patch.packages = packages;
      data.packages = packages;
    }
    const balances = getPCreditsFromPackages(data.packages);
    PCREDIT_FIELDS.forEach(({ key }) => {
      if (!Object.prototype.hasOwnProperty.call(data, key) || Number(data[key] || 0) !== Number(balances[key] || 0)) {
        patch[key] = Number(balances[key] || 0);
        data[key] = Number(balances[key] || 0);
      }
    });
    if (Object.prototype.hasOwnProperty.call(data, 'credit')) {
      delete data.credit;
    }
    if (!Object.keys(patch).length) return;
    updatePatient(patientKey, patch).catch(e => {
      console.error('크레딧 필드 동기화 실패', e);
    });
  }

  function applyPatientAdded(key, data) {
    if (isClearingPatientDatabase || !data) return;
    if (loadedKeys.has(key)) { applyPatientChanged(key, data); return; }
    loadedKeys.add(key);

    syncPatientPCreditSchema(key, data);
    const normalizedChartNo = normalizeChartNo(data.chartNo);
    if ((data.chartNo || '') !== normalizedChartNo) {
      data.chartNo = normalizedChartNo;
      updatePatient(key, { chartNo: normalizedChartNo });
    }
    const isNew = Number(data.timestamp || 0) > pageLoadedAt;
    patientsByKey.set(key, data);
    if (autoBedAssignEnabled) assignPatientToBed(key, data, true);

    renderNotif(key, data, isNew);

    updateCount();
    if (isFirstLoad) setTimeout(() => { isFirstLoad = false; }, 500);
    requestAppRender({ waitingLists: true, upcomingAlerts: true, count: true });
  }

  function applyPatientChanged(key, data) {
    if (isClearingPatientDatabase || !data) return;
    syncPatientPCreditSchema(key, data);
    const normalizedChartNo = normalizeChartNo(data.chartNo);
    if ((data.chartNo || '') !== normalizedChartNo) {
      data.chartNo = normalizedChartNo;
      updatePatient(key, { chartNo: normalizedChartNo });

    loadedKeys.add(key);

  // Local-primary patients: the local server holds the whole 'patients' map and
  // pushes it over SSE; we diff against the last snapshot to derive
  // added/changed/removed.
  let prevPatientsSnapshot = {};
  function applyPatientsSnapshot(map) {
    if (isClearingPatientDatabase) { prevPatientsSnapshot = clonePlain(map || {}); return; }
    const next = map || {};
    for (const key of Object.keys(prevPatientsSnapshot)) {
      if (!(key in next)) applyPatientRemoved(key);
    }
    for (const key of Object.keys(next)) {
      const data = next[key];
      if (!(key in prevPatientsSnapshot)) applyPatientAdded(key, data);
      else if (JSON.stringify(prevPatientsSnapshot[key]) !== JSON.stringify(data)) applyPatientChanged(key, data);
    }
    prevPatientsSnapshot = clonePlain(next);
  }

  async function migrateDisabledBedsToWaiting(beds) {
    let movedCount = 0;
    Object.entries(beds).forEach(([bedNo, bed]) => {
      if (!bed) return;
      if (DISABLED_BED_NUMBERS.has(Number(bedNo))) return;
      const normalizedChartNo = normalizeChartNo(bed.chartNo);
      const normalizeKey = `${bedNo}:${bed.chartNo || ''}`;
      if ((bed.chartNo || '') !== normalizedChartNo && !normalizedBedChartKeys.has(normalizeKey)) {
        normalizedBedChartKeys.add(normalizeKey);
        bed.chartNo = normalizedChartNo;
      }
    });
    DISABLED_BED_NUMBERS.forEach(bedNo => {
      const key = String(bedNo);
      const bed = beds[key];
      if (!bed) return;
      scheduleDisabledBedCleanup(bedNo, bed);

      if (!migratingDisabledBedKeys.has(key) && bed.patientKey) {
        migratingDisabledBedKeys.add(key);
        const firstQueueTimestamp = todayStart.getTime();
        patientsByKey.set(bed.patientKey, {
          ...(patientsByKey.get(bed.patientKey) || {}),
          ...bed,
          bedStatus: 'waiting',
          bedNo: null,
          timestamp: firstQueueTimestamp
        });
        movedCount += 1;
      }

      delete beds[key];
    });
    return movedCount;
  }
