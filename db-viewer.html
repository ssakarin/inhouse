<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경희홍익한의원 DB</title>
<style>
  :root {
    --bg: #07111f;
    --panel: #101b2d;
    --panel2: #16243a;
    --line: rgba(255,255,255,0.12);
    --text: #e7eef8;
    --muted: #9badbf;
    --accent: #39a9f5;
    --gold: #ffca6a;
    --green: #4ade80;
    --danger: #fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .app { width: min(1500px, 100%); margin: 0 auto; padding: 18px 18px 18px 42px; }
  .nav-link {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--panel2);
    color: var(--accent);
    font-size: 13px;
    font-weight: 900;
    padding: 8px 12px;
    text-decoration: none;
  }
  .nav-link:hover { border-color: var(--accent); }
  .header { margin-bottom: 14px; }
  h1 { margin: 0; font-size: 24px; letter-spacing: 0; }
  .brand { display: flex; align-items: center; gap: 10px; margin-right: 8px; }
  .brand-icon { width: 36px; height: 36px; object-fit: contain; flex-shrink: 0; }
  .brand-title { font-size: 20px; font-weight: 900; color: #fff; line-height: 1; white-space: nowrap; }
  .brand-highlight { color: var(--gold); }
  input[readonly], textarea[readonly] {
    background: rgba(255,255,255,0.03);
    color: var(--muted);
    cursor: default;
  }
  input[readonly]:focus, textarea[readonly]:focus { border-color: var(--line); }
  .meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .actions, .toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
  .toolbar-actions { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-left: auto; }
  button, input, select, textarea {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--panel2);
    color: var(--text);
    font: inherit;
  }
  button { cursor: pointer; font-weight: 900; padding: 9px 12px; }
  button:hover { border-color: var(--accent); }
  button.primary { border-color: rgba(57,169,245,0.65); color: var(--accent); }
  button.danger { border-color: rgba(251,113,133,0.55); color: var(--danger); }
  button.good { border-color: rgba(74,222,128,0.55); color: var(--green); }
  input, select, textarea { width: 100%; padding: 9px 10px; }
  textarea {
    min-height: 110px;
    resize: vertical;
    font-family: Consolas, "SFMono-Regular", Menlo, monospace;
    font-size: 12px;
    line-height: 1.45;
  }
  .grid { display: block; }
  .card {
    min-width: 0;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    overflow: hidden;
  }
  .firebase-card {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 20;
    width: min(560px, calc(100vw - 48px));
    height: 100vh;
    border-radius: 0;
    transform: translateX(-100%);
    transition: transform 0.22s ease;
    box-shadow: 18px 0 30px rgba(0,0,0,0.30);
  }
  body.firebase-open .firebase-card { transform: translateX(0); }
  .firebase-toggle {
    position: fixed;
    top: 50%;
    left: 0;
    z-index: 30;
    width: 31px;
    height: 64px;
    transform: translateY(-50%);
    border-radius: 0 8px 8px 0;
    border-left: 0;
    background: var(--panel2);
    color: var(--gold);
    font-size: 22px;
    line-height: 1;
    padding: 0;
    transition: left 0.22s ease;
  }
  body.firebase-open .firebase-toggle {
    left: min(560px, calc(100vw - 48px));
    color: var(--accent);
  }
  .card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 12px;
    border-bottom: 1px solid var(--line);
  }
  .card-title { font-size: 16px; font-weight: 900; }
  .toolbar { padding: 10px 12px; border-bottom: 1px solid var(--line); }
  .toolbar button { padding: 7px 10px; font-size: 12px; }
  .path-row, .editor-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--line);
  }
  .summary {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 8px;
    padding: 12px;
    border-bottom: 1px solid var(--line);
  }
  .metric { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 10px; }
  .metric-label { color: var(--muted); font-size: 11px; font-weight: 900; }
  .metric-value { color: var(--green); font-size: 20px; font-weight: 900; margin-top: 4px; }
  .indexed-summary {
    display: flex;
    grid-template-columns: none;
    gap: 6px;
    padding: 0;
    border-bottom: 0;
    margin-left: auto;
  }
  .indexed-summary .metric { padding: 4px 9px; text-align: center; }
  .indexed-summary .metric-label { font-size: 10px; }
  .indexed-summary .metric-value { font-size: 13px; margin-top: 2px; white-space: nowrap; }
  .memo-row { display: flex; gap: 10px; align-items: stretch; }
  .memo-field { flex: 1; min-width: 0; }
  .memo-actions { display: flex; flex-direction: column; justify-content: flex-end; gap: 8px; width: 190px; flex-shrink: 0; }
  .memo-buttons { display: flex; flex-direction: column; gap: 8px; }
  .memo-buttons button { width: 100%; }
  pre {
    margin: 0;
    padding: 12px;
    min-height: 460px;
    max-height: calc(100vh - 290px);
    overflow: auto;
    color: #d6e3f2;
    background: #07111f;
    font-family: Consolas, "SFMono-Regular", Menlo, monospace;
    font-size: 12px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .status { color: var(--gold); font-size: 12px; font-weight: 900; }
  .error { color: var(--danger); }
  .editor-layout {
    display: grid;
    grid-template-columns: 330px minmax(0, 1fr);
    min-height: 640px;
  }
  .patient-list-pane { border-right: 1px solid var(--line); min-width: 0; }
  .patient-find-tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    padding: 10px;
    border-bottom: 1px solid var(--line);
  }
  .patient-find-tab {
    padding: 8px 10px;
    font-size: 12px;
  }
  .patient-find-tab.active {
    border-color: rgba(255,202,106,0.75);
    background: rgba(255,202,106,0.12);
    color: var(--gold);
  }
  .patient-find-panel[hidden] { display: none; }
  .patient-date-panel { padding: 10px; }
  .patient-date-panel .visit-calendar-wrap { gap: 8px; }
  .patient-date-panel .visit-detail-card { max-height: 320px; overflow: auto; }
  .search-box {
    display: grid;
    gap: 8px;
    padding: 10px;
    border-bottom: 1px solid var(--line);
  }
  .patient-sort-select {
    font-size: 12px;
    font-weight: 900;
  }
  .patient-list { max-height: 590px; overflow: auto; }
  .patient-item {
    width: 100%;
    display: block;
    border: 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    border-radius: 0;
    background: transparent;
    color: var(--text);
    padding: 10px;
    text-align: left;
  }
  .patient-item.active { background: rgba(57,169,245,0.16); }
  .patient-name { font-size: 14px; font-weight: 900; }
  .patient-sub { color: var(--muted); font-size: 11px; margin-top: 3px; }
  .editor-pane { min-width: 0; }
  .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; padding: 12px; }
  .form-grid label, .wide-field { display: grid; gap: 5px; color: var(--muted); font-size: 12px; font-weight: 900; }
  .wide-field { grid-column: 1 / -1; }
  .info-grid { grid-template-columns: 1fr; }
  .info-row1 { display: grid; grid-template-columns: 1.3fr 1fr 0.6fr 0.7fr 1fr 1.5fr; gap: 10px; }
  .section-title { padding: 12px 12px 0; color: var(--gold); font-weight: 900; font-size: 13px; }
  .text-input {
    font-family: inherit;
    font-size: 14px;
    line-height: 1.45;
  }
  .visit-calendar-wrap {
    grid-column: 1 / -1;
    display: grid;
    gap: 10px;
  }
  .visit-stats {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 8px;
  }
  .visit-stat-input {
    width: auto;
    flex: 1;
    min-width: 0;
    padding: 3px 6px;
    font-size: 13px;
  }
  .visit-stat {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 8px;
    padding: 8px 12px;
  }
  .visit-stat-label { color: var(--muted); font-size: 12px; font-weight: 900; }
  .visit-stat-value { color: var(--gold); font-size: 15px; font-weight: 900; white-space: nowrap; }
  .visit-calendar-head {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 8px;
  }
  .visit-calendar-title {
    text-align: center;
    color: var(--text);
    font-weight: 900;
    font-size: 16px;
  }
  .visit-calendar {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 6px;
  }
  .visit-weekday {
    color: var(--muted);
    font-size: 11px;
    font-weight: 900;
    text-align: center;
    padding: 4px 0;
  }
  .visit-day {
    min-height: 58px;
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 8px;
    background: rgba(255,255,255,0.04);
    color: var(--muted);
    padding: 7px;
    text-align: left;
    font-weight: 900;
  }
  .visit-day.has-visit {
    color: var(--text);
    border-color: rgba(255,202,106,0.55);
    background: rgba(255,202,106,0.13);
  }
  .visit-day.has-package {
    color: var(--text);
    border-color: rgba(74,222,128,0.38);
  }
  .visit-day.selected {
    border-color: rgba(57,169,245,0.85);
    box-shadow: 0 0 0 2px rgba(57,169,245,0.18) inset;
  }
  .visit-day:disabled {
    cursor: default;
    opacity: 0.35;
  }
  .visit-day-note {
    display: block;
    margin-top: 6px;
    color: var(--gold);
    font-size: 10px;
    line-height: 1.25;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .visit-day-note.package {
    color: var(--green);
  }
  .visit-day-note + .visit-day-note {
    margin-top: 3px;
  }
  .visit-detail-card {
    min-height: 96px;
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    padding: 12px;
  }
  .visit-detail-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    color: var(--gold);
    font-weight: 900;
    margin-bottom: 8px;
  }
  .visit-detail-title button { padding: 5px 8px; font-size: 11px; }
  .visit-detail-grid {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 7px 10px;
    font-size: 13px;
  }
  .visit-detail-section + .visit-detail-section {
    border-top: 1px solid rgba(255,255,255,0.08);
    margin-top: 12px;
    padding-top: 12px;
  }
  .visit-detail-label {
    color: var(--muted);
    font-weight: 900;
  }
  .package-viewer {
    grid-column: 1 / -1;
    display: grid;
    gap: 10px;
  }
  .package-toggle-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .package-toggle-btn {
    padding: 4px 10px;
    font-size: 12px;
    line-height: 1.3;
    width: auto;
  }
  .package-toggle-btn.active {
    border-color: rgba(255,202,106,0.75);
    background: rgba(255,202,106,0.15);
    color: var(--gold);
  }
  .package-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 8px;
    padding: 12px;
  }
  .package-card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
  }
  .package-balance-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .package-balance-key { color: var(--gold); margin-right: 2px; }
  .package-title {
    color: var(--text);
    font-size: 17px;
    font-weight: 900;
  }
  .package-balance {
    border-radius: 999px;
    background: rgba(74,222,128,0.14);
    border: 1px solid rgba(74,222,128,0.42);
    color: var(--green);
    font-size: 14px;
    font-weight: 900;
    padding: 5px 9px;
    white-space: nowrap;
  }
  .package-calendar-head {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .package-calendar-title {
    color: var(--text);
    font-size: 16px;
    font-weight: 900;
    text-align: center;
  }
  .package-calendar {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 6px;
  }
  .package-calendar-dow {
    color: var(--muted);
    font-size: 11px;
    font-weight: 900;
    text-align: center;
  }
  .package-calendar-day {
    min-height: 74px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    color: var(--text);
    padding: 6px;
    text-align: left;
    font-weight: 900;
  }
  .package-calendar-day.empty {
    cursor: default;
    opacity: 0.35;
  }
  .package-calendar-day.selected {
    border-color: rgba(255,202,106,0.80);
    background: rgba(255,202,106,0.14);
  }
  .package-calendar-date {
    font-size: 12px;
  }
  .package-calendar-badges {
    display: grid;
    gap: 3px;
    margin-top: 5px;
  }
  .package-calendar-badge {
    border-radius: 999px;
    font-size: 10px;
    font-weight: 900;
    padding: 2px 5px;
  }
  .package-calendar-badge.purchase {
    background: rgba(74,222,128,0.18);
    color: var(--green);
  }
  .package-calendar-badge.usage {
    background: rgba(251,113,133,0.18);
    color: var(--danger);
  }
  .package-day-detail {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    margin-top: 10px;
    padding: 10px;
  }
  .package-history {
    display: grid;
    gap: 5px;
    margin-top: 8px;
  }
  .package-history-title {
    color: var(--muted);
    font-size: 12px;
    font-weight: 900;
  }
  .package-history-row {
    display: grid;
    grid-template-columns: 86px minmax(0, 1fr);
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 7px;
    color: var(--text);
    font-size: 12px;
    font-weight: 800;
    padding: 6px 7px;
  }
  .day-patient-list {
    margin-top: 10px;
    display: grid;
    gap: 6px;
  }
  .day-patient-item {
    width: 100%;
    text-align: left;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 8px 10px;
  }
  .day-patient-main { font-weight: 900; }
  .day-patient-sub { color: var(--muted); font-size: 11px; font-weight: 800; }
  .file-input { display: none; }
  @media (max-width: 1080px) {
    .editor-layout { grid-template-columns: 1fr; }
    .patient-list-pane { border-right: 0; border-bottom: 1px solid var(--line); }
    .patient-list { max-height: 260px; }
  }
  @media (max-width: 760px) {
    .summary, .form-grid, .package-toggle-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="grid">
    <button class="firebase-toggle" type="button" id="firebaseToggleBtn" aria-label="Firebase 패널 열기">›</button>
    <section class="card firebase-card" id="firebaseCard">
      <div class="card-head">
        <div>
          <div class="card-title">Firebase DB 읽기 전용</div>
          <div class="meta" id="firebaseMeta">대기 중</div>
        </div>
        <div class="status" id="firebaseStatus"></div>
      </div>
      <div class="toolbar">
        <button type="button" data-fb-path="/">전체</button>
        <button type="button" data-fb-path="patients">patients</button>
        <button type="button" data-fb-path="beds">beds</button>
        <button type="button" data-fb-path="settings">settings</button>
        <button type="button" data-fb-path="callAlerts">callAlerts</button>
        <button type="button" data-fb-path="bedAssignmentAlerts">bedAssignmentAlerts</button>
      </div>
      <div class="path-row">
        <input id="firebasePathInput" type="text" value="/" aria-label="Firebase path">
        <button type="button" id="loadFirebasePathBtn">읽기</button>
      </div>
      <div class="summary" id="firebaseSummary"></div>
      <pre id="firebaseOutput">Firebase 읽기 버튼을 누르면 현재 경로만 불러옵니다.</pre>
    </section>

    <section class="card">
      <div class="status" id="indexedStatus" hidden></div>
      <div class="toolbar">
        <div class="brand">
          <img class="brand-icon" src="assets/logo-icon.png" alt="경희홍익한의원 로고">
          <h1 class="brand-title"><span>경희</span><span class="brand-highlight">홍익</span><span>한의원</span></h1>
        </div>
        <a class="nav-link" href="stats.html">통계</a>
        <input class="file-input" id="importFileInput" type="file" accept="application/json,.json">
        <div class="summary indexed-summary" id="indexedSummary"></div>
        <div class="toolbar-actions">
          <button type="button" id="loadIndexedBtn">새로고침</button>
          <button type="button" id="exportIndexedBtn">백업</button>
          <button type="button" id="importIndexedBtn">복원</button>
          <button class="danger" type="button" id="deleteAllIndexedBtn">삭제</button>
        </div>
        </div>
        <div class="editor-layout">
          <div class="patient-list-pane">
          <div class="patient-find-tabs">
            <button class="patient-find-tab active" type="button" data-find-tab="search">환자 검색</button>
            <button class="patient-find-tab" type="button" data-find-tab="date">날짜별</button>
          </div>
          <div class="patient-find-panel" id="patientSearchPanel">
            <div class="search-box">
              <input id="patientSearchInput" type="text" placeholder="이름 또는 차트번호 검색">
              <select class="patient-sort-select" id="patientSortSelect" aria-label="환자 정렬">
                <option value="chart">차트번호</option>
                <option value="recent">최근방문날짜</option>
                <option value="name">가나다</option>
              </select>
            </div>
            <div class="patient-list" id="patientList"></div>
          </div>
          <div class="patient-find-panel patient-date-panel" id="patientDatePanel" hidden>
            <div class="visit-calendar-wrap">
              <div class="visit-calendar-head">
                <button type="button" id="globalVisitPrevMonthBtn">이전</button>
                <div class="visit-calendar-title" id="globalVisitCalendarTitle"></div>
                <button type="button" id="globalVisitNextMonthBtn">다음</button>
              </div>
              <div class="visit-calendar" id="globalVisitCalendar"></div>
              <div class="visit-detail-card" id="globalVisitPatientList"></div>
            </div>
          </div>
        </div>
        <div class="editor-pane">
          <div class="section-title">기본 정보</div>
          <div class="form-grid info-grid">
            <div class="info-row1">
              <label>차트번호<input id="editChartNo" type="text" readonly></label>
              <label>이름<input id="editName" type="text"></label>
              <label>나이<input id="editAge" type="number" min="0" max="130"></label>
              <label>성별<input id="editGender" type="text" readonly></label>
              <label>연락처<input id="editPhone" type="text"></label>
              <label>최근 담당원장<input id="editDoctorName" type="text" readonly></label>
            </div>
            <label>최근 초진/재진<select id="editVisitType"><option value="">-</option><option value="초진">초진</option><option value="재진">재진</option></select></label>
            <label>주상병명<input id="editChiefComplaint" type="text"></label>
            <label>과거 주상병명<input class="text-input" id="editPastChiefComplaints" type="text" placeholder="과거 진료 기록의 다른 주상병명" readonly></label>
            <label>최근 치료목록<input class="text-input" id="editTreatmentsText" type="text" readonly></label>
            <label>최근 치료부위<input class="text-input" id="editBodyPartsText" type="text" readonly></label>
            <div class="memo-row">

<script type="module">
  import { initializeApp } from "./vendor/firebase/10.12.2/firebase-app.js";
  import { getDatabase, ref, get } from "./vendor/firebase/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC0bPN-bEaEe7dLnfHPrQY10pnNdlkE1RA",
    authDomain: "khhongik-inhouse.firebaseapp.com",
    databaseURL: "https://khhongik-inhouse-default-rtdb.firebaseio.com",
    projectId: "khhongik-inhouse",
    storageBucket: "khhongik-inhouse.firebasestorage.app",
    messagingSenderId: "399934659057",
    appId: "1:399934659057:web:299e94b388f853442dcc50",
    measurementId: "G-MPN5V3CYY8"
  };

  const app = initializeApp(firebaseConfig);
  const firebaseDb = getDatabase(app);
  const DEFAULT_INDEXED_DB = "patientChartDB";
  const DEFAULT_INDEXED_STORE = "patients";
  const PACKAGE_KEYS = ["p6", "p13", "p자하거", "p라인"];
  let latestFirebaseValue = null;
  let latestIndexedValue = [];
  let selectedChartNo = "";
  let activeVisitDates = [];
  let activeVisitHistory = {};
  let activeVisitMonth = new Date().toISOString().slice(0, 7);
  let selectedVisitDate = "";
  let activePackages = {};
  let activePackageKey = "p6";
  let activePackageMonth = new Date().toISOString().slice(0, 7);
  let activePackageDate = new Date().toISOString().slice(0, 10);
  let patientSortMode = "chart";
  let globalVisitMonth = new Date().toISOString().slice(0, 7);
  let selectedGlobalVisitDate = "";

  const $ = (id) => document.getElementById(id);
  const stringify = (value) => JSON.stringify(value, null, 2) || "null";
  const SERVER_MODE = location.protocol === "http:" || location.protocol === "https:";

  function escapeHtml(value) {
    return String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function getPatientPhone(patient = {}) {
    return String(patient.phone || patient.phoneNumber || patient.tel || patient.mobile || patient.contact || "").trim();
  }

  function normalizeAppointmentDates(patient = {}) {
    return [...new Set([
      ...(Array.isArray(patient.appointmentDates) ? patient.appointmentDates : []),
      patient.appointmentDate || ""
    ].map(date => String(date || "").trim()).filter(date => /^\d{4}-\d{2}-\d{2}$/.test(date)))].sort();
  }

  function formatAppointmentDates(patient = {}) {
    return normalizeAppointmentDates(patient).join(", ");
  }

  function disableAutocomplete(root = document) {
    root.querySelectorAll?.("input, textarea, select").forEach(el => {
      el.setAttribute("autocomplete", "off");
      el.setAttribute("autocorrect", "off");
      el.setAttribute("autocapitalize", "off");
      el.setAttribute("spellcheck", "false");
    });
  }

  function setStatus(id, text, isError = false) {
    const el = $(id);
    el.textContent = text;
    el.classList.toggle("error", isError);
  }

  function getType(value) {
    if (Array.isArray(value)) return "array";
    if (value === null) return "null";
    return typeof value;
  }

  function countChildren(value) {
    if (!value || typeof value !== "object") return 0;
    return Object.keys(value).length;
  }

  function renderSummary(targetId, value, extra = {}) {
    const rows = [
      ["항목 수", countChildren(value)],
      ["크기", `${new Blob([stringify(value)]).size.toLocaleString()} B`],
      ["조회", new Date().toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" })]
    ];
    Object.entries(extra).forEach(([label, val]) => rows.push([label, val]));
    $(targetId).innerHTML = rows.map(([label, val]) => `
      <div class="metric">
        <div class="metric-label">${escapeHtml(label)}</div>
        <div class="metric-value">${escapeHtml(String(val))}</div>
      </div>
    `).join("");
  }

  function normalizeFirebasePath(path) {
    const trimmed = String(path || "/").trim();
    if (!trimmed || trimmed === "/") return "/";
    return trimmed.replace(/^\/+|\/+$/g, "");
  }

  async function loadFirebase(path = $("firebasePathInput").value) {
    const normalized = normalizeFirebasePath(path);
    $("firebasePathInput").value = normalized;
    setStatus("firebaseStatus", "조회 중");
    $("firebaseOutput").textContent = "Loading...";
    try {
      const snapshot = await get(ref(firebaseDb, normalized));
      latestFirebaseValue = snapshot.exists() ? snapshot.val() : null;
      $("firebaseOutput").textContent = stringify(latestFirebaseValue);
      $("firebaseMeta").textContent = `path: ${normalized}`;
      renderSummary("firebaseSummary", latestFirebaseValue);
      setStatus("firebaseStatus", "완료");
    } catch (error) {
      latestFirebaseValue = null;
      $("firebaseOutput").textContent = error?.message || String(error);
      renderSummary("firebaseSummary", null);
      setStatus("firebaseStatus", "오류", true);
    }
  }

  function openIndexedDb(name) {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(name);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
      req.onblocked = () => reject(new Error("IndexedDB 열기가 차단되었습니다."));
    });
  }

  function transactionStore(mode = "readonly") {
    const dbName = DEFAULT_INDEXED_DB;
    const storeName = DEFAULT_INDEXED_STORE;
    return openIndexedDb(dbName).then(db => {
      if (!db.objectStoreNames.contains(storeName)) {
        db.close();
        throw new Error(`${dbName} 안에 ${storeName} 스토어가 없습니다.`);
      }
      const tx = db.transaction(storeName, mode);
      return { db, tx, store: tx.objectStore(storeName) };
    });
  }

  async function getAllIndexedRecords() {
    if (SERVER_MODE) {
      const res = await fetch("/api/patients", { cache: "no-store" });
      if (!res.ok) throw new Error(`서버 환자 목록 조회 실패 (${res.status})`);
      return await res.json();
    }
    const { db, store } = await transactionStore("readonly");
    try {
      return await new Promise((resolve, reject) => {
        const req = store.getAll();
        req.onsuccess = () => resolve(Array.isArray(req.result) ? req.result : []);
        req.onerror = () => reject(req.error);
      });
    } finally {
      db.close();
    }
  }

  async function putIndexedRecord(record, oldChartNo = "") {
    if (!record?.chartNo) throw new Error("chartNo가 필요합니다.");
    if (SERVER_MODE) {
      if (oldChartNo && oldChartNo !== record.chartNo) {
        await deleteIndexedRecord(oldChartNo);
      }
      const res = await fetch(`/api/patients/${encodeURIComponent(record.chartNo)}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json; charset=utf-8" },
        body: JSON.stringify(record)
      });
      if (!res.ok) throw new Error(`서버 환자 저장 실패 (${res.status})`);
      return;
    }
    const { db, tx, store } = await transactionStore("readwrite");
    try {
      await new Promise((resolve, reject) => {
        if (oldChartNo && oldChartNo !== record.chartNo) store.delete(oldChartNo);
        store.put(record);
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
    } finally {
      db.close();
    }
  }

  async function deleteIndexedRecord(chartNo) {
    if (!chartNo) return;
    if (SERVER_MODE) {
      const res = await fetch(`/api/patients/${encodeURIComponent(chartNo)}`, { method: "DELETE" });
      if (!res.ok) throw new Error(`서버 환자 삭제 실패 (${res.status})`);
      return;
    }
    const { db, tx, store } = await transactionStore("readwrite");
    try {
      await new Promise((resolve, reject) => {
        store.delete(chartNo);
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
    } finally {
      db.close();
    }
  }

  function normalizeChartNo(value) {
    return String(value || "").trim().replace(/\.0$/, "");
  }

  function normalizePackageEntries(entries = []) {
    if (Array.isArray(entries)) {
      return entries.map((entry, index) => ({
        id: String(entry?.id || `entry-${index}`),
        date: String(entry?.date || ""),
        qty: Math.max(0, Number(entry?.qty ?? entry?.totalQty ?? 0) || 0)
      })).filter(entry => entry.qty > 0);
    }
    return Object.entries(entries || {}).map(([id, entry]) => ({
      id,
      date: String(entry?.date || ""),
      qty: Math.max(0, Number(entry?.qty ?? entry?.totalQty ?? 0) || 0)
    })).filter(entry => entry.qty > 0);
  }

  function calculatePackageBalance(pkg = {}) {
    const openingQty = Number(pkg.openingQty || 0);
    const purchaseQty = normalizePackageEntries(pkg.purchases).reduce((sum, entry) => sum + Number(entry.qty || 0), 0);
    const usageQty = normalizePackageEntries(pkg.usages).reduce((sum, entry) => sum + Number(entry.qty || 0), 0);
    return Math.max(0, openingQty + purchaseQty - usageQty);
  }

  function normalizePackages(packages = {}, source = {}) {
    const next = {};
    PACKAGE_KEYS.forEach(key => {
      const saved = packages?.[key] || {};
      const openingQty = Math.max(0, Number(saved.openingQty ?? source[key] ?? 0) || 0);
      const purchases = normalizePackageEntries(saved.purchases);
      const usages = normalizePackageEntries(saved.usages);
      next[key] = { openingQty, purchases, usages, balance: calculatePackageBalance({ openingQty, purchases, usages }) };
    });
    return next;
  }

  function withPackageBalances(record) {
    const packages = normalizePackages(record.packages, record);
    const next = { ...record, packages };
    PACKAGE_KEYS.forEach(key => { next[key] = Number(packages[key]?.balance || 0); });
    delete next.credit;
    return next;
  }

  function getPackageDayEntries(pkg = {}, date = "") {
    const rows = [];
    normalizePackageEntries(pkg.purchases).forEach(entry => {
      if (entry.date === date) rows.push({ ...entry, type: "purchase", label: "결제" });
    });
    normalizePackageEntries(pkg.usages).forEach(entry => {
      if (entry.date === date) rows.push({ ...entry, type: "usage", label: "사용" });
    });
    return rows.sort((a, b) => String(a.id || "").localeCompare(String(b.id || "")));
  }

  function sumPackageEntriesByDate(entries = [], date = "") {
    return normalizePackageEntries(entries)
      .filter(entry => entry.date === date)
      .reduce((sum, entry) => sum + Number(entry.qty || 0), 0);
  }

  function renderPackageViewer() {
    const viewer = $("packageViewer");
    if (!viewer) return;
    const packages = normalizePackages(activePackages);
    const balances = PACKAGE_KEYS.map(key => `
      <div class="package-balance"><span class="package-balance-key">${escapeHtml(key)}</span> 잔여량 ${escapeHtml(packages[key]?.balance || 0)}</div>
    `).join("");
    viewer.innerHTML = `
      <div class="package-card">
        <div class="package-balance-row">${balances}</div>
      </div>
    `;
  }

  function selectPackageType(key) {
    activePackageKey = PACKAGE_KEYS.includes(key) ? key : PACKAGE_KEYS[0];
    renderPackageViewer();
    renderVisitCalendar();
  }

  function getLatestVisitChiefComplaint(visitDates = [], visitHistory = {}) {
    const dates = (Array.isArray(visitDates) ? visitDates : Object.keys(visitHistory || {})).map(String).sort();
    const latestDate = dates[dates.length - 1] || "";
    return latestDate ? (visitHistory?.[latestDate]?.chiefComplaint || "") : "";
  }

  function getLatestVisitRecord(visitDates = [], visitHistory = {}) {
    const dates = (Array.isArray(visitDates) ? visitDates : Object.keys(visitHistory || {})).map(String).sort();
    const latestDate = dates[dates.length - 1] || "";
    return latestDate ? (visitHistory?.[latestDate] || null) : null;
  }

  function formatTreatmentsText(treatments) {
    return (Array.isArray(treatments) ? treatments : [])
      .map(item => String(item || "").trim())
      .filter(Boolean)
      .join(", ");
  }

  function parseCommaText(text) {
    return String(text || "")
      .split(",")
      .map(item => item.trim())
      .filter(Boolean);
  }

  function normalizeBodyParts(bodyParts = {}) {
    if (Array.isArray(bodyParts)) return { front: [], back: bodyParts.map(String).filter(Boolean) };
    return {
      front: Array.isArray(bodyParts.front) ? bodyParts.front.map(String).filter(Boolean) : [],
      back: Array.isArray(bodyParts.back) ? bodyParts.back.map(String).filter(Boolean) : []
    };
  }

  function getBodyPartList(bodyParts = {}) {
    const normalized = normalizeBodyParts(bodyParts);
    return [...normalized.front, ...normalized.back]
      .map(item => String(item || "").trim())
      .filter(Boolean);
  }

  function formatBodyPartsText(bodyParts = {}) {
    return getBodyPartList(bodyParts).join(", ");
  }

  function parseBodyPartsText(text, previousBodyParts = {}) {
    const previous = normalizeBodyParts(previousBodyParts);
    const previousText = formatBodyPartsText(previous);
    const nextText = String(text || "").trim();
    if (nextText === previousText) return previous;
    return { front: [], back: parseCommaText(nextText) };
  }

  function visitDatesFromRecord(patient = {}) {
    const dates = Array.isArray(patient.visitDates) ? patient.visitDates.map(String) : [];
    Object.keys(patient.visitHistory || {}).forEach(date => dates.push(String(date)));
    return [...new Set(dates.filter(Boolean))].sort();
  }

  function getLatestVisitDate(patient = {}) {
    const dates = visitDatesFromRecord(patient);
    return dates[dates.length - 1] || "";
  }

  function compareChartNo(a = {}, b = {}) {
    return String(a.chartNo || "").localeCompare(String(b.chartNo || ""), "ko", { numeric: true })
      || String(a.name || "").localeCompare(String(b.name || ""), "ko");
  }

  function comparePatientRows(a = {}, b = {}) {
    if (patientSortMode === "recent") {
      return String(getLatestVisitDate(b)).localeCompare(String(getLatestVisitDate(a)))
        || compareChartNo(a, b);
    }
    if (patientSortMode === "name") {
      return String(a.name || "").localeCompare(String(b.name || ""), "ko")
        || compareChartNo(a, b);
    }
    return compareChartNo(a, b);
  }

  function visitSummary(record = {}) {
    const treatments = formatTreatmentsText(record.treatments);
    const bodyParts = formatBodyPartsText(record.bodyParts);
    return [record.visitType, record.doctorName, treatments, bodyParts].filter(Boolean).join(" / ");
  }

  function packageDaySummary(pkg = {}, date = "") {
    const purchaseQty = sumPackageEntriesByDate(pkg.purchases, date);
    const usageQty = sumPackageEntriesByDate(pkg.usages, date);
    return [
      purchaseQty ? `결제 ${purchaseQty}` : "",
      usageQty ? `사용 ${usageQty}` : ""
    ].filter(Boolean).join(" / ");
  }

  function renderVisitDetail(date = selectedVisitDate) {
    const detailEl = $("visitDetail");
    if (!detailEl) return;
    if (!date) {
      detailEl.innerHTML = `<div class="meta">날짜를 선택하면 진료기록과 패키지 기록이 함께 표시됩니다.</div>`;
      return;
    }
    const record = activeVisitHistory?.[date] || {};
    const packages = normalizePackages(activePackages);
    const packageSections = PACKAGE_KEYS.map(key => {
      const rows = getPackageDayEntries(packages[key] || {}, date);
      if (!rows.length) return "";
      const rowsHtml = rows.map(entry => `
        <div class="package-history-row">
          <span>${escapeHtml(entry.label)}</span>
          <span>${escapeHtml(entry.qty)}개</span>
        </div>
      `).join("");
      return `
        <div class="package-history-title">${escapeHtml(key)}</div>
        <div class="package-history">${rowsHtml}</div>
      `;
    }).filter(Boolean).join("");
    const hasDateData = Boolean(activeVisitHistory?.[date]) || packageSections.length > 0;
    detailEl.innerHTML = `
      <div class="visit-detail-title">
        <span>${escapeHtml(date)}</span>
        ${hasDateData ? `<button class="danger" type="button" data-delete-combined-date="${escapeHtml(date)}">이 날짜 삭제</button>` : ""}
      </div>
      <div class="visit-detail-section">
        <div class="visit-detail-grid">
          <div class="visit-detail-label">초진/재진</div><div>${escapeHtml(record.visitType || "-")}</div>
          <div class="visit-detail-label">담당원장</div><div>${escapeHtml(record.doctorName || "-")}</div>
          <div class="visit-detail-label">치료목록</div><div>${escapeHtml(formatTreatmentsText(record.treatments) || "-")}</div>
          <div class="visit-detail-label">치료부위</div><div>${escapeHtml(formatBodyPartsText(record.bodyParts) || "-")}</div>
          <div class="visit-detail-label">주상병명</div><div>${escapeHtml(record.chiefComplaint || "-")}</div>
        </div>
      </div>
      <div class="visit-detail-section">
        ${packageSections || `<div class="package-history-row"><span>-</span><span>패키지 기록 없음</span></div>`}
      </div>
    `;
  }

  function renderVisitStats() {
    const dates = (Array.isArray(activeVisitDates) ? activeVisitDates : []).filter(Boolean);
    const firstEl = $("statFirstVisit");
    const lastEl = $("statLastVisit");
    const countEl = $("statVisitCount");
    if (firstEl) firstEl.textContent = dates.length ? dates[0] : "-";
    if (lastEl) lastEl.textContent = dates.length ? dates[dates.length - 1] : "-";
    if (countEl) countEl.textContent = `${dates.length}회`;
  }

  function syncDerivedEditorFieldsFromVisits({ keepChiefComplaintInput = false } = {}) {
    const dates = [...new Set((Array.isArray(activeVisitDates) ? activeVisitDates : Object.keys(activeVisitHistory || {})).map(String).filter(Boolean))].sort();
    const latestDate = dates[dates.length - 1] || "";
    const latestRecord = latestDate ? (activeVisitHistory?.[latestDate] || {}) : {};
    const chiefComplaint = keepChiefComplaintInput
      ? $("editChiefComplaint").value.trim()
      : String(latestRecord.chiefComplaint || "").trim();
    $("editChiefComplaint").value = chiefComplaint;
    $("editVisitType").value = latestRecord.visitType || "";
    $("editDoctorName").value = latestRecord.doctorName || "";
    $("editTreatmentsText").value = formatTreatmentsText(Array.isArray(latestRecord.treatments) ? latestRecord.treatments : []);
    $("editBodyPartsText").value = formatBodyPartsText(latestRecord.bodyParts || { front: [], back: [] });
    const pastChiefComplaints = dates
      .slice()
      .reverse()
      .map(date => {
        if (date === latestDate && keepChiefComplaintInput) return chiefComplaint;
        return (activeVisitHistory?.[date]?.chiefComplaint || "").trim();
      })
      .filter(Boolean);
    $("editPastChiefComplaints").value = [...new Set(pastChiefComplaints)].filter(cc => cc !== chiefComplaint).join(", ");
  }

  function renderVisitCalendar() {
    const titleEl = $("visitCalendarTitle");
    const calendarEl = $("visitCalendar");
    if (!titleEl || !calendarEl) return;
    const [year, month] = activeVisitMonth.split("-").map(Number);
    const firstDay = new Date(year, month - 1, 1);
    const lastDate = new Date(year, month, 0).getDate();
    const startOffset = firstDay.getDay();
    titleEl.textContent = `${year}년 ${String(month).padStart(2, "0")}월`;
    const weekdayHtml = ["일", "월", "화", "수", "목", "금", "토"]
      .map(day => `<div class="visit-weekday">${day}</div>`)
      .join("");
    const blanks = Array.from({ length: startOffset }, () => `<button class="visit-day" type="button" disabled></button>`).join("");
    const packages = normalizePackages(activePackages);
    const days = Array.from({ length: lastDate }, (_, index) => {
      const day = index + 1;
      const date = `${activeVisitMonth}-${String(day).padStart(2, "0")}`;
      const record = activeVisitHistory?.[date];
      const hasVisit = Boolean(record);
      const packageNotes = PACKAGE_KEYS
        .map(key => {
          const summary = packageDaySummary(packages[key] || {}, date);
          return summary ? `${key} ${summary}` : "";
        })
        .filter(Boolean);
      const hasPackage = packageNotes.length > 0;
      const selected = date === selectedVisitDate;
      const visitNote = hasVisit ? `<span class="visit-day-note">${escapeHtml(visitSummary(record) || "진료")}</span>` : "";
      const packageNote = packageNotes.map(text => `<span class="visit-day-note package">${escapeHtml(text)}</span>`).join("");
      return `<button class="visit-day${hasVisit ? " has-visit" : ""}${hasPackage ? " has-package" : ""}${selected ? " selected" : ""}" type="button" data-visit-date="${date}">${day}${visitNote}${packageNote}</button>`;
    }).join("");
    calendarEl.innerHTML = weekdayHtml + blanks + days;
    renderVisitDetail(selectedVisitDate);
  }

  function selectVisitDate(date) {
    selectedVisitDate = String(date || "");
    activePackageDate = selectedVisitDate || activePackageDate;
    renderVisitCalendar();
  }

  function changeVisitMonth(offset) {
    const [year, month] = activeVisitMonth.split("-").map(Number);
    const next = new Date(year, month - 1 + offset, 1);
    activeVisitMonth = `${next.getFullYear()}-${String(next.getMonth() + 1).padStart(2, "0")}`;
    renderVisitCalendar();
  }

  function patientsByVisitDate(date) {
    return latestIndexedValue
      .filter(patient => visitDatesFromRecord(patient).includes(date))
      .sort(compareChartNo);
  }

  function renderGlobalVisitPatientList(date = selectedGlobalVisitDate) {
    const el = $("globalVisitPatientList");
    if (!el) return;
    if (!date) {
      el.innerHTML = `<div class="meta">날짜를 선택하면 그날 진료받은 환자 목록이 표시됩니다.</div>`;
      return;
    }
    const rows = patientsByVisitDate(date);
    if (!rows.length) {
      el.innerHTML = `<div class="visit-detail-title"><span>${escapeHtml(date)}</span></div><div class="meta">진료받은 환자가 없습니다.</div>`;
      return;
    }
    el.innerHTML = `
      <div class="visit-detail-title"><span>${escapeHtml(date)} · ${rows.length.toLocaleString()}명</span></div>
      <div class="day-patient-list">
        ${rows.map(patient => {
          const record = patient.visitHistory?.[date] || {};
          return `
            <button class="day-patient-item" type="button" data-global-chart-no="${escapeHtml(patient.chartNo || "")}">
              <span>
                <span class="day-patient-main">${escapeHtml(patient.name || "(이름 없음)")}</span>
                <span class="day-patient-sub">${escapeHtml([patient.chartNo || "-", patient.gender || "-", patient.age || "-", getPatientPhone(patient)].filter(Boolean).join(" · "))}</span>
              </span>
              <span class="day-patient-sub">${escapeHtml(record.doctorName || patient.doctorName || "-")}</span>
            </button>
          `;
        }).join("")}
      </div>
    `;
  }

  function setPatientFindTab(tabName = "search") {
    const normalized = tabName === "date" ? "date" : "search";
    document.querySelectorAll("[data-find-tab]").forEach(button => {
      button.classList.toggle("active", button.dataset.findTab === normalized);
    });
    $("patientSearchPanel").hidden = normalized !== "search";
    $("patientDatePanel").hidden = normalized !== "date";
    if (normalized === "date") renderGlobalVisitCalendar();
  }

  function renderGlobalVisitCalendar() {
    const titleEl = $("globalVisitCalendarTitle");
    const calendarEl = $("globalVisitCalendar");
    if (!titleEl || !calendarEl) return;
    const [year, month] = globalVisitMonth.split("-").map(Number);
    const firstDay = new Date(year, month - 1, 1);
    const lastDate = new Date(year, month, 0).getDate();
    const startOffset = firstDay.getDay();
    titleEl.textContent = `${year}년 ${String(month).padStart(2, "0")}월`;
    const weekdayHtml = ["일", "월", "화", "수", "목", "금", "토"]
      .map(day => `<div class="visit-weekday">${day}</div>`)
      .join("");
    const visitCounts = new Map();
    latestIndexedValue.forEach(patient => {
      visitDatesFromRecord(patient).forEach(date => {
        if (date.slice(0, 7) === globalVisitMonth) visitCounts.set(date, (visitCounts.get(date) || 0) + 1);
      });
    });
    const blanks = Array.from({ length: startOffset }, () => `<button class="visit-day" type="button" disabled></button>`).join("");
    const days = Array.from({ length: lastDate }, (_, index) => {
      const day = index + 1;
      const date = `${globalVisitMonth}-${String(day).padStart(2, "0")}`;
      const count = visitCounts.get(date) || 0;
      const selected = date === selectedGlobalVisitDate;
      const note = count ? `<span class="visit-day-note">${count.toLocaleString()}명</span>` : "";
      return `<button class="visit-day${count ? " has-visit" : ""}${selected ? " selected" : ""}" type="button" data-global-visit-date="${date}">${day}${note}</button>`;
    }).join("");
    calendarEl.innerHTML = weekdayHtml + blanks + days;
    renderGlobalVisitPatientList();
  }

  function changeGlobalVisitMonth(offset) {
    const [year, month] = globalVisitMonth.split("-").map(Number);
    const next = new Date(year, month - 1 + offset, 1);
    globalVisitMonth = `${next.getFullYear()}-${String(next.getMonth() + 1).padStart(2, "0")}`;
    renderGlobalVisitCalendar();
  }

  async function deleteCombinedDate(date) {
    if (!date) return;
    if (!confirm(`${date} 진료기록과 패키지 기록을 모두 삭제할까요?`)) return;
    delete activeVisitHistory[date];
    activeVisitDates = activeVisitDates.filter(item => String(item) !== String(date));
    if (selectedVisitDate === date) selectedVisitDate = activeVisitDates[activeVisitDates.length - 1] || "";
    const packages = normalizePackages(activePackages);
    PACKAGE_KEYS.forEach(key => {
      const pkg = packages[key] || {};
      packages[key] = {
        ...pkg,
        purchases: normalizePackageEntries(pkg.purchases).filter(entry => entry.date !== date),
        usages: normalizePackageEntries(pkg.usages).filter(entry => entry.date !== date)
      };
    });
    activePackages = normalizePackages(packages);
    syncDerivedEditorFieldsFromVisits();
    renderPackageViewer();
    renderVisitCalendar();
    renderVisitStats();
    try {
      const record = readFormRecord();
      await putIndexedRecord(record, selectedChartNo);
      selectedChartNo = record.chartNo;
      const index = latestIndexedValue.findIndex(patient => String(patient.chartNo || "") === String(record.chartNo));
      if (index >= 0) latestIndexedValue[index] = record;
      else latestIndexedValue.push(record);
      $("selectedPatientJson").value = stringify(record);
      renderPatientList();
      renderGlobalVisitCalendar();
      setStatus("indexedStatus", "날짜 기록 삭제됨");
    } catch (error) {
      setStatus("indexedStatus", "오류", true);
      $("selectedPatientStatus").textContent = error?.message || String(error);
    }
  }

  async function loadIndexed() {
    setStatus("indexedStatus", "조회 중");
    try {
      latestIndexedValue = await getAllIndexedRecords();
      renderSummary("indexedSummary", latestIndexedValue);
      renderPatientList();
      renderGlobalVisitCalendar();
      if (selectedChartNo) selectPatient(selectedChartNo, false);
      setStatus("indexedStatus", "완료");
    } catch (error) {
      latestIndexedValue = [];
      renderSummary("indexedSummary", null);
      setStatus("indexedStatus", "오류", true);
      $("selectedPatientStatus").textContent = error?.message || String(error);
    }
  }

  function renderPatientList() {
    const query = $("patientSearchInput").value.trim().toLowerCase();
    const rows = latestIndexedValue.filter(patient => {
      const haystack = `${patient.chartNo || ""} ${patient.name || ""} ${getPatientPhone(patient)}`.toLowerCase();
      return !query || haystack.includes(query);
    }).sort(comparePatientRows);
    $("patientList").innerHTML = rows.length
      ? rows.map(patient => `
        <button class="patient-item${String(patient.chartNo || "") === selectedChartNo ? " active" : ""}" type="button" data-chart-no="${escapeHtml(patient.chartNo || "")}">
          <div class="patient-name">${escapeHtml(patient.name || "(이름 없음)")}</div>
          <div class="patient-sub">${escapeHtml([patient.chartNo || "-", patient.gender || "-", patient.age || "-", getPatientPhone(patient), `진료 ${(patient.visitDates || []).length || 0}회`].filter(Boolean).join(" · "))}</div>
        </button>
      `).join("")
      : `<div class="meta" style="padding:12px;">표시할 환자가 없습니다.</div>`;
  }

  function getSelectedPatient() {
    return latestIndexedValue.find(patient => String(patient.chartNo || "") === selectedChartNo) || null;
  }

  function selectPatient(chartNo, renderList = true) {
    selectedChartNo = String(chartNo || "");
    const patient = getSelectedPatient();
    if (!patient) {
      clearEditor();
      return;
    }
    $("editChartNo").value = patient.chartNo || "";
    $("editName").value = patient.name || "";
    $("editAge").value = patient.age ?? "";
    $("editGender").value = patient.gender || "";
    $("editPhone").value = getPatientPhone(patient);
    $("editAppointmentDate").value = formatAppointmentDates(patient);
    $("editMemo").value = patient.memo || "";
    activeVisitDates = visitDatesFromRecord(patient);
    activeVisitHistory = patient.visitHistory && typeof patient.visitHistory === "object" ? { ...patient.visitHistory } : {};
    selectedVisitDate = activeVisitDates[activeVisitDates.length - 1] || "";
    activeVisitMonth = selectedVisitDate ? selectedVisitDate.slice(0, 7) : new Date().toISOString().slice(0, 7);
    activePackages = normalizePackages(patient.packages, patient);
    activePackageDate = selectedVisitDate || new Date().toISOString().slice(0, 10);
    activePackageMonth = activeVisitMonth;
    syncDerivedEditorFieldsFromVisits();
    renderVisitCalendar();
    renderPackageViewer();
    renderVisitStats();
    $("selectedPatientJson").value = stringify(patient);
    $("selectedPatientStatus").textContent = "";
    if (renderList) renderPatientList();
  }

  function clearEditor() {
    selectedChartNo = "";
    ["editChartNo", "editName", "editAge", "editGender", "editPhone", "editDoctorName", "editVisitType", "editChiefComplaint", "editPastChiefComplaints", "editAppointmentDate", "editMemo", "editTreatmentsText", "editBodyPartsText", "selectedPatientJson"].forEach(id => { $(id).value = ""; });
    activeVisitDates = [];
    activeVisitHistory = {};
    activeVisitMonth = new Date().toISOString().slice(0, 7);
    selectedVisitDate = "";
    renderVisitCalendar();
    renderVisitStats();
    activePackages = normalizePackages();
    activePackageKey = "p6";
    activePackageDate = new Date().toISOString().slice(0, 10);
    activePackageMonth = activePackageDate.slice(0, 7);
    renderPackageViewer();
    $("selectedPatientStatus").textContent = "";
    renderPatientList();
  }

  function readFormRecord() {
    // 수정 가능한 항목: 이름·나이·메모·주상병명. 나머지는 기존 레코드 값을 그대로 보존
    const existing = getSelectedPatient();
    if (!existing) throw new Error("수정할 환자를 먼저 선택하세요.");
    const chartNo = normalizeChartNo(existing.chartNo || selectedChartNo);
    if (!chartNo) throw new Error("차트번호가 없습니다.");

    // 주상병명 수정 → 최신 진료일 기록의 주상병명을 갱신하고, 상단 주상병명도 그 값으로 맞춤
    const chiefComplaint = $("editChiefComplaint").value.trim();
    const visitType = $("editVisitType").value.trim();
    const visitHistory = activeVisitHistory && typeof activeVisitHistory === "object" ? { ...activeVisitHistory } : {};
    const visitDates = [...new Set((Array.isArray(activeVisitDates) ? activeVisitDates : Object.keys(visitHistory || {})).map(String).filter(Boolean))].sort();
    const latestDate = visitDates[visitDates.length - 1] || "";
    if (latestDate) {
      visitHistory[latestDate] = { ...(visitHistory[latestDate] || {}), visitType, chiefComplaint };
    }
    const latestRecord = latestDate ? (visitHistory[latestDate] || {}) : {};

    return withPackageBalances({
      ...existing,
      chartNo,
      name: $("editName").value.trim(),
      age: $("editAge").value ? Number($("editAge").value) : "",
      phone: $("editPhone").value.trim(),
      memo: $("editMemo").value.trim(),
      visitType: latestRecord.visitType || visitType || existing.visitType || "",
      visitDates,
      visitHistory,
      packages: activePackages,
      doctorName: latestRecord.doctorName || "",
      treatments: Array.isArray(latestRecord.treatments) ? latestRecord.treatments : [],
      bodyParts: normalizeBodyParts(latestRecord.bodyParts || { front: [], back: [] }),
      chiefComplaint: latestDate ? chiefComplaint : ""
    });
  }

  async function savePatientForm() {
    try {
      const record = readFormRecord();
      await putIndexedRecord(record, selectedChartNo);
      selectedChartNo = record.chartNo;
      await loadIndexed();
      selectPatient(record.chartNo);
      setStatus("indexedStatus", "저장됨");
    } catch (error) {
      setStatus("indexedStatus", "오류", true);
      $("selectedPatientStatus").textContent = error?.message || String(error);
    }
  }

  async function deleteSelectedPatient() {
    const patient = getSelectedPatient();
    if (!patient) return;
    const label = `${patient.name || "이름 없음"} / ${patient.chartNo || "차트번호 없음"}`;
    if (!confirm(`[1차 확인]\n${label}\n\n이 환자 전체 기록을 삭제하시겠습니까?`)) return;
    if (!confirm(`[2차 최종 확인]\n${label}\n\n삭제하면 기본정보, 진료기록, 패키지 기록이 모두 사라지며 복구할 수 없습니다.\n정말 삭제하시겠습니까?`)) return;
    const password = prompt("DB 삭제 비밀번호를 입력하세요.");
    if (password === null) return;
    if (password !== "7677") {
      alert("비밀번호가 맞지 않아 삭제하지 않았습니다.");
      return;
    }
    await deleteIndexedRecord(patient.chartNo);
    clearEditor();
    await loadIndexed();
    setStatus("indexedStatus", "삭제됨");
  }

  async function deleteAllIndexedPatients() {
    const count = Array.isArray(latestIndexedValue) ? latestIndexedValue.length : 0;
    if (!confirm(`[전체 삭제 확인]\n저장된 환자 DB ${count.toLocaleString()}건을 모두 삭제하시겠습니까?`)) return;
    if (!confirm(`[최종 확인]\n전체 환자 DB가 삭제됩니다.\n복구가 필요하면 먼저 백업을 받아두세요.\n정말 모두 삭제하시겠습니까?`)) return;
    const password = prompt("DB 삭제 비밀번호를 입력하세요.");
    if (password === null) return;
    if (password !== "7677") {
      alert("비밀번호가 맞지 않아 삭제하지 않았습니다.");
      return;
    }

    if (SERVER_MODE) {
      const res = await fetch("/api/patients", {
        method: "DELETE",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password })
      });
      if (!res.ok) throw new Error(`서버 전체 삭제 실패 (${res.status})`);
    } else {
      const db = await openIndexedDb();
      await new Promise((resolve, reject) => {
        const tx = db.transaction(DEFAULT_INDEXED_STORE, "readwrite");
        tx.objectStore(DEFAULT_INDEXED_STORE).clear();
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    clearEditor();
    await loadIndexed();
    setStatus("indexedStatus", "전체 삭제됨");
  }

  function exportIndexedBackup() {
    if (SERVER_MODE) {
      location.href = "/api/export/patients";
      return;
    }
    const blob = new Blob([stringify(latestIndexedValue)], { type: "application/json;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `patientChartDB-patients-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  async function importIndexedBackup(file) {
    if (!file) return;
    const text = await file.text();
    const records = JSON.parse(text);
    if (!Array.isArray(records)) throw new Error("JSON 배열 파일만 복원할 수 있습니다.");
    if (!confirm(`${records.length}개 레코드를 현재 ${SERVER_MODE ? "서버 DB" : "IndexedDB"}에 덮어쓰기/추가할까요?`)) return;
    if (SERVER_MODE) {
      const res = await fetch("/api/import/patients", {
        method: "POST",
        headers: { "Content-Type": "application/json; charset=utf-8" },
        body: JSON.stringify({ mode: "merge", patients: records.map(withPackageBalances) })
      });
      if (!res.ok) throw new Error(`서버 복원 실패 (${res.status})`);
      await loadIndexed();
      setStatus("indexedStatus", "복원됨");
      return;
    }
    const { db, tx, store } = await transactionStore("readwrite");
    try {
      await new Promise((resolve, reject) => {
        records.forEach(record => {
          if (record?.chartNo) store.put(withPackageBalances(record));
        });
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
    } finally {
      db.close();
    }
    await loadIndexed();
    setStatus("indexedStatus", "복원됨");
  }

  async function refreshAll() {
    await loadIndexed();
  }

  $("visitPrevMonthBtn").addEventListener("click", () => changeVisitMonth(-1));
  $("visitNextMonthBtn").addEventListener("click", () => changeVisitMonth(1));
  $("visitCalendar").addEventListener("click", event => {
    const day = event.target.closest("[data-visit-date]");
    if (day) selectVisitDate(day.dataset.visitDate);
  });
  $("visitDetail").addEventListener("click", event => {
    const button = event.target.closest("[data-delete-combined-date]");
    if (button) deleteCombinedDate(button.dataset.deleteCombinedDate);
  });
  $("visitCalendar").addEventListener("contextmenu", event => {
    const day = event.target.closest("[data-visit-date]");
    if (!day) return;
    event.preventDefault();
    deleteCombinedDate(day.dataset.visitDate);
  });
  renderVisitCalendar();
  renderPackageViewer();
  $("globalVisitPrevMonthBtn").addEventListener("click", () => changeGlobalVisitMonth(-1));
  $("globalVisitNextMonthBtn").addEventListener("click", () => changeGlobalVisitMonth(1));
  $("globalVisitCalendar").addEventListener("click", event => {
    const day = event.target.closest("[data-global-visit-date]");
    if (!day) return;
    selectedGlobalVisitDate = day.dataset.globalVisitDate;
    renderGlobalVisitCalendar();
  });
  $("globalVisitPatientList").addEventListener("click", event => {
    const item = event.target.closest("[data-global-chart-no]");
    if (item) {
      selectPatient(item.dataset.globalChartNo);
      setPatientFindTab("search");
    }
  });
  document.querySelectorAll("[data-find-tab]").forEach(button => {
    button.addEventListener("click", () => setPatientFindTab(button.dataset.findTab));
  });
  renderGlobalVisitCalendar();
  setPatientFindTab("search");

  document.querySelectorAll("[data-fb-path]").forEach(button => {
    button.addEventListener("click", () => loadFirebase(button.dataset.fbPath));
  });
  $("loadFirebasePathBtn").addEventListener("click", () => loadFirebase());
  $("firebasePathInput").addEventListener("keydown", event => { if (event.key === "Enter") loadFirebase(); });
  $("loadIndexedBtn").addEventListener("click", loadIndexed);
  $("patientSearchInput").addEventListener("input", renderPatientList);
  $("patientSortSelect").addEventListener("change", event => {
    patientSortMode = event.target.value || "chart";
    renderPatientList();
  });
  $("patientList").addEventListener("click", event => {
    const item = event.target.closest(".patient-item");
    if (item) selectPatient(item.dataset.chartNo);
  });
  $("savePatientBtn").addEventListener("click", savePatientForm);
  $("deletePatientBtn")?.addEventListener("click", deleteSelectedPatient);
  $("deleteAllIndexedBtn")?.addEventListener("click", async () => {
    try {
      await deleteAllIndexedPatients();
    } catch (error) {
      setStatus("indexedStatus", "전체 삭제 오류", true);
      alert(error?.message || String(error));
    }
  });
  $("exportIndexedBtn").addEventListener("click", exportIndexedBackup);
  $("importIndexedBtn").addEventListener("click", () => $("importFileInput").click());
  $("importFileInput").addEventListener("change", event => importIndexedBackup(event.target.files?.[0]).catch(error => {
    setStatus("indexedStatus", "오류", true);
    $("selectedPatientStatus").textContent = error?.message || String(error);
  }));
  $("firebaseToggleBtn").addEventListener("click", () => {
    const open = !document.body.classList.contains("firebase-open");
    document.body.classList.toggle("firebase-open", open);
    $("firebaseToggleBtn").textContent = open ? "‹" : "›";
    $("firebaseToggleBtn").setAttribute("aria-label", open ? "Firebase 패널 닫기" : "Firebase 패널 열기");
  });
  disableAutocomplete();

  refreshAll();
</script>
</body>
</html>
