<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>경희홍익한의원 유틸</title>
<style>
  :root {
    --bg: #07111f;
    --panel: #101b2d;
    --panel2: #16243a;
    --line: rgba(255,255,255,0.12);
    --text: #e7eef8;
    --muted: #9badbf;
    --accent: #39a9f5;
    --gold: #ffca6a;
    --green: #4ade80;
    --danger: #fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .app { width: min(1100px, 100%); margin: 0 auto; padding: 18px; }
  .topbar { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
  .brand { display: flex; align-items: center; gap: 10px; margin-right: 8px; }
  .brand-icon { width: 36px; height: 36px; object-fit: contain; flex-shrink: 0; }
  .brand-title { font-size: 20px; font-weight: 900; color: #fff; line-height: 1; white-space: nowrap; margin: 0; }
  .brand-highlight { color: var(--gold); }
  a.btn-link, button {
    border: 1px solid var(--line);
    background: var(--panel2);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 12px;
    font-weight: 900;
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
    font-family: inherit;
  }
  a.btn-link { color: var(--accent); }
  button:hover, a.btn-link:hover { border-color: var(--accent); }
  button:disabled { opacity: 0.55; cursor: wait; }
  button.good { border-color: rgba(74,222,128,0.55); color: var(--green); }
  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .card-title { color: var(--gold); font-weight: 900; font-size: 14px; margin-bottom: 12px; }
  .tool-row { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; }
  .search-input {
    width: min(260px, 100%);
    border: 1px solid var(--line);
    background: var(--panel2);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 10px;
    font: inherit;
    font-size: 13px;
    font-weight: 800;
  }
  .status {
    color: var(--muted);
    font-size: 13px;
    font-weight: 800;
    margin-top: 12px;
    white-space: pre-wrap;
    line-height: 1.55;
  }
  .status.good { color: var(--green); }
  .status.error { color: var(--danger); }
  .note { color: var(--muted); font-size: 12px; font-weight: 800; margin-top: 10px; line-height: 1.5; }
  .result-table { margin-top: 12px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--line); font-size: 13px; }
  th { color: var(--muted); font-size: 11px; font-weight: 900; }
  td.phone { color: var(--green); font-weight: 900; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <img class="brand-icon" src="assets/logo-icon.png" alt="경희홍익한의원 로고">
      <h1 class="brand-title"><span>경희</span><span class="brand-highlight">홍익</span><span>한의원</span> 유틸</h1>
    </div>
    <a class="btn-link" href="db-viewer.html">DB</a>
    <a class="btn-link" href="stats.html">통계</a>
  </div>

  <div class="card">
    <div class="card-title">Slack 백업</div>
    <div class="tool-row">
      <button class="good" id="slackBackupBtn" type="button">슬랙 백업</button>
    </div>
    <div class="note">Slack 공개 채널 메시지를 읽어 <strong>slack_backups</strong> 폴더에 텍스트 파일로 저장합니다.</div>
    <div class="status" id="slackBackupStatus">대기 중</div>
  </div>

  <div class="card">
    <div class="card-title">환자 연락처 검색</div>
    <div class="tool-row">
      <input class="search-input" id="patientNameInput" type="search" placeholder="성함 입력" autocomplete="off">
      <button class="good" id="patientSearchBtn" type="button">연락처 검색</button>
    </div>
    <div class="note">검색 버튼을 누를 때만 서버에서 해당 검색어와 일치하는 환자만 가져옵니다.</div>
    <div class="status" id="patientSearchStatus">대기 중</div>
    <div class="result-table" id="patientSearchResult"></div>
  </div>
</div>

<script>
  const backupBtn = document.getElementById("slackBackupBtn");
  const statusEl = document.getElementById("slackBackupStatus");
  const patientNameInput = document.getElementById("patientNameInput");
  const patientSearchBtn = document.getElementById("patientSearchBtn");
  const patientSearchStatus = document.getElementById("patientSearchStatus");
  const patientSearchResult = document.getElementById("patientSearchResult");

  function setStatus(text, type = "") {
    statusEl.className = "status" + (type ? ` ${type}` : "");
    statusEl.textContent = text;
  }

  async function runSlackBackup() {
    backupBtn.disabled = true;
    setStatus("Slack 백업 실행 중...");
    try {
      const res = await fetch("/api/backup/slack-text", { method: "POST", cache: "no-store" });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.ok) throw new Error(data.error || `백업 실패 (${res.status})`);
      const lines = [
        "백업 완료",
        `파일: slack_backups/${data.filename}`,
        `채널: ${Number(data.channels || 0).toLocaleString()}개`,
        `메시지: ${Number(data.messages || 0).toLocaleString()}개`
      ];
      if (Array.isArray(data.errors) && data.errors.length) {
        lines.push("", "일부 채널 오류:", ...data.errors);
      }
      setStatus(lines.join("\n"), data.errors?.length ? "" : "good");
    } catch (error) {
      setStatus(error?.message || String(error), "error");
    } finally {
      backupBtn.disabled = false;
    }
  }

  function escapeHtml(value) {
    return String(value ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  function patientPhone(record = {}) {
    return record.phone || record.phoneNumber || record.tel || record.mobile || record.contact || "";
  }

  function setPatientSearchStatus(text, type = "") {
    patientSearchStatus.className = "status" + (type ? ` ${type}` : "");
    patientSearchStatus.textContent = text;
  }

  function renderPatientResults(records) {
    if (!records.length) {
      patientSearchResult.innerHTML = "";
      setPatientSearchStatus("검색 결과 없음");
      return;
    }
    patientSearchResult.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>성함</th>
            <th>연락처</th>
            <th>차트번호</th>
          </tr>
        </thead>
        <tbody>
          ${records.map(record => `
            <tr>
              <td>${escapeHtml(record.name || "-")}</td>
              <td class="phone">${escapeHtml(patientPhone(record) || "-")}</td>
              <td>${escapeHtml(record.chartNo || "-")}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;
    setPatientSearchStatus(`${records.length.toLocaleString()}명 검색됨`, "good");
  }

  async function searchPatientContact() {
    const q = patientNameInput.value.trim();
    patientSearchResult.innerHTML = "";
    if (!q) {
      setPatientSearchStatus("성함을 입력하세요.", "error");
      patientNameInput.focus();
      return;
    }
    patientSearchBtn.disabled = true;
    setPatientSearchStatus("검색 중...");
    try {
      const res = await fetch(`/api/patients/search?q=${encodeURIComponent(q)}&limit=20`, { cache: "no-store" });
      const data = await res.json().catch(() => []);
      if (!res.ok) throw new Error(data.error || `검색 실패 (${res.status})`);
      renderPatientResults(Array.isArray(data) ? data : []);
    } catch (error) {
      setPatientSearchStatus(error?.message || String(error), "error");
    } finally {
      patientSearchBtn.disabled = false;
    }
  }

  backupBtn.addEventListener("click", runSlackBackup);
  patientSearchBtn.addEventListener("click", searchPatientContact);
  patientNameInput.addEventListener("keydown", event => {
    if (event.key === "Enter") searchPatientContact();
  });
</script>
</body>
</html>
