<html lang="ko">
<head>

<script>
(function () {

<title>경희홍익한의원 통계</title>
<style>
  :root {
    --bg: #07111f;
    --panel: #101b2d;
    --panel2: #16243a;
    --line: rgba(255,255,255,0.12);
    --text: #e7eef8;
    --muted: #9badbf;
    --accent: #39a9f5;
    --gold: #ffca6a;
    --green: #4ade80;
    --danger: #fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .app { width: min(1400px, 100%); margin: 0 auto; padding: 18px; }
  .topbar { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
  .brand { display: flex; align-items: center; gap: 10px; margin-right: 8px; }
  .brand-icon { width: 36px; height: 36px; object-fit: contain; flex-shrink: 0; }
  .brand-title { font-size: 20px; font-weight: 900; color: #fff; line-height: 1; white-space: nowrap; }
  .brand-highlight { color: var(--gold); }
  a.btn-link, button {
    border: 1px solid var(--line);
    background: var(--panel2);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 12px;
    font-weight: 900;
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
    font-family: inherit;
  }
  a.btn-link { color: var(--accent); }
  button:hover, a.btn-link:hover { border-color: var(--accent); }
  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .card-title { color: var(--gold); font-weight: 900; font-size: 14px; margin-bottom: 12px; }
  .controls { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
  .preset-btn.active { border-color: rgba(255,202,106,0.75); background: rgba(255,202,106,0.15); color: var(--gold); }
  .date-input { display: flex; align-items: center; gap: 6px; }
  input[type="date"], input[type="month"], select {
    border: 1px solid var(--line);
    background: var(--panel2);
    color: var(--text);
    border-radius: 8px;
    padding: 7px 10px;
    font-family: inherit;
    font-size: 13px;
  }
  .field-label { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 12px; font-weight: 900; }
  select { font-weight: 800; }
  .range-label { color: var(--muted); font-size: 12px; font-weight: 800; margin-top: 10px; }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
  .metric {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 14px;
  }
  .metric-label { color: var(--muted); font-size: 12px; font-weight: 900; }
  .metric-value { color: var(--green); font-size: 28px; font-weight: 900; margin-top: 6px; }
  .metric-value.gold { color: var(--gold); }
  .metric-value.accent { color: var(--accent); }
  .metric-sub { color: var(--muted); font-size: 11px; font-weight: 700; margin-top: 2px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 860px) { .grid2 { grid-template-columns: 1fr; } }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--line); font-size: 13px; }
  th { color: var(--muted); font-size: 11px; font-weight: 900; }
  td.num, th.num { text-align: right; font-weight: 900; }
  tr.highlight td { color: var(--gold); }
  .bar-cell { width: 40%; }
  .bar { height: 8px; border-radius: 999px; background: rgba(57,169,245,0.5); }
  .bar.gold { background: rgba(255,202,106,0.6); }
  .empty { color: var(--muted); font-size: 13px; padding: 8px 2px; }
  .status { color: var(--gold); font-size: 12px; font-weight: 800; }
  .status.error { color: var(--danger); }
  .chart-wrap { overflow-x: auto; padding-bottom: 4px; }
  .weekly-chart { min-width: 720px; width: 100%; height: 340px; display: block; }
  .chart-axis, .chart-grid { stroke: rgba(255,255,255,0.16); stroke-width: 1; }
  .chart-grid { stroke-dasharray: 4 6; }
  .chart-text { fill: var(--muted); font-size: 11px; font-weight: 800; }
  .chart-line { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
  .chart-dot { stroke: var(--panel); stroke-width: 2; }
  .chart-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 10px; color: var(--muted); font-size: 12px; font-weight: 900; }
  .legend-item { display: inline-flex; align-items: center; gap: 6px; }
  .legend-swatch { width: 18px; height: 3px; border-radius: 999px; display: inline-block; }
  .chart-section-title { color: var(--gold); font-size: 14px; font-weight: 900; margin: 18px 0 8px; }
  .chart-subtitle { color: var(--muted); font-size: 12px; font-weight: 900; margin-bottom: 8px; }
  .chart-divider { height: 1px; background: var(--line); margin: 18px 0 0; }
  .comparison-line-prev { stroke-dasharray: 7 7; opacity: 0.68; }
  .comparison-dot-prev { fill: var(--panel); stroke-width: 2.5; opacity: 0.85; }
  .chart-toggle-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .chart-toggle {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    min-height: 30px;
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 999px;
    background: rgba(255,255,255,0.04);
    color: rgba(232,238,247,0.72);
    padding: 6px 10px;
    font-size: 12px;
    font-weight: 900;
    cursor: pointer;
    user-select: none;
    transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease, opacity 0.15s ease;
  }
  .chart-toggle:hover { border-color: var(--metric-color); color: var(--text); }
  .chart-toggle.active {
    border-color: var(--metric-color);
    background: color-mix(in srgb, var(--metric-color) 18%, transparent);
    color: var(--text);
  }
  .chart-toggle-swatch { width: 18px; height: 4px; border-radius: 999px; display: inline-block; background: var(--metric-color); opacity: 0.45; }
  .chart-toggle.active .chart-toggle-swatch { opacity: 1; box-shadow: 0 0 0 2px color-mix(in srgb, var(--metric-color) 22%, transparent); }
  .comparison-unit-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0 8px; }
  .comparison-period-controls { display: flex; flex-wrap: wrap; gap: 8px 12px; align-items: center; margin: 8px 0; }
  .comparison-period-controls.hidden { display: none; }
  .comparison-period-controls input,
  .comparison-period-controls select { min-height: 30px; font-family: inherit; font-size: 13px; font-weight: 800; }
  .comparison-unit-btn {
    min-height: 28px;
    border-radius: 999px;
    padding: 5px 10px;
    font-size: 12px;
    font-weight: 900;
  }
  .comparison-unit-btn.active { border-color: rgba(57,169,245,0.75); background: rgba(57,169,245,0.15); color: var(--accent); }
  .wide-card { grid-column: 1 / -1; }
  .period-report { display: grid; gap: 14px; margin-top: 14px; }
  .period-report:empty { display: none; }
  .period-report-head { display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; align-items: end; }
  .period-report-title { margin: 0; color: #fff; font-size: 24px; }
  .period-report-period { color: var(--muted); font-size: 13px; font-weight: 800; }
  .period-report-metrics { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
  .period-report-metric { padding: 12px; border: 1px solid var(--line); border-radius: 10px; background: var(--panel2); }
  .period-report-metric-label { color: var(--muted); font-size: 11px; font-weight: 900; }
  .period-report-metric-value { margin-top: 5px; color: #fff; font-size: 24px; font-weight: 900; }
  .period-report-metric-sub { margin-top: 3px; color: var(--accent); font-size: 11px; font-weight: 800; }
  .period-report-section { padding-top: 4px; overflow-x: auto; }
  .period-report-section h3 { margin: 0 0 8px; color: var(--gold); font-size: 15px; }
  .period-report-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .period-report-note { color: var(--muted); font-size: 11px; line-height: 1.55; }
  @media (max-width: 640px) {
    .period-report-metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .period-report-columns { grid-template-columns: 1fr; }
  }
  @media print {
    body.period-report-printing { background: #fff; color: #111; }
    body.period-report-printing .topbar,
    body.period-report-printing .card:not(#periodReportCard),
    body.period-report-printing #periodReportControls,
    body.period-report-printing #periodReportStatus,
    body.period-report-printing #periodReportCard > .card-title,
    body.period-report-printing #periodReportCard > .period-report-note { display: none !important; }
    body.period-report-printing .app { width: 100%; padding: 0; }
    body.period-report-printing #periodReportCard { border: 0; padding: 0; margin: 0; background: #fff; color: #111; }
    body.period-report-printing .period-report-metric,
    body.period-report-printing .period-report-section { background: #fff; border-color: #bbb; break-inside: avoid; }
    body.period-report-printing .period-report-title,
    body.period-report-printing .period-report-metric-value { color: #111; }
    body.period-report-printing .period-report-period,
    body.period-report-printing .period-report-metric-label,
    body.period-report-printing .period-report-note,
    body.period-report-printing th { color: #555; }
    body.period-report-printing td, body.period-report-printing th { border-color: #ccc; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <img class="brand-icon" src="assets/logo-icon.png" alt="경희홍익한의원 로고">
      <h1 class="brand-title"><span>경희</span><span class="brand-highlight">홍익</span><span>한의원</span> 통계</h1>
    </div>
    <a class="btn-link" href="db-viewer.html">DB</a>
  </div>

  <div class="card">
    <div class="controls">
      <label class="field-label">원장
        <select id="doctorFilter"><option value="">전체</option></select>
      </label>
      <button id="csvBtn" style="border-color:rgba(57,169,245,0.6);color:var(--accent)">CSV 다운로드</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">기간 선택</div>
    <div class="controls" id="presetRow">
      <button class="preset-btn" data-preset="7">최근 7일</button>
      <button class="preset-btn" data-preset="30">최근 30일</button>
      <button class="preset-btn" data-preset="90">최근 90일</button>
      <button class="preset-btn" data-preset="180">최근 180일</button>
      <button class="preset-btn" data-preset="year">올해</button>
      <button class="preset-btn" data-preset="all">전체</button>
      <span class="date-input">
        <input type="date" id="startDate">
        <span style="color:var(--muted)">~</span>
        <input type="date" id="endDate">
      </span>
      <button id="applyBtn" style="border-color:rgba(74,222,128,0.55);color:var(--green)">조회</button>
    </div>
    <div class="controls" style="margin-top:10px">
      <span style="color:var(--muted);font-size:11px;font-weight:700">오늘은 집계에서 제외됩니다 (전일까지)</span>
    </div>
    <div class="range-label" id="rangeLabel"></div>
    <div class="status" id="status"></div>
  </div>

  <div class="card" id="periodReportCard">
    <div class="card-title">기간 리포트</div>
    <div class="controls" id="periodReportControls">
      <button id="periodReportCreateBtn" type="button" style="border-color:rgba(74,222,128,0.55);color:var(--green)">기간 리포트 만들기</button>
      <button id="periodReportPrintBtn" type="button" disabled>인쇄 / PDF</button>
    </div>
    <div class="period-report-note">위에서 선택한 기간의 운영 통계와 3주 전 초진 코호트의 21일 재진·삼진율을 집계합니다. 추나 여부는 초진 당일 단추·복추 시행 여부로 구분합니다.</div>
    <div class="status" id="periodReportStatus">대기 중</div>
    <div class="period-report" id="periodReportResult"></div>
  </div>

  <div class="card">
    <div class="card-title">기간 요약</div>
    <div class="metrics" id="summaryMetrics"></div>
  </div>

  <div class="card">
    <div class="card-title">기간 추이</div>
    <div class="controls">
      <label class="field-label">그래프 단위
        <select id="chartUnit">
          <option value="day">일</option>
          <option value="week">주</option>
          <option value="month">월</option>
          <option value="quarter">분기</option>
          <option value="year">년</option>
        </select>
      </label>
    </div>
    <div class="chart-toggle-row" id="chartMetricToggles"></div>
    <div id="weeklyChartWrap"></div>
    <div class="chart-divider"></div>
    <div class="chart-section-title">기간 비교</div>
    <div class="comparison-unit-row" id="comparisonUnitRow">
      <button class="comparison-unit-btn active" data-comparison-unit="week">주</button>
      <button class="comparison-unit-btn" data-comparison-unit="month">월</button>
      <button class="comparison-unit-btn" data-comparison-unit="quarter">분기</button>
      <button class="comparison-unit-btn" data-comparison-unit="year">년</button>
      <label class="field-label">그래프 단위
        <select id="comparisonGraphUnit">
          <option value="day">일</option>
          <option value="week">주</option>
          <option value="month">월</option>
          <option value="quarter">분기</option>
          <option value="year">년</option>

      <label class="field-label">현재 월 <input type="month" id="comparisonCurrentMonth"></label>
    </div>

      <label class="field-label">이전 분기 <select id="comparisonPreviousQuarter"></select></label>
      <label class="field-label">현재 분기 <select id="comparisonCurrentQuarter"></select></label>
    </div>

    <div class="chart-subtitle" id="periodComparisonLabel"></div>

  <div class="grid2">

      <div class="card-title">치료별 횟수</div>

    </div>

      <div class="card-title">치료조합 Top 10</div>

<script>
  const DB_NAME = "patientChartDB";
  const STORE = "patients";
  const $ = id => document.getElementById(id);
  const SERVER_MODE = location.protocol === "http:" || location.protocol === "https:";

  let allRecords = [];
  const CHART_METRICS = [
    { key: "avgVisitsPerDay", label: "진료 환자", axis: "count", color: "#39a9f5", title: value => `진료 환자 ${value.toFixed(1)}명` },
    { key: "avgNewPatientsPerDay", label: "초진", axis: "count", color: "#ffca6a", title: value => `초진 ${value.toFixed(1)}명` },
    { key: "avgPrescriptionPatientsPerDay", label: "약환", axis: "count", color: "#14b8a6", title: value => `약환 ${value.toFixed(1)}명` },
    { key: "avgChunaPerDay", label: "추나", axis: "count", color: "#f97316", title: value => `추나 ${value.toFixed(1)}명` },
    { key: "avgPharmaPatientsPerDay", label: "약침", axis: "count", color: "#22c55e", title: value => `약침 ${value.toFixed(1)}명` },
    { key: "avgPharmaPackagePurchasePatientsPerDay", label: "약침패키지", axis: "count", color: "#eab308", title: value => `약침패키지 ${value.toFixed(1)}명` },
    { key: "returnRate", label: "재진율", axis: "rate", color: "#a78bfa", title: value => `재진율 ${(value * 100).toFixed(1)}%` },
    { key: "thirdVisitRate", label: "삼진율", axis: "rate", color: "#fb7185", title: value => `삼진율 ${(value * 100).toFixed(1)}%` },
    { key: "chunaPatientRate", label: "추나비율", axis: "rate", color: "#38bdf8", title: value => `추나비율 ${(value * 100).toFixed(1)}%` },
    { key: "complexChunaRate", label: "복추 비율", axis: "rate", color: "#ef4444", title: value => `복추 비율 ${(value * 100).toFixed(1)}%` },
    { key: "pharmaPatientRate", label: "약침비율", axis: "rate", color: "#10b981", title: value => `약침비율 ${(value * 100).toFixed(1)}%` }
  ];

  function getVisibleChartMetricKeys(wrapId = "chartMetricToggles", chipSelector = ".chart-metric-chip") {
    const wrap = $(wrapId);
    const chips = wrap ? [...wrap.querySelectorAll(chipSelector)] : [];
    if (!chips.length) return CHART_METRICS.map(metric => metric.key);
    return chips.filter(chip => chip.classList.contains("active")).map(chip => chip.dataset.metricKey);
  }

  function renderMetricToggles(wrapId, chipClass, activeKeys = null) {
    const wrap = $(wrapId);
    if (!wrap) return;
    const activeSet = activeKeys ? new Set(activeKeys) : null;
    wrap.innerHTML = CHART_METRICS.map(metric => `
      <button class="chart-toggle ${chipClass}${!activeSet || activeSet.has(metric.key) ? " active" : ""}" type="button" data-metric-key="${metric.key}" style="--metric-color:${metric.color}">
        <span class="chart-toggle-swatch"></span>
        ${metric.label}
      </button>
    `).join("");
  }

  function renderChartMetricToggles() {
    renderMetricToggles("chartMetricToggles", "chart-metric-chip", ["avgVisitsPerDay", "returnRate", "thirdVisitRate"]);
    renderMetricToggles("periodComparisonMetricToggles", "comparison-chart-metric-chip", ["thirdVisitRate"]);
  }

  // ── IndexedDB 읽기 ──────────────────────────────────────────────
  function openDb() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
      req.onblocked = () => reject(new Error("IndexedDB 열기가 차단되었습니다."));
    });
  }
  async function loadRecords() {
    if (SERVER_MODE) {
      const res = await fetch("/api/patients", { cache: "no-store" });
      if (!res.ok) throw new Error(`서버 환자 목록 조회 실패 (${res.status})`);
      return await res.json();
    }
    const db = await openDb();
    if (!db.objectStoreNames.contains(STORE)) {
      db.close();
      throw new Error(`${DB_NAME} 안에 ${STORE} 스토어가 없습니다. (먼저 환자 데이터를 저장/가져오기 하세요)`);
    }
    try {
      return await new Promise((resolve, reject) => {
        const req = db.transaction(STORE, "readonly").objectStore(STORE).getAll();
        req.onsuccess = () => resolve(Array.isArray(req.result) ? req.result : []);
        req.onerror = () => reject(req.error);
      });
    } finally { db.close(); }
  }

  async function loadServerDoctors() {
    const res = await fetch("/api/stats/doctors", { cache: "no-store" });
    if (!res.ok) throw new Error(`서버 원장 목록 조회 실패 (${res.status})`);
    return await res.json();
  }

  async function loadServerStats(start, end, docFilter, chartUnit) {
    const params = new URLSearchParams({ start, end, unit: chartUnit || "week" });
    if (docFilter) params.set("doctor", docFilter);
    const res = await fetch(`/api/stats?${params.toString()}`, { cache: "no-store" });
    if (!res.ok) throw new Error(`서버 통계 조회 실패 (${res.status})`);
    return await res.json();
  }

  // ── 날짜 유틸 ───────────────────────────────────────────────────
  function ymd(date) {
    const d = new Date(date);
    const local = new Date(d.getTime() - d.getTimezoneOffset() * 60000);
    return local.toISOString().slice(0, 10);
  }
  const today = () => ymd(new Date());
  function addDays(dateStr, n) {
    const d = new Date(dateStr + "T00:00:00");
    d.setDate(d.getDate() + n);
    return ymd(d);
  }

  function visitDatesOf(rec) {
    const dates = Array.isArray(rec.visitDates) ? rec.visitDates.map(String) : [];
    Object.keys(rec.visitHistory || {}).forEach(d => dates.push(String(d)));
    return [...new Set(dates.filter(Boolean))].sort();
  }

  function isPrescriptionChiefComplaint(value) {
    const text = String(value || "").trim().replace(/\s+/g, "");
    return text === "처방" || text === "-처방-";
  }

  function isPrescriptionVisit(rec, date) {
    const history = rec.visitHistory || {};
    if (Object.prototype.hasOwnProperty.call(history, date)) {
      return isPrescriptionChiefComplaint(history[date]?.chiefComplaint);
    }
    return isPrescriptionChiefComplaint(rec.chiefComplaint);
  }

  function normalizeVisitType(value) {
    const text = String(value || "").trim().replace(/\s+/g, "");
    if (text.includes("초")) return "초진";
    if (text.includes("재")) return "재진";
    return "";
  }

  function getVisitRecord(rec, date) {
    return (rec.visitHistory || {})[date] || {};
  }

  function explicitNewVisitDatesOf(rec) {
    return visitDatesOf(rec).filter(date => normalizeVisitType(getVisitRecord(rec, date).visitType) === "초진");
  }

  function newVisitDatesOf(rec) {
    const explicitDates = explicitNewVisitDatesOf(rec);
    if (explicitDates.length) return explicitDates;
    const dates = visitDatesOf(rec);
    return dates.length ? [dates[0]] : [];
  }

  function nonPrescriptionVisitDatesOf(rec) {
    return visitDatesOf(rec).filter(date => !isPrescriptionVisit(rec, date));
  }

  function isoWeekKey(dateStr) {
    const d = new Date(dateStr + "T00:00:00");
    d.setHours(0, 0, 0, 0);
    d.setDate(d.getDate() + 3 - ((d.getDay() + 6) % 7));
    const weekYear = d.getFullYear();
    const week1 = new Date(weekYear, 0, 4);
    const weekNo = 1 + Math.round(((d - week1) / 86400000 - 3 + ((week1.getDay() + 6) % 7)) / 7);
    return `${weekYear}${String(weekNo).padStart(2, "0")}`;
  }

  function isoWeekRangeLabel(weekKey) {
    const match = String(weekKey || "").match(/^(\d{4})(\d{2})$/);
    if (!match) return "";
    const year = Number(match[1]);
    const week = Number(match[2]);
    const jan4 = new Date(year, 0, 4);
    const week1Monday = new Date(jan4);
    week1Monday.setDate(jan4.getDate() - ((jan4.getDay() + 6) % 7));
    const start = new Date(week1Monday);
    start.setDate(week1Monday.getDate() + (week - 1) * 7);
    const end = new Date(start);
    end.setDate(start.getDate() + 6);
    const startLabel = `${start.getMonth() + 1}.${start.getDate()}`;
    const endLabel = start.getMonth() === end.getMonth() ? String(end.getDate()) : `${end.getMonth() + 1}.${end.getDate()}`;
    return `(${startLabel}-${endLabel})`;
  }

  function periodKey(dateStr, unit = "week") {
    const d = new Date(dateStr + "T00:00:00");
    const year = d.getFullYear();
    const month = d.getMonth() + 1;
    if (unit === "day") return dateStr.replaceAll("-", "");
    if (unit === "month") return `${year}${String(month).padStart(2, "0")}`;
    if (unit === "quarter") return `${year}Q${Math.ceil(month / 3)}`;
    if (unit === "year") return String(year);
    return isoWeekKey(dateStr);
  }

  function rangeDays(start, end) {
    return Math.round((new Date(end + "T00:00:00") - new Date(start + "T00:00:00")) / 86400000) + 1;
  }

  function defaultChartUnit(start, end) {
    return rangeDays(start, end) <= 30 ? "day" : "week";
  }

  function minDateStr(a, b) {
    return a <= b ? a : b;
  }

  function addMonths(dateStr, n) {
    const d = new Date(dateStr + "T00:00:00");
    const day = d.getDate();
    d.setDate(1);
    d.setMonth(d.getMonth() + n);
    const lastDay = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
    d.setDate(Math.min(day, lastDay));
    return ymd(d);
  }

  function periodBoundsFor(dateStr, unit) {
    const d = new Date(dateStr + "T00:00:00");
    const year = d.getFullYear();
    const month = d.getMonth();
    if (unit === "week") {
      const start = new Date(d);
      start.setDate(d.getDate() - ((d.getDay() + 6) % 7));
      const end = new Date(start);
      end.setDate(start.getDate() + 6);
      return { start: ymd(start), end: ymd(end) };
    }
    if (unit === "month") {
      return { start: ymd(new Date(year, month, 1)), end: ymd(new Date(year, month + 1, 0)) };
    }
    if (unit === "quarter") {
      const quarterStartMonth = Math.floor(month / 3) * 3;
      return { start: ymd(new Date(year, quarterStartMonth, 1)), end: ymd(new Date(year, quarterStartMonth + 3, 0)) };
    }
    if (unit === "year") {
      return { start: `${year}-01-01`, end: `${year}-12-31` };
    }
    return { start: dateStr, end: dateStr };
  }

  function monthBoundsForValue(value) {
    const text = String(value || "").trim();
    if (!/^\d{4}-\d{2}$/.test(text)) return null;
    const [year, month] = text.split("-").map(Number);
    return { start: `${text}-01`, end: ymd(new Date(year, month, 0)) };
  }

  function quarterKeyForDate(dateStr) {
    const d = new Date(dateStr + "T00:00:00");
    return `${d.getFullYear()}Q${Math.floor(d.getMonth() / 3) + 1}`;
  }

  function quarterBoundsForKey(key) {
    const match = String(key || "").match(/^(\d{4})Q([1-4])$/);
    if (!match) return null;
    const year = Number(match[1]);
    const quarter = Number(match[2]);
    const startMonth = (quarter - 1) * 3;
    return {
      start: ymd(new Date(year, startMonth, 1)),
      end: ymd(new Date(year, startMonth + 3, 0))
    };
  }

  function quarterLabel(key) {
    const match = String(key || "").match(/^(\d{4})Q([1-4])$/);
    return match ? `${match[1]}년 ${match[2]}/4분기` : key;
  }

  function capRangeToYesterday(range) {
    const yesterday = addDays(today(), -1);
    if (!range) return null;
    return { start: range.start, end: minDateStr(range.end, yesterday) };
  }

  function previousPeriodBounds(currentStart, currentEnd, unit) {
    const elapsedDays = rangeDays(currentStart, currentEnd);
    const previousFull = periodBoundsFor(addDays(currentStart, -1), unit);
    return {
      start: previousFull.start,
      end: minDateStr(addDays(previousFull.start, elapsedDays - 1), previousFull.end)
    };
  }

  function comparisonDetailUnit(comparisonUnit) {
    if (comparisonUnit === "month") return "week";
    return comparisonUnit === "quarter" || comparisonUnit === "year" ? "month" : "day";
  }

  function slotLabelForKey(key, unit) {
    const text = String(key || "");
    if (unit === "day" && /^\d{8}$/.test(text)) return `${Number(text.slice(4, 6))}.${Number(text.slice(6, 8))}`;
    if (unit === "week") return `W${text.slice(-2)}`;
    if (unit === "month" && /^\d{6}$/.test(text)) return `${Number(text.slice(4, 6))}월`;
    if (unit === "quarter") return text.replace("Q", "-Q");
    if (unit === "year") return text;
    return text;
  }

  function comparisonSlots(range, detailUnit) {
    const slots = [];
    const pushByCursor = stepFn => {
      const seen = new Set();
      for (let cursor = range.start; cursor <= range.end; cursor = stepFn(cursor)) {
        const key = periodKey(cursor, detailUnit);
        if (!seen.has(key)) {
          seen.add(key);
          slots.push({ key, label: slotLabelForKey(key, detailUnit) });
        }
      }
      return slots;
    };
    if (detailUnit === "day") {
      return pushByCursor(cursor => addDays(cursor, 1));
    }
    if (detailUnit === "week") {
      return pushByCursor(cursor => addDays(cursor, 7));
    }
    if (detailUnit === "month") {
      let cursor = range.start.slice(0, 8) + "01";
      const last = range.end.slice(0, 8) + "01";
      while (cursor <= last) {
        const key = periodKey(cursor, "month");
        slots.push({ key, label: slotLabelForKey(key, "month") });
        cursor = addMonths(cursor, 1).slice(0, 8) + "01";
      }
      return slots;
    }
    if (detailUnit === "quarter") {
      let cursor = periodBoundsFor(range.start, "quarter").start;
      const last = periodBoundsFor(range.end, "quarter").start;
      while (cursor <= last) {
        const key = periodKey(cursor, "quarter");
        slots.push({ key, label: slotLabelForKey(key, "quarter") });
        cursor = addMonths(cursor, 3);
      }
      return slots;
    }
    return pushByCursor(cursor => addMonths(cursor, 12));
  }

  function rowsForComparison(stats, range, detailUnit) {
    const byKey = new Map((stats?.trendStats || []).map(row => [String(row.key), row]));
    return comparisonSlots(range, detailUnit).map(slot => ({
      ...slot,
      ...(byKey.get(String(slot.key)) || {})
    }));
  }

  async function loadPeriodComparison(anchorEnd, docFilter, comparisonUnit, graphUnit = "day") {
    if (!["week", "month", "quarter", "year"].includes(comparisonUnit)) return null;
    let current = null;
    let previous = null;
    if (comparisonUnit === "month") {
      current = capRangeToYesterday(monthBoundsForValue($("comparisonCurrentMonth")?.value));
      previous = capRangeToYesterday(monthBoundsForValue($("comparisonPreviousMonth")?.value));
    } else if (comparisonUnit === "quarter") {
      current = capRangeToYesterday(quarterBoundsForKey($("comparisonCurrentQuarter")?.value));
      previous = capRangeToYesterday(quarterBoundsForKey($("comparisonPreviousQuarter")?.value));
    }
    if (!current || !previous) {
      const fullCurrent = periodBoundsFor(anchorEnd, comparisonUnit);
      current = { start: fullCurrent.start, end: minDateStr(anchorEnd, fullCurrent.end) };
      previous = previousPeriodBounds(current.start, current.end, comparisonUnit);
    }
    const detailUnit = graphUnit || comparisonDetailUnit(comparisonUnit);
    const loader = SERVER_MODE
      ? (from, to) => loadServerStats(from, to, docFilter, detailUnit)
      : (from, to) => computeStats(from, to, docFilter, detailUnit);
    const [currentStats, previousStats] = await Promise.all([
      loader(current.start, current.end),
      loader(previous.start, previous.end)
    ]);
    return { current, previous, currentStats, previousStats, detailUnit };
  }

  function visitsWithinDays(dates, startDate, days) {
    const endDate = addDays(startDate, days - 1);
    return dates.filter(d => d >= startDate && d <= endDate).length;
  }

  function hasFullFollowupWindow(firstDate, statsEndDate, days = 21) {
    return addDays(firstDate, days - 1) <= statsEndDate;
  }

  // ── 집계 ────────────────────────────────────────────────────────
  // docFilter: "" = 전체, 그 외에는 해당 원장이 본 진료만 집계
  function normalizeTreatmentStatName(name) {
    const text = String(name || "").trim();
    if (text === "추나" || text === "단추") return "단순추나";
    if (text === "복추") return "복잡추나";
    return text;
  }

  function isSimpleChunaTreatment(name) {
    const text = String(name || "").trim();
    return text === "추나" || text === "단추" || text === "단순추나";
  }

  function isComplexChunaTreatment(name) {
    const text = String(name || "").trim();
    return text === "복추" || text === "복잡추나";
  }

  function isPharmaTreatment(name) {
    return String(name || "").trim().includes("약침");
  }

  function packagePurchaseDatesInRange(record = {}, start = "", end = "") {
    const packages = record.packages && typeof record.packages === "object" ? record.packages : {};
    const dates = [];
    Object.entries(packages).forEach(([key, pkg]) => {
      if (!String(key || "").startsWith("p")) return;
      const purchases = Array.isArray(pkg?.purchases) ? pkg.purchases : [];
      purchases.forEach(entry => {
        const date = String(entry?.date || "").trim();
        const qty = Number(entry?.qty ?? entry?.totalQty ?? 0) || 0;
        if (qty > 0 && date >= start && date <= end) dates.push(date);
      });
    });
    return [...new Set(dates)];
  }

  function hasPackagePurchaseInRange(record = {}, start = "", end = "") {
    return packagePurchaseDatesInRange(record, start, end).length > 0;
  }

  function createStatsTrendBucket(key) {
    return {
      key,
      visits: 0,
      coreVisits: 0,
      newPatients: 0,
      followupEligibleNewPatients: 0,
      returningPatients: 0,
      thirdVisitPatients: 0,
      chunaTotal: 0,
      simpleChunaTotal: 0,
      complexChunaTotal: 0,
      pharmaTotal: 0,
      patientIds: new Set(),
      prescriptionPatientIds: new Set(),
      chunaPatientIds: new Set(),
      pharmaPatientIds: new Set(),
      pharmaPackagePurchasePatientIds: new Set(),
      dates: new Set(),
      clinicDates: new Set()
    };
  }

  function getStatsTrendBucket(trendBuckets, key) {
    if (!trendBuckets[key]) trendBuckets[key] = createStatsTrendBucket(key);
    return trendBuckets[key];
  }

  function computeStats(start, end, docFilter = "", chartUnit = "week") {
    const inRange = d => d >= start && d <= end;
    const patientSet = new Set();
    const prescriptionPatientSet = new Set();
    const newPatientSet = new Set();
    let visits = 0;
    let coreVisits = 0;
    let newPatients = 0;
    let followupEligibleNewPatients = 0;
    let returningPatients = 0;
    let thirdVisitPatients = 0;
    const treatmentCounts = {};
    let pharmaTotal = 0;       // 약침 합계 (약침1~4·L·자)
    let chunaTotal = 0;
    let simpleChunaTotal = 0;
    let complexChunaTotal = 0;
    const chunaPatientSet = new Set();
    const pharmaPatientSet = new Set();
    const pharmaPackagePurchasePatientSet = new Set();
    const clinicDateSet = new Set();
    const doctorCounts = {};
    const weekdayCounts = {};
    const weekdayDateSets = {};
    const treatmentComboCounts = {};
    const trendBuckets = {};

    for (const rec of allRecords) {
      const dates = visitDatesOf(rec);
      if (!dates.length) continue;
      const pid = String(rec.patientId || rec.chartNo || rec.name || Math.random());
      let matchedCore = false;

      for (const date of dates.filter(inRange)) {
        const entry = (rec.visitHistory || {})[date] || {};
        const doc = String(entry.doctorName || "").trim();
        if (docFilter && doc !== docFilter) continue;   // 원장 필터
        const isPrescription = isPrescriptionVisit(rec, date);
        visits += 1;
        const treatments = Array.isArray(entry.treatments) ? entry.treatments : [];
        const weekday = ["일", "월", "화", "수", "목", "금", "토"][new Date(date + "T00:00:00").getDay()];
        weekdayCounts[weekday] = (weekdayCounts[weekday] || 0) + 1;
        if (!weekdayDateSets[weekday]) weekdayDateSets[weekday] = new Set();
        weekdayDateSets[weekday].add(date);
        const key = periodKey(date, chartUnit);
        const trendBucket = getStatsTrendBucket(trendBuckets, key);
        trendBucket.visits += 1;
        trendBucket.dates.add(date);
        if (isPrescription) {
          prescriptionPatientSet.add(pid);
          trendBucket.prescriptionPatientIds.add(pid);
        } else {
          matchedCore = true;
          coreVisits += 1;
          clinicDateSet.add(date);
          trendBucket.coreVisits += 1;
          trendBucket.patientIds.add(pid);
          trendBucket.clinicDates.add(date);
        }
        let countedPharma = false;
        let countedChuna = false;
        let countedSimpleChuna = false;
        let countedComplexChuna = false;
        const comboParts = [];
        for (const tRaw of treatments) {
          const t = normalizeTreatmentStatName(tRaw);
          if (!t) continue;
          treatmentCounts[t] = (treatmentCounts[t] || 0) + 1;
          comboParts.push(t);
          if (!isPrescription && isSimpleChunaTreatment(t) && !countedSimpleChuna) {
            simpleChunaTotal += 1;
            trendBucket.simpleChunaTotal += 1;
            countedSimpleChuna = true;
          }
          if (!isPrescription && isComplexChunaTreatment(t) && !countedComplexChuna) {
            complexChunaTotal += 1;
            trendBucket.complexChunaTotal += 1;
            countedComplexChuna = true;
          }
          if (!isPrescription && (isSimpleChunaTreatment(t) || isComplexChunaTreatment(t)) && !countedChuna) {
            chunaTotal += 1;
            chunaPatientSet.add(pid);
            trendBucket.chunaTotal += 1;
            trendBucket.chunaPatientIds.add(pid);
            countedChuna = true;
          }
          if (isPharmaTreatment(t) && !countedPharma) {
            pharmaTotal += 1;
            trendBucket.pharmaTotal += 1;
            if (!isPrescription) {
              pharmaPatientSet.add(pid);
              trendBucket.pharmaPatientIds.add(pid);
            }
            countedPharma = true;
          }
        }
        const combo = [...new Set(comboParts)].sort((a, b) => a.localeCompare(b, "ko")).join(" + ");
        if (combo) treatmentComboCounts[combo] = (treatmentComboCounts[combo] || 0) + 1;
        if (doc) doctorCounts[doc] = (doctorCounts[doc] || 0) + 1;
      }

      if (matchedCore) patientSet.add(pid);
      const packagePurchaseDates = packagePurchaseDatesInRange(rec, start, end);
      if (packagePurchaseDates.length) pharmaPackagePurchasePatientSet.add(pid);
      packagePurchaseDates.forEach(date => {
        const key = periodKey(date, chartUnit);
        getStatsTrendBucket(trendBuckets, key).pharmaPackagePurchasePatientIds.add(pid);
      });

      // visitType이 있으면 해당 날짜의 초진 표시를 우선하고, 없던 과거 데이터만 첫 방문일을 초진으로 본다.
      for (const firstDate of newVisitDatesOf(rec)) {
        if (!inRange(firstDate) || isPrescriptionVisit(rec, firstDate)) continue;
        const firstDoc = String(getVisitRecord(rec, firstDate).doctorName || rec.doctorName || "").trim();
        if (docFilter && firstDoc !== docFilter) continue;
        newPatients += 1;
        newPatientSet.add(pid);
        const key = periodKey(firstDate, chartUnit);
        if (trendBuckets[key]) trendBuckets[key].newPatients += 1;
        const isFollowupEligible = hasFullFollowupWindow(firstDate, end, 21);
        const nonPrescriptionDates = nonPrescriptionVisitDatesOf(rec);
        const followupVisitCount = visitsWithinDays(nonPrescriptionDates, firstDate, 21);
        const isReturning = followupVisitCount >= 2;
        const isThirdVisit = followupVisitCount >= 3;
        if (trendBuckets[key]) {
          if (isReturning) trendBuckets[key].returningPatients += 1;
          if (isThirdVisit) trendBuckets[key].thirdVisitPatients += 1;
        }
        if (!isFollowupEligible) continue;
        followupEligibleNewPatients += 1;
        if (isReturning) returningPatients += 1;
        if (isThirdVisit) thirdVisitPatients += 1;
        if (trendBuckets[key]) trendBuckets[key].followupEligibleNewPatients += 1;
      }
    }

    Object.keys(weekdayCounts).forEach(day => {
      const clinicDays = Math.max(1, weekdayDateSets[day]?.size || 0);
      weekdayCounts[day] = weekdayCounts[day] / clinicDays;
    });

    const trendStats = Object.values(trendBuckets)
      .sort((a, b) => a.key.localeCompare(b.key))
      .map(w => {
        const clinicDays = Math.max(1, w.clinicDates.size || w.dates.size);
        const uniquePatients = w.patientIds.size;
        const chunaTypeTotal = w.simpleChunaTotal + w.complexChunaTotal;
        return {
          key: w.key,
          clinicDays,
          visits: w.visits,
          newPatients: w.newPatients,
          followupEligibleNewPatients: w.followupEligibleNewPatients,
          returningPatients: w.returningPatients,
          thirdVisitPatients: w.thirdVisitPatients,
          avgVisitsPerDay: w.coreVisits / clinicDays,
          avgNewPatientsPerDay: w.newPatients / clinicDays,
          avgPrescriptionPatientsPerDay: w.prescriptionPatientIds.size / clinicDays,
          avgChunaPerDay: w.chunaTotal / clinicDays,
          chunaPatientRate: uniquePatients ? w.chunaPatientIds.size / uniquePatients : 0,
          simpleChunaRate: chunaTypeTotal ? w.simpleChunaTotal / chunaTypeTotal : 0,
          complexChunaRate: chunaTypeTotal ? w.complexChunaTotal / chunaTypeTotal : 0,
          pharmaPatientRate: uniquePatients ? w.pharmaPatientIds.size / uniquePatients : 0,
          avgPharmaPatientsPerDay: w.pharmaTotal / clinicDays,
          avgPharmaPackagePurchasePatientsPerDay: w.pharmaPackagePurchasePatientIds.size / clinicDays,
          returnRate: w.newPatients ? w.returningPatients / w.newPatients : 0,
          thirdVisitRate: w.newPatients ? w.thirdVisitPatients / w.newPatients : 0
        };
      });
    const clinicDays = Math.max(1, clinicDateSet.size);
    const chunaPatientRate = patientSet.size ? chunaPatientSet.size / patientSet.size : 0;
    const chunaTypeTotal = simpleChunaTotal + complexChunaTotal;
    const simpleChunaRate = chunaTypeTotal ? simpleChunaTotal / chunaTypeTotal : 0;
    const complexChunaRate = chunaTypeTotal ? complexChunaTotal / chunaTypeTotal : 0;
    const pharmaPatientRate = patientSet.size ? pharmaPatientSet.size / patientSet.size : 0;

    return {
      uniquePatients: patientSet.size,
      totalPatients: patientSet.size + prescriptionPatientSet.size,
      visits,
      coreVisits,
      prescriptionPatients: prescriptionPatientSet.size,
      newPatients,
      followupEligibleNewPatients,
      revisitPatients: Math.max(0, patientSet.size - newPatientSet.size),
      returnRate: followupEligibleNewPatients ? returningPatients / followupEligibleNewPatients : 0,
      thirdVisitRate: followupEligibleNewPatients ? thirdVisitPatients / followupEligibleNewPatients : 0,
      avgVisitsPerPatient: patientSet.size ? coreVisits / patientSet.size : 0,
      pharmaTotal,
      chunaTotal,
      simpleChunaTotal,
      complexChunaTotal,
      chunaPatients: chunaPatientSet.size,
      chunaPatientRate,
      simpleChunaRate,
      complexChunaRate,
      pharmaPatients: pharmaPatientSet.size,
      pharmaPatientRate,
      avgChunaPerDay: chunaTotal / clinicDays,
      avgPharmaPatientsPerDay: pharmaTotal / clinicDays,
      pharmaPackagePurchasePatients: pharmaPackagePurchasePatientSet.size,
      clinicDays,
      treatmentCounts,
      doctorCounts,
      weekdayCounts,
      treatmentComboCounts,
      trendStats
    };
  }

  // 데이터에 등장하는 모든 원장 목록
  function collectDoctors() {
    const set = new Set();
    for (const rec of allRecords) {
      Object.values(rec.visitHistory || {}).forEach(e => {
        const d = String(e?.doctorName || "").trim();
        if (d) set.add(d);
      });
    }
    return [...set].sort((a, b) => a.localeCompare(b, "ko"));
  }

  function populateDoctorFilter() {
    const sel = $("doctorFilter");
    const prev = sel.value;
    const docs = collectDoctors();
    sel.innerHTML = `<option value="">전체</option>` + docs.map(d => `<option value="${escapeHtml(d)}">${escapeHtml(d)}</option>`).join("");
    if (docs.includes(prev)) sel.value = prev;
  }

  async function populateServerDoctorFilter() {
    const sel = $("doctorFilter");
    const prev = sel.value;
    const docs = await loadServerDoctors();
    sel.innerHTML = `<option value="">전체</option>` + docs.map(d => `<option value="${escapeHtml(d)}">${escapeHtml(d)}</option>`).join("");
    if (docs.includes(prev)) sel.value = prev;
  }

  // ── 렌더 ────────────────────────────────────────────────────────
  function renderSummary(s) {
    $("summaryMetrics").innerHTML = `
      <div class="metric"><div class="metric-label">총 진료 건수</div><div class="metric-value accent">${s.visits.toLocaleString()}</div><div class="metric-sub">약환 포함 연인원</div></div>
      <div class="metric"><div class="metric-label">총 환자 수</div><div class="metric-value">${s.totalPatients.toLocaleString()}</div><div class="metric-sub">진료 환자 수 + 약환</div></div>
