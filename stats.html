<title>경희홍익한의원 통계</title>
<style>
  :root {
    --bg: #07111f;
    --panel: #101b2d;
    --panel2: #16243a;
    --line: rgba(255,255,255,0.12);
    --text: #e7eef8;
    --muted: #9badbf;
    --accent: #39a9f5;
    --gold: #ffca6a;
    --green: #4ade80;
    --danger: #fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .app { width: min(1400px, 100%); margin: 0 auto; padding: 18px; }
  .topbar { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
  .brand { display: flex; align-items: center; gap: 10px; margin-right: 8px; }
  .brand-icon { width: 36px; height: 36px; object-fit: contain; flex-shrink: 0; }
  .brand-title { font-size: 20px; font-weight: 900; color: #fff; line-height: 1; white-space: nowrap; }
  .brand-highlight { color: var(--gold); }
  a.btn-link, button {
    border: 1px solid var(--line);
    background: var(--panel2);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 12px;
    font-weight: 900;
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
    font-family: inherit;
  }
  a.btn-link { color: var(--accent); }
  button:hover, a.btn-link:hover { border-color: var(--accent); }
  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .card-title { color: var(--gold); font-weight: 900; font-size: 14px; margin-bottom: 12px; }
  .controls { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
  .preset-btn.active { border-color: rgba(255,202,106,0.75); background: rgba(255,202,106,0.15); color: var(--gold); }
  .date-input { display: flex; align-items: center; gap: 6px; }
  input[type="date"], select {
    border: 1px solid var(--line);
    background: var(--panel2);
    color: var(--text);
    border-radius: 8px;
    padding: 7px 10px;
    font-family: inherit;
    font-size: 13px;
  }
  .field-label { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 12px; font-weight: 900; }
  select { font-weight: 800; }
  .range-label { color: var(--muted); font-size: 12px; font-weight: 800; margin-top: 10px; }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
  .metric {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 14px;
  }
  .metric-label { color: var(--muted); font-size: 12px; font-weight: 900; }
  .metric-value { color: var(--green); font-size: 28px; font-weight: 900; margin-top: 6px; }
  .metric-value.gold { color: var(--gold); }
  .metric-value.accent { color: var(--accent); }
  .metric-sub { color: var(--muted); font-size: 11px; font-weight: 700; margin-top: 2px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 860px) { .grid2 { grid-template-columns: 1fr; } }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--line); font-size: 13px; }
  th { color: var(--muted); font-size: 11px; font-weight: 900; }
  td.num, th.num { text-align: right; font-weight: 900; }
  tr.highlight td { color: var(--gold); }
  .bar-cell { width: 40%; }
  .bar { height: 8px; border-radius: 999px; background: rgba(57,169,245,0.5); }
  .bar.gold { background: rgba(255,202,106,0.6); }
  .empty { color: var(--muted); font-size: 13px; padding: 8px 2px; }
  .status { color: var(--gold); font-size: 12px; font-weight: 800; }
  .status.error { color: var(--danger); }
  .chart-wrap { overflow-x: auto; padding-bottom: 4px; }
  .weekly-chart { min-width: 720px; width: 100%; height: 340px; display: block; }
  .chart-axis, .chart-grid { stroke: rgba(255,255,255,0.16); stroke-width: 1; }
  .chart-grid { stroke-dasharray: 4 6; }
  .chart-text { fill: var(--muted); font-size: 11px; font-weight: 800; }
  .chart-line { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
  .chart-dot { stroke: var(--panel); stroke-width: 2; }
  .chart-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 10px; color: var(--muted); font-size: 12px; font-weight: 900; }
  .legend-item { display: inline-flex; align-items: center; gap: 6px; }
  .legend-swatch { width: 18px; height: 3px; border-radius: 999px; display: inline-block; }
  .chart-toggle-row { display: flex; flex-wrap: wrap; gap: 8px 12px; margin-top: 10px; }
  .chart-toggle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 900;
    user-select: none;
  }
  .chart-toggle input { accent-color: var(--accent); }
  .chart-toggle-swatch { width: 16px; height: 3px; border-radius: 999px; display: inline-block; }
  .wide-card { grid-column: 1 / -1; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <img class="brand-icon" src="assets/logo-icon.png" alt="경희홍익한의원 로고">
      <h1 class="brand-title"><span>경희</span><span class="brand-highlight">홍익</span><span>한의원</span> 통계</h1>
    </div>
    <a class="btn-link" href="db-viewer.html">DB</a>
  </div>

  <div class="card">
    <div class="card-title">기간 선택</div>
    <div class="controls" id="presetRow">
      <button class="preset-btn" data-preset="yesterday">어제</button>
      <button class="preset-btn" data-preset="7">최근 7일</button>
      <button class="preset-btn" data-preset="30">최근 30일</button>
      <button class="preset-btn" data-preset="90">최근 90일</button>
      <button class="preset-btn" data-preset="month">이번 달</button>
      <button class="preset-btn" data-preset="quarter">이번 분기</button>
      <button class="preset-btn" data-preset="year">올해</button>
      <span class="date-input">
        <input type="date" id="startDate">
        <span style="color:var(--muted)">~</span>
        <input type="date" id="endDate">
      </span>
      <button id="applyBtn" style="border-color:rgba(74,222,128,0.55);color:var(--green)">조회</button>
      <button id="reloadBtn">새로고침</button>
    </div>
    <div class="controls" style="margin-top:10px">
      <label class="field-label">원장
        <select id="doctorFilter"><option value="">전체</option></select>
      </label>
      <label class="field-label">그래프 단위
        <select id="chartUnit">
          <option value="day">일</option>
          <option value="week">주</option>
          <option value="month">월</option>
          <option value="quarter">분기</option>
          <option value="year">년</option>
        </select>
      </label>
      <button id="csvBtn" style="border-color:rgba(57,169,245,0.6);color:var(--accent)">CSV 다운로드</button>
      <span style="color:var(--muted);font-size:11px;font-weight:700">오늘은 집계에서 제외됩니다 (전일까지)</span>
    </div>
    <div class="range-label" id="rangeLabel"></div>
    <div class="status" id="status"></div>
  </div>

  <div class="card">
    <div class="card-title">요약</div>
    <div class="metrics" id="summaryMetrics"></div>
  </div>

  <div class="card">
    <div class="card-title">기간별 추이</div>
    <div class="chart-toggle-row" id="chartMetricToggles"></div>
    <div id="weeklyChartWrap"></div>
  </div>

  <div class="grid2">
    <div class="card">
      <div class="card-title">치료별 횟수</div>
      <div id="treatmentTableWrap"></div>
    </div>
    <div class="card">
      <div class="card-title">원장별 진료 건수</div>
      <div id="doctorTableWrap"></div>
    </div>
    <div class="card">
      <div class="card-title">요일별 진료 건수</div>
      <div id="weekdayTableWrap"></div>
    </div>
    <div class="card">
      <div class="card-title">치료조합 Top 10</div>
      <div id="comboTableWrap"></div>
    </div>
    <div class="card wide-card">
      <div class="card-title">20~7일 전 초진 후 미재방문</div>
      <div id="noFollowupTableWrap"></div>
    </div>
  </div>
</div>

<script>
  const DB_NAME = "patientChartDB";
  const STORE = "patients";
  const $ = id => document.getElementById(id);
  const SERVER_MODE = location.protocol === "http:" || location.protocol === "https:";

  let allRecords = [];
  const CHART_METRICS = [
    { key: "avgVisitsPerDay", label: "일평균 방문 진료 환자 수(약환 제외)", axis: "count", color: "#39a9f5", title: value => `방문 일평균 ${value.toFixed(1)}명` },
    { key: "avgNewPatientsPerDay", label: "일평균 초진", axis: "count", color: "#ffca6a", title: value => `초진 일평균 ${value.toFixed(1)}명` },
    { key: "avgPrescriptionPatientsPerDay", label: "일평균 약환", axis: "count", color: "#14b8a6", title: value => `약환 일평균 ${value.toFixed(1)}명` },
    { key: "returnRate", label: "재진율", axis: "rate", color: "#a78bfa", title: value => `재진율 ${(value * 100).toFixed(1)}%` },
    { key: "thirdVisitRate", label: "삼진율", axis: "rate", color: "#fb7185", title: value => `삼진율 ${(value * 100).toFixed(1)}%` }
  ];

  function getVisibleChartMetricKeys() {
    const inputs = [...document.querySelectorAll('.chart-metric-toggle')];
    if (!inputs.length) return CHART_METRICS.map(metric => metric.key);
    return inputs.filter(input => input.checked).map(input => input.value);
  }

  function renderChartMetricToggles() {
    const wrap = $("chartMetricToggles");
    if (!wrap) return;
    wrap.innerHTML = CHART_METRICS.map(metric => `
      <label class="chart-toggle">
        <input class="chart-metric-toggle" type="checkbox" value="${metric.key}" checked>
        <span class="chart-toggle-swatch" style="background:${metric.color}"></span>
        ${metric.label}
      </label>
    `).join("");
  }

  // ── IndexedDB 읽기 ──────────────────────────────────────────────
  function openDb() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
      req.onblocked = () => reject(new Error("IndexedDB 열기가 차단되었습니다."));
    });
  }
  async function loadRecords() {
    if (SERVER_MODE) {
      const res = await fetch("/api/patients", { cache: "no-store" });
      if (!res.ok) throw new Error(`서버 환자 목록 조회 실패 (${res.status})`);
      return await res.json();
    }
    const db = await openDb();
    if (!db.objectStoreNames.contains(STORE)) {
      db.close();
      throw new Error(`${DB_NAME} 안에 ${STORE} 스토어가 없습니다. (먼저 환자 데이터를 저장/가져오기 하세요)`);
    }
    try {
      return await new Promise((resolve, reject) => {
        const req = db.transaction(STORE, "readonly").objectStore(STORE).getAll();
        req.onsuccess = () => resolve(Array.isArray(req.result) ? req.result : []);
        req.onerror = () => reject(req.error);
      });
    } finally { db.close(); }
  }

  // ── 날짜 유틸 ───────────────────────────────────────────────────
  function ymd(date) {
    const d = new Date(date);
    const local = new Date(d.getTime() - d.getTimezoneOffset() * 60000);
    return local.toISOString().slice(0, 10);
  }
  const today = () => ymd(new Date());
  function addDays(dateStr, n) {
    const d = new Date(dateStr + "T00:00:00");
    d.setDate(d.getDate() + n);
    return ymd(d);
  }

  function visitDatesOf(rec) {
    const dates = Array.isArray(rec.visitDates) ? rec.visitDates.map(String) : [];
    Object.keys(rec.visitHistory || {}).forEach(d => dates.push(String(d)));
    return [...new Set(dates.filter(Boolean))].sort();
  }

  function isPrescriptionChiefComplaint(value) {
    const text = String(value || "").trim().replace(/\s+/g, "");
    return text === "처방" || text === "-처방-";
  }

  function isPrescriptionVisit(rec, date) {
    const history = rec.visitHistory || {};
    if (Object.prototype.hasOwnProperty.call(history, date)) {
      return isPrescriptionChiefComplaint(history[date]?.chiefComplaint);
    }
    return isPrescriptionChiefComplaint(rec.chiefComplaint);
  }

  function normalizeVisitType(value) {
    const text = String(value || "").trim().replace(/\s+/g, "");
    if (text.includes("초")) return "초진";
    if (text.includes("재")) return "재진";
    return "";
  }

  function getVisitRecord(rec, date) {
    return (rec.visitHistory || {})[date] || {};
  }

  function explicitNewVisitDatesOf(rec) {
    return visitDatesOf(rec).filter(date => normalizeVisitType(getVisitRecord(rec, date).visitType) === "초진");
  }

  function newVisitDatesOf(rec) {
    const explicitDates = explicitNewVisitDatesOf(rec);
    if (explicitDates.length) return explicitDates;
    const dates = visitDatesOf(rec);
    return dates.length ? [dates[0]] : [];
  }

  function nonPrescriptionVisitDatesOf(rec) {
    return visitDatesOf(rec).filter(date => !isPrescriptionVisit(rec, date));
  }

  function isoWeekKey(dateStr) {
    const d = new Date(dateStr + "T00:00:00");
    d.setHours(0, 0, 0, 0);
    d.setDate(d.getDate() + 3 - ((d.getDay() + 6) % 7));
    const weekYear = d.getFullYear();
    const week1 = new Date(weekYear, 0, 4);
    const weekNo = 1 + Math.round(((d - week1) / 86400000 - 3 + ((week1.getDay() + 6) % 7)) / 7);
    return `${weekYear}${String(weekNo).padStart(2, "0")}`;
  }

  function isoWeekRangeLabel(weekKey) {
    const match = String(weekKey || "").match(/^(\d{4})(\d{2})$/);
    if (!match) return "";
    const year = Number(match[1]);
    const week = Number(match[2]);
    const jan4 = new Date(year, 0, 4);
    const week1Monday = new Date(jan4);
    week1Monday.setDate(jan4.getDate() - ((jan4.getDay() + 6) % 7));
    const start = new Date(week1Monday);
    start.setDate(week1Monday.getDate() + (week - 1) * 7);
    const end = new Date(start);
    end.setDate(start.getDate() + 6);
    const startLabel = `${start.getMonth() + 1}.${start.getDate()}`;
    const endLabel = start.getMonth() === end.getMonth() ? String(end.getDate()) : `${end.getMonth() + 1}.${end.getDate()}`;
    return `(${startLabel}-${endLabel})`;
  }

  function periodKey(dateStr, unit = "week") {
    const d = new Date(dateStr + "T00:00:00");
    const year = d.getFullYear();
    const month = d.getMonth() + 1;
    if (unit === "day") return dateStr.replaceAll("-", "");
    if (unit === "month") return `${year}${String(month).padStart(2, "0")}`;
    if (unit === "quarter") return `${year}Q${Math.ceil(month / 3)}`;
    if (unit === "year") return String(year);
    return isoWeekKey(dateStr);
  }

  function rangeDays(start, end) {
    return Math.round((new Date(end + "T00:00:00") - new Date(start + "T00:00:00")) / 86400000) + 1;
  }

  function defaultChartUnit(start, end) {
    return rangeDays(start, end) <= 30 ? "day" : "week";
  }

  function visitsWithinDays(dates, startDate, days) {
    const endDate = addDays(startDate, days - 1);
    return dates.filter(d => d >= startDate && d <= endDate).length;
  }

  function noFollowupNewPatients(docFilter = "") {
    const todayStr = today();
    const targetDates = new Map(Array.from({ length: 14 }, (_, index) => 20 - index).map(daysAgo => [addDays(todayStr, -daysAgo), daysAgo]));
    const rows = [];
    for (const rec of allRecords) {
      const dates = visitDatesOf(rec).filter(d => d <= todayStr);
      if (!dates.length) continue;
      for (const firstDate of newVisitDatesOf(rec).filter(d => d <= todayStr)) {
        if (!targetDates.has(firstDate)) continue;
        const firstEntry = getVisitRecord(rec, firstDate);
        if (isPrescriptionVisit(rec, firstDate)) continue;
        const doctorName = String(firstEntry.doctorName || rec.doctorName || "").trim();
        if (docFilter && doctorName !== docFilter) continue;
        if (dates.some(d => d > firstDate && d <= todayStr)) continue;
        rows.push({
          chartNo: rec.chartNo || "",
          name: rec.name || "",
          firstDate,
          daysAgo: targetDates.get(firstDate),
          doctorName,
          age: rec.age || "",
          gender: rec.gender || "",
          phone: rec.phone || rec.phoneNumber || rec.tel || ""
        });
      }
    }
    return rows.sort((a, b) => b.daysAgo - a.daysAgo || String(a.chartNo).localeCompare(String(b.chartNo), "ko", { numeric: true }));
  }

  // ── 집계 ────────────────────────────────────────────────────────
  // docFilter: "" = 전체, 그 외에는 해당 원장이 본 진료만 집계
  function normalizeTreatmentStatName(name) {
    const text = String(name || "").trim();
    if (text === "추나" || text === "단추") return "단순추나";
    if (text === "복추") return "복잡추나";
    return text;
  }

  function computeStats(start, end, docFilter = "", chartUnit = "week") {
    const inRange = d => d >= start && d <= end;
    const patientSet = new Set();
    const prescriptionPatientSet = new Set();
    const newPatientSet = new Set();
    let visits = 0;
    let coreVisits = 0;
    let newPatients = 0;
    let returningPatients = 0;
    let thirdVisitPatients = 0;
    const treatmentCounts = {};
    let pharmaTotal = 0;       // 약침 합계 (약침1~4·L·자)
    const doctorCounts = {};
    const weekdayCounts = {};
    const treatmentComboCounts = {};
    const trendBuckets = {};

    for (const rec of allRecords) {
      const dates = visitDatesOf(rec);
      if (!dates.length) continue;
      const pid = String(rec.chartNo || rec.name || Math.random());
      let matchedCore = false;

      for (const date of dates.filter(inRange)) {
        const entry = (rec.visitHistory || {})[date] || {};
        const doc = String(entry.doctorName || "").trim();
        if (docFilter && doc !== docFilter) continue;   // 원장 필터
        const isPrescription = isPrescriptionVisit(rec, date);
        visits += 1;
        const treatments = Array.isArray(entry.treatments) ? entry.treatments : [];
        const weekday = ["일", "월", "화", "수", "목", "금", "토"][new Date(date + "T00:00:00").getDay()];
        weekdayCounts[weekday] = (weekdayCounts[weekday] || 0) + 1;
        const key = periodKey(date, chartUnit);
        if (!trendBuckets[key]) {
          trendBuckets[key] = { key, visits: 0, coreVisits: 0, newPatients: 0, returningPatients: 0, thirdVisitPatients: 0, patientIds: new Set(), prescriptionPatientIds: new Set(), dates: new Set() };
        }
        trendBuckets[key].visits += 1;
        trendBuckets[key].dates.add(date);
        if (isPrescription) {
          prescriptionPatientSet.add(pid);
          trendBuckets[key].prescriptionPatientIds.add(pid);
        } else {
          matchedCore = true;
          coreVisits += 1;
          trendBuckets[key].coreVisits += 1;
          trendBuckets[key].patientIds.add(pid);
        }
        let countedPharma = false;
        const comboParts = [];
        for (const tRaw of treatments) {
          const t = normalizeTreatmentStatName(tRaw);
          if (!t) continue;
          treatmentCounts[t] = (treatmentCounts[t] || 0) + 1;
          comboParts.push(t);
          if (t.includes("약침") && !countedPharma) { pharmaTotal += 1; countedPharma = true; }
        }
        const combo = [...new Set(comboParts)].sort((a, b) => a.localeCompare(b, "ko")).join(" + ");
        if (combo) treatmentComboCounts[combo] = (treatmentComboCounts[combo] || 0) + 1;
        if (doc) doctorCounts[doc] = (doctorCounts[doc] || 0) + 1;
      }

      if (matchedCore) patientSet.add(pid);

      // visitType이 있으면 해당 날짜의 초진 표시를 우선하고, 없던 과거 데이터만 첫 방문일을 초진으로 본다.
      for (const firstDate of newVisitDatesOf(rec)) {
        if (!inRange(firstDate) || isPrescriptionVisit(rec, firstDate)) continue;
        const firstDoc = String(getVisitRecord(rec, firstDate).doctorName || rec.doctorName || "").trim();
        if (docFilter && firstDoc !== docFilter) continue;
        newPatients += 1;
        newPatientSet.add(pid);
        const nonPrescriptionDates = nonPrescriptionVisitDatesOf(rec);
        const followupVisitCount = visitsWithinDays(nonPrescriptionDates, firstDate, 21);
        const isReturning = followupVisitCount >= 2;
        const isThirdVisit = followupVisitCount >= 3;
        if (isReturning) returningPatients += 1;
        if (isThirdVisit) thirdVisitPatients += 1;
        const key = periodKey(firstDate, chartUnit);
        if (trendBuckets[key]) {
          trendBuckets[key].newPatients += 1;
          if (isReturning) trendBuckets[key].returningPatients += 1;
          if (isThirdVisit) trendBuckets[key].thirdVisitPatients += 1;
        }
      }
    }

    const trendStats = Object.values(trendBuckets)
      .sort((a, b) => a.key.localeCompare(b.key))
      .map(w => {
        const clinicDays = Math.max(1, w.dates.size);
        const uniquePatients = w.patientIds.size;
        return {
          key: w.key,
          clinicDays,
          visits: w.visits,
          newPatients: w.newPatients,
          returningPatients: w.returningPatients,
          thirdVisitPatients: w.thirdVisitPatients,
          avgVisitsPerDay: w.coreVisits / clinicDays,
          avgNewPatientsPerDay: w.newPatients / clinicDays,
          avgPrescriptionPatientsPerDay: w.prescriptionPatientIds.size / clinicDays,
          returnRate: w.newPatients ? w.returningPatients / w.newPatients : 0,
          thirdVisitRate: w.newPatients ? w.thirdVisitPatients / w.newPatients : 0
        };
      });

    return {
      uniquePatients: patientSet.size,
      totalPatients: patientSet.size + prescriptionPatientSet.size,
      visits,
      coreVisits,
      prescriptionPatients: prescriptionPatientSet.size,
      newPatients,
      revisitPatients: Math.max(0, patientSet.size - newPatientSet.size),
      returnRate: newPatients ? returningPatients / newPatients : 0,
      thirdVisitRate: newPatients ? thirdVisitPatients / newPatients : 0,
      avgVisitsPerPatient: patientSet.size ? coreVisits / patientSet.size : 0,
      pharmaTotal,
      treatmentCounts,
      doctorCounts,
      weekdayCounts,
      treatmentComboCounts,
      trendStats
    };
  }

  // 데이터에 등장하는 모든 원장 목록
  function collectDoctors() {
    const set = new Set();
    for (const rec of allRecords) {
      Object.values(rec.visitHistory || {}).forEach(e => {
        const d = String(e?.doctorName || "").trim();
        if (d) set.add(d);
      });
    }
    return [...set].sort((a, b) => a.localeCompare(b, "ko"));
  }

  function populateDoctorFilter() {
    const sel = $("doctorFilter");
    const prev = sel.value;
    const docs = collectDoctors();
    sel.innerHTML = `<option value="">전체</option>` + docs.map(d => `<option value="${escapeHtml(d)}">${escapeHtml(d)}</option>`).join("");
    if (docs.includes(prev)) sel.value = prev;
  }

  // ── 렌더 ────────────────────────────────────────────────────────
  function renderSummary(s) {
    $("summaryMetrics").innerHTML = `
      <div class="metric"><div class="metric-label">총 진료 건수</div><div class="metric-value accent">${s.visits.toLocaleString()}</div><div class="metric-sub">약환 포함 연인원</div></div>
      <div class="metric"><div class="metric-label">총 환자 수</div><div class="metric-value">${s.totalPatients.toLocaleString()}</div><div class="metric-sub">진료 환자 수 + 약환</div></div>
      <div class="metric"><div class="metric-label">약환</div><div class="metric-value accent">${s.prescriptionPatients.toLocaleString()}</div><div class="metric-sub">주상병명 처방 실인원</div></div>
      <div class="metric"><div class="metric-label">진료 환자 수</div><div class="metric-value">${s.uniquePatients.toLocaleString()}</div><div class="metric-sub">약환 제외 실인원</div></div>
      <div class="metric"><div class="metric-label">초진(신환)</div><div class="metric-value gold">${s.newPatients.toLocaleString()}</div><div class="metric-sub">기간 내 초진 표시</div></div>
      <div class="metric"><div class="metric-label">재진 환자</div><div class="metric-value">${s.revisitPatients.toLocaleString()}</div><div class="metric-sub">초진 표시 제외 실환자</div></div>
      <div class="metric"><div class="metric-label">재진율</div><div class="metric-value accent">${(s.returnRate * 100).toFixed(1)}%</div><div class="metric-sub">초진 후 3주 내 2회 이상</div></div>
      <div class="metric"><div class="metric-label">삼진율</div><div class="metric-value">${(s.thirdVisitRate * 100).toFixed(1)}%</div><div class="metric-sub">초진 후 3주 내 3회 이상</div></div>
      <div class="metric"><div class="metric-label">평균 방문 횟수</div><div class="metric-value accent">${s.avgVisitsPerPatient.toFixed(2)}</div><div class="metric-sub">약환 제외 진료 ÷ 진료 환자 수</div></div>
      <div class="metric"><div class="metric-label">약침 합계</div><div class="metric-value gold">${s.pharmaTotal.toLocaleString()}</div><div class="metric-sub">약침1~4·L·자 (1회 진료=1)</div></div>
      <div class="metric"><div class="metric-label">단순추나</div><div class="metric-value">${(s.treatmentCounts["단순추나"] || 0).toLocaleString()}</div><div class="metric-sub">단추/기존 추나 시행 건수</div></div>
      <div class="metric"><div class="metric-label">복잡추나</div><div class="metric-value">${(s.treatmentCounts["복잡추나"] || 0).toLocaleString()}</div><div class="metric-sub">복추 시행 건수</div></div>
    `;
  }

  function renderCountTable(wrapId, counts, { gold = false, limit = 0, order = null } = {}) {
    const entries = order
      ? order.map(name => [name, counts[name] || 0]).filter(([, count]) => count > 0)
      : Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const rows = limit ? entries.slice(0, limit) : entries;
    const wrap = $(wrapId);
    if (!rows.length) { wrap.innerHTML = `<div class="empty">데이터 없음</div>`; return; }
    const max = rows[0][1] || 1;
    wrap.innerHTML = `
      <table>
        <thead><tr><th>항목</th><th class="num">건수</th><th class="bar-cell"></th></tr></thead>
        <tbody>
          ${rows.map(([name, count]) => `
            <tr${gold && name.includes("약침") ? ' class="highlight"' : ""}>
              <td>${escapeHtml(name)}</td>
              <td class="num">${count.toLocaleString()}</td>
              <td class="bar-cell"><div class="bar${gold && name.includes("약침") ? " gold" : ""}" style="width:${Math.round((count / max) * 100)}%"></div></td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;
  }

  function renderNoFollowupTable(rows) {
    const wrap = $("noFollowupTableWrap");
    if (!rows.length) {
      wrap.innerHTML = `<div class="empty">대상자 없음</div>`;
      return;
    }
    wrap.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>경과</th>
            <th>초진일</th>
            <th>차트번호</th>
            <th>이름</th>
            <th>정보</th>
            <th>원장</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(row => `
            <tr>
              <td class="num">${row.daysAgo}일 전</td>
              <td>${escapeHtml(row.firstDate)}</td>
              <td>${escapeHtml(row.chartNo || "-")}</td>
              <td>${escapeHtml(row.name || "-")}</td>
              <td>${escapeHtml([row.gender, row.age ? `${row.age}세` : ""].filter(Boolean).join(" · ") || "-")}</td>
              <td>${escapeHtml(row.doctorName || "-")}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;
  }

  function renderWeeklyChart(rows, chartUnit = "week") {
    const wrap = $("weeklyChartWrap");
    if (!rows.length) {
      wrap.innerHTML = `<div class="empty">데이터 없음</div>`;
      return;
    }

    const width = Math.max(720, rows.length * 78 + 120);
    const height = 340;
    const pad = { top: 24, right: 66, bottom: 58, left: 58 };
    const chartW = width - pad.left - pad.right;
    const chartH = height - pad.top - pad.bottom;
    const visibleMetricKeys = new Set(getVisibleChartMetricKeys());
    const visibleMetrics = CHART_METRICS.filter(metric => visibleMetricKeys.has(metric.key));
    if (!visibleMetrics.length) {
      wrap.innerHTML = `<div class="empty">표시할 그래프 항목을 선택하세요</div>`;
      return;
    }
    const countMetrics = visibleMetrics.filter(metric => metric.axis === "count");
    const rateMetrics = visibleMetrics.filter(metric => metric.axis === "rate");
    const maxCount = Math.max(1, ...rows.map(row => Math.max(0, ...countMetrics.map(metric => Number(row[metric.key] || 0)))));
    const countTop = Math.ceil(maxCount * 1.15);
    const maxRate = Math.max(0.1, ...rows.map(row => Math.max(0, ...rateMetrics.map(metric => Number(row[metric.key] || 0)))));
    const rateTop = Math.min(1, Math.max(0.1, Math.ceil(maxRate * 10) / 10));
    const x = idx => pad.left + (rows.length === 1 ? chartW / 2 : (chartW * idx) / (rows.length - 1));
    const yCount = value => pad.top + chartH - (value / countTop) * chartH;
    const yRate = value => pad.top + chartH - (value / rateTop) * chartH;
    const linePath = (yFn, key) => rows.map((r, idx) => `${idx ? "L" : "M"} ${x(idx).toFixed(1)} ${yFn(r[key]).toFixed(1)}`).join(" ");
    const countTicks = [0, 0.25, 0.5, 0.75, 1].map(p => countTop * p);
    const rateTicks = [0, 0.25, 0.5, 0.75, 1].map(p => rateTop * p);
    const unitLabel = { day: "일", week: "주차", month: "월", quarter: "분기", year: "년" }[chartUnit] || "기간";
    const xLabel = row => chartUnit === "week"
      ? `<text class="chart-text" x="${x(row.idx)}" y="${height - pad.bottom + 20}" text-anchor="middle">${row.key}</text><text class="chart-text" x="${x(row.idx)}" y="${height - pad.bottom + 36}" text-anchor="middle">${isoWeekRangeLabel(row.key)}</text>`
      : `<text class="chart-text" x="${x(row.idx)}" y="${height - pad.bottom + 22}" text-anchor="middle">${row.key}</text>`;

    wrap.innerHTML = `
      <div class="chart-wrap">
        <svg class="weekly-chart" viewBox="0 0 ${width} ${height}" role="img" aria-label="${unitLabel}별 추이 그래프">
          ${countTicks.map(t => {
            const y = yCount(t);
            return `
              <line class="chart-grid" x1="${pad.left}" y1="${y}" x2="${width - pad.right}" y2="${y}"></line>
              <text class="chart-text" x="${pad.left - 10}" y="${y + 4}" text-anchor="end">${t.toFixed(t < 10 ? 1 : 0)}</text>
            `;
          }).join("")}
          ${rateMetrics.length ? rateTicks.map(t => {
            const y = yRate(t);
            return `<text class="chart-text" x="${width - pad.right + 10}" y="${y + 4}">${Math.round(t * 100)}%</text>`;
          }).join("") : ""}
          <line class="chart-axis" x1="${pad.left}" y1="${pad.top}" x2="${pad.left}" y2="${height - pad.bottom}"></line>
          ${rateMetrics.length ? `<line class="chart-axis" x1="${width - pad.right}" y1="${pad.top}" x2="${width - pad.right}" y2="${height - pad.bottom}"></line>` : ""}
          <line class="chart-axis" x1="${pad.left}" y1="${height - pad.bottom}" x2="${width - pad.right}" y2="${height - pad.bottom}"></line>
          ${countMetrics.length ? `<text class="chart-text" x="${pad.left}" y="14">일평균 인원</text>` : ""}
          ${rateMetrics.length ? `<text class="chart-text" x="${width - pad.right}" y="14" text-anchor="end">비율</text>` : ""}
          ${visibleMetrics.map(metric => `<path class="chart-line" d="${linePath(metric.axis === "rate" ? yRate : yCount, metric.key)}" stroke="${metric.color}"></path>`).join("")}
          ${rows.map((r, idx) => `
            <g>
              ${visibleMetrics.map(metric => {
                const value = Number(r[metric.key] || 0);
                const y = metric.axis === "rate" ? yRate(value) : yCount(value);
                return `<circle class="chart-dot" cx="${x(idx)}" cy="${y}" r="4" fill="${metric.color}"><title>${r.key} ${metric.title(value)}</title></circle>`;
              }).join("")}
              ${xLabel({ ...r, idx })}
            </g>
          `).join("")}
        </svg>
      </div>
      <div class="chart-legend">
        ${visibleMetrics.map(metric => `<span class="legend-item"><span class="legend-swatch" style="background:${metric.color}"></span>${metric.label}</span>`).join("")}
      </div>
    `;
  }

  function escapeHtml(s) {
    return String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  function disableAutocomplete(root = document) {
    root.querySelectorAll?.("input, textarea, select").forEach(el => {
      el.setAttribute("autocomplete", "off");
      el.setAttribute("autocorrect", "off");
      el.setAttribute("autocapitalize", "off");
      el.setAttribute("spellcheck", "false");
    });
  }

  // ── 동작 ────────────────────────────────────────────────────────
  function setPresetActive(preset) {
    document.querySelectorAll(".preset-btn").forEach(b => b.classList.toggle("active", b.dataset.preset === preset));
  }

  function applyPreset(preset) {
    const y = addDays(today(), -1);  // 오늘 제외 → 어제까지
    const yDate = new Date(y + "T00:00:00");
    let start = y, end = y;
    if (preset === "yesterday") { start = end = y; }
    else if (preset === "7") { start = addDays(y, -6); end = y; }
    else if (preset === "30") { start = addDays(y, -29); end = y; }
    else if (preset === "90") { start = addDays(y, -89); end = y; }
    else if (preset === "month") { start = y.slice(0, 8) + "01"; end = y; }
    else if (preset === "quarter") {
      const quarterStartMonth = Math.floor(yDate.getMonth() / 3) * 3;
      start = ymd(new Date(yDate.getFullYear(), quarterStartMonth, 1));
      end = y;
    }
    else if (preset === "year") { start = `${y.slice(0, 4)}-01-01`; end = y; }
    $("startDate").value = start;
    $("endDate").value = end;
    chartUnitTouched = false;
    setPresetActive(preset);
    run();
  }

  let lastResult = null;  // CSV용 마지막 집계 결과
  let chartUnitTouched = false;

  function run() {
    let start = $("startDate").value;
    let end = $("endDate").value;
    if (!start || !end) { $("status").textContent = "시작일과 종료일을 선택하세요."; return; }
    if (start > end) { [start, end] = [end, start]; $("startDate").value = start; $("endDate").value = end; }
    const docFilter = $("doctorFilter").value;
    const docLabel = docFilter || "전체";
    if (!chartUnitTouched) $("chartUnit").value = defaultChartUnit(start, end);
    const chartUnit = $("chartUnit").value || "week";
    const unitLabel = { day: "일", week: "주", month: "월", quarter: "분기", year: "년" }[chartUnit] || "주";
    $("rangeLabel").textContent = `조회 기간: ${start} ~ ${end} · 원장: ${docLabel} · 그래프: ${unitLabel} 단위 (전체 ${allRecords.length.toLocaleString()}명 환자 기준)`;
    $("status").textContent = "";
    const s = computeStats(start, end, docFilter, chartUnit);
    renderSummary(s);
    renderWeeklyChart(s.trendStats, chartUnit);
    renderCountTable("treatmentTableWrap", s.treatmentCounts, { gold: true });
    renderCountTable("doctorTableWrap", s.doctorCounts);
    renderCountTable("weekdayTableWrap", s.weekdayCounts, { order: ["월", "화", "수", "목", "금", "토", "일"] });
    renderCountTable("comboTableWrap", s.treatmentComboCounts, { gold: true, limit: 10 });
    renderNoFollowupTable(noFollowupNewPatients(docFilter));
    lastResult = { start, end, docLabel, chartUnit, stats: s };
  }

  // ── CSV 다운로드 ────────────────────────────────────────────────
  function csvEscape(v) {
    const s = String(v ?? "");
    return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  }
  function downloadCsv() {
    if (!lastResult) { $("status").textContent = "먼저 조회를 실행하세요."; return; }
    const { start, end, docLabel, chartUnit, stats } = lastResult;
    const trendLabel = { day: "일별", week: "주차별", month: "월별", quarter: "분기별", year: "연도별" }[chartUnit] || "기간별";
    const lines = [];
    lines.push(["구분", "항목", "값"].map(csvEscape).join(","));
    lines.push(["기간", "시작", start].map(csvEscape).join(","));
    lines.push(["기간", "종료", end].map(csvEscape).join(","));
    lines.push(["기간", "원장", docLabel].map(csvEscape).join(","));
    lines.push(["요약", "총 진료 건수", stats.visits].map(csvEscape).join(","));
    lines.push(["요약", "총 환자 수", stats.totalPatients].map(csvEscape).join(","));
    lines.push(["요약", "약환", stats.prescriptionPatients].map(csvEscape).join(","));
    lines.push(["요약", "진료 환자 수", stats.uniquePatients].map(csvEscape).join(","));
    lines.push(["요약", "초진(신환)", stats.newPatients].map(csvEscape).join(","));
    lines.push(["요약", "재진 환자", stats.revisitPatients].map(csvEscape).join(","));
    lines.push(["요약", "재진율", `${(stats.returnRate * 100).toFixed(1)}%`].map(csvEscape).join(","));
    lines.push(["요약", "삼진율", `${(stats.thirdVisitRate * 100).toFixed(1)}%`].map(csvEscape).join(","));
    lines.push(["요약", "평균 방문 횟수", stats.avgVisitsPerPatient.toFixed(2)].map(csvEscape).join(","));
    lines.push(["요약", "약침 합계", stats.pharmaTotal].map(csvEscape).join(","));
    stats.trendStats.forEach(row => {
      lines.push([trendLabel, `${row.key} 일평균 방문 진료 환자 수(약환 제외)`, row.avgVisitsPerDay.toFixed(2)].map(csvEscape).join(","));
      lines.push([trendLabel, `${row.key} 일평균 초진`, row.avgNewPatientsPerDay.toFixed(2)].map(csvEscape).join(","));
      lines.push([trendLabel, `${row.key} 일평균 약환`, row.avgPrescriptionPatientsPerDay.toFixed(2)].map(csvEscape).join(","));
      lines.push([trendLabel, `${row.key} 재진율`, `${(row.returnRate * 100).toFixed(1)}%`].map(csvEscape).join(","));
      lines.push([trendLabel, `${row.key} 삼진율`, `${(row.thirdVisitRate * 100).toFixed(1)}%`].map(csvEscape).join(","));
    });
    Object.entries(stats.treatmentCounts).sort((a, b) => b[1] - a[1])
      .forEach(([name, c]) => lines.push(["치료별", name, c].map(csvEscape).join(",")));
    Object.entries(stats.doctorCounts).sort((a, b) => b[1] - a[1])
      .forEach(([name, c]) => lines.push(["원장별", name, c].map(csvEscape).join(",")));
    ["월", "화", "수", "목", "금", "토", "일"]
      .filter(day => stats.weekdayCounts[day])
      .forEach(day => lines.push(["요일별", day, stats.weekdayCounts[day]].map(csvEscape).join(",")));
    Object.entries(stats.treatmentComboCounts).sort((a, b) => b[1] - a[1]).slice(0, 10)
      .forEach(([name, c]) => lines.push(["치료조합 Top 10", name, c].map(csvEscape).join(",")));
    const csv = "﻿" + lines.join("\r\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `진료통계_${start}_${end}_${docLabel}.csv`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }

  async function reload() {
    $("status").textContent = "DB 읽는 중...";
    try {
      allRecords = await loadRecords();
      populateDoctorFilter();
      $("status").textContent = "";
      run();
    } catch (e) {
      allRecords = [];
      $("status").textContent = "오류: " + (e?.message || e);
      $("status").classList.add("error");
    }
  }

  document.querySelectorAll(".preset-btn").forEach(b => b.addEventListener("click", () => applyPreset(b.dataset.preset)));
  $("applyBtn").addEventListener("click", () => { chartUnitTouched = false; setPresetActive(""); run(); });
  $("reloadBtn").addEventListener("click", reload);
  $("doctorFilter").addEventListener("change", run);
  $("chartUnit").addEventListener("change", () => { chartUnitTouched = true; run(); });
  $("csvBtn").addEventListener("click", downloadCsv);
  renderChartMetricToggles();
  disableAutocomplete();
  $("chartMetricToggles").addEventListener("change", event => {
    if (!event.target?.classList?.contains("chart-metric-toggle")) return;
    if (lastResult) renderWeeklyChart(lastResult.stats.trendStats, lastResult.chartUnit);
  });

  // 초기: 어제 기준으로 로드
  (async () => {
    await reload();
    applyPreset("yesterday");
  })();
</script>
</body>
