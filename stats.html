      <div class="metric"><div class="metric-label">약침환자 비율</div><div class="metric-value gold">${(Number(s.pharmaPatientRate || 0) * 100).toFixed(1)}%</div><div class="metric-sub">${Number(s.pharmaPatients || 0).toLocaleString()}명 / 진료 환자 수</div></div>
      <div class="metric"><div class="metric-label">일평균 약침환자수</div><div class="metric-value accent">${Number(s.avgPharmaPatientsPerDay || 0).toFixed(1)}</div><div class="metric-sub">약침 진료 건수 ÷ 진료일</div></div>
      <div class="metric"><div class="metric-label">약침패키지 결제 환자수</div><div class="metric-value">${Number(s.pharmaPackagePurchasePatients || 0).toLocaleString()}</div><div class="metric-sub">기간 내 패키지 구매 기록</div></div>
    `;
  }

  function formatStatValue(value, decimals = 0) {
    const number = Number(value || 0);
    return decimals > 0
      ? number.toLocaleString(undefined, { minimumFractionDigits: decimals, maximumFractionDigits: decimals })
      : number.toLocaleString();
  }

  function renderCountTable(wrapId, counts, { gold = false, limit = 0, order = null, valueHeader = "건수", decimals = 0 } = {}) {
    const entries = order
      ? order.map(name => [name, counts[name] || 0]).filter(([, count]) => count > 0)
      : Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const rows = limit ? entries.slice(0, limit) : entries;
    const wrap = $(wrapId);
    if (!rows.length) { wrap.innerHTML = `<div class="empty">데이터 없음</div>`; return; }
    const max = Math.max(1, ...rows.map(([, count]) => Number(count) || 0));
    wrap.innerHTML = `
      <table>
        <thead><tr><th>항목</th><th class="num">${valueHeader}</th><th class="bar-cell"></th></tr></thead>
        <tbody>
          ${rows.map(([name, count]) => `
            <tr${gold && name.includes("약침") ? ' class="highlight"' : ""}>
              <td>${escapeHtml(name)}</td>
              <td class="num">${formatStatValue(count, decimals)}</td>
              <td class="bar-cell"><div class="bar${gold && name.includes("약침") ? " gold" : ""}" style="width:${Math.round((count / max) * 100)}%"></div></td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;
  }

  function chartMetricValue(row, metric) {
    return Number(row?.[metric.key] || 0);
  }

  function chartLinePath(rows, metric, yFn, xFn) {
    let drawing = false;
    return rows.map((row, idx) => {
      const value = chartMetricValue(row, metric);
      if (value === null) {
        drawing = false;
        return "";
      }
      const command = drawing ? "L" : "M";
      drawing = true;
      return `${command} ${xFn(idx).toFixed(1)} ${yFn(value).toFixed(1)}`;
    }).filter(Boolean).join(" ");
  }

  function renderWeeklyChart(rows, chartUnit = "week") {
    const wrap = $("weeklyChartWrap");
    if (!rows.length) {
      wrap.innerHTML = `<div class="empty">데이터 없음</div>`;
      return;
    }

    const width = Math.max(720, rows.length * 78 + 120);
    const height = 340;
    const pad = { top: 24, right: 66, bottom: 58, left: 58 };
    const chartW = width - pad.left - pad.right;
    const chartH = height - pad.top - pad.bottom;
    const visibleMetricKeys = new Set(getVisibleChartMetricKeys());
    const visibleMetrics = CHART_METRICS.filter(metric => visibleMetricKeys.has(metric.key));
    if (!visibleMetrics.length) {
      wrap.innerHTML = `<div class="empty">표시할 그래프 항목을 선택하세요</div>`;
      return;
    }
    const countMetrics = visibleMetrics.filter(metric => metric.axis === "count");
    const rateMetrics = visibleMetrics.filter(metric => metric.axis === "rate");
    const maxCount = Math.max(1, ...rows.map(row => Math.max(0, ...countMetrics.map(metric => Number(row[metric.key] || 0)))));
    const countTop = Math.ceil(maxCount * 1.15);
    const maxRate = Math.max(0.1, ...rows.map(row => Math.max(0, ...rateMetrics.map(metric => chartMetricValue(row, metric) ?? 0))));
    const rateTop = Math.min(1, Math.max(0.1, Math.ceil(maxRate * 10) / 10));
    const x = idx => pad.left + (rows.length === 1 ? chartW / 2 : (chartW * idx) / (rows.length - 1));
    const yCount = value => pad.top + chartH - (value / countTop) * chartH;
    const yRate = value => pad.top + chartH - (value / rateTop) * chartH;
    const countTicks = [0, 0.25, 0.5, 0.75, 1].map(p => countTop * p);
    const rateTicks = [0, 0.25, 0.5, 0.75, 1].map(p => rateTop * p);
    const unitLabel = { day: "일", week: "주차", month: "월", quarter: "분기", year: "년" }[chartUnit] || "기간";
    const xLabel = row => chartUnit === "week"
      ? `<text class="chart-text" x="${x(row.idx)}" y="${height - pad.bottom + 20}" text-anchor="middle">${row.key}</text><text class="chart-text" x="${x(row.idx)}" y="${height - pad.bottom + 36}" text-anchor="middle">${isoWeekRangeLabel(row.key)}</text>`
      : `<text class="chart-text" x="${x(row.idx)}" y="${height - pad.bottom + 22}" text-anchor="middle">${row.key}</text>`;

    wrap.innerHTML = `
      <div class="chart-wrap">
        <svg class="weekly-chart" viewBox="0 0 ${width} ${height}" role="img" aria-label="${unitLabel}별 추이 그래프">
          ${countTicks.map(t => {
            const y = yCount(t);
            return `
              <line class="chart-grid" x1="${pad.left}" y1="${y}" x2="${width - pad.right}" y2="${y}"></line>
              <text class="chart-text" x="${pad.left - 10}" y="${y + 4}" text-anchor="end">${t.toFixed(t < 10 ? 1 : 0)}</text>
            `;
          }).join("")}
          ${rateMetrics.length ? rateTicks.map(t => {
            const y = yRate(t);
            return `<text class="chart-text" x="${width - pad.right + 10}" y="${y + 4}">${Math.round(t * 100)}%</text>`;
          }).join("") : ""}
          <line class="chart-axis" x1="${pad.left}" y1="${pad.top}" x2="${pad.left}" y2="${height - pad.bottom}"></line>
          ${rateMetrics.length ? `<line class="chart-axis" x1="${width - pad.right}" y1="${pad.top}" x2="${width - pad.right}" y2="${height - pad.bottom}"></line>` : ""}
          <line class="chart-axis" x1="${pad.left}" y1="${height - pad.bottom}" x2="${width - pad.right}" y2="${height - pad.bottom}"></line>
          ${countMetrics.length ? `<text class="chart-text" x="${pad.left}" y="14">일평균 인원</text>` : ""}
          ${rateMetrics.length ? `<text class="chart-text" x="${width - pad.right}" y="14" text-anchor="end">비율</text>` : ""}
          ${visibleMetrics.map(metric => `<path class="chart-line" d="${chartLinePath(rows, metric, metric.axis === "rate" ? yRate : yCount, x)}" stroke="${metric.color}"></path>`).join("")}
          ${rows.map((r, idx) => `
            <g>
              ${visibleMetrics.map(metric => {
                const value = chartMetricValue(r, metric);
                if (value === null) return "";
                const y = metric.axis === "rate" ? yRate(value) : yCount(value);
                return `<circle class="chart-dot" cx="${x(idx)}" cy="${y}" r="4" fill="${metric.color}"><title>${r.key} ${metric.title(value)}</title></circle>`;
              }).join("")}
              ${xLabel({ ...r, idx })}
            </g>
          `).join("")}
        </svg>
      </div>
      <div class="chart-legend">
        ${visibleMetrics.map(metric => `<span class="legend-item"><span class="legend-swatch" style="background:${metric.color}"></span>${metric.label}</span>`).join("")}
      </div>
    `;
  }

  function renderPeriodComparisonChart(comparison, chartUnit = "week") {
    const wrap = $("periodComparisonChartWrap");
    const label = $("periodComparisonLabel");
    if (!wrap) return;
    if (!comparison) {
      if (label) label.textContent = "주, 월, 분기, 년 단위에서 표시됩니다.";
      wrap.innerHTML = `<div class="empty">비교할 기간 단위를 선택하세요.</div>`;
      return;
    }

    const unitName = { week: "주", month: "월", quarter: "분기", year: "년" }[chartUnit] || "기간";
    if (label) {
      label.textContent = `현재 ${unitName} ${comparison.current.start} ~ ${comparison.current.end} / 이전 ${unitName} ${comparison.previous.start} ~ ${comparison.previous.end}`;
    }

    const currentRows = rowsForComparison(comparison.currentStats, comparison.current, comparison.detailUnit);
    const previousRows = rowsForComparison(comparison.previousStats, comparison.previous, comparison.detailUnit);
    const rowCount = Math.max(currentRows.length, previousRows.length);
    if (!rowCount) {
      wrap.innerHTML = `<div class="empty">데이터 없음</div>`;
      return;
    }

    const visibleMetricKeys = new Set(getVisibleChartMetricKeys("periodComparisonMetricToggles", ".comparison-chart-metric-chip"));
    const visibleMetrics = CHART_METRICS.filter(metric => visibleMetricKeys.has(metric.key));
    if (!visibleMetrics.length) {
      wrap.innerHTML = `<div class="empty">표시할 그래프 항목을 선택하세요.</div>`;
      return;
    }

    const width = Math.max(720, rowCount * 72 + 120);
    const height = 340;
    const pad = { top: 24, right: 66, bottom: 54, left: 58 };
    const chartW = width - pad.left - pad.right;
    const chartH = height - pad.top - pad.bottom;
    const countMetrics = visibleMetrics.filter(metric => metric.axis === "count");
    const rateMetrics = visibleMetrics.filter(metric => metric.axis === "rate");
    const allRows = [...currentRows, ...previousRows];
    const maxCount = Math.max(1, ...allRows.map(row => Math.max(0, ...countMetrics.map(metric => Number(row[metric.key] || 0)))));
    const countTop = Math.ceil(maxCount * 1.15);
    const maxRate = Math.max(0.1, ...allRows.map(row => Math.max(0, ...rateMetrics.map(metric => chartMetricValue(row, metric) ?? 0))));
    const rateTop = Math.min(1, Math.max(0.1, Math.ceil(maxRate * 10) / 10));
    const x = idx => pad.left + (rowCount === 1 ? chartW / 2 : (chartW * idx) / (rowCount - 1));
    const yCount = value => pad.top + chartH - (value / countTop) * chartH;
    const yRate = value => pad.top + chartH - (value / rateTop) * chartH;
    const pathFor = (rows, metric) => chartLinePath(rows, metric, metric.axis === "rate" ? yRate : yCount, x);
    const countTicks = [0, 0.25, 0.5, 0.75, 1].map(p => countTop * p);
    const rateTicks = [0, 0.25, 0.5, 0.75, 1].map(p => rateTop * p);
    const labels = Array.from({ length: rowCount }, (_, idx) => currentRows[idx]?.label || previousRows[idx]?.label || String(idx + 1));

    wrap.innerHTML = `
      <div class="chart-wrap">
        <svg class="weekly-chart" viewBox="0 0 ${width} ${height}" role="img" aria-label="${unitName} 비교 그래프">
          ${countTicks.map(t => {
            const y = yCount(t);
            return `
              <line class="chart-grid" x1="${pad.left}" y1="${y}" x2="${width - pad.right}" y2="${y}"></line>
              <text class="chart-text" x="${pad.left - 10}" y="${y + 4}" text-anchor="end">${t.toFixed(t < 10 ? 1 : 0)}</text>
            `;
          }).join("")}
          ${rateMetrics.length ? rateTicks.map(t => {
            const y = yRate(t);
            return `<text class="chart-text" x="${width - pad.right + 10}" y="${y + 4}">${Math.round(t * 100)}%</text>`;
          }).join("") : ""}
          <line class="chart-axis" x1="${pad.left}" y1="${pad.top}" x2="${pad.left}" y2="${height - pad.bottom}"></line>
          ${rateMetrics.length ? `<line class="chart-axis" x1="${width - pad.right}" y1="${pad.top}" x2="${width - pad.right}" y2="${height - pad.bottom}"></line>` : ""}
          <line class="chart-axis" x1="${pad.left}" y1="${height - pad.bottom}" x2="${width - pad.right}" y2="${height - pad.bottom}"></line>
          ${countMetrics.length ? `<text class="chart-text" x="${pad.left}" y="14">인원</text>` : ""}
          ${rateMetrics.length ? `<text class="chart-text" x="${width - pad.right}" y="14" text-anchor="end">비율</text>` : ""}
          ${visibleMetrics.map(metric => `
            <path class="chart-line" d="${pathFor(currentRows, metric)}" stroke="${metric.color}"></path>
            <path class="chart-line comparison-line-prev" d="${pathFor(previousRows, metric)}" stroke="${metric.color}"></path>
          `).join("")}
          ${Array.from({ length: rowCount }, (_, idx) => `
            <g>
              ${visibleMetrics.map(metric => {
                const currentValue = chartMetricValue(currentRows[idx], metric);
                const previousValue = chartMetricValue(previousRows[idx], metric);
                const currentY = currentValue === null ? null : (metric.axis === "rate" ? yRate(currentValue) : yCount(currentValue));
                const previousY = previousValue === null ? null : (metric.axis === "rate" ? yRate(previousValue) : yCount(previousValue));
                const currentLabel = currentRows[idx]?.label || labels[idx];
                const previousLabel = previousRows[idx]?.label || labels[idx];
                return `
                  ${currentValue === null ? "" : `<circle class="chart-dot" cx="${x(idx)}" cy="${currentY}" r="4" fill="${metric.color}"><title>현재 ${currentLabel} ${metric.title(currentValue)}</title></circle>`}
                  ${previousValue === null ? "" : `<circle class="chart-dot comparison-dot-prev" cx="${x(idx)}" cy="${previousY}" r="3.5" stroke="${metric.color}"><title>이전 ${previousLabel} ${metric.title(previousValue)}</title></circle>`}
                `;
              }).join("")}
              <text class="chart-text" x="${x(idx)}" y="${height - pad.bottom + 22}" text-anchor="middle">${labels[idx]}</text>
            </g>
          `).join("")}
        </svg>
      </div>
      <div class="chart-legend">
        <span class="legend-item"><span class="legend-swatch" style="background:var(--green)"></span>현재 기간 실선</span>
        <span class="legend-item"><span class="legend-swatch" style="background:var(--muted)"></span>이전 기간 점선</span>
        ${visibleMetrics.map(metric => `<span class="legend-item"><span class="legend-swatch" style="background:${metric.color}"></span>${metric.label}</span>`).join("")}
      </div>
    `;
  }

  function escapeHtml(s) {
    return String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  function disableAutocomplete(root = document) {
    root.querySelectorAll?.("input, textarea, select").forEach(el => {
      el.setAttribute("autocomplete", "off");
      el.setAttribute("autocorrect", "off");
      el.setAttribute("autocapitalize", "off");
      el.setAttribute("spellcheck", "false");
    });
  }

  // ── 동작 ────────────────────────────────────────────────────────
  function setPresetActive(preset) {
    document.querySelectorAll(".preset-btn").forEach(b => b.classList.toggle("active", b.dataset.preset === preset));
  }

  function setComparisonUnit(unit) {
    comparisonUnit = unit;
    document.querySelectorAll(".comparison-unit-btn").forEach(button => {
      button.classList.toggle("active", button.dataset.comparisonUnit === unit);
    });
    $("comparisonMonthControls")?.classList.toggle("hidden", unit !== "month");
    $("comparisonQuarterControls")?.classList.toggle("hidden", unit !== "quarter");
  }

  function setComparisonGraphUnit(unit) {
    comparisonGraphUnit = unit || comparisonDetailUnit(comparisonUnit);
    if ($("comparisonGraphUnit")) $("comparisonGraphUnit").value = comparisonGraphUnit;
  }

  function fillQuarterOptions(anchorEnd) {
    const currentYear = new Date((anchorEnd || today()) + "T00:00:00").getFullYear();
    const options = [];
    for (let year = currentYear - 5; year <= currentYear + 1; year += 1) {
      for (let quarter = 1; quarter <= 4; quarter += 1) {
        const key = `${year}Q${quarter}`;
        options.push(`<option value="${key}">${quarterLabel(key)}</option>`);
      }
    }
    ["comparisonPreviousQuarter", "comparisonCurrentQuarter"].forEach(id => {
      const select = $(id);
      if (select && !select.options.length) select.innerHTML = options.join("");
    });
  }

  function setComparisonPeriodDefaults(anchorEnd, force = false) {
    const anchor = anchorEnd || addDays(today(), -1);
    const currentMonth = anchor.slice(0, 7);
    const previousMonth = addMonths(`${currentMonth}-01`, -1).slice(0, 7);
    if ($("comparisonCurrentMonth") && (force || !$("comparisonCurrentMonth").value)) $("comparisonCurrentMonth").value = currentMonth;
    if ($("comparisonPreviousMonth") && (force || !$("comparisonPreviousMonth").value)) $("comparisonPreviousMonth").value = previousMonth;

    fillQuarterOptions(anchor);
    const currentQuarter = quarterKeyForDate(anchor);
    const previousQuarter = quarterKeyForDate(addDays(periodBoundsFor(anchor, "quarter").start, -1));
    if ($("comparisonCurrentQuarter") && (force || !$("comparisonCurrentQuarter").value)) $("comparisonCurrentQuarter").value = currentQuarter;
    if ($("comparisonPreviousQuarter") && (force || !$("comparisonPreviousQuarter").value)) $("comparisonPreviousQuarter").value = previousQuarter;
  }

  function presetChartUnit(preset) {
    if (preset === "7") return "day";
    if (preset === "30" || preset === "90") return "week";
    if (preset === "180" || preset === "year") return "month";
    if (preset === "all") return "year";
    return "week";
  }

  function presetComparisonUnit(preset) {
    if (preset === "7") return "week";
    if (preset === "30" || preset === "90") return "month";
    if (preset === "180") return "quarter";
    if (preset === "year" || preset === "all") return "year";
    return "week";
  }

  async function allVisitDateRange(fallbackEnd) {
    const records = SERVER_MODE ? await loadRecords() : allRecords;
    const dates = [];
    records.forEach(record => {
      visitDatesOf(record).forEach(date => {
        if (date <= fallbackEnd) dates.push(date);
      });
    });
    const uniqueDates = [...new Set(dates)].sort();
    return {
      start: uniqueDates[0] || fallbackEnd,
      end: uniqueDates[uniqueDates.length - 1] || fallbackEnd
    };
  }

  async function applyPreset(preset) {
    const y = addDays(today(), -1);  // 오늘 제외 → 어제까지
    const yDate = new Date(y + "T00:00:00");
    let start = y, end = y;
    if (preset === "7") { start = addDays(y, -6); end = y; }
    else if (preset === "30") { start = addDays(y, -29); end = y; }
    else if (preset === "90") { start = addDays(y, -89); end = y; }
    else if (preset === "180") { start = addDays(y, -179); end = y; }
    else if (preset === "year") { start = `${y.slice(0, 4)}-01-01`; end = y; }
    else if (preset === "all") {
      $("status").textContent = "전체 기간 계산 중...";
      const range = await allVisitDateRange(y);
      start = range.start;
      end = range.end;
    }
    $("startDate").value = start;
    $("endDate").value = end;
    $("chartUnit").value = presetChartUnit(preset);
    chartUnitTouched = true;
    setComparisonPeriodDefaults(end, true);
    setComparisonUnit(presetComparisonUnit(preset));
    setComparisonGraphUnit(comparisonDetailUnit(comparisonUnit));
    setPresetActive(preset);
    run();
  }

  let lastResult = null;  // CSV용 마지막 집계 결과
  let chartUnitTouched = false;
  let comparisonUnit = "week";
  let comparisonGraphUnit = "day";

  async function refreshPeriodComparisonOnly() {
    if (!lastResult) return;
    const comparison = await loadPeriodComparison(lastResult.end, $("doctorFilter").value, comparisonUnit, comparisonGraphUnit);
    lastResult.comparisonUnit = comparisonUnit;
    lastResult.comparisonGraphUnit = comparisonGraphUnit;
    lastResult.comparison = comparison;
    renderPeriodComparisonChart(comparison, comparisonUnit);
  }

  function escapePeriodReportHtml(value) {
    return String(value ?? "").replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
  }

  function periodReportRate(value) {
    return `${(Number(value || 0) * 100).toFixed(1)}%`;
  }

  function periodComparisonText(current, previous, digits = 0) {
    current = Number(current || 0);
    previous = Number(previous || 0);
    if (!previous) return current ? "이전 기간 0" : "이전 기간과 동일";
    const change = ((current - previous) / previous) * 100;
    return `${change >= 0 ? "▲" : "▼"} ${Math.abs(change).toFixed(1)}% · 이전 ${previous.toLocaleString(undefined, { minimumFractionDigits: digits, maximumFractionDigits: digits })}`;
  }

  function periodReportMetric(label, value, sub = "") {
    return `<div class="period-report-metric"><div class="period-report-metric-label">${escapePeriodReportHtml(label)}</div><div class="period-report-metric-value">${escapePeriodReportHtml(value)}</div><div class="period-report-metric-sub">${escapePeriodReportHtml(sub)}</div></div>`;
  }

  function periodNeedComparisonText(currentRate, previousRate, previousCount) {
    const pointChange = (Number(currentRate || 0) - Number(previousRate || 0)) * 100;
    const direction = pointChange > 0 ? "▲" : pointChange < 0 ? "▼" : "－";
    return `${direction} ${Math.abs(pointChange).toFixed(1)}%p · 이전 ${Number(previousCount || 0).toLocaleString()}명 (${periodReportRate(previousRate)})`;
  }

  function renderPeriodReport(data) {
    const stats = data.stats || {};
    const previous = data.previousStats || {};
    const stages = data.visitStages || {};
    const previousStages = data.previousVisitStages || {};
    const followup = data.followup || {};
    const previousFollowup = data.previousFollowup || {};
    const needs = data.followupNeeds || {};
    const previousNeeds = data.previousFollowupNeeds || {};
    const followupRows = ["all", "chuna", "noChuna", "simple", "complex"].map(key => followup[key]).filter(Boolean);
    const treatmentRows = Object.entries(stats.treatmentCounts || {}).sort((a, b) => b[1] - a[1]).slice(0, 10);
    const doctorRows = Object.entries(stats.doctorCounts || {}).sort((a, b) => b[1] - a[1]);
    const weekdayRows = ["월", "화", "수", "목", "금", "토", "일"].filter(day => Number(stats.weekdayCounts?.[day] || 0) > 0);
    const currentDailyAverage = Number(stats.coreVisits || 0) / Math.max(1, Number(stats.clinicDays || 0));
    const previousDailyAverage = Number(previous.coreVisits || 0) / Math.max(1, Number(previous.clinicDays || 0));
    const pharmaPackageRate = Number(stats.pharmaPackagePurchasePatients || 0) / Math.max(1, Number(stats.uniquePatients || 0));
    const managementRows = [
      { label: "전체 · 재진 미도달", key: "noReturn", denominator: followup.all?.patients, previousDenominator: previousFollowup.all?.patients },
      { label: "전체 · 재진 후 삼진 미도달", key: "noThirdVisit", denominator: followup.all?.returned, previousDenominator: previousFollowup.all?.returned },
      { label: "추나군 · 재진 미도달", key: "chunaNoReturn", denominator: followup.chuna?.patients, previousDenominator: previousFollowup.chuna?.patients },
      { label: "추나군 · 재진 후 삼진 미도달", key: "chunaNoThirdVisit", denominator: followup.chuna?.returned, previousDenominator: previousFollowup.chuna?.returned },
      { label: "비추나군 · 재진 미도달", key: "noChunaNoReturn", denominator: followup.noChuna?.patients, previousDenominator: previousFollowup.noChuna?.patients },
      { label: "비추나군 · 재진 후 삼진 미도달", key: "noChunaNoThirdVisit", denominator: followup.noChuna?.returned, previousDenominator: previousFollowup.noChuna?.returned }
    ].map(row => ({
      ...row,
      count: Number(needs[row.key] || 0),
      previousCount: Number(previousNeeds[row.key] || 0),
      rate: row.denominator ? Number(needs[row.key] || 0) / Number(row.denominator) : 0,
      previousRate: row.previousDenominator ? Number(previousNeeds[row.key] || 0) / Number(row.previousDenominator) : 0
    }));

    $("periodReportResult").innerHTML = `
      <div class="period-report-head">
        <div><h2 class="period-report-title">경희홍익한의원 기간 리포트</h2><div class="period-report-period">${escapePeriodReportHtml(data.start)} ~ ${escapePeriodReportHtml(data.end)} · 이전 기간 ${escapePeriodReportHtml(data.previousStart)} ~ ${escapePeriodReportHtml(data.previousEnd)}</div></div>
        <div class="period-report-period">생성 ${escapePeriodReportHtml(new Date(data.generatedAt).toLocaleString("ko-KR"))}</div>
      </div>
      <div class="period-report-metrics">
        ${periodReportMetric("총 진료 건수", Number(stats.coreVisits || 0).toLocaleString(), periodComparisonText(stats.coreVisits, previous.coreVisits))}
        ${periodReportMetric("진료 환자", Number(stats.uniquePatients || 0).toLocaleString(), periodComparisonText(stats.uniquePatients, previous.uniquePatients))}
        ${periodReportMetric("초진", Number(stats.newPatients || 0).toLocaleString(), periodComparisonText(stats.newPatients, previous.newPatients))}
        ${periodReportMetric("재진 환자", Number(stats.revisitPatients || 0).toLocaleString(), periodComparisonText(stats.revisitPatients, previous.revisitPatients))}
        ${periodReportMetric("일평균 진료", currentDailyAverage.toFixed(1), periodComparisonText(currentDailyAverage, previousDailyAverage, 1))}
        ${periodReportMetric("추나 시행", Number(stats.chunaTotal || 0).toLocaleString(), `환자 비율 ${periodReportRate(stats.chunaPatientRate)}`)}
        ${periodReportMetric("약환", Number(stats.prescriptionPatients || 0).toLocaleString(), periodComparisonText(stats.prescriptionPatients, previous.prescriptionPatients))}
        ${periodReportMetric("약침 시행", Number(stats.pharmaTotal || 0).toLocaleString(), `${Number(stats.pharmaPatients || 0).toLocaleString()}명 (${periodReportRate(stats.pharmaPatientRate)}) · ${periodComparisonText(stats.pharmaTotal, previous.pharmaTotal)}`)}
        ${periodReportMetric("약침 패키지", Number(stats.pharmaPackagePurchasePatients || 0).toLocaleString(), `진료 환자 비율 ${periodReportRate(pharmaPackageRate)} · ${periodComparisonText(stats.pharmaPackagePurchasePatients, previous.pharmaPackagePurchasePatients)}`)}
        ${periodReportMetric("평균 방문 횟수", Number(stats.avgVisitsPerPatient || 0).toFixed(2), periodComparisonText(stats.avgVisitsPerPatient, previous.avgVisitsPerPatient, 2))}
      </div>
      <div class="period-report-section"><h3>선택 기간 방문 단계</h3><div class="period-report-metrics">
        ${periodReportMetric("1회차", Number(stages.first || 0).toLocaleString(), periodComparisonText(stages.first, previousStages.first))}
        ${periodReportMetric("2회차", Number(stages.second || 0).toLocaleString(), periodComparisonText(stages.second, previousStages.second))}
        ${periodReportMetric("3회차", Number(stages.third || 0).toLocaleString(), periodComparisonText(stages.third, previousStages.third))}
        ${periodReportMetric("4회차 이상", Number(stages.fourthPlus || 0).toLocaleString(), periodComparisonText(stages.fourthPlus, previousStages.fourthPlus))}
      </div></div>
      <div class="period-report-section"><h3>초진 코호트 재진·삼진율</h3>
        <div class="period-report-period">초진 기간 ${escapePeriodReportHtml(data.cohortStart)} ~ ${escapePeriodReportHtml(data.cohortEnd)} · 초진일부터 21일 추적</div>
        <table><thead><tr><th>초진 치료</th><th>초진</th><th>재진 도달</th><th>재진율</th><th>삼진 도달</th><th>삼진율</th><th>재진→삼진</th></tr></thead><tbody>
          ${followupRows.map(row => `<tr><td>${escapePeriodReportHtml(row.label)}</td><td>${Number(row.patients || 0).toLocaleString()}</td><td>${Number(row.returned || 0).toLocaleString()}</td><td>${periodReportRate(row.returnRate)}</td><td>${Number(row.thirdVisit || 0).toLocaleString()}</td><td>${periodReportRate(row.thirdVisitRate)}</td><td>${periodReportRate(row.returnToThirdRate)}</td></tr>`).join("")}
        </tbody></table>
        <div class="period-report-note">추나군은 초진 당일 단추·복추·기존 추나 중 하나 이상을 시행한 환자입니다. 이 수치는 관찰된 연관성이며 치료 효과의 인과관계를 의미하지 않습니다.</div>
      </div>
      <div class="period-report-columns">
        <div class="period-report-section"><h3>관리 필요 현황</h3><table>
          <thead><tr><th>구분</th><th>현재</th><th>이전 기간 비교</th></tr></thead>
          <tbody>${managementRows.map(row => `<tr><td>${escapePeriodReportHtml(row.label)}</td><td>${row.count.toLocaleString()}명 (${periodReportRate(row.rate)})</td><td>${escapePeriodReportHtml(periodNeedComparisonText(row.rate, row.previousRate, row.previousCount))}</td></tr>`).join("")}</tbody>
        </table></div>
        <div class="period-report-section"><h3>요일별 진료</h3><table><thead><tr><th>요일</th><th>환자 수</th></tr></thead><tbody>${weekdayRows.map(day => `<tr><td>${day}요일</td><td>${Number(stats.weekdayCounts[day] || 0).toFixed(1)}</td></tr>`).join("")}</tbody></table></div>
      </div>
      <div class="period-report-columns">
        <div class="period-report-section"><h3>치료 항목 상위 10</h3><table><thead><tr><th>치료</th><th>건수</th></tr></thead><tbody>${treatmentRows.map(([name, count]) => `<tr><td>${escapePeriodReportHtml(name)}</td><td>${Number(count || 0).toLocaleString()}</td></tr>`).join("")}</tbody></table></div>
        <div class="period-report-section"><h3>원장별 진료 건수</h3><table><thead><tr><th>담당 원장</th><th>건수</th></tr></thead><tbody>${doctorRows.map(([name, count]) => `<tr><td>${escapePeriodReportHtml(name)}</td><td>${Number(count || 0).toLocaleString()}</td></tr>`).join("")}</tbody></table></div>
      </div>`;
  }

  async function createPeriodReport() {
    let start = $("startDate").value;
    let end = $("endDate").value;
    if (!start || !end) {
      $("periodReportStatus").textContent = "시작일과 종료일을 확인해주세요.";
      $("periodReportStatus").classList.add("error");
      return;
    }
    if (start > end) [start, end] = [end, start];
    $("periodReportCreateBtn").disabled = true;
    $("periodReportPrintBtn").disabled = true;
    $("periodReportStatus").classList.remove("error");
    $("periodReportStatus").textContent = "기간 리포트 집계 중...";
    try {
      const res = await fetch(`/api/reports/period?${new URLSearchParams({ start, end })}`, { cache: "no-store" });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `리포트 생성 실패 (${res.status})`);
      renderPeriodReport(data);
      $("periodReportPrintBtn").disabled = false;
      $("periodReportStatus").textContent = "기간 리포트 생성 완료";
    } catch (error) {
      $("periodReportResult").innerHTML = "";
      $("periodReportStatus").textContent = error?.message || String(error);
      $("periodReportStatus").classList.add("error");
    } finally {
      $("periodReportCreateBtn").disabled = false;
    }
  }

  function printPeriodReport() {
    if (!$("periodReportResult").innerHTML) return;
    document.body.classList.add("period-report-printing");
    window.print();
    setTimeout(() => document.body.classList.remove("period-report-printing"), 0);
  }

  async function run() {
    let start = $("startDate").value;
    let end = $("endDate").value;
    if (!start || !end) { $("status").textContent = "시작일과 종료일을 선택하세요."; return; }
    if (start > end) { [start, end] = [end, start]; $("startDate").value = start; $("endDate").value = end; }
    const docFilter = $("doctorFilter").value;
    const docLabel = docFilter || "전체";
    if (!chartUnitTouched) $("chartUnit").value = defaultChartUnit(start, end);
    const chartUnit = $("chartUnit").value || "week";
    const unitLabel = { day: "일", week: "주", month: "월", quarter: "분기", year: "년" }[chartUnit] || "주";
    $("status").classList.remove("error");
    $("status").textContent = "";
    try {
      const s = SERVER_MODE ? await loadServerStats(start, end, docFilter, chartUnit) : computeStats(start, end, docFilter, chartUnit);
      const comparison = await loadPeriodComparison(end, docFilter, comparisonUnit, comparisonGraphUnit);
      const recordCount = SERVER_MODE ? Number(s.recordCount || 0) : allRecords.length;
      $("rangeLabel").textContent = `조회 기간: ${start} ~ ${end} · 원장: ${docLabel} · 그래프: ${unitLabel} 단위 (전체 ${recordCount.toLocaleString()}명 환자 기준)`;
      renderSummary(s);
      renderWeeklyChart(s.trendStats, chartUnit);
      renderPeriodComparisonChart(comparison, comparisonUnit);
      renderCountTable("treatmentTableWrap", s.treatmentCounts, { gold: true });
      renderCountTable("doctorTableWrap", s.doctorCounts);
      renderCountTable("weekdayTableWrap", s.weekdayCounts, { order: ["월", "화", "수", "목", "금", "토", "일"], valueHeader: "평균", decimals: 1 });
      renderCountTable("comboTableWrap", s.treatmentComboCounts, { gold: true, limit: 10 });
      lastResult = { start, end, docLabel, chartUnit, comparisonUnit, comparisonGraphUnit, stats: s, comparison };
    } catch (e) {
      $("status").textContent = "오류: " + (e?.message || e);
      $("status").classList.add("error");
    }
  }

  // ── CSV 다운로드 ────────────────────────────────────────────────
  function csvEscape(v) {
    const s = String(v ?? "");
    return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  }
  function downloadCsv() {
    if (!lastResult) { $("status").textContent = "먼저 조회를 실행하세요."; return; }
    const { start, end, docLabel, chartUnit, stats } = lastResult;
    const trendLabel = { day: "일별", week: "주차별", month: "월별", quarter: "분기별", year: "연도별" }[chartUnit] || "기간별";
    const lines = [];
    lines.push(["구분", "항목", "값"].map(csvEscape).join(","));
    lines.push(["기간", "시작", start].map(csvEscape).join(","));
    lines.push(["기간", "종료", end].map(csvEscape).join(","));
    lines.push(["기간", "원장", docLabel].map(csvEscape).join(","));
    lines.push(["요약", "총 진료 건수", stats.visits].map(csvEscape).join(","));
    lines.push(["요약", "총 환자 수", stats.totalPatients].map(csvEscape).join(","));
    lines.push(["요약", "약환", stats.prescriptionPatients].map(csvEscape).join(","));
    lines.push(["요약", "진료 환자 수", stats.uniquePatients].map(csvEscape).join(","));
    lines.push(["요약", "초진(신환)", stats.newPatients].map(csvEscape).join(","));
    lines.push(["요약", "재진 환자", stats.revisitPatients].map(csvEscape).join(","));
    lines.push(["요약", "재진율", `${(stats.returnRate * 100).toFixed(1)}%`].map(csvEscape).join(","));
    lines.push(["요약", "삼진율", `${(stats.thirdVisitRate * 100).toFixed(1)}%`].map(csvEscape).join(","));
    lines.push(["요약", "평균 방문 횟수", stats.avgVisitsPerPatient.toFixed(2)].map(csvEscape).join(","));
    lines.push(["요약", "약침 합계", stats.pharmaTotal].map(csvEscape).join(","));
    lines.push(["요약", "일평균 추나(단추+복추)", Number(stats.avgChunaPerDay || 0).toFixed(1)].map(csvEscape).join(","));
    lines.push(["요약", "추나환자 비율", `${(Number(stats.chunaPatientRate || 0) * 100).toFixed(1)}%`].map(csvEscape).join(","));
    lines.push(["요약", "복추/추나전체 비율", `${(Number(stats.complexChunaRate || 0) * 100).toFixed(1)}%`].map(csvEscape).join(","));
    lines.push(["요약", "약침환자 비율", `${(Number(stats.pharmaPatientRate || 0) * 100).toFixed(1)}%`].map(csvEscape).join(","));
    lines.push(["요약", "일평균 약침환자수", Number(stats.avgPharmaPatientsPerDay || 0).toFixed(1)].map(csvEscape).join(","));
    lines.push(["요약", "약침패키지 결제 환자수", Number(stats.pharmaPackagePurchasePatients || 0)].map(csvEscape).join(","));
    stats.trendStats.forEach(row => {
      CHART_METRICS.forEach(metric => {
        const rawValue = Number(row[metric.key] || 0);
        const value = metric.axis === "rate" ? `${(rawValue * 100).toFixed(1)}%` : rawValue.toFixed(2);
        lines.push([trendLabel, `${row.key} ${metric.label}`, value].map(csvEscape).join(","));
      });
    });
    Object.entries(stats.treatmentCounts).sort((a, b) => b[1] - a[1])
      .forEach(([name, c]) => lines.push(["치료별", name, c].map(csvEscape).join(",")));
    Object.entries(stats.doctorCounts).sort((a, b) => b[1] - a[1])
      .forEach(([name, c]) => lines.push(["원장별", name, c].map(csvEscape).join(",")));
    ["월", "화", "수", "목", "금", "토", "일"]
      .filter(day => stats.weekdayCounts[day])
      .forEach(day => lines.push(["요일별 평균", day, Number(stats.weekdayCounts[day] || 0).toFixed(1)].map(csvEscape).join(",")));
    Object.entries(stats.treatmentComboCounts).sort((a, b) => b[1] - a[1]).slice(0, 10)
      .forEach(([name, c]) => lines.push(["치료조합 Top 10", name, c].map(csvEscape).join(",")));
    const csv = "﻿" + lines.join("\r\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `진료통계_${start}_${end}_${docLabel}.csv`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }

  async function reload() {
    $("status").textContent = "DB 읽는 중...";
    try {
      if (SERVER_MODE) {
        allRecords = [];
        await populateServerDoctorFilter();
      } else {
        allRecords = await loadRecords();
        populateDoctorFilter();
      }
      $("status").classList.remove("error");
      $("status").textContent = "";
    } catch (e) {
      allRecords = [];
      $("status").textContent = "오류: " + (e?.message || e);
      $("status").classList.add("error");
    }
  }

  document.querySelectorAll(".preset-btn").forEach(b => b.addEventListener("click", () => { applyPreset(b.dataset.preset); }));
  $("applyBtn").addEventListener("click", () => { chartUnitTouched = false; setPresetActive(""); run(); });
  $("doctorFilter").addEventListener("change", run);
  $("chartUnit").addEventListener("change", () => { chartUnitTouched = true; run(); });
  $("comparisonUnitRow").addEventListener("click", async event => {
    const button = event.target?.closest?.(".comparison-unit-btn");
    if (!button) return;
    setComparisonUnit(button.dataset.comparisonUnit || "week");
    setComparisonGraphUnit(comparisonDetailUnit(comparisonUnit));
    if (!lastResult) return;
    try {
      await refreshPeriodComparisonOnly();
    } catch (e) {
      $("status").textContent = "오류: " + (e?.message || e);
      $("status").classList.add("error");
    }
  });
  $("comparisonGraphUnit").addEventListener("change", async () => {
    setComparisonGraphUnit($("comparisonGraphUnit").value);
    if (!lastResult) return;
    try {
      await refreshPeriodComparisonOnly();
    } catch (e) {
      $("status").textContent = "오류: " + (e?.message || e);
      $("status").classList.add("error");
    }
  });
  ["comparisonPreviousMonth", "comparisonCurrentMonth", "comparisonPreviousQuarter", "comparisonCurrentQuarter"].forEach(id => {
    $(id)?.addEventListener("change", async () => {
      if (!lastResult) return;
      try {
        await refreshPeriodComparisonOnly();
      } catch (e) {
        $("status").textContent = "오류: " + (e?.message || e);
        $("status").classList.add("error");
      }
    });
  });
  $("csvBtn").addEventListener("click", downloadCsv);
  $("periodReportCreateBtn").addEventListener("click", createPeriodReport);
  $("periodReportPrintBtn").addEventListener("click", printPeriodReport);
  renderChartMetricToggles();
  disableAutocomplete();
  $("chartMetricToggles").addEventListener("click", event => {
    const chip = event.target?.closest?.(".chart-metric-chip");
    if (!chip) return;
    chip.classList.toggle("active");
    if (lastResult) {
      renderWeeklyChart(lastResult.stats.trendStats, lastResult.chartUnit);
    }
  });
  $("periodComparisonMetricToggles").addEventListener("click", event => {
    const chip = event.target?.closest?.(".comparison-chart-metric-chip");
    if (!chip) return;
    $("periodComparisonMetricToggles").querySelectorAll(".comparison-chart-metric-chip").forEach(other => {
      other.classList.toggle("active", other === chip);
    });
    if (lastResult) renderPeriodComparisonChart(lastResult.comparison, lastResult.comparisonUnit);
  });

  // 초기: 최근 30일 전체를 기본 로드
  (async () => {
    await reload();
    await applyPreset("30");
  })();
</script>
</body>
</html>
